<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>GTD Brain Dump</title>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Brain Dump"/>
  <meta name="theme-color" content="#16a34a"/>
  <link rel="manifest" href="manifest.json"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;margin:0;padding:0;background:#fafaf9;font-family:system-ui,-apple-system,sans-serif;overflow:hidden}
    input,textarea,button{font-family:inherit}
    ::-webkit-scrollbar{display:none}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback}=React;

/* ── Utils ─────────────────────────────────────────── */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const todayISO=()=>new Date().toISOString().slice(0,10);
const addDays=n=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)};
const nextRecur=(d,r)=>{const dt=new Date(d+'T00:00:00');if(r==='daily')dt.setDate(dt.getDate()+1);else if(r==='weekly')dt.setDate(dt.getDate()+7);else if(r==='monthly')dt.setMonth(dt.getMonth()+1);else if(r==='yearly')dt.setFullYear(dt.getFullYear()+1);return dt.toISOString().slice(0,10)};
const fmtDate=d=>{if(!d)return'';if(d===todayISO())return'Today';if(d===addDays(1))return'Tomorrow';return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'})};
const fmtCreated=d=>d?new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short'}):'';
const isOverdue=d=>!!d&&d<todayISO();
const withinN=(d,n)=>{if(!d)return false;const s=new Date(todayISO()+'T00:00:00'),e=new Date(s);e.setDate(e.getDate()+n);const dt=new Date(d+'T00:00:00');return dt>=s&&dt<=e};
const daysOver=d=>{if(!isOverdue(d))return 0;return Math.floor((Date.now()-new Date(d+'T00:00:00').getTime())/864e5)};
const effPri=t=>{if(t.priority)return t.priority;const n=daysOver(t.dueDate);if(n>=3)return'P1';if(n>=2)return'P2';if(n>=1)return'P3';return null};
const isAutoEsc=t=>!t.priority&&daysOver(t.dueDate)>=1;
// Sort: date primary (asc), then priority within same date
const sortDP=list=>{const po={P1:1,P2:2,P3:3,P4:4};return[...list].sort((a,b)=>{const da=a.dueDate||'9999',db=b.dueDate||'9999';if(da!==db)return da.localeCompare(db);return(po[effPri(a)]||5)-(po[effPri(b)]||5)})};
// Parse #tags from text, return {text, tags}
const parseTags=raw=>{const tags=[];let m;const re=/#([a-zA-Z0-9_]+)/g;while((m=re.exec(raw))!==null)tags.push(m[1]);const clean=raw.replace(/#[a-zA-Z0-9_]+/g,'').replace(/\s+/g,' ').trim();return{text:clean||raw.trim(),tags:[...new Set(tags)]}};
const ls={get:(k,d=null)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}};

/* ── Google + Drive ─────────────────────────────────── */
const GCAL='https://www.googleapis.com/calendar/v3';
const DAPI='https://www.googleapis.com/drive/v3';
const DFILE='gtd_v4.json';
let _tc=null,_tok=null;
const gcal={
  init(cid,onOk){if(!window.google?.accounts?.oauth2)return false;_tc=window.google.accounts.oauth2.initTokenClient({client_id:cid,scope:'https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/drive.appdata',callback:r=>{if(r.access_token){_tok=r.access_token;ls.set('tok',_tok);onOk()}}});const s=ls.get('tok');if(s){_tok=s;onOk()}return true},
  connect(){_tc&&_tc.requestAccessToken({prompt:''})},
  _h(){return{'Authorization':'Bearer '+_tok,'Content-Type':'application/json'}},
  async create(t){if(!_tok||!t.dueDate)return null;try{const r=await fetch(GCAL+'/calendars/primary/events',{method:'POST',headers:gcal._h(),body:JSON.stringify({summary:t.text,start:{date:t.dueDate},end:{date:t.dueDate},description:[t.priority&&('P: '+t.priority),(t.labels&&t.labels.length)&&('Labels: '+t.labels.join(', ')),t.project&&('Project: '+t.project)].filter(Boolean).join('\n')})});if(r.status===401){_tok=null;ls.set('tok',null);return null}return(await r.json()).id||null}catch{return null}},
  async del(eid){if(!_tok||!eid)return;try{await fetch(GCAL+'/calendars/primary/events/'+eid,{method:'DELETE',headers:gcal._h()})}catch{}}
};
const drv={
  async fid(){let id=ls.get('drv_fid',null);if(id)return id;if(!_tok)return null;try{const r=await fetch(DAPI+'/files?spaces=appDataFolder&q=name%3D%27'+DFILE+'%27&fields=files(id)',{headers:gcal._h()});if(!r.ok){if(r.status===401){_tok=null;ls.set('tok',null)}return null}const d=await r.json();id=(d.files&&d.files[0]&&d.files[0].id)||null;if(id)ls.set('drv_fid',id);return id}catch{return null}},
  async save(data){if(!_tok)return false;try{const id=await drv.fid();const ts=Date.now();const content=JSON.stringify({...data,_ts:ts});const bnd='gtdv4bnd';const meta=id?'{}':JSON.stringify({name:DFILE,parents:['appDataFolder']});const body='--'+bnd+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+meta+'\r\n--'+bnd+'\r\nContent-Type: application/json\r\n\r\n'+content+'\r\n--'+bnd+'--';const url='https://www.googleapis.com/upload/drive/v3/files'+(id?'/'+id:'')+'?uploadType=multipart';const r=await fetch(url,{method:id?'PATCH':'POST',headers:{'Authorization':'Bearer '+_tok,'Content-Type':'multipart/related; boundary='+bnd},body});if(r.status===401){_tok=null;ls.set('tok',null);return false}if(r.ok){const d=await r.json();const nid=d.id||id;if(nid&&nid!==id)ls.set('drv_fid',nid);ls.set('tasks_ts',ts)}return r.ok}catch{return false}},
  async load(){if(!_tok)return null;try{const id=await drv.fid();if(!id)return null;const r=await fetch(DAPI+'/files/'+id+'?alt=media',{headers:gcal._h()});if(!r.ok){if(r.status===401){_tok=null;ls.set('tok',null)}return null}return await r.json()}catch{return null}}
};

/* ── Style constants ────────────────────────────────── */
const PS={P1:'bg-red-50 text-red-600 border-red-200',P2:'bg-orange-50 text-orange-600 border-orange-200',P3:'bg-sky-50 text-sky-700 border-sky-200',P4:'bg-stone-100 text-stone-400 border-stone-200'};
const PF={P1:'🔴',P2:'🟠',P3:'🔵',P4:'⚪'};
const EIS=[{k:'do',s:'Do Now',l:'Urgent+Important',b:'border-red-300 bg-red-50',c:'bg-red-50 text-red-700 border-red-200'},{k:'schedule',s:'Schedule',l:'Important,Not Urgent',b:'border-sky-300 bg-sky-50',c:'bg-sky-50 text-sky-700 border-sky-200'},{k:'delegate',s:'Delegate',l:'Urgent,Not Important',b:'border-amber-300 bg-amber-50',c:'bg-amber-50 text-amber-700 border-amber-200'},{k:'drop',s:'Drop',l:'Not Urgent/Important',b:'border-stone-300 bg-stone-50',c:'bg-stone-100 text-stone-500 border-stone-200'}];
const RECUR={daily:'📆 Daily',weekly:'📅 Weekly',monthly:'🗓 Monthly',yearly:'🔁 Yearly'};
const GOAL_TIERS=[{k:'short',l:'🎯 Short-term',s:'< 3 months'},{k:'medium',l:'📈 Medium-term',s:'3–12 months'},{k:'long',l:'🌟 Long-term',s:'1–3 years'},{k:'vlong',l:'🚀 Very Long-term',s:'3+ years'}];
const LBL_COLORS=['bg-sky-100 text-sky-700 border-sky-200','bg-amber-100 text-amber-700 border-amber-200','bg-pink-100 text-pink-700 border-pink-200','bg-purple-100 text-purple-700 border-purple-200','bg-teal-100 text-teal-700 border-teal-200','bg-rose-100 text-rose-700 border-rose-200'];
const lblColor=(l,lbls)=>{const i=lbls.indexOf(l)%LBL_COLORS.length;return LBL_COLORS[i]||LBL_COLORS[0]};

/* ── App ────────────────────────────────────────────── */
function App(){
  const [tasks,setTasks]=useState(()=>ls.get('tasks',[]));
  const [labels,setLabels]=useState(()=>ls.get('labels',['Personal','Work','Health','Finance']));
  const [projects,setProjects]=useState(()=>ls.get('projects',['Home','Office','Family']));
  const [tab,setTab]=useState('inbox');
  const [doneTab,setDoneTab]=useState('completed');
  const [editTask,setEditTask]=useState(null);
  const [dump,setDump]=useState('');
  const [dumpProj,setDumpProj]=useState(null);
  const [dumpLbls,setDumpLbls]=useState([]);
  const [suggs,setSuggs]=useState([]);
  const [suggMode,setSuggMode]=useState(null);
  const [lf,setLf]=useState(null);
  const [gcalCid,setGcalCid]=useState(()=>ls.get('gcal_cid',''));
  const [gcalOk,setGcalOk]=useState(false);
  const [driveOk,setDriveOk]=useState(false);
  const [syncing,setSyncing]=useState(false);
  const [toast,setToast]=useState('');
  const [selectMode,setSelectMode]=useState(false);
  const [selected,setSelected]=useState([]);
  const [showSearch,setShowSearch]=useState(false);
  const [searchQ,setSearchQ]=useState('');
  const [showLblAssign,setShowLblAssign]=useState(false);
  const [editPrj,setEditPrj]=useState(null);
  const [editPrjVal,setEditPrjVal]=useState('');
  const [ready,setReady]=useState(false);

  useEffect(()=>{
    const co=new Date();co.setDate(co.getDate()-7);
    const t=ls.get('tasks',[]).map(t=>{if(t.type==='wish'&&t.status==='inbox'&&new Date(t.createdAt)<co)return{...t,status:'archived',autoArchived:true};return t});
    ls.set('tasks',t);setTasks(t);setReady(true);
  },[]);

  useEffect(()=>{
    if(!gcalCid)return;
    const tryInit=()=>{const ok=gcal.init(gcalCid,()=>setGcalOk(true));if(!ok)setTimeout(tryInit,500)};
    if(window.google?.accounts?.oauth2)tryInit();
    else{const id=setInterval(()=>{if(window.google?.accounts?.oauth2){clearInterval(id);tryInit()}},400);return()=>clearInterval(id)}
  },[gcalCid]);

  useEffect(()=>{
    if(!gcalOk)return;
    (async()=>{
      const data=await drv.load();
      if(!data){drv.save({tasks,labels,projects,_ts:Date.now()}).then(ok=>ok&&setDriveOk(true));return}
      setDriveOk(true);
      const localTs=ls.get('tasks_ts',0);
      if(data._ts&&data._ts>localTs){
        if(data.tasks){setTasks(data.tasks);ls.set('tasks',data.tasks);ls.set('tasks_ts',data._ts)}
        if(data.labels){setLabels(data.labels);ls.set('labels',data.labels)}
        if(data.projects){setProjects(data.projects);ls.set('projects',data.projects)}
        showToast('📥 Synced from Google Drive');
      }
    })();
  },[gcalOk]);

  const showToast=(m,ms=3000)=>{setToast(m);setTimeout(()=>setToast(''),ms)};
  const persist=useCallback((t,l,p)=>{const fl=l||labels,fp=p||projects;setTasks(t);ls.set('tasks',t);const ts=Date.now();ls.set('tasks_ts',ts);if(gcalOk&&driveOk)drv.save({tasks:t,labels:fl,projects:fp,_ts:ts}).catch(()=>{});},[gcalOk,driveOk,labels,projects]);
  const persistLbls=l=>{setLabels(l);ls.set('labels',l);if(gcalOk&&driveOk)drv.save({tasks,labels:l,projects}).catch(()=>{})};
  const persistPrjs=p=>{setProjects(p);ls.set('projects',p);if(gcalOk&&driveOk)drv.save({tasks,labels,projects:p}).catch(()=>{})};

  // Dump: parse # tags + smart suggestions
  const handleDumpChange=val=>{
    setDump(val);
    const lines=val.split('\n');const cur=lines[lines.length-1];
    // Check for #tag in progress
    const hm=cur.match(/#([a-zA-Z0-9_]*)$/);
    if(hm){const partial=hm[1].toLowerCase();const m=labels.filter(l=>l.toLowerCase().startsWith(partial)||l.toLowerCase().includes(partial)).slice(0,5);setSuggs(m);setSuggMode('hash');return}
    // Word suggestion
    const words=cur.trim().split(/\s+/);const last=words[words.length-1].toLowerCase();
    if(last.length>=2){const m=[...labels,...projects].filter(x=>x.toLowerCase().includes(last)&&x.toLowerCase()!==last).slice(0,4);setSuggs(m);setSuggMode('word')}
    else{setSuggs([]);setSuggMode(null)}
  };

  const applySugg=s=>{
    if(suggMode==='hash'){setDump(prev=>prev.replace(/#([a-zA-Z0-9_]*)$/,'#'+s+' '))}
    else if(projects.includes(s))setDumpProj(s);
    else setDumpLbls(p=>p.includes(s)?p:[...p,s]);
    setSuggs([]);setSuggMode(null);
  };

  const toggleDumpLbl=l=>setDumpLbls(p=>p.includes(l)?p.filter(x=>x!==l):[...p,l]);

  const addDump=()=>{
    const lines=dump.split('\n').map(s=>s.trim()).filter(Boolean);if(!lines.length)return;
    let newLblList=[...labels];
    const nt=lines.map(line=>{
      const {text,tags}=parseTags(line);
      const allLbls=[...new Set([...dumpLbls,...tags])];
      tags.forEach(t=>{if(!newLblList.includes(t))newLblList.push(t)});
      return{id:uid(),text,createdAt:new Date().toISOString(),dueDate:null,labels:allLbls,project:dumpProj||null,priority:null,eisenhower:null,type:'task',status:'inbox',completedAt:null,calendarEventId:null,recurring:null,subtasks:[],goalType:null};
    });
    if(newLblList.length>labels.length)persistLbls(newLblList);
    persist([...tasks,...nt]);setDump('');setDumpProj(null);setDumpLbls([]);setSuggs([]);setTab('inbox');
  };

  const complete=async id=>{
    const task=tasks.find(t=>t.id===id);if(!task)return;
    const upd={...task,status:'completed',completedAt:new Date().toISOString()};
    let nt=tasks.map(t=>t.id===id?upd:t);
    if(gcalOk&&upd.calendarEventId)gcal.del(upd.calendarEventId);
    if(task.recurring&&task.dueDate){const nxt={...task,id:uid(),dueDate:nextRecur(task.dueDate,task.recurring),status:'todo',completedAt:null,calendarEventId:null,createdAt:new Date().toISOString(),subtasks:[]};nt=[...nt,nxt];if(gcalOk){const cid=await gcal.create(nxt);if(cid)nt=nt.map(t=>t.id===nxt.id?{...t,calendarEventId:cid}:t)}}
    persist(nt);
  };
  const uncomplete=id=>persist(tasks.map(t=>t.id===id?{...t,status:t.dueDate?'todo':'inbox',completedAt:null}:t));
  const archive=id=>persist(tasks.map(t=>t.id===id?{...t,status:'archived'}:t));
  const restore=id=>persist(tasks.map(t=>t.id===id?{...t,status:'inbox'}:t));
  const del=async id=>{const t=tasks.find(x=>x.id===id);if(gcalOk&&t&&t.calendarEventId)gcal.del(t.calendarEventId);persist(tasks.filter(x=>x.id!==id))};
  // Toggle subtask directly in list
  const toggleSubTask=(taskId,stId)=>persist(tasks.map(t=>t.id!==taskId?t:{...t,subtasks:(t.subtasks||[]).map(s=>s.id===stId?{...s,done:!s.done}:s)}));

  const saveEdit=async upd=>{
    let s=upd.status;
    if(upd.dueDate&&s==='inbox')s='todo';
    if(!upd.dueDate&&s==='todo')s='inbox';
    const old=tasks.find(t=>t.id===upd.id);let ceid=upd.calendarEventId;
    if(gcalOk){if(upd.dueDate){if(!ceid)ceid=await gcal.create({...upd,status:s});else if((old&&old.dueDate)!==upd.dueDate||(old&&old.text)!==upd.text){gcal.del(ceid);ceid=await gcal.create({...upd,status:s})}}else if(ceid){gcal.del(ceid);ceid=null}}
    persist(tasks.map(t=>t.id===upd.id?{...upd,status:s,calendarEventId:ceid}:t));setEditTask(null);
  };

  const syncAll=async()=>{setSyncing(true);const dated=tasks.filter(t=>t.dueDate&&t.status!=='archived'&&!t.calendarEventId);let upd=[...tasks];let cnt=0;for(const t of dated){const id=await gcal.create(t);if(id){upd=upd.map(u=>u.id===t.id?{...u,calendarEventId:id}:u);cnt++}}persist(upd);setSyncing(false);showToast('✅ Synced '+cnt+' tasks')};

  // Multi-select operations
  const toggleSel=id=>setSelected(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const copySelected=()=>{const texts=selected.map(id=>tasks.find(t=>t.id===id)).filter(Boolean).map(t=>'• '+t.text);if(navigator.clipboard)navigator.clipboard.writeText(texts.join('\n')).then(()=>showToast('📋 Copied '+texts.length+' tasks')).catch(()=>showToast('❌ Copy failed'));setSelectMode(false);setSelected([])};
  const assignLabels=lbls=>{persist(tasks.map(t=>{if(!selected.includes(t.id))return t;return{...t,labels:[...new Set([...(t.labels||[]),...lbls])]}}));setSelectMode(false);setSelected([]);setShowLblAssign(false);showToast('🏷️ Labels applied to '+selected.length+' tasks')};
  const archiveSel=()=>{persist(tasks.map(t=>selected.includes(t.id)?{...t,status:'archived'}:t));setSelectMode(false);setSelected([])};
  const deleteSel=()=>{selected.forEach(id=>{const t=tasks.find(x=>x.id===id);if(gcalOk&&t&&t.calendarEventId)gcal.del(t.calendarEventId)});persist(tasks.filter(t=>!selected.includes(t.id)));setSelectMode(false);setSelected([])};

  if(!ready)return<div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12,color:'#a8a29e'}}><span style={{fontSize:56}}>🧠</span><span style={{fontSize:14,fontWeight:600}}>Loading…</span></div>;

  // ── KEY BEHAVIORAL CHANGE: only project moves tasks out of inbox
  const inProject=t=>!!t.project;
  const matchF=t=>{if(!lf)return true;if(lf.startsWith('p:'))return t.project===lf.slice(2);return(t.labels||[]).includes(lf.slice(2))};

  // Inbox: all tasks with status=inbox, if project filter active → show tasks in that project, else no project filter
  const inboxAll=tasks.filter(t=>t.status==='inbox').sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
  const inboxF=lf?tasks.filter(t=>['inbox','todo'].includes(t.status)&&matchF(t)):inboxAll;
  const todosF=sortDP(tasks.filter(t=>t.status==='todo'&&(lf?matchF(t):true)));
  const done=tasks.filter(t=>t.status==='completed').sort((a,b)=>(b.completedAt||'').localeCompare(a.completedAt||''));
  const arch=tasks.filter(t=>t.status==='archived');
  const goals=tasks.filter(t=>t.goalType&&!['completed','archived'].includes(t.status));
  const activeAll=tasks.filter(t=>!['archived','completed'].includes(t.status));
  const inboxN=inboxAll.length;const todoN=tasks.filter(t=>t.status==='todo').length;
  const showLf=['inbox','todo','web'].includes(tab);
  const selPool=(tab==='inbox'?inboxF:todosF).map(t=>t.id);
  const searchRes=searchQ.length>=2?tasks.filter(t=>t.status!=='archived'&&t.text.toLowerCase().includes(searchQ.toLowerCase())).slice(0,40):[];
  const isLabelView=!!lf&&['inbox','todo'].includes(tab);

  return(
    <div style={{position:'fixed',inset:0,display:'flex',flexDirection:'column',background:'#fafaf9'}}>
      {toast&&<div className="fixed top-4 left-4 right-4 z-50 bg-emerald-600 text-white text-sm font-bold px-4 py-3 rounded-2xl text-center shadow-xl">{toast}</div>}

      {/* Search overlay */}
      {showSearch&&(
        <div className="fixed inset-0 z-40 flex flex-col" style={{background:'#fafaf9'}}>
          <div className="bg-white border-b border-stone-100 px-4 py-3 flex gap-3 items-center">
            <span className="text-stone-400 text-lg">🔍</span>
            <input autoFocus value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="Search all tasks…" className="flex-1 text-sm text-stone-800 bg-transparent focus:outline-none"/>
            <button onClick={()=>{setShowSearch(false);setSearchQ('')}} className="text-stone-400 font-black text-lg px-1">✕</button>
          </div>
          <div className="flex-1 overflow-y-auto pt-3">
            {searchQ.length>=2&&!searchRes.length&&<Empty i="🔍" t="No results" s={"Nothing matches '"+searchQ+"'"}/>}
            {searchRes.map(t=><Card key={t.id} task={t} labels={labels} onComplete={complete} onEdit={x=>{setEditTask(x);setShowSearch(false)}} onToggleSub={toggleSubTask}/>)}
            {searchQ.length<2&&<p className="text-center text-stone-400 text-xs mt-12">Type at least 2 characters</p>}
          </div>
        </div>
      )}

      {/* Label assign modal */}
      {showLblAssign&&(
        <div className="fixed inset-0 z-40 flex items-end">
          <div className="absolute inset-0 bg-black/50" onClick={()=>setShowLblAssign(false)}/>
          <div className="relative bg-white rounded-t-3xl p-5 w-full">
            <p className="text-sm font-black text-stone-800 mb-3">🏷️ Assign labels to {selected.length} tasks</p>
            <LblPicker labels={labels} onConfirm={assignLabels} onClose={()=>setShowLblAssign(false)}/>
          </div>
        </div>
      )}

      {/* Project rename modal */}
      {editPrj&&(
        <div className="fixed inset-0 z-40 flex items-center justify-center">
          <div className="absolute inset-0 bg-black/50" onClick={()=>setEditPrj(null)}/>
          <div className="relative bg-white rounded-2xl p-5 mx-4 w-full max-w-xs">
            <p className="text-sm font-black text-stone-800 mb-3">✏️ Rename Project</p>
            <input value={editPrjVal} onChange={e=>setEditPrjVal(e.target.value)} className="w-full px-3 py-2.5 border border-stone-200 rounded-xl text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-emerald-300" autoFocus/>
            <div className="flex gap-2">
              <button onClick={()=>{const v=editPrjVal.trim();if(v&&v!==editPrj)persistPrjs(projects.map(x=>x===editPrj?v:x));setEditPrj(null)}} className="flex-1 py-2.5 bg-emerald-600 text-white rounded-xl text-sm font-bold">Save</button>
              <button onClick={()=>setEditPrj(null)} className="px-4 py-2.5 bg-stone-100 text-stone-600 rounded-xl text-sm">Cancel</button>
            </div>
          </div>
        </div>

            {task.dueDate&&<span className={'text-[10px] px-1.5 py-0.5 rounded-full font-semibold border '+(over&&!done?'bg-red-50 text-red-500 border-red-200':'bg-emerald-50 text-emerald-700 border-emerald-100')}>📅 {fmtDate(task.dueDate)}</span>}

          {focusTasks.map(t=>{
            const otherLbls=(t.labels||[]).filter(l=>focus!==('l:'+l));
            const otherProj=t.project&&focus!==('p:'+t.project)?t.project:null;
            return(
              <div key={t.id} className="bg-white rounded-2xl border border-stone-100 p-3 mb-2.5 shadow-sm" onClick={()=>onEdit(t)}>
                <p className="text-sm text-stone-800 leading-snug">{t.text}</p>
                {t.dueDate&&<p className="text-[10px] text-emerald-600 mt-1">📅 {fmtDate(t.dueDate)}</p>}
                {(otherLbls.length>0||otherProj)&&(
                  <div className="flex gap-1.5 mt-2 flex-wrap items-center">
                    <span className="text-[10px] text-stone-400">🔗</span>
                    {otherProj&&<button onClick={ev=>{ev.stopPropagation();setFocus('p:'+otherProj)}} className="text-[10px] bg-indigo-50 text-indigo-600 border border-indigo-200 px-2 py-0.5 rounded-full font-semibold">📁 {otherProj}</button>}
                    {otherLbls.map(l=><button key={l} onClick={ev=>{ev.stopPropagation();setFocus('l:'+l)}} className="text-[10px] bg-amber-50 text-amber-600 border border-amber-200 px-2 py-0.5 rounded-full font-semibold"># {l}</button>)}
                  </div>
                )}
                <p className="text-[9px] text-stone-300 mt-1.5">Added {fmtCreated(t.createdAt)}</p>
              </div>
            );
          })}
        </React.Fragment>
      )}

      {/* All clusters overview */}
      {!focus&&(
        <React.Fragment>
          {(usedPrjs.length===0&&usedLbls.length===0)&&<Empty i="🕸️" t="No labeled thoughts yet" s="Type #label or assign project in the Dump to see connections"/>}
          {usedPrjs.map(p=>{
            const pt=active.filter(t=>t.project===p);
            const crossLinked=pt.filter(t=>(t.labels||[]).length>0);
            return(
              <div key={p} className="bg-white rounded-2xl border border-indigo-100 p-3 mb-3 shadow-sm" onClick={()=>setFocus('p:'+p)}>
                <div className="flex items-center justify-between mb-2">
                  <span className="text-sm font-black text-indigo-700">📁 {p}</span>
                  <span className="text-xs text-stone-400">{pt.length} tasks · {crossLinked.length} cross-labeled</span>
                </div>
                <div className="flex flex-wrap gap-1">
                  {pt.slice(0,4).map(t=><span key={t.id} className="text-[10px] bg-indigo-50 border border-indigo-100 rounded-lg px-2 py-1 text-indigo-700 truncate" style={{maxWidth:140}}>{t.text}</span>)}
                  {pt.length>4&&<span className="text-[10px] text-stone-400 px-2 py-1">+{pt.length-4}</span>}
                </div>
                {crossLinked.length>0&&<p className="text-[10px] text-stone-400 mt-1.5">🔗 Also tagged: {[...new Set(crossLinked.flatMap(t=>t.labels||[]))].slice(0,4).map(l=>'#'+l).join(' ')}</p>}
              </div>
            );
          })}
          {usedLbls.map(l=>{
            const lt=active.filter(t=>(t.labels||[]).includes(l));
            const crossLinked=lt.filter(t=>(t.labels||[]).length>1||t.project);
            return(
              <div key={l} className="bg-white rounded-2xl border border-stone-100 p-3 mb-3 shadow-sm" onClick={()=>setFocus('l:'+l)}>
                <div className="flex items-center justify-between mb-2">
                  <span className="text-sm font-black text-stone-700"># {l}</span>
                  <span className="text-xs text-stone-400">{lt.length} thoughts · {crossLinked.length} connected</span>
                </div>
                <div className="flex flex-wrap gap-1">
                  {lt.slice(0,5).map(t=><span key={t.id} className={'text-[10px] rounded-lg px-2 py-1 border truncate '+lblColor(l,usedLbls)} style={{maxWidth:130}}>{t.text}</span>)}
                  {lt.length>5&&<span className="text-[10px] text-stone-400 px-2 py-1">+{lt.length-5}</span>}
                </div>
                {crossLinked.length>0&&<p className="text-[10px] text-stone-400 mt-1.5">🔗 Shared with: {[...new Set(crossLinked.flatMap(t=>[...(t.labels||[]).filter(x=>x!==l),t.project?('📁 '+t.project):null].filter(Boolean)))].slice(0,4).join(' ')}</p>}
              </div>
            );
          })}
        </React.Fragment>
      )}
    </div>
  );
}

/* ── Done View ──────────────────────────────────────── */
function DoneView({done,arch,goals,sub,setSub,onUndo,onRestore,onDel,onEdit,labels}){
  return(
    <div className="pt-5 pb-4">
      <div className="px-4 mb-4 flex gap-4 border-b border-stone-100 pb-3 overflow-x-auto" style={{scrollbarWidth:'none'}}>
        {[['completed','✅ Done',done.length],['goals','🌟 Goals',goals.length],['archived','📦 Archive',arch.length]].map(([k,l,n])=>(
          <button key={k} onClick={()=>setSub(k)} className={'text-sm font-black pb-1 border-b-2 -mb-[13px] flex-shrink-0 '+(sub===k?'border-emerald-500 text-emerald-700':'border-transparent text-stone-400')}>
            {l} <span className="font-normal text-xs opacity-60">({n})</span>
          </button>
        ))}
      </div>
      {sub==='completed'&&<React.Fragment>
        {!done.length&&<Empty i="🏆" t="Nothing completed yet" s="Finish tasks and they appear here"/>}
        {done.map(t=>(
          <div key={t.id} className="bg-white rounded-2xl border border-stone-100 mx-4 mb-2.5 px-4 py-3 flex gap-3 items-center shadow-sm">
            <button onClick={()=>onUndo(t.id)} className="w-5 h-5 rounded-full bg-emerald-500 border-2 border-emerald-500 flex-shrink-0 flex items-center justify-center"><span style={{color:'white',fontWeight:900,fontSize:9}}>✓</span></button>
            <div className="flex-1 min-w-0"><p className="text-sm line-through text-stone-400 truncate">{t.text}</p><p className="text-[10px] text-stone-400">{t.completedAt?new Date(t.completedAt).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):''}</p></div>
            <button onClick={()=>onDel(t.id)} className="text-stone-200 text-xl active:text-red-400">×</button>
          </div>
        ))}
      </React.Fragment>}
      {sub==='goals'&&(
        <div className="pb-4">
          {!goals.length&&<Empty i="🌟" t="No goals yet" s="In task edit, set a Goal Timeline"/>}
          {GOAL_TIERS.map(tier=>{const tg=goals.filter(g=>g.goalType===tier.k);return tg.length?(
            <div key={tier.k}><div className="px-4 pt-3 pb-1.5"><p className="text-sm font-black text-stone-700">{tier.l}</p><p className="text-xs text-stone-400">{tier.s}</p></div>{tg.map(g=><Card key={g.id} task={g} labels={labels} onComplete={()=>{}} onEdit={onEdit} onToggleSub={()=>{}}/>)}</div>
          ):null})}
        </div>
      )}
      {sub==='archived'&&<React.Fragment>
        {!arch.length&&<Empty i="📦" t="Archive empty" s="Archived tasks appear here"/>}
        {arch.map(t=>(
          <div key={t.id} className="bg-white rounded-2xl border border-stone-100 mx-4 mb-2.5 px-4 py-3 flex gap-2.5 items-center shadow-sm opacity-70">
            <span style={{fontSize:20}}>📦</span>
            <div className="flex-1 min-w-0"><p className="text-sm text-stone-500 truncate">{t.text}</p>{t.autoArchived&&<p className="text-[10px] text-violet-400">Auto-archived wish</p>}</div>
            <button onClick={()=>onRestore(t.id)} className="text-emerald-400 text-lg active:text-emerald-600 mx-1">↩</button>
            <button onClick={()=>onDel(t.id)} className="text-stone-200 text-xl active:text-red-400">×</button>
          </div>
        ))}
      </React.Fragment>}
    </div>
  );
}

/* ── Settings View ──────────────────────────────────── */
function SettingsView({cid,setCid,connected,driveOk,onConnect,onDisconnect,onSync,syncing,labels,onAddLbl,onDelLbl,projects,onAddPrj,onDelPrj,onEditPrj,taskCount,tasks}){
  const [inp,setInp]=useState(cid);const [newLbl,setNewLbl]=useState('');const [newPrj,setNewPrj]=useState('');

    <div className="pt-5 pb-24 px-4">

      <div className="bg-white rounded-2xl border border-stone-100 shadow-sm p-4 mb-4">
        <div className="flex items-center gap-2.5 mb-3"><span style={{fontSize:22}}>☁️</span><div><p className="text-sm font-black text-stone-800">Google Sync</p><p className={'text-xs font-semibold '+(driveOk?'text-emerald-600':connected?'text-amber-500':'text-stone-400')}>{driveOk?'✓ Drive + Calendar active':connected?'⏳ Connecting…':'Not connected'}</p></div></div>
        {!connected&&<React.Fragment>
          <div className="bg-blue-50 border border-blue-100 rounded-xl p-3 mb-3 text-xs text-blue-700 space-y-1"><p className="font-bold text-blue-800">📋 One-time setup:</p><p><strong>1.</strong> console.cloud.google.com → New project</p><p><strong>2.</strong> Enable Google Calendar API</p><p><strong>3.</strong> Credentials → OAuth 2.0 Client ID (Web app)</p><p><strong>4.</strong> Add app URL as Authorized JS origin</p><p><strong>5.</strong> Paste Client ID below</p></div>
          <input value={inp} onChange={e=>setInp(e.target.value)} placeholder="xxxx.apps.googleusercontent.com" className="w-full px-3 py-2.5 text-xs border border-stone-200 rounded-xl focus:outline-none bg-stone-50 mb-2 text-stone-700"/>
          <button onClick={()=>setCid(inp.trim())} disabled={!inp.trim()||!isHttps} className="w-full py-2.5 bg-stone-100 text-stone-700 rounded-xl text-xs font-bold disabled:opacity-40 mb-2">Save Client ID</button>
          {cid&&isHttps&&<button onClick={onConnect} className="w-full py-3 bg-blue-600 text-white rounded-xl text-xs font-black active:bg-blue-700">🔐 Sign in with Google</button>}
        </React.Fragment>}
        {connected&&<React.Fragment>
          {driveOk&&<div className="bg-emerald-50 rounded-xl p-3 mb-2 text-xs text-emerald-700 space-y-0.5"><p className="font-bold">✅ Syncing:</p><p>• Tasks auto-save to Drive on every change</p><p>• Dated tasks → Calendar event · Completed → deleted</p><p>• Open on any device → loads latest from Drive</p></div>}
          <button onClick={onSync} disabled={syncing} className="w-full py-3 bg-emerald-600 text-white rounded-xl text-xs font-black active:bg-emerald-700 disabled:opacity-60 mb-2">{syncing?'⏳ Syncing…':'🔄 Force sync Calendar'}</button>
          <button onClick={onDisconnect} className="w-full py-2 bg-stone-50 text-stone-400 rounded-xl text-xs border border-stone-200 active:bg-stone-100">Disconnect</button>
        </React.Fragment>}
      </div>
      <div className="bg-white rounded-2xl border border-stone-100 shadow-sm p-4 mb-4">
        <p className="text-sm font-black text-stone-800 mb-3">📁 Projects <span className="font-normal text-stone-400 text-xs">({projects.length})</span></p>
        <div className="mb-3 space-y-2">
          {projects.map(p=>(
            <div key={p} className="flex items-center gap-2 bg-indigo-50 border border-indigo-100 rounded-xl px-3 py-2.5">
              <div className="flex-1 min-w-0"><p className="text-xs font-black text-indigo-700">📁 {p}</p><p className="text-[10px] text-indigo-400">{prjStats(p)} tasks</p></div>
              <button onClick={()=>onEditPrj(p)} className="text-xs text-indigo-500 font-semibold px-2 py-1 bg-indigo-100 rounded-lg active:bg-indigo-200 flex-shrink-0">Rename</button>
              <button onClick={()=>onDelPrj(p)} className="text-red-300 font-bold w-6 h-6 flex items-center justify-center rounded-lg active:text-red-500 flex-shrink-0" style={{fontSize:18}}>×</button>
            </div>
          ))}
          {projects.length===0&&<p className="text-xs text-stone-400 italic">No projects yet</p>}
        </div>
        <div className="flex gap-2">
          <input value={newPrj} onChange={e=>setNewPrj(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&newPrj.trim()){onAddPrj(newPrj.trim());setNewPrj('')}}} placeholder="New project name…" className="flex-1 px-3 py-2 text-xs border border-stone-200 rounded-xl focus:outline-none bg-stone-50 text-stone-700"/>
          <button onClick={()=>{if(newPrj.trim()){onAddPrj(newPrj.trim());setNewPrj('')}}} className="px-4 py-2 bg-indigo-50 text-indigo-700 rounded-xl text-xs font-black border border-indigo-200 active:bg-indigo-100">Add</button>
        </div>
      </div>
      <div className="bg-white rounded-2xl border border-stone-100 shadow-sm p-4 mb-4">
        <p className="text-sm font-black text-stone-800 mb-3">🏷️ Labels <span className="font-normal text-stone-400 text-xs">({labels.length})</span></p>
        <div className="flex flex-wrap gap-2 mb-3">{labels.map(l=><div key={l} className="flex items-center gap-1 bg-stone-50 border border-stone-200 rounded-full pl-3 pr-1.5 py-1"><span className="text-xs font-semibold text-stone-600"># {l}</span><button onClick={()=>onDelLbl(l)} className="text-stone-300 w-4 h-4 flex items-center justify-center rounded-full active:text-red-400" style={{fontSize:12}}>×</button></div>)}</div>
        <div className="flex gap-2">
          <input value={newLbl} onChange={e=>setNewLbl(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&newLbl.trim()){onAddLbl(newLbl.trim());setNewLbl('')}}} placeholder="New label…" className="flex-1 px-3 py-2 text-xs border border-stone-200 rounded-xl focus:outline-none bg-stone-50 text-stone-700"/>
          <button onClick={()=>{if(newLbl.trim()){onAddLbl(newLbl.trim());setNewLbl('')}}} className="px-4 py-2 bg-emerald-50 text-emerald-700 rounded-xl text-xs font-black border border-emerald-200 active:bg-emerald-100">Add</button>
        </div>
      </div>
      <div className="bg-white rounded-2xl border border-stone-100 shadow-sm p-4"><p className="text-sm font-black text-stone-800 mb-1">📊 Stats</p><p className="text-xs text-stone-500">{taskCount} total items · Drive + local storage</p></div>
    </div>
  );
}

/* ── Edit Modal ─────────────────────────────────────── */
function EditModal({task,labels,projects,allTasks,gcalOk,onSave,onClose,onDel,onArch,onAddLbl,onAddPrj}){
  const [t,setT]=useState({...task,subtasks:task.subtasks||[],goalType:task.goalType||null});
  const [newLbl,setNewLbl]=useState('');const [newSub,setNewSub]=useState('');
  const s=(k,v)=>setT(p=>({...p,[k]:v}));
  const qd=[{l:'Today',v:todayISO()},{l:'Tomorrow',v:addDays(1)},{l:'This Week',v:addDays(6)},{l:'Clear',v:null}];
  const addL=()=>{const l=newLbl.trim();if(!l||labels.includes(l))return;onAddLbl(l);s('labels',[...(t.labels||[]),l]);setNewLbl('')};
  const addSub=()=>{if(!newSub.trim())return;s('subtasks',[...(t.subtasks||[]),{id:uid(),text:newSub.trim(),done:false}]);setNewSub('')};
  const togSub=i=>s('subtasks',(t.subtasks||[]).map((x,j)=>j===i?{...x,done:!x.done}:x));
  const delSub=i=>s('subtasks',(t.subtasks||[]).filter((_,j)=>j!==i));
  const related=t.labels&&t.labels.length?allTasks.filter(r=>r.id!==t.id&&!['archived','completed'].includes(r.status)&&(r.labels||[]).some(l=>(t.labels||[]).includes(l))).slice(0,5):[];
  return(
    <div className="fixed inset-0 z-50 flex flex-col justify-end">
      <div className="absolute inset-0 bg-black/50" onClick={onClose}/>
      <div className="relative bg-white rounded-t-3xl overflow-y-auto" style={{maxHeight:'92vh'}}>
        <div className="flex justify-center pt-3 pb-1"><div className="w-10 h-1.5 bg-stone-200 rounded-full"/></div>
        <div className="px-5 pb-14">
          <textarea value={t.text} onChange={e=>s('text',e.target.value)} className="w-full mt-3 p-4 text-sm text-stone-800 bg-stone-50 rounded-2xl border border-stone-200 resize-none focus:outline-none focus:ring-2 focus:ring-emerald-300 leading-relaxed" style={{minHeight:64}}/>
          <Sec l="Type"><Row>{[['task','✅ Task'],['wish','✨ Wish']].map(([k,lb])=><Ch key={k} on={t.type===k} click={()=>s('type',k)}>{lb}</Ch>)}</Row></Sec>
          <Sec l="Project (moves task out of inbox)">
            <Row wrap><Ch on={!t.project} click={()=>s('project',null)}>None</Ch>{projects.map(p=><Ch key={p} on={t.project===p} click={()=>s('project',t.project===p?null:p)}>📁 {p}</Ch>)}</Row>
          </Sec>
          <Sec l="Due Date">
            <Row wrap>{qd.map(({l,v})=><Ch key={l} on={t.dueDate===v&&v!==null} click={()=>s('dueDate',v)}>{l}</Ch>)}</Row>
            <input type="date" value={t.dueDate||''} onChange={e=>s('dueDate',e.target.value||null)} className="mt-2.5 w-full px-4 py-2.5 text-sm border border-stone-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-300 bg-white text-stone-700"/>
          </Sec>
          <Sec l="Recurrence">
            <Row wrap><Ch on={!t.recurring} click={()=>s('recurring',null)}>None</Ch>{['daily','weekly','monthly','yearly'].map(r=><Ch key={r} on={t.recurring===r} click={()=>s('recurring',t.recurring===r?null:r)}>{RECUR[r]}</Ch>)}</Row>
          </Sec>
          <Sec l="Priority"><Row>{['P1','P2','P3','P4'].map(p=><button key={p} onClick={()=>s('priority',t.priority===p?null:p)} className={'px-3 py-2 rounded-xl text-xs font-black border flex items-center gap-1 '+(t.priority===p?PS[p]:'border-stone-200 text-stone-400 bg-white')}>{PF[p]} {p}</button>)}</Row></Sec>
          <Sec l="Eisenhower"><div className="grid grid-cols-2 gap-2">{EIS.map(q=><button key={q.k} onClick={()=>s('eisenhower',t.eisenhower===q.k?null:q.k)} className={'px-3 py-2.5 rounded-xl text-left border-2 '+(t.eisenhower===q.k?q.b:'border-stone-100 bg-white')}><p className="text-xs font-black">{q.s}</p><p className="text-[10px] opacity-50">{q.l}</p></button>)}</div></Sec>
          <Sec l="Goal Timeline"><Row wrap><Ch on={!t.goalType} click={()=>s('goalType',null)}>Not a Goal</Ch>{GOAL_TIERS.map(g=><Ch key={g.k} on={t.goalType===g.k} click={()=>s('goalType',t.goalType===g.k?null:g.k)}>{g.l}</Ch>)}</Row></Sec>
          <Sec l="Labels">
            <Row wrap>{labels.map(l=><Ch key={l} on={(t.labels||[]).includes(l)} click={()=>{const c=t.labels||[];s('labels',c.includes(l)?c.filter(x=>x!==l):[...c,l])}}># {l}</Ch>)}</Row>
            <div className="flex gap-2 mt-2.5"><input value={newLbl} onChange={e=>setNewLbl(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addL()} placeholder="New label…" className="flex-1 px-3 py-2 text-xs border border-stone-200 rounded-xl focus:outline-none bg-white text-stone-700"/><button onClick={addL} className="px-4 py-2 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-xl text-xs font-black active:bg-emerald-100">Add</button></div>
          </Sec>
          <Sec l={'Sub-tasks ('+(t.subtasks||[]).length+')'}>
            {(t.subtasks||[]).map((st,i)=>(
              <div key={st.id} className="flex items-center gap-2 py-1.5 border-b border-stone-100">
                <button onClick={()=>togSub(i)} className={'w-4 h-4 rounded border flex-shrink-0 flex items-center justify-center '+(st.done?'bg-emerald-500 border-emerald-500':'border-stone-300')}>{st.done&&<span style={{color:'white',fontSize:8,fontWeight:900}}>✓</span>}</button>
                <span className={'flex-1 text-xs '+(st.done?'line-through text-stone-400':'text-stone-700')}>{st.text}</span>
                <button onClick={()=>delSub(i)} className="text-stone-300 text-sm active:text-red-400">×</button>
              </div>
            ))}
            <div className="flex gap-2 mt-2"><input value={newSub} onChange={e=>setNewSub(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addSub()} placeholder="Add sub-task…" className="flex-1 px-3 py-2 text-xs border border-stone-200 rounded-xl focus:outline-none bg-stone-50 text-stone-700"/><button onClick={addSub} className="px-3 py-2 bg-stone-100 text-stone-600 rounded-xl text-xs font-bold active:bg-stone-200">Add</button></div>
          </Sec>
          {related.length>0&&<Sec l={'🔗 Connected thoughts ('+related.length+')'}>{related.map(r=><div key={r.id} className="py-1.5 border-b border-stone-100 flex gap-2"><span className="flex-1 text-[11px] text-stone-600">{r.text}</span><span className="text-[10px] text-stone-300 flex-shrink-0">{fmtDate(r.dueDate)||'Inbox'}</span></div>)}</Sec>}
          {gcalOk&&t.dueDate&&<p className="text-xs text-center mt-3 text-emerald-600">{t.calendarEventId?'📆 In Calendar — updating on save':'📆 Will sync to Calendar on save'}</p>}
          <div className="flex gap-2 mt-5">
            <button onClick={()=>onSave(t)} className="flex-1 py-4 bg-emerald-600 text-white rounded-2xl font-black text-sm shadow-md active:bg-emerald-700">Save</button>
            <button onClick={onArch} className="px-4 py-4 bg-stone-100 text-stone-600 rounded-2xl text-lg active:bg-stone-200">📦</button>
            <button onClick={onDel}  className="px-4 py-4 bg-red-50 text-red-500 rounded-2xl text-lg active:bg-red-100">🗑️</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── Helpers ────────────────────────────────────────── */
function LblPicker({labels,onConfirm,onClose}){const [sel,setSel]=useState([]);const tog=l=>setSel(s=>s.includes(l)?s.filter(x=>x!==l):[...s,l]);return<React.Fragment><div className="flex flex-wrap gap-2 mb-4">{labels.map(l=><Ch key={l} on={sel.includes(l)} click={()=>tog(l)}># {l}</Ch>)}</div><div className="flex gap-2"><button onClick={()=>onConfirm(sel)} disabled={!sel.length} className="flex-1 py-3 bg-emerald-600 text-white rounded-xl font-bold text-sm disabled:opacity-40">Apply {sel.length} label{sel.length!==1?'s':''}</button><button onClick={onClose} className="px-4 py-3 bg-stone-100 text-stone-600 rounded-xl text-sm">Cancel</button></div></React.Fragment>}
function Empty({i,t,s}){return<div className="text-center py-14 px-8"><div style={{fontSize:44}} className="mb-3">{i}</div><p className="text-sm text-stone-500 font-bold">{t}</p>{s&&<p className="text-xs text-stone-400 mt-1">{s}</p>}</div>}
function Sec({l,children}){return<div className="mt-5"><p className="text-[11px] font-black text-stone-400 uppercase tracking-widest mb-2">{l}</p>{children}</div>}
function Row({children,wrap}){return<div className={'flex gap-2'+(wrap?' flex-wrap':'')}>{children}</div>}
function Ch({on,click,children}){return<button onClick={click} className={'px-3 py-2 rounded-xl text-xs font-bold border flex-shrink-0 '+(on?'bg-emerald-600 text-white border-emerald-600':'bg-white text-stone-600 border-stone-200')}>{children}</button>}
function Fchip({on,click,children}){return<button onClick={click} className={'px-3 py-1 rounded-full text-xs font-bold flex-shrink-0 border '+(on?'bg-emerald-600 text-white border-emerald-600':'bg-stone-50 text-stone-500 border-stone-200')}>{children}</button>}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
