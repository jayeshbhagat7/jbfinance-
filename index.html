          </div>
        )}

        {/* 6-month trend chart */}
        <div style={{margin:'6px 10px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,overflow:'hidden'}}>
          <div style={{padding:'8px 12px',borderBottom:'1px solid var(--border)',background:'var(--bg3)'}}>
            <span style={{fontFamily:'var(--mono)',fontSize:9,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em'}}>6-Month Trend</span>
          </div>
          <div style={{padding:'12px 10px 8px'}}>
            {/* Legend */}
            <div style={{display:'flex',gap:12,marginBottom:10,paddingLeft:4}}>
              <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:10,height:4,borderRadius:2,background:'var(--green)'}}/><span style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)'}}>Income</span></div>
              <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:10,height:4,borderRadius:2,background:'var(--red)'}}/><span style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)'}}>Expense</span></div>
            </div>
            {/* Bars */}
            <div style={{display:'flex',gap:4,alignItems:'flex-end',height:80}}>
              {trend.map((m,i)=>(
                <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
                  <div style={{display:'flex',gap:1,alignItems:'flex-end',height:64,width:'100%'}}>
                    <div style={{flex:1,borderRadius:'2px 2px 0 0',background:'var(--green)',opacity:m.isSelected?1:0.5,height:(trendMax>0?m.inc/trendMax*64:0)+'px',minHeight:m.inc>0?2:0,transition:'height 0.3s ease'}}/>
                    <div style={{flex:1,borderRadius:'2px 2px 0 0',background:'var(--red)',opacity:m.isSelected?1:0.5,height:(trendMax>0?m.exp/trendMax*64:0)+'px',minHeight:m.exp>0?2:0,transition:'height 0.3s ease'}}/>
                  </div>
                  <span style={{fontFamily:'var(--mono)',fontSize:7,color:m.isSelected?'var(--text)':'var(--text3)',fontWeight:m.isSelected?700:400}}>{m.label}</span>
                  {/* Savings rate dot */}
                  {m.inc>0&&<div style={{width:4,height:4,borderRadius:'50%',background:m.inc>m.exp?'var(--green)':'var(--red)',opacity:0.8}}/>}
                </div>
              ))}
            </div>
            <div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)',marginTop:6,textAlign:'center'}}>● green = saved, ● red = deficit</div>
          </div>
        </div>

        {/* Running balance */}
        <div style={{margin:'6px 10px 12px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px'}}>
          <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:8}}>Account Snapshot</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {[
              {label:'Liquid Balance',v:liquid,col:'var(--blue)'},
              {label:'Net this month',v:netCashflow,col:netCol},
            ].map(({label,v,col})=>(
              <div key={label} style={{background:'var(--bg3)',borderRadius:6,padding:'8px 10px'}}>
                <div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)',textTransform:'uppercase',marginBottom:3}}>{label}</div>
                <div style={{fontFamily:'var(--mono)',fontSize:14,fontWeight:700,color:col}}>{v>=0?'':'-'}{fmtAmt(Math.abs(v))}</div>
              </div>
            ))}
          </div>
        </div>

      </>)}

      {activeSection==='ynab'&&(<>

        {/* Envelope budget header */}
        <div style={{margin:'6px 10px',background:toAssign>=0?'var(--green-bg)':'var(--red-bg)',border:'1.5px solid '+(toAssign>=0?'var(--green)':'var(--red)'),borderRadius:10,padding:'12px 14px'}}>
          <div style={{fontFamily:'var(--mono)',fontSize:8,color:toAssign>=0?'var(--green)':'var(--red)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:3}}>
            {toAssign>=0?'💰 Ready to Assign':'⚠ Over-Assigned'}
          </div>
          <div style={{fontFamily:'var(--mono)',fontSize:26,fontWeight:800,color:toAssign>=0?'var(--green)':'var(--red)',letterSpacing:'-1px'}}>{toAssign>=0?'':'-'}{fmtAmt(Math.abs(toAssign))}</div>
          <div style={{display:'flex',gap:16,marginTop:8,paddingTop:8,borderTop:'1px solid '+(toAssign>=0?'var(--green)':'var(--red)'),opacity:0.8}}>
            <div><div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)',marginBottom:2}}>INCOME</div><div style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:'var(--green)'}}>{fmtAmt(income)}</div></div>
            <div><div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)',marginBottom:2}}>ASSIGNED</div><div style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:'var(--text)'}}>{fmtAmt(totalAssigned)}</div></div>
            <div><div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)',marginBottom:2}}>SPENT</div><div style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:'var(--red)'}}>{fmtAmt(totalSpent)}</div></div>
          </div>
          {income===0&&<div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--amber)',marginTop:6}}>⚠ No income for {MONTHS[selMonth]} — budgets set against ₹0</div>}
        </div>

        {/* Envelopes / Editor toggle */}
        <div style={{display:'flex',margin:'4px 10px',background:'var(--bg2)',borderRadius:6,padding:2,gap:2}}>
          {[['envelopes','Envelopes'],['editor','Edit Limits']].map(([id,label])=>(
            <button key={id} onClick={()=>setYnabView(id)} style={{flex:1,background:ynabView===id?'var(--bg3)':'transparent',border:ynabView===id?'1px solid var(--border2)':'1px solid transparent',borderRadius:5,color:ynabView===id?'var(--text)':'var(--text3)',fontFamily:'var(--mono)',fontSize:10,fontWeight:ynabView===id?700:400,padding:'6px 4px',cursor:'pointer'}}>{label}</button>
          ))}
        </div>

        {ynabView==='envelopes'&&(
          <div style={{margin:'4px 10px 12px'}}>
            {budgetCats.map((cat,i)=>{
              const limit=draftBudgets[cat]||0;
              const spent=catSpend[cat]||0;
              const remaining=limit-spent;
              const over=limit>0&&spent>limit;
              const pct=limit>0?Math.min(100,Math.round(spent/limit*100)):0;
              const hasLimit=limit>0;
              return(
              <div key={cat} style={{background:'var(--bg2)',border:'1px solid '+(over?'var(--red)':'var(--border)'),borderRadius:8,padding:'10px 12px',marginBottom:6}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
                  <span style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--text)',fontWeight:600}}>{cat}</span>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:700,color:over?'var(--red)':hasLimit?'var(--text)':'var(--text3)'}}>{fmtAmt(spent)}{hasLimit?' / '+fmtAmt(limit):''}</div>
                    {hasLimit&&<div style={{fontFamily:'var(--mono)',fontSize:8,color:over?'var(--red)':remaining===0?'var(--text3)':'var(--green)',marginTop:1}}>{over?'Over by '+fmtAmt(Math.abs(remaining)):remaining===0?'Fully used':'Left: '+fmtAmt(remaining)}</div>}
                    {!hasLimit&&spent>0&&<div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--amber)',marginTop:1}}>No limit set</div>}
                  </div>
                </div>
                {hasLimit&&(
                  <div style={{background:'var(--bg3)',borderRadius:3,height:5}}>
                    <div style={{height:5,borderRadius:3,width:pct+'%',background:over?'var(--red)':pct>80?'var(--amber)':'var(--green)',transition:'width 0.4s ease'}}/>
                  </div>
                )}
                {!hasLimit&&spent>0&&(
                  <div style={{background:'var(--bg3)',borderRadius:3,height:3}}>
                    <div style={{height:3,borderRadius:3,width:'100%',background:'var(--amber)',opacity:0.4}}/>
                  </div>
                )}
              </div>
            );})}
            {/* Unbudgeted categories */}
            {Object.entries(catSpend).filter(([c])=>!budgetCats.includes(c)).map(([cat,spent])=>(
              <div key={cat} style={{background:'var(--bg2)',border:'1px dashed var(--border)',borderRadius:8,padding:'8px 12px',marginBottom:5,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>{cat}</span>
                <div style={{textAlign:'right'}}>
                  <div style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:'var(--red)'}}>{fmtAmt(spent)}</div>
                  <div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)'}}>unbudgeted</div>
                </div>
              </div>
            ))}
          </div>
        )}

        {ynabView==='editor'&&(
          <div style={{margin:'4px 10px 12px'}}>
            <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',padding:'4px 2px 8px',letterSpacing:'0.04em'}}>Set monthly limit for each category. Leave blank for no limit.</div>
            {budgetCats.map(cat=>(
              <div key={cat} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                <div style={{flex:1,fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)'}}>{cat}</div>
                <div style={{display:'flex',alignItems:'center',gap:4}}>
                  <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>₹</span>
                  <input
                    type="number"
                    value={draftBudgets[cat]||''}
                    placeholder="no limit"
                    onChange={e=>setDraftBudgets(p=>({...p,[cat]:parseFloat(e.target.value)||0}))}
                    style={{width:90,background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,padding:'5px 8px',textAlign:'right',outline:'none'}}
                  />
                </div>
                <button onClick={()=>setDraftBudgets(p=>{const n={...p};delete n[cat];return n;})} style={{background:'none',border:'none',color:'var(--text3)',fontSize:14,cursor:'pointer',padding:'2px 4px'}}>✕</button>
              </div>
            ))}
            {/* Add new category */}
            <div style={{display:'flex',gap:6,marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)'}}>
              <input
                value={newCat}
                onChange={e=>setNewCat(e.target.value)}
                placeholder="New category..."
                onKeyDown={e=>{if(e.key==='Enter'&&newCat.trim()){setDraftBudgets(p=>({...p,[newCat.trim()]:0}));setNewCat('');} }}
                style={{flex:1,background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,color:'var(--text)',fontFamily:'var(--mono)',fontSize:11,padding:'7px 10px',outline:'none'}}
              />
              <button onClick={()=>{if(newCat.trim()){setDraftBudgets(p=>({...p,[newCat.trim()]:0}));setNewCat('');}}} style={{background:'var(--blue)',border:'none',borderRadius:6,color:'#fff',fontFamily:'var(--mono)',fontSize:11,fontWeight:600,padding:'0 14px',cursor:'pointer'}}>+ Add</button>
            </div>
            {/* Save */}
            <button onClick={handleSaveBudgets} disabled={savingBudgets} style={{width:'100%',marginTop:10,background:savingBudgets?'var(--bg3)':'var(--green)',border:'none',borderRadius:8,color:savingBudgets?'var(--text3)':'#000',fontFamily:'var(--mono)',fontSize:12,fontWeight:700,padding:'12px',cursor:'pointer'}}>
              {savingBudgets?'Saving...':'💾 Save Budget Limits'}
            </button>
          </div>
        )}

      </>)}
    </div>
  );
}

/* ── PinSettingsPanel — embedded in Settings accordion ── */
function PinSettingsPanel(){
  const hasPin=!!localStorage.getItem('jbf_pin_hash');
  const [mode,setMode]=useState('idle'); // idle | change | remove
  const [step,setStep]=useState(1);
  const [digits,setDigits]=useState([]);
  const [firstPin,setFirstPin]=useState([]);
  const [msg,setMsg]=useState('');
  const [shake,setShake]=useState(false);
  const MAX=4;

  const hashPin=async pin=>{
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pin));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  };

  const addDigit=async d=>{
    const next=[...digits,d];
    setDigits(next);
    if(next.length<MAX) return;
    const pin=next.join('');
    if(mode==='change'){
      if(step===1){
        // verify current
        const h=await hashPin(pin);
        if(h!==localStorage.getItem('jbf_pin_hash')){
          setMsg('❌ Wrong current PIN');setShake(true);setTimeout(()=>setShake(false),500);setDigits([]);
        } else { setStep(2);setDigits([]);setMsg('Enter new PIN'); }
      } else if(step===2){
        setFirstPin(next);setStep(3);setDigits([]);setMsg('Confirm new PIN');
      } else {
        if(pin===firstPin.join('')){
          const h=await hashPin(pin);localStorage.setItem('jbf_pin_hash',h);
          setMsg('✓ PIN updated');setMode('idle');setStep(1);setDigits([]);setFirstPin([]);
        } else {
          setMsg('❌ No match — retry');setShake(true);setTimeout(()=>setShake(false),500);
          setStep(2);setDigits([]);setFirstPin([]);
        }
      }
    } else if(mode==='remove'){
      const h=await hashPin(pin);
      if(h===localStorage.getItem('jbf_pin_hash')){
        localStorage.removeItem('jbf_pin_hash');
        setMsg('✓ PIN removed');setMode('idle');setDigits([]);
      } else {
        setMsg('❌ Wrong PIN');setShake(true);setTimeout(()=>setShake(false),500);setDigits([]);
      }
    }
  };
  const del=()=>setDigits(p=>p.slice(0,-1));
  const KEYS=[1,2,3,4,5,6,7,8,9,null,0,'⌫'];

  const stepLabel={
    change:{1:'Enter current PIN',2:'Enter new PIN',3:'Confirm new PIN'},
    remove:{1:'Enter current PIN to remove'},
  };

  if(mode==='idle') return(
    <div style={{padding:'12px 16px',display:'flex',flexDirection:'column',gap:10}}>
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'var(--bg3)',borderRadius:8,border:'1px solid var(--border)'}}>
        <span style={{fontSize:20}}>{hasPin?'🔒':'🔓'}</span>
        <div>
          <div style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:'var(--text)'}}>{hasPin?'PIN Lock is ON':'PIN Lock is OFF'}</div>
          <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginTop:2}}>{hasPin?'App requires PIN on every open':'No PIN required to open app'}</div>
        </div>
      </div>
      {hasPin&&<button onClick={()=>{setMode('change');setStep(1);setDigits([]);setMsg('Enter current PIN');}}
        style={{background:'var(--blue)',border:'none',borderRadius:8,color:'#fff',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:'10px',cursor:'pointer'}}>🔄 Change PIN</button>}
      {hasPin&&<button onClick={()=>{setMode('remove');setStep(1);setDigits([]);setMsg('Enter PIN to confirm removal');}}
        style={{background:'var(--bg3)',border:'1px solid var(--red)',borderRadius:8,color:'var(--red)',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:'10px',cursor:'pointer'}}>🗑 Remove PIN</button>}
      {!hasPin&&<div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',textAlign:'center',padding:'6px 0'}}>PIN will be set on next app open.</div>}
    </div>
  );

  return(
    <div style={{padding:'16px',display:'flex',flexDirection:'column',alignItems:'center',gap:16}}>
      <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',letterSpacing:'0.06em'}}>{stepLabel[mode]?.[step]||''}</div>
      <div style={{display:'flex',gap:14,animation:shake?'pinShake 0.4s':'none'}}>
        {Array.from({length:MAX}).map((_,i)=>(
          <div key={i} style={{width:12,height:12,borderRadius:'50%',background:i<digits.length?'var(--green)':'transparent',border:'2px solid',borderColor:i<digits.length?'var(--green)':'var(--border2)',transition:'all 0.15s'}}/>
        ))}
      </div>
      {msg&&<div style={{fontFamily:'var(--mono)',fontSize:11,color:msg.startsWith('✓')?'var(--green)':'var(--amber)'}}>{msg}</div>}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,60px)',gap:10}}>
        {KEYS.map((k,i)=>(
          k===null?<div key={i}/>:
          <button key={i} onClick={()=>k==='⌫'?del():digits.length<MAX&&addDigit(k)}
            style={{width:60,height:60,borderRadius:'50%',background:k==='⌫'?'var(--bg2)':'var(--bg3)',border:'1px solid var(--border)',color:'var(--text)',fontFamily:'var(--mono)',fontSize:k==='⌫'?18:20,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
            {k}
          </button>
        ))}
      </div>
      <button onClick={()=>{setMode('idle');setDigits([]);setMsg('');setStep(1);}}
        style={{background:'none',border:'none',color:'var(--text3)',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer',textDecoration:'underline'}}>Cancel</button>
      <style>{`@keyframes pinShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}`}</style>
    </div>
  );
}

/* ── DataBackupPanel — Export to Excel with Google Drive integration & Restore ── */
function DataBackupPanel(){
  const [loading,setLoading]=useState(false);
  const [status,setStatus]=useState('');
  const [showDriveAuth,setShowDriveAuth]=useState(false);
  const [restoreMode,setRestoreMode]=useState(false);
  const [restoring,setRestoring]=useState(false);
  
  const exportToExcel=async()=>{
    setLoading(true);
    setStatus('📦 Preparing data...');
    
    try {
      // Fetch all data from database using db instead of supabase
      const {data:txns}=await db.from('transactions').select('*').order('created_at',{ascending:false});
      const {data:invs}=await db.from('investments').select('*').order('created_at',{ascending:false});
      const {data:provs}=await db.from('provisions').select('*').order('created_at',{ascending:false});
      const {data:sites}=await db.from('site_transactions').select('*').order('created_at',{ascending:false});
      const {data:settingsRows}=await db.from('settings').select('*');
      
      // Parse settings
      const settings={};
      (settingsRows||[]).forEach(s=>settings[s.key]=s.value);
      const opening=settings.opening_balances?JSON.parse(settings.opening_balances):{};
      const accounts=settings.custom_accounts?JSON.parse(settings.custom_accounts):[];
      const cats=settings.custom_categories?JSON.parse(settings.custom_categories):[];
      const budgets=settings.budgets?JSON.parse(settings.budgets):{};
      
      setStatus('📝 Creating Excel file...');
      
      // Create workbook with SheetJS
      const wb=XLSX.utils.book_new();
      
      // Transactions sheet
      if(txns&&txns.length>0){
        const txData=txns.map(t=>({
          Date:t.created_at,
          Type:t.type,
          From:t.from_account||'',
          To:t.to_account||'',
          Amount:t.amount,
          Category:t.category||'',
          Particulars:t.particulars||'',
          Bill:t.bill_no||'',
          Tower:t.tower||'',
          Domain:t.domain||'',
          Status:t.status||'complete',
          Archived:t.archived?'Yes':'No'
        }));
        const ws=XLSX.utils.json_to_sheet(txData);
        XLSX.utils.book_append_sheet(wb,ws,'Transactions');
      }
      
      // Investments sheet
      if(invs&&invs.length>0){
        const invData=invs.map(i=>({
          Date:i.invested_at,
          Type:i.type,
          Account:i.account_name,
          Amount:i.amount,
          Units:i.units||'',
          NAV:i.nav||'',
          CurrentValue:i.current_value||'',
          Archived:i.archived?'Yes':'No'
        }));
        const ws=XLSX.utils.json_to_sheet(invData);
        XLSX.utils.book_append_sheet(wb,ws,'Investments');
      }
      
      // Provisions sheet
      if(provs&&provs.length>0){
        const provData=provs.map(p=>({
          Date:p.created_at,
          Type:p.type,
          Envelope:p.envelope_name,
          Amount:p.amount,
          Notes:p.notes||''
        }));
        const ws=XLSX.utils.json_to_sheet(provData);
        XLSX.utils.book_append_sheet(wb,ws,'Provisions');
      }
      
      // Site Transactions sheet
      if(sites&&sites.length>0){
        const siteData=sites.map(s=>({
          Date:s.created_at,
          Site:s.site_name,
          Type:s.type,
          Amount:s.amount,
          Category:s.category||'',
          Party:s.party_name||'',
          SiteUser:s.site_user||'',
          From:s.from_account||'',
          To:s.to_account||'',
          Description:s.description||''
        }));
        const ws=XLSX.utils.json_to_sheet(siteData);
        XLSX.utils.book_append_sheet(wb,ws,'Site Transactions');
      }
      
      // Opening Balances sheet
      const obData=Object.entries(opening).map(([acc,val])=>({
        Account:acc,
        Amount:typeof val==='object'?val.amount:val,
        OpeningDate:typeof val==='object'?val.opening_date||'':''
      }));
      if(obData.length>0){
        const ws=XLSX.utils.json_to_sheet(obData);
        XLSX.utils.book_append_sheet(wb,ws,'Opening Balances');
      }
      
      // Accounts sheet
      if(accounts&&accounts.length>0){
        const accData=accounts.map(a=>({
          Name:a.name,
          Type:a.type,
          Archived:a.archived?'Yes':'No'
        }));
        const ws=XLSX.utils.json_to_sheet(accData);
        XLSX.utils.book_append_sheet(wb,ws,'Accounts');
      }
      
      // Categories sheet
      if(cats&&cats.length>0){
        const catData=cats.map(c=>({
          Name:c.name,
          Emoji:c.emoji,
          ITSection:c.it||'',
          Archived:c.archived?'Yes':'No'
        }));
        const ws=XLSX.utils.json_to_sheet(catData);
        XLSX.utils.book_append_sheet(wb,ws,'Categories');
      }
      
      // Budgets sheet
      const bgData=Object.entries(budgets).map(([cat,limit])=>({
        Category:cat,
        Limit:limit
      }));
      if(bgData.length>0){
        const ws=XLSX.utils.json_to_sheet(bgData);
        XLSX.utils.book_append_sheet(wb,ws,'Budgets');
      }
      
      // Generate file
      const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
      const blob=new Blob([wbout],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
      const timestamp=new Date().toISOString().split('T')[0];
      const filename=`JB_Finance_Backup_${timestamp}.xlsx`;
      
      // Download locally
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;
      a.download=filename;
      a.click();
      URL.revokeObjectURL(url);
      
      setStatus('✅ Backup downloaded successfully!');
      setLoading(false);
      
      // Show Google Drive option
      setTimeout(()=>setShowDriveAuth(true),500);
      
    } catch(err){
      console.error(err);
      setStatus('❌ Backup failed: '+err.message);
      setLoading(false);
    }
  };
  
  const uploadToDrive=()=>{
    setStatus('🔐 Opening Google Drive...');
    window.open('https://drive.google.com/drive/my-drive','_blank');
    setStatus('💡 Upload the downloaded Excel file manually to Google Drive');
  };
  
  const handleFileSelect=async(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    
    setRestoring(true);
    setStatus('📖 Reading backup file...');
    
    try {
      const data=await file.arrayBuffer();
      const wb=XLSX.read(data);
      
      let imported=0;
      
      // Import transactions
      if(wb.SheetNames.includes('Transactions')){
        const sheet=wb.Sheets['Transactions'];
        const rows=XLSX.utils.sheet_to_json(sheet);
        setStatus(`📥 Importing ${rows.length} transactions...`);
        
        for(const row of rows){
          if(row.Status==='voided')continue; // Skip voided
          const txn={
            created_at:row.Date,
            type:row.Type,
            from_account:row.From||null,
            to_account:row.To||null,
            amount:parseFloat(row.Amount)||0,
            category:row.Category||null,
            particulars:row.Particulars||null,
            bill_no:row.Bill||null,
            tower:row.Tower||null,
            domain:row.Domain||null,
            status:row.Status||'complete',
            archived:row.Archived==='Yes'
          };
          await db.from('transactions').insert([txn]);
          imported++;
        }
      }
      
      // Import investments
      if(wb.SheetNames.includes('Investments')){
        const sheet=wb.Sheets['Investments'];
        const rows=XLSX.utils.sheet_to_json(sheet);
        setStatus(`📥 Importing ${rows.length} investments...`);
        
        for(const row of rows){
          const inv={
            invested_at:row.Date,
            type:row.Type,
            account_name:row.Account,
            amount:parseFloat(row.Amount)||0,
            units:parseFloat(row.Units)||null,
            nav:parseFloat(row.NAV)||null,
            current_value:parseFloat(row.CurrentValue)||null,
            archived:row.Archived==='Yes'
          };
          await db.from('investments').insert([inv]);
          imported++;
        }
      }
      
      // Import provisions
      if(wb.SheetNames.includes('Provisions')){
        const sheet=wb.Sheets['Provisions'];
        const rows=XLSX.utils.sheet_to_json(sheet);
        setStatus(`📥 Importing ${rows.length} provisions...`);
        
        for(const row of rows){
          const prov={
            created_at:row.Date,
            type:row.Type,
            envelope_name:row.Envelope,
            amount:parseFloat(row.Amount)||0,
            notes:row.Notes||null
          };
          await db.from('provisions').insert([prov]);
          imported++;
        }
      }
      
      // Import site transactions
      if(wb.SheetNames.includes('Site Transactions')){
        const sheet=wb.Sheets['Site Transactions'];
        const rows=XLSX.utils.sheet_to_json(sheet);
        setStatus(`📥 Importing ${rows.length} site transactions...`);
        
        for(const row of rows){
          const site={
            created_at:row.Date,
            site_name:row.Site,
            type:row.Type,
            amount:parseFloat(row.Amount)||0,
            category:row.Category||null,
            party_name:row.Party||null,
            site_user:row.SiteUser||null,
            from_account:row.From||null,
            to_account:row.To||null,
            description:row.Description||null
          };
          await db.from('site_transactions').insert([site]);
          imported++;
        }
      }
      
      // Import settings (opening balances, accounts, categories, budgets)
      if(wb.SheetNames.includes('Opening Balances')){
        const sheet=wb.Sheets['Opening Balances'];
        const rows=XLSX.utils.sheet_to_json(sheet);
        const ob={};
        rows.forEach(r=>{
          ob[r.Account]=r.OpeningDate?{amount:parseFloat(r.Amount)||0,opening_date:r.OpeningDate}:parseFloat(r.Amount)||0;
        });
        await db.from('settings').upsert({key:'opening_balances',value:JSON.stringify(ob)},{onConflict:'key'});
      }
      
      if(wb.SheetNames.includes('Accounts')){
        const sheet=wb.Sheets['Accounts'];
        const rows=XLSX.utils.sheet_to_json(sheet);
        const accounts=rows.map(r=>({name:r.Name,type:r.Type,archived:r.Archived==='Yes'}));
        await db.from('settings').upsert({key:'custom_accounts',value:JSON.stringify(accounts)},{onConflict:'key'});
      }
      
      if(wb.SheetNames.includes('Categories')){
        const sheet=wb.Sheets['Categories'];
        const rows=XLSX.utils.sheet_to_json(sheet);
        const cats=rows.map(r=>({name:r.Name,emoji:r.Emoji,it:r.ITSection||'',archived:r.Archived==='Yes'}));
        await db.from('settings').upsert({key:'custom_categories',value:JSON.stringify(cats)},{onConflict:'key'});
      }
      
      if(wb.SheetNames.includes('Budgets')){
        const sheet=wb.Sheets['Budgets'];
        const rows=XLSX.utils.sheet_to_json(sheet);
        const bg={};
        rows.forEach(r=>bg[r.Category]=parseFloat(r.Limit)||0);
        await db.from('settings').upsert({key:'budgets',value:JSON.stringify(bg)},{onConflict:'key'});
      }
      
      setStatus(`✅ Restore complete! Imported ${imported} records. Reload app.`);
      setRestoring(false);
      
      // Reload after 2 seconds
      setTimeout(()=>window.location.reload(),2000);
      
    } catch(err){
      console.error(err);
      setStatus('❌ Restore failed: '+err.message);
      setRestoring(false);
    }
  };
  
  return(
    <div style={{padding:'12px 16px',display:'flex',flexDirection:'column',gap:12}}>
      {!restoreMode&&(
        <>
          <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',lineHeight:1.6}}>
            Export all your financial data to Excel format. Includes transactions, investments, provisions, site data, accounts, categories, and budgets.
          </div>
          
          <button 
            onClick={exportToExcel} 
            disabled={loading}
            style={{
              background:loading?'var(--bg3)':'var(--green)',
              border:'none',
              borderRadius:8,
              color:loading?'var(--text3)':'#000',
              fontFamily:'var(--mono)',
              fontSize:13,
              fontWeight:700,
              padding:'14px',
              cursor:loading?'not-allowed':'pointer',
              transition:'all 0.2s'
            }}>
            {loading?status:'💾 Export to Excel'}
          </button>
          
          {status&&!loading&&(
            <div style={{
              fontFamily:'var(--mono)',
              fontSize:11,
              color:status.startsWith('✅')?'var(--green)':status.startsWith('❌')?'var(--red)':'var(--amber)',
              textAlign:'center',
              padding:'8px',
              background:'var(--bg3)',
              borderRadius:6
            }}>
              {status}
            </div>
          )}
          
          {showDriveAuth&&(
            <div style={{padding:'12px',background:'var(--bg3)',borderRadius:8,border:'1px solid var(--border)'}}>
              <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)',marginBottom:8}}>
                📁 Want to save to Google Drive?
              </div>
              <button 
                onClick={uploadToDrive}
                style={{
                  width:'100%',
                  background:'var(--blue)',
                  border:'none',
                  borderRadius:6,
                  color:'#fff',
                  fontFamily:'var(--mono)',
                  fontSize:12,
                  fontWeight:600,
                  padding:'10px',
                  cursor:'pointer'
                }}>
                🔗 Open Google Drive
              </button>
              <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',marginTop:6,textAlign:'center'}}>
                Manually upload the downloaded Excel file
              </div>
            </div>
          )}
          
          <div style={{borderTop:'1px dashed var(--border)',paddingTop:12,marginTop:4}}>
            <button 
              onClick={()=>setRestoreMode(true)}
              style={{
                width:'100%',
                background:'var(--bg3)',
                border:'1px solid var(--blue)',
                borderRadius:8,
                color:'var(--blue)',
                fontFamily:'var(--mono)',
                fontSize:12,
                fontWeight:600,
                padding:'12px',
                cursor:'pointer'
              }}>
              📥 Restore from Backup
            </button>
          </div>
        </>
      )}
      
      {restoreMode&&(
        <>
          <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--amber)',lineHeight:1.6,padding:'10px',background:'var(--amber-bg)',borderRadius:6,border:'1px solid var(--amber)'}}>
            ⚠️ <strong>Warning:</strong> This will ADD data from your backup file to the current database. It does NOT delete existing data. Use this to recover lost data or merge backups.
          </div>
          
          <label style={{
            display:'block',
            background:'var(--blue)',
            border:'none',
            borderRadius:8,
            color:'#fff',
            fontFamily:'var(--mono)',
            fontSize:13,
            fontWeight:700,
            padding:'14px',
            cursor:restoring?'not-allowed':'pointer',
            textAlign:'center'
          }}>
            {restoring?status:'📂 Select Excel Backup File'}
            <input 
              type="file" 
              accept=".xlsx,.xls" 
              onChange={handleFileSelect}
              disabled={restoring}
              style={{display:'none'}}
            />
          </label>
          
          {status&&restoring&&(
            <div style={{
              fontFamily:'var(--mono)',
              fontSize:11,
              color:status.startsWith('✅')?'var(--green)':status.startsWith('❌')?'var(--red)':'var(--amber)',
              textAlign:'center',
              padding:'8px',
              background:'var(--bg3)',
              borderRadius:6
            }}>
              {status}
            </div>
          )}
          
          <button 
            onClick={()=>{setRestoreMode(false);setStatus('');}}
            style={{
              width:'100%',
              background:'none',
              border:'1px solid var(--border)',
              borderRadius:6,
              color:'var(--text3)',
              fontFamily:'var(--mono)',
              fontSize:11,
              padding:'10px',
              cursor:'pointer'
            }}>
            ← Back to Backup
          </button>
        </>
      )}
      
      <div style={{padding:'10px',background:'var(--bg2)',borderRadius:6,border:'1px dashed var(--border)'}}>
        <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',lineHeight:1.5}}>
          💡 <strong>Tip:</strong> Schedule regular backups (weekly/monthly) and store them in Google Drive or Dropbox for safekeeping.
        </div>
      </div>
    </div>
  );
}

/* ── SettingsScreen — Accordion + Archive soft-delete + Theme picker ── */
function SettingsScreen({opening,onSave,allAccountsH,customAccounts,onSaveAccounts,customCategories,onSaveCategories,budgets,onSaveBudgets,customSites,onSaveSites,customTeam,onSaveTeam,theme,onSaveTheme,customSiteCats,onSaveSiteCats,allBanks,allCC,showToast}){
  /* Normalize opening balance (supports number or {amount, opening_date}) */
  const normalizeOB=ob=>{const r={};Object.entries(ob||{}).forEach(([acc,val])=>{r[acc]=typeof val==='object'&&val!==null?{amount:val.amount||0,opening_date:val.opening_date||''}:{amount:val||0,opening_date:''};});return r;};
  const [ob,setOb]=useState(()=>normalizeOB(opening));const [savedBal,setSavedBal]=useState(false);const [bg,setBg]=useState({...budgets});
  const [newAccName,setNewAccName]=useState('');const [newAccType,setNewAccType]=useState('bank');
  const [newCatName,setNewCatName]=useState('');const [newCatEmoji,setNewCatEmoji]=useState('');const [newCatIT,setNewCatIT]=useState('');
  const [newSite,setNewSite]=useState('');const [newMember,setNewMember]=useState('');
  const [newSiteCat,setNewSiteCat]=useState('');
  const [open,setOpen]=useState({}); 
  const toggle=k=>setOpen(o=>({...o,[k]:!o[k]}));

  const handleSaveBal=async()=>{await onSave(ob);setSavedBal(true);setTimeout(()=>setSavedBal(false),2000);};

  /* Accounts: add, archive, restore */
  const addAccount=async()=>{const name=newAccName.trim().toUpperCase();if(!name)return;const exists=[...SEED_BANKS,...SEED_CC,...customAccounts.map(a=>a.name)].includes(name);if(exists){alert('Account already exists');return;}await onSaveAccounts([...customAccounts,{name,type:newAccType,archived:false}]);setOb(p=>({...p,[name]:0}));setNewAccName('');};
  const archiveAccount=async name=>{const updated=customAccounts.map(a=>a.name===name?{...a,archived:true}:a);await onSaveAccounts(updated);};
  const restoreAccount=async name=>{const updated=customAccounts.map(a=>a.name===name?{...a,archived:false}:a);await onSaveAccounts(updated);};

  /* Categories: add, archive, restore */
  const addCategory=async()=>{if(!newCatName.trim())return;await onSaveCategories([...customCategories,{name:newCatName.trim(),emoji:newCatEmoji||'•',it:newCatIT,archived:false}]);setNewCatName('');setNewCatEmoji('');setNewCatIT('');};
  const archiveCategory=async name=>{await onSaveCategories(customCategories.map(c=>c.name===name?{...c,archived:true}:c));};
  const restoreCategory=async name=>{await onSaveCategories(customCategories.map(c=>c.name===name?{...c,archived:false}:c));};

  const addSite=async()=>{const n=newSite.trim().toUpperCase();if(!n||(customSites||[]).includes(n))return;await onSaveSites([...(customSites||[]),n]);setNewSite('');};
  const removeSite=async n=>await onSaveSites((customSites||[]).filter(s=>s!==n));
  const addMember=async()=>{const n=newMember.trim();if(!n||(customTeam||[]).map(m=>m.toLowerCase()).includes(n.toLowerCase()))return;await onSaveTeam([...(customTeam||[]),n]);setNewMember('');};
  const removeMember=async n=>await onSaveTeam((customTeam||[]).filter(m=>m!==n));
  const handleSaveBudgets=async()=>await onSaveBudgets(bg);

  const DEFAULT_SITE_CATS=['Misc','Transportation','Labour Salary','Kharchi','Medical','Hardware','Maintenance','Food','Udhari','Stationary','Fuel','Travelling'];
  const addSiteCat=async()=>{const n=newSiteCat.trim();if(!n||DEFAULT_SITE_CATS.map(c=>c.toLowerCase()).includes(n.toLowerCase())||(customSiteCats||[]).map(c=>c.toLowerCase()).includes(n.toLowerCase()))return;await onSaveSiteCats([...(customSiteCats||[]),n]);setNewSiteCat('');};
  const removeSiteCat=async n=>await onSaveSiteCats((customSiteCats||[]).filter(c=>c!==n));

  const iS={background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',width:'100%'};

/* ── LEDGER STATEMENT SCREEN ── */
function LedgerStatementScreen({txns, allBanks, allCC, allCatsH, opening, showToast, initLedger}) {

  const now = new Date();

  /* Derive site names from transactions */
  const siteNames = React.useMemo(() => {
    const names = new Set();
    txns.filter(t=>t.status!=='voided').forEach(t => {
      if(t.site_name && t.site_name.trim()) names.add(t.site_name.trim());
    });
    return Array.from(names).sort();
  }, [txns]);

  /* Build ledger options */
  const ledgerOptions = React.useMemo(() => {
    const opts = [];
    /* Banks (excluding Site Cash virtual) */
    opts.push({ group: '── Banks ──', items: allBanks.filter(b=>b!=='Site Cash').map(b=>({value:b, label:b})) });
    /* Site Cash options */
    const siteItems = [
      { value: 'Site Cash', label: '🏗 Site Cash — Total (All Sites)' },
      ...siteNames.map(s=>({ value:'Site Cash:'+s, label:'🏗 Site Cash: '+s })),
    ];
    opts.push({ group: '── Site Cash (Loans & Advances) ──', items: siteItems });
    /* Credit Cards */
    opts.push({ group: '── Credit Cards ──', items: allCC.map(c=>({value:c, label:c})) });
    /* Expense Categories */
    opts.push({ group: '── Expense Categories ──', items: allCatsH.filter(c=>!['UA Expense','Suspense (Uncategorized)'].includes(c.id)).map(c=>({value:c.id, label:c.emoji+' '+c.id})) });
    return opts;
  }, [allBanks, allCC, allCatsH, siteNames]);

  const defaultLedger = initLedger || allBanks.filter(b=>b!=='Site Cash')[0] || '';
  const [selLedger, setSelLedger] = React.useState(defaultLedger);
  const [selMonth,  setSelMonth]  = React.useState(now.getMonth()+1);
  const [selYear,   setSelYear]   = React.useState(now.getFullYear());
  const [allTime,   setAllTime]   = React.useState(false);

  /* Listen for routing events from Dashboard */
  React.useEffect(() => {
    const handleRoute = e => {
      if(e.detail) {
        if(e.detail.account) setSelLedger(e.detail.account);
        if(e.detail.allTime !== undefined) setAllTime(e.detail.allTime);
        if(e.detail.month) setSelMonth(e.detail.month);
        if(e.detail.year)  setSelYear(e.detail.year);
      }
    };
    window.addEventListener('jbf-route-ledger', handleRoute);
    return () => window.removeEventListener('jbf-route-ledger', handleRoute);
  }, []);

  /* Ledger type flags */
  const isSiteCashAll  = selLedger === 'Site Cash';
  const isSiteSubLed   = selLedger.startsWith('Site Cash:');
  const isSiteAny      = isSiteCashAll || isSiteSubLed;
  const siteLedgerName = isSiteSubLed ? selLedger.replace('Site Cash:','') : null; // "D5" etc.
  const isCC           = allCC.includes(selLedger);
  const isAccount      = allBanks.includes(selLedger) || isCC || isSiteAny;

  /* Opening balance */
  const openingVal = (()=>{
    if(!isAccount) return 0;
    const key = isSiteAny ? 'Site Cash' : selLedger;
    const ob = opening[key];
    return ob ? (typeof ob==='object' ? (ob.amount||0) : (ob||0)) : 0;
  })();

  const openingDate = (()=>{
    const key = isSiteAny ? 'Site Cash' : selLedger;
    const ob = opening[key];
    if(ob && typeof ob==='object' && ob.opening_date) return ob.opening_date;
    return null;
  })();

  /* ══════════════════════════════════════════════════════
     SITE CASH ROW DETECTION
     A transaction belongs to Site Cash ledger if:
       NEW rows: dr_ledger or cr_ledger starts with "Site Cash"
       LEGACY rows: type=Site Transfer OR (site-tagged expense/income from personal account)
     For sub-ledger (Site Cash:D5): also filter by site_name
  ══════════════════════════════════════════════════════ */
  const buildSiteCashRows = (activeTxns) => {
    const personalAccounts = [...allBanks.filter(b=>b!=='Site Cash'), ...allCC];

    return activeTxns.filter(t => {
      if(PROVISION_VIRTUAL_TYPES.includes(t.type)) return false;
      if(t.type==='Site Settlement') return false; /* display-only, not outstanding */
      if(isSiteSubLed && t.site_name && t.site_name.trim() !== siteLedgerName) return false;

      /* NEW DE rows */
      if(t.dr_ledger && (t.dr_ledger==='Site Cash'||t.dr_ledger.startsWith('Site Cash:'))) {
        if(isSiteSubLed) return t.dr_ledger===selLedger||t.site_name===siteLedgerName;
        return true;
      }
      if(t.cr_ledger && (t.cr_ledger==='Site Cash'||t.cr_ledger.startsWith('Site Cash:'))) {
        if(isSiteSubLed) return t.cr_ledger===selLedger||t.site_name===siteLedgerName;
        return true;
      }

      /* LEGACY rows (no dr_ledger) — only show if it affects outstanding */
      if(!t.dr_ledger) {
        const isSiteTagged = (t.tower==='SITE')||(t.domain==='Site')||(t.type==='Site Transfer');
        if(!isSiteTagged) return false;

        const from = t.from_account||'';
        const to   = t.to_account  ||'';

        /* Site Transfer: show ALL — pool payments also affect outstanding */
        if(t.type==='Site Transfer') {
          /* from personal → debit; from pool → debit; to personal → credit; to pool → credit */
          if(from && personalAccounts.includes(from)) return true;
          if(from === 'Site Cash') return true;  /* pool payment = outstanding change */
          if(to   && personalAccounts.includes(to))   return true;
          if(to   === 'Site Cash') return true;  /* pool receipt = outstanding change */
          return false;
        }

        /* Expense: personal account OR Site Cash pool — both affect outstanding */
        if(t.type==='Expense'||t.type==='UA Expense') {
          return (from && personalAccounts.includes(from)) || from==='Site Cash';
        }

        /* Income: only if received into personal account */
        if(t.type==='Income'||t.type==='UA Received') {
          return to && personalAccounts.includes(to);
        }
      }
      return false;
    });
  };

  /* ── buildSides: Dr/Cr from Site Cash outstanding perspective ── */
  const buildSides = (t) => {
    let dr=0, cr=0;
    const amt = parseFloat(t.amount)||0;
    const personalAccounts = [...allBanks.filter(b=>b!=='Site Cash'), ...allCC];

    if(isSiteAny){
      const drMatch = t.dr_ledger&&(t.dr_ledger==='Site Cash'||t.dr_ledger===selLedger||t.dr_ledger.startsWith('Site Cash:'));
      const crMatch = t.cr_ledger&&(t.cr_ledger==='Site Cash'||t.cr_ledger===selLedger||t.cr_ledger.startsWith('Site Cash:'));
      if(drMatch) { dr=amt; }
      else if(crMatch) { cr=amt; }
      else {
        /* Legacy: determine side from accounts */
        if(t.type==='Site Transfer') {
          const from=t.from_account||'';
          const to=t.to_account||'';
          /* Convention: dr=invested(out), cr=received(in)
             Money OUT (you paid / pool paid) → dr
             Money IN  (PH gave to pool or your account) → cr */
          if(to==='Site Cash'||personalAccounts.includes(to)) cr=amt;   // received
          else if(from==='Site Cash'||personalAccounts.includes(from)) dr=amt; // invested
        } else if(t.type==='Expense'||t.type==='UA Expense') {
          /* Expense = money out = invested → dr */
          if(personalAccounts.includes(t.from_account)||t.from_account==='Site Cash') dr=amt;
        } else if(t.type==='Income'||t.type==='UA Received') {
          if(t.to_account && personalAccounts.includes(t.to_account)) cr=amt;
        }
      }
    } else if(t.dr_ledger && t.cr_ledger){
      /* Standard DE row */
      if(t.dr_ledger===selLedger) dr=amt;
      if(t.cr_ledger===selLedger) cr=amt;
    } else {
      /* Legacy fallback */
      if(isAccount){
        if(isCC){
          if(t.from_account===selLedger) { dr=amt; }
          if(t.to_account===selLedger)   { cr=amt; }
        } else {
          if(t.to_account===selLedger)   { dr=amt; }
          if(t.from_account===selLedger) { cr=amt; }
        }
      } else {
        if(['Expense','UA Expense'].includes(t.type)) dr=amt;
        if(['Income','UA Received'].includes(t.type)) cr=amt;
      }
    }
    return {dr, cr};
  };

  /* Filter: ledger + period */
  const activeTxns = txns.filter(t => t.status!=='voided');

  /* Opening balance: All Time = settings value; Monthly = settings + pre-period net */
  const correctedOpeningVal = (() => {
    if(!isAccount) return 0;
    if(allTime) return openingVal; /* Settings value directly */
    /* Monthly: compute net of all transactions BEFORE this month */
    const beforePeriod = activeTxns.filter(t => {
      const d = new Date(t.created_at);
      return d.getFullYear() < selYear || (d.getFullYear()===selYear && d.getMonth()+1 < selMonth);
    });
    const beforeRows = isSiteAny
      ? buildSiteCashRows(beforePeriod)
      : beforePeriod.filter(t => {
          if((t.type==='Site Receivable'||t.source==='auto-receivable') && selLedger !== 'Cash') return false;
          if(t.dr_ledger===selLedger||t.cr_ledger===selLedger) return true;
          if(!t.dr_ledger){
            if(isAccount) return t.from_account===selLedger||t.to_account===selLedger;
            return t.category===selLedger;
          }
          return false;
        });
    const beforeNet = beforeRows.reduce((s,t) => {
      const {dr,cr} = buildSides(t);
      return isSiteAny ? s - dr + cr : s + dr - cr;
    }, 0);
    return openingVal + beforeNet;
  })();
  const filteredByPeriod = activeTxns.filter(t => {
    if(!allTime){
      const d = new Date(t.created_at);
      if(d.getMonth()+1!==selMonth || d.getFullYear()!==selYear) return false;
    }
    if(openingDate && (t.created_at||'').slice(0,10)<openingDate) return false;
    if(PROVISION_VIRTUAL_TYPES.includes(t.type)) return false;
    return true;
  });

  const rows = (isSiteAny ? buildSiteCashRows(filteredByPeriod) : filteredByPeriod.filter(t => {
    /* Site Receivable: show in Cash ledger (dr_ledger='Cash') but hide from all other personal bank/CC ledgers */
    if((t.type === 'Site Receivable' || t.source === 'auto-receivable') && selLedger !== 'Cash') return false;
    if(t.dr_ledger===selLedger || t.cr_ledger===selLedger) return true;
    if(!t.dr_ledger){
      if(isAccount) return t.from_account===selLedger || t.to_account===selLedger;
      return t.category===selLedger;
    }
    return false;
  })).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));

  /* Running balance */
  let runBal = isAccount ? correctedOpeningVal : 0;
  const tableRows = rows.map(t => {
    const {dr,cr} = buildSides(t);
    /* Site Cash outstanding convention:
       Opening -4733 means site owes you ₹4,733.
       Invested (dr): you spent more → outstanding MORE negative → subtract
       Received (cr): site paid back → outstanding LESS negative → add */
    if(isSiteAny) {
      runBal = runBal - dr + cr; // invest→more negative, receive→less negative
    } else {
      runBal += dr - cr;
    }
    return {...t, _dr:dr, _cr:cr, _runBal:runBal};
  });

  const totDr    = tableRows.reduce((s,r)=>s+r._dr, 0);
  const totCr    = tableRows.reduce((s,r)=>s+r._cr, 0);
  /* For Site Cash: outstanding = openingVal + invested - recovered */
  /* Site Cash: opening - invested + received = closing
     Normal accounts: opening + dr - cr = closing */
  const closeBal = isSiteAny
    ? correctedOpeningVal - totDr + totCr
    : isAccount
      ? correctedOpeningVal + totDr - totCr
      : totDr - totCr;

  /* Per-site breakdown (Site Cash — All) */
  const siteBreakdown = React.useMemo(() => {
    if(!isSiteCashAll || siteNames.length === 0) return [];
    /* Opening balance is shared across all sites (it's a global Site Cash opening).
       We distribute it proportionally only if multiple sites, but the correct approach
       is: per-site outstanding = openingVal + per-site invested - per-site recovered.
       Since opening balance belongs to the whole ledger (not site-specific),
       we add it to the total and show it as a shared component.
       The outstanding shown per-site = openingVal + sDr - sCr
       so that sum of all site outstandings = total All Sites outstanding. */
    const sites = siteNames.map(sName => {
      const sRows = buildSiteCashRows(activeTxns.filter(t=>{
        if(t.site_name && t.site_name.trim()!==sName) return false;
        if(!t.site_name) {
          // Legacy: skip if no site_name
          return false;
        }
        return true;
      }));
      let sDr=0, sCr=0;
      sRows.forEach(t=>{ const {dr,cr}=buildSides(t); sDr+=dr; sCr+=cr; });
      /* Include opening balance so per-site outstanding matches total */
      const sOutstanding = openingVal - sDr + sCr;
      return { name:sName, invested:sDr, recovered:sCr, outstanding:sOutstanding };
    }).filter(s=>s.invested>0||s.recovered>0);
    return sites;
  }, [isSiteCashAll, siteNames, activeTxns, openingVal]);

  /* CSV export */
  const exportCSV = () => {
    const header = ['Date','Particulars','Type','Site/Domain','Dr Ledger','Cr Ledger','Dr (₹)','Cr (₹)','Balance (₹)'];
    const dataRows = tableRows.map(r=>[
      (r.created_at||'').slice(0,10),
      r.particulars||r.category||'—',
      r.type||'—',
      r.site_name||r.domain||'—',
      r.dr_ledger||(r._dr>0?selLedger:'—'),
      r.cr_ledger||(r._cr>0?selLedger:'—'),
      r._dr>0 ? r._dr.toFixed(2) : '',
      r._cr>0 ? r._cr.toFixed(2) : '',
      r._runBal.toFixed(2),
    ]);
    const csv = [header,...dataRows]
      .map(row=>row.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','))
      .join('\n');
    const blob = new Blob([csv],{type:'text/csv'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = 'Ledger_'+selLedger.replace(/\s+/g,'_').replace(/:/g,'-')+'_'+(allTime?'AllTime':selYear+'_'+String(selMonth).padStart(2,'0'))+'.csv';
    a.click();
    URL.revokeObjectURL(url);
    showToast('✓ CSV downloaded — CA ke liye ready');
  };

  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const years  = Array.from({length:5},(_,i)=>now.getFullYear()-i);

  const amtS = (n,color) => n>0
    ? <span style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--'+color+')',fontWeight:600}}>₹{fmt(n)}</span>
    : <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>—</span>;

  const balColor = b => {
    if(isSiteAny) return b>0 ? 'var(--amber)' : b===0 ? 'var(--green)' : 'var(--green)';
    return b>=0 ? 'var(--green)' : 'var(--red)';
  };

  /* Column labels */
  const drLabel  = isSiteAny ? 'Invested' : 'Dr';
  const crLabel  = isSiteAny ? 'Recovered' : 'Cr';
  const balLabel = isSiteAny ? 'Outstanding' : 'Balance';

  return (
    <div className="fade-in">

      {/* Ledger selector */}
      <div style={{padding:'12px 16px 0'}}>
        <p className="sec-label" style={{padding:'0 0 8px'}}>SELECT LEDGER</p>
        <select value={selLedger} onChange={e=>setSelLedger(e.target.value)} style={{width:'100%',marginBottom:10}}>
          {ledgerOptions.map(grp=>(
            <optgroup key={grp.group} label={grp.group}>
              {grp.items.map(item=><option key={item.value} value={item.value}>{item.label}</option>)}
            </optgroup>
          ))}
        </select>

        {/* Site Cash info */}
        {isSiteAny&&(
          <div style={{background:'var(--amber-bg)',border:'1px solid var(--amber)',borderRadius:8,padding:'8px 12px',marginBottom:10}}>
            <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--amber)',fontWeight:600,marginBottom:3}}>
              🏗 {isSiteSubLed?'SITE: '+siteLedgerName+' — Sub Ledger':'SITE CASH — All Sites Combined'} · Loans & Advances (Asset)
            </div>
            <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text2)',lineHeight:1.7}}>
              Invested (Dr) = tumne site pe lagaya · Recovered (Cr) = site ne wapas diya
              · Outstanding = site abhi tumhara kitna paisa liye baitha hai
            </div>
          </div>
        )}

        {/* Cash account note */}
        {selLedger==='Cash'&&(
          <div style={{background:'var(--blue-bg)',border:'1px solid var(--blue)',borderRadius:8,padding:'8px 12px',marginBottom:10}}>
            <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--blue)',fontWeight:600,marginBottom:3}}>
              💵 PERSONAL CASH-IN-HAND
            </div>
            <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text2)',lineHeight:1.7}}>
              Ye sirf tera wallet/personal cash hai.
              Site pe diya hua physical cash "Site Cash" ledger mein track hota hai (site_name ke saath).
              Dr = cash aaya · Cr = cash gaya (personal expenses OR site ko diya)
            </div>
          </div>
        )}

        {/* Period filter */}
        <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:4}}>
          <label style={{display:'flex',alignItems:'center',gap:6,fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',cursor:'pointer',userSelect:'none'}}>
            <input type="checkbox" checked={allTime} onChange={e=>setAllTime(e.target.checked)} style={{accentColor:'var(--green)'}}/>
            All Time
          </label>
          {!allTime&&<>
            <select value={selMonth} onChange={e=>setSelMonth(parseInt(e.target.value))} style={{flex:1}}>
              {months.map((m,i)=><option key={i+1} value={i+1}>{m}</option>)}
            </select>
            <select value={selYear} onChange={e=>setSelYear(parseInt(e.target.value))} style={{flex:1}}>
              {years.map(y=><option key={y} value={y}>{y}</option>)}
            </select>
          </>}
        </div>
      </div>

      {/* Summary cards */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,padding:'10px 16px'}}>
        {[
          {label:drLabel+' Total', val:totDr,              color:'blue'},
          {label:crLabel+' Total', val:totCr,              color:'green'},
          {label:balLabel,         val:Math.abs(closeBal), color:isSiteAny&&closeBal>0?'amber':closeBal>=0?'green':'red'},
        ].map(s=>(
          <div key={s.label} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 10px'}}>
            <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4,lineHeight:1.4}}>{s.label}</div>
            <div style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:700,color:'var(--'+s.color+')'}}>{fmtAmt(s.val)}</div>
          </div>
        ))}
      </div>

      {/* Site Cash outstanding */}
      {isSiteAny&&tableRows.length>0&&(
        <div style={{margin:'0 16px 10px',padding:'10px 14px',background:'var(--bg2)',border:'2px solid var(--amber)',borderRadius:10}}>
          <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginBottom:3}}>
            NET AMOUNT SITE OWES YOU {isSiteSubLed?'('+siteLedgerName+')':'(ALL SITES)'}
          </div>
          <div style={{fontFamily:'var(--mono)',fontSize:22,fontWeight:700,color:closeBal<0?'var(--amber)':closeBal===0?'var(--green)':'var(--red)'}}>
            {closeBal<0?'− ':'+ '} ₹{fmt(Math.abs(closeBal))}
          </div>
          <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',marginTop:4}}>
            {closeBal<0
  ? 'Site abhi bhi tumhara ₹'+fmt(Math.abs(closeBal))+' pending hai'
  : closeBal===0 ? 'Site ke saath fully settled hai ✓'
  : 'Tumne site ko ₹'+fmt(closeBal)+' zyada de diya hai'}
          </div>
        </div>
      )}

      {/* Per-site breakdown */}
      {isSiteCashAll && siteBreakdown.length > 0 && (
        <div style={{margin:'0 16px 10px'}}>
          <div style={{fontFamily:'var(--mono)',fontSize:10,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:6}}>Per-Site Breakdown</div>
          {siteBreakdown.map(s=>(
            <div key={s.name} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,marginBottom:4}}>
              <div>
                <div style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:'var(--text)'}}>🏗 {s.name}</div>
                <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',marginTop:2}}>
                  Invested: ₹{fmt(s.invested)} · Recovered: ₹{fmt(s.recovered)}
                </div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:700,color:s.outstanding<0?'var(--amber)':s.outstanding===0?'var(--green)':'var(--red)'}}>
                  {s.outstanding<0?'− ':'+ '}₹{fmt(Math.abs(s.outstanding))}
                </div>
                <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)'}}>outstanding</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Export */}
      <div style={{padding:'0 16px 10px'}}>
        <button onClick={exportCSV} disabled={tableRows.length===0}
          style={{width:'100%',background:tableRows.length===0?'var(--bg3)':'var(--blue)',border:'none',borderRadius:8,padding:'10px',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:tableRows.length===0?'var(--text3)':'#fff',cursor:tableRows.length===0?'not-allowed':'pointer',letterSpacing:'0.04em'}}>
          📥 Export CSV — CA ke liye
        </button>
      </div>

      {/* Ledger table */}
      <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,margin:'0 16px',overflow:'hidden'}}>

        {/* Header */}
        <div style={{display:'grid',gridTemplateColumns:'65px 1fr 75px 75px 85px',background:'var(--bg3)',borderBottom:'2px solid var(--border2)',padding:'8px 10px',gap:4}}>
          {['Date','Particulars', drLabel, crLabel, balLabel].map(h=>(
            <div key={h} style={{fontFamily:'var(--mono)',fontSize:9,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em',textAlign:['Dr','Cr','Balance','Invested','Recovered','Outstanding'].includes(h)?'right':'left'}}>{h}</div>
          ))}
        </div>

        {/* Opening row */}
        {isAccount&&(
          <div style={{display:'grid',gridTemplateColumns:'65px 1fr 75px 75px 85px',padding:'8px 10px',gap:4,borderBottom:'1px solid var(--border)',background:'var(--amber-bg)'}}>
            <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)'}}>Opening</div>
            <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text2)',fontWeight:600}}>Opening Balance</div>
            <div style={{textAlign:'right'}}>{correctedOpeningVal>0?amtS(correctedOpeningVal,'green'):<span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>—</span>}</div>
            <div style={{textAlign:'right'}}>{correctedOpeningVal<0?amtS(Math.abs(correctedOpeningVal),'red'):<span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>—</span>}</div>
            <div style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:12,fontWeight:700,color:balColor(correctedOpeningVal)}}>
              {correctedOpeningVal<0&&'-'}₹{fmt(Math.abs(correctedOpeningVal))}
            </div>
          </div>
        )}

        {/* Empty state */}
        {tableRows.length===0&&(
          <div style={{padding:'28px 16px',textAlign:'center',fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>
            {isSiteAny
              ? 'Is period mein koi site transaction nahi mili\nSite Transfer ya site_name-tagged entries yahan dikhega'
              : 'No transactions found for this ledger / period'}
          </div>
        )}

        {/* Rows */}
        {tableRows.map((t,i)=>(
          <div key={t.id||i} style={{display:'grid',gridTemplateColumns:'65px 1fr 75px 75px 85px',padding:'8px 10px',gap:4,borderBottom:'1px solid var(--border)',background:i%2===0?'transparent':'var(--bg2)'}}>
            <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)'}}>{fmtDate(t.created_at)}</div>
            <div style={{minWidth:0}}>
              <div style={{fontFamily:'var(--sans)',fontSize:11,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                {t.particulars||t.category||'—'}
                {isSiteAny&&t.site_name&&<span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--amber)',marginLeft:5}}>[{t.site_name}]</span>}
              </div>
              <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',marginTop:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                {t.dr_ledger&&t.cr_ledger ? `Dr: ${t.dr_ledger} / Cr: ${t.cr_ledger}` : t.type}
                {isSiteAny&&!t.dr_ledger&&t.from_account&&<span> · from {t.from_account}</span>}
              </div>
            </div>
            <div style={{textAlign:'right'}}>{amtS(t._dr, isSiteAny?'amber':'blue')}</div>
            <div style={{textAlign:'right'}}>{amtS(t._cr,'green')}</div>
            <div style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:balColor(t._runBal)}}>
              {t._runBal<0&&<span style={{fontSize:9}}>-</span>}₹{fmt(Math.abs(t._runBal))}
            </div>
          </div>
        ))}

        {/* Closing row */}
        {tableRows.length>0&&(
          <div style={{display:'grid',gridTemplateColumns:'65px 1fr 75px 75px 85px',padding:'9px 10px',gap:4,background:isSiteAny?'var(--amber-bg)':'var(--green-bg)',borderTop:'2px solid '+(isSiteAny?'var(--amber)':'var(--green)')}}>
            <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)'}}>Closing</div>
            <div style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:'var(--text2)'}}>CLOSING BALANCE</div>
            <div style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:'var(--blue)'}}>₹{fmt(totDr)}</div>
            <div style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:'var(--green)'}}>₹{fmt(totCr)}</div>
            <div style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:13,fontWeight:700,color:balColor(closeBal)}}>
              {closeBal<0&&'-'}₹{fmt(Math.abs(closeBal))}
            </div>
          </div>
        )}
      </div>

      {/* Balance check */}
      {tableRows.length>0&&!isSiteAny&&(
        <div style={{margin:'8px 16px',padding:'8px 12px',background:Math.abs(totDr-totCr)<0.5?'var(--green-bg)':'var(--amber-bg)',border:'1px solid '+(Math.abs(totDr-totCr)<0.5?'var(--green)':'var(--amber)'),borderRadius:8}}>
          <span style={{fontFamily:'var(--mono)',fontSize:10,color:Math.abs(totDr-totCr)<0.5?'var(--green)':'var(--amber)'}}>
            {Math.abs(totDr-totCr)<0.5
              ? '✓ Dr = Cr verified — entries balanced'
              : '⚠ Dr ≠ Cr by ₹'+fmt(Math.abs(totDr-totCr))+' — Settings se Backfill run karo'}
          </span>
        </div>
      )}

      {/* Backfill tip */}
      {isSiteAny&&tableRows.length===0&&(
        <div style={{margin:'8px 16px',padding:'8px 12px',background:'var(--amber-bg)',border:'1px solid var(--amber)',borderRadius:8}}>
          <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--amber)',fontWeight:600,marginBottom:3}}>💡 Data nahi dikh raha?</div>
          <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text2)',lineHeight:1.6}}>
            1. App reload karo — auto-backfill background mein chalega<br/>
            2. Past transactions mein site_name fill hona chahiye<br/>
            3. "All Time" checkbox tick karo period restriction hatane ke liye
          </div>
        </div>
      )}

      <div style={{height:40}}/>
    </div>
  );
}

/* ── RENDER ── */
const rootEl = document.getElementById('root');
const bootScreen = document.getElementById('boot-screen');
if(bootScreen) bootScreen.remove();
const root = ReactDOM.createRoot(rootEl);
root.render(<App />);
</script>
</body>
</html>
