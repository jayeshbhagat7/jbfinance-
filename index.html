            fontFamily:'var(--mono)',fontSize:13,fontWeight:600,
            padding:14,cursor:canSave?'pointer':'default',transition:'all 0.2s'}}>
          {saving ? 'Saving...' : canSave ? `Save  ₹${fmt(parseFloat(amt)||0)}` : 'Fill required fields'}
        </button>
      </div>
    </div>
  );
}

// ── TRANSACTIONS SCREEN ──────────────────────────────
function TxnsScreen({ txns, onDelete, onVoidAndCorrect, allAccounts, allBanks, allCC, allCategories }) {
  const [filter,   setFilter]   = useState('All');
  const [selected, setSelected] = useState(null);
  const [editMode, setEditMode] = useState(null);
  const [saving,   setSaving]   = useState(false);

  // Edit form state
  const [corrAmt,  setCorrAmt]  = useState('');
  const [corrDesc, setCorrDesc] = useState('');
  const [corrCat,  setCorrCat]  = useState('');
  const [corrDate, setCorrDate] = useState('');
  const [corrFrom, setCorrFrom] = useState('');
  const [corrTo,   setCorrTo]   = useState('');

  const filters = ['All','Today','Voided','UA','Income'];
  const today   = new Date().toDateString();

  const filtered = txns.filter(t => {
    if (filter === 'Today')  return new Date(t.created_at).toDateString() === today && t.status !== 'voided';
    if (filter === 'Voided') return t.status === 'voided';
    if (filter === 'UA')     return (t.type==='UA Expense'||t.type==='UA Received') && t.status!=='voided';
    if (filter === 'Income') return (t.type==='Income'||t.type==='UA Received') && t.status!=='voided';
    return t.status !== 'voided';
  });

  const amtColor = t => {
    if (t.status==='voided') return '';
    if (t.type==='Income'||t.type==='UA Received') return 'in';
    if (t.type==='UA Expense') return 'ua';
    if (t.type==='Bank→Bank'||t.type==='Bank→CC') return '';
    return 'out';
  };
  const amtSign = t => (t.type==='Income'||t.type==='UA Received') ? '+' : '−';

  const handleEdit = (t) => {
    setEditMode(t);
    setCorrAmt(String(t.amount));
    setCorrDesc(t.particulars || '');
    setCorrCat(t.category || '');
    setCorrDate(new Date(t.created_at).toISOString().slice(0,10));
    setCorrFrom(t.from_account || '');
    setCorrTo(t.to_account || '');
  };

  const handleSaveCorrection = async () => {
    if (!editMode || !corrAmt || saving) return;
    setSaving(true);
    await onVoidAndCorrect(editMode, {
      amount:       parseFloat(corrAmt),
      particulars:  corrDesc || editMode.particulars,
      category:     corrCat  || editMode.category,
      from_account: corrFrom || editMode.from_account,
      to_account:   corrTo   || editMode.to_account,
      created_at:   corrDate ? corrDate+'T06:30:00.000Z' : editMode.created_at,
    });
    setEditMode(null); setSelected(null); setSaving(false);
  };

  const iS = {background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,
    padding:'7px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',width:'100%'};
  const chipS = (active) => ({
    display:'inline-block',border:active?'1px solid var(--blue)':'1px solid var(--border2)',
    borderRadius:14,padding:'4px 10px',fontFamily:'var(--mono)',fontSize:10,
    color:active?'var(--blue)':'var(--text2)',background:active?'var(--blue-bg)':'var(--bg2)',
    cursor:'pointer',userSelect:'none',margin:'0 4px 4px 0',
  });
  const bS = (col) => ({background:'none',border:`1px solid ${col}`,borderRadius:6,
    color:col,padding:'5px 12px',fontSize:11,fontFamily:'var(--mono)',cursor:'pointer'});

  // Determine which accounts to show in edit based on transaction type
  const editFromList = () => {
    const t = editMode?.type || '';
    if (t==='Bank→CC'||t==='Bank→Bank'||t==='Bank→Cash') return allBanks.filter(a=>a!=='Cash');
    if (t==='CC→Bank') return allCC;
    if (t==='Cash→Bank') return ['Cash'];
    return allAccounts; // Expense, UA Expense
  };
  const editToList = () => {
    const t = editMode?.type || '';
    if (t==='Bank→CC') return allCC;
    if (t==='Bank→Bank'||t==='Cash→Bank'||t==='CC→Bank') return allBanks.filter(a=>a!=='Cash');
    if (t==='Bank→Cash') return ['Cash'];
    return allBanks; // Income, UA Received
  };
  const needsFrom = (t) => ['Expense','UA Expense','Bank→CC','Bank→Bank','Bank→Cash','CC→Bank'].includes(t);
  const needsTo   = (t) => ['Income','UA Received','Bank→CC','Bank→Bank','Cash→Bank','CC→Bank'].includes(t);

  return (
    <div className="fade-in">
      <div className="chip-row" style={{padding:'12px 16px 0'}}>
        {filters.map(f => (
          <div key={f} className={'chip'+(filter===f?' sel':'')}
            onClick={() => { setFilter(f); setSelected(null); setEditMode(null); }}>{f}</div>
        ))}
      </div>

      {filtered.length===0 && <div className="empty">No transactions found.</div>}

      <div style={{marginTop:8}}>
        {filtered.map(t => (
          <div key={t.id}>
            <div className="txn-row"
              style={t.status==='voided'?{opacity:0.45}:{}}
              onClick={() => { setSelected(selected===t.id?null:t.id); setEditMode(null); }}>
              <div className="txn-left">
                <div className="txn-cat">
                  {t.type}{t.tower?' · '+t.tower:''}
                  {t.status==='voided' && <span style={{marginLeft:6,fontSize:9,color:'var(--red)',fontFamily:'var(--mono)'}}>VOIDED</span>}
                  {t.correction_of && <span style={{marginLeft:6,fontSize:9,color:'var(--green)',fontFamily:'var(--mono)'}}>CORRECTION</span>}
                </div>
                <div className="txn-desc" style={t.status==='voided'?{textDecoration:'line-through'}:{}}>{t.particulars||t.category}</div>
                <div className="txn-meta">
                  {fmtDate(t.created_at)} {fmtTime(t.created_at)}
                  {t.category && t.category!==t.type && <span style={{color:'var(--text3)',marginLeft:6}}>{t.category}</span>}
                  {t.it_section && <span style={{color:'var(--green)',marginLeft:6}}>{t.it_section}</span>}
                </div>
                {selected===t.id && t.status!=='voided' && (
                  <div style={{marginTop:8,display:'flex',gap:8,flexWrap:'wrap'}}>
                    <button onClick={e=>{e.stopPropagation();handleEdit(t);}} style={bS('var(--blue)')}>Edit</button>
                    <button onClick={e=>{e.stopPropagation();onDelete(t.id);setSelected(null);}} style={bS('var(--red)')}>Void</button>
                  </div>
                )}
              </div>
              <div className="txn-right">
                <div className={'txn-amt '+amtColor(t)} style={t.status==='voided'?{textDecoration:'line-through'}:{}}>
                  {amtSign(t)}{fmtAmt(t.amount)}
                </div>
                <div className="txn-acct">{t.from_account||t.to_account}</div>
                {t.status==='pending' && <span className="badge badge-pending">pending</span>}
              </div>
            </div>

            {/* ── FULL EDIT FORM */}
            {editMode?.id===t.id && (
              <div style={{background:'var(--bg2)',border:'1px solid var(--blue)',borderRadius:8,margin:'0 12px 8px',padding:'12px'}}>
                <p style={{fontSize:10,color:'var(--blue)',fontFamily:'var(--mono)',margin:'0 0 10px',fontWeight:600,letterSpacing:'0.06em'}}>
                  CORRECT ENTRY — original will be voided
                </p>

                {/* Amount + Desc */}
                <div style={{display:'flex',gap:8,marginBottom:8}}>
                  <input value={corrAmt} onChange={e=>setCorrAmt(e.target.value)}
                    placeholder="Amount" type="number" style={{...iS,flex:1}}/>
                  <input value={corrDesc} onChange={e=>setCorrDesc(e.target.value)}
                    placeholder="Description" style={{...iS,flex:2}}/>
                </div>

                {/* Date */}
                <input type="date" value={corrDate}
                  max={new Date().toISOString().slice(0,10)}
                  onChange={e=>setCorrDate(e.target.value)}
                  style={{...iS,marginBottom:8,
                    borderColor:corrDate!==new Date(editMode.created_at).toISOString().slice(0,10)?'var(--amber)':'var(--border2)',
                    color:corrDate!==new Date(editMode.created_at).toISOString().slice(0,10)?'var(--amber)':'var(--text)'}}/>

                {/* Category */}
                {editMode.type==='Expense' && (
                  <div style={{marginBottom:8}}>
                    <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:5}}>CATEGORY</div>
                    <div style={{display:'flex',flexWrap:'wrap'}}>
                      {allCategories.filter(c=>c.id!=='UA Expense').map(c=>(
                        <span key={c.id} style={chipS(corrCat===c.id)} onClick={()=>setCorrCat(c.id)}>
                          {c.emoji} {c.id}
                        </span>
                      ))}
                    </div>
                  </div>
                )}

                {/* From account */}
                {needsFrom(editMode.type) && (
                  <div style={{marginBottom:8}}>
                    <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:5}}>
                      {editMode.type.includes('→')?'FROM ACCOUNT':'PAID FROM'}
                    </div>
                    <div style={{display:'flex',flexWrap:'wrap'}}>
                      {editFromList().map(a=>(
                        <span key={a} style={chipS(corrFrom===a)} onClick={()=>setCorrFrom(a)}>{a}</span>
                      ))}
                    </div>
                  </div>
                )}

                {/* To account */}
                {needsTo(editMode.type) && (
                  <div style={{marginBottom:8}}>
                    <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:5}}>
                      {editMode.type==='Bank→CC'?'CC CARD':editMode.type.includes('→')?'TO ACCOUNT':'RECEIVED IN'}
                    </div>
                    <div style={{display:'flex',flexWrap:'wrap'}}>
                      {editToList().map(a=>(
                        <span key={a} style={chipS(corrTo===a)} onClick={()=>setCorrTo(a)}>{a}</span>
                      ))}
                    </div>
                  </div>
                )}

                <div style={{display:'flex',gap:8}}>
                  <button onClick={handleSaveCorrection} disabled={saving}
                    style={{flex:1,background:'var(--blue)',border:'none',borderRadius:6,color:'#fff',
                      padding:'9px',fontSize:11,fontFamily:'var(--mono)',fontWeight:600,cursor:'pointer'}}>
                    {saving?'Saving...':'Save correction'}
                  </button>
                  <button onClick={()=>setEditMode(null)} style={bS('var(--text3)')}>Cancel</button>
                </div>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

  const filters = ['All','Today','Voided','UA','Income'];
  const today   = new Date().toDateString();

  // Hide voided entries by default — show only in Voided filter
  const filtered = txns.filter(t => {
    if (filter === 'Today')  return new Date(t.created_at).toDateString() === today && t.status !== 'voided';
    if (filter === 'Voided') return t.status === 'voided';
    if (filter === 'UA')     return (t.type === 'UA Expense' || t.type === 'UA Received') && t.status !== 'voided';
    if (filter === 'Income') return (t.type === 'Income' || t.type === 'UA Received') && t.status !== 'voided';
    return t.status !== 'voided'; // All = active only
  });

  const amtColor = t => {
    if (t.status === 'voided') return '';
    if (t.type === 'Income' || t.type === 'UA Received') return 'in';
    if (t.type === 'UA Expense') return 'ua';
    if (t.type === 'Bank→Bank' || t.type === 'Bank→CC') return '';
    return 'out';
  };

  const amtSign = t => {
    if (t.type === 'Income' || t.type === 'UA Received') return '+';
    return '−';
  };

  const handleEdit = (t) => {
    setEditMode(t);
    setCorrAmt(String(t.amount));
    setCorrDesc(t.particulars || '');
    setCorrCat(t.category || '');
    setCorrDate(new Date(t.created_at).toISOString().slice(0,10));
  };

  const handleSaveCorrection = async () => {
    if (!editMode || !corrAmt || saving) return;
    setSaving(true);
    await onVoidAndCorrect(editMode, {
      amount:      parseFloat(corrAmt),
      particulars: corrDesc || editMode.particulars,
      category:    corrCat  || editMode.category,
      created_at:  corrDate ? corrDate + 'T06:30:00.000Z' : editMode.created_at,
    });
    setEditMode(null);
    setSelected(null);
    setSaving(false);
  };

  const btnStyle = (col) => ({
    background:'none', border:`1px solid ${col}`,
    borderRadius:6, color:col, padding:'5px 12px',
    fontSize:11, fontFamily:'var(--mono)', cursor:'pointer'
  });

  return (
    <div className="fade-in">
      <div className="chip-row" style={{padding:'12px 16px 0'}}>
        {filters.map(f => (
          <div key={f} className={'chip'+(filter===f?' sel':'')} onClick={() => { setFilter(f); setSelected(null); setEditMode(null); }}>{f}</div>
        ))}
      </div>

      {filtered.length === 0 && <div className="empty">No transactions found.</div>}

      <div style={{marginTop:8}}>
        {filtered.map(t => (
          <div key={t.id}>
            <div className="txn-row"
              style={t.status==='voided'?{opacity:0.45}:{}}
              onClick={() => { setSelected(selected===t.id?null:t.id); setEditMode(null); }}>
              <div className="txn-left">
                <div className="txn-cat">
                  {t.type}{t.tower ? ' · '+t.tower : ''}
                  {t.status==='voided' && <span style={{marginLeft:6,fontSize:9,color:'var(--red)',fontFamily:'var(--mono)'}}>VOIDED</span>}
                  {t.correction_of && <span style={{marginLeft:6,fontSize:9,color:'var(--green)',fontFamily:'var(--mono)'}}>CORRECTION</span>}
                </div>
                <div className="txn-desc" style={t.status==='voided'?{textDecoration:'line-through'}:{}}>{t.particulars || t.category}</div>
                <div className="txn-meta">
                  {fmtDate(t.created_at)} {fmtTime(t.created_at)}
                  {t.it_section && <span style={{color:'var(--green)',marginLeft:6}}>{t.it_section}</span>}
                </div>

                {/* Expanded actions */}
                {selected === t.id && t.status !== 'voided' && (
                  <div style={{marginTop:8,display:'flex',gap:8,flexWrap:'wrap'}}>
                    <button onClick={(e)=>{e.stopPropagation();handleEdit(t);}}
                      style={btnStyle('var(--blue)')}>Edit</button>
                    <button onClick={(e)=>{e.stopPropagation();onDelete(t.id);setSelected(null);}}
                      style={btnStyle('var(--red)')}>Void</button>
                  </div>
                )}
              </div>
              <div className="txn-right">
                <div className={'txn-amt '+amtColor(t)} style={t.status==='voided'?{textDecoration:'line-through'}:{}}>
                  {amtSign(t)}{fmtAmt(t.amount)}
                </div>
                <div className="txn-acct">{t.from_account||t.to_account}</div>
                {t.status==='pending' && <span className="badge badge-pending">pending</span>}
              </div>
            </div>

            {/* Inline edit form */}
            {editMode?.id === t.id && (
              <div style={{background:'var(--bg2)',border:'1px solid var(--blue)',borderRadius:8,margin:'0 16px 8px',padding:'12px'}}>
                <p style={{fontSize:10,color:'var(--blue)',fontFamily:'var(--mono)',margin:'0 0 8px',letterSpacing:'0.08em'}}>CORRECT ENTRY — original will be voided</p>
                <div style={{display:'flex',gap:8,marginBottom:8}}>
                  <input value={corrAmt} onChange={e=>setCorrAmt(e.target.value)}
                    placeholder="Amount" type="number"
                    style={{flex:1,background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,padding:'7px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:13,outline:'none'}}/>
                  <input value={corrDesc} onChange={e=>setCorrDesc(e.target.value)}
                    placeholder="Description"
                    style={{flex:2,background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,padding:'7px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:13,outline:'none'}}/>
                </div>
                <div style={{marginBottom:8}}>
                  <input type="date" value={corrDate} max={new Date().toISOString().slice(0,10)}
                    onChange={e=>setCorrDate(e.target.value)}
                    style={{width:'100%',background:'var(--bg3)',border:'1px solid '+(corrDate!==new Date(editMode.created_at).toISOString().slice(0,10)?'var(--amber)':'var(--border2)'),borderRadius:6,padding:'7px 10px',color:corrDate!==new Date(editMode.created_at).toISOString().slice(0,10)?'var(--amber)':'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none'}}/>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button onClick={handleSaveCorrection} disabled={saving}
                    style={{flex:1,background:'var(--blue)',border:'none',borderRadius:6,color:'#fff',padding:'8px',fontSize:11,fontFamily:'var(--mono)',fontWeight:600,cursor:'pointer'}}>
                    {saving?'Saving...':'Save correction'}
                  </button>
                  <button onClick={()=>setEditMode(null)}
                    style={btnStyle('var(--text3)')}>Cancel</button>
                </div>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── DASHBOARD SCREEN — COMPACT ───────────────────────
function DashScreen({ balances, txns, liquid, allBanks, allCC, budgets, trueSpendable, recurring, checklist }) {
  allBanks = allBanks || BANKS;
  allCC    = allCC    || CC_ACCTS;
  budgets  = budgets  || {};

  const now    = new Date();
  const month  = now.getMonth();
  const year   = now.getFullYear();
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  const active     = txns.filter(t => t.status !== 'voided');
  const thisMonth  = active.filter(t => { const d=new Date(t.created_at); return d.getMonth()===month&&d.getFullYear()===year; });
  const lastMonth  = active.filter(t => { const d=new Date(t.created_at); const lm=month===0?11:month-1; const ly=month===0?year-1:year; return d.getMonth()===lm&&d.getFullYear()===ly; });

  const sumType = (list,type) => list.filter(t=>t.type===type).reduce((s,t)=>s+(+t.amount),0);
  const sumCat  = (list,cat)  => list.filter(t=>t.type==='Expense'&&t.category===cat).reduce((s,t)=>s+(+t.amount),0);

  const income  = sumType(thisMonth,'Income');
  const expense = sumType(thisMonth,'Expense');
  const uaExp   = sumType(thisMonth,'UA Expense');
  const uaRecv  = sumType(thisMonth,'UA Received');
  const uaOut   = uaExp - uaRecv;

  const ccDues  = allCC.map(a=>({name:a,due:Math.max(0,-(balances[a]||0))})).filter(x=>x.due>0);
  const totalCC = ccDues.reduce((s,x)=>s+x.due,0);
  const spendable = trueSpendable !== undefined ? trueSpendable : Math.max(0, liquid - totalCC);

  // Category spend this month
  const cats = {};
  thisMonth.filter(t=>t.type==='Expense').forEach(t=>{ const c=t.category||'Misc'; cats[c]=(cats[c]||0)+(+t.amount); });
  const topCats = Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // IT — full year
  const fy = active.filter(t=>{ const d=new Date(t.created_at); const yr=d.getFullYear(),mo=d.getMonth(); return (yr===year&&mo>=3)||(yr===year+1&&mo<3); });
  const it80C = fy.filter(t=>t.it_section==='80C').reduce((s,t)=>s+(+t.amount),0);
  const it80D = fy.filter(t=>t.it_section==='80D').reduce((s,t)=>s+(+t.amount),0);
  const gap80C = Math.max(0,150000-it80C);
  const gap80D = Math.max(0,50000-it80D);
  const taxSave = Math.round((gap80C)*0.3);

  // Alerts — only real ones
  const alerts = [];
  ccDues.forEach(x => alerts.push({ r:'red', t: x.name+' — '+fmtAmt(x.due)+' due' }));
  if (uaOut>0) alerts.push({ r:'amber', t:'UA outstanding — '+fmtAmt(uaOut) });
  topCats.forEach(([c,v])=>{ if(budgets[c]&&v>budgets[c]) alerts.push({ r:'amber', t:c+' over budget — '+fmtAmt(v)+'/'+fmtAmt(budgets[c]) }); });
  if (gap80C>0 && month>=1 && month<=2) alerts.push({ r:'blue', t:'80C gap ₹'+Math.round(gap80C/1000)+'k — invest before 31 Mar' });

  const D = ({label,val,col,sub}) => (
    <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 10px'}}>
      <div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:3,textTransform:'uppercase',letterSpacing:'0.06em'}}>{label}</div>
      <div style={{fontSize:17,fontWeight:600,fontFamily:'var(--mono)',color:col||'var(--text)'}}>{val}</div>
      {sub&&<div style={{fontSize:9,color:'var(--text3)',marginTop:2}}>{sub}</div>}
    </div>
  );

  const Row = ({a,b,c,dim,red,grn,amb}) => (
    <div style={{display:'flex',justifyContent:'space-between',padding:'7px 12px',borderBottom:'1px solid var(--border)',fontSize:12,alignItems:'center'}}>
      <span style={{color:dim?'var(--text3)':'var(--text2)'}}>{a}</span>
      <div style={{display:'flex',gap:12,alignItems:'center'}}>
        {c&&<span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)'}}>{c}</span>}
        <span style={{fontFamily:'var(--mono)',fontWeight:600,color:red?'var(--red)':grn?'var(--green)':amb?'var(--amber)':'var(--text)'}}>{b}</span>
      </div>
    </div>
  );

  const Hdr = ({t,v,col}) => (
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',borderBottom:'1px solid var(--border)',background:'var(--bg3)'}}>
      <span style={{fontSize:10,fontWeight:600,fontFamily:'var(--mono)',letterSpacing:'0.08em',color:'var(--text3)',textTransform:'uppercase'}}>{t}</span>
      {v&&<span style={{fontSize:11,fontFamily:'var(--mono)',fontWeight:600,color:col||'var(--text)'}}>{v}</span>}
    </div>
  );

  const Card = ({children}) => (
    <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,overflow:'hidden',marginBottom:8}}>{children}</div>
  );

  return (
    <div className="fade-in" style={{padding:'8px 12px'}}>

      {/* ── ALERTS — compact pills */}
      {alerts.length>0 && (
        <div style={{display:'flex',flexDirection:'column',gap:4,marginBottom:8}}>
          {alerts.map((a,i)=>(
            <div key={i} style={{background:a.r==='red'?'var(--red-bg)':a.r==='blue'?'var(--blue-bg)':'var(--amber-bg)',border:'1px solid '+(a.r==='red'?'#3a0a0a':a.r==='blue'?'#0a1a3a':'#3a2500'),borderRadius:6,padding:'6px 10px',fontSize:11,color:a.r==='red'?'var(--red)':a.r==='blue'?'var(--blue)':'var(--amber)',fontFamily:'var(--mono)'}}>
              {a.r==='red'?'⚠ ':a.r==='blue'?'◈ ':'● '}{a.t}
            </div>
          ))}
        </div>
      )}

      {/* ── TOP 4 METRICS */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:8}}>
        <D label="Liquid balance" val={fmtAmt(liquid)} grn/>
        <D label="Available Today" val={fmtAmt(spendable)} col={spendable<10000?'var(--red)':spendable<30000?'var(--amber)':'var(--green)'} sub="liquid − CC − provisions"/>
        <D label={MONTHS[month]+' income'} val={income>0?fmtAmt(income):'—'} col="var(--green)"/>
        <D label={MONTHS[month]+' expense'} val={expense>0?fmtAmt(expense):'—'} col="var(--red)"/>
      </div>

      {/* ── BANKS + CC in one card */}
      <Card>
        <Hdr t="Accounts" v={fmtAmt(liquid)} col="var(--green)"/>
        {allBanks.map(a=>{
          const b=balances[a]||0;
          return <Row key={a} a={a} b={fmtAmt(b)} grn={b>0} red={b<0}/>;
        })}
        {ccDues.length>0 && (
          <>
            <div style={{padding:'5px 12px',background:'var(--bg3)',fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',letterSpacing:'0.06em',borderTop:'1px solid var(--border)',borderBottom:'1px solid var(--border)'}}>CC PAYABLE</div>
            {ccDues.map(x=><Row key={x.name} a={x.name} b={fmtAmt(x.due)} amb/>)}
            <div style={{padding:'6px 12px',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between',fontSize:11,fontFamily:'var(--mono)'}}>
              <span style={{color:'var(--text3)'}}>Total payable</span>
              <span style={{color:'var(--amber)',fontWeight:600}}>{fmtAmt(totalCC)}</span>
            </div>
          </>
        )}
      </Card>

      {/* ── EXPENSE + BUDGET in one card */}
      {topCats.length>0 && (
        <Card>
          <Hdr t={MONTHS[month]+' spend'} v={fmtAmt(expense)} col="var(--red)"/>
          {topCats.map(([c,v])=>{
            const lim=budgets[c]||0;
            const over=lim>0&&v>lim;
            const pct=lim>0?Math.min(Math.round(v/lim*100),100):0;
            return (
              <div key={c} style={{padding:'7px 12px',borderBottom:'1px solid var(--border)'}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:lim>0?3:0}}>
                  <span style={{color:'var(--text2)'}}>{c}</span>
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    {lim>0&&<span style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)'}}>{fmtAmt(lim)}</span>}
                    <span style={{fontFamily:'var(--mono)',fontWeight:600,color:over?'var(--red)':pct>=80?'var(--amber)':'var(--text)'}}>{fmtAmt(v)}</span>
                    {over&&<span style={{fontSize:9,color:'var(--red)',fontFamily:'var(--mono)'}}>OVER</span>}
                  </div>
                </div>
                {lim>0&&<div style={{background:'var(--bg3)',borderRadius:2,height:3}}><div style={{height:3,borderRadius:2,width:pct+'%',background:over?'var(--red)':pct>=80?'var(--amber)':'var(--blue)'}}/></div>}
              </div>
            );
          })}
          {topCats.length===0&&<div style={{padding:'12px',fontSize:11,color:'var(--text3)',textAlign:'center',fontFamily:'var(--mono)'}}>No expenses this month</div>}
        </Card>
      )}

      {/* ── UA outstanding — only if exists */}
      {uaOut>0 && (
        <Card>
          <Hdr t="UA outstanding" v={fmtAmt(uaOut)} col="var(--amber)"/>
          <Row a="Personal money at site" b={fmtAmt(uaExp)} amb/>
          <Row a="Recovered" b={'−'+fmtAmt(uaRecv)} grn/>
          <div style={{padding:'6px 12px',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between',fontSize:12,fontWeight:600}}>
            <span style={{color:'var(--text3)'}}>Outstanding</span>
            <span style={{fontFamily:'var(--mono)',color:'var(--amber)'}}>{fmtAmt(uaOut)}</span>
          </div>
        </Card>
      )}

      {/* ── IT DEDUCTIONS — compact 2-col */}
      <Card>
        <Hdr t={'IT deductions FY'+year+'-'+(year+1).toString().slice(2)} v={taxSave>0?'Save '+fmtAmt(taxSave):undefined} col="var(--green)"/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr'}}>
          {[
            {s:'80C',u:it80C,l:150000,lbl:'LIC+Edu+ELSS'},
            {s:'80D',u:it80D,l:50000, lbl:'Mediclaim'},
          ].map((it,i)=>{
            const pct=Math.round(it.u/it.l*100);
            const full=it.u>=it.l;
            return (
              <div key={it.s} style={{padding:'9px 12px',borderBottom:'1px solid var(--border)',borderRight:i===0?'1px solid var(--border)':'none'}}>
                <div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:3}}>{it.s} · {it.lbl}</div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:4}}>
                  <span style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:600,color:full?'var(--green)':'var(--text)'}}>{fmtAmt(it.u)}</span>
                  <span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)'}}>/{fmtAmt(it.l)}</span>
                </div>
                <div style={{background:'var(--bg3)',borderRadius:2,height:3}}><div style={{height:3,borderRadius:2,width:Math.min(pct,100)+'%',background:full?'var(--green)':'var(--blue)'}}/></div>
                {!full&&<div style={{fontSize:9,color:'var(--amber)',fontFamily:'var(--mono)',marginTop:3}}>gap {fmtAmt(Math.max(0,it.l-it.u))}</div>}
              </div>
            );
          })}
        </div>
      </Card>

      {/* ── CASHFLOW — only if income exists */}
      {income>0 && (
        <Card>
          <Hdr t="Next month estimate"/>
          <Row a="Income (expected)" b={'+'+fmtAmt(income)} grn/>
          <Row a="CC dues" b={'−'+fmtAmt(totalCC)} red/>
          <Row a="Variable (this mo.)" b={'−'+fmtAmt(Math.round(expense*0.85))} amb dim/>
          <div style={{padding:'7px 12px',display:'flex',justifyContent:'space-between',fontSize:12,fontWeight:600}}>
            <span style={{color:'var(--text3)'}}>Est. surplus</span>
            <span style={{fontFamily:'var(--mono)',color:income-totalCC-expense*0.85>0?'var(--green)':'var(--red)'}}>
              {fmtAmt(income-totalCC-Math.round(expense*0.85))}
            </span>
          </div>
        </Card>
      )}

    </div>
  );
}

// ── UDHARI SCREEN ────────────────────────────────────
function UdhariScreen({ udhari, onAdd, onDelete, allAccounts, allBanks }) {
  const [view, setView]       = useState('list');   // 'list' | 'add' | 'person'
  const [selPerson, setSelPerson] = useState(null);
  const [form, setForm]       = useState({
    person_name: '', amount: '', direction: 'given',
    mode: 'Cash', notes: '', txn_date: new Date().toISOString().slice(0,10)
  });
  const [saving, setSaving]   = useState(false);

  const todayStr = new Date().toISOString().slice(0,10);

  // Person-wise summary
  const persons = {};
  udhari.forEach(u => {
    if (!persons[u.person_name]) persons[u.person_name] = { given:0, received:0, entries:[] };
    if (u.direction === 'given')    persons[u.person_name].given    += u.amount;
    if (u.direction === 'received') persons[u.person_name].received += u.amount;
    persons[u.person_name].entries.push(u);
  });
  const personList = Object.entries(persons)
    .map(([name, d]) => ({ name, outstanding: d.given - d.received, given: d.given, received: d.received, entries: d.entries }))
    .sort((a,b) => b.outstanding - a.outstanding);
  const totalOut = personList.reduce((s,p) => s + Math.max(0,p.outstanding), 0);

  const handleAdd = async () => {
    if (!form.person_name.trim() || !form.amount || parseFloat(form.amount) <= 0) return;
    setSaving(true);
    await onAdd({
      person_name: form.person_name.trim(),
      amount:      parseFloat(form.amount),
      direction:   form.direction,
      mode:        form.mode,
      notes:       form.notes,
      created_at:  form.txn_date + 'T06:30:00.000Z',
    });
    setForm({ person_name:'', amount:'', direction:'given', mode:'Cash', notes:'', txn_date: todayStr });
    setSaving(false);
    setView('list');
  };

  const iStyle = { background:'var(--bg3)', border:'1px solid var(--border2)', borderRadius:8,
    padding:'9px 12px', color:'var(--text)', fontFamily:'var(--mono)', fontSize:13, outline:'none', width:'100%' };

  // ── PERSON DETAIL VIEW
  if (view === 'person' && selPerson) {
    const p = persons[selPerson];
    const entries = (p?.entries || []).sort((a,b) => new Date(b.created_at)-new Date(a.created_at));
    const outstanding = (p?.given||0) - (p?.received||0);
    return (
      <div className="fade-in" style={{paddingBottom:8}}>
        <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',borderBottom:'1px solid var(--border)'}}>
          <div onClick={()=>setView('list')} style={{cursor:'pointer',color:'var(--blue)',fontFamily:'var(--mono)',fontSize:12}}>← Back</div>
          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:600}}>{selPerson}</div>
            <div style={{fontSize:11,color:outstanding>0?'var(--amber)':outstanding<0?'var(--green)':'var(--text3)',fontFamily:'var(--mono)'}}>
              {outstanding>0 ? 'owes you '+fmtAmt(outstanding) : outstanding<0 ? 'you owe '+fmtAmt(Math.abs(outstanding)) : 'settled ✓'}
            </div>
          </div>
          <div onClick={()=>{ setForm(f=>({...f,person_name:selPerson})); setView('add'); }}
            style={{background:'var(--green)',color:'#000',fontFamily:'var(--mono)',fontSize:11,fontWeight:600,padding:'6px 12px',borderRadius:6,cursor:'pointer'}}>
            + Entry
          </div>
        </div>
        {/* Summary */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,padding:'10px 16px',borderBottom:'1px solid var(--border)'}}>
          {[['Given',fmtAmt(p?.given||0),'var(--amber)'],['Received',fmtAmt(p?.received||0),'var(--green)'],['Balance',fmtAmt(Math.abs(outstanding)),outstanding>0?'var(--red)':'var(--green)']].map(([l,v,c])=>(
            <div key={l} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 10px',textAlign:'center'}}>
              <div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:3}}>{l.toUpperCase()}</div>
              <div style={{fontSize:14,fontWeight:600,fontFamily:'var(--mono)',color:c}}>{v}</div>
            </div>
          ))}
        </div>
        {/* Entry list */}
        {entries.map((e,i)=>(
          <div key={e.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 16px',borderBottom:'1px solid var(--border)'}}>
            <div>
              <div style={{fontSize:12,color:e.direction==='given'?'var(--amber)':'var(--green)',fontFamily:'var(--mono)',fontWeight:600}}>
                {e.direction==='given'?'▲ Diya':'▼ Wapas'} — {fmtAmt(e.amount)}
              </div>
              <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{fmtDate(e.created_at)} · {e.mode}{e.notes?' · '+e.notes:''}</div>
            </div>
            <button onClick={()=>onDelete(e.id)} style={{background:'none',border:'1px solid var(--border)',borderRadius:6,color:'var(--text3)',padding:'4px 8px',fontSize:10,fontFamily:'var(--mono)',cursor:'pointer'}}>✕</button>
          </div>
        ))}
        {entries.length===0 && <div className="empty">No entries yet</div>}
      </div>
    );
  }

  // ── ADD ENTRY VIEW
  if (view === 'add') {
    return (
      <div className="fade-in" style={{padding:'12px 16px',display:'flex',flexDirection:'column',gap:12}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div onClick={()=>setView('list')} style={{cursor:'pointer',color:'var(--blue)',fontFamily:'var(--mono)',fontSize:12}}>← Back</div>
          <span style={{fontSize:13,fontWeight:600}}>New Udhari Entry</span>
        </div>

        <div>
          <p className="sec-label" style={{marginBottom:6}}>Direction</p>
          <div className="chip-row">
            <div className={'chip'+(form.direction==='given'?' sel-amber':'')} onClick={()=>setForm(f=>({...f,direction:'given'}))}>▲ Maine diya</div>
            <div className={'chip'+(form.direction==='received'?' sel':'')} onClick={()=>setForm(f=>({...f,direction:'received'}))}>▼ Mujhe mila (wapas)</div>
          </div>
        </div>

        <div>
          <p className="sec-label" style={{marginBottom:6}}>Person ka naam</p>
          <input style={iStyle} placeholder="e.g. Rajesh Senghani" value={form.person_name}
            onChange={e=>setForm(f=>({...f,person_name:e.target.value}))} />
        </div>

        <div style={{display:'flex',gap:8}}>
          <div style={{flex:1}}>
            <p className="sec-label" style={{marginBottom:6}}>Amount (₹)</p>
            <input style={iStyle} type="number" placeholder="0" value={form.amount}
              onChange={e=>setForm(f=>({...f,amount:e.target.value}))} />
          </div>
          <div style={{flex:1}}>
            <p className="sec-label" style={{marginBottom:6}}>Date</p>
            <input style={{...iStyle,color:form.txn_date!==todayStr?'var(--amber)':'var(--text)'}}
              type="date" value={form.txn_date} max={todayStr}
              onChange={e=>setForm(f=>({...f,txn_date:e.target.value}))} />
          </div>
        </div>

        <div>
          <p className="sec-label" style={{marginBottom:6}}>Mode</p>
          <div className="chip-row">
            {['Cash',...allBanks].map(a=>(
              <div key={a} className={'chip'+(form.mode===a?' sel':'')} onClick={()=>setForm(f=>({...f,mode:a}))}>{a}</div>
            ))}
          </div>
        </div>

        <div>
          <p className="sec-label" style={{marginBottom:6}}>Notes (optional)</p>
          <input style={iStyle} placeholder="e.g. rickshaw ke liye" value={form.notes}
            onChange={e=>setForm(f=>({...f,notes:e.target.value}))} />
        </div>

        <button onClick={handleAdd} disabled={saving||!form.person_name.trim()||!form.amount}
          style={{background:saving||!form.person_name.trim()||!form.amount?'var(--bg3)':'var(--green)',
            border:'none',borderRadius:8,color:saving||!form.person_name.trim()||!form.amount?'var(--text3)':'#000',
            fontFamily:'var(--mono)',fontSize:13,fontWeight:600,padding:14,cursor:'pointer',transition:'all 0.2s'}}>
          {saving ? 'Saving...' : `Save — ${form.direction==='given'?'Diya':'Wapas'} ₹${form.amount||0}`}
        </button>
      </div>
    );
  }

  // ── LIST VIEW — all persons
  return (
    <div className="fade-in" style={{paddingBottom:8}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',borderBottom:'1px solid var(--border)'}}>
        <div>
          <div style={{fontSize:13,fontWeight:600}}>Udhari Ledger</div>
          <div style={{fontSize:11,color:'var(--amber)',fontFamily:'var(--mono)',marginTop:2}}>
            Total outstanding — {fmtAmt(totalOut)}
          </div>
        </div>
        <div onClick={()=>{ setForm(f=>({...f,person_name:''})); setView('add'); }}
          style={{background:'var(--green)',color:'#000',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:'8px 14px',borderRadius:8,cursor:'pointer'}}>
          + New
        </div>
      </div>

      {personList.length === 0 && (
        <div className="empty">
          Koi udhari nahi hai abhi.<br/>
          "+ New" dabao pehli entry karne ke liye.
        </div>
      )}

      {personList.map(p => (
        <div key={p.name} onClick={()=>{ setSelPerson(p.name); setView('person'); }}
          style={{display:'flex',justifyContent:'space-between',alignItems:'center',
            padding:'12px 16px',borderBottom:'1px solid var(--border)',cursor:'pointer'}}>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{p.name}</div>
            <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:3}}>
              Diya {fmtAmt(p.given)}
              {p.received>0 && <span style={{color:'var(--green)'}}> · Wapas {fmtAmt(p.received)}</span>}
            </div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:14,fontWeight:600,fontFamily:'var(--mono)',
              color: p.outstanding>0?'var(--amber)':p.outstanding<0?'var(--green)':'var(--text3)'}}>
              {p.outstanding>0 ? fmtAmt(p.outstanding) : p.outstanding<0 ? '−'+fmtAmt(Math.abs(p.outstanding)) : '✓ Settled'}
            </div>
            <div style={{fontSize:9,color:'var(--text3)',marginTop:2}}>{p.outstanding>0?'owes you':p.outstanding<0?'you owe':'clear'}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── RECURRING ITEM ROW — outside ChecklistScreen to avoid remount bug ──
function RecItem({ rec, cl, onTick, allAccounts, allBanks }) {
  const [open,     setOpen]    = useState(false);
  const [payAmt,   setPayAmt]  = useState('');
  const [payAcct,  setPayAcct] = useState(rec.account || 'Cash');
  const [saving,   setSaving]  = useState(false);

  const isPaid = cl?.status === 'paid';
  const isVar  = !rec.amount || parseFloat(rec.amount) === 0;

  const chipS = (active) => ({
    display:'inline-block',
    border: active ? '1px solid var(--green)' : '1px solid var(--border2)',
    borderRadius:16, padding:'5px 10px', fontFamily:'var(--mono)', fontSize:10,
    color: active ? 'var(--green)' : 'var(--text2)',
    background: active ? 'var(--green-bg)' : 'var(--bg2)',
    cursor:'pointer', userSelect:'none', margin:'0 4px 4px 0',
  });

  const handlePay = async () => {
    const amt = parseFloat(payAmt) || parseFloat(rec.amount) || 0;
    if (!amt) return;
    setSaving(true);
    await onTick(rec, cl, amt, payAcct);
    setSaving(false);
    setOpen(false);
    setPayAmt('');
  };

  return (
    <div style={{borderBottom:'1px solid var(--border)',background:isPaid?'var(--green-bg)':'var(--bg2)'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px'}}>
        {/* Checkbox */}
        <div
          onClick={() => !isPaid && setOpen(o=>!o)}
          style={{width:22,height:22,borderRadius:6,flexShrink:0,cursor:isPaid?'default':'pointer',
            border: isPaid ? '1.5px solid var(--green)' : open ? '1.5px solid var(--blue)' : '1.5px solid var(--border2)',
            background: isPaid ? 'var(--green)' : 'none',
            display:'flex',alignItems:'center',justifyContent:'center'}}>
          {isPaid && <span style={{color:'#000',fontSize:11,fontWeight:700}}>✓</span>}
          {!isPaid && open && <span style={{color:'var(--blue)',fontSize:14}}>−</span>}
        </div>
        {/* Name + amount */}
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:13,color:isPaid?'var(--text3)':'var(--text)',
              textDecoration:isPaid?'line-through':'none',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
              {rec.name}
            </span>
            <span style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:600,flexShrink:0,marginLeft:8,
              color:isPaid?'var(--green)':isVar?'var(--text3)':'var(--text)'}}>
              {isPaid ? fmtAmt(cl.amount_paid||rec.amount||0) : isVar ? 'variable' : fmtAmt(rec.amount)}
            </span>
          </div>
          <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:2,display:'flex',gap:8,flexWrap:'wrap'}}>
            {rec.due_day && <span>due {rec.due_day}{['','st','nd','rd'][rec.due_day]||'th'}</span>}
            {rec.account && <span>{rec.account}</span>}
            {rec.category && <span>{rec.category}</span>}
            {isPaid && cl.paid_at && <span style={{color:'var(--green)'}}>paid {fmtDate(cl.paid_at)}</span>}
          </div>
        </div>
      </div>

      {/* Payment form — expands below */}
      {open && !isPaid && (
        <div style={{padding:'0 14px 12px',display:'flex',flexDirection:'column',gap:8}}>
          {/* Amount */}
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <div style={{background:'var(--bg3)',border:'1px solid var(--blue)',borderRadius:8,
              padding:'8px 12px',display:'flex',alignItems:'center',gap:6,flex:1}}>
              <span style={{color:'var(--text3)',fontFamily:'var(--mono)'}}>₹</span>
              <input
                type="number" inputMode="decimal"
                placeholder={rec.amount||'Enter amount'}
                value={payAmt}
                onChange={e => setPayAmt(e.target.value)}
                style={{flex:1,background:'none',border:'none',outline:'none',
                  color:'var(--green)',fontFamily:'var(--mono)',fontSize:16,fontWeight:600}}
              />
            </div>
          </div>
          {/* Account */}
          <div>
            <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:5}}>PAID FROM</div>
            <div style={{display:'flex',flexWrap:'wrap'}}>
              {allAccounts.map(a => (
                <span key={a} style={chipS(payAcct===a)} onClick={() => setPayAcct(a)}>{a}</span>
              ))}
            </div>
          </div>
          {/* Confirm */}
          <button onClick={handlePay} disabled={saving || !payAmt}
            style={{background:saving||!payAmt?'var(--bg3)':'var(--green)',border:'none',
              borderRadius:8,color:saving||!payAmt?'var(--text3)':'#000',
              fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:10,cursor:'pointer'}}>
            {saving ? 'Saving...' : `Mark paid — ${fmtAmt(parseFloat(payAmt)||0)} from ${payAcct}`}
          </button>
        </div>
      )}
    </div>
  );
}

// ── CHECKLIST SCREEN ─────────────────────────────────
function ChecklistScreen({ recurring, checklist, onTick, onAdd, onDelete, allAccounts, allBanks, allCC, allCategories, balances }) {
  const now   = new Date();
  const month = now.getMonth() + 1;
  const year  = now.getFullYear();
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const FREQS = [
    {k:'monthly',    l:'Monthly'},
    {k:'bimonthly',  l:'Every 2 months'},
    {k:'quarterly',  l:'Quarterly'},
    {k:'half_yearly',l:'Half-yearly'},
    {k:'annual',     l:'Annual'},
  ];

  const [addOpen, setAddOpen] = useState(false);
  const [addType, setAddType] = useState('expense'); // expense | provision | cc
  const [form, setForm] = useState({
    name:'', amount:'', frequency:'monthly', due_day:1,
    due_month:'', due_month2:'', account:'Cash',
    provision_account:'YB', category:'', notes:'', active:true
  });
  const [saving, setSaving] = useState(false);

  const iStyle = {
    background:'var(--bg3)', border:'1px solid var(--border2)', borderRadius:8,
    padding:'9px 12px', color:'var(--text)', fontFamily:'var(--mono)', fontSize:12, outline:'none', width:'100%'
  };
  const chipS = (active) => ({
    display:'inline-block',
    border: active ? '1px solid var(--green)' : '1px solid var(--border2)',
    borderRadius:16, padding:'6px 12px', fontFamily:'var(--mono)', fontSize:11,
    color: active ? 'var(--green)' : 'var(--text2)',
    background: active ? 'var(--green-bg)' : 'var(--bg2)',
    cursor:'pointer', userSelect:'none', margin:'0 4px 4px 0',
  });

  // Get checklist status for a recurring item
  const getCL = (recId) => checklist.find(c => c.recurring_id === recId);

  // Check if recurring item is due this month
  const isDueThisMonth = (r) => {
    if (!r.active && r.active !== undefined) return false;
    if (r.frequency === 'monthly') return true;
    if (r.frequency === 'bimonthly') {
      const startM = r.due_month || 1;
      return (month - startM) % 2 === 0 && month >= startM;
    }
    if (r.frequency === 'quarterly') {
      const startM = r.due_month || 1;
      return (month - startM) % 3 === 0 && month >= startM;
    }
    if (r.frequency === 'half_yearly') {
      return month === r.due_month || month === r.due_month2;
    }
    if (r.frequency === 'annual') return month === r.due_month;
    return false;
  };

  // Auto-generate CC dues as checklist items
  const ccItems = allCC
    .map(a => ({ balance: balances[a] || 0, name: a }))
    .filter(x => x.balance < 0)
    .map(x => ({
      id:       'cc-' + x.name,
      name:     x.name + ' bill payment',
      amount:   Math.abs(x.balance),
      frequency:'monthly',
      account:  allBanks.find(b=>b!=='Cash') || 'UB',
      category: 'Credit Card Bill',
      is_cc_payment: true,
      cc_name:  x.name,
      due_day:  null,
      active:   true,
    }));

  const activeItems = [
    ...ccItems,
    ...recurring.filter(isDueThisMonth),
  ];

  const paid    = activeItems.filter(r => getCL(r.id)?.status === 'paid');
  const pending = activeItems.filter(r => getCL(r.id)?.status !== 'paid');
  const pct     = activeItems.length > 0 ? Math.round(paid.length / activeItems.length * 100) : 0;

  const handleAdd = async () => {
    if (!form.name.trim()) return;
    setSaving(true);
    const entry = {
      name:               form.name.trim(),
      amount:             parseFloat(form.amount) || 0,
      frequency:          form.frequency,
      due_day:            parseInt(form.due_day) || 1,
      due_month:          form.due_month  ? parseInt(form.due_month)  : null,
      due_month2:         form.due_month2 ? parseInt(form.due_month2) : null,
      account:            addType === 'provision' ? (allBanks.find(b=>b!=='Cash')||'UB') : form.account,
      provision_account:  addType === 'provision' ? form.provision_account : null,
      category:           addType === 'provision' ? 'Provision' : form.category,
      notes:              form.notes,
      is_provision:       addType === 'provision',
      active:             true,
    };
    await onAdd(entry);
    setForm({name:'',amount:'',frequency:'monthly',due_day:1,due_month:'',due_month2:'',
      account:'Cash',provision_account:'YB',category:'',notes:'',active:true});
    setSaving(false);
    setAddOpen(false);
  };

  return (
    <div className="fade-in" style={{paddingBottom:8}}>

      {/* Header */}
      <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',background:'var(--bg2)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <div>
            <div style={{fontSize:13,fontWeight:600}}>{MONTHS[month-1]} {year} — Payments</div>
            <div style={{fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:2}}>
              {paid.length}/{activeItems.length} done
            </div>
          </div>
          <button onClick={() => setAddOpen(o=>!o)}
            style={{background:'var(--green)',border:'none',borderRadius:8,color:'#000',
              fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:'7px 14px',cursor:'pointer'}}>
            + Add
          </button>
        </div>
        {activeItems.length > 0 && (
          <div>
            <div style={{background:'var(--bg3)',borderRadius:3,height:6}}>
              <div style={{height:6,borderRadius:3,transition:'width 0.3s',
                background: pct===100?'var(--green)':pct>=70?'var(--blue)':'var(--amber)',
                width: pct+'%'}}/>
            </div>
            <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:3,textAlign:'right'}}>
              {pct}% complete
            </div>
          </div>
        )}
      </div>

      {/* Add form */}
      {addOpen && (
        <div style={{margin:'8px 12px',background:'var(--bg2)',border:'1px solid var(--blue)',borderRadius:10,padding:'14px'}}>
          <p style={{fontSize:11,color:'var(--blue)',fontFamily:'var(--mono)',margin:'0 0 10px',fontWeight:600,letterSpacing:'0.06em'}}>

              Provision = set money aside for future payment.<br/>
              e.g. LIC ₹5,748 in Oct → save ₹958/month in YB<br/>
              Transfer from UB → YB monthly as provision.
            </div>
          )}

          <div style={{display:'flex',gap:8,marginBottom:8}}>
            <input style={{...iStyle,flex:2}} placeholder={addType==='provision'?'e.g. LIC Premium Oct provision':'e.g. Society maintenance'}
              value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} />
            <input style={{...iStyle,flex:1}} type="number" placeholder={addType==='provision'?'Monthly amt':'₹ (0=variable)'}
              value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} />
          </div>

          <div style={{marginBottom:8}}>
            <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:5}}>FREQUENCY</div>
            <div style={{display:'flex',flexWrap:'wrap'}}>
              {FREQS.map(({k,l})=>(

              ))}

          <div style={{display:'flex',gap:8,marginBottom:8}}>
            <div style={{flex:1}}>

              <input style={iStyle} type="number" min="1" max="31" value={form.due_day}
                onChange={e=>setForm(f=>({...f,due_day:e.target.value}))} />
            </div>
            {['annual','half_yearly','quarterly','bimonthly'].includes(form.frequency) && (
              <div style={{flex:1}}>
                <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>
                  {form.frequency==='half_yearly'?'1st MONTH':'DUE MONTH (1-12)'}
                </div>
                <input style={iStyle} type="number" min="1" max="12" placeholder="e.g. 10"
                  value={form.due_month} onChange={e=>setForm(f=>({...f,due_month:e.target.value}))} />
              </div>
            )}
            {form.frequency==='half_yearly' && (
              <div style={{flex:1}}>
                <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>2ND MONTH</div>
                <input style={iStyle} type="number" min="1" max="12" placeholder="e.g. 4"
                  value={form.due_month2} onChange={e=>setForm(f=>({...f,due_month2:e.target.value}))} />
              </div>
            )}
          </div>

          {addType === 'provision' ? (
            <div style={{marginBottom:8}}>
              <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:5}}>TRANSFER FROM (source account)</div>
              <div style={{display:'flex',flexWrap:'wrap'}}>
                {allBanks.filter(b=>b!=='Cash').map(a=>(
                  <span key={a} style={chipS(form.account===a)} onClick={()=>setForm(f=>({...f,account:a}))}>{a}</span>
                ))}
              </div>
              <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:8,marginBottom:5}}>SAVE INTO (provision account)</div>
              <div style={{display:'flex',flexWrap:'wrap'}}>
                {allBanks.filter(b=>b!=='Cash').map(a=>(
                  <span key={a} style={chipS(form.provision_account===a)} onClick={()=>setForm(f=>({...f,provision_account:a}))}>{a}</span>
                ))}
              </div>
            </div>
          ) : (
            <div style={{marginBottom:8}}>
              <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:5}}>DEFAULT ACCOUNT</div>
              <div style={{display:'flex',flexWrap:'wrap'}}>
                {allAccounts.map(a=>(
                  <span key={a} style={chipS(form.account===a)} onClick={()=>setForm(f=>({...f,account:a}))}>{a}</span>
                ))}

          <input style={{...iStyle,marginBottom:8}} placeholder="Category (optional)"

          <div style={{display:'flex',gap:8}}>
            <button onClick={handleAdd} disabled={saving||!form.name.trim()}

              {saving?'Saving...':'Save'}

            <button onClick={()=>setAddOpen(false)}
              style={{background:'none',border:'1px solid var(--border2)',borderRadius:8,
                color:'var(--text3)',padding:'12px 16px',fontFamily:'var(--mono)',fontSize:12,cursor:'pointer'}}>
              Cancel

          </div>
        </div>
      )}

      {/* Pending items */}
      {pending.length > 0 && (
        <>
          <p className="sec-label" style={{color:'var(--amber)'}}>Pending — {pending.length}</p>
          {pending.map(rec => (
            <RecItem key={rec.id} rec={rec} cl={getCL(rec.id)}

      {/* Paid items */}
      {paid.length > 0 && (
        <>
          <p className="sec-label">Done — {paid.length}</p>
          {paid.map(rec => (
            <RecItem key={rec.id} rec={rec} cl={getCL(rec.id)}
              onTick={onTick} allAccounts={allAccounts} allBanks={allBanks} />
          ))}

      {activeItems.length === 0 && !addOpen && (
        <div className="empty">
          Koi payment this month nahi.<br/>
          "+ Add" se recurring items setup karo.<br/><br/>
          <span style={{fontSize:11,color:'var(--text3)'}}>
            CC bills automatically dikhenge agar CC balance negative ho.

      {/* All recurring items management */}
      {recurring.length > 0 && (
        <>
          <p className="sec-label" style={{marginTop:16}}>All recurring items</p>
          {recurring.map(rec => (
            <div key={rec.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
              padding:'9px 14px',borderBottom:'1px solid var(--border)',fontSize:12}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{rec.name}</div>
                <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:2}}>
                  {FREQS.find(f=>f.k===rec.frequency)?.l||rec.frequency} · {rec.account}
                  {rec.is_provision && <span style={{color:'var(--blue)',marginLeft:6}}>provision → {rec.provision_account}</span>}
                </div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
                <span style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--text2)'}}>
                  {rec.amount?fmtAmt(rec.amount):'var'}
                </span>
                <button onClick={()=>onDelete(rec.id)}
                  style={{background:'none',border:'1px solid var(--border)',borderRadius:5,
                    color:'var(--text3)',padding:'3px 8px',fontSize:10,fontFamily:'var(--mono)',cursor:'pointer'}}>
                  ✕
                </button>
              </div>
            </div>
          ))}
        </>
      )}
    </div>
  );
}

// ── PROVISION LEDGER SCREEN ──────────────────────────
function ProvisionLedger({ recurring, txns, allBanks, onAddTxn, showToast }) {
  const [sel, setSel]           = useState(null); // selected provision id
  const [withdrawAmt, setWAmt]  = useState('');
  const [withdrawNote, setWNote]= useState('');
  const [returnAmt, setRAmt]    = useState('');
  const [returnNote, setRNote]  = useState('');
  const [saving, setSaving]     = useState(false);

  const provisions = recurring.filter(r => r.is_provision && r.active !== false);
  const activeTxns = txns.filter(t => t.status !== 'voided');

  const getLedger = (prov) => {
    const deposits    = activeTxns.filter(t => t.type === 'Bank→Bank'
      && t.particulars && t.particulars.includes(prov.name));
    const withdrawals = activeTxns.filter(t => t.type === 'Bank→Bank'
      && t.particulars && t.particulars.includes('[WITHDRAW] ' + prov.name));
    const returns     = activeTxns.filter(t => t.type === 'Bank→Bank'
      && t.particulars && t.particulars.includes('[RETURN] ' + prov.name));

    const totalDeposited  = deposits.reduce((s,t) => s+(+t.amount),0);
    const totalWithdrawn  = withdrawals.reduce((s,t) => s+(+t.amount),0);
    const totalReturned   = returns.reduce((s,t) => s+(+t.amount),0);
    const balance         = totalDeposited - totalWithdrawn + totalReturned;

    // Schedule: how much should have been deposited by now
    const monthly   = parseFloat(prov.amount) || 0;
    const startDate = prov.start_date ? new Date(prov.start_date) : null;
    let expectedTotal = 0;
    if (startDate && monthly > 0) {
      const now      = new Date();
      const months   = (now.getFullYear()-startDate.getFullYear())*12 + (now.getMonth()-startDate.getMonth()) + 1;
      const duration = prov.duration_months || 999;
      expectedTotal  = Math.min(months, duration) * monthly;
    }
    const deficit = Math.max(0, expectedTotal - totalDeposited);

    return { deposits, withdrawals, returns, totalDeposited, totalWithdrawn, totalReturned, balance, expectedTotal, deficit };
  };

  const handleWithdraw = async (prov) => {
    const amt = parseFloat(withdrawAmt);
    if (!amt || !prov.provision_account) return;
    setSaving(true);
    await onAddTxn({
      type:         'Bank→Bank',
      amount:       amt,
      category:     'Provision',
      from_account: prov.provision_account,
      to_account:   prov.account || allBanks.find(b=>b!=='Cash') || 'UB',
      particulars:  '[WITHDRAW] ' + prov.name + (withdrawNote?' — '+withdrawNote:''),
      status:       'complete',
      source:       'provision',
      created_at:   new Date().toISOString(),
    });
    setWAmt(''); setWNote('');
    setSaving(false);
    showToast('↩ Withdrawal logged');
  };

  const handleReturn = async (prov) => {
    const amt = parseFloat(returnAmt);
    if (!amt || !prov.provision_account) return;
    setSaving(true);
    await onAddTxn({
      type:         'Bank→Bank',
      amount:       amt,
      category:     'Provision',
      from_account: prov.account || allBanks.find(b=>b!=='Cash') || 'UB',
      to_account:   prov.provision_account,
      particulars:  '[RETURN] ' + prov.name + (returnNote?' — '+returnNote:''),
      status:       'complete',
      source:       'provision',
      created_at:   new Date().toISOString(),
    });
    setRAmt(''); setRNote('');
    setSaving(false);
    showToast('✓ Return logged');
  };

  const iS = {background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,
    padding:'8px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',width:'100%'};

  if (provisions.length === 0) {
    return (
      <div className="empty">
        Koi provision setup nahi hai.<br/>
        Bills tab → + Add → "Provision (save up)" se setup karo.<br/><br/>
        <span style={{fontSize:11,color:'var(--text3)'}}>
          e.g. LIC Premium Oct · School Fees Jan · Car Down Payment
        </span>
      </div>
    );
  }

  return (
    <div className="fade-in" style={{paddingBottom:8}}>
      {provisions.map(prov => {
        const { deposits, withdrawals, returns,
          totalDeposited, totalWithdrawn, totalReturned,
          balance, expectedTotal, deficit } = getLedger(prov);
        const isOpen = sel === prov.id;
        const monthly = parseFloat(prov.amount) || 0;

        return (
          <div key={prov.id} style={{marginBottom:8}}>
            {/* Summary card */}
            <div style={{background:'var(--bg2)',border:`1px solid ${deficit>0?'var(--amber)':'var(--border)'}`,
              borderRadius:10,overflow:'hidden'}}>

              {/* Header */}
              <div onClick={() => setSel(isOpen ? null : prov.id)}
                style={{padding:'12px 14px',cursor:'pointer',
                  display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{prov.name}</div>
                  <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:2}}>
                    {monthly>0 ? fmtAmt(monthly)+'/month' : 'variable'} · {prov.account}→{prov.provision_account}
                  </div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontFamily:'var(--mono)',fontSize:16,fontWeight:600,
                    color:balance>0?'var(--green)':'var(--text3)'}}>
                    {fmtAmt(balance)}
                  </div>
                  <div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)'}}>balance</div>
                </div>
              </div>

              {/* Stats row */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',
                borderTop:'1px solid var(--border)'}}>
                {[
                  ['Deposited', fmtAmt(totalDeposited), 'var(--green)'],
                  ['Withdrawn', fmtAmt(totalWithdrawn), totalWithdrawn>0?'var(--red)':'var(--text3)'],
                  ['Returned',  fmtAmt(totalReturned),  totalReturned>0?'var(--blue)':'var(--text3)'],
                ].map(([l,v,c])=>(
                  <div key={l} style={{padding:'7px',textAlign:'center',borderRight:'1px solid var(--border)'}}>
                    <div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)'}}>{l.toUpperCase()}</div>
                    <div style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:c}}>{v}</div>
                  </div>
                ))}
              </div>

              {/* Schedule deficit alert */}
              {deficit > 0 && (
                <div style={{padding:'7px 14px',background:'var(--amber-bg)',borderTop:'1px solid var(--border)',
                  fontSize:11,color:'var(--amber)',fontFamily:'var(--mono)'}}>
                  ⚠ Behind schedule by {fmtAmt(deficit)} — expected {fmtAmt(expectedTotal)} deposited by now
                </div>
              )}

              {/* Withdrawal pending return */}
              {totalWithdrawn > totalReturned && (
                <div style={{padding:'7px 14px',background:'var(--red-bg)',borderTop:'1px solid var(--border)',
                  fontSize:11,color:'var(--red)',fontFamily:'var(--mono)'}}>
                  {fmtAmt(totalWithdrawn - totalReturned)} withdrawn — return pending to restore provision
                </div>
              )}

              {/* Expanded ledger */}
              {isOpen && (
                <div style={{borderTop:'1px solid var(--border)'}}>

                  {/* Transaction history */}
                  {[...deposits,...withdrawals,...returns]
                    .sort((a,b) => new Date(b.created_at)-new Date(a.created_at))
                    .map((t,i) => {
                      const isW = t.particulars?.includes('[WITHDRAW]');
                      const isR = t.particulars?.includes('[RETURN]');
                      return (
                        <div key={t.id||i} style={{display:'flex',justifyContent:'space-between',
                          padding:'8px 14px',borderBottom:'1px solid var(--border)',fontSize:11}}>
                          <div>
                            <div style={{color:isW?'var(--red)':isR?'var(--blue)':'var(--green)',
                              fontFamily:'var(--mono)'}}>
                              {isW?'↩ Withdrawn':isR?'↪ Returned':'↑ Deposited'}
                            </div>
                            <div style={{color:'var(--text3)',marginTop:2,fontSize:10}}>
                              {fmtDate(t.created_at)}
                            </div>
                          </div>
                          <span style={{fontFamily:'var(--mono)',fontWeight:600,
                            color:isW?'var(--red)':isR?'var(--blue)':'var(--green)'}}>
                            {isW?'−':'+' }{fmtAmt(t.amount)}
                          </span>
                        </div>
                      );
                    })
                  }
                  {deposits.length===0 && withdrawals.length===0 && (
                    <div style={{padding:'12px 14px',fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)'}}>
                      No transactions yet. Pay via Bills tab to deposit.
                    </div>
                  )}

                  {/* Withdraw form */}
                  <div style={{padding:'12px 14px',borderTop:'1px solid var(--border)',background:'var(--bg3)'}}>
                    <div style={{fontSize:10,color:'var(--red)',fontFamily:'var(--mono)',marginBottom:6,fontWeight:600}}>
                      WITHDRAW FROM PROVISION
                    </div>
                    <div style={{display:'flex',gap:6,marginBottom:6}}>
                      <input type="number" placeholder="Amount" value={withdrawAmt}
                        onChange={e=>setWAmt(e.target.value)} style={{...iS,flex:1}}/>
                      <input placeholder="Reason" value={withdrawNote}
                        onChange={e=>setWNote(e.target.value)} style={{...iS,flex:2}}/>
                    </div>
                    <button onClick={()=>handleWithdraw(prov)} disabled={saving||!withdrawAmt}
                      style={{width:'100%',background:saving||!withdrawAmt?'var(--bg2)':'var(--red-bg)',
                        border:'1px solid '+(saving||!withdrawAmt?'var(--border)':'var(--red)'),
                        borderRadius:6,color:saving||!withdrawAmt?'var(--text3)':'var(--red)',
                        fontFamily:'var(--mono)',fontSize:11,fontWeight:600,padding:'8px',cursor:'pointer'}}>
                      Record withdrawal from {prov.provision_account}
                    </button>
                  </div>

                  {/* Return form */}
                  {totalWithdrawn > totalReturned && (
                    <div style={{padding:'12px 14px',borderTop:'1px solid var(--border)',background:'var(--bg3)'}}>
                      <div style={{fontSize:10,color:'var(--blue)',fontFamily:'var(--mono)',marginBottom:6,fontWeight:600}}>
                        RETURN TO PROVISION — {fmtAmt(totalWithdrawn-totalReturned)} pending
                      </div>
                      <div style={{display:'flex',gap:6,marginBottom:6}}>
                        <input type="number" placeholder="Amount"
                          value={returnAmt} onChange={e=>setRAmt(e.target.value)} style={{...iS,flex:1}}/>
                        <input placeholder="Note" value={returnNote}
                          onChange={e=>setRNote(e.target.value)} style={{...iS,flex:2}}/>
                      </div>
                      <button onClick={()=>handleReturn(prov)} disabled={saving||!returnAmt}
                        style={{width:'100%',background:saving||!returnAmt?'var(--bg2)':'var(--blue-bg)',
                          border:'1px solid '+(saving||!returnAmt?'var(--border)':'var(--blue)'),
                          borderRadius:6,color:saving||!returnAmt?'var(--text3)':'var(--blue)',
                          fontFamily:'var(--mono)',fontSize:11,fontWeight:600,padding:'8px',cursor:'pointer'}}>
                        Return {returnAmt?fmtAmt(parseFloat(returnAmt)):''} to {prov.provision_account}
                      </button>
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── SETTINGS SCREEN ──────────────────────────────────
function SettingsScreen({ opening, onSave, allAccounts, customAccounts, onSaveAccounts, customCategories, onSaveCategories, budgets, onSaveBudgets }) {
  const [ob, setOb]             = useState({ ...opening });
  const [savedBal, setSavedBal] = useState(false);
  const [bg, setBg]             = useState({ ...budgets });

  // New account form
  const [newAccName, setNewAccName] = useState('');
  const [newAccType, setNewAccType] = useState('bank');

  // New category form
  const [newCatName, setNewCatName]   = useState('');
  const [newCatEmoji, setNewCatEmoji] = useState('');
  const [newCatIT, setNewCatIT]       = useState('');

  const handleSaveBal = async () => {
    await onSave(ob);
    setSavedBal(true);
    setTimeout(() => setSavedBal(false), 2000);
  };

  const addAccount = async () => {
    const name = newAccName.trim().toUpperCase();
    if (!name) return;
    if ([...ACCOUNTS, ...customAccounts.map(a=>a.name)].includes(name)) return;
    const updated = [...customAccounts, { name, type: newAccType }];
    await onSaveAccounts(updated);
    setOb(prev => ({ ...prev, [name]: newAccType === 'cc' ? 0 : 0 }));
    setNewAccName('');
  };

  const removeAccount = async (name) => {
    const updated = customAccounts.filter(a => a.name !== name);
    await onSaveAccounts(updated);
  };

  const addCategory = async () => {
    const name = newCatName.trim();
    if (!name) return;
    const updated = [...customCategories, { name, emoji: newCatEmoji || '•', it: newCatIT }];
    await onSaveCategories(updated);
    setNewCatName(''); setNewCatEmoji(''); setNewCatIT('');
  };

  const removeCategory = async (name) => {
    const updated = customCategories.filter(c => c.name !== name);
    await onSaveCategories(updated);
  };

  const inputStyle = { background:'var(--bg3)', border:'1px solid var(--border2)', borderRadius:8, padding:'9px 12px', color:'var(--text)', fontFamily:'var(--mono)', fontSize:12, outline:'none', width:'100%' };
  const smallBtn   = (col) => ({ background:'none', border:`1px solid ${col}`, borderRadius:6, color:col, padding:'6px 12px', fontFamily:'var(--mono)', fontSize:11, cursor:'pointer' });

  const DEFAULT_BUDGET_CATS = ['Household','Fuel','Food','Lifestyle','Maintenance','Travelling','Social','Donation','Child Education','Mobile Recharge'];
  const budgetCats = [...new Set([...DEFAULT_BUDGET_CATS, ...Object.keys(budgets)])];

  const handleSaveBudgets = async () => {
    await onSaveBudgets(bg);
  };

  return (
    <div className="fade-in">

      {/* ── CUSTOM ACCOUNTS ── */}
      <p className="sec-label">Accounts — Add New</p>
      <div style={{margin:'0 16px 12px',display:'flex',flexDirection:'column',gap:8}}>
        <input style={inputStyle} placeholder="Account name e.g. ICICI CC / KOTAK" value={newAccName} onChange={e=>setNewAccName(e.target.value.toUpperCase())} />
        <div style={{display:'flex',gap:8}}>
          <div className={'chip'+(newAccType==='bank'?' sel':'')} style={{flex:1,textAlign:'center'}} onClick={()=>setNewAccType('bank')}>Bank / Cash</div>
          <div className={'chip'+(newAccType==='cc'?' sel':'')} style={{flex:1,textAlign:'center'}} onClick={()=>setNewAccType('cc')}>Credit Card</div>
        </div>
        <button onClick={addAccount} style={{background:'var(--green)',border:'none',borderRadius:8,color:'#000',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:'10px',cursor:'pointer'}}>
          + Add Account
        </button>
      </div>

      {/* Custom accounts list */}
      {customAccounts.length > 0 && (
        <>
          <p className="sec-label">Custom Accounts</p>
          {customAccounts.map(a => (
            <div key={a.name} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 16px',borderBottom:'1px solid var(--border)'}}>
              <div>
                <span style={{fontFamily:'var(--mono)',fontSize:13}}>{a.name}</span>
                <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginLeft:8}}>{a.type === 'cc' ? 'Credit Card' : 'Bank'}</span>
              </div>
              <button onClick={()=>removeAccount(a.name)} style={smallBtn('var(--red)')}>Remove</button>
            </div>
          ))}
        </>
      )}

      {/* ── CUSTOM CATEGORIES ── */}
      <p className="sec-label" style={{marginTop:8}}>Categories — Add New</p>
      <div style={{margin:'0 16px 12px',display:'flex',flexDirection:'column',gap:8}}>
        <input style={inputStyle} placeholder="Category name e.g. Site Expense" value={newCatName} onChange={e=>setNewCatName(e.target.value)} />
        <div style={{display:'flex',gap:8}}>
          <input style={{...inputStyle,width:80,flexShrink:0}} placeholder="Emoji" value={newCatEmoji} onChange={e=>setNewCatEmoji(e.target.value)} maxLength={2} />
          <div style={{flex:1}}>
            <select value={newCatIT} onChange={e=>setNewCatIT(e.target.value)}
              style={{...inputStyle,width:'100%',appearance:'none'}}>
              <option value="">No IT section</option>
              <option value="80C">80C</option>
              <option value="80D">80D</option>
              <option value="80G">80G</option>
              <option value="80CCD">80CCD(1B) — NPS</option>
              <option value="24b">24(b) — Home loan interest</option>
              <option value="Declare">Declare in ITR</option>
            </select>
          </div>
        </div>
        <button onClick={addCategory} style={{background:'var(--blue)',border:'none',borderRadius:8,color:'#fff',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:'10px',cursor:'pointer'}}>
          + Add Category
        </button>
      </div>

      {/* Custom categories list */}
      {customCategories.length > 0 && (
        <>
          <p className="sec-label">Custom Categories</p>
          {customCategories.map(c => (
            <div key={c.name} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 16px',borderBottom:'1px solid var(--border)'}}>
              <div>
                <span style={{marginRight:6}}>{c.emoji}</span>
                <span style={{fontFamily:'var(--mono)',fontSize:13}}>{c.name}</span>
                {c.it && <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--green)',marginLeft:8}}>{c.it}</span>}
              </div>
              <button onClick={()=>removeCategory(c.name)} style={smallBtn('var(--red)')}>Remove</button>
            </div>
          ))}
        </>
      )}

      {/* ── MONTHLY BUDGETS ── */}
      <p className="sec-label" style={{marginTop:8}}>Monthly Budgets</p>
      <p style={{padding:'0 16px 8px',fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)'}}>
        Set limit per category. Dashboard shows red when exceeded, amber at 80%.
      </p>
      {budgetCats.map(c => (
        <div key={c} className="settings-row">
          <span style={{fontFamily:'var(--mono)',fontSize:12}}>{c}</span>
          <input type="number" style={{width:120,textAlign:'right'}} value={bg[c]||''} placeholder="no limit"
            onChange={e=>setBg(prev=>({...prev,[c]:parseFloat(e.target.value)||0}))} />
        </div>
      ))}
      <div style={{padding:'10px 16px 14px'}}>
        <button onClick={handleSaveBudgets}
          style={{background:'var(--blue)',border:'none',color:'#fff',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,borderRadius:8,padding:12,width:'100%',cursor:'pointer'}}>
          Save Budgets
        </button>
      </div>

      {/* ── OPENING BALANCES ── */}
      <p className="sec-label" style={{marginTop:4}}>Opening Balances — month start</p>
      <p style={{padding:'0 16px 10px',fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)'}}>
        CC me jo amount aap owe karte ho wo negative enter karo. e.g. SBI CC due ₹9,342 → -9342
      </p>

      {allAccounts.map(a => (
        <div key={a} className="settings-row">
          <span style={{fontFamily:'var(--mono)',fontSize:12}}>{a}</span>
          <input type="number" style={{width:120,textAlign:'right'}} value={ob[a]||''} placeholder="0"
            onChange={e=>setOb(prev=>({...prev,[a]:parseFloat(e.target.value)||0}))} />
        </div>
      ))}

      <div style={{padding:'14px 16px'}}>
        <button onClick={handleSaveBal}
          style={{background:savedBal?'var(--green-bg)':'var(--green)',border:savedBal?'1px solid var(--green)':'none',color:savedBal?'var(--green)':'#000',fontFamily:'var(--mono)',fontSize:13,fontWeight:600,borderRadius:10,padding:14,width:'100%',cursor:'pointer',transition:'all 0.2s'}}>
          {savedBal ? '✓ Saved' : 'Save Opening Balances'}
        </button>
      </div>

      <p className="sec-label">About</p>
      <div style={{padding:'0 16px 40px',fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',lineHeight:2}}>
        JB Finance v1.3<br/>
        Built for Jayesh Bhagat<br/>
        Umiya Associates · Mumbai
      </div>

    </div>
  );
}

// ── RENDER ───────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
