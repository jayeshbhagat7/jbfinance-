/* ── StatementScreen ── */
function StatementScreen({txns,allAccounts,allBanks,allCC,opening,balances,stmtFilters,setStmtFilters,setTxnFilters,setTab}){
  const [acct,setAcct]=useState(allBanks[0]||'');const [period,setPeriod]=useState('this_month');
  const [customStart,setCustomStart]=useState('');const [customEnd,setCustomEnd]=useState('');
  
  useEffect(()=>{if(stmtFilters){setAcct(stmtFilters.account);setPeriod(stmtFilters.period);setStmtFilters(null);}},[stmtFilters,setStmtFilters]);
  
  const now=new Date();const month=now.getMonth();const year=now.getFullYear();
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  
  const acctTxns=txns.filter(t=>t.status!=='voided').filter(t=>t.from_account===acct||t.to_account===acct).filter(t=>{const d=new Date(t.created_at);if(period==='this_month')return d.getMonth()===month&&d.getFullYear()===year;if(period==='last_month'){const lm=month===0?11:month-1,ly=month===0?year-1:year;return d.getMonth()===lm&&d.getFullYear()===ly;}if(period==='this_year')return d.getFullYear()===year;if(period==='custom'&&customStart&&customEnd){const ds=t.created_at.slice(0,10);return ds>=customStart&&ds<=customEnd;}return true;}).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  const beforePeriod=txns.filter(t=>t.status!=='voided').filter(t=>t.from_account===acct||t.to_account===acct).filter(t=>{if(period==='all')return false;const d=new Date(t.created_at);if(period==='this_month')return d<new Date(year,month,1);if(period==='last_month'){const lm=month===0?11:month-1,ly=month===0?year-1:year;return d<new Date(ly,lm,1);}if(period==='this_year')return d<new Date(year,0,1);if(period==='custom'&&customStart)return t.created_at.slice(0,10)<customStart;return false;});
  
  const rawOpen=opening[acct];const openingAmt=typeof rawOpen==='object'&&rawOpen!==null?(rawOpen.amount||0):(rawOpen||0);
  const openBal=openingAmt+beforePeriod.reduce((s,t)=>{const a=parseFloat(t.amount)||0;if(t.type==='Expense'||t.type==='UA Expense')return t.from_account===acct?s-a:s;if(t.type==='Income'||t.type==='UA Received')return t.to_account===acct?s+a:s;let e=0;if(t.from_account===acct)e-=a;if(t.to_account===acct)e+=a;return s+e;},0);
  
  const rows=acctTxns.map(t=>{const a=parseFloat(t.amount)||0;let deposit=0,withdrawal=0;if(t.type==='Income'||t.type==='UA Received'){if(t.to_account===acct)deposit=a;}else if(t.type==='Expense'||t.type==='UA Expense'){if(t.from_account===acct)withdrawal=a;}else{if(t.to_account===acct)deposit=a;if(t.from_account===acct)withdrawal=a;}return{...t,deposit,withdrawal};});
  
  const totDeposit=rows.reduce((s,r)=>s+r.deposit,0);const totWithdrawal=rows.reduce((s,r)=>s+r.withdrawal,0);const closeBal=openBal+totDeposit-totWithdrawal;
  const periodLabel=(()=>{if(period==='this_month')return`${MONTHS[month]} ${year}`;if(period==='last_month')return`${MONTHS[month===0?11:month-1]} ${month===0?year-1:year}`;if(period==='this_year')return`FY ${year}`;if(period==='custom'&&customStart&&customEnd)return`${customStart} to ${customEnd}`;return'All Time';})();
  const pMode=period==='custom'?'Custom':period==='this_month'?'This Month':period==='last_month'?'Last Month':period==='this_year'?'This Year':'All Time';
  
  const handlePrint=()=>{const html=`<!DOCTYPE html><html><head><title>${acct} Statement - ${periodLabel}</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:20px;}h1{font-size:14px;margin-bottom:4px;}h2{font-size:11px;font-weight:400;color:#666;margin-bottom:16px;}table{width:100%;border-collapse:collapse;margin-top:12px;}th,td{border:1px solid #ccc;padding:6px 8px;text-align:left;}th{background:#f5f5f5;font-weight:600;font-size:9px;text-transform:uppercase;}td{font-size:10px;}.amt{text-align:right;font-variant-numeric:tabular-nums;}.summary{margin-top:16px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}.summary div{border:1px solid #ccc;padding:8px;background:#fafafa;}.summary .label{font-size:8px;text-transform:uppercase;color:#666;margin-bottom:3px;}.summary .value{font-size:12px;font-weight:700;}.desc{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}</style></head><body><h1>${acct} — Bank Ledger</h1><h2>${periodLabel}</h2><div class="summary"><div><div class="label">Opening Balance</div><div class="value">₹${fmtAmt(Math.abs(openBal))}</div></div><div><div class="label">Total Deposits</div><div class="value">₹${fmtAmt(totDeposit)}</div></div><div><div class="label">Total Withdrawals</div><div class="value">₹${fmtAmt(totWithdrawal)}</div></div></div><table><thead><tr><th style="width:20%;">Date</th><th style="width:40%;">Description</th><th style="width:20%;">Deposit (₹)</th><th style="width:20%;">Withdrawal (₹)</th></tr></thead><tbody><tr style="background:#fff8e1;"><td colspan="2" style="font-weight:600;">OPENING BALANCE</td><td class="amt">${openBal>=0?fmtAmt(openBal):'—'}</td><td class="amt">${openBal<0?fmtAmt(Math.abs(openBal)):'—'}</td></tr>${rows.map(t=>`<tr><td>${fmtDate(t.created_at)}</td><td class="desc">${t.particulars||t.category||t.type}</td><td class="amt">${t.deposit>0?fmtAmt(t.deposit):'—'}</td><td class="amt">${t.withdrawal>0?fmtAmt(t.withdrawal):'—'}</td></tr>`).join('')}<tr style="background:#e8f5e9;font-weight:600;"><td colspan="2">CLOSING BALANCE</td><td class="amt">${closeBal>=0?fmtAmt(closeBal):'—'}</td><td class="amt">${closeBal<0?fmtAmt(Math.abs(closeBal)):'—'}</td></tr></tbody></table><div style="margin-top:16px;font-size:9px;color:#999;">Generated ${new Date().toLocaleString('en-IN')} · JB Finance v1.9.0</div></body></html>`;const w=window.open('','_blank');w.document.write(html);w.document.close();w.print();};
  const cS=a=>({display:'inline-block',border:a?'1px solid var(--green)':'1px solid var(--border2)',borderRadius:14,padding:'6px 12px',fontFamily:'var(--mono)',fontSize:11,color:a?'var(--green)':'var(--text2)',background:a?'var(--green-bg)':'var(--bg2)',cursor:'pointer',userSelect:'none',margin:'0 4px 4px 0'});
  
  return(<div className="fade-in">
    <p className="sec-label">Select Account</p><div style={{display:'flex',flexWrap:'wrap',padding:'0 16px 8px',gap:6}}>{[...allBanks,...allCC].map(a=><div key={a} style={cS(acct===a)} onClick={()=>setAcct(a)}>{a}</div>)}</div>
    <p className="sec-label">Period</p><div style={{display:'flex',flexWrap:'wrap',padding:'0 16px 8px',gap:6}}>{[['this_month','This Month'],['last_month','Last Month'],['this_year','This Year'],['custom','Custom'],['all','All Time']].map(([k,l])=><div key={k} style={cS(period===k)} onClick={()=>setPeriod(k)}>{l}</div>)}</div>
    {period==='custom'&&<div style={{padding:'0 16px 8px',display:'flex',gap:8,alignItems:'center'}}><input type="date" value={customStart} onChange={e=>setCustomStart(e.target.value)} style={{flex:1,background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'8px 10px',fontFamily:'var(--mono)',fontSize:11,color:'var(--text)'}}/><span style={{color:'var(--text3)',fontSize:11}}>to</span><input type="date" value={customEnd} onChange={e=>setCustomEnd(e.target.value)} style={{flex:1,background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'8px 10px',fontFamily:'var(--mono)',fontSize:11,color:'var(--text)'}}/></div>}
    
    <div style={{margin:'8px 16px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'12px 14px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',letterSpacing:'0.08em',textTransform:'uppercase'}}>{acct} — {periodLabel}</div>
        <button onClick={handlePrint} style={{background:'var(--blue)',color:'#fff',border:'none',borderRadius:6,padding:'5px 12px',fontFamily:'var(--mono)',fontSize:10,fontWeight:600,cursor:'pointer'}}>🖨 Print</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
        <div><div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',marginBottom:3}}>Opening</div><div style={{fontSize:13,fontWeight:600,fontFamily:'var(--mono)',color:openBal<0?'var(--red)':'var(--text)'}}>{openBal<0?'−':''}{fmtAmt(Math.abs(openBal))}</div></div>
        <div onClick={()=>{setTxnFilters({account:acct,type:'INCOME',periodMode:pMode,startDate:customStart,endDate:customEnd});setTab('txns');}} style={{cursor:'pointer'}}><div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',marginBottom:3}}>Deposits</div><div style={{fontSize:13,fontWeight:600,fontFamily:'var(--mono)',color:'var(--green)'}}>+{fmtAmt(totDeposit)}</div></div>
        <div onClick={()=>{setTxnFilters({account:acct,type:'EXPENSE',periodMode:pMode,startDate:customStart,endDate:customEnd});setTab('txns');}} style={{cursor:'pointer'}}><div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',marginBottom:3}}>Withdrawals</div><div style={{fontSize:13,fontWeight:600,fontFamily:'var(--mono)',color:'var(--red)'}}>−{fmtAmt(totWithdrawal)}</div></div>
      </div>
      <div style={{borderTop:'1px solid var(--border)',marginTop:8,paddingTop:8}}><div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',marginBottom:3}}>Closing Balance</div><div style={{fontSize:16,fontWeight:700,fontFamily:'var(--mono)',color:closeBal<0?'var(--red)':'var(--green)'}}>{closeBal<0?'−':''}{fmtAmt(Math.abs(closeBal))}</div></div>
    </div>
    
    {rows.length===0&&<div className="empty">No transactions for this account in this period.</div>}
    {rows.length>0&&<div style={{margin:'0 16px 24px',border:'1px solid var(--border)',borderRadius:10,overflow:'hidden'}}>
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:8,padding:'8px 12px',background:'var(--bg3)',borderBottom:'1px solid var(--border)'}}><span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',letterSpacing:'0.06em'}}>Description</span><span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',textAlign:'right'}}>Deposit</span><span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',textAlign:'right'}}>Withdrawal</span></div>
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:8,padding:'10px 12px',borderBottom:'1px solid var(--border)',background:'var(--amber-bg)'}}><div style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:'var(--text2)'}}>OPENING BALANCE</div><div style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:12,fontWeight:700,color:openBal>=0?'var(--green)':'var(--text3)'}}>{openBal>=0?fmtAmt(openBal):'—'}</div><div style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:12,fontWeight:700,color:openBal<0?'var(--red)':'var(--text3)'}}>{openBal<0?fmtAmt(Math.abs(openBal)):'—'}</div></div>
      {rows.map((t,i)=>(
        <div key={t.id} style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:8,padding:'10px 12px',borderBottom:'1px solid var(--border)',background:i%2===0?'var(--bg2)':'var(--bg)'}}>

          <div style={{textAlign:'right',flexShrink:0}}><div style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:600,color:t.deposit>0?'var(--green)':'var(--text3)'}}>{t.deposit>0?fmtAmt(t.deposit):'—'}</div></div>

    </div>}
  </div>);
}

/* ── CCBillScreen ── */
function CCBillScreen({txns,customAccounts,setTxnFilters,setTab}){
  const ccAccounts=[...SEED_CC,...(customAccounts||[]).filter(a=>a.type==='cc').map(a=>a.name)];
  const today=new Date();const todayStr=today.toISOString().slice(0,10);
  const getStmtDay=cc=>{try{const v=JSON.parse(localStorage.getItem('jbf_cc_stmt_days')||'{}');return parseInt(v[cc]||'1');}catch{return 1;}};
  const saveStmtDay=(cc,day)=>{try{const v=JSON.parse(localStorage.getItem('jbf_cc_stmt_days')||'{}');v[cc]=day;localStorage.setItem('jbf_cc_stmt_days',JSON.stringify(v));}catch{}};
  const getReconData=cc=>{try{const v=JSON.parse(localStorage.getItem('jbf_cc_reconciled')||'{}');return v[cc]||null;}catch{return null;}};
  const saveReconData=(cc,data)=>{try{const v=JSON.parse(localStorage.getItem('jbf_cc_reconciled')||'{}');v[cc]=data;localStorage.setItem('jbf_cc_reconciled',JSON.stringify(v));}catch{}};
  const [selCC,setSelCC]=useState(ccAccounts[0]||'');const [ccTab,setCCTab]=useState('unbilled');const [stmtDayStr,setStmtDayStr]=useState(()=>String(getStmtDay(ccAccounts[0]||'')));const [stmtAmt,setStmtAmt]=useState('');const [reconSaved,setReconSaved]=useState(false);const stmtDay=Math.max(1,Math.min(28,parseInt(stmtDayStr)||1));
  const handleSelCC=cc=>{setSelCC(cc);setStmtDayStr(String(getStmtDay(cc)));setStmtAmt('');setReconSaved(false);};
  const handleStmtDaySave=()=>{saveStmtDay(selCC,stmtDay);};
  const getLastStmtDate=()=>{const d=new Date(today.getFullYear(),today.getMonth(),stmtDay);if(d>today)return new Date(today.getFullYear(),today.getMonth()-1,stmtDay);return d;};
  const lastStmt=getLastStmtDate();const lastStmtStr=lastStmt.toISOString().slice(0,10);const nextStmt=new Date(lastStmt.getFullYear(),lastStmt.getMonth()+1,stmtDay);const stmtGenerated=lastStmt.getMonth()===today.getMonth()&&lastStmt.getFullYear()===today.getFullYear();const prevBillStart=new Date(lastStmt.getFullYear(),lastStmt.getMonth()-1,stmtDay);const prevBillStartStr=prevBillStart.toISOString().slice(0,10);
  const lastRecon=getReconData(selCC);const defaultBillStart=lastRecon?lastRecon.billEnd:prevBillStartStr;const defaultBillEnd=lastRecon?(()=>{const lastEnd=new Date(lastRecon.billEnd);const next=new Date(lastEnd.getFullYear(),lastEnd.getMonth()+1,stmtDay);return next.toISOString().slice(0,10);})():lastStmtStr;
  const [billStart,setBillStart]=useState(defaultBillStart);const [billEnd,setBillEnd]=useState(defaultBillEnd);
  React.useEffect(()=>{const r=getReconData(selCC);if(r){setBillStart(r.billEnd);const lastEnd=new Date(r.billEnd);const next=new Date(lastEnd.getFullYear(),lastEnd.getMonth()+1,stmtDay);setBillEnd(next.toISOString().slice(0,10));}else{setBillStart(prevBillStartStr);setBillEnd(lastStmtStr);}setReconSaved(false);},[selCC, stmtDay, prevBillStartStr, lastStmtStr]);
  const ccSpends=txns.filter(t=>t.status!=='voided'&&t.from_account===selCC&&(t.type==='Expense'||t.type==='UA Expense'));
  const unbilledFrom=lastRecon?lastRecon.billEnd:lastStmtStr;const unbilled=ccSpends.filter(t=>t.created_at.slice(0,10)>unbilledFrom);const unbilledTotal=unbilled.reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  const billed=ccSpends.filter(t=>{const d=t.created_at.slice(0,10);return d>billStart&&d<=billEnd;});const billedTotal=billed.reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  const sa=parseFloat(stmtAmt)||0;const diff=sa-billedTotal;const hasStmt=stmtAmt!==''&&sa>0;
  const handleSaveRecon=()=>{if(!hasStmt)return;const data={billStart,billEnd,bankAmt:sa,appAmt:billedTotal,diff,reconciledAt:new Date().toISOString(),txnCount:billed.length};saveReconData(selCC,data);setReconSaved(true);};
  const iS={background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',width:'100%'};
  const tabSel=active=>({flex:1,padding:'9px 0',fontFamily:'var(--mono)',fontSize:11,fontWeight:active?700:400,letterSpacing:'0.06em',textTransform:'uppercase',border:'none',borderBottom:active?'2px solid var(--green)':'2px solid transparent',background:'none',color:active?'var(--green)':'var(--text3)',cursor:'pointer'});
  const ord=n=>n===1?'st':n===2?'nd':n===3?'rd':'th';

  return(<div className="fade-in">
    <p className="sec-label">Credit Card</p><div style={{padding:'0 16px 4px'}}><select value={selCC} onChange={e=>handleSelCC(e.target.value)} style={iS}>{ccAccounts.map(a=><option key={a}>{a}</option>)}</select></div>
    <div style={{margin:'10px 16px 0',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'12px 14px',display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
      <div style={{flex:1}}><div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',textTransform:'uppercase',marginBottom:4}}>Statement Generates on (day of month)</div><div style={{display:'flex',gap:8,alignItems:'center'}}><input type="number" min="1" max="28" value={stmtDayStr} onChange={e=>setStmtDayStr(e.target.value)} onBlur={handleStmtDaySave} style={{...iS,width:70,textAlign:'center',fontSize:18,fontWeight:700}}/><div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',lineHeight:1.5}}>Last stmt: <span style={{color:'var(--text2)'}}>{fmtDate(lastStmt)}</span><br/>Next stmt: <span style={{color:'var(--amber)'}}>{fmtDate(nextStmt)}</span></div></div></div>
      <div style={{background:stmtGenerated?'var(--green-bg)':'var(--amber-bg)',border:'1px solid '+(stmtGenerated?'var(--green)':'var(--amber)'),borderRadius:8,padding:'6px 12px',fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:stmtGenerated?'var(--green)':'var(--amber)',whiteSpace:'nowrap'}}>{stmtGenerated?'✓ Stmt Generated':'⏳ Not Yet'}</div>
    </div>
    {lastRecon&&<div style={{margin:'8px 16px 0',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 12px',display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em'}}>Last Reconciled Bill</div><div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)'}}>End: {fmtDate(lastRecon.billEnd)} · ₹{fmtAmt(lastRecon.bankAmt)}</div></div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)'}}>Diff: {lastRecon.diff===0?'₹0':<span style={{color:'var(--red)'}}>₹{fmtAmt(lastRecon.diff)}</span>}</div></div>}
    
    <div style={{display:'flex',borderBottom:'1px solid var(--border)',padding:'0 16px',marginTop:12}}><button style={tabSel(ccTab==='unbilled')} onClick={()=>setCCTab('unbilled')}>Unbilled ({unbilled.length})</button><button style={tabSel(ccTab==='billed')} onClick={()=>setCCTab('billed')}>Statement Reconcile</button></div>
    
    {ccTab==='unbilled'&&(
      <div style={{padding:'16px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:12}}>
          <div><div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em'}}>Total Unbilled</div><div onClick={()=>{setTxnFilters({account:selCC,periodMode:'Custom',startDate:unbilledFrom,endDate:todayStr});setTab('txns');}} style={{fontFamily:'var(--mono)',fontSize:24,fontWeight:700,color:'var(--amber)',letterSpacing:'-0.5px',cursor:'pointer'}}>₹{fmtAmt(unbilledTotal)}</div></div>
          <button onClick={()=>{setTxnFilters({account:selCC,periodMode:'Custom',startDate:unbilledFrom,endDate:todayStr});setTab('txns');}} style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,padding:'6px 12px',fontFamily:'var(--mono)',fontSize:10,color:'var(--text2)',cursor:'pointer'}}>View Txns</button>
        </div>
        <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',background:'var(--bg2)',padding:'8px 12px',borderRadius:8,border:'1px solid var(--border2)'}}>Since {fmtDate(unbilledFrom)}. These will appear in your next statement.</div>
      </div>
    )}

    {ccTab==='billed'&&(
      <div style={{padding:'16px'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
          <div><div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginBottom:4}}>Bill Start</div><input type="date" value={billStart} onChange={e=>setBillStart(e.target.value)} style={iS}/></div>
          <div><div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginBottom:4}}>Bill End</div><input type="date" value={billEnd} onChange={e=>setBillEnd(e.target.value)} style={iS}/></div>
        </div>
        <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'12px 14px',marginBottom:12}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <div><div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em'}}>App Calculated</div><div onClick={()=>{setTxnFilters({account:selCC,periodMode:'Custom',startDate:billStart,endDate:billEnd});setTab('txns');}} style={{fontFamily:'var(--mono)',fontSize:20,fontWeight:700,color:'var(--text)',cursor:'pointer'}}>₹{fmtAmt(billedTotal)}</div></div>
            <button onClick={()=>{setTxnFilters({account:selCC,periodMode:'Custom',startDate:billStart,endDate:billEnd});setTab('txns');}} style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,padding:'6px 12px',fontFamily:'var(--mono)',fontSize:10,color:'var(--text2)',cursor:'pointer'}}>View Txns</button>
          </div>
          <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>Based on {billed.length} transactions between dates above.</div>
        </div>
        <div style={{background:'var(--bg2)',border:'1px solid var(--blue)',borderRadius:10,padding:'12px 14px',marginBottom:12}}>
          <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--blue)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:8}}>Bank Statement Info</div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <input type="number" step="0.01" placeholder="Enter Bank Total Due" value={stmtAmt} onChange={e=>{setStmtAmt(e.target.value);setReconSaved(false);}} style={{...iS,flex:1,fontSize:16,fontWeight:600,padding:'10px 12px'}}/>
          </div>
        </div>
        {hasStmt&&(
          <div style={{background:diff===0?'var(--green-bg)':'var(--red-bg)',border:'1px solid '+(diff===0?'var(--green)':'var(--red)'),borderRadius:10,padding:'14px',marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:diff===0?'var(--green)':'var(--red)',textTransform:'uppercase',letterSpacing:'0.04em'}}>{diff===0?'MATCHED ✓':'MISMATCH ⚠'}</div>
              <div style={{fontFamily:'var(--mono)',fontSize:13,color:diff===0?'var(--green)':'var(--red)',marginTop:4}}>Difference: {fmtAmt(diff)}</div>
            </div>
            {diff===0&&<button onClick={handleSaveRecon} disabled={reconSaved} style={{background:reconSaved?'var(--bg3)':'var(--green)',border:'none',color:reconSaved?'var(--text3)':'#000',padding:'8px 14px',borderRadius:6,fontFamily:'var(--mono)',fontSize:11,fontWeight:600,cursor:reconSaved?'default':'pointer'}}>{reconSaved?'Saved ✓':'Save Recon'}</button>}
          </div>
        )}
        <div style={{display:'flex',justifyContent:'center'}}><button onClick={()=>{const html=`<!DOCTYPE html><html><head><title>${selCC} Statement Reconcile</title><style>body{font-family:monospace;font-size:12px;padding:20px;}table{width:100%;border-collapse:collapse;margin-top:10px;}th,td{border:1px solid #ccc;padding:6px;text-align:left;}th{background:#f0f0f0;}.amt{text-align:right;}</style></head><body><h2>${selCC} Statement</h2><p>Period: ${billStart} to ${billEnd}</p><table><tr><th>Date</th><th>Description</th><th>Category</th><th>Amount (₹)</th></tr>${billed.map(t=>`<tr><td>${fmtDate(t.created_at)}</td><td>${t.particulars||t.category}</td><td>${t.category}</td><td class="amt">${fmtAmt(t.amount)}</td></tr>`).join('')}<tr><th colspan="3" style="text-align:right;">Total</th><th class="amt">${fmtAmt(billedTotal)}</th></tr></table></body></html>`;const w=window.open('','_blank');w.document.write(html);w.document.close();w.print();}} style={{background:'none',border:'1px solid var(--border2)',borderRadius:8,color:'var(--text2)',padding:'8px 16px',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer'}}>🖨 Print Statement</button></div>
      </div>
    )}
  </div>);
}
/* ── SiteLedgerScreen ── */
function SiteLedgerScreen({txns,customSites,customTeam,opening}){
  const [site,setSite]=useState((customSites&&customSites[0])||'');
  const [selPerson,setSelPerson]=useState('');
  if(!customSites||customSites.length===0)return<div className="empty">No sites configured. Go to Settings > Team & Sites.</div>;
  const siteTxns=txns.filter(t=>t.status!=='voided'&&t.domain==='Site'&&t.site_name===site).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  const sOpen=opening[site]||0;
  const inFlow=siteTxns.filter(t=>t.type==='Bank→Cash'&&t.to_account==='Site Cash').reduce((s,t)=>s+(+t.amount),0);
  const outFlow=siteTxns.filter(t=>t.type==='Expense').reduce((s,t)=>s+(+t.amount),0);
  const curBal=sOpen+inFlow-outFlow;
  
  const teamSum={};
  siteTxns.filter(t=>t.type==='Expense'||t.type==='Income'||t.type==='Bank→Bank').forEach(t=>{
    const p=t.party_name;if(!p)return;
    if(!teamSum[p])teamSum[p]={given:0,used:0};
    if(t.type==='Expense')teamSum[p].given+=(+t.amount);
    if(t.type==='Income')teamSum[p].used+=(+t.amount);
    if(t.type==='Bank→Bank'){
      if(t.from_account==='Site Cash'&&t.to_account===p)teamSum[p].given+=(+t.amount);
      if(t.from_account===p&&t.to_account==='Site Cash')teamSum[p].used+=(+t.amount);
    }
  });
  const teamList=Object.entries(teamSum).map(([name,d])=>({name,given:d.given,used:d.used,bal:d.given-d.used})).filter(x=>x.given>0||x.used>0);

  const cS=a=>({display:'inline-block',border:a?'1px solid var(--blue)':'1px solid var(--border2)',borderRadius:14,padding:'6px 12px',fontFamily:'var(--mono)',fontSize:11,color:a?'var(--blue)':'var(--text2)',background:a?'var(--blue-bg)':'var(--bg2)',cursor:'pointer',userSelect:'none',margin:'0 4px 4px 0'});

  return(<div className="fade-in">
    <div style={{padding:'12px 16px 8px'}}><div style={{display:'flex',flexWrap:'wrap',gap:6}}>{customSites.map(s=><span key={s} style={cS(site===s)} onClick={()=>{setSite(s);setSelPerson('');}}>{s}</span>)}</div></div>
    
    <div style={{margin:'0 16px 12px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'14px'}}>
      <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:4}}>Site Cash Balance</div>
      <div style={{fontFamily:'var(--mono)',fontSize:24,fontWeight:700,color:curBal<0?'var(--red)':'var(--text)'}}>{fmtAmt(curBal)}</div>
      <div style={{display:'flex',gap:16,marginTop:12,borderTop:'1px solid var(--border)',paddingTop:12}}>
        <div><div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',textTransform:'uppercase'}}>Received</div><div style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:'var(--green)'}}>+{fmtAmt(inFlow)}</div></div>
        <div><div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',textTransform:'uppercase'}}>Given Out</div><div style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:'var(--red)'}}>−{fmtAmt(outFlow)}</div></div>
      </div>
    </div>

    {!selPerson&&<div style={{padding:'0 16px'}}>
      <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:8}}>Team Balances (Kharchi)</div>
      {teamList.map(p=>(
        <div key={p.name} onClick={()=>setSelPerson(p.name)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,marginBottom:8,cursor:'pointer'}}>
          <div><div style={{fontSize:13,fontWeight:600}}>{p.name}</div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:2}}>Given: {fmtAmt(p.given)} · Used: {fmtAmt(p.used)}</div></div>
          <div style={{textAlign:'right'}}><div style={{fontFamily:'var(--mono)',fontSize:14,fontWeight:700,color:p.bal>0?'var(--amber)':p.bal<0?'var(--green)':'var(--text3)'}}>{fmtAmt(p.bal)}</div><div style={{fontSize:9,color:'var(--text3)'}}>{p.bal>0?'with them':'settled'}</div></div>
        </div>
      ))}
      {teamList.length===0&&<div className="empty" style={{padding:'24px 0'}}>No team kharchi recorded for this site.</div>}
    </div>}

    {selPerson&&<div style={{padding:'0 16px'}}>
      <div onClick={()=>setSelPerson('')} style={{color:'var(--blue)',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer',marginBottom:12}}>← Back to Team</div>
      <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:8}}>{selPerson}'s Ledger</div>
      {siteTxns.filter(t=>t.party_name===selPerson).map(t=>(
        <div key={t.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 12px',background:'var(--bg2)',borderBottom:'1px solid var(--border)'}}>
          <div><div style={{fontSize:12,color:'var(--text)'}}>{t.particulars}</div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:2}}>{fmtDate(t.created_at)} · {t.type}</div></div>
          <div style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:600,color:t.type==='Expense'||(t.type==='Bank→Bank'&&t.from_account==='Site Cash')?'var(--amber)':'var(--green)'}}>{fmtAmt(t.amount)}</div>
        </div>
      ))}
    </div>}
  </div>);
}

/* ── SettingsScreen ── */
function SettingsScreen({opening,onSave,allAccountsH,customAccounts,onSaveAccounts,customCategories,onSaveCategories,budgets,onSaveBudgets,customSites,onSaveSites,customTeam,onSaveTeam,theme,onSaveTheme,customSiteCats,onSaveSiteCats}){
  const [ob,setOb]=useState(opening||{});const [savedBal,setSavedBal]=useState(false);
  const [ca,setCa]=useState(customAccounts||[]);const [newCa,setNewCa]=useState({name:'',type:'bank'});
  const [cc,setCc]=useState(customCategories||[]);const [newCc,setNewCc]=useState({name:'',emoji:'',parent:'',it:''});
  const [bd,setBd]=useState(budgets||{});const [cs,setCs]=useState(customSites||[]);const [newCs,setNewCs]=useState('');
  const [ct,setCt]=useState(customTeam||[]);const [newCt,setNewCt]=useState('');
  const [csc,setCsc]=useState(customSiteCats||[]);const [newCsc,setNewCsc]=useState('');
  const [acc,setAcc]=useState('theme');

  const handleSaveBal=()=>{onSave(ob);setSavedBal(true);setTimeout(()=>setSavedBal(false),2000);};
  const handleAddCa=()=>{if(!newCa.name.trim())return;const u=[...ca,{name:newCa.name.trim(),type:newCa.type,archived:false}];setCa(u);onSaveAccounts(u);setNewCa({name:'',type:'bank'});};
  const handleToggleCa=(i)=>{const u=[...ca];u[i].archived=!u[i].archived;setCa(u);onSaveAccounts(u);};
  const handleAddCc=()=>{if(!newCc.name.trim())return;const u=[...cc,{name:newCc.name.trim(),emoji:newCc.emoji||'•',parent:newCc.parent||null,it:newCc.it||'',archived:false}];setCc(u);onSaveCategories(u);setNewCc({name:'',emoji:'',parent:'',it:''});};
  const handleToggleCc=(i)=>{const u=[...cc];u[i].archived=!u[i].archived;setCc(u);onSaveCategories(u);};
  const handleSaveBd=()=>{onSaveBudgets(bd);alert('Budgets saved');};
  const handleAddCs=()=>{if(!newCs.trim()||cs.includes(newCs.trim()))return;const u=[...cs,newCs.trim()];setCs(u);onSaveSites(u);setNewCs('');};
  const handleDelCs=i=>{const u=cs.filter((_,idx)=>idx!==i);setCs(u);onSaveSites(u);};
  const handleAddCt=()=>{if(!newCt.trim()||ct.includes(newCt.trim()))return;const u=[...ct,newCt.trim()];setCt(u);onSaveTeam(u);setNewCt('');};
  const handleDelCt=i=>{const u=ct.filter((_,idx)=>idx!==i);setCt(u);onSaveTeam(u);};
  const handleAddCsc=()=>{if(!newCsc.trim()||csc.includes(newCsc.trim()))return;const u=[...csc,newCsc.trim()];setCsc(u);onSaveSiteCats(u);setNewCsc('');};
  const handleDelCsc=i=>{const u=csc.filter((_,idx)=>idx!==i);setCsc(u);onSaveSiteCats(u);};
  
  const iS={background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:8,padding:'8px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none'};
  const Acc=({id,title,children})=>(<div className="card" style={{marginBottom:8}}><div className="acc-hdr" onClick={()=>setAcc(acc===id?null:id)}><span className="acc-title">{title}</span><span style={{color:'var(--text3)',fontSize:12,transform:acc===id?'rotate(180deg)':'none',transition:'transform 0.2s'}}>▼</span></div>{acc===id&&<div className="acc-body fade-in">{children}</div>}</div>);
  const THEMES=[{id:'autumn',l:'Deep Autumn',c:'#faf6f0',b:'#5a8a1a'},{id:'midnight',l:'Exec Midnight',c:'#0a0d12',b:'#00d4aa'},{id:'nordic',l:'Nordic Light',c:'#f7f9fc',b:'#3182ce'},{id:'terminal',l:'Terminal Quant',c:'#070a07',b:'#00ff77'}];

  return(<div className="fade-in" style={{padding:'12px 16px',paddingBottom:'calc(var(--tab-h) + var(--safe-b) + 24px)'}}>
    <Acc id="theme" title="UI Theme">
      <div style={{padding:'14px 16px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        {THEMES.map(t=>(
          <div key={t.id} onClick={()=>onSaveTheme(t.id)} style={{display:'flex',alignItems:'center',gap:10,padding:'10px',border:theme===t.id?'2px solid var(--green)':'1px solid var(--border2)',borderRadius:8,background:'var(--bg2)',cursor:'pointer'}}>
            <div className={`swatch ${theme===t.id?'active':''}`} style={{background:t.c,borderColor:t.b}}/>
            <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)',fontWeight:theme===t.id?600:400}}>{t.l}</span>
          </div>
        ))}
      </div>
    </Acc>

    <Acc id="sites" title="Team & Sites (SiteOS)">
      <div style={{padding:'14px 16px'}}>
        <p style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:8,textTransform:'uppercase'}}>Custom Sites</p>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>{cs.map((s,i)=><span key={i} style={{background:'var(--bg3)',border:'1px solid var(--border)',padding:'4px 8px',borderRadius:6,fontSize:11,fontFamily:'var(--mono)',display:'flex',alignItems:'center',gap:6}}>{s} <span onClick={()=>handleDelCs(i)} style={{color:'var(--red)',cursor:'pointer'}}>✕</span></span>)}</div>
        <div style={{display:'flex',gap:8,marginBottom:16}}><input placeholder="New Site Name" value={newCs} onChange={e=>setNewCs(e.target.value)} style={{...iS,flex:1}}/><button onClick={handleAddCs} style={{background:'var(--blue)',color:'#fff',border:'none',borderRadius:6,padding:'0 12px',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer'}}>Add</button></div>
        
        <p style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:8,textTransform:'uppercase'}}>Custom Team Members</p>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>{ct.map((t,i)=><span key={i} style={{background:'var(--bg3)',border:'1px solid var(--border)',padding:'4px 8px',borderRadius:6,fontSize:11,fontFamily:'var(--mono)',display:'flex',alignItems:'center',gap:6}}>{t} <span onClick={()=>handleDelCt(i)} style={{color:'var(--red)',cursor:'pointer'}}>✕</span></span>)}</div>
        <div style={{display:'flex',gap:8,marginBottom:16}}><input placeholder="New Member Name" value={newCt} onChange={e=>setNewCt(e.target.value)} style={{...iS,flex:1}}/><button onClick={handleAddCt} style={{background:'var(--blue)',color:'#fff',border:'none',borderRadius:6,padding:'0 12px',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer'}}>Add</button></div>

        <p style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:8,textTransform:'uppercase'}}>Custom Site Expense Categories</p>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>{csc.map((c,i)=><span key={i} style={{background:'var(--bg3)',border:'1px solid var(--border)',padding:'4px 8px',borderRadius:6,fontSize:11,fontFamily:'var(--mono)',display:'flex',alignItems:'center',gap:6}}>{c} <span onClick={()=>handleDelCsc(i)} style={{color:'var(--red)',cursor:'pointer'}}>✕</span></span>)}</div>
        <div style={{display:'flex',gap:8}}><input placeholder="New Category" value={newCsc} onChange={e=>setNewCsc(e.target.value)} style={{...iS,flex:1}}/><button onClick={handleAddCsc} style={{background:'var(--blue)',color:'#fff',border:'none',borderRadius:6,padding:'0 12px',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer'}}>Add</button></div>
      </div>
    </Acc>

    <Acc id="accounts" title="Custom Accounts">
      <div style={{padding:'14px 16px'}}>
        {ca.map((a,i)=>(<div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--border)'}}><span style={{fontFamily:'var(--mono)',fontSize:12,color:a.archived?'var(--text3)':'var(--text)',textDecoration:a.archived?'line-through':'none'}}>{a.name} <span style={{fontSize:9,color:'var(--blue)',marginLeft:6}}>{a.type.toUpperCase()}</span></span><button onClick={()=>handleToggleCa(i)} style={{background:'none',border:'1px solid var(--border2)',borderRadius:6,color:'var(--text3)',padding:'4px 8px',fontSize:10,fontFamily:'var(--mono)',cursor:'pointer'}}>{a.archived?'Restore':'Archive'}</button></div>))}
        <div style={{display:'flex',gap:8,marginTop:12}}><input placeholder="Name" value={newCa.name} onChange={e=>setNewCa({...newCa,name:e.target.value})} style={{...iS,flex:2}}/><select value={newCa.type} onChange={e=>setNewCa({...newCa,type:e.target.value})} style={{...iS,flex:1}}><option value="bank">Bank</option><option value="cc">Credit Card</option></select><button onClick={handleAddCa} style={{background:'var(--blue)',color:'#fff',border:'none',borderRadius:6,padding:'0 12px',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer'}}>Add</button></div>
      </div>
    </Acc>

    <Acc id="categories" title="Custom Categories">
      <div style={{padding:'14px 16px'}}>
        {cc.map((c,i)=>(<div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--border)'}}><span style={{fontFamily:'var(--mono)',fontSize:12,color:c.archived?'var(--text3)':'var(--text)',textDecoration:c.archived?'line-through':'none'}}>{c.emoji} {c.name} {c.it&&<span style={{fontSize:9,color:'var(--green)',marginLeft:6}}>{c.it}</span>}</span><button onClick={()=>handleToggleCc(i)} style={{background:'none',border:'1px solid var(--border2)',borderRadius:6,color:'var(--text3)',padding:'4px 8px',fontSize:10,fontFamily:'var(--mono)',cursor:'pointer'}}>{c.archived?'Restore':'Archive'}</button></div>))}
        <div style={{display:'flex',gap:8,marginTop:12}}><input placeholder="Emoji" value={newCc.emoji} onChange={e=>setNewCc({...newCc,emoji:e.target.value})} maxLength={2} style={{...iS,width:50,textAlign:'center'}}/><input placeholder="Name" value={newCc.name} onChange={e=>setNewCc({...newCc,name:e.target.value})} style={{...iS,flex:1}}/><input placeholder="IT Sec" value={newCc.it} onChange={e=>setNewCc({...newCc,it:e.target.value})} style={{...iS,width:70}}/><button onClick={handleAddCc} style={{background:'var(--blue)',color:'#fff',border:'none',borderRadius:6,padding:'0 12px',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer'}}>Add</button></div>
      </div>
    </Acc>

    <Acc id="budgets" title="Monthly Budgets">
      <div style={{padding:'14px 16px'}}>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {['Household','Food','Fuel','Lifestyle','Maintenance','Grocery','Child Education'].map(c=>(
            <div key={c} style={{display:'flex',alignItems:'center',gap:12}}>
              <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)',width:100}}>{c}</span>
              <input type="number" placeholder="No limit" value={bd[c]||''} onChange={e=>setBd({...bd,[c]:parseFloat(e.target.value)||0})} style={iS}/>
            </div>
          ))}
        </div>
        <button onClick={handleSaveBd} style={{background:'var(--green)',color:'#000',border:'none',borderRadius:8,padding:'12px',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,width:'100%',marginTop:16,cursor:'pointer'}}>Save Budgets</button>
      </div>
    </Acc>

    <Acc id="opening" title="Opening Balances">
      {['Cash','Site Cash',...allAccountsH].map(a=>{
        const val=ob[a]||{};
        return(
        <div key={a} style={{padding:'10px 16px',borderBottom:'1px solid var(--border)'}}>
          <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)',marginBottom:4,fontWeight:600}}>{a}</div>
          <div style={{display:'flex',gap:8}}>
            <input type="number" step="0.01" style={{flex:1}} value={val.amount||''} placeholder="0" onChange={e=>setOb(p=>({...p,[a]:{...(p[a]||{}),amount:parseFloat(e.target.value)||0}}))}/>
            <input type="date" style={{flex:1}} value={val.opening_date||''} onChange={e=>setOb(p=>({...p,[a]:{...(p[a]||{}),opening_date:e.target.value}}))}/>
          </div>
          {val.opening_date&&<div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',marginTop:4}}>Only txns from {val.opening_date} count toward balance</div>}
        </div>);
      })}
      <div style={{padding:'14px 16px'}}><button onClick={handleSaveBal} style={{background:savedBal?'var(--green-bg)':'var(--green)',border:savedBal?'1px solid var(--green)':'none',color:savedBal?'var(--green)':'#000',fontFamily:'var(--mono)',fontSize:13,fontWeight:600,borderRadius:10,padding:14,width:'100%',cursor:'pointer',transition:'all 0.2s'}}>{savedBal?'✓ Saved':'Save Opening Balances'}</button></div>
    </Acc>

    <p className="sec-label">About</p>
    <div style={{padding:'0 16px 40px',fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',lineHeight:2}}>JB Finance v1.9.1 (CFO OS)<br/>Built for Jayesh Bhagat<br/>Supabase Backend</div>
  </div>);
}

/* ── CashflowScreen ── */
function CashflowScreen({txns,budgets,onSaveBudgets,liquid,allBanks,balances,recurring}){
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const now=new Date();const curYear=now.getFullYear();const [year,setYear]=useState(curYear);
  const active=txns.filter(t=>t.status!=='voided');
  
  const monthlyData=Array.from({length:12}).map((_,m)=>{
    const mTxns=active.filter(t=>{const d=new Date(t.created_at);return d.getFullYear()===year&&d.getMonth()===m;});
    const inc=mTxns.filter(t=>t.type==='Income').reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
    const exp=mTxns.filter(t=>t.type==='Expense').reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
    return {month:m,inc,exp,net:inc-exp};
  });

  const annInc=monthlyData.reduce((s,m)=>s+m.inc,0);
  const annExp=monthlyData.reduce((s,m)=>s+m.exp,0);
  const annNet=annInc-annExp;
  const moAvgInc=annInc/(now.getMonth()+1);
  const moAvgExp=annExp/(now.getMonth()+1);
  const saveRate=annInc>0?((annInc-annExp)/annInc*100):0;

  const catData={};
  active.filter(t=>{const d=new Date(t.created_at);return d.getFullYear()===year&&t.type==='Expense';}).forEach(t=>{const c=t.category||'Misc';catData[c]=(catData[c]||0)+(parseFloat(t.amount)||0);});
  const topCats=Object.entries(catData).sort((a,b)=>b[1]-a[1]);

  return(<div className="fade-in" style={{padding:'12px 16px',paddingBottom:'calc(var(--tab-h) + var(--safe-b) + 24px)'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
      <div style={{fontFamily:'var(--mono)',fontSize:16,fontWeight:700,color:'var(--text)'}}>Cashflow Engine</div>
      <select value={year} onChange={e=>setYear(parseInt(e.target.value))} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'6px 12px',fontFamily:'var(--mono)',fontSize:13,color:'var(--text)'}}><option value={curYear}>{curYear}</option><option value={curYear-1}>{curYear-1}</option><option value={curYear-2}>{curYear-2}</option></select>
    </div>

    <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'16px',marginBottom:12}}>
      <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:12}}>YTD Summary ({year})</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div><div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',marginBottom:2}}>Total Income</div><div style={{fontFamily:'var(--mono)',fontSize:18,fontWeight:700,color:'var(--green)'}}>₹{fmtAmt(annInc)}</div><div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginTop:2}}>Avg: ₹{fmtAmt(moAvgInc)}/mo</div></div>
        <div><div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',marginBottom:2}}>Total Spend</div><div style={{fontFamily:'var(--mono)',fontSize:18,fontWeight:700,color:'var(--red)'}}>₹{fmtAmt(annExp)}</div><div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginTop:2}}>Avg: ₹{fmtAmt(moAvgExp)}/mo</div></div>
      </div>
      <div style={{marginTop:16,paddingTop:16,borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}>
        <div><div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',marginBottom:2}}>Net Cashflow</div><div style={{fontFamily:'var(--mono)',fontSize:22,fontWeight:700,color:annNet>=0?'var(--green)':'var(--red)',letterSpacing:'-0.5px'}}>{annNet>=0?'+':'−'}₹{fmtAmt(Math.abs(annNet))}</div></div>
        <div style={{textAlign:'right'}}><div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',marginBottom:2}}>Savings Rate</div><div style={{fontFamily:'var(--mono)',fontSize:16,fontWeight:700,color:saveRate>=20?'var(--green)':saveRate>=0?'var(--amber)':'var(--red)'}}>{saveRate.toFixed(1)}%</div></div>
      </div>
      <div style={{background:'var(--bg3)',height:6,borderRadius:3,marginTop:12,display:'flex',overflow:'hidden'}}><div style={{background:'var(--red)',width:(annInc>0?Math.min(100,(annExp/annInc)*100):0)+'%'}}></div><div style={{background:'var(--green)',flex:1}}></div></div>
    </div>

    <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'16px',marginBottom:12}}>
      <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:12}}>Monthly Trend</div>
      <div style={{display:'flex',alignItems:'flex-end',gap:4,height:120,borderBottom:'1px solid var(--border2)',paddingBottom:4,overflowX:'auto'}}>
        {monthlyData.map(m=>{
          const max=Math.max(...monthlyData.map(d=>Math.max(d.inc,d.exp)))||1;
          const hI=(m.inc/max)*100;const hE=(m.exp/max)*100;
          return(<div key={m.month} style={{flex:1,minWidth:20,display:'flex',flexDirection:'column',justifyContent:'flex-end',alignItems:'center',gap:2,position:'relative'}}>
            <div style={{width:'40%',background:'var(--green)',height:hI+'%',borderTopLeftRadius:2,borderTopRightRadius:2,position:'absolute',bottom:0,left:'10%',opacity:0.8}}/>
            <div style={{width:'40%',background:'var(--red)',height:hE+'%',borderTopLeftRadius:2,borderTopRightRadius:2,position:'absolute',bottom:0,right:'10%',opacity:0.8}}/>
          </div>);
        })}
      </div>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:4}}>
        {monthlyData.map(m=><div key={m.month} style={{flex:1,textAlign:'center',fontFamily:'var(--mono)',fontSize:8,color:now.getMonth()===m.month?'var(--text)':'var(--text3)',fontWeight:now.getMonth()===m.month?700:400}}>{MONTHS[m.month].charAt(0)}</div>)}
      </div>
    </div>

    <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'16px',marginBottom:12}}>
      <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:12}}>Annual Spends by Category</div>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        {topCats.slice(0,8).map(([c,v])=>{
          const pct=(v/annExp)*100||0;
          return(<div key={c}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}><span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)'}}>{c}</span><span style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:'var(--text)'}}>₹{fmtAmt(v)}</span></div>
            <div style={{display:'flex',alignItems:'center',gap:8}}><div style={{flex:1,background:'var(--bg3)',height:4,borderRadius:2}}><div style={{background:'var(--blue)',width:pct+'%',height:4,borderRadius:2}}/></div><span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',width:30,textAlign:'right'}}>{pct.toFixed(1)}%</span></div>
          </div>);
        })}
      </div>
    </div>
  </div>);
}

/* ── PdfImportScreen ── */
function PdfImportScreen({allBanks,allCC,allCategories,onSave,showToast}){
  const [file,setFile]=useState(null);const [loading,setLoading]=useState(false);const [logs,setLogs]=useState([]);
  const [parsedTxns,setParsedTxns]=useState([]);const [bank,setBank]=useState(allBanks[0]||'');const [format,setFormat]=useState('hdfc');
  
  const handleFile=e=>{setFile(e.target.files[0]);setParsedTxns([]);setLogs([]);};
  const log=msg=>setLogs(l=>[...l,msg]);
  
  const extractText=async file=>{
    log('Loading PDF engine...');
    const pdf=await window['pdfjs-dist/build/pdf'].getDocument(URL.createObjectURL(file)).promise;
    let fullText='';
    for(let i=1;i<=pdf.numPages;i++){
      log(`Extracting page ${i}/${pdf.numPages}...`);
      const page=await pdf.getPage(i);
      const content=await page.getTextContent();
      const strings=content.items.map(item=>item.str);
      fullText+=strings.join(' ')+'\n';
    }
    return fullText;
  };

  const parseHDFC=text=>{
    log('Parsing HDFC format...');
    const txns=[];
    const regex=/(\d{2}\/\d{2}\/\d{2})\s+(.+?)\s+([\d,]+\.\d{2})\s+(Cr|Dr)?/g;
    let match;
    while((match=regex.exec(text))!==null){
      const[_,dateStr,descRaw,amtStr,typeRaw]=match;
      const desc=descRaw.trim();
      if(desc.toLowerCase().includes('opening balance')||desc.toLowerCase().includes('closing balance'))continue;
      const amt=parseFloat(amtStr.replace(/,/g,''));
      const isCr=typeRaw==='Cr'||desc.toLowerCase().includes('neft-in')||desc.toLowerCase().includes('upi/cr');
      const parts=dateStr.split('/');
      const isoDate=`20${parts[2]}-${parts[1]}-${parts[0]}T06:30:00.000Z`;
      let cat='Suspense (Uncategorized)';
      if(desc.match(/zomato|swiggy|restaurant/i))cat='Food';
      else if(desc.match(/petrol|bpcl|hpcl|iocl|fuel/i))cat='Fuel';
      else if(desc.match(/d-mart|dmart|grocery|supermarket/i))cat='Grocery';
      else if(desc.match(/amazon|flipkart|myntra/i))cat='Lifestyle';
      else if(desc.match(/zerodha|mutual fund|sip/i))cat='Investment';
      txns.push({date:isoDate,desc,amt,type:isCr?'Income':'Expense',cat,selected:true,id:Math.random().toString(36).substr(2,9)});
    }
    log(`Found ${txns.length} transactions.`);
    return txns;
  };

  const processPDF=async()=>{
    if(!file)return;setLoading(true);setLogs([]);setParsedTxns([]);
    try{
      const text=await extractText(file);
      let txns=[];
      if(format==='hdfc')txns=parseHDFC(text);
      else{log('⚠ Selected format parser not implemented.');setLoading(false);return;}
      setParsedTxns(txns);
    }catch(e){log('❌ Error: '+e.message);}
    setLoading(false);
  };

  const toggleSelect=id=>setParsedTxns(ts=>ts.map(t=>t.id===id?{...t,selected:!t.selected}:t));
  const updateCat=(id,cat)=>setParsedTxns(ts=>ts.map(t=>t.id===id?{...t,cat}:t));

  const handleImport=async()=>{
    const toImport=parsedTxns.filter(t=>t.selected);
    if(toImport.length===0)return;setLoading(true);
    let count=0;
    for(const t of toImport){
      const txn={domain:'Personal',type:t.type,amount:t.amt,category:t.cat,from_account:t.type==='Expense'?bank:null,to_account:t.type==='Income'?bank:null,particulars:t.desc,status:'complete',source:'pdf-import',created_at:t.date};
      await onSave(txn);count++;
    }
    showToast(`✓ Imported ${count} transactions`);
    setParsedTxns([]);setFile(null);setLoading(false);
  };

  const selCount=parsedTxns.filter(t=>t.selected).length;

  return(<div className="fade-in" style={{padding:'12px 16px',paddingBottom:'calc(var(--tab-h) + var(--safe-b) + 24px)'}}>
    <div style={{background:'var(--blue-bg)',border:'1px solid var(--blue)',borderRadius:8,padding:'10px 12px',fontFamily:'var(--mono)',fontSize:11,color:'var(--blue)',marginBottom:16,lineHeight:1.4}}><strong>Beta Feature:</strong> This runs locally in your browser. Upload a standard bank statement PDF. Currently only HDFC structure is loosely supported for testing.</div>
    
    <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'14px',marginBottom:16}}>
      <div style={{marginBottom:12}}><div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginBottom:4}}>Account to Import Into</div><select value={bank} onChange={e=>setBank(e.target.value)} style={{background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:8,padding:'8px 10px',fontFamily:'var(--mono)',fontSize:12,color:'var(--text)',width:'100%',outline:'none'}}>{allBanks.map(a=><option key={a}>{a}</option>)}</select></div>
      <div style={{marginBottom:12}}><div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginBottom:4}}>Bank Format</div><select value={format} onChange={e=>setFormat(e.target.value)} style={{background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:8,padding:'8px 10px',fontFamily:'var(--mono)',fontSize:12,color:'var(--text)',width:'100%',outline:'none'}}><option value="hdfc">HDFC Bank</option><option value="sbi">SBI (Coming soon)</option></select></div>
      <div style={{marginBottom:16}}><div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginBottom:4}}>Statement PDF</div><input type="file" accept="application/pdf" onChange={handleFile} style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text)'}}/></div>
      <button onClick={processPDF} disabled={!file||loading} style={{background:!file||loading?'var(--bg3)':'var(--blue)',color:!file||loading?'var(--text3)':'#fff',border:'none',borderRadius:8,padding:'10px',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,width:'100%',cursor:'pointer'}}>{loading?'Processing...':'Analyze PDF'}</button>
    </div>

    {logs.length>0&&parsedTxns.length===0&&<div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:8,padding:'10px',fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',maxHeight:150,overflowY:'auto',marginBottom:16}}>{logs.map((l,i)=><div key={i}>{l}</div>)}</div>}

    {parsedTxns.length>0&&(<div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:600}}>{selCount} Selected to Import</div>
        <button onClick={handleImport} disabled={selCount===0||loading} style={{background:selCount===0||loading?'var(--bg3)':'var(--green)',color:selCount===0||loading?'var(--text3)':'#000',border:'none',borderRadius:6,padding:'8px 14px',fontFamily:'var(--mono)',fontSize:11,fontWeight:600,cursor:'pointer'}}>{loading?'Importing...':`Import ${selCount} Txns`}</button>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {parsedTxns.map(t=>(
          <div key={t.id} style={{background:'var(--bg2)',border:'1px solid '+(t.selected?'var(--green)':'var(--border)'),borderRadius:8,padding:'10px',opacity:t.selected?1:0.5}}>
            <div style={{display:'flex',gap:12}}>
              <input type="checkbox" checked={t.selected} onChange={()=>toggleSelect(t.id)} style={{marginTop:2}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}>
                  <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:'70%'}} title={t.desc}>{t.desc}</div>
                  <div style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:t.type==='Income'?'var(--green)':'var(--red)'}}>{t.type==='Income'?'+':'−'}{fmtAmt(t.amt)}</div>
                </div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)'}}>{fmtDate(t.date)}</div>
                  <select value={t.cat} onChange={e=>updateCat(t.id,e.target.value)} style={{background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:4,padding:'4px 6px',fontFamily:'var(--mono)',fontSize:10,color:'var(--text)',maxWidth:120}}><option value="Suspense (Uncategorized)">Suspense</option>{allCategories.filter(c=>c.id!=='UA Expense').map(c=><option key={c.id} value={c.id}>{c.id}</option>)}</select>
                </div>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>)}
  </div>);
}

</script>
