<!DOCTYPE html>
<html lang="en" data-theme="deep-autumn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JB Finance OS</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* THEME ENGINE: 4 Distinct Palettes */
        :root[data-theme="deep-autumn"] {
            --bg-base: #2C2621; --bg-surface: #3E362E; --bg-card: #4A4238;
            --text-main: #E8E1D9; --text-muted: #A39B93;
            --accent-green: #6B8E23; --accent-red: #CD5C5C; --accent-brand: #D2B48C;
            --border-color: #5C5248;
        }
        :root[data-theme="executive-midnight"] {
            --bg-base: #0F172A; --bg-surface: #1E293B; --bg-card: #334155;
            --text-main: #F8FAFC; --text-muted: #94A3B8;
            --accent-green: #10B981; --accent-red: #EF4444; --accent-brand: #38BDF8;
            --border-color: #475569;
        }
        :root[data-theme="nordic-light"] {
            --bg-base: #F8F9FA; --bg-surface: #FFFFFF; --bg-card: #F1F3F5;
            --text-main: #212529; --text-muted: #868E96;
            --accent-green: #2B8A3E; --accent-red: #C92A2A; --accent-brand: #1C7ED6;
            --border-color: #DEE2E6;
        }
        :root[data-theme="terminal-quant"] {
            --bg-base: #000000; --bg-surface: #111111; --bg-card: #222222;
            --text-main: #00FF00; --text-muted: #008800;
            --accent-green: #00FF00; --accent-red: #FF0000; --accent-brand: #00FF00;
            --border-color: #333333;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* Desktop Centered UI / Mobile fix */
        #root {
            max-width: 600px;
            margin: 0 auto;
            background-color: var(--bg-surface);
            min-height: 100dvh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }

        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 80px; /* Space for bottom nav */
        }

        .card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; }
        .text-muted { color: var(--text-muted); }
        .text-green { color: var(--accent-green); }
        .text-red { color: var(--accent-red); }
        .bg-brand { background-color: var(--accent-brand); color: var(--bg-base); }
        .border-line { border-color: var(--border-color); }

        /* Bottom Nav */
        .bottom-nav {
            position: absolute; bottom: 0; width: 100%; max-width: 600px;
            background-color: var(--bg-surface); border-top: 1px solid var(--border-color);
            display: flex; justify-content: space-around; padding: 12px 0; z-index: 50;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 0.75rem; cursor: pointer; }
        .nav-item.active { color: var(--accent-brand); font-weight: bold; }
        
        /* Modals & Accordions */
        .accordion-header { cursor: pointer; padding: 12px; border-bottom: 1px solid var(--border-color); font-weight: 600; display: flex; justify-content: space-between; }
        .accordion-content { padding: 12px; background-color: var(--bg-base); }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // INITIAL STATE (Dynamic Accounts, No Hardcoding)
        const initialAccounts = [
            { id: 'a1', name: 'Union Bank', type: 'bank', isArchived: false, balance: 10000 },
            { id: 'a2', name: 'Yes Bank', type: 'bank', isArchived: false, balance: 50000 },
            { id: 'a3', name: 'Physical Cash', type: 'cash', isArchived: false, balance: 1500 },
            { id: 'a4', name: 'HDFC CC', type: 'cc', isArchived: false, balance: -5000 }
        ];

        const initialCategories = [
            { id: 'c1', name: 'Household', isArchived: false },
            { id: 'c2', name: 'Fuel', isArchived: false },
            { id: 'c3', name: 'Lifestyle', isArchived: false }
        ];

        function App() {
            // STATE MANAGEMENT
            const [activeTab, setActiveTab] = useState('DASH');
            const [theme, setTheme] = useState('deep-autumn');
            const [streak, setStreak] = useState(12); // Gamification
            
            const [accounts, setAccounts] = useState(initialAccounts);
            const [categories, setCategories] = useState(initialCategories);
            const [transactions, setTransactions] = useState([]);
            const [udhariLog, setUdhariLog] = useState([]);
            const [provisions, setProvisions] = useState([]);
            
            // Set Theme
            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme);
            }, [theme]);

            // GAMIFICATION: Fake streak logic for MVP (increments on load if needed)
            useEffect(() => { lucide.createIcons(); });

            // --- CORE FINANCIAL CALCULATIONS ---
            const liquidBalance = accounts.filter(a => a.type === 'bank' || a.type === 'cash').reduce((sum, a) => sum + a.balance, 0);
            const ccDues = accounts.filter(a => a.type === 'cc').reduce((sum, a) => sum + Math.abs(a.balance), 0); // Assuming negative balance means due
            const lockedInProvisions = provisions.reduce((sum, p) => sum + parseFloat(p.savedTillDate || 0), 0);
            const availableToday = liquidBalance - ccDues - lockedInProvisions;

            // --- UDHARI SETTLEMENT LOGIC (THE CA FIX) ---
            const handleSettleUdhari = (udhariId, returnModeAccountId) => {
                const targetUdhari = udhariLog.find(u => u.id === udhariId);
                if(!targetUdhari) return;

                const returnAccount = accounts.find(a => a.id === returnModeAccountId);
                
                // 1. Balance Update
                const updatedAccounts = accounts.map(acc => {
                    if(acc.id === returnAccount.id) return { ...acc, balance: acc.balance + targetUdhari.amount };
                    return acc;
                });
                setAccounts(updatedAccounts);

                // 2. The CA Tag (If Given in Bank, Returned in Cash)
                let updatedTransactions = [...transactions];
                if(targetUdhari.givenModeType === 'bank' && returnAccount.type === 'cash') {
                    updatedTransactions = transactions.map(tx => {
                        if(tx.id === targetUdhari.linkedTxId) {
                            return { ...tx, desc: tx.desc + ' [Settled in Cash]' }; // Silent Tag
                        }
                        return tx;
                    });
                }

                // Log the settlement transaction for audit
                const settlementTx = {
                    id: Date.now().toString(),
                    date: new Date().toISOString(),
                    type: 'in',
                    amount: targetUdhari.amount,
                    accountId: returnAccount.id,
                    categoryId: 'udhari_settlement',
                    desc: `Udhari Returned by ${targetUdhari.person}`
                };

                setTransactions([...updatedTransactions, settlementTx]);
                
                // Mark Udhari as settled
                setUdhariLog(udhariLog.map(u => u.id === udhariId ? { ...u, isSettled: true } : u));
                alert("Settled successfully. Balances updated.");
            };

            return (
                <React.Fragment>
                    {/* TOP NAV */}
                    <header className="p-4 flex justify-between items-center border-b border-line bg-surface">
                        <div className="font-bold text-lg text-brand">JB Finance OS</div>
                        <div className="text-sm font-semibold flex items-center gap-1 text-red">
                            🔥 Streak [{streak}]
                        </div>
                    </header>

                    {/* MAIN CONTENT AREA */}
                    <div className="content-scroll p-4">
                        {activeTab === 'DASH' && <Dashboard 
                            availableToday={availableToday} 
                            liquidBalance={liquidBalance}
                            accounts={accounts}
                            transactions={transactions}
                            categories={categories}
                            setActiveTab={setActiveTab}
                        />}
                        {activeTab === 'LOG' && <AddExpense accounts={accounts} categories={categories} setTransactions={setTransactions} setAccounts={setAccounts} />}
                        {activeTab === 'PROVISIONS' && <Provisions provisions={provisions} setProvisions={setProvisions} accounts={accounts} setAccounts={setAccounts} setTransactions={setTransactions} />}
                        {activeTab === 'UDHARI' && <Udhari udhariLog={udhariLog} setUdhariLog={setUdhariLog} accounts={accounts} setAccounts={setAccounts} setTransactions={setTransactions} handleSettleUdhari={handleSettleUdhari} />}
                        {activeTab === 'SETUP' && <Settings accounts={accounts} setAccounts={setAccounts} categories={categories} setCategories={setCategories} theme={theme} setTheme={setTheme} />}
                    </div>

                    {/* BOTTOM NAV */}
                    <div className="bottom-nav">
                        <div className={`nav-item ${activeTab === 'DASH' ? 'active' : ''}`} onClick={() => setActiveTab('DASH')}>
                            <i data-lucide="layout-dashboard"></i><span>Dash</span>
                        </div>
                        <div className={`nav-item ${activeTab === 'LOG' ? 'active' : ''}`} onClick={() => setActiveTab('LOG')}>
                            <i data-lucide="plus-circle"></i><span>Log</span>
                        </div>
                        <div className={`nav-item ${activeTab === 'PROVISIONS' ? 'active' : ''}`} onClick={() => setActiveTab('PROVISIONS')}>
                            <i data-lucide="briefcase"></i><span>Wealth</span>
                        </div>
                        <div className={`nav-item ${activeTab === 'UDHARI' ? 'active' : ''}`} onClick={() => setActiveTab('UDHARI')}>
                            <i data-lucide="users"></i><span>Udhari</span>
                        </div>
                        <div className={`nav-item ${activeTab === 'SETUP' ? 'active' : ''}`} onClick={() => setActiveTab('SETUP')}>
                            <i data-lucide="settings"></i><span>Setup</span>
                        </div>
                    </div>
                </React.Fragment>
            );
        }

        // ==========================================
        // 1. DASHBOARD COMPONENT (Cozy & Decluttered)
        // ==========================================
        function Dashboard({ availableToday, liquidBalance, accounts, transactions, categories, setActiveTab }) {
            const physicalCash = accounts.filter(a => a.type === 'cash').reduce((sum, a) => sum + a.balance, 0);
            const spentThisMonth = transactions.filter(t => t.type === 'out').reduce((sum, t) => sum + t.amount, 0); // Simplified for demo
            
            const bankTotal = accounts.filter(a => a.type === 'bank').reduce((sum, a) => sum + a.balance, 0);
            const ccTotal = accounts.filter(a => a.type === 'cc').reduce((sum, a) => sum + Math.abs(a.balance), 0);

            const [showBanks, setShowBanks] = useState(false);
            const [showCCs, setShowCCs] = useState(false);

            // Chart Render Effect
            useEffect(() => {
                const ctx = document.getElementById('expenseChart');
                if(ctx) {
                    // Simple mock data for chart
                    new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: ['Household', 'Fuel', 'Lifestyle'],
                            datasets: [{
                                data: [15000, 5000, 7277],
                                backgroundColor: ['#6B8E23', '#CD5C5C', '#D2B48C'],
                                borderWidth: 0
                            }]
                        },
                        options: {
                            cutout: '70%',
                            plugins: { legend: { display: false } },
                            onClick: (evt, item) => {
                                if(item.length > 0) {
                                    // Clicking routes to Log Tab
                                    setActiveTab('LOG'); 
                                }
                            }
                        }
                    });
                }
            }, [activeTab]);

            return (
                <div className="flex flex-col gap-4">
                    {/* HERO STRIP */}
                    <div className="bg-brand p-6 rounded-xl text-center shadow-lg">
                        <div className="text-sm opacity-80 mb-1">Available Today</div>
                        <div className="text-4xl font-bold mb-2">₹{availableToday.toLocaleString()}</div>
                        <div className="text-xs opacity-90">
                            (Liquid: ₹{liquidBalance.toLocaleString()} | Spent this month: ₹{spentThisMonth.toLocaleString()})
                        </div>
                    </div>

                    {/* CASH STRIP */}
                    <div className="card p-3 flex justify-between items-center">
                        <div className="font-bold">💵 Net Cash</div>
                        <div className="text-green font-bold">₹{physicalCash.toLocaleString()}</div>
                    </div>

                    {/* COLLAPSED SUMMARIES */}
                    <div className="card">
                        <div className="p-4 border-b border-line flex justify-between items-center cursor-pointer" onClick={() => setShowBanks(!showBanks)}>
                            <span className="font-bold">🏦 Bank Balances</span>
                            <span className="font-bold">₹{bankTotal.toLocaleString()} {showBanks ? '▲' : '▼'}</span>
                        </div>
                        {showBanks && (
                            <div className="p-4 bg-base">
                                {accounts.filter(a => a.type === 'bank' && !a.isArchived).map(b => (
                                    <div key={b.id} className="flex justify-between text-sm mb-2"><span className="text-muted">{b.name}</span><span>₹{b.balance.toLocaleString()}</span></div>
                                ))}
                            </div>
                        )}

                        <div className="p-4 flex justify-between items-center cursor-pointer" onClick={() => setShowCCs(!showCCs)}>
                            <span className="font-bold">💳 Credit Card Dues</span>
                            <span className="font-bold text-red">₹{ccTotal.toLocaleString()} {showCCs ? '▲' : '▼'}</span>
                        </div>
                        {showCCs && (
                            <div className="p-4 border-t border-line bg-base">
                                {accounts.filter(a => a.type === 'cc' && !a.isArchived).map(c => (
                                    <div key={c.id} className="flex justify-between text-sm mb-2"><span className="text-muted">{c.name}</span><span className="text-red">₹{Math.abs(c.balance).toLocaleString()}</span></div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* CLICKABLE CHART (No list) */}
                    <div className="card p-4 items-center flex flex-col">
                        <div className="text-sm font-bold text-muted mb-4">Spends (Click slice to filter logs)</div>
                        <div className="w-48 h-48 relative">
                            <canvas id="expenseChart"></canvas>
                            <div className="absolute inset-0 flex items-center justify-center font-bold text-xl">
                                ₹27,277
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 2. PROVISIONS (CFO-Level Command Center)
        // ==========================================
        function Provisions({ provisions, setProvisions, accounts, setAccounts, setTransactions }) {
            const [isAdding, setIsAdding] = useState(false);
            const [target, setTarget] = useState('');
            const [saved, setSaved] = useState('');
            const [monthly, setMonthly] = useState('');
            const [name, setName] = useState('');

            const handleSaveProvision = () => {
                if(!name || !target || !saved || !monthly) return;
                const newProv = {
                    id: Date.now().toString(),
                    name, targetAmount: parseFloat(target), savedTillDate: parseFloat(saved), monthlyContribution: parseFloat(monthly)
                };
                setProvisions([...provisions, newProv]);
                setIsAdding(false);
            };

            const handleFund = (provId) => {
                // Interactive Button Logic (Simplified for demo - ideally opens a modal to select source account)
                const amt = prompt("Amount to deposit into this envelope?");
                if(amt && !isNaN(amt)) {
                    setProvisions(provisions.map(p => p.id === provId ? {...p, savedTillDate: p.savedTillDate + parseFloat(amt)} : p));
                    // In real app, deduct from selected bank account here
                }
            };

            return (
                <div className="flex flex-col gap-4">
                    <div className="flex justify-between items-center">
                        <h2 className="font-bold text-xl">Wealth Envelopes</h2>
                        <button onClick={() => setIsAdding(true)} className="bg-brand px-3 py-1 rounded font-bold text-sm">+ Add</button>
                    </div>

                    {isAdding && (
                        <div className="card p-4 flex flex-col gap-3">
                            <div className="font-bold border-b border-line pb-2">Smart Legacy Setup</div>
                            <input type="text" placeholder="Provision Name (e.g., Car Down Payment)" className="w-full p-2 rounded bg-base border border-line" onChange={e => setName(e.target.value)} />
                            <input type="number" placeholder="Target Amount (e.g., 360000)" className="w-full p-2 rounded bg-base border border-line" onChange={e => setTarget(e.target.value)} />
                            <input type="number" placeholder="Provisioned Till Date (Already saved)" className="w-full p-2 rounded bg-base border border-line" onChange={e => setSaved(e.target.value)} />
                            <input type="number" placeholder="Monthly Contribution" className="w-full p-2 rounded bg-base border border-line" onChange={e => setMonthly(e.target.value)} />
                            <button onClick={handleSaveProvision} className="bg-brand p-2 rounded font-bold">Save Envelope</button>
                        </div>
                    )}

                    {provisions.map(p => {
                        const percent = Math.min((p.savedTillDate / p.targetAmount) * 100, 100);
                        const monthsLeft = Math.ceil((p.targetAmount - p.savedTillDate) / p.monthlyContribution);
                        return (
                            <div key={p.id} className="card p-4">
                                <div className="flex justify-between font-bold mb-1">
                                    <span>{p.name}</span>
                                    <span className="text-green">₹{p.savedTillDate.toLocaleString()} / ₹{p.targetAmount.toLocaleString()}</span>
                                </div>
                                <div className="text-xs text-muted mb-3">{monthsLeft} months remaining @ ₹{p.monthlyContribution}/mo</div>
                                
                                {/* Progress Bar */}
                                <div className="w-full bg-base rounded-full h-2.5 mb-4 border border-line">
                                  <div className="bg-brand h-2.5 rounded-full" style={{width: `${percent}%`}}></div>
                                </div>

                                {/* Command Center Buttons */}
                                <div className="flex gap-2">
                                    <button onClick={() => handleFund(p.id)} className="flex-1 bg-surface border border-line p-2 rounded text-sm font-bold text-green">+ Add Funds</button>
                                    <button className="flex-1 bg-surface border border-line p-2 rounded text-sm font-bold text-red">- Withdraw</button>
                                </div>
                            </div>
                        )
                    })}
                    {provisions.length === 0 && !isAdding && <div className="text-muted text-center p-4">No wealth envelopes created.</div>}
                </div>
            );
        }

        // ==========================================
        // 3. SETTINGS (Accordion & Archive Logic)
        // ==========================================
        function Settings({ accounts, setAccounts, categories, setCategories, theme, setTheme }) {
            const [openAcc, setOpenAcc] = useState('');

            const toggleAccordion = (id) => setOpenAcc(openAcc === id ? '' : id);

            const handleArchiveAccount = (id) => {
                setAccounts(accounts.map(a => a.id === id ? { ...a, isArchived: !a.isArchived } : a));
            };

            return (
                <div className="flex flex-col gap-4">
                    <h2 className="font-bold text-xl mb-2">Enterprise Setup</h2>

                    {/* Theme Engine */}
                    <div className="card p-4 mb-4">
                        <div className="font-bold mb-2">Theme Engine</div>
                        <select className="w-full p-2 bg-base border border-line rounded" value={theme} onChange={e => setTheme(e.target.value)}>
                            <option value="deep-autumn">Deep Autumn (Default)</option>
                            <option value="executive-midnight">Executive Midnight</option>
                            <option value="nordic-light">Nordic Light</option>
                            <option value="terminal-quant">Terminal Quant</option>
                        </select>
                    </div>

                    {/* Accordion 1: Accounts */}
                    <div className="card">
                        <div className="accordion-header" onClick={() => toggleAccordion('acc')}>
                            <span>🏦 Manage Accounts & Cards</span>
                            <span>{openAcc === 'acc' ? '▼' : '▶'}</span>
                        </div>
                        <div className={`accordion-content ${openAcc === 'acc' ? '' : 'hidden'}`}>
                            {accounts.map(a => (
                                <div key={a.id} className="flex justify-between items-center p-2 border-b border-line last:border-0">
                                    <span className={a.isArchived ? 'line-through text-muted' : ''}>{a.name}</span>
                                    <button onClick={() => handleArchiveAccount(a.id)} className={`text-xs p-1 rounded border ${a.isArchived ? 'bg-green-900 text-green-200' : 'bg-red-900 text-red-200'}`}>
                                        {a.isArchived ? 'Activate' : 'Archive'}
                                    </button>
                                </div>
                            ))}
                            <button className="w-full mt-2 p-2 bg-surface border border-line rounded text-sm text-brand">+ Add New Account</button>
                        </div>
                    </div>

                    {/* Accordion 2: Categories */}
                    <div className="card">
                        <div className="accordion-header" onClick={() => toggleAccordion('cat')}>
                            <span>🏷️ Manage Categories</span>
                            <span>{openAcc === 'cat' ? '▼' : '▶'}</span>
                        </div>
                        <div className={`accordion-content ${openAcc === 'cat' ? '' : 'hidden'}`}>
                            <div className="text-muted text-sm italic">Same archive logic applied here.</div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 4. UDHARI (Dedicated Flow & Settlement)
        // ==========================================
        function Udhari({ udhariLog, setUdhariLog, accounts, setAccounts, setTransactions, handleSettleUdhari }) {
            const [isAdding, setIsAdding] = useState(false);
            
            // Dummy add function for demo
            const handleAdd = () => {
                const newUdhari = { id: Date.now().toString(), person: 'Sikhu', amount: 5000, givenModeType: 'bank', isSettled: false, linkedTxId: 'tx123' };
                setUdhariLog([...udhariLog, newUdhari]);
                setIsAdding(false);
            };

            return (
                <div className="flex flex-col gap-4">
                    <div className="flex justify-between items-center">
                        <h2 className="font-bold text-xl">Udhari Ledger</h2>
                        <button onClick={() => setIsAdding(true)} className="bg-brand px-3 py-1 rounded font-bold text-sm">+ Give Advance</button>
                    </div>

                    {isAdding && (
                        <div className="card p-4 text-center">
                            <p className="text-sm mb-2">Form opens here. Deducts from Account, creates CA tagged transaction.</p>
                            <button onClick={handleAdd} className="bg-brand p-2 rounded">Simulate Giving 5000 from Bank</button>
                        </div>
                    )}

                    {udhariLog.filter(u => !u.isSettled).map(u => (
                        <div key={u.id} className="card p-4">
                            <div className="flex justify-between font-bold mb-2">
                                <span>{u.person}</span>
                                <span className="text-red">₹{u.amount} (Given via {u.givenModeType})</span>
                            </div>
                            {/* Settlement Trigger */}
                            <div className="flex gap-2 mt-4">
                                <select id={`settle-${u.id}`} className="flex-1 bg-base p-2 rounded border border-line">
                                    <option value="">Select Return Mode...</option>
                                    {accounts.filter(a => !a.isArchived).map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
                                </select>
                                <button onClick={() => {
                                    const sel = document.getElementById(`settle-${u.id}`).value;
                                    if(sel) handleSettleUdhari(u.id, sel);
                                }} className="bg-brand p-2 rounded font-bold text-sm">Settle</button>
                            </div>
                        </div>
                    ))}
                    {udhariLog.filter(u => !u.isSettled).length === 0 && !isAdding && <div className="text-muted text-center p-4">All advances cleared!</div>}
                </div>
            );
        }

        // ==========================================
        // 5. ADD EXPENSE (Placeholder to show dropdown filter)
        // ==========================================
        function AddExpense({ accounts }) {
            return (
                <div className="card p-4">
                    <h2 className="font-bold text-xl mb-4">Log Expense</h2>
                    <label className="text-sm text-muted">Paid From</label>
                    <select className="w-full p-3 rounded bg-base border border-line mt-1 mb-4">
                        {/* ZERO HARDCODING & ARCHIVE FILTERING */}
                        {accounts.filter(a => !a.isArchived).map(a => (
                            <option key={a.id} value={a.id}>{a.name} (₹{a.balance})</option>
                        ))}
                    </select>
                    <p className="text-sm text-muted">Notice how archived accounts don't appear here, but balances remain accurate in the dashboard!</p>
                </div>
            )
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
