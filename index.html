        <div onClick={()=>setView('list')} style={{cursor:'pointer',color:'var(--blue)',fontFamily:'var(--mono)',fontSize:12}}>← Back</div>
        <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:'var(--text)'}}>{sel}</div><div style={{fontSize:11,color:out>0?'var(--amber)':out<0?'var(--green)':'var(--text3)',fontFamily:'var(--mono)'}}>{out>0?'owes you '+fmtAmt(out):out<0?'you owe '+fmtAmt(Math.abs(out)):'settled ✓'}</div></div>
        <div onClick={()=>{setForm(f=>({...f,person_name:sel}));setView('add');}} style={{background:'var(--green)',color:'#000',fontFamily:'var(--mono)',fontSize:11,fontWeight:600,padding:'6px 12px',borderRadius:6,cursor:'pointer'}}>+ Entry</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,padding:'10px 16px',borderBottom:'1px solid var(--border)'}}>
        {[['Given',fmtAmt(p?.given||0),'var(--amber)'],['Received',fmtAmt(p?.received||0),'var(--green)'],['Balance',fmtAmt(Math.abs(out)),out>0?'var(--red)':'var(--green)']].map(([l,v,c])=>(<div key={l} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 10px',textAlign:'center'}}><div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:3}}>{l.toUpperCase()}</div><div style={{fontSize:14,fontWeight:600,fontFamily:'var(--mono)',color:c}}>{v}</div></div>))}
      </div>
      {entries.map(e=>(<div key={e.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 16px',borderBottom:'1px solid var(--border)'}}>
        <div><div style={{fontSize:12,color:e.direction==='given'?'var(--amber)':'var(--green)',fontFamily:'var(--mono)',fontWeight:600}}>{e.direction==='given'?'▲ Diya':'▼ Wapas'} — {fmtAmt(e.amount)}</div><div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{fmtDate(e.created_at)} · {e.mode}{e.notes?' · '+e.notes:''}</div></div>
        <button onClick={()=>onDelete(e.id)} style={{background:'none',border:'1px solid var(--border)',borderRadius:6,color:'var(--text3)',padding:'4px 8px',fontSize:10,fontFamily:'var(--mono)',cursor:'pointer'}}>✕</button>
      </div>))}
      {entries.length===0&&<div className="empty">No entries yet</div>}
    </div>);
  }

  if(view==='add'){
    return(<div className="fade-in" style={{padding:'12px 16px',display:'flex',flexDirection:'column',gap:12}}>
      <div style={{display:'flex',alignItems:'center',gap:12}}><div onClick={()=>setView('list')} style={{cursor:'pointer',color:'var(--blue)',fontFamily:'var(--mono)',fontSize:12}}>← Back</div><span style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>New Udhari Entry</span></div>
      <div><p className="sec-label" style={{marginBottom:6}}>Direction</p><div className="chip-row"><div className={'chip'+(form.direction==='given'?' sel-amber':'')} onClick={()=>setForm(f=>({...f,direction:'given'}))}>▲ Maine diya</div><div className={'chip'+(form.direction==='received'?' sel':'')} onClick={()=>setForm(f=>({...f,direction:'received'}))}>▼ Wapas mila</div></div></div>
      <div><p className="sec-label" style={{marginBottom:6}}>Person</p><input style={iS} placeholder="e.g. Rajesh Senghani" value={form.person_name} onChange={e=>setForm(f=>({...f,person_name:e.target.value}))}/></div>
      <div style={{display:'flex',gap:8}}><div style={{flex:1}}><p className="sec-label" style={{marginBottom:6}}>Amount (₹)</p><input style={iS} type="number" placeholder="0" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/></div><div style={{flex:1}}><p className="sec-label" style={{marginBottom:6}}>Date</p><input style={{...iS,color:form.txn_date!==todayStr?'var(--amber)':'var(--text)'}} type="date" value={form.txn_date} max={todayStr} onChange={e=>setForm(f=>({...f,txn_date:e.target.value}))}/></div></div>
      <div><p className="sec-label" style={{marginBottom:6}}>Mode (account)</p><div className="chip-row">{allBanks.map(a=><div key={a} className={'chip'+(form.mode===a?' sel':'')} onClick={()=>setForm(f=>({...f,mode:a}))}>{a}</div>)}</div></div>
      <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 12px',fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)'}}>📝 Sirf yaaddasht ke liye — {form.direction==='given'?<span style={{color:'var(--amber)'}}>Maine diya tha {form.person_name||'...'} ko</span>:<span style={{color:'var(--green)'}}>Wapas mila {form.person_name||'...'} se</span>}</div>
      <button onClick={handleAdd} disabled={saving||!form.person_name.trim()||!form.amount} style={{background:saving||!form.person_name.trim()||!form.amount?'var(--bg3)':'var(--green)',border:'none',borderRadius:8,color:saving||!form.person_name.trim()||!form.amount?'var(--text3)':'#000',fontFamily:'var(--mono)',fontSize:13,fontWeight:600,padding:14,cursor:'pointer',transition:'all 0.2s'}}>{saving?'Saving...':'Save — '+(form.direction==='given'?'Diya':'Wapas')+' ₹'+(form.amount||0)}</button>
    </div>);
  }

  return(<div className="fade-in" style={{paddingBottom:8,width:'100%',boxSizing:'border-box'}}>
    <div style={{padding:'10px 16px',borderBottom:'1px solid var(--border)',background:'var(--bg2)',display:'flex',justifyContent:'space-between',alignItems:'center',width:'100%',boxSizing:'border-box'}}>
      <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',letterSpacing:'0.08em',textTransform:'uppercase'}}>Total Outstanding</span>
      <span style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:700,color:'var(--amber)'}}>{fmtAmt(totalOut)}</span>
    </div>
    {personList.length===0&&<div className="empty">Koi udhari nahi hai.<br/>"+ New" dabao pehli entry karne ke liye.</div>}
    {personList.map(p=>(<div key={p.name} onClick={()=>{setSel(p.name);setView('person');}} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',borderBottom:'1px solid var(--border)',cursor:'pointer'}}>
      <div><div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{p.name}</div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:3}}>Diya {fmtAmt(p.given)}{p.received>0&&<span style={{color:'var(--green)'}}> · Wapas {fmtAmt(p.received)}</span>}</div></div>
      <div style={{textAlign:'right'}}><div style={{fontSize:14,fontWeight:600,fontFamily:'var(--mono)',color:p.outstanding>0?'var(--amber)':p.outstanding<0?'var(--green)':'var(--text3)'}}>{p.outstanding>0?fmtAmt(p.outstanding):p.outstanding<0?'−'+fmtAmt(Math.abs(p.outstanding)):'✓ Settled'}</div><div style={{fontSize:9,color:'var(--text3)',marginTop:2}}>{p.outstanding>0?'owes you':p.outstanding<0?'you owe':'clear'}</div></div>
    </div>))}
  </div>);
}
/* ── SiteLedgerScreen Mobile Bank-Statement Ledger ── */
function SiteLedgerScreen({txns,customSites,customTeam,opening,allBanks,allCC}){
  allBanks = allBanks||['Cash','KB','UB','YB'];
  allCC    = allCC   ||[];
  const sites=customSites||[];
  const [selSite,setSelSite]=useState('ALL');
  const [selMember,setSelMember]=useState(null);
  const [periodFilter,setPeriodFilter]=useState('this_month');
  const now=new Date();const curMonth=now.getMonth();const curYear=now.getFullYear();
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  /* ── siteTxns: ALL site-related transactions ──────────────────────
     Capture: domain=Site, tower=SITE, type=Site Transfer,
     or DE-migrated rows with dr/cr_ledger starting 'Site Cash'.
     This ensures past bank→site and cash→site entries appear here.
  ─────────────────────────────────────────────────────────────── */
  const isSiteTxn=t=>(
    t.domain==='Site'||
    t.tower==='SITE'||
    t.type==='Site Transfer'||
    t.type==='Site Settlement'||
    (t.dr_ledger&&t.dr_ledger.startsWith('Site Cash'))||
    (t.cr_ledger&&t.cr_ledger.startsWith('Site Cash'))
  );
  const siteTxns=txns.filter(t=>isSiteTxn(t)&&t.status!=='voided');

  const inPeriod=t=>{
    const d=new Date(t.created_at);
    if(periodFilter==='this_month')return d.getMonth()===curMonth&&d.getFullYear()===curYear;
    if(periodFilter==='last_month'){const lm=curMonth===0?11:curMonth-1,ly=curMonth===0?curYear-1:curYear;return d.getMonth()===lm&&d.getFullYear()===ly;}
    if(periodFilter==='this_year')return d.getFullYear()===curYear;
    return true;
  };

  const scOpening=(()=>{const v=opening['Site Cash'];if(!v)return 0;if(typeof v==='object')return v.amount||0;return v||0;})();
  const scOpeningDate=(()=>{const v=opening['Site Cash'];if(v&&typeof v==='object')return v.opening_date||null;return null;})();

  /* getDebitCredit: DEBIT = personal money went to site (site owes more);
     CREDIT = site returned money (site owes less); ZERO = pool-internal */
  const personalAccts = [...allBanks.filter(b=>b!=='Site Cash'), ...allCC];

  const getDebitCredit=t=>{
    const amt=parseFloat(t.amount)||0;
    /* Site Settlement = Cash/Bank ledger entry, NOT a Site Cash outstanding change */
    if(t.type==='Site Settlement') return{debit:0,credit:0};
    if(t.dr_ledger&&t.cr_ledger){
      if(t.dr_ledger.startsWith('Site Cash')) return{debit:amt,credit:0};
      if(t.cr_ledger.startsWith('Site Cash')) return{debit:0,credit:amt};
    }
    /* Site Ledger convention — Site Cash is YOUR asset (money site owes you):
       DEBIT  = money came IN to site/you = outstanding reduces (good)
                → PH gave to pool, PH gave to your bank
       CREDIT = money went OUT from site/you = outstanding increases (bad)
                → you paid from bank/CC, pool paid workers, you paid cash
       
       Balance: more NEGATIVE = site owes you MORE
       Running: openingBal - credit + debit  (but we use debit-credit convention below
                so runBal = runBal - debit + credit with NEGATED convention)
       
       SIMPLER: keep debit=invested(out), credit=received(in) for display
       runBal = opening - invested + received → more negative when invested > received
    */
    if(t.type==='Expense'||t.type==='UA Expense'){
      /* Expense = money out = invested (debit in our display) */
      if(t.from_account==='Site Cash'||personalAccts.includes(t.from_account))
        return{debit:amt,credit:0};
      return{debit:0,credit:0};
    }
    if(t.type==='Income'||t.type==='UA Received'){
      if(personalAccts.includes(t.to_account)) return{debit:0,credit:amt};
      return{debit:0,credit:0};
    }
    if(t.type==='Site Transfer'){
      const from=t.from_account||'', to=t.to_account||'';
      /* Money OUT (invested) → debit: from personal, from pool */
      if(personalAccts.includes(from)||from==='Site Cash') return{debit:amt,credit:0};
      /* Money IN (received) → credit: to personal, to pool */
      if(personalAccts.includes(to)||to==='Site Cash') return{debit:0,credit:amt};
      return{debit:0,credit:0};
    }
    return{debit:0,credit:0};
  };

  const getAcctLabel=t=>{
    if(t.dr_ledger&&t.cr_ledger){
      if(t.dr_ledger.startsWith('Site Cash')) return t.cr_ledger;
      if(t.cr_ledger.startsWith('Site Cash')) return t.dr_ledger;
    }
    const from=t.from_account||'', to=t.to_account||'';
    if(personalAccts.includes(from)) return from;
    if(personalAccts.includes(to))   return to;
    if(t.to_account&&t.to_account!=='Site Cash') return t.to_account;
    return t.from_account||t.to_account||'—';
  };

  const filteredTxns=[...siteTxns]
    .filter(t=>selSite==='ALL'?true:t.site_name===selSite)
    .filter(t=>inPeriod(t))
    .sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));

  const txnsBeforePeriod=[...siteTxns]
    .filter(t=>selSite==='ALL'?true:t.site_name===selSite)
    .filter(t=>!inPeriod(t)&&(filteredTxns.length===0||new Date(t.created_at)<new Date(filteredTxns[0].created_at)));
  const openingBal=txnsBeforePeriod.reduce((s,t)=>{const{debit,credit}=getDebitCredit(t);return s-debit+credit;},scOpening);

  let runBal=openingBal;
  const rows=filteredTxns.map(t=>{
    const{debit,credit}=getDebitCredit(t);
    runBal=runBal-debit+credit;
    const party=t.party_name||t.site_user;
    /* Direction-aware auto-description for Site Transfer:
       Debit  = given / invested → "Given to [party]" or "Transferred to Site via [bank]"
       Credit = received / recovered → "Received from [party]" or "Recovered via [bank]" */
    const acct=getAcctLabel(t);
    const siteTransferDesc=(()=>{
      if(t.type!=='Site Transfer') return null;
      const{debit}=getDebitCredit(t);
      const isGiven=debit>0;
      if(party) return isGiven?'Given to '+party:'Received from '+party;
      if(acct&&acct!=='—'&&acct!=='Site Cash Pool'){
        return isGiven?'Transferred via '+acct:'Recovered to '+acct;
      }
      return isGiven?'Site Transfer (Outflow)':'Site Transfer (Recovery)';
    })();
    const desc=t.particulars||siteTransferDesc||(party?(t.type==='Income'?'Received from '+party:'Given to '+party):null)||t.category||t.type;
    return{...t,debit,credit,runBal,desc,acct};
  });

  const totDebit=rows.reduce((s,r)=>s+r.debit,0);
  const totCredit=rows.reduce((s,r)=>s+r.credit,0);
  const closeBal=openingBal-totDebit+totCredit;

  /* getMemberBalance: sum expenses, income, transfers for a member */
  const getMemberTxns=m=>siteTxns.filter(t=>(t.party_name===m||t.site_user===m));
  const getMemberBalance=m=>{
    const mt=getMemberTxns(m);
    const given=mt.filter(t=>t.type==='Expense'||(t.type==='Bank\u2192Bank'&&t.to_account===m)||(t.type==='Site Transfer'&&(t.to_account===m||(!t.to_account&&t.from_account)))).reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
    const received=mt.filter(t=>t.type==='Income'||(t.type==='Bank\u2192Bank'&&t.from_account===m)||(t.type==='Site Transfer'&&t.from_account===m)).reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
    return{given,received,net:given-received,count:mt.length};
  };

  const partiesInTxns=[...new Set(siteTxns.map(t=>t.party_name||t.site_user).filter(Boolean))];
  const activeMembers=[...new Set([...partiesInTxns,...(customTeam||[])])];

  const chipS=a=>({fontFamily:'var(--mono)',fontSize:10,padding:'5px 12px',borderRadius:20,border:a?'1px solid var(--green)':'1px solid var(--border2)',color:a?'var(--green)':'var(--text2)',background:a?'var(--green-bg)':'var(--bg2)',cursor:'pointer',userSelect:'none',whiteSpace:'nowrap'});

  const handlePrint=()=>{
    const periodLabel=periodFilter==='this_month'?`${MONTHS[curMonth]} ${curYear}`:periodFilter==='last_month'?`${MONTHS[curMonth===0?11:curMonth-1]} ${curMonth===0?curYear-1:curYear}`:periodFilter==='this_year'?`FY ${curYear}`:'All Time';
    const html=`<!DOCTYPE html><html><head><title>Site Ledger ${periodLabel}</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:16px;color:#111;}h1{font-size:13px;margin-bottom:2px;}h2{font-size:10px;color:#555;margin-bottom:12px;}table{width:100%;border-collapse:collapse;margin-top:8px;}th{background:#1a1a2e;color:#fff;padding:6px 8px;text-align:left;font-size:8px;text-transform:uppercase;letter-spacing:.06em;}td{padding:6px 8px;border-bottom:1px solid #e0e0e0;}.amt{text-align:right;white-space:nowrap;}.dr{color:#c0392b;}.cr{color:#27ae60;}.balp{color:#27ae60;font-weight:700;}.baln{color:#c0392b;font-weight:700;}.op{background:#f5f5f5;font-weight:600;}.cl{background:#e8f5e9;font-weight:700;}.sumg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}.sb{border:1px solid #ddd;padding:8px;border-radius:4px;}.sl{font-size:7px;text-transform:uppercase;color:#888;margin-bottom:3px;}.sv{font-size:12px;font-weight:700;}@media print{body{padding:8px;}}</style></head><body><h1>Site Ledger — ${selSite==='ALL'?'All Sites':selSite}</h1><h2>${periodLabel} · ${rows.length} txns · ${new Date().toLocaleString('en-IN')}</h2><div class="sumg"><div class="sb"><div class="sl">Opening</div><div class="sv ${openingBal<0?'baln':'balp'}">${openingBal<0?'−':''}&#8377;${Math.abs(openingBal).toLocaleString('en-IN',{minimumFractionDigits:2})}</div></div><div class="sb"><div class="sl">Expense</div><div class="sv dr">&#8377;${totDebit.toLocaleString('en-IN',{minimumFractionDigits:2})}</div></div><div class="sb"><div class="sl">Income</div><div class="sv cr">&#8377;${totCredit.toLocaleString('en-IN',{minimumFractionDigits:2})}</div></div></div><table><thead><tr><th width="9%">Date</th><th width="28%">Description</th><th width="13%">Category</th><th width="12%">Account</th><th width="12%" class="amt">Income</th><th width="12%" class="amt">Expense</th><th width="14%" class="amt">Balance</th></tr></thead><tbody><tr class="op"><td colspan="4">OPENING BALANCE</td><td class="amt">—</td><td class="amt">—</td><td class="amt ${openingBal<0?'baln':'balp'}">${openingBal<0?'−':''}&#8377;${Math.abs(openingBal).toLocaleString('en-IN',{minimumFractionDigits:2})}</td></tr>${rows.map(r=>`<tr><td>${fmtDate(r.created_at)}</td><td>${r.desc||'—'}</td><td>${r.type==='Site Transfer'?'Site Transfer':(r.category||'—')}</td><td>${r.acct}</td><td class="amt cr">${r.credit>0?'&#8377;'+r.credit.toLocaleString('en-IN',{minimumFractionDigits:2}):'—'}</td><td class="amt dr">${r.debit>0?'&#8377;'+r.debit.toLocaleString('en-IN',{minimumFractionDigits:2}):'—'}</td><td class="amt ${r.runBal<0?'baln':'balp'}">${r.runBal<0?'−':''}&#8377;${Math.abs(r.runBal).toLocaleString('en-IN',{minimumFractionDigits:2})}</td></tr>`).join('')}<tr class="cl"><td colspan="4">CLOSING BALANCE</td><td class="amt cr">&#8377;${totCredit.toLocaleString('en-IN',{minimumFractionDigits:2})}</td><td class="amt dr">&#8377;${totDebit.toLocaleString('en-IN',{minimumFractionDigits:2})}</td><td class="amt ${closeBal<0?'baln':'balp'}">${closeBal<0?'−':''}&#8377;${Math.abs(closeBal).toLocaleString('en-IN',{minimumFractionDigits:2})}</td></tr></tbody></table></body></html>`;
    const w=window.open('','_blank');w.document.write(html);w.document.close();w.print();
  };

  /* ── CSV EXPORT + DRIVE BACKUP ── */
  const buildCSV=()=>{
    const periodLabel=periodFilter==='this_month'?`${MONTHS[curMonth]} ${curYear}`:periodFilter==='last_month'?`${MONTHS[curMonth===0?11:curMonth-1]} ${curMonth===0?curYear-1:curYear}`:periodFilter==='this_year'?`FY ${curYear}`:'All Time';
    const headers=['Date','Description','Type','Category','Mode / Account','Party','Site','Income (INR)','Expense (INR)','Balance (INR)'];
    let bal=openingBal;
    const dataRows=rows.map(r=>{
      const income=r.credit>0?r.credit.toFixed(2):'';
      const expense=r.debit>0?r.debit.toFixed(2):'';
      bal=bal-r.debit+r.credit;
      const cat=r.type==='Site Transfer'?'Site Transfer':(r.category||'');
      return [fmtDate(r.created_at),r.desc||'',r.type,cat,r.acct||'',r.party_name||r.site_user||'',r.site_name||'',income,expense,bal.toFixed(2)].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',');
    });
    return [
      `"Site Ledger — ${selSite==='ALL'?'All Sites':selSite} — ${periodLabel}"`,
      '',
      headers.map(h=>`"${h}"`).join(','),
      ...dataRows,
      '',
      `"Opening Balance","","","","","","","","","${openingBal.toFixed(2)}"`,
      `"Closing Balance","","","","","","","","","${closeBal.toFixed(2)}"`,
      `"Total Income","","","","","","","${totCredit.toFixed(2)}","",""`,
      `"Total Expense","","","","","","","","${totDebit.toFixed(2)}",""`,
    ].join('\n');
  };

  const handleDownloadCSV=()=>{
    const csv=buildCSV();
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const periodLabel=periodFilter==='this_month'?`${MONTHS[curMonth]}_${curYear}`:periodFilter==='last_month'?`${MONTHS[curMonth===0?11:curMonth-1]}_${curMonth===0?curYear-1:curYear}`:periodFilter==='this_year'?`FY${curYear}`:'All';
    a.href=url;a.download=`SiteLedger_${selSite==='ALL'?'All':selSite}_${periodLabel}.csv`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    showToastSL('CSV downloaded — open in Google Sheets or Excel');
  };

  const [driveStatus,setDriveStatus]=useState('');
  const [driveUploading,setDriveUploading]=useState(false);
  const DRIVE_CLIENT_ID=localStorage.getItem('jbf_drive_client_id')||'';

  const handleDriveBackup=async()=>{
    if(!DRIVE_CLIENT_ID){
      const id=window.prompt('Enter your Google OAuth Client ID (one-time setup):\n\nGet it from console.cloud.google.com → APIs → Credentials\nScope needed: drive.file');
      if(!id)return;
      localStorage.setItem('jbf_drive_client_id',id.trim());
      window.location.reload();return;
    }
    setDriveUploading(true);setDriveStatus('Connecting to Google...');
    try{
      if(!window.google?.accounts?.oauth2){
        await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://accounts.google.com/gsi/client';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
      }
      const accessToken=await new Promise((resolve,reject)=>{
        const client=window.google.accounts.oauth2.initTokenClient({
          client_id:DRIVE_CLIENT_ID,
          scope:'https://www.googleapis.com/auth/drive.file',
          callback:(resp)=>{if(resp.error){reject(new Error(resp.error));}else{resolve(resp.access_token);}}
        });
        client.requestAccessToken();
      });
      setDriveStatus('Uploading...');
      const csv=buildCSV();
      const periodLabel=periodFilter==='this_month'?`${MONTHS[curMonth]}_${curYear}`:periodFilter==='last_month'?`${MONTHS[curMonth===0?11:curMonth-1]}_${curMonth===0?curYear-1:curYear}`:periodFilter==='this_year'?`FY${curYear}`:'All';
      const filename=`SiteLedger_${selSite==='ALL'?'All':selSite}_${periodLabel}_${new Date().toISOString().slice(0,10)}.csv`;
      const boundary='jbf_bnd';
      const meta=JSON.stringify({name:filename,mimeType:'application/vnd.google-apps.spreadsheet'});
      const body=`--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${meta}\r\n--${boundary}\r\nContent-Type: text/csv\r\n\r\n${csv}\r\n--${boundary}--`;
      const resp=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
        method:'POST',
        headers:{'Authorization':'Bearer '+accessToken,'Content-Type':`multipart/related; boundary=${boundary}`},
        body
      });
      if(!resp.ok)throw new Error('Upload failed '+resp.status);
      const result=await resp.json();
      setDriveStatus(`Saved: ${filename}`);
      showToastSL('Backed up to Google Drive as Spreadsheet!');
    }catch(e){
      setDriveStatus('Error: '+e.message);
    }
    setDriveUploading(false);
  };

  const showToastSL=msg=>{
    const el=document.createElement('div');
    el.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg4,#1a1a2e);color:var(--text,#e8ecf4);padding:10px 18px;border-radius:10px;font-family:monospace;font-size:12px;z-index:999;white-space:nowrap;border:1px solid var(--border2,#243655);';
    el.textContent=msg;document.body.appendChild(el);
    setTimeout(()=>{if(document.body.contains(el))document.body.removeChild(el);},3500);
  };

  /* ── MEMBER DETAIL ── */
  if(selMember){
    const mt=[...getMemberTxns(selMember)].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    const{given,received,net}=getMemberBalance(selMember);
    let mBal=0;
    const mRows=mt.map(t=>{const{debit,credit}=getDebitCredit(t);mBal=mBal-debit+credit;return{...t,debit,credit,mBal,desc:t.particulars||t.category||t.type,acct:t.from_account||t.to_account||'—'};});
    return(<div className="fade-in" style={{paddingBottom:32}}>
      <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',borderBottom:'1px solid var(--border)',background:'var(--bg2)'}}>
        <div onClick={()=>setSelMember(null)} style={{cursor:'pointer',color:'var(--blue)',fontFamily:'var(--mono)',fontSize:12,padding:'4px 10px',border:'1px solid var(--blue)',borderRadius:6}}>← Back</div>
        <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>{selMember}</div><div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginTop:1}}>{mt.length} entries</div></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',borderBottom:'1px solid var(--border)'}}>
        {[['Given',given,'var(--red)'],['Received',received,'var(--green)'],['Net',Math.abs(net),net>0?'var(--amber)':'var(--green)']].map(([l,v,c])=>(
          <div key={l} style={{padding:'10px 12px',borderRight:'1px solid var(--border)'}}>
            <div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)',textTransform:'uppercase',marginBottom:3}}>{l}</div>
            <div style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:700,color:c}}>{l==='Net'&&net<0?'−':''}{fmtAmt(v)}</div>
          </div>
        ))}
      </div>
      {net!==0&&<div style={{padding:'7px 14px',background:net>0?'var(--amber-bg)':'var(--green-bg)',borderBottom:'1px solid var(--border)',fontFamily:'var(--mono)',fontSize:11,color:net>0?'var(--amber)':'var(--green)',fontWeight:600}}>{net>0?`\u26a0 We gave \u20b9${fmt(net)} more`:`\u2713 Received \u20b9${fmt(Math.abs(net))} more`}</div>}
      <div style={{display:'grid',gridTemplateColumns:'46px 1fr minmax(80px,auto) minmax(80px,auto)',padding:'6px 12px',background:'var(--bg3)',borderBottom:'1px solid var(--border)'}}>
        {['Date','Description','Exp/Inc','Balance'].map((h,i)=><span key={h} style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)',textTransform:'uppercase',textAlign:i>1?'right':'left'}}>{h}</span>)}
      </div>
      {mRows.length===0&&<div className="empty">No transactions yet.</div>}
      {mRows.map((r,i)=>(
        <div key={r.id} style={{padding:'9px 12px',borderBottom:'1px solid var(--border)',background:i%2===0?'var(--bg2)':'var(--bg)'}}>
          <div style={{display:'grid',gridTemplateColumns:'46px 1fr minmax(80px,auto) minmax(80px,auto)',marginBottom:3}}>
            <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)'}}>{fmtDate(r.created_at)}</span>
            <div style={{minWidth:0,paddingRight:4}}><div style={{fontSize:12,color:'var(--text)',fontWeight:500,wordBreak:'break-word',lineHeight:1.3}}>{r.desc}</div></div>
            <span style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:r.debit>0?'var(--red)':'var(--green)',textAlign:'right',whiteSpace:'nowrap'}}>{r.debit>0?'−'+fmtAmt(r.debit):'+'+fmtAmt(r.credit)}</span>
            <span style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:r.mBal<0?'var(--red)':'var(--green)',textAlign:'right',whiteSpace:'nowrap'}}>{r.mBal<0?'−':''}{fmtAmt(Math.abs(r.mBal))}</span>
          </div>
          <div style={{display:'flex',gap:4,flexWrap:'wrap',paddingLeft:52}}>{r.category&&<span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',background:'var(--bg3)',padding:'1px 5px',borderRadius:4}}>{r.category}</span>}{r.acct&&r.acct!=='—'&&<span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--blue)',background:'var(--blue-bg)',padding:'1px 5px',borderRadius:4}}>{r.acct}</span>}</div>
        </div>
      ))}
    </div>);
  }

  /* ── MAIN LIST VIEW ── */
  const periodLabel=periodFilter==='this_month'?`${MONTHS[curMonth]} ${curYear}`:periodFilter==='last_month'?`${MONTHS[curMonth===0?11:curMonth-1]} ${curMonth===0?curYear-1:curYear}`:periodFilter==='this_year'?`FY ${curYear}`:'All Time';

  return(<div className="fade-in" style={{paddingBottom:40}}>

    {/* Summary */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',background:'var(--bg2)',borderBottom:'1px solid var(--border)'}}>
      {[['Opening',openingBal,'var(--text)'],['Expense',totDebit,'var(--red)'],['Income',totCredit,'var(--green)']].map(([l,v,c])=>(
        <div key={l} style={{padding:'10px 12px',borderRight:'1px solid var(--border)'}}>
          <div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:3}}>{l}</div>
          <div style={{fontFamily:'var(--mono)',fontSize:14,fontWeight:700,color:c}}>{v<0?'−':''}{fmtAmt(Math.abs(v))}</div>
        </div>
      ))}
    </div>
    <div style={{padding:'9px 14px',background:closeBal<0?'var(--amber-bg)':'var(--green-bg)',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <span style={{fontFamily:'var(--mono)',fontSize:10,color:closeBal<0?'var(--amber)':'var(--green)',textTransform:'uppercase',letterSpacing:'0.08em'}}>Site Cash Balance</span>
      <span style={{fontFamily:'var(--mono)',fontSize:18,fontWeight:800,color:closeBal<0?'var(--amber)':'var(--green)'}}>{closeBal<0?'−':''}{fmtAmt(Math.abs(closeBal))}</span>
    </div>

    {/* Period filter + print */}
    <div style={{padding:'8px 12px',display:'flex',gap:6,flexWrap:'wrap',borderBottom:'1px solid var(--border)',alignItems:'center'}}>
      {[['this_month','This Mo'],['last_month','Last Mo'],['this_year','This Yr'],['all','All']].map(([k,l])=>(
        <span key={k} style={chipS(periodFilter===k)} onClick={()=>setPeriodFilter(k)}>{l}</span>
      ))}
      <div style={{marginLeft:'auto',display:'flex',gap:5}}>
        <button onClick={handlePrint} style={{background:'var(--blue)',color:'#fff',border:'none',borderRadius:6,padding:'5px 10px',fontFamily:'var(--mono)',fontSize:10,fontWeight:600,cursor:'pointer'}}>🖨</button>
        <button onClick={handleDownloadCSV} title="Download CSV (opens in Excel/Sheets)" style={{background:'var(--green)',color:'#000',border:'none',borderRadius:6,padding:'5px 10px',fontFamily:'var(--mono)',fontSize:10,fontWeight:600,cursor:'pointer'}}>⬇ CSV</button>
        <button onClick={handleDriveBackup} disabled={driveUploading} title="Backup to Google Drive as Spreadsheet" style={{background:driveUploading?'var(--bg3)':'#ea4335',color:driveUploading?'var(--text3)':'#fff',border:'none',borderRadius:6,padding:'5px 10px',fontFamily:'var(--mono)',fontSize:10,fontWeight:600,cursor:'pointer',minWidth:50}}>{driveUploading?'..':'☁ Drive'}</button>
      </div>
      {driveStatus&&<div style={{width:'100%',fontFamily:'var(--mono)',fontSize:9,color:driveStatus.startsWith('Error')?'var(--red)':driveStatus.startsWith('Saved')||driveStatus.includes('Backed')?'var(--green)':'var(--text3)',padding:'4px 0',marginTop:2}}>{driveStatus}</div>}
    </div>

    {/* Site filter */}
    {sites.length>0&&<div style={{padding:'6px 12px',display:'flex',gap:6,flexWrap:'wrap',borderBottom:'1px solid var(--border)'}}>
      {['ALL',...sites].map(s=><span key={s} style={chipS(selSite===s)} onClick={()=>setSelSite(s)}>{s}</span>)}
    </div>}

    {/* Ledger table */}
    <div>
      <div style={{display:'grid',gridTemplateColumns:'46px 1fr minmax(80px,auto) minmax(80px,auto)',padding:'6px 12px',background:'var(--bg3)',borderBottom:'1px solid var(--border)'}}>
        {['Date','Description','Exp/Inc','Balance'].map((h,i)=><span key={h} style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',textAlign:i>1?'right':'left'}}>{h}</span>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'46px 1fr minmax(80px,auto) minmax(80px,auto)',padding:'8px 12px',background:'var(--bg3)',borderBottom:'1px solid var(--border)'}}>
        <span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)'}}>{scOpeningDate||'Start'}</span>
        <span style={{fontFamily:'var(--mono)',fontSize:10,fontWeight:600,color:'var(--text2)'}}>Opening Balance</span>
        <span style={{fontFamily:'var(--mono)',fontSize:10,textAlign:'right',color:'var(--text3)'}}>—</span>
        <span style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:openingBal<0?'var(--amber)':'var(--green)',textAlign:'right'}}>{openingBal<0?'−':''}{fmtAmt(Math.abs(openingBal))}</span>
      </div>
      {rows.length===0&&<div className="empty">No transactions for this period.</div>}
      {rows.map((r,i)=>(
        <div key={r.id} style={{padding:'9px 12px',borderBottom:'1px solid var(--border)',background:i%2===0?'var(--bg2)':'var(--bg)'}}>
          <div style={{display:'grid',gridTemplateColumns:'46px 1fr minmax(80px,auto) minmax(80px,auto)',marginBottom:4}}>
            <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)'}}>{fmtDate(r.created_at)}</span>
            <div style={{minWidth:0,paddingRight:4}}><div style={{fontSize:12,color:'var(--text)',fontWeight:500,wordBreak:'break-word',lineHeight:1.3}}>{r.desc}</div></div>
            <span style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:r.debit>0?'var(--red)':'var(--green)',textAlign:'right',whiteSpace:'nowrap'}}>{r.debit>0?'−'+fmtAmt(r.debit):'+'+fmtAmt(r.credit)}</span>
            <span style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:r.runBal<0?'var(--amber)':'var(--green)',textAlign:'right',whiteSpace:'nowrap'}}>{r.runBal<0?'−':''}{fmtAmt(Math.abs(r.runBal))}</span>
          </div>
          <div style={{display:'flex',gap:4,flexWrap:'wrap',paddingLeft:52}}>
            {r.type==='Site Transfer'
              ?<span style={{fontFamily:'var(--mono)',fontSize:9,color:r.debit>0?'var(--red)':('var(--green)'),background:r.debit>0?'var(--red-bg)':'var(--green-bg)',padding:'1px 5px',borderRadius:4}}>
                {r.debit>0?'↓ Paid via ':'↑ Rcvd to '}{r.acct}
               </span>
              :<>{r.category&&<span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',background:'var(--bg3)',padding:'1px 5px',borderRadius:4}}>{r.category}</span>}{r.acct&&r.acct!=='—'&&<span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--blue)',background:'var(--blue-bg)',padding:'1px 5px',borderRadius:4}}>{r.acct}</span>}</>}
            {r.site_name&&<span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--amber)',background:'var(--amber-bg)',padding:'1px 5px',borderRadius:4}}>{r.site_name}</span>}
          </div>
        </div>
      ))}
      {rows.length>0&&<div style={{display:'grid',gridTemplateColumns:'46px 1fr minmax(80px,auto) minmax(80px,auto)',padding:'9px 12px',background:'var(--green-bg)',borderBottom:'2px solid var(--green)'}}>
        <span/>
        <div><div style={{fontFamily:'var(--mono)',fontSize:10,fontWeight:700,color:'var(--text)'}}>Closing Balance</div><div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',marginTop:1}}>−{fmtAmt(totDebit)} / +{fmtAmt(totCredit)}</div></div>
        <span/>
        <span style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:800,color:closeBal<0?'var(--amber)':'var(--green)',textAlign:'right',alignSelf:'center'}}>{closeBal<0?'−':''}{fmtAmt(Math.abs(closeBal))}</span>
      </div>}
    </div>

    {/* Member cards */}
    <p className="sec-label" style={{marginTop:12}}>Member Ledger <span style={{fontWeight:400,color:'var(--text3)'}}>· tap to drill down</span></p>
    <div style={{padding:'0 12px 8px',display:'flex',flexDirection:'column',gap:8}}>
      {activeMembers.length===0&&<div className="empty" style={{textAlign:'left',padding:'12px 0',fontSize:11}}>No member transactions yet.</div>}
      {activeMembers.map(m=>{
        const{given,received,net,count}=getMemberBalance(m);
        if(count===0)return null;
        return(
          <div key={m} onClick={()=>setSelMember(m)} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'12px 14px',cursor:'pointer'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{width:34,height:34,borderRadius:8,background:net>0?'var(--amber-bg)':'var(--green-bg)',border:'1px solid '+(net>0?'var(--amber)':'var(--green)'),display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--mono)',fontSize:12,fontWeight:700,color:net>0?'var(--amber)':'var(--green)'}}>{m.slice(0,2).toUpperCase()}</div>
                <div><div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{m}</div><div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',marginTop:1}}>{count} txns</div></div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontFamily:'var(--mono)',fontSize:15,fontWeight:700,color:net>0?'var(--amber)':'var(--green)'}}>{net<0?'−':net>0?'+':''}{fmtAmt(Math.abs(net))}</div>
                <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',marginTop:1}}>{net>0?'we gave more':'they gave more'}</div>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,borderTop:'1px solid var(--border)',paddingTop:8}}>
              <div style={{display:'flex',justifyContent:'space-between'}}><span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',textTransform:'uppercase'}}>💸 Given</span><span style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:'var(--red)'}}>{fmtAmt(given)}</span></div>
              <div style={{display:'flex',justifyContent:'flex-end',gap:8}}><span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',textTransform:'uppercase'}}>💰 Rcvd</span><span style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:'var(--green)'}}>{fmtAmt(received)}</span></div>
            </div>
          </div>
        );
      })}
    </div>

  </div>);
}

/* ── CashflowScreen ──────────────────────────────────────────────
   Income & Cashflow + YNAB Zero-Based Budgeting
   Sections:
     1. Month Selector
     2. Cashflow Summary (Income − Expense − CC Payments = Net)
     3. Income Sources breakdown
     4. 6-month Income vs Expense trend bar chart
     5. YNAB Budget Envelopes — zero-based, "To Assign" balance
     6. Budget category editor (add/remove, set limits)
───────────────────────────────────────────────────────────────── */
function CashflowScreen({txns,budgets,onSaveBudgets,liquid,allBanks,balances,recurring}){
  budgets=budgets||{};
  const now=new Date();
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const [selYear,setSelYear]=useState(now.getFullYear());
  const [selMonth,setSelMonth]=useState(now.getMonth());
  const [ynabView,setYnabView]=useState('envelopes'); /* 'envelopes' | 'editor' */
  const [draftBudgets,setDraftBudgets]=useState({...budgets});
  const [savingBudgets,setSavingBudgets]=useState(false);
  const [newCat,setNewCat]=useState('');
  const [activeSection,setActiveSection]=useState('cashflow'); /* 'cashflow' | 'ynab' */

  /* Sync draft budgets */
  React.useEffect(()=>{setDraftBudgets({...budgets});},[JSON.stringify(budgets)]);

  const active=txns.filter(t=>t.status!=='voided');

  /* Month navigation */
  const prevMonth=()=>{if(selMonth===0){setSelMonth(11);setSelYear(y=>y-1);}else setSelMonth(m=>m-1);};
  const nextMonth=()=>{const isCurrentMonth=selYear===now.getFullYear()&&selMonth===now.getMonth();if(isCurrentMonth)return;if(selMonth===11){setSelMonth(0);setSelYear(y=>y+1);}else setSelMonth(m=>m+1);};
  const isCurrentMonth=selYear===now.getFullYear()&&selMonth===now.getMonth();

  /* Filter txns for month */
  const monthTxns=active.filter(t=>{const d=new Date(t.created_at);return d.getMonth()===selMonth&&d.getFullYear()===selYear;});

  /* Cashflow calculations */
  const income=monthTxns.filter(t=>t.type==='Income').reduce((s,t)=>s+(+t.amount),0);
  const expense=monthTxns.filter(t=>t.type==='Expense').reduce((s,t)=>s+(+t.amount),0);
  const ccPay=monthTxns.filter(t=>t.type==='CC-Bank'||t.type==='Bank→CC').reduce((s,t)=>s+(+t.amount),0);
  const uaExp=monthTxns.filter(t=>t.type==='UA Expense').reduce((s,t)=>s+(+t.amount),0);
  const uaRecv=monthTxns.filter(t=>t.type==='UA Received').reduce((s,t)=>s+(+t.amount),0);
  const netCashflow=income-expense-ccPay;

  /* Income sources */
  const incSources={};
  monthTxns.filter(t=>t.type==='Income').forEach(t=>{
    const src=t.category||t.particulars||'Other';
    incSources[src]=(incSources[src]||0)+(+t.amount);
  });
  const incSourceList=Object.entries(incSources).sort((a,b)=>b[1]-a[1]);

  /* 6-month trend */
  const trend=Array.from({length:6},(_,i)=>{
    let m=selMonth-5+i,y=selYear;
    while(m<0){m+=12;y--;}
    while(m>11){m-=12;y++;}
    const mt=active.filter(t=>{const d=new Date(t.created_at);return d.getMonth()===m&&d.getFullYear()===y;});
    const inc=mt.filter(t=>t.type==='Income').reduce((s,t)=>s+(+t.amount),0);
    const exp=mt.filter(t=>t.type==='Expense').reduce((s,t)=>s+(+t.amount),0);
    return{label:MONTHS[m],inc,exp,isSelected:m===selMonth&&y===selYear};
  });
  const trendMax=Math.max(...trend.map(t=>Math.max(t.inc,t.exp)),1);

  /* Envelope budget: category spend */
  const DEFAULT_CATS=['Household','Fuel','Food','Lifestyle','Maintenance','Travelling','Social','Donation','Child Education','Mobile Recharge'];
  const budgetCats=[...new Set([...DEFAULT_CATS,...Object.keys(budgets),...Object.keys(draftBudgets)])].filter(Boolean);
  const catSpend={};
  monthTxns.filter(t=>t.type==='Expense').forEach(t=>{const c=t.category||'Misc';catSpend[c]=(catSpend[c]||0)+(+t.amount);});
  const totalAssigned=budgetCats.reduce((s,c)=>(draftBudgets[c]||0)+s,0);
  const toAssign=income-totalAssigned;
  const totalSpent=monthTxns.filter(t=>t.type==='Expense').reduce((s,t)=>s+(+t.amount),0);

  const handleSaveBudgets=async()=>{setSavingBudgets(true);await onSaveBudgets(draftBudgets);setSavingBudgets(false);};

  const fmtAmt=v=>v>=1e7?'₹'+(v/1e7).toFixed(2)+'Cr':v>=1e5?'₹'+(v/1e5).toFixed(1)+'L':'₹'+Math.round(v).toLocaleString('en-IN');
  const netCol=netCashflow>0?'var(--green)':netCashflow<0?'var(--red)':'var(--text3)';

  return(
    <div className="fade-in" style={{paddingBottom:24}}>

      {/* Month navigation */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 16px',borderBottom:'1px solid var(--border)',background:'var(--bg2)'}}>
        <button onClick={prevMonth} style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text2)',padding:'5px 12px',fontFamily:'var(--mono)',fontSize:13,cursor:'pointer'}}>‹</button>
        <div style={{textAlign:'center'}}>
          <div style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:700,color:'var(--text)'}}>{MONTHS[selMonth]} {selYear}</div>
          {isCurrentMonth&&<div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--green)',textTransform:'uppercase',letterSpacing:'0.08em'}}>● current</div>}
        </div>
        <button onClick={nextMonth} disabled={isCurrentMonth} style={{background:isCurrentMonth?'var(--bg)':'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,color:isCurrentMonth?'var(--border)':'var(--text2)',padding:'5px 12px',fontFamily:'var(--mono)',fontSize:13,cursor:isCurrentMonth?'default':'pointer'}}>›</button>
      </div>

      {/* Section toggle */}
      <div style={{display:'flex',margin:'8px 10px 4px',background:'var(--bg2)',borderRadius:8,padding:3,gap:3}}>
        {[['cashflow','💹 Cashflow'],['ynab','📊 Budget']].map(([id,label])=>(
          <button key={id} onClick={()=>setActiveSection(id)} style={{flex:1,background:activeSection===id?'var(--bg3)':'transparent',border:activeSection===id?'1px solid var(--border2)':'1px solid transparent',borderRadius:6,color:activeSection===id?'var(--text)':'var(--text3)',fontFamily:'var(--mono)',fontSize:11,fontWeight:activeSection===id?700:400,padding:'7px 4px',cursor:'pointer'}}>{label}</button>
        ))}
      </div>

      {activeSection==='cashflow'&&(<>

        {/* Cashflow summary */}
        <div style={{margin:'6px 10px',background:'var(--bg2)',border:'1.5px solid var(--border2)',borderRadius:10,overflow:'hidden'}}>
          {/* Net Cashflow hero */}
          <div style={{padding:'12px 14px',background:netCashflow>0?'var(--green-bg)':netCashflow<0?'var(--red-bg)':'var(--bg3)',borderBottom:'1px solid var(--border)'}}>
            <div style={{fontFamily:'var(--mono)',fontSize:8,color:netCol,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:3}}>Net Cashflow</div>
            <div style={{fontFamily:'var(--mono)',fontSize:26,fontWeight:800,color:netCol,letterSpacing:'-1px'}}>{netCashflow>=0?'+':''}{fmtAmt(netCashflow)}</div>
            <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',marginTop:3}}>{income>0?Math.round((1-(expense/income))*100)+'% saved this month':'No income logged'}</div>
          </div>
          {/* Waterfall rows */}
          {[
            {label:'Income',value:income,col:'var(--green)',sign:'+',show:true},
            {label:'Expenses',value:expense,col:'var(--red)',sign:'−',show:true},
            ...(ccPay>0?[{label:'CC Payments',value:ccPay,col:'var(--amber)',sign:'−',show:true}]:[]),
            ...(uaExp>uaRecv&&uaExp-uaRecv>0?[{label:'UA Net Out',value:uaExp-uaRecv,col:'var(--amber)',sign:'−',show:true}]:[]),
          ].map((row,i,arr)=>{
            const pct=income>0?Math.min(100,Math.round(row.value/income*100)):0;
            return(
            <div key={i} style={{padding:'8px 14px',borderBottom:i<arr.length-1?'1px solid var(--border)':'none'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)'}}>{row.sign} {row.label}</span>
                <span style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:700,color:row.col}}>{row.sign==='+'?'':row.sign}{fmtAmt(row.value)}</span>
              </div>
              <div style={{background:'var(--bg3)',borderRadius:3,height:4}}>
                <div style={{height:4,borderRadius:3,width:pct+'%',background:row.col,opacity:0.8,transition:'width 0.4s ease'}}/>
              </div>
              {row.sign!=='+'&&income>0&&<div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)',marginTop:2}}>{pct}% of income</div>}
            </div>
          );})}
        </div>

        {/* Income sources */}
        {incSourceList.length>0&&(
          <div style={{margin:'6px 10px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,overflow:'hidden'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',borderBottom:'1px solid var(--border)',background:'var(--bg3)'}}>
              <span style={{fontFamily:'var(--mono)',fontSize:9,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em'}}>Income Sources</span>
              <span style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:'var(--green)'}}>{fmtAmt(income)}</span>
            </div>
            {incSourceList.map(([src,amt],i)=>{
              const pct=income>0?Math.round(amt/income*100):0;
              return(
              <div key={i} style={{padding:'8px 12px',borderBottom:i<incSourceList.length-1?'1px solid var(--border)':'none'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                  <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)',maxWidth:'60%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{src}</span>
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    <span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)'}}>{pct}%</span>
                    <span style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:'var(--green)'}}>{fmtAmt(amt)}</span>
                  </div>
                </div>
                <div style={{background:'var(--bg3)',borderRadius:3,height:3}}>
                  <div style={{height:3,borderRadius:3,width:pct+'%',background:'var(--green)',opacity:0.7}}/>
                </div>
              </div>
            );})}
          </div>
        )}
        {incSourceList.length===0&&(
          <div style={{margin:'6px 10px',padding:'20px',textAlign:'center',fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',background:'var(--bg2)',border:'1px dashed var(--border)',borderRadius:8}}>
