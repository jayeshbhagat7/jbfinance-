/* ── INDEXEDDB WRAPPER (persistent outbox) ── */
const IDB_NAME = 'jbf_offline';
const IDB_VERSION = 1;
const STORE_OUTBOX = 'outbox';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => resolve(req.result);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_OUTBOX)) {
        db.createObjectStore(STORE_OUTBOX, { keyPath: 'id', autoIncrement: true });
      }
    };
  });
}

async function saveToOutbox(txn) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_OUTBOX, 'readwrite');
    const store = tx.objectStore(STORE_OUTBOX);
    const req = store.add({ ...txn, _queued_at: Date.now() });
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function getOutbox() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_OUTBOX, 'readonly');
    const store = tx.objectStore(STORE_OUTBOX);
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

async function clearOutboxItem(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_OUTBOX, 'readwrite');
    const store = tx.objectStore(STORE_OUTBOX);
    const req = store.delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

async function pushOutboxToSupabase(showToastFn) {
  const items = await getOutbox();
  if (items.length === 0) return { success: true, count: 0 };
  
  let pushed = 0;
  for (const item of items) {
    try {
      const payload = { ...item };
      delete payload.id;
      delete payload._queued_at;
      const { error } = await db.from('transactions').insert([payload]);
      if (!error) {
        await clearOutboxItem(item.id);
        pushed++;
      } else {
        console.error('[Outbox] Failed to push item:', item.id, error);
      }
    } catch (e) {
      console.error('[Outbox] Push error:', e);
    }
  }
  
  if (pushed > 0 && showToastFn) {
    showToastFn(`✓ Synced ${pushed} pending transaction${pushed > 1 ? 's' : ''}`);
  }
  
  return { success: true, count: pushed };
}

/* ── STREAK ── */
function getStreak(){
  const today=new Date().toISOString().slice(0,10);
  const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
  const last=localStorage.getItem('jbf_streak_date')||'';
  const cnt=parseInt(localStorage.getItem('jbf_streak_count')||'0');
  const next=last===today?cnt:last===yesterday?cnt+1:1;
  if(last!==today){localStorage.setItem('jbf_streak_date',today);localStorage.setItem('jbf_streak_count',String(next));}
  return next;
}

/* ── PIN LOCK SCREEN ── */
function PinLockScreen({onUnlock}){
  const [digits,setDigits]   = useState([]);
  const [shake,setShake]     = useState(false);
  const [setupMode,setSetupMode] = useState(!localStorage.getItem('jbf_pin_hash'));
  const [setupStep,setSetupStep] = useState(1);
  const [firstPin,setFirstPin]   = useState([]);
  const [msg,setMsg]             = useState('');

  const MAX=4;

  const hashPin = async pin => {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  };

  const addDigit = async d => {
    const next=[...digits,d];
    setDigits(next);
    if(next.length<MAX) return;
    const pin=next.join('');

    if(setupMode){
      if(setupStep===1){
        setFirstPin(next);
        setDigits([]);
        setSetupStep(2);
        setMsg('Confirm your PIN');
      } else {
        if(pin===firstPin.join('')){
          const h=await hashPin(pin);
          localStorage.setItem('jbf_pin_hash',h);
          setMsg('✓ PIN set!');
          setTimeout(()=>onUnlock(),400);
        } else {
          setMsg('❌ PINs did not match — try again');
          setShake(true);setTimeout(()=>setShake(false),500);
          setDigits([]);setSetupStep(1);setFirstPin([]);
        }
      }
    } else {
      const h=await hashPin(pin);
      if(h===localStorage.getItem('jbf_pin_hash')){
        onUnlock();
      } else {
        setMsg('❌ Wrong PIN');
        setShake(true);setTimeout(()=>setShake(false),500);
        setDigits([]);
      }
    }
  };

  const del=()=>setDigits(p=>p.slice(0,-1));

  const KEYS=[1,2,3,4,5,6,7,8,9,null,0,'⌫'];

  const title = setupMode
    ? (setupStep===1 ? 'Set a 4-digit PIN' : 'Confirm PIN')
    : 'Enter PIN';

  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100dvh',background:'var(--bg)',padding:24,userSelect:'none'}}>
      <div style={{textAlign:'center',marginBottom:28}}>
        <div style={{fontFamily:'var(--mono)',fontSize:26,fontWeight:700,color:'var(--green)',letterSpacing:'-1px'}}>JB Finance</div>
        <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginTop:3,letterSpacing:'0.12em',textTransform:'uppercase'}}>{title}</div>
      </div>

      <div style={{
        display:'flex',gap:16,marginBottom:24,
        animation:shake?'pinShake 0.4s ease':'none',
      }}>
        {Array.from({length:MAX}).map((_,i)=>(
          <div key={i} style={{
            width:14,height:14,borderRadius:'50%',
            background:i<digits.length?'var(--green)':'transparent',
            border:'2px solid',
            borderColor:i<digits.length?'var(--green)':'var(--border2)',
            transition:'all 0.15s',
          }}/>
        ))}
      </div>

      {msg&&<div style={{fontFamily:'var(--mono)',fontSize:11,color:msg.startsWith('✓')?'var(--green)':'var(--amber)',marginBottom:14,letterSpacing:'0.04em'}}>{msg}</div>}

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,72px)',gap:12}}>
        {KEYS.map((k,i)=>(
          k===null
            ? <div key={i}/>
            : <button key={i}
                onClick={()=>k==='⌫'?del():digits.length<MAX&&addDigit(k)}
                style={{
                  width:72,height:72,borderRadius:'50%',
                  background:k==='⌫'?'var(--bg2)':'var(--bg3)',
                  border:'1px solid var(--border)',
                  color:'var(--text)',
                  fontFamily:'var(--mono)',
                  fontSize:k==='⌫'?20:24,
                  fontWeight:600,
                  cursor:'pointer',
                  display:'flex',alignItems:'center',justifyContent:'center',
                  WebkitTapHighlightColor:'transparent',
                  transition:'background 0.1s',
                }}
              >{k}</button>
        ))}
      </div>

      {!setupMode&&<button onClick={()=>{
        if(confirm('Forgot PIN? This will remove the PIN lock. You will still need your Supabase password.')){
          localStorage.removeItem('jbf_pin_hash');
          setSetupMode(true);setSetupStep(1);setDigits([]);setMsg('');
        }
      }} style={{marginTop:28,background:'none',border:'none',color:'var(--text3)',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer',textDecoration:'underline'}}>Forgot PIN</button>}

      <style>{`@keyframes pinShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}`}</style>
    </div>
  );
}

/* ── LOGIN SCREEN ── */
function LoginScreen(){
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [loading,setLoading]=useState(false);
  const [msg,setMsg]=useState('');

  const handleLogin=async()=>{
    if(!email||!pass){setMsg('⚠ Email and password required');return;}
    setLoading(true);setMsg('');
    const{error}=await db.auth.signInWithPassword({email,password:pass});
    setLoading(false);
    if(error){setMsg('❌ '+error.message);}
  };

  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100dvh',background:'var(--bg)',padding:24}}>
      <div style={{textAlign:'center',marginBottom:32}}>
        <div style={{fontFamily:'var(--mono)',fontSize:26,fontWeight:700,color:'var(--green)',letterSpacing:'-1px'}}>JB Finance</div>
        <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginTop:3,letterSpacing:'0.12em',textTransform:'uppercase'}}>v2.1-PRO-SITE</div>
      </div>
      <div style={{width:'100%',maxWidth:360,display:'flex',flexDirection:'column',gap:12}}>
        <input type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} style={{padding:12,fontSize:14}}/>
        <input type="password" placeholder="Password" value={pass} onChange={e=>setPass(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleLogin()} style={{padding:12,fontSize:14}}/>
        <button onClick={handleLogin} disabled={loading} style={{background:'var(--green)',color:'#000',fontFamily:'var(--mono)',fontSize:14,fontWeight:600,border:'none',borderRadius:8,padding:14,cursor:'pointer'}}>{loading?'Logging in...':'Log In'}</button>
        {msg&&<div style={{fontFamily:'var(--mono)',fontSize:11,color:msg.startsWith('✓')?'var(--green)':'var(--red)',textAlign:'center',marginTop:8}}>{msg}</div>}

}

/* ── MAIN APP ── */
function App(){
  const [session,setSession]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [pinUnlocked,setPinUnlocked]=useState(false);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState('dash');
  const [txns,setTxns]=useState([]);
  const [opening,setOpening]=useState({});
  const [customAccounts,setCustomAccounts]=useState([]);
  const [customCategories,setCustomCategories]=useState([]);
  const [budgets,setBudgets]=useState([]);
  const [recurring,setRecurring]=useState([]);
  const [checklist,setChecklist]=useState([]);
  const [udhari,setUdhari]=useState([]);
  const [investments,setInvestments]=useState([]);
  const [customSites,setCustomSites]=useState([]);
  const [customTeam,setCustomTeam]=useState([]);
  const [customSiteCats,setCustomSiteCats]=useState([]);
  const [theme,setTheme]=useState(localStorage.getItem('jbf_theme')||'autumn');
  const [toast,setToast]=useState(null);
  const [menuOpen,setMenuOpen]=useState(false);
  const [quickAdd,setQuickAdd]=useState(false);
  const [addPrefill,setAddPrefill]=useState(null);
  const [globalSearch,setGlobalSearch]=useState('');
  const [txnFilter,setTxnFilter]=useState(null);
  const [streak,setStreak]=useState(0);
  const [syncStatus,setSyncStatus]=useState('synced');
  const [syncing,setSyncing]=useState(false);

  useEffect(()=>{
    const{data:listener}=db.auth.onAuthStateChange((event,sess)=>{
      setSession(sess);
      setAuthLoading(false);
      if(sess)setStreak(getStreak());
    });
    return()=>listener?.subscription?.unsubscribe();
  },[]);

  useEffect(()=>{
    const handler=()=>{
      loadData();
    };
    window.addEventListener('jbf-sync-complete',handler);
    return()=>window.removeEventListener('jbf-sync-complete',handler);
  },[]);

  useEffect(()=>{
    const handler=()=>{
      pushOutboxToSupabase(showToast);
    };
    window.addEventListener('online',handler);
    return()=>window.removeEventListener('online',handler);
  },[]);

  useEffect(()=>{
    const checkOutbox=async()=>{
      const items=await getOutbox();
      setSyncStatus(items.length>0?'pending':'synced');
    };
    checkOutbox();
    const interval=setInterval(checkOutbox,5000);
    return()=>clearInterval(interval);
  },[]);

  useEffect(()=>{
    const handler=()=>{
      const formData={};
      document.querySelectorAll('input,select,textarea').forEach(el=>{
        if(el.name)formData[el.name]=el.value;
      });
      if(Object.keys(formData).length>0){
        localStorage.setItem('jbf_form_backup',JSON.stringify(formData));
      }
    };
    window.addEventListener('pagehide',handler);
    return()=>window.removeEventListener('pagehide',handler);
  },[]);

  const showToast=msg=>{
    setToast(msg);
    setTimeout(()=>setToast(null),3000);
  };

  const loadData=useCallback(async()=>{
    if(!session)return;
    setSyncing(true);
    
    const cached=localStorage.getItem('jbf_cache');
    if(cached){
      try{
        const data=JSON.parse(cached);
        setTxns(data.txns||[]);
        setUdhari(data.udhari||[]);
        setInvestments(data.investments||[]);
        setRecurring(data.recurring||[]);
        setChecklist(data.checklist||[]);
        if(data.settings){
          const g=k=>data.settings.find(r=>r.key===k);
          if(g('opening_balances'))try{setOpening(JSON.parse(g('opening_balances').value));}catch(e){}
          if(g('custom_accounts'))try{setCustomAccounts(JSON.parse(g('custom_accounts').value));}catch(e){}
          if(g('custom_categories'))try{setCustomCategories(JSON.parse(g('custom_categories').value));}catch(e){}
          if(g('budgets'))try{setBudgets(JSON.parse(g('budgets').value));}catch(e){}
          if(g('custom_sites'))try{setCustomSites(JSON.parse(g('custom_sites').value));}catch(e){}
          if(g('custom_team'))try{setCustomTeam(JSON.parse(g('custom_team').value));}catch(e){}
          if(g('custom_site_cats'))try{setCustomSiteCats(JSON.parse(g('custom_site_cats').value));}catch(e){}
        }
      }catch(e){console.error('Cache parse error:',e);}
    }

    try{
      await pushOutboxToSupabase(showToast);
      
      const{data:t}=await db.from('transactions').select('*').order('created_at',{ascending:false});
      setTxns(t||[]);
      const{data:u}=await db.from('udhari').select('*').order('created_at',{ascending:false});
      setUdhari(u||[]);
      const{data:inv}=await db.from('investments').select('*').order('buy_date',{ascending:false});
      setInvestments(inv||[]);
      const{data:rec}=await db.from('recurring').select('*').order('due_day',{ascending:true});
      setRecurring(rec||[]);
      const now=new Date();
      const{data:cl}=await db.from('checklist').select('*').eq('month',now.getMonth()+1).eq('year',now.getFullYear());
      setChecklist(cl||[]);
      const{data:s}=await db.from('settings').select('*');
      
      const cacheData={txns:t,udhari:u,investments:inv,recurring:rec,checklist:cl,settings:s};
      localStorage.setItem('jbf_cache',JSON.stringify(cacheData));

      if(s){
        const g=k=>s.find(r=>r.key===k);
        if(g('opening_balances'))try{setOpening(JSON.parse(g('opening_balances').value));}catch(e){}
        if(g('custom_accounts'))try{setCustomAccounts(JSON.parse(g('custom_accounts').value));}catch(e){}
        if(g('custom_categories'))try{setCustomCategories(JSON.parse(g('custom_categories').value));}catch(e){}
        if(g('budgets'))try{setBudgets(JSON.parse(g('budgets').value));}catch(e){}
        if(g('custom_sites'))try{setCustomSites(JSON.parse(g('custom_sites').value));}catch(e){}
        if(g('custom_team'))try{setCustomTeam(JSON.parse(g('custom_team').value));}catch(e){}
        if(g('custom_site_cats'))try{setCustomSiteCats(JSON.parse(g('custom_site_cats').value));}catch(e){}
        if(g('theme')){setTheme(g('theme').value);document.documentElement.setAttribute('data-theme',g('theme').value);localStorage.setItem('jbf_theme',g('theme').value);}
      }
    }catch(e){
      console.error('loadData error:',e);
      showToast('⚠ Load failed: '+e.message);
    }
    
    setLoading(false);
    setSyncing(false);
  },[session]);

  useEffect(()=>{loadData();},[loadData]);

  const activeCustomBanks = customAccounts.filter(a=>a.type==='bank'&&!a.archived).map(a=>a.name);
  const activeCustomCC    = customAccounts.filter(a=>a.type==='cc'&&!a.archived).map(a=>a.name);
  const allBanks    = [...SEED_BANKS,...activeCustomBanks];
  const allCC       = [...SEED_CC,...activeCustomCC];
  const allAccounts = [...allBanks,...allCC];

  const allBanksH   = [...SEED_BANKS,...customAccounts.filter(a=>a.type==='bank').map(a=>a.name)];
  const allCCH      = [...SEED_CC,...customAccounts.filter(a=>a.type==='cc').map(a=>a.name)];
  const allAccountsH= [...allBanksH,...allCCH];

  const activeCats  = [...CATEGORIES,...customCategories.filter(c=>!c.archived).map(c=>({id:c.name,emoji:c.emoji||'•',color:'none',it:c.it||'',parent:c.parent||null}))];
  const allCatsH    = [...CATEGORIES,...customCategories.map(c=>({id:c.name,emoji:c.emoji||'•',color:'none',it:c.it||'',parent:c.parent||null}))];

  const balances = computeBalances(opening,txns,allBanksH,allCCH);
  const liquid   = allBanks.filter(a=>a!=='Site Cash').reduce((s,a)=>s+(balances[a]||0),0);
  const totalCC  = allCC.reduce((s,a)=>s+Math.max(0,-(balances[a]||0)),0);
  const provisionStates = computeProvisions(recurring,txns);
  const totalNetBlocked = provisionStates.reduce((s,p)=>s+p.C,0);
  const trueSpendable = Math.max(0,liquid-totalCC-totalNetBlocked);
  const udhariOut = udhari.filter(u=>u.direction==='given').reduce((s,u)=>s+u.amount,0)-udhari.filter(u=>u.direction==='received').reduce((s,u)=>s+u.amount,0);

  const addTxn = async txn => {
    setSyncStatus('saving');
    const payload={...txn,user_id:session?.user?.id||null};
    if(!('party_name' in payload))payload.party_name=null;
    if(!('tower' in payload))payload.tower=null;
    
    try{
      const{error}=await db.from('transactions').insert([payload]);
      if(!error){
        showToast('✓ '+fmtAmt(txn.amount)+' logged');
        loadData();
        setSyncStatus('synced');
      }else{
        console.error('addTxn error:',error);
        showToast('⚠ Network issue - saved offline');
        await saveToOutbox(payload);
        setSyncStatus('pending');
        if('serviceWorker' in navigator && 'sync' in ServiceWorkerRegistration.prototype){
          const reg=await navigator.serviceWorker.ready;
          await reg.sync.register('sync-txns');
        }
      }
    }catch(e){
      console.error('addTxn network error:',e);
      showToast('⚠ Offline - saved locally');
      await saveToOutbox(payload);
      setSyncStatus('pending');
      if('serviceWorker' in navigator && 'sync' in ServiceWorkerRegistration.prototype){
        const reg=await navigator.serviceWorker.ready;
        await reg.sync.register('sync-txns');
      }
    }
  };

  const deleteTxn = async id => {
    const{error}=await db.from('transactions').update({status:'voided'}).eq('id',id);
    if(!error){showToast('↩ Voided');loadData();}
  };

  const voidAndCorrect = async (orig,corr) => {
    await db.from('transactions').update({status:'voided'}).eq('id',orig.id);
    const c={type:orig.type,amount:corr.amount,category:corr.category,from_account:corr.from_account||orig.from_account,to_account:corr.to_account||orig.to_account,particulars:corr.particulars,tower:orig.tower,it_section:orig.it_section,status:'complete',source:'app-correction',correction_of:orig.id,created_at:corr.created_at||orig.created_at};
    const{error}=await db.from('transactions').insert([c]);
    if(!error){showToast('✓ Corrected');loadData();}
  };

  const saveOpening = async ob=>{await db.from('settings').upsert({key:'opening_balances',value:JSON.stringify(ob)});setOpening(ob);showToast('✓ Balances saved');};
  const saveCustomAccounts = async list=>{await db.from('settings').upsert({key:'custom_accounts',value:JSON.stringify(list)});setCustomAccounts(list);showToast('✓ Accounts updated');};
  const saveBudgets = async bg=>{await db.from('settings').upsert({key:'budgets',value:JSON.stringify(bg)});setBudgets(bg);showToast('✓ Budgets saved');};
  const saveCustomSites = async list=>{await db.from('settings').upsert({key:'custom_sites',value:JSON.stringify(list)});setCustomSites(list);showToast('✓ Sites updated');};
  const saveCustomTeam = async list=>{await db.from('settings').upsert({key:'custom_team',value:JSON.stringify(list)});setCustomTeam(list);showToast('✓ Team updated');};
  const saveCustomSiteCats = async list=>{await db.from('settings').upsert({key:'custom_site_cats',value:JSON.stringify(list)});setCustomSiteCats(list);showToast('✓ Site categories updated');};
  const saveCustomCategories = async list=>{await db.from('settings').upsert({key:'custom_categories',value:JSON.stringify(list)});setCustomCategories(list);showToast('✓ Categories updated');};
  const addCustomCategory = async catObj=>{
    const updated=[...customCategories.filter(c=>c.name!==catObj.name&&!c.archived),{name:catObj.name,emoji:catObj.emoji||'•',it:catObj.it||'',parent:catObj.parent||null}];
    await saveCustomCategories(updated);
  };
  const saveTheme = t=>{
    setTheme(t);
    document.documentElement.setAttribute('data-theme',t);
    localStorage.setItem('jbf_theme',t);
    db.from('settings').upsert({key:'theme',value:t}).catch(()=>{});
  };
  const addRecurring = async entry=>{const{error}=await db.from('recurring').insert([entry]);if(!error){showToast('✓ Saved');loadData();}else showToast('⚠ '+(error.message||'Error'));};
  const deleteRecurring = async id=>{await db.from('recurring').delete().eq('id',id);showToast('↩ Deleted');loadData();};
  const updateRecurring = async (id,fields)=>{const{error}=await db.from('recurring').update(fields).eq('id',id);if(!error){showToast('✓ Updated');loadData();}else showToast('⚠ '+(error.message||'Error'));};

  const tickChecklist = async (rec,cl,amtPaid,fromAccount)=>{
    if(!amtPaid||amtPaid<=0)return;
    const now=new Date().toISOString();const nowD=new Date();
    const txnType=rec.is_cc_payment?'Bank→CC':rec.is_provision?'Bank→Bank':'Expense';
    const txn={type:txnType,amount:amtPaid,category:rec.category||'Household',from_account:fromAccount,to_account:txnType==='Bank→CC'?rec.cc_name||null:txnType==='Bank→Bank'?rec.provision_account||null:null,particulars:rec.name,status:'complete',source:'checklist',created_at:now};
    try{await db.from('transactions').insert([txn]);}catch(e){}
    if(cl?.id){await db.from('checklist').update({status:'paid',amount_paid:amtPaid,paid_at:now}).eq('id',cl.id);}
    else{await db.from('checklist').insert([{recurring_id:rec.id,month:nowD.getMonth()+1,year:nowD.getFullYear(),status:'paid',amount_paid:amtPaid,paid_at:now}]);}
    loadData();showToast('✓ '+rec.name+' logged');
  };

  const handleSettleUdhari = async entry=>{
    const{direction,person_name,amount,mode,txn_date}=entry;
    const ts=(txn_date||new Date().toISOString().slice(0,10))+'T06:30:00.000Z';
    const{error}=await db.from('udhari').insert([{...entry,created_at:ts}]);
    if(error){showToast('⚠ '+error.message);return;}

/* ── VIRTUAL PROVISION TYPES ── */
const PROVISION_VIRTUAL_TYPES=['Provision_Accrue','Provision_Withdraw','Provision_Repay','Provision_Flush'];

/* ── computeBalances ── */
function computeBalances(opening,txns,allBanks,allCC){
  const bal={};
  Object.entries(opening||{}).forEach(([acc,val])=>{
    bal[acc]=(typeof val==='object'&&val!==null)?(val.amount||0):(val||0);
  });
  txns.filter(t=>t.status!=='voided').forEach(t=>{
    const txnDate=(t.created_at||'').slice(0,10);
    const amt=parseFloat(t.amount)||0,from=t.from_account,to=t.to_account,type=t.type;
    if(PROVISION_VIRTUAL_TYPES.includes(type))return;
    const after=acc=>{
      const val=opening[acc];
      if(!val||typeof val!=='object'||!val.opening_date)return true;
      return txnDate>=val.opening_date;
    };
    if(type==='Expense'&&from){if(after(from))bal[from]=(bal[from]||0)-amt;}
    if(type==='Income'&&to){if(after(to))bal[to]=(bal[to]||0)+amt;}
    if(['Bank→CC','Bank→Bank','Cash→Bank','CC→Bank','Bank→Cash'].includes(type)){
      if(from&&after(from))bal[from]=(bal[from]||0)-amt;
      if(to&&after(to))bal[to]=(bal[to]||0)+amt;
    }
  });
  return bal;
}

/* ── computeProvisions ── */
function computeProvisions(recurring,txns){
  const provs=recurring.filter(r=>r.is_provision&&r.active!==false);
  return provs.map(p=>{
    const virtualTxns=txns.filter(t=>t.category===p.name&&t.status==='complete'&&PROVISION_VIRTUAL_TYPES.includes(t.type));
    const accrued=virtualTxns.filter(t=>t.type==='Provision_Accrue').reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
    const withdrawn=virtualTxns.filter(t=>t.type==='Provision_Withdraw').reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
    const C=Math.max(0,accrued-withdrawn);
    const G=parseFloat(p.target_amount)||0;
    const pct=G>0?Math.min(100,(C/G)*100):0;
    return{name:p.name,C,G,pct,id:p.id,account:p.account,provision_account:p.provision_account,due_day:p.due_day};
  });
}

              <option>Dividend</option>

              <option>Wallet</option>
            </select>
          </div>
          <div><p className="sec-label" style={{padding:'0 0 6px'}}>Mode</p>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {['Cash','Cheque','UPI','Transfer'].map(m=><span key={m} style={cs(from===m)} onClick={()=>setFrom(m)}>{m}</span>)}
            </div>
          </div>
          <div><p className="sec-label" style={{padding:'0 0 6px'}}>Deposited In</p>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {allBanks.map(a=><span key={a} style={cs(to===a)} onClick={()=>setTo(a)}>{a}</span>)}
            </div>
          </div>
        </>)}

        {type==='Bank→CC'&&(<>
          <div><p className="sec-label" style={{padding:'0 0 6px'}}>From Bank</p>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {allBanks.filter(a=>a!=='Cash').map(a=><span key={a} style={cs(from===a)} onClick={()=>setFrom(a)}>{a}</span>)}
            </div>
          </div>
          <div><p className="sec-label" style={{padding:'0 0 6px'}}>To Credit Card</p>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {allCC.map(a=><span key={a} style={cs(to===a)} onClick={()=>setTo(a)}>{a}</span>)}
            </div>
          </div>
        </>)}

        {type==='Bank→Bank'&&(<>
          <div><p className="sec-label" style={{padding:'0 0 6px'}}>From Account</p>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {allBanks.map(a=><span key={a} style={cs(from===a)} onClick={()=>setFrom(a)}>{a}</span>)}
            </div>
          </div>
          <div><p className="sec-label" style={{padding:'0 0 6px'}}>To Account</p>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {allBanks.map(a=><span key={a} style={cs(to===a)} onClick={()=>setTo(a)}>{a}</span>)}
            </div>
          </div>
        </>)}

        <input type="number" inputMode="decimal" placeholder="Amount (₹)" value={amt} onChange={e=>setAmt(e.target.value)} style={{fontSize:20,padding:'12px 14px',fontWeight:600}}/>
        <input type="text" placeholder="Description (optional)" value={desc} onChange={e=>setDesc(e.target.value)}/>
        <input type="date" value={date} max={today} onChange={e=>setDate(e.target.value)} style={{color:date!==today?'var(--amber)':'var(--text)',borderColor:date!==today?'var(--amber)':'var(--border2)'}}/>
        {date!==today&&<span style={{fontSize:10,color:'var(--amber)',fontFamily:'var(--mono)'}}>⚠ Backdated entry</span>}
        <SaveBtn/>

        {showCatForm&&(
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
            <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:12,padding:16,maxWidth:400,width:'100%'}}>
              <h3 style={{fontFamily:'var(--mono)',fontSize:12,marginBottom:12,color:'var(--text2)'}}>ADD CATEGORY</h3>
              <input type="text" placeholder="Name" value={newCatName} onChange={e=>setNewCatName(e.target.value)} style={{marginBottom:8}}/>
              <input type="text" placeholder="Emoji (optional)" value={newCatEmoji} onChange={e=>setNewCatEmoji(e.target.value)} style={{marginBottom:12}}/>
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>{
                  if(!newCatName){showToast('⚠ Name required');return;}
                  onAddCategory({name:newCatName,emoji:newCatEmoji||'•'});
                  setCat(newCatName);
                  setShowCatForm(false);
                  setNewCatName('');
                  setNewCatEmoji('');
                }} style={{flex:1,background:'var(--green)',color:'#000',border:'none',borderRadius:8,padding:'10px',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,cursor:'pointer'}}>Save</button>
                <button onClick={()=>{setShowCatForm(false);setNewCatName('');setNewCatEmoji('');}} style={{flex:1,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:8,padding:'10px',fontFamily:'var(--mono)',fontSize:12,cursor:'pointer'}}>Cancel</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  const SITE_TYPES=[
    {key:'Expense',label:'Expense'},{key:'Income',label:'Income'},{key:'Site Transfer',label:'Transfer'},
    {key:'Bank-Bank',label:'Bank→Bank'},{key:'Cash-Bank',label:'Cash→Bank'},{key:'Bank-Cash',label:'Bank→Cash'},
    {key:'CC-Bank',label:'CC→Bank'}
  ];

  const SITE_CATS=customSiteCats&&customSiteCats.length>0?customSiteCats:['Material','Labour','Transport','Misc'];
  const allSiteMembers=(customTeam&&customTeam.length>0)?customTeam:['Me'];

  const selectSiteType=key=>{
    setSiteType(key);
    if(key==='Expense'){setSitePayFrom('Cash');}
    else if(key==='Income'){setDepositTo('Site Cash');}
    else if(key==='Site Transfer'){setTransferUser(allSiteMembers[0]||'');}
    else if(key==='Bank-Bank'){setSitePayFrom(allBanks.find(a=>a!=='Cash')||allBanks[0]);setSiteTo(allBanks.find(a=>a!=='Cash')||allBanks[0]);}
    else if(key==='Cash-Bank'){setSitePayFrom('Cash');setSiteTo(allBanks.find(a=>a!=='Cash')||allBanks[0]);}
    else if(key==='Bank-Cash'){setSitePayFrom(allBanks.find(a=>a!=='Cash')||allBanks[0]);setSiteTo('Cash');}
    else if(key==='CC-Bank'){setSitePayFrom(allCC[0]||'');setSiteTo(allBanks.find(a=>a!=='Cash')||allBanks[0]);}
  };

  const siteFromList=()=>{
    if(['Bank-Bank','Bank-Cash'].includes(siteType))return allBanks.filter(a=>a!=='Cash');
    if(siteType==='Cash-Bank')return['Cash'];
    if(siteType==='CC-Bank')return allCC;
    return['Cash',...allBanks.filter(a=>a!=='Cash'),...allCC];
  };

  const siteToList=()=>{
    if(['Bank-Bank','Cash-Bank','CC-Bank'].includes(siteType))return allBanks.filter(a=>a!=='Cash');
    if(siteType==='Bank-Cash')return['Cash'];
    return['Site Cash',...allBanks.filter(a=>a!=='Cash')];
  };

  const SaveBtn=()=>(
    <>
      {balanceError&&<div className="balance-warning">{balanceError}</div>}
      <button className="save-btn" onClick={handleSave} disabled={!amt||parseFloat(amt)<=0||!!balanceError}>💾 Save</button>
    </>
  );

  return(
    <div className="fade-in" style={{padding:'12px 16px',paddingBottom:'calc(var(--tab-h) + var(--safe-b) + 24px)',display:'flex',flexDirection:'column',gap:12,maxWidth:'600px',margin:'0 auto'}}>
      <div style={{display:'flex',gap:6}}>
        <span style={cs(false)} onClick={()=>setDomain('Personal')}>Personal</span>
        <span style={cs(true)}>Site</span>
      </div>

      <div><p className="sec-label" style={{padding:'0 0 6px'}}>Site</p>
        {(customSites&&customSites.length>0)
          ?<div style={{display:'flex',flexWrap:'wrap',gap:6}}>{customSites.map(s=><span key={s} style={cs(siteName===s)} onClick={()=>setSiteName(s)}>{s}</span>)}</div>
          :<span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>No sites — add in Setup</span>}
      </div>

      <div><p className="sec-label" style={{padding:'0 0 6px'}}>Type</p>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {SITE_TYPES.map(t=><span key={t.key} style={cs(siteType===t.key)} onClick={()=>selectSiteType(t.key)}>{t.label}</span>)}
        </div>
      </div>

        {siteType==='Expense'&&(<>
          <div><p className="sec-label" style={{padding:'0 0 6px'}}>Payment Mode</p>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {['Cash',...allBanks.filter(a=>a!=='Cash')].map(a=><span key={a} style={cs(sitePayFrom===a)} onClick={()=>setSitePayFrom(a)}>{a}</span>)}
            </div>
          </div>
          <div><p className="sec-label" style={{padding:'0 0 6px'}}>Site Category</p>
            <select value={siteCat} onChange={e=>setSiteCat(e.target.value)} style={{fontSize:13,padding:'10px 12px'}}>
              {SITE_CATS.map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
        </>)}


      {siteType==='Income'&&(<>
        <div><p className="sec-label" style={{padding:'0 0 6px'}}>From Member</p>
          <select value={siteMember} onChange={e=>setSiteMember(e.target.value)} style={{borderColor:'var(--green)',color:'var(--green)'}}>
            {allSiteMembers.map(m=><option key={m}>{m}</option>)}
          </select>
        </div>
        <div><p className="sec-label" style={{padding:'0 0 6px'}}>Deposit To</p>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {siteToList().map(a=><span key={a} style={cs(depositTo===a)} onClick={()=>setDepositTo(a)}>{a}</span>)}
          </div>
        </div>
      </>)}

      {!['Expense','Income','Site Transfer'].includes(siteType)&&(<>
        <div><p className="sec-label" style={{padding:'0 0 6px'}}>From Account</p>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {siteFromList().map(a=><span key={a} style={cs(sitePayFrom===a)} onClick={()=>setSitePayFrom(a)}>{a}</span>)}
          </div>
        </div>
        <div><p className="sec-label" style={{padding:'0 0 6px'}}>To Account</p>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {siteToList().map(a=><span key={a} style={cs(siteTo===a)} onClick={()=>setSiteTo(a)}>{a}</span>)}
          </div>
        </div>
      </>)}

            {siteType==='Site Transfer'&&(<>
        <div><p className="sec-label" style={{padding:'0 0 6px'}}>From Member</p>
          <select value={siteMember} onChange={e=>setSiteMember(e.target.value)} style={{fontSize:13,padding:'10px 12px',borderColor:'var(--red)',color:'var(--red)'}}>
            {allSiteMembers.map(m=><option key={m}>{m}</option>)}
          </select>
        </div>
        <div><p className="sec-label" style={{padding:'0 0 6px'}}>To Member</p>
          <select value={transferUser} onChange={e=>setTransferUser(e.target.value)} style={{fontSize:13,padding:'10px 12px',borderColor:'var(--green)',color:'var(--green)'}}>
            {allSiteMembers.map(m=><option key={m}>{m}</option>)}
          </select>
        </div>
        <div><p className="sec-label" style={{padding:'0 0 6px'}}>Mode</p>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {['Cash','Bank Transfer','UPI'].map(m=><span key={m} style={cs(sitePayFrom===m)} onClick={()=>setSitePayFrom(m)}>{m}</span>)}
          </div>
        </div>
      </>)}


      <input type="number" inputMode="decimal" placeholder="Amount (₹)" value={amt} onChange={e=>setAmt(e.target.value)} style={{fontSize:20,padding:'12px 14px',fontWeight:600}}/>
      <input type="text" placeholder="Description (optional)" value={desc} onChange={e=>setDesc(e.target.value)}/>
      <input type="date" value={date} max={today} onChange={e=>setDate(e.target.value)} style={{color:date!==today?'var(--amber)':'var(--text)',borderColor:date!==today?'var(--amber)':'var(--border2)'}}/>
      {date!==today&&<span style={{fontSize:10,color:'var(--amber)',fontFamily:'var(--mono)'}}>⚠ Backdated entry</span>}
      <SaveBtn/>
    </div>
  );
}

/* ── PLACEHOLDER COMPONENTS ── */
function TxnsScreen({txns,onDelete,onVoidAndCorrect,allAccounts,allBanks,allCC,allCategories,globalSearch,setGlobalSearch,txnFilter,setTxnFilter}){
  const [dateFilter,setDateFilter]=useState('This Month');
  const [customStart,setCustomStart]=useState('');
  const [customEnd,setCustomEnd]=useState('');
  const [selected,setSelected]=useState(null);
  const [editMode,setEditMode]=useState(null);
  const [saving,setSaving]=useState(false);
  const [corrAmt,setCorrAmt]=useState('');
  const [corrDesc,setCorrDesc]=useState('');
  const [corrCat,setCorrCat]=useState('');
  const [corrDate,setCorrDate]=useState('');
  const [corrFrom,setCorrFrom]=useState('');
  const [corrTo,setCorrTo]=useState('');
  const [search,setSearch]=useState(globalSearch||'');
  const [showVirtualLogs,setShowVirtualLogs]=useState(false);

  useEffect(()=>{
    if(txnFilter){
      if(txnFilter.account)setSearch(txnFilter.account);
      if(txnFilter.dateRange){
        if(typeof txnFilter.dateRange==='string'){setDateFilter(txnFilter.dateRange==='this_month'?'This Month':txnFilter.dateRange);}
        else if(txnFilter.dateRange.start&&txnFilter.dateRange.end){setDateFilter('Custom');setCustomStart(txnFilter.dateRange.start);setCustomEnd(txnFilter.dateRange.end);}
      }
      setTxnFilter(null);
    }
  },[txnFilter,setTxnFilter]);

  useEffect(()=>{setSearch(globalSearch||'');},[globalSearch]);

  const now2=new Date();
  const curMonth=now2.getMonth();
  const curYear=now2.getFullYear();

  const inWin=t=>{
    const d=new Date(t.created_at);
    if(dateFilter==='This Month')return d.getMonth()===curMonth&&d.getFullYear()===curYear;
    if(dateFilter==='Last Month'){const lm=curMonth===0?11:curMonth-1;const ly=curMonth===0?curYear-1:curYear;return d.getMonth()===lm&&d.getFullYear()===ly;}
    if(dateFilter==='Past 3 Months'){const c=new Date(now2);c.setMonth(c.getMonth()-3);c.setDate(1);return d>=c;}
    if(dateFilter==='This Year')return d.getFullYear()===curYear;
    if(dateFilter==='Custom'){if(customStart&&d<new Date(customStart))return false;if(customEnd&&d>new Date(customEnd+'T23:59:59'))return false;return true;}
    return true;
  };

  const PROVISION_VIRTUAL_TYPES=['Provision_Accrue','Provision_Withdraw','Provision_Repay','Provision_Flush'];

  const filtered=txns.filter(t=>{
    if(!inWin(t))return false;
    if(t.status==='voided')return false;
    if(!showVirtualLogs&&PROVISION_VIRTUAL_TYPES.includes(t.type))return false;
    if(search.trim()){
      const q=search.toLowerCase();
      if(!(t.particulars||'').toLowerCase().includes(q)&&!(t.category||'').toLowerCase().includes(q)&&!String(t.amount).includes(q)&&!(t.from_account||t.to_account||'').toLowerCase().includes(q))return false;
    }
    return true;
  });

  const filteredTotal=filtered.reduce((s,t)=>s+(Number(t.amount)||0),0);

  const amtColor=t=>{
    if(t.status==='voided')return '';
    if(t.type==='Income'||t.type==='UA Received')return 'in';
    if(t.type==='UA Expense')return 'ua';
    if(t.type==='Bank→Bank'||t.type==='Bank→CC')return '';
    return 'out';
  };

  const amtSign=t=>(t.type==='Income'||t.type==='UA Received')?'+':'−';
  const typeLabel=t=>{
    if(t.type==='Income')return 'Income';
    if(t.type==='UA Received')return 'UA Received ↑';
    if(t.type==='UA Expense')return 'UA Expense';
    if(t.type==='Expense')return 'Expense';
    return t.type;
  };

  const handleEdit=t=>{setEditMode(t);setCorrAmt(String(t.amount));setCorrDesc(t.particulars||'');setCorrCat(t.category||'');setCorrDate(new Date(t.created_at).toISOString().slice(0,10));setCorrFrom(t.from_account||'');setCorrTo(t.to_account||'');};

  const handleSaveCorr=async()=>{
    if(!editMode||!corrAmt||saving)return;
    setSaving(true);
    await onVoidAndCorrect(editMode,{amount:parseFloat(corrAmt),particulars:corrDesc||editMode.particulars,category:corrCat||editMode.category,from_account:corrFrom||editMode.from_account,to_account:corrTo||editMode.to_account,created_at:corrDate?corrDate+'T06:30:00.000Z':editMode.created_at});
    setEditMode(null);setSelected(null);setSaving(false);
  };

  const handlePrint=()=>{
    const periodLabel=(()=>{
      if(dateFilter==='This Month')return`${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][curMonth]} ${curYear}`;
      if(dateFilter==='Last Month'){const lm=curMonth===0?11:curMonth-1;const ly=curMonth===0?curYear-1:curYear;return`${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][lm]} ${ly}`;}
      if(dateFilter==='This Year')return`FY ${curYear}`;
      if(dateFilter==='Custom'&&customStart&&customEnd)return`${customStart} to ${customEnd}`;
      return 'All Time';
    })();
    const html=`<!DOCTYPE html><html><head><title>Transactions ${periodLabel}</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:20px;}h1{font-size:14px;margin-bottom:4px;}h2{font-size:11px;font-weight:400;color:#666;margin-bottom:16px;}table{width:100%;border-collapse:collapse;margin-top:12px;}th,td{border:1px solid #ccc;padding:6px 8px;text-align:left;}th{background:#f5f5f5;font-weight:600;font-size:9px;text-transform:uppercase;}td{font-size:10px;}.amt{text-align:right;font-variant-numeric:tabular-nums;}.desc{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}.summary{margin-top:16px;padding:10px;background:#e8f5e9;border:1px solid #4caf50;border-radius:6px;text-align:center;}.summary .label{font-size:8px;text-transform:uppercase;color:#666;margin-bottom:3px;}.summary .value{font-size:14px;font-weight:700;color:#2e7d32;}</style></head><body><h1>Transaction Log</h1><h2>${periodLabel}${search?' · Filtered by "'+search+'"':''}</h2><table><thead><tr><th style="width:12%;">Date</th><th style="width:15%;">Type</th><th style="width:35%;">Description</th><th style="width:18%;">Account</th><th style="width:20%;">Amount (₹)</th></tr></thead><tbody>${filtered.map(t=>`<tr><td>${fmtDate(t.created_at)}</td><td>${typeLabel(t)}</td><td class="desc">${t.particulars||t.category}</td><td>${t.from_account||t.to_account}</td><td class="amt">${amtSign(t)}${fmtAmt(t.amount)}</td></tr>`).join('')}</tbody></table><div class="summary"><div class="label">Total Amount (${filtered.length} transactions)</div><div class="value">₹${fmtAmt(filteredTotal)}</div></div><div style="margin-top:16px;font-size:9px;color:#999;">Generated ${new Date().toLocaleString('en-IN')} · JB Finance v2.1-PRO-SITE</div></body></html>`;
    const w=window.open('','_blank');w.document.write(html);w.document.close();w.print();
  };

  const iS={background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,padding:'7px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',width:'100%'};

  return(
    <div className="fade-in">
      <div style={{padding:'10px 16px 0',display:'flex',flexDirection:'column',gap:8,maxWidth:'600px',margin:'0 auto'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{flex:1,position:'relative'}}>
            <input value={search} onChange={e=>{setSearch(e.target.value);setSelected(null);setEditMode(null);}} placeholder="Search description, category, amount, account..." style={{width:'100%',background:'var(--bg2)',border:'1px solid '+(search?'var(--blue)':'var(--border)'),borderRadius:8,padding:'8px 12px 8px 32px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none'}}/>
            <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:13,color:'var(--text3)',pointerEvents:'none'}}>⌕</span>
          </div>
          {search&&<button onClick={()=>{setSearch('');setGlobalSearch&&setGlobalSearch('');}} style={{background:'none',border:'none',color:'var(--text3)',fontSize:16,cursor:'pointer',padding:'0 4px'}}>✕</button>}
        </div>

        <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
          <select value={dateFilter} onChange={e=>{setDateFilter(e.target.value);setSelected(null);setEditMode(null);}} style={{background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'7px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:11,outline:'none',cursor:'pointer'}}>
            <option>This Month</option><option>Last Month</option><option>Past 3 Months</option><option>This Year</option><option>All Time</option><option>Custom</option>
          </select>
          {dateFilter==='Custom'&&(<>
            <input type="date" value={customStart} onChange={e=>setCustomStart(e.target.value)} style={{background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'7px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:11,outline:'none'}}/>
            <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>to</span>
            <input type="date" value={customEnd} onChange={e=>setCustomEnd(e.target.value)} style={{background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'7px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:11,outline:'none'}}/>
          </>)}
          <label style={{display:'flex',alignItems:'center',gap:6,fontSize:11,fontFamily:'var(--mono)',color:'var(--text3)',cursor:'pointer',marginLeft:'auto'}}>
            <input type="checkbox" checked={showVirtualLogs} onChange={e=>setShowVirtualLogs(e.target.checked)} style={{cursor:'pointer'}}/>
            Show Virtual Logs
          </label>
          {filtered.length>0&&<button onClick={handlePrint} style={{background:'var(--blue)',color:'#fff',border:'none',borderRadius:6,padding:'6px 12px',fontFamily:'var(--mono)',fontSize:10,fontWeight:600,cursor:'pointer'}}>🖨 Print</button>}
        </div>
      </div>

      <div style={{position:'sticky',top:0,zIndex:10,background:'var(--bg)',borderBottom:'1px solid var(--border)',borderTop:'1px solid var(--border)',marginTop:8,maxWidth:'600px',margin:'8px auto 0'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 16px'}}>
          <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em'}}>{filtered.length} Transaction{filtered.length!==1?'s':''}</span>
          <span style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:600,color:'var(--text)'}}>Total: {fmtAmt(filteredTotal)}</span>
        </div>
      </div>

      <div style={{paddingBottom:'calc(var(--tab-h) + var(--safe-b) + 24px)',maxWidth:'600px',margin:'0 auto'}}>
        {filtered.length===0&&<div className="empty">No transactions found.<br/>{!showVirtualLogs&&'Try enabling "Show Virtual Logs" to see provision entries.'}</div>}
        {filtered.map(t=>(
          <div key={t.id} className="txn-row" onClick={()=>setSelected(selected===t.id?null:t.id)}>
            <div className="txn-left">
              <div className="txn-cat">{typeLabel(t)}</div>
              <div className="txn-desc">{t.particulars||t.category}</div>
              <div className="txn-meta">{fmtDate(t.created_at)} {fmtTime(t.created_at)}</div>
            </div>
            <div className="txn-right">
              <div className={`txn-amt ${amtColor(t)}`}>{amtSign(t)}{fmtAmt(t.amount)}</div>

function ProvisionLedger({recurring,txns,allBanks,onAddTxn,onAddRecurring,onDeleteRecurring,onUpdateRecurring,showToast,provisionStates}){
  const [sel,setSel]=useState(null);
  /* qAction: {id, type: 'accrue'|'borrow'|'repay'|'flush'} */
  const [qAction,setQAction]=useState(null);
  const [qAmt,setQAmt]=useState('');const [qNote,setQNote]=useState('');
  const [flushBank,setFlushBank]=useState('');
  const [saving,setSaving]=useState(false);
  const [addOpen,setAddOpen]=useState(false);
  const [form,setForm]=useState({name:'',target_amount:'',already_saved:'',due_date:'',monthly_contribution:'',active:true});
  const [formSaving,setFormSaving]=useState(false);
  /* Edit state */
  const [editId,setEditId]=useState(null);
  const [editForm,setEditForm]=useState({name:'',target_amount:'',already_saved:'',due_date:'',monthly_contribution:''});
  const [editSaving,setEditSaving]=useState(false);

  /* Use pre-computed provisionStates from App (via computeProvisions) */
  const states=provisionStates||[];

  /* ── DVE Action Handler ──
     accrue  → Provision_Accrue  (virtual, increases Gross Saved B)
     borrow  → Provision_Withdraw (virtual, increases Debt D)
     repay   → Provision_Repay   (virtual, decreases Debt D)
     flush   → DUAL WRITE: Provision_Flush (virtual, empties envelope) + Expense (physical debit)
  ── */
  const handleAction=async(prov,type,amt,note,bankAcct)=>{
    const n=parseFloat(amt);if(!n||n<=0){showToast('⚠ Enter a valid amount');return;}
    setSaving(true);
    const now=new Date().toISOString();
    const tag='[ENV:'+prov.id+']';
    if(type==='flush'){
      /* 1. Virtual Provision_Flush — empties the envelope */
      await onAddTxn({type:'Provision_Flush',amount:n,category:prov.name,particulars:tag+(note?' — '+note:''),status:'complete',source:'provision_dve',created_at:now});
      /* 2. Physical Expense — actual money leaves the bank */
      const physBank=bankAcct||(allBanks.find(b=>b!=='Cash')||allBanks[0]||'KB');
      await onAddTxn({type:'Expense',amount:n,category:'Provision',from_account:physBank,particulars:'Flush: '+prov.name+(note?' — '+note:''),status:'complete',source:'provision_flush',created_at:now});
      showToast('✓ Flushed — ₹'+fmt(n)+' debited from '+physBank);
    } else {
      const txnType=type==='accrue'?'Provision_Accrue':type==='borrow'?'Provision_Withdraw':'Provision_Repay';
      await onAddTxn({type:txnType,amount:n,category:prov.name,particulars:tag+(note?' — '+note:''),status:'complete',source:'provision_dve',created_at:now});
      const labels={accrue:'✓ Accrued',borrow:'⚠ Borrowed',repay:'✓ Repaid'};
      showToast((labels[type]||'✓')+' ₹'+fmt(n));
    }
    setQAction(null);setQAmt('');setQNote('');setFlushBank('');setSaving(false);
  };

  const handleAddProv=async()=>{
    if(!form.name.trim())return;
    setFormSaving(true);
    await onAddRecurring({name:form.name.trim(),amount:parseFloat(form.monthly_contribution)||0,frequency:'monthly',due_day:1,account:null,provision_account:null,category:'Provision',target_amount:parseFloat(form.target_amount)||0,already_saved:parseFloat(form.already_saved)||0,due_date:form.due_date||null,is_provision:true,active:true});

  };

  const handleEditOpen=(prov)=>{
    setEditId(prov.id);
    setEditForm({name:prov.name||'',target_amount:prov.target_amount||'',already_saved:prov.already_saved||'',due_date:prov.due_date||'',monthly_contribution:prov.amount||''});
    setSel(null);setQAction(null);

    {/* Add Envelope Form */}
    {addOpen&&(<div style={{margin:'8px 10px',background:'var(--bg2)',border:'1px solid var(--blue)',borderRadius:10,padding:'14px'}}>
      <p style={{fontSize:11,color:'var(--blue)',fontFamily:'var(--mono)',margin:'0 0 12px',fontWeight:600,letterSpacing:'0.06em'}}>NEW VIRTUAL ENVELOPE</p>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        <input style={iS} placeholder="Envelope name (e.g. LIC Premium Oct)" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
        <div style={{display:'flex',gap:8}}>
          <div style={{flex:1}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>TARGET (A)</div><input style={iS} type="number" step="0.01" placeholder="₹ Total needed" value={form.target_amount} onChange={e=>setForm(f=>({...f,target_amount:e.target.value}))}/></div>
          <div style={{flex:1}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>ALREADY SAVED (B₀)</div><input style={iS} type="number" step="0.01" placeholder="₹ already set aside" value={form.already_saved} onChange={e=>setForm(f=>({...f,already_saved:e.target.value}))}/></div>
        </div>
        <div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>TARGET DATE</div><input style={iS} type="date" value={form.due_date} onChange={e=>setForm(f=>({...f,due_date:e.target.value}))}/></div>
        {tgt>0&&(<div style={{background:'var(--amber-bg)',border:'1px solid var(--amber)',borderRadius:8,padding:'10px 12px',fontFamily:'var(--mono)',fontSize:11,display:'flex',gap:16,flexWrap:'wrap'}}>
          <span>Gap: <strong style={{color:'var(--red)'}}>{fmtAmt(gap_)}</strong></span>
          {dueDate_&&<span>Months left: <strong>{monthsLeft_}</strong></span>}
          {sugMonth_>0&&<span>Suggested: <strong style={{color:'var(--green)'}}>{fmtAmt(sugMonth_)}/mo</strong></span>}
        </div>)}
        <div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>MONTHLY ACCRUE (optional)</div><input style={iS} type="number" step="0.01" placeholder={sugMonth_>0?`Suggested: ₹${fmt(sugMonth_)}`:'₹ per month'} value={form.monthly_contribution} onChange={e=>setForm(f=>({...f,monthly_contribution:e.target.value}))}/></div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={handleAddProv} disabled={formSaving||!form.name.trim()} style={{flex:1,background:formSaving||!form.name.trim()?'var(--bg3)':'var(--green)',border:'none',borderRadius:8,color:formSaving||!form.name.trim()?'var(--text3)':'#000',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:12,cursor:'pointer'}}>{formSaving?'Saving...':'Create Envelope'}</button>
          <button onClick={()=>setAddOpen(false)} style={{background:'none',border:'1px solid var(--border2)',borderRadius:8,color:'var(--text3)',padding:'12px 16px',fontFamily:'var(--mono)',fontSize:12,cursor:'pointer'}}>Cancel</button>
        </div>
      </div>
    </div>)}

    {states.length===0&&!addOpen&&<div className="empty">No envelopes yet.<br/>Tap "+ New" to create your first virtual envelope.</div>}

    {states.map(({prov,A,B,C,D,provTxns,pct})=>{
      const isOpen=sel===prov.id;
      const activeType=qAction?.id===prov.id?qAction.type:null;
      const needFlushBank=activeType==='flush';
      const isEditing=editId===prov.id;
      return(<div key={prov.id} className="env-card" style={{margin:'0 10px 10px'}}>

        {/* Header — tap to expand ledger */}
        <div style={{padding:'12px 14px',cursor:'pointer'}} onClick={()=>{if(isEditing)return;setSel(isOpen?null:prov.id);setQAction(null);}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:600,color:'var(--text)',marginBottom:3}}>{prov.name}</div>
              {prov.due_date&&<div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)'}}>Due {new Date(prov.due_date).toLocaleDateString('en-IN',{month:'short',year:'numeric'})}</div>}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0,marginLeft:8}}>
              <div style={{textAlign:'right'}}>
                <div style={{fontFamily:'var(--mono)',fontSize:16,fontWeight:700,color:C>0?'var(--green)':'var(--text3)'}}>{fmtAmt(C)}</div>
                <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',marginTop:2}}>Net Blocked</div>
              </div>
              {/* Edit button */}
              <button onClick={e=>{e.stopPropagation();isEditing?setEditId(null):handleEditOpen(prov);}} style={{background:isEditing?'var(--blue)':'none',border:'1px solid var(--blue)',borderRadius:6,color:isEditing?'#fff':'var(--blue)',fontFamily:'var(--mono)',fontSize:10,fontWeight:600,padding:'5px 9px',cursor:'pointer',flexShrink:0}}>✏</button>
              {/* Delete button */}
              <button onClick={e=>{e.stopPropagation();handleDelete(prov.id);}} style={{background:'none',border:'1px solid var(--red)',borderRadius:6,color:'var(--red)',fontFamily:'var(--mono)',fontSize:10,fontWeight:600,padding:'5px 9px',cursor:'pointer',flexShrink:0}}>✕</button>
            </div>
          </div>

          {/* Inline Edit Form */}
          {isEditing&&(<div onClick={e=>e.stopPropagation()} style={{marginTop:12,background:'var(--bg3)',border:'1px solid var(--blue)',borderRadius:8,padding:'12px',display:'flex',flexDirection:'column',gap:8}}>
            <div style={{fontSize:10,color:'var(--blue)',fontFamily:'var(--mono)',fontWeight:600,letterSpacing:'0.06em',marginBottom:2}}>EDIT ENVELOPE</div>
            <input style={iS} placeholder="Envelope name" value={editForm.name} onChange={e=>setEditForm(f=>({...f,name:e.target.value}))}/>
            <div style={{display:'flex',gap:8}}>
              <div style={{flex:1}}>
                <div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:3}}>TARGET (A)</div>
                <input style={iS} type="number" step="0.01" placeholder="₹ Total needed" value={editForm.target_amount} onChange={e=>setEditForm(f=>({...f,target_amount:e.target.value}))}/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:3}}>ALREADY SAVED (B₀)</div>
                <input style={iS} type="number" step="0.01" placeholder="₹ opening saved" value={editForm.already_saved} onChange={e=>setEditForm(f=>({...f,already_saved:e.target.value}))}/>
              </div>
            </div>
            <div style={{display:'flex',gap:8}}>
              <div style={{flex:1}}>
                <div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:3}}>TARGET DATE</div>
                <input style={iS} type="date" value={editForm.due_date} onChange={e=>setEditForm(f=>({...f,due_date:e.target.value}))}/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:3}}>MONTHLY ACCRUE</div>
                <input style={iS} type="number" step="0.01" placeholder="₹/month" value={editForm.monthly_contribution} onChange={e=>setEditForm(f=>({...f,monthly_contribution:e.target.value}))}/>
              </div>
            </div>
            <div style={{display:'flex',gap:6}}>
              <button onClick={handleEditSave} disabled={editSaving||!editForm.name.trim()} style={{flex:1,background:editSaving?'var(--bg3)':'var(--blue)',border:'none',borderRadius:6,color:editSaving?'var(--text3)':'#fff',fontFamily:'var(--mono)',fontSize:11,fontWeight:700,padding:'10px',cursor:'pointer'}}>{editSaving?'Saving...':'Save Changes'}</button>
              <button onClick={()=>setEditId(null)} style={{background:'none',border:'1px solid var(--border2)',borderRadius:6,color:'var(--text3)',padding:'10px 14px',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer'}}>Cancel</button>
            </div>
          </div>)}

          {/* 4-metric grid: A / B / D / C */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:4,marginTop:10}}>
            {[
              ['A Target',fmtAmt(A),'var(--blue)'],
              ['B Saved',fmtAmt(B),'var(--green)'],
              ['D Debt',fmtAmt(D),D>0?'var(--red)':'var(--text3)'],
              ['C Net',fmtAmt(C),C>0?'var(--green)':'var(--text3)'],
            ].map(([label,val,col])=>(
              <div key={label} style={{background:'var(--bg3)',borderRadius:6,padding:'5px 6px',textAlign:'center',border:label==='D Debt'&&D>0?'1px solid var(--red)':'1px solid var(--border)'}}>
                <div style={{fontSize:8,color:'var(--text3)',fontFamily:'var(--mono)',letterSpacing:'0.06em',marginBottom:2}}>{label.toUpperCase()}</div>
                <div style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:col}}>{val}</div>
              </div>
            ))}
          </div>

          {A>0&&<div className="env-bar" style={{marginTop:8}}><div className="env-fill" style={{width:pct+'%',background:pct>=100?'var(--green)':pct>=60?'var(--blue)':'var(--amber)'}}/></div>}
          {D>0&&<div style={{marginTop:5,display:'inline-flex',alignItems:'center',gap:4,background:'var(--red-bg)',border:'1px solid var(--red)',borderRadius:20,padding:'2px 8px',fontFamily:'var(--mono)',fontSize:9,fontWeight:700,color:'var(--red)'}}>⚠ Debt {fmtAmt(D)} — Repay to clean</div>}
        </div>

        {/* 4-Action Button Row */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:5,padding:'0 12px 10px'}}>
          {[
            {type:'accrue', label:'Accrue', col:'var(--green)'},
            {type:'borrow', label:'Borrow', col:'var(--amber)'},
            {type:'repay',  label:'Repay',  col:'var(--blue)'},
            {type:'flush',  label:'⚡ Execute', col:'var(--red)'},
          ].map(({type,label,col})=>(
            <button key={type}
              onClick={e=>{e.stopPropagation();setQAction(activeType===type?null:{id:prov.id,type});setQAmt('');setQNote('');setFlushBank(allBanks.find(b=>b!=='Cash')||allBanks[0]||'');}}
              style={{background:activeType===type?col:'none',border:'1px solid '+col,borderRadius:6,color:activeType===type?'#000':col,fontFamily:'var(--mono)',fontSize:10,fontWeight:700,padding:'7px 0',cursor:'pointer',transition:'all 0.15s'}}>
              {label}
            </button>
          ))}
        </div>

        {/* Inline Action Form */}
        {activeType&&(<div style={{padding:'0 12px 12px',borderTop:'1px solid var(--border)'}}>
          {/* Context hint */}
          <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',padding:'6px 0 8px',lineHeight:1.6}}>
            {activeType==='accrue'&&'↑ Accrue: Marks more money as virtually saved in this envelope (B increases). No bank movement.'}
            {activeType==='borrow'&&'↩ Borrow: Temporarily uses envelope funds for something else (D increases). Envelope shrinks.'}
            {activeType==='repay' &&'↪ Repay: Returns borrowed funds back to envelope (D decreases). Envelope recovers.'}
            {activeType==='flush' &&'⚡ Execute: Empties the envelope (B→0) AND physically debits the bank. This is the final real-money step.'}
          </div>
          <div style={{display:'flex',gap:6,marginBottom:6}}>
            <input type="number" step="0.01" autoFocus placeholder="Amount (₹)" value={qAmt} onChange={e=>setQAmt(e.target.value)} style={{...iS,flex:'0 0 130px'}}/>
            <input placeholder="Note (optional)" value={qNote} onChange={e=>setQNote(e.target.value)} style={{...iS,flex:1}}/>
          </div>
          {/* Bank picker — only shown for Flush */}
          {needFlushBank&&(
            <div style={{marginBottom:8}}>
              <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>DEBIT FROM BANK (physical debit)</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                {allBanks.filter(b=>b!=='Cash').map(b=>(
                  <span key={b} style={cS(flushBank===b)} onClick={()=>setFlushBank(b)}>{b}</span>
                ))}
              </div>
            </div>
          )}
          <div style={{display:'flex',gap:6}}>
            <button
              onClick={()=>handleAction(prov,activeType,qAmt,qNote,flushBank)}
              disabled={saving||!qAmt||(activeType==='flush'&&!flushBank)}
              style={{flex:1,background:saving||!qAmt||(activeType==='flush'&&!flushBank)?'var(--bg3)':activeType==='flush'?'var(--red)':activeType==='accrue'?'var(--green)':activeType==='borrow'?'var(--amber)':'var(--blue)',border:'none',borderRadius:6,color:saving||!qAmt||(activeType==='flush'&&!flushBank)?'var(--text3)':'#000',fontFamily:'var(--mono)',fontSize:11,fontWeight:700,padding:'10px',cursor:'pointer'}}>
              {saving?'Processing...':`Confirm ${activeType==='accrue'?'Accrue':activeType==='borrow'?'Borrow':activeType==='repay'?'Repay':'Execute'} ${qAmt?'₹'+fmt(parseFloat(qAmt)):''}`}
            </button>
            <button onClick={()=>setQAction(null)} style={{background:'none',border:'1px solid var(--border2)',borderRadius:6,color:'var(--text3)',padding:'10px 14px',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer'}}>✕</button>
          </div>
        </div>)}

        {/* Expanded transaction ledger */}
        {isOpen&&(<div style={{borderTop:'1px solid var(--border)'}}>
          <div style={{padding:'8px 12px',background:'var(--bg3)',borderBottom:'1px solid var(--border)',fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',letterSpacing:'0.08em',textTransform:'uppercase'}}>Transaction Log</div>
          {provTxns.length===0&&<div style={{padding:'12px 14px',fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)'}}>No virtual entries yet. Use Accrue to start building this envelope.</div>}
          {[...provTxns].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).map((t,i)=>{
            const typeConf={
              Provision_Accrue:{label:'↑ Accrued',col:'var(--green)',sign:'+'},
              Provision_Withdraw:{label:'↩ Borrowed',col:'var(--amber)',sign:'−'},
              Provision_Repay:{label:'↪ Repaid',col:'var(--blue)',sign:'+'},
              Provision_Flush:{label:'⚡ Flushed',col:'var(--red)',sign:'−'},
            }[t.type]||{label:t.type,col:'var(--text3)',sign:''};
            return(<div key={t.id||i} style={{display:'flex',justifyContent:'space-between',padding:'8px 14px',borderBottom:'1px solid var(--border)',fontSize:11}}>
              <div>
                <div style={{color:typeConf.col,fontFamily:'var(--mono)',fontWeight:600}}>{typeConf.label}</div>
                <div style={{color:'var(--text3)',marginTop:2,fontSize:10}}>{fmtDate(t.created_at)}{t.particulars&&t.particulars.replace(/\[ENV:[^\]]+\]/,'').trim()?' · '+t.particulars.replace(/\[ENV:[^\]]+\]/,'').trim():''}</div>
              </div>
              <span style={{fontFamily:'var(--mono)',fontWeight:700,color:typeConf.col}}>{typeConf.sign}{fmtAmt(t.amount)}</span>
            </div>);
          })}
        </div>)}

      </div>);
    })}
  </div>);
}

/* ── ChecklistScreen (bills only — provisions are separate) ── */
function ChecklistScreen({recurring,checklist,onTick,onAdd,onDelete,allAccounts,allBanks,allCC,allCategories,balances,setTab,onPrefill}){
  const now=new Date();const month=now.getMonth()+1;const year=now.getFullYear();
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const FREQS=[{k:'monthly',l:'Monthly'},{k:'bimonthly',l:'Every 2 months'},{k:'quarterly',l:'Quarterly'},{k:'half_yearly',l:'Half-yearly'},{k:'annual',l:'Annual'}];
  const [addOpen,setAddOpen]=useState(false);
  const [form,setForm]=useState({name:'',amount:'',frequency:'monthly',due_day:1,due_month:'',due_month2:'',account:'Cash',category:'',notes:'',active:true});
  const [saving,setSaving]=useState(false);
  const iS={background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',width:'100%'};
  const cS=a=>({display:'inline-block',border:a?'1px solid var(--green)':'1px solid var(--border2)',borderRadius:16,padding:'6px 12px',fontFamily:'var(--mono)',fontSize:11,color:a?'var(--green)':'var(--text2)',background:a?'var(--green-bg)':'var(--bg2)',cursor:'pointer',userSelect:'none',margin:'0 4px 4px 0'});
  const getCL=id=>checklist.find(c=>c.recurring_id===id);
  const isDue=r=>{
    if(!r.active&&r.active!==undefined)return false;
    if(r.is_provision)return false; /* provisions excluded from bills */
    if(r.frequency==='monthly')return true;
    if(r.frequency==='bimonthly'){const s=r.due_month||1;return(month-s)%2===0&&month>=s;}
    if(r.frequency==='quarterly'){const s=r.due_month||1;return(month-s)%3===0&&month>=s;}
    if(r.frequency==='half_yearly')return month===r.due_month||month===r.due_month2;
    if(r.frequency==='annual')return month===r.due_month;
    return false;
  };
  /* CC bills auto-appear */
  const ccItems=allCC.map(a=>({balance:balances[a]||0,name:a})).filter(x=>x.balance<0).map(x=>({id:'cc-'+x.name,name:x.name+' bill payment',amount:Math.abs(x.balance),frequency:'monthly',account:allBanks.find(b=>b!=='Cash')||allBanks[0]||'',category:'Credit Card Bill',is_cc_payment:true,cc_name:x.name,due_day:null,active:true}));
  const activeItems=[...ccItems,...recurring.filter(isDue)];
  const paid=activeItems.filter(r=>getCL(r.id)?.status==='paid');
  const pending=activeItems.filter(r=>getCL(r.id)?.status!=='paid');
  const pct=activeItems.length>0?Math.round(paid.length/activeItems.length*100):0;

  const handleAdd=async()=>{
    if(!form.name.trim())return;setSaving(true);
    await onAdd({name:form.name.trim(),amount:parseFloat(form.amount)||0,frequency:form.frequency,due_day:parseInt(form.due_day)||1,due_month:form.due_month?parseInt(form.due_month):null,due_month2:form.due_month2?parseInt(form.due_month2):null,account:form.account,provision_account:null,category:form.category,notes:form.notes,is_provision:false,active:true});
    setForm({name:'',amount:'',frequency:'monthly',due_day:1,due_month:'',due_month2:'',account:'Cash',category:'',notes:'',active:true});setSaving(false);setAddOpen(false);
  };

  return(<div className="fade-in" style={{paddingBottom:8}}>
    <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',background:'var(--bg2)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div><div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{MONTHS[month-1]} {year} — Bills</div><div style={{fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:2}}>{paid.length}/{activeItems.length} done</div></div>
        <button onClick={()=>setAddOpen(o=>!o)} style={{background:'var(--green)',border:'none',borderRadius:8,color:'#000',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:'7px 14px',cursor:'pointer'}}>+ Add</button>
      </div>
      {activeItems.length>0&&<div><div style={{background:'var(--bg3)',borderRadius:3,height:6}}><div style={{height:6,borderRadius:3,transition:'width 0.3s',background:pct===100?'var(--green)':pct>=70?'var(--blue)':'var(--amber)',width:pct+'%'}}/></div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:3,textAlign:'right'}}>{pct}% complete</div></div>}
    </div>

    {addOpen&&(<div style={{margin:'8px 12px',background:'var(--bg2)',border:'1px solid var(--blue)',borderRadius:10,padding:'14px'}}>
      <p style={{fontSize:11,color:'var(--blue)',fontFamily:'var(--mono)',margin:'0 0 10px',fontWeight:600,letterSpacing:'0.06em'}}>ADD RECURRING BILL</p>
      <div style={{display:'flex',gap:8,marginBottom:8}}><input style={{...iS,flex:2}} placeholder="e.g. Society maintenance" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/><input style={{...iS,flex:1}} type="number" placeholder="₹ (0=variable)" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/></div>
      <div style={{marginBottom:8}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:5}}>FREQUENCY</div><div style={{display:'flex',flexWrap:'wrap'}}>{FREQS.map(({k,l})=><span key={k} style={cS(form.frequency===k)} onClick={()=>setForm(f=>({...f,frequency:k}))}>{l}</span>)}</div></div>
      <div style={{display:'flex',gap:8,marginBottom:8}}><div style={{flex:1}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>DUE DAY</div><input style={iS} type="number" min="1" max="31" value={form.due_day} onChange={e=>setForm(f=>({...f,due_day:e.target.value}))}/></div>{['annual','half_yearly','quarterly','bimonthly'].includes(form.frequency)&&<div style={{flex:1}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>{form.frequency==='half_yearly'?'1ST MONTH':'DUE MONTH'}</div><input style={iS} type="number" min="1" max="12" placeholder="e.g. 10" value={form.due_month} onChange={e=>setForm(f=>({...f,due_month:e.target.value}))}/></div>}{form.frequency==='half_yearly'&&<div style={{flex:1}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>2ND MONTH</div><input style={iS} type="number" min="1" max="12" placeholder="e.g. 4" value={form.due_month2} onChange={e=>setForm(f=>({...f,due_month2:e.target.value}))}/></div>}</div>
      <div style={{marginBottom:8}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:5}}>DEFAULT ACCOUNT</div><div style={{display:'flex',flexWrap:'wrap'}}>{allAccounts.map(a=><span key={a} style={cS(form.account===a)} onClick={()=>setForm(f=>({...f,account:a}))}>{a}</span>)}</div></div>
      <input style={{...iS,marginBottom:8}} placeholder="Category (optional)" value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}/>
      <div style={{display:'flex',gap:8}}><button onClick={handleAdd} disabled={saving||!form.name.trim()} style={{flex:1,background:saving||!form.name.trim()?'var(--bg3)':'var(--green)',border:'none',borderRadius:8,color:saving||!form.name.trim()?'var(--text3)':'#000',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:12,cursor:'pointer'}}>{saving?'Saving...':'Save'}</button><button onClick={()=>setAddOpen(false)} style={{background:'none',border:'1px solid var(--border2)',borderRadius:8,color:'var(--text3)',padding:'12px 16px',fontFamily:'var(--mono)',fontSize:12,cursor:'pointer'}}>Cancel</button></div>
    </div>)}

    {paid.length>0&&<><p className="sec-label">Done — {paid.length}</p>{paid.map(r=><RecItem key={r.id} rec={r} cl={getCL(r.id)} onPrefill={onPrefill}/>)}</>}

  </div>);
}
/* ── UdhariScreen — real ledger update + CA audit ── */
function UdhariScreen({udhari,onAdd,onDelete,allAccounts,allBanks}){
  const [view,setView]=useState('list');const [sel,setSel]=useState(null);

  const persons={};
  udhari.forEach(u=>{if(!persons[u.person_name])persons[u.person_name]={given:0,received:0,entries:[]};if(u.direction==='given')persons[u.person_name].given+=u.amount;if(u.direction==='received')persons[u.person_name].received+=u.amount;persons[u.person_name].entries.push(u);});
  const personList=Object.entries(persons).map(([name,d])=>({name,outstanding:d.given-d.received,given:d.given,received:d.received,entries:d.entries})).sort((a,b)=>b.outstanding-a.outstanding);
  const totalOut=personList.reduce((s,p)=>s+Math.max(0,p.outstanding),0);
  const handleAdd=async()=>{if(!form.person_name.trim()||!form.amount||parseFloat(form.amount)<=0)return;setSaving(true);await onAdd({...form,amount:parseFloat(form.amount)});setForm({person_name:'',amount:'',direction:'given',mode:'Cash',notes:'',txn_date:todayStr});setSaving(false);setView('list');};
  const iS={background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:13,outline:'none',width:'100%'};

  if(view==='person'&&sel){

    return(<div className="fade-in" style={{paddingBottom:8}}>

        <div onClick={()=>{setForm(f=>({...f,person_name:sel}));setView('add');}} style={{background:'var(--green)',color:'#000',fontFamily:'var(--mono)',fontSize:11,fontWeight:600,padding:'6px 12px',borderRadius:6,cursor:'pointer'}}>+ Entry</div>

        {[['Given',fmtAmt(p?.given||0),'var(--amber)'],['Received',fmtAmt(p?.received||0),'var(--green)'],['Balance',fmtAmt(Math.abs(out)),out>0?'var(--red)':'var(--green)']].map(([l,v,c])=>(<div key={l} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 10px',textAlign:'center'}}><div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:3}}>{l.toUpperCase()}</div><div style={{fontSize:14,fontWeight:600,fontFamily:'var(--mono)',color:c}}>{v}</div></div>))}
      </div>
      {entries.map(e=>(<div key={e.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 16px',borderBottom:'1px solid var(--border)'}}>
        <div><div style={{fontSize:12,color:e.direction==='given'?'var(--amber)':'var(--green)',fontFamily:'var(--mono)',fontWeight:600}}>{e.direction==='given'?'▲ Diya':'▼ Wapas'} — {fmtAmt(e.amount)}</div><div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{fmtDate(e.created_at)} · {e.mode}{e.notes?' · '+e.notes:''}</div><div style={{fontSize:9,color:e.direction==='given'?'var(--amber)':'var(--green)',fontFamily:'var(--mono)',marginTop:1}}>{e.direction==='given'?'↳ Expense logged to '+e.mode:'↳ Income logged to '+e.mode}</div></div>
        <button onClick={()=>onDelete(e.id)} style={{background:'none',border:'1px solid var(--border)',borderRadius:6,color:'var(--text3)',padding:'4px 8px',fontSize:10,fontFamily:'var(--mono)',cursor:'pointer'}}>✕</button>
      </div>))}
      {entries.length===0&&<div className="empty">No entries yet</div>}
    </div>);

  if(view==='add'){
    return(<div className="fade-in" style={{padding:'12px 16px',display:'flex',flexDirection:'column',gap:12}}>
      <div style={{display:'flex',alignItems:'center',gap:12}}><div onClick={()=>setView('list')} style={{cursor:'pointer',color:'var(--blue)',fontFamily:'var(--mono)',fontSize:12}}>← Back</div><span style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>New Udhari Entry</span></div>
      <div style={{background:'var(--blue-bg)',border:'1px solid var(--blue)',borderRadius:8,padding:'8px 12px',fontSize:11,color:'var(--blue)',fontFamily:'var(--mono)'}}>Every entry logs a real transaction to keep your balance accurate.</div>
      <div><p className="sec-label" style={{marginBottom:6}}>Direction</p><div className="chip-row"><div className={'chip'+(form.direction==='given'?' sel-amber':'')} onClick={()=>setForm(f=>({...f,direction:'given'}))}>▲ Maine diya</div><div className={'chip'+(form.direction==='received'?' sel':'')} onClick={()=>setForm(f=>({...f,direction:'received'}))}>▼ Wapas mila</div></div></div>
      <div><p className="sec-label" style={{marginBottom:6}}>Person</p><input style={iS} placeholder="e.g. Rajesh Senghani" value={form.person_name} onChange={e=>setForm(f=>({...f,person_name:e.target.value}))}/></div>

      <div><p className="sec-label" style={{marginBottom:6}}>Mode (account)</p><div className="chip-row">{['Cash',...allBanks].map(a=><div key={a} className={'chip'+(form.mode===a?' sel':'')} onClick={()=>setForm(f=>({...f,mode:a}))}>{a}</div>)}</div></div>
      <div><p className="sec-label" style={{marginBottom:6}}>Notes (optional)</p><input style={iS} placeholder="e.g. rickshaw ke liye" value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/></div>
      <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 12px',fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)'}}>Will log: {form.direction==='given'?<span style={{color:'var(--amber)'}}>Expense from <strong>{form.mode}</strong></span>:<span style={{color:'var(--green)'}}>Income to <strong>{form.mode}</strong></span>}</div>
      <button onClick={handleAdd} disabled={saving||!form.person_name.trim()||!form.amount} style={{background:saving||!form.person_name.trim()||!form.amount?'var(--bg3)':'var(--green)',border:'none',borderRadius:8,color:saving||!form.person_name.trim()||!form.amount?'var(--text3)':'#000',fontFamily:'var(--mono)',fontSize:13,fontWeight:600,padding:14,cursor:'pointer',transition:'all 0.2s'}}>{saving?'Saving...':'Save — '+(form.direction==='given'?'Diya':'Wapas')+' ₹'+(form.amount||0)}</button>
    </div>);

  return(<div className="fade-in" style={{paddingBottom:8}}>
