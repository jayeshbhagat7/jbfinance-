<script type="text/babel">

const TYPES = [
  'Expense',
  'Income',
  'Bank→CC',
  'Bank→Bank',
  'UA Expense',
  'UA Received'
];

// ── BALANCE LOGIC ─────────────────────────
function computeBalances(opening, txns, allBanks, allCC) {
  const bal = { ...opening };

  txns.forEach(t => {
    const amt  = parseFloat(t.amount) || 0;
    const from = t.from_account;
    const to   = t.to_account;
    const type = t.type;

    if (type === 'Expense') {
      if (from) bal[from] -= amt;
    }

    if (type === 'UA Expense') {
      if (from) bal[from] -= amt;
    }

    if (type === 'Income') {
      if (to) bal[to] += amt;
    }

    if (type === 'UA Received') {
      if (to) bal[to] += amt;
    }

    if (type === 'Bank→Bank') {
      if (from) bal[from] -= amt;
      if (to)   bal[to]   += amt;
    }

    if (type === 'Bank→CC') {
      if (from) bal[from] -= amt;
      if (to)   bal[to]   += amt;
    }
  });

  return bal;
}

// ── UA CALCULATION ─────────────────────────
function calculateUA(txns) {
  const uaExpense = txns
    .filter(t => t.type === 'UA Expense')
    .reduce((s, t) => s + Number(t.amount), 0);

  const uaReceived = txns
    .filter(t => t.type === 'UA Received')
    .reduce((s, t) => s + Number(t.amount), 0);

  return {
    uaExpense,
    uaReceived,
    uaOutstanding: uaExpense - uaReceived
  };
}

// ── REAL EXPENSE ─────────────────────────
function calculateRealExpense(txns) {
  return txns
    .filter(t => t.type === 'Expense')
    .reduce((s, t) => s + Number(t.amount), 0);
}

// ── CC PAYABLE ─────────────────────────
function calculateCC(txns, ccAccounts) {
  let spend = 0;
  let paid  = 0;

  txns.forEach(t => {
    if (t.type === 'Expense' && ccAccounts.includes(t.from_account)) {
      spend += Number(t.amount);
    }
    if (t.type === 'Bank→CC') {
      paid += Number(t.amount);
    }
  });

  return spend - paid;
}

// ── DASHBOARD UPDATE ─────────────────────────
function DashScreen({ balances, txns, liquid, allBanks, allCC }) {

  const ua = calculateUA(txns);
  const realExpense = calculateRealExpense(txns);
  const ccOutstanding = calculateCC(txns, allCC);

  return (
    <>
      <div className="sec-label">Summary</div>

      <div className="metric-grid">

        <div className="metric">
          <div className="metric-label">Liquid Balance</div>
          <div className="metric-value">{fmtAmt(liquid)}</div>
        </div>

        <div className="metric">
          <div className="metric-label">Real Expense</div>
          <div className="metric-value" style={{color:'var(--red)'}}>
            {fmtAmt(realExpense)}
          </div>
        </div>

        <div className="metric">
          <div className="metric-label">UA Outstanding</div>
          <div className="metric-value" style={{color:'var(--amber)'}}>
            {fmtAmt(ua.uaOutstanding)}
          </div>
        </div>

        <div className="metric">
          <div className="metric-label">CC Payable</div>
          <div className="metric-value" style={{color:'var(--amber)'}}>
            {fmtAmt(ccOutstanding)}
          </div>
        </div>

      </div>

      <div className="sec-label">Accounts</div>

      {Object.entries(balances).map(([k,v]) => (
        <div key={k} className="txn-row">
          <div>{k}</div>
          <div className="txn-amt">{fmtAmt(v)}</div>
        </div>
      ))}
    </>
  );
}

// ── TXN TAG UPDATE ─────────────────────────
function TxnRow({ t }) {
  return (
    <div className="txn-row">
      <div className="txn-left">
        <div className="txn-desc">
          {t.particulars}

          {t.type === 'UA Expense' &&
            <span className="badge badge-ua" style={{marginLeft:6}}>UA</span>
          }

          {t.type === 'UA Received' &&
            <span className="badge badge-in" style={{marginLeft:6}}>REC</span>
          }

        </div>
      </div>

      <div className="txn-right">
        <div className="txn-amt">{fmtAmt(t.amount)}</div>
      </div>
    </div>
  );
}

</script>
