}

/* ── CategoryPicker ── */
function CategoryPicker({allCategories,value,onChange,onAddNew}){
  const [search,setSearch]=useState('');const [open,setOpen]=useState(false);const [addOpen,setAddOpen]=useState(false);
  const [newName,setNewName]=useState('');const [newEmoji,setNewEmoji]=useState('');const [newParent,setNewParent]=useState('');const [saving,setSaving]=useState(false);
  const cats=allCategories.filter(c=>c.id!=='UA Expense');
  const filtered=search?cats.filter(c=>c.id.toLowerCase().includes(search.toLowerCase())):cats;
  const parents=filtered.filter(c=>!c.parent);const grouped=[];
  parents.forEach(p=>{grouped.push(p);filtered.filter(c=>c.parent===p.id).forEach(s=>grouped.push({...s,_sub:true}));});
  filtered.filter(c=>c.parent&&!parents.find(p=>p.id===c.parent)).forEach(c=>grouped.push(c));
  const selected=cats.find(c=>c.id===value);
  const handleAddNew=async()=>{if(!newName.trim())return;setSaving(true);await onAddNew({name:newName.trim(),emoji:newEmoji||'•',parent:newParent||null,it:''});onChange(newName.trim());setNewName('');setNewEmoji('');setNewParent('');setAddOpen(false);setOpen(false);setSaving(false);};
  return(
    <div style={{position:'relative'}}>
      <div onClick={()=>{setOpen(o=>!o);setSearch('');}} style={{background:'var(--bg2)',border:'1px solid '+(value?'var(--green)':'var(--border2)'),borderRadius:8,padding:'10px 12px',display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',userSelect:'none'}}>
        <span style={{fontFamily:'var(--mono)',fontSize:13,color:value?'var(--green)':'var(--text3)'}}>{selected?`${selected.emoji} ${selected.id}`:'Select category...'}</span>
        <span style={{color:'var(--text3)',fontSize:12}}>{open?'▲':'▼'}</span>
      </div>
      {open&&(
        <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,right:0,background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,zIndex:200,maxHeight:260,overflowY:'auto',boxShadow:'0 8px 24px rgba(0,0,0,0.3)'}}>
          <div style={{padding:'8px',borderBottom:'1px solid var(--border)'}}><input autoFocus placeholder="Search category..." value={search} onChange={e=>setSearch(e.target.value)} style={{width:'100%',background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,padding:'7px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',boxSizing:'border-box'}}/></div>
          {grouped.map(c=>(<div key={c.id} onClick={()=>{onChange(c.id);setOpen(false);setSearch('');}} style={{padding:'9px 12px',cursor:'pointer',display:'flex',alignItems:'center',gap:8,paddingLeft:c._sub?28:12,background:value===c.id?'var(--green-bg)':'none',borderBottom:'1px solid var(--border)'}}><span style={{fontSize:14}}>{c.emoji}</span><span style={{fontSize:12,color:value===c.id?'var(--green)':'var(--text)',fontFamily:'var(--mono)'}}>{c.id}</span>{c._sub&&<span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)'}}>sub</span>}{c.it&&<span style={{fontSize:9,color:'var(--green)',fontFamily:'var(--mono)'}}>{c.it}</span>}</div>))}
          {!addOpen&&<div onClick={()=>setAddOpen(true)} style={{padding:'10px 12px',cursor:'pointer',color:'var(--blue)',fontFamily:'var(--mono)',fontSize:12,borderTop:'1px solid var(--border)'}}>+ Add new category</div>}
          {addOpen&&(<div style={{padding:'10px 12px',borderTop:'1px solid var(--border)'}}><div style={{display:'flex',gap:6,marginBottom:6}}><input value={newEmoji} onChange={e=>setNewEmoji(e.target.value)} maxLength={2} placeholder="🏷" style={{width:42,background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,padding:'6px',color:'var(--text)',fontSize:14,textAlign:'center',outline:'none'}}/><input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Category name" style={{flex:1,background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,padding:'6px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none'}}/></div><select value={newParent} onChange={e=>setNewParent(e.target.value)} style={{width:'100%',background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,padding:'6px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',marginBottom:6}}><option value="">No parent (top-level)</option>{cats.filter(c=>!c.parent).map(c=>(<option key={c.id} value={c.id}>{c.emoji} {c.id}</option>))}</select><div style={{display:'flex',gap:6}}><button onClick={handleAddNew} disabled={saving||!newName.trim()} style={{flex:1,background:saving||!newName.trim()?'var(--bg3)':'var(--blue)',border:'none',borderRadius:6,color:saving||!newName.trim()?'var(--text3)':'#fff',fontFamily:'var(--mono)',fontSize:11,fontWeight:600,padding:'7px',cursor:'pointer'}}>{saving?'...':'Add'}</button><button onClick={()=>setAddOpen(false)} style={{background:'none',border:'1px solid var(--border)',borderRadius:6,color:'var(--text3)',padding:'7px 12px',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer'}}>Cancel</button></div></div>)}
        </div>
      )}
    </div>
  );
}
/* ── AddScreen ── */
function AddScreen({onSave,showToast,allAccounts,allBanks,allCC,allCategories,onAddCategory,customSites,customTeam,customSiteCats,prefill,onClearPrefill,txns}){
  const today=new Date().toISOString().slice(0,10);
  const [domain,setDomain]=useState('Personal');
  const [amt,setAmt]=useState('');const [desc,setDesc]=useState('');const [date,setDate]=useState(today);const [saving,setSaving]=useState(false);
  const [type,setType]=useState('Expense');const [cat,setCat]=useState('');const [from,setFrom]=useState('Cash');const [to,setTo]=useState('');const [tower,setTower]=useState('');
  const [isSite,setIsSite]=useState(false); /* 🏗 Site tag — tags this personal txn as a site expense/income */
  const [siteType,setSiteType]=useState('Expense');const [siteName,setSiteName]=useState((customSites&&customSites[0])||'');
  const [siteCat,setSiteCat]=useState('Misc');const [transferDir,setTransferDir]=useState('Given');const [transferUser,setTransferUser]=useState(customTeam?.[0]||'');
  const [transferPayFrom,setTransferPayFrom]=useState('Site Cash');
  const [depositTo,setDepositTo]=useState('Site Cash');
  const [siteTo,setSiteTo]=useState('');
  const [sitePayFrom,setSitePayFrom]=useState('Site Cash');
  /* team member for Expense (Given To) and Received (From Member) */
  const SITE_MEMBERS_DEFAULT=['PH','Milton','PP','Sohail','Anjar','Sikhu'];
  const allSiteMembers=[...new Set([...SITE_MEMBERS_DEFAULT,...(customTeam||[])])];
  const [siteMember,setSiteMember]=useState(allSiteMembers[0]||'');

  useEffect(()=>{
    if(!prefill)return;
    setDomain('Personal');setType('Expense');
    if(prefill.amount&&parseFloat(prefill.amount)>0)setAmt(String(prefill.amount));
    if(prefill.name)setDesc(prefill.name);
    if(prefill.category)setCat(prefill.category);
    if(typeof onClearPrefill==='function')onClearPrefill();
  },[prefill]);

  const DEFAULT_SITE_CATS=['Misc','Transportation','Labour Salary','Kharchi','Medical','Hardware','Maintenance','Food','Udhari','Stationary','Fuel','Travelling'];
  const SITE_CATS=[...DEFAULT_SITE_CATS,...(customSiteCats||[]).filter(c=>!DEFAULT_SITE_CATS.includes(c))];
  const catInfo=allCategories.find(c=>c.id===cat);
  const needCat=type==='Expense'||type==='Income'||type==='UA Received';
  const needFrom=['Expense','UA Expense','Bank-CC','Bank-Bank','Bank-Cash','CC-Bank'].includes(type);
  const needTo=['Income','UA Received','Bank-CC','Bank-Bank','Cash-Bank','CC-Bank','Bank-Cash'].includes(type);
  const firstBank=allBanks.find(a=>a!=='Cash')||allBanks[1]||allBanks[0]||'';
  const fromList=()=>{if(type==='Bank-CC'||type==='Bank-Bank'||type==='Bank-Cash')return allBanks.filter(a=>a!=='Cash');if(type==='CC-Bank')return allCC;if(type==='Cash-Bank')return['Cash'];return allAccounts;};
  const toList=()=>{if(type==='Bank-CC')return allCC;if(type==='Bank-Bank'||type==='Cash-Bank'||type==='CC-Bank')return allBanks.filter(a=>a!=='Cash');if(type==='Bank-Cash')return['Cash'];return allBanks;};
  const canSaveP=parseFloat(amt)>0&&(type==='Expense'?(cat&&from):type==='UA Expense'?from:type==='Income'?(cat&&to):type==='UA Received'?(cat&&to):(from&&to));
  const siteNeedFrom=['Expense','Bank-CC','Bank-Bank','Bank-Cash','CC-Bank'].includes(siteType);
  const siteNeedTo=['Income','Bank-CC','Bank-Bank','Cash-Bank','CC-Bank','Bank-Cash'].includes(siteType);
  const canSaveS=parseFloat(amt)>0&&siteName&&(siteType==='Site Transfer'?transferUser:siteType==='Expense'?!!sitePayFrom:siteType==='Income'?true:(siteNeedFrom?sitePayFrom:true)&&(siteNeedTo?siteTo:true));
  const canSave=domain==='Personal'?canSaveP:canSaveS;

  /* Auto-fill description based on member + type — Expense and Site Transfer are intentionally NOT auto-filled */
  useEffect(()=>{
    if(domain!=='Site')return;
    if(siteType==='Income')setDesc(`Received from ${siteMember}`);
    else setDesc('');
  },[domain,siteType,siteMember]);

  const selectType=t=>{setType(t);setCat('');if(t==='Bank-Cash'){setFrom(firstBank);setTo('Cash');}else if(t==='Cash-Bank'){setFrom('Cash');setTo(firstBank);}else if(t==='Bank-CC'){setFrom(firstBank);setTo(allCC[0]||'');}else if(t==='Bank-Bank'){setFrom(firstBank);setTo('');}else if(t==='CC-Bank'){setFrom(allCC[0]||'');setTo(firstBank);}else{setTo('');setFrom('Cash');}};

  const handleSave=async()=>{
    if(!canSave||saving)return;setSaving(true);
    const baseDate=date||today;const created_at=baseDate===today?new Date().toISOString():baseDate+'T06:30:00.000Z';
    let txn;
    if(domain==='Personal'){
      txn={domain:'Personal',type:type.replace('Bank-CC','Bank→CC').replace('Bank-Bank','Bank→Bank').replace('Bank-Cash','Bank→Cash').replace('Cash-Bank','Cash→Bank').replace('CC-Bank','CC→Bank'),amount:parseFloat(amt),category:cat||type,from_account:needFrom?from:null,to_account:needTo?to:null,particulars:desc||null,tower:isSite?'SITE':(tower||null),it_section:catInfo?.it||null,status:'complete',source:'app',created_at};
    } else {
      /* Site domain — full type support like Personal, proper account debit */
      let sF,sT,txnType,txnCat,partyName,autoParticulars;
      const cleanType=t=>t.replace('Bank-CC','Bank→CC').replace('Bank-Bank','Bank→Bank').replace('Bank-Cash','Bank→Cash').replace('Cash-Bank','Cash→Bank').replace('CC-Bank','CC→Bank');

      if(siteType==='Site Transfer'){
        /* ══════════════════════════════════════════════════════════════
           CANONICAL Site Transfer convention — enforced here and in
           getDebitCredit / getAcctLabel / SiteLedgerScreen consistently:

           GIVEN   (you pay to site/person):
             from_account = transferPayFrom  (KB / UB / Cash / CC)
             to_account   = null
             direction    = "given"
             → Dr: Site Cash (site owes you more)
             → Cr: from_account (your bank/cash reduces)

           RECEIVED (person/site returns money to you):
             from_account = transferUser  (person name — display only)
             to_account   = transferPayFrom  (KB / UB / Cash / Site Cash)
             direction    = "received"
             → Dr: to_account (your bank/cash increases)
             → Cr: Site Cash (site owes you less)
        ══════════════════════════════════════════════════════════════ */
        if(transferDir==='Given'){
          sF=transferPayFrom; sT=null;
          txnType='Site Transfer'; txnCat='Site Transfer'; partyName=transferUser;
          autoParticulars=`Given to ${transferUser}`;
        } else {
          /* Received: person → your account */
          sF=transferUser;          /* who sent (display only) */
          sT=transferPayFrom;       /* which account received into */
          txnType='Site Transfer'; txnCat='Site Transfer'; partyName=transferUser;
          autoParticulars=`Received from ${transferUser}`;
        }
      } else if(siteType==='Expense'){
        sF=sitePayFrom;sT=null;
        txnType='Expense';txnCat=siteCat;partyName=null;
        autoParticulars=`Site Expense`;
      } else if(siteType==='Income'){
        sF=null;sT=depositTo;
        txnType='Income';txnCat=siteCat;partyName=siteMember;
        autoParticulars=`Received from ${siteMember}`;
      } else {
        /* Transfer types: Bank→CC, Bank→Bank, Bank→Cash, Cash→Bank, CC→Bank */
        txnType=cleanType(siteType);
        if(['Bank-CC','Bank-Bank','Bank-Cash'].includes(siteType)){sF=sitePayFrom;sT=siteTo;}
        else if(siteType==='Cash-Bank'){sF='Cash';sT=siteTo;}
        else if(siteType==='CC-Bank'){sF=sitePayFrom;sT=siteTo;}
        else{sF=sitePayFrom;sT=siteTo;}
        txnCat=siteCat;partyName=null;autoParticulars='Site transfer';
      }
      txn={domain:'Site',type:txnType,amount:parseFloat(amt),category:txnCat,
           from_account:sF||null,to_account:sT||null,
           particulars:desc||autoParticulars,
           direction:siteType==='Site Transfer'?(transferDir==='Given'?'given':'received'):undefined,
           site_name:siteName,
           site_user:partyName,
           party_name:partyName,
           status:'complete',source:'app',created_at};
    }
    await onSave(txn);setAmt('');setDesc('');setCat('');setTower('');setIsSite(false);setTransferUser(customTeam?.[0]||'');setSaving(false);
  };

  const cs=active=>({border:active?'1px solid var(--green)':'1px solid var(--border2)',borderRadius:20,padding:'6px 14px',fontFamily:'var(--mono)',fontSize:11,color:active?'var(--green)':'var(--text2)',background:active?'var(--green-bg)':'var(--bg2)',cursor:'pointer',userSelect:'none',whiteSpace:'nowrap'});
  const iS={background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,padding:'7px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',width:'100%'};
  const TYPES_P=[{key:'Expense',label:'Expense'},{key:'Income',label:'Income'},{key:'Bank-CC',label:'Bank→CC'},{key:'Bank-Bank',label:'Bank→Bank'},{key:'Bank-Cash',label:'Bank→Cash'},{key:'Cash-Bank',label:'Cash→Bank'},{key:'CC-Bank',label:'CC→Bank'},{key:'UA Expense',label:'UA Expense'},{key:'UA Received',label:'UA Recv'}];
  const SaveBtn=()=><button onClick={handleSave} disabled={!canSave||saving} style={{background:canSave&&!saving?'var(--green)':'var(--bg3)',border:'none',borderRadius:10,color:canSave&&!saving?'#000':'var(--text3)',fontFamily:'var(--mono)',fontSize:13,fontWeight:600,padding:14,cursor:canSave?'pointer':'default',transition:'all 0.2s'}}>{saving?'Saving...':canSave?`Save  ₹${fmt(parseFloat(amt)||0)}`:'Fill required fields'}</button>;

  if(domain==='Site'){
    const selS={...iS,cursor:'pointer'};
    const allSiteAccounts=['Site Cash',...allBanks.filter(a=>a!=='Cash'),...allCC];
    const SITE_TYPES=[
      {key:'Expense',label:'💸 Expense'},
      {key:'Site Transfer',label:'↔ Site Transfer'},
    ];
    const selectSiteType=t=>{
      setSiteType(t);
      if(t==='Expense'){setSitePayFrom('Site Cash');}
      else if(t==='Income'){setDepositTo('Site Cash');}
      else if(t==='Site Transfer'){setTransferPayFrom('Site Cash');setTransferDir('Given');}
      else if(t==='Bank-CC'){setSitePayFrom(allBanks.filter(a=>a!=='Cash')[0]||'');setSiteTo(allCC[0]||'');}
      else if(t==='Bank-Bank'){setSitePayFrom(allBanks.filter(a=>a!=='Cash')[0]||'');setSiteTo('');}
      else if(t==='Bank-Cash'){setSitePayFrom(allBanks.filter(a=>a!=='Cash')[0]||'');setSiteTo('Cash');}
      else if(t==='Cash-Bank'){setSitePayFrom('Cash');setSiteTo(allBanks.filter(a=>a!=='Cash')[0]||'');}
      else if(t==='CC-Bank'){setSitePayFrom(allCC[0]||'');setSiteTo(allBanks.filter(a=>a!=='Cash')[0]||'');}
    };
    /* from/to account lists per type */
    const siteFromList=()=>{
      if(['Bank-CC','Bank-Bank','Bank-Cash'].includes(siteType))return allBanks.filter(a=>a!=='Cash');
      if(siteType==='Cash-Bank')return['Cash'];
      if(siteType==='CC-Bank')return allCC;
      return allSiteAccounts; /* Expense */
    };
    const siteToList=()=>{
      if(siteType==='Bank-CC')return allCC;
      if(['Bank-Bank','Cash-Bank','CC-Bank'].includes(siteType))return allBanks.filter(a=>a!=='Cash');
      if(siteType==='Bank-Cash')return['Cash'];
      return['Site Cash',...allBanks.filter(a=>a!=='Cash')]; /* Income deposit */
    };
    /* preview line */
    const previewFrom=siteType==='Expense'?sitePayFrom:siteType==='Income'?null:siteType==='Site Transfer'?(transferDir==='Given'?transferPayFrom:transferUser):sitePayFrom;
    const previewTo=siteType==='Expense'?null:siteType==='Income'?depositTo:siteType==='Site Transfer'?(transferDir==='Given'?transferUser:transferPayFrom):siteTo;
    return(<div className="fade-in" style={{padding:'12px 16px',paddingBottom:'calc(var(--tab-h) + var(--safe-b) + 24px)',display:'flex',flexDirection:'column',gap:12}}>
      <div style={{display:'flex',gap:6}}>
        <span style={cs(false)} onClick={()=>setDomain('Personal')}>Personal</span>
        <span style={cs(true)}>Site</span>
      </div>

      {/* Site selector */}
      <div><p className="sec-label" style={{padding:'0 0 6px'}}>Site</p>
        {(customSites&&customSites.length>0)
          ?<div style={{display:'flex',flexWrap:'wrap',gap:6}}>{customSites.map(s=><span key={s} style={cs(siteName===s)} onClick={()=>setSiteName(s)}>{s}</span>)}</div>
          :<span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>No sites — add in Setup</span>}
      </div>

      {/* Type selector */}
      <div><p className="sec-label" style={{padding:'0 0 6px'}}>Type</p>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {SITE_TYPES.map(t=><span key={t.key} style={cs(siteType===t.key)} onClick={()=>selectSiteType(t.key)}>{t.label}</span>)}
        </div>
      </div>

      {/* Category (for Expense only — minimal) */}
      {siteType==='Expense'&&(<>
        <div><p className="sec-label" style={{padding:'0 0 6px'}}>Category</p>
          <select value={siteCat} onChange={e=>setSiteCat(e.target.value)} style={selS}>
            {SITE_CATS.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        <div><p className="sec-label" style={{padding:'0 0 6px'}}>Paid From</p>
          <select value={sitePayFrom} onChange={e=>setSitePayFrom(e.target.value)} style={selS}>
            {['Site Cash',...allBanks.filter(a=>a!=='Cash' && a!=='Site Cash'),...allCC].map(a=><option key={a}>{a}</option>)}
          </select>
          {sitePayFrom&&<div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--amber)',marginTop:5}}>
            ⚡ {sitePayFrom==='Site Cash'?'Paid from site funds':allCC.includes(sitePayFrom)?'CC charge':'Personal bank'} — auto-tagged as {sitePayFrom}
          </div>}
        </div>
      </>)}

      {/* Income fields */}
      {siteType==='Income'&&(<>
        <div><p className="sec-label" style={{padding:'0 0 6px'}}>From Member</p>
          <select value={siteMember} onChange={e=>setSiteMember(e.target.value)} style={{...selS,borderColor:'var(--green)',color:'var(--green)'}}>
            {allSiteMembers.map(m=><option key={m}>{m}</option>)}
          </select>
        </div>
        <div><p className="sec-label" style={{padding:'0 0 6px'}}>Deposit To</p>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {siteToList().map(a=><span key={a} style={cs(depositTo===a)} onClick={()=>setDepositTo(a)}>{a}</span>)}
          </div>
        </div>
      </>)}

      {/* Transfer fields */}
      {!['Expense','Income','Site Transfer'].includes(siteType)&&(<>
        <div><p className="sec-label" style={{padding:'0 0 6px'}}>From Account</p>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {siteFromList().map(a=><span key={a} style={cs(sitePayFrom===a)} onClick={()=>setSitePayFrom(a)}>{a}</span>)}
          </div>

                                <div style={{display:'flex',gap:8,marginTop:4}}>

/* ── DashScreen — Waterfall Hero + Audit Sync + Collapsed Cards + Clickable Chart ── */
function DashScreen({balances,txns,liquid,allBanks,allCC,allCCAll,budgets,
  trueSpendable,totalNetBlocked,recurring,opening,
  setGlobalSearch,setTab,setTxnFilter,onAuditSync,ccBillsData,...rest}){
  budgets=budgets||{};

  const [auditLoading,setAuditLoading]=useState(false);
  const chartRef=useRef(null);const chartInst=useRef(null);
  const drillTo=term=>{setGlobalSearch(term);setTab('txns');};
  const now=new Date();const month=now.getMonth();const year=now.getFullYear();
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const active=txns.filter(t=>t.status!=='voided');
  const thisMonth=active.filter(t=>{const d=new Date(t.created_at);return d.getMonth()===month&&d.getFullYear()===year;});
  const income=thisMonth.filter(t=>t.type==='Income'&&t.tower!=='SITE'&&t.domain!=='Site').reduce((s,t)=>s+(+t.amount),0);
  const expense=thisMonth.filter(t=>t.type==='Expense'&&t.tower!=='SITE'&&t.domain!=='Site').reduce((s,t)=>s+(+t.amount),0);
  const siteExpense=thisMonth.filter(t=>t.type==='Expense'&&(t.tower==='SITE'||t.domain==='Site')).reduce((s,t)=>s+(+t.amount),0);
  const uaExp=thisMonth.filter(t=>t.type==='UA Expense').reduce((s,t)=>s+(+t.amount),0);
  const uaRecv=thisMonth.filter(t=>t.type==='UA Received').reduce((s,t)=>s+(+t.amount),0);
  const uaOut=uaExp-uaRecv;
  const ccDues=(allCCAll||allCC).map(a=>({name:a,due:Math.max(0,-(balances[a]||0))})).filter(x=>x.due>0);
  const totalCC=ccDues.reduce((s,x)=>s+x.due,0);
  /* DVE: use totalNetBlocked (virtual envelope locks) instead of legacy monthlyProv */
  const netBlocked=totalNetBlocked||0;
  const reservedCapital=totalCC+netBlocked;
  const safeToSpend=liquid-reservedCapital;
  const spendable=trueSpendable!==undefined?trueSpendable:Math.max(0,liquid-totalCC);

  const safeCol=safeToSpend<0?'var(--red)':safeToSpend<10000?'var(--amber)':'var(--green)';
  const cats={};thisMonth.filter(t=>t.type==='Expense'&&t.tower!=='SITE'&&t.domain!=='Site').forEach(t=>{const c=t.category||'Misc';cats[c]=(cats[c]||0)+(+t.amount);});
  const topCats=Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const COLORS=['#059669','#2563eb','#d97706','#dc2626','#7c3aed','#0891b2'];

  const handleAuditSync=async()=>{
    const inputStr=window.prompt(`🔍 AUDIT SYNC\n\nApp Calculated Bank Balance: ₹${fmt(liquid)}\n\nEnter your REAL total bank balance (excluding CCs):`, fmt(liquid).replace(/,/g,''));
    if(inputStr===null)return;
    const real=parseFloat(inputStr.replace(/,/g,''));
    if(isNaN(real)){alert('Invalid amount. Please enter a number.');return;}
    setAuditLoading(true);
    await onAuditSync(real);
    setAuditLoading(false);
  };

  /* Recalculate Ledger — recomputes balance from opening date forward */
  const handleRecalculate=()=>{
    const lines=[];
    const allAcc=[...allBanks,...(allCCAll||[]),'Site Cash'];
    allAcc.forEach(acc=>{
      const computed=balances[acc]||0;
      lines.push(`${acc}: ${computed>=0?'+':''}${fmt(computed)}`);
    });
    const msg=`RECALCULATED BALANCES (opening balance + all transactions):\n\n${lines.join('\n')}\n\nTotal Liquid: ${fmt(liquid)}\nCC Dues: ${fmt(totalCC)}\nSafe to Spend: ${fmt(safeToSpend)}\n\nIf any figure looks wrong, use Audit Sync to correct via a Suspense entry.`;
    alert(msg);
  };

  useEffect(()=>{
    if(!chartRef.current||topCats.length===0)return;
    if(chartInst.current){chartInst.current.destroy();chartInst.current=null;}
    chartInst.current=new Chart(chartRef.current,{
      type:'doughnut',
      data:{labels:topCats.map(([c])=>c),datasets:[{data:topCats.map(([,v])=>v),backgroundColor:COLORS.slice(0,topCats.length),borderColor:'rgba(0,0,0,0.1)',borderWidth:2}]},
      options:{responsive:true,maintainAspectRatio:true,cutout:'65%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' ₹'+Math.round(ctx.parsed).toLocaleString('en-IN')}}},
        onClick:(evt,els)=>{if(els.length>0)drillTo(topCats[els[0].index][0]);},
        onHover:(evt,els)=>{evt.native.target.style.cursor=els.length>0?'pointer':'default';}
      }
    });
    return()=>{if(chartInst.current){chartInst.current.destroy();chartInst.current=null;}};
  },[topCats]);

  const fy=active.filter(t=>{const d=new Date(t.created_at),yr=d.getFullYear(),mo=d.getMonth();return(yr===year&&mo>=3)||(yr===year+1&&mo<3);});
  const it80C=fy.filter(t=>t.it_section==='80C').reduce((s,t)=>s+(+t.amount),0);
  const it80D=fy.filter(t=>t.it_section==='80D').reduce((s,t)=>s+(+t.amount),0);
  const gap80C=Math.max(0,150000-it80C);const taxSave=Math.round(gap80C*0.3);
  const alerts=[];
  /* CC dues removed from alerts — visible in dedicated CC Dues card below */
  if(uaOut>0)alerts.push({r:'amber',t:'UA outstanding — '+fmtAmt(uaOut)});
  topCats.forEach(([c,v])=>{if(budgets[c]&&v>budgets[c])alerts.push({r:'amber',t:c+' over budget'});});
  if(gap80C>0&&month>=1&&month<=2)alerts.push({r:'blue',t:'80C gap ₹'+Math.round(gap80C/1000)+'k — before 31 Mar'});

  const Card=({children,style})=><div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,overflow:'hidden',marginBottom:8,...(style||{})}}>{children}</div>;
  const Hdr=({t,v,col})=><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',borderBottom:'1px solid var(--border)',background:'var(--bg3)'}}><span style={{fontSize:10,fontWeight:600,fontFamily:'var(--mono)',letterSpacing:'0.08em',color:'var(--text3)',textTransform:'uppercase'}}>{t}</span>{v&&<span style={{fontSize:11,fontFamily:'var(--mono)',fontWeight:600,color:col||'var(--text)'}}>{v}</span>}</div>;
  const Row=({a,b,red,grn,amb,dim,onClick})=><div onClick={onClick} style={{display:'flex',justifyContent:'space-between',padding:'7px 12px',borderBottom:'1px solid var(--border)',fontSize:12,alignItems:'center',cursor:onClick?'pointer':'default'}}><span style={{color:dim?'var(--text3)':'var(--text2)'}}>{a}</span><div style={{display:'flex',gap:8,alignItems:'center'}}><span style={{fontFamily:'var(--mono)',fontWeight:600,color:red?'var(--red)':grn?'var(--green)':amb?'var(--amber)':'var(--text)'}}>{b}</span>{onClick&&<span style={{fontSize:10,color:'var(--text3)'}}>›</span>}</div></div>;

  return(
    <div className="fade-in" style={{padding:'8px 10px'}}>

      {/* Waterfall: safe-to-spend breakdown */}
      {(()=>{
        const [wfOpen,setWfOpen]=useState(false);
        return(
        <div style={{background:'var(--bg2)',border:'1.5px solid '+(safeToSpend<0?'var(--red)':safeToSpend<10000?'var(--amber)':'var(--green)'),borderRadius:12,marginBottom:6,overflow:'hidden'}}>
          {/* Safe to spend — full width */}
          <div style={{padding:'14px 16px',background:safeToSpend<0?'var(--red-bg)':safeToSpend<10000?'var(--amber-bg)':'var(--green-bg)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontFamily:'var(--mono)',fontSize:8,color:safeCol,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:3}}>Safe to Spend</div>
              <div style={{fontFamily:'var(--mono)',fontSize:28,fontWeight:800,color:safeCol,letterSpacing:'-1px',lineHeight:1}}>{safeToSpend<0?'−':''}{fmtAmt(Math.abs(safeToSpend))}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontFamily:'var(--mono)',fontSize:9,color:safeCol,opacity:0.7}}>Bank {fmtAmt(liquid)}</div>
              {totalCC>0&&<div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--red)',opacity:0.8}}>−CC {fmtAmt(totalCC)}</div>}
              {netBlocked>0&&<div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--amber)',opacity:0.8}}>−Env {fmtAmt(netBlocked)}</div>}
            </div>
          </div>
          {/* Expand toggle */}
          <div onClick={()=>setWfOpen(o=>!o)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 14px',borderTop:'1px solid var(--border)',cursor:'pointer',background:'var(--bg3)'}}>
            <span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',letterSpacing:'0.08em',textTransform:'uppercase'}}>🏦 Bank &amp; CC Details</span>
            <span style={{fontSize:9,color:'var(--text3)',transform:wfOpen?'rotate(180deg)':'none',display:'inline-block',transition:'transform 0.2s'}}>▼</span>
          </div>
          {/* Bank balances + CC dues */}
          {wfOpen&&(
            <div>
              {/* Bank rows */}
              <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:0,padding:'6px 12px',background:'var(--bg3)',borderBottom:'1px solid var(--border)'}}>
                <span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase'}}>Bank</span>
                <span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',textAlign:'right'}}>Balance</span>
                <span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',textAlign:'right'}}>This Mo</span>
              </div>
              {allBanks.filter(a=>a!=='Site Cash').map(a=>{
                const bal=balances[a]||0;
                const monthTxns=thisMonth.filter(t=>t.from_account===a||t.to_account===a);
                const moSpend=monthTxns.filter(t=>(t.type==='Expense'||t.type==='UA Expense')&&t.from_account===a).reduce((s,t)=>s+(+t.amount),0);
                return(
                  <div key={a} onClick={()=>{setTab('ledger_statement');setTimeout(()=>{window.dispatchEvent(new CustomEvent('jbf-route-ledger',{detail:{account:a,allTime:true}}));},50);}} style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:0,padding:'9px 12px',borderBottom:'1px solid var(--border)',background:'var(--bg2)',cursor:'pointer'}}>
                    <span style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:'var(--text)'}}>{a}</span>
                    <span style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:bal<0?'var(--red)':bal===0?'var(--text3)':'var(--green)'}}>{bal===0?'—':(bal<0?'−':'')+fmtAmt(Math.abs(bal))}</span>
                    <span style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:11,color:moSpend>0?'var(--red)':'var(--text3)'}}>{moSpend>0?'−'+fmtAmt(moSpend):'—'}</span>
                  </div>
                );
              })}
              {/* CC dues rows */}
              {(allCCAll||allCC).some(a=>Math.max(0,-(balances[a]||0))>0)&&(<>
                <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:0,padding:'6px 12px',background:'var(--bg3)',borderBottom:'1px solid var(--border)',borderTop:'1px solid var(--border2)'}}>
                  <span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase'}}>Credit Card</span>
                  <span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',textAlign:'right'}}>Billed</span>
                  <span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',textAlign:'right'}}>Unbilled</span>
                </div>
                {(allCCAll||allCC).map(a=>{
                  const due=Math.max(0,-(balances[a]||0));
                  if(due===0)return null;
                  // Use bill history for billed; only show billed if latest bill not yet paid
                  const bills=(ccBillsData&&ccBillsData[a])||[];
                  const latestBill=bills.length>0?bills[bills.length-1]:null;
                  // Detect paid: CC→Bank payment after bill end
                  const isPaid=latestBill?active.filter(t=>
                    (t.type==='CC→Bank'||t.type==='Bank→CC'||t.type==='Bank→Bank')&&
                    (t.from_account===a||t.to_account===a)&&
                    t.created_at.slice(0,10)>latestBill.billEnd
                  ).length>0:false;
                  // Unbilled = spends after latest bill's end
                  const d=new Date();const ls=new Date(d.getFullYear(),d.getMonth(),1);if(ls>d)ls.setMonth(ls.getMonth()-1);
                  const unbilledFrom=latestBill?latestBill.billEnd:ls.toISOString().slice(0,10);
                  const allCCTxns=active.filter(t=>t.from_account===a&&(t.type==='Expense'||t.type==='UA Expense'));
                  const unbilled=allCCTxns.filter(t=>t.created_at.slice(0,10)>unbilledFrom).reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
                  // Billed = from saved bill amount (stable), zero if paid
                  const billed=(!isPaid&&latestBill)?latestBill.bankAmt:0;
                  return(
                    <div key={a} style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:0,padding:'9px 12px',borderBottom:'1px solid var(--border)',background:'var(--bg2)'}}>
                      <span style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:'var(--text)'}}>{a}</span>
                      <span style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:billed>0?'var(--red)':'var(--text3)'}}>{billed>0?fmtAmt(billed):'—'}</span>
                      <span onClick={()=>{if(unbilled>0){const tod=new Date().toISOString().slice(0,10);setTxnFilter({account:a,type:null,dateRange:{start:unbilledFrom,end:tod},category:null});setTab('txns');}}} style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:unbilled>0?'var(--amber)':'var(--text3)',cursor:unbilled>0?'pointer':'default'}}>{unbilled>0?fmtAmt(unbilled):'—'}</span>
                    </div>
                  );
                }).filter(Boolean)}
              </>)}
            </div>
          )}
        </div>
        );
      })()}

      {/* Alerts */}
      {alerts.length>0&&<div style={{display:'flex',flexDirection:'column',gap:4,marginBottom:6}}>{alerts.map((a,i)=><div key={i} style={{background:a.r==='red'?'var(--red-bg)':a.r==='blue'?'var(--blue-bg)':'var(--amber-bg)',border:'1px solid '+(a.r==='red'?'var(--red)':a.r==='blue'?'var(--blue)':'var(--amber)'),borderRadius:6,padding:'6px 10px',fontSize:11,color:a.r==='red'?'var(--red)':a.r==='blue'?'var(--blue)':'var(--amber)',fontFamily:'var(--mono)'}}>{a.r==='red'?'⚠ ':a.r==='blue'?'◈ ':'● '}{a.t}</div>)}</div>}

      {}
      <div style={{display:'flex',gap:6,marginBottom:8}}>
        <button onClick={handleAuditSync} disabled={auditLoading} style={{flex:1,background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,color:'var(--text2)',fontFamily:'var(--mono)',fontSize:10,fontWeight:600,padding:'9px 10px',cursor:'pointer',letterSpacing:'0.04em'}}>
          {auditLoading?'⏳ Syncing...':'🔍 Audit Sync'}
        </button>
        <button onClick={handleRecalculate} style={{flex:1,background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,color:'var(--blue)',fontFamily:'var(--mono)',fontSize:10,fontWeight:600,padding:'9px 10px',cursor:'pointer',letterSpacing:'0.04em'}}>
          ⟳ Recalculate Ledger
        </button>
      </div>

      {/* Pie chart */}
      {topCats.length>0&&(
        <Card>
          <Hdr t={MONTHS[month]+' spend'} v={fmtAmt(expense)} col="var(--red)"/>
          <div style={{padding:'12px 16px 8px',display:'flex',gap:12,alignItems:'center'}}>
            <div style={{flex:'0 0 150px',position:'relative'}}>
              <canvas ref={chartRef} style={{maxHeight:'150px'}}></canvas>
              <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
                <div style={{textAlign:'center'}}><div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)'}}>TOTAL</div><div style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:700,color:'var(--text)'}}>{fmtAmt(expense)}</div></div>
              </div>
            </div>
            <div style={{flex:1,display:'flex',flexDirection:'column',gap:5}}>
              {topCats.map(([c,v],i)=>{
                const pct=expense>0?Math.round(v/expense*100):0;const lim=budgets[c]||0;const over=lim>0&&v>lim;
                return(<div key={c} onClick={()=>drillTo(c)} style={{cursor:'pointer'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:2}}>
                    <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:8,height:8,borderRadius:2,background:COLORS[i%6],flexShrink:0}}/><span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text2)'}}>{c}</span></div>
                    <span style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:over?'var(--red)':'var(--text)'}}>{fmtAmt(v)}</span>
                  </div>
                  <div style={{background:'var(--bg3)',borderRadius:2,height:3}}><div style={{height:3,borderRadius:2,width:pct+'%',background:over?'var(--red)':COLORS[i%6]}}/></div>
                </div>);
              })}
              <div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:2}}>tap slice or row to filter log</div>
            </div>
          </div>
        </Card>
      )}

      {/* Cash in hand */}
      {(()=>{
        /* Personal Cash closing balance — exact same logic as LedgerStatementScreen for 'Cash'
           openingVal + totDr - totCr (All Time)
           PATH A: dr_ledger/cr_ledger='Cash'  |  PATH B legacy: to_account/from_account='Cash' */
        const cashLedger = (()=>{
          const cashOb = opening['Cash'];
          const cashOpen = cashOb ? (typeof cashOb==='object' ? (cashOb.amount||0) : cashOb) : 0;
          const cashOpenDate = cashOb&&typeof cashOb==='object'&&cashOb.opening_date ? cashOb.opening_date : null;
          let totDr=0, totCr=0;
          txns.filter(t=>t.status!=='voided').forEach(t=>{
            if(cashOpenDate && (t.created_at||'').slice(0,10)<cashOpenDate) return;
            const amt=parseFloat(t.amount)||0;
            if(t.dr_ledger&&t.cr_ledger){
              if(t.dr_ledger==='Cash') totDr+=amt;
              if(t.cr_ledger==='Cash') totCr+=amt;
            } else {
              /* Legacy PATH B — exclude Site Receivable virtual entries */
              if(t.to_account==='Cash')   totDr+=amt;
              if(t.from_account==='Cash') totCr+=amt;
            }
          });
          const result = cashOpen + totDr - totCr;
          return result;
        })();
        /* Site Cash closing balance — exact same logic as SiteLedgerScreen
           scOpening - totDebit + totCredit (All Time, All Sites) */
        const siteCashBal = (()=>{
          const scOb = opening['Site Cash'];
          const scOpen = scOb ? (typeof scOb==='object' ? (scOb.amount||0) : scOb) : 0;
          const personalAccts = [...allBanks.filter(b=>b!=='Site Cash'), ...allCC];
          const isSiteTxn = t => (
            t.domain==='Site' || t.tower==='SITE' || t.type==='Site Transfer' || t.type==='Site Settlement' ||
            (t.dr_ledger&&t.dr_ledger.startsWith('Site Cash')) || (t.cr_ledger&&t.cr_ledger.startsWith('Site Cash'))
          );
          const getDebitCredit = t => {
            const amt = parseFloat(t.amount)||0;
            if(t.type==='Site Settlement') return {debit:0,credit:0};
            if(t.dr_ledger&&t.cr_ledger){
              if(t.dr_ledger.startsWith('Site Cash')) return {debit:amt,credit:0};
              if(t.cr_ledger.startsWith('Site Cash')) return {debit:0,credit:amt};
            }
            if(t.type==='Expense'||t.type==='UA Expense'){
              if(t.from_account==='Site Cash'||personalAccts.includes(t.from_account)) return {debit:amt,credit:0};
              return {debit:0,credit:0};
            }
            if(t.type==='Income'||t.type==='UA Received'){
              if(personalAccts.includes(t.to_account)) return {debit:0,credit:amt};
              return {debit:0,credit:0};
            }
            if(t.type==='Site Transfer'){
              const from=t.from_account||'', to=t.to_account||'';
              if(personalAccts.includes(from)||from==='Site Cash') return {debit:amt,credit:0};
              if(personalAccts.includes(to)||to==='Site Cash') return {debit:0,credit:amt};
              return {debit:0,credit:0};
            }
            return {debit:0,credit:0};
          };
          const siteTxns = txns.filter(t=>isSiteTxn(t)&&t.status!=='voided');
          let totD=0, totC=0;
          siteTxns.forEach(t=>{ const {debit,credit}=getDebitCredit(t); totD+=debit; totC+=credit; });
          return scOpen - totD + totC;
        })();
        const personalCash        = cashLedger;
        const siteCashOutstanding = siteCashBal;
        const netPhys             = personalCash + siteCashOutstanding;

        const netCol    = netPhys>=0?'var(--green)':'var(--red)';
        const netBg     = netPhys>=0?'var(--green-bg)':'var(--red-bg)';
        const netBorder = netPhys>=0?'var(--green)':'var(--red)';
        const pcCol = personalCash<0?'var(--red)':'var(--text)';
        const scCol = siteCashOutstanding<0?'var(--red)':siteCashOutstanding===0?'var(--text3)':'var(--green)';
        const scLabel = 'Site Cash';
        const handleCashTap=()=>{
          setTab('ledger_statement');
          setTimeout(()=>{window.dispatchEvent(new CustomEvent('jbf-route-ledger',{detail:{account:'Cash',allTime:true}}));},50);
        };
        return(
          <div onClick={handleCashTap} style={{background:netBg,border:'1.5px solid '+netBorder,borderRadius:12,padding:'14px 16px',marginBottom:6,cursor:'pointer',userSelect:'none'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div>
                <div style={{fontFamily:'var(--mono)',fontSize:9,color:netCol,textTransform:'uppercase',letterSpacing:'0.12em',marginBottom:4}}>Cash In Hand <span style={{fontSize:8,opacity:0.7}}>› ledger</span></div>
                <div style={{fontFamily:'var(--mono)',fontSize:26,fontWeight:800,color:netCol,letterSpacing:'-1px',lineHeight:1,marginBottom:10}}>{netPhys<0?'−':''}{fmtAmt(Math.abs(Math.round(netPhys)))}</div>
              </div>
              <span style={{fontSize:14,color:netCol,marginTop:4,opacity:0.7}}>›</span>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:5}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)'}}>Personal Cash</span>
                <span style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:700,color:pcCol}}>{fmtAmt(Math.round(personalCash))}</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)'}}>{scLabel}</span>
                <span style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:700,color:scCol}}>{siteCashOutstanding<0?'−':''}{fmtAmt(Math.abs(siteCashOutstanding))}</span>
              </div>
            </div>
          </div>
        );
      })()}

      {uaOut>0&&<Card><Hdr t="UA Outstanding" v={fmtAmt(uaOut)} col="var(--amber)"/><Row a="Personal at site" b={fmtAmt(uaExp)} amb/><Row a="Recovered" b={'−'+fmtAmt(uaRecv)} grn/></Card>}
    </div>
  );
}
/* ── InvestmentsScreen ── */

  const handleUpdatePrice=async id=>{if(!editPrice)return setEditId(null);const{error}=await db.from('investments').update({current_price:parseFloat(editPrice)}).eq('id',id);if(!error){setInvestments(investments.map(i=>i.id===id?{...i,current_price:parseFloat(editPrice)}:i));showToast('✓ Price Updated');}setEditId(null);setEditPrice('');};
  const totalInv=investments.reduce((s,i)=>s+(i.qty*i.buy_price),0);const totalCur=investments.reduce((s,i)=>s+(i.qty*i.current_price),0);const tp=totalCur-totalInv;const pp=totalInv>0?(tp/totalInv*100):0;
  const iS={background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',width:'100%'};
  return(<div className="fade-in" style={{paddingBottom:'24px'}}>

      {investments.map(inv=>{
        const days=Math.floor((new Date()-new Date(inv.buy_date))/(1000*60*60*24));const isLTCG=days>=365;
        const inv_=inv.qty*inv.buy_price;const cur=inv.qty*inv.current_price;const prof=cur-inv_;const pct=inv_>0?(prof/inv_*100):0;
        return(<div key={inv.id} style={{padding:'12px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,marginBottom:8}}>

            <div style={{textAlign:'right',display:'flex',flexDirection:'column',alignItems:'flex-end'}}><div style={{fontFamily:'var(--mono)',fontSize:14,fontWeight:600}}>₹{cur.toLocaleString('en-IN')}</div><div style={{fontSize:10,fontFamily:'var(--mono)',color:prof>=0?'var(--green)':'var(--red)',marginTop:2}}>{prof>=0?'+':'−'}₹{Math.abs(prof).toLocaleString('en-IN')} ({pct.toFixed(1)}%)</div>{editId!==inv.id&&<button onClick={()=>{setEditId(inv.id);setEditPrice(inv.current_price);}} style={{background:'none',border:'none',color:'var(--text3)',fontFamily:'var(--mono)',fontSize:10,cursor:'pointer',marginTop:6,padding:'2px'}}>⚙ Edit</button>}</div>

          {editId===inv.id&&(<div style={{display:'flex',gap:8,marginTop:12,paddingTop:12,borderTop:'1px solid var(--border)'}}><div style={{display:'flex',gap:6,flex:1}}><input type="number" step="any" autoFocus placeholder="New Price" value={editPrice} onChange={e=>setEditPrice(e.target.value)} style={{...iS,padding:'6px 8px'}}/><button onClick={()=>handleUpdatePrice(inv.id)} style={{background:'var(--blue)',border:'none',borderRadius:6,color:'#fff',padding:'0 12px',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer'}}>Save</button><button onClick={()=>setEditId(null)} style={{background:'none',border:'1px solid var(--border2)',borderRadius:6,color:'var(--text3)',padding:'0 10px',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer'}}>✕</button></div><button onClick={()=>handleDelete(inv.id)} style={{background:'var(--red-bg)',border:'1px solid var(--red)',borderRadius:6,color:'var(--red)',fontFamily:'var(--mono)',fontSize:11,padding:'0 12px',cursor:'pointer'}}>Sell</button></div>)}
        </div>);
      })}
    </div>
  </div>);
}

/* ── UdhariScreen — real ledger update + CA audit ── */
function UdhariScreen({udhari,onAdd,onDelete,allAccounts,allBanks,externalView,onViewChange}){
  const [view,setView]=useState('list');const [sel,setSel]=useState(null);
  const setViewBoth=v=>{setView(v);if(onViewChange)onViewChange(v);};
  useEffect(()=>{if(externalView&&externalView!=='list'){setView(externalView);if(onViewChange)onViewChange('list');}},[externalView]);
  const [form,setForm]=useState({person_name:'',amount:'',direction:'given',mode:'Cash',txn_date:new Date().toISOString().slice(0,10)});
  const [saving,setSaving]=useState(false);
  const todayStr=new Date().toISOString().slice(0,10);
  const persons={};
  udhari.forEach(u=>{if(!persons[u.person_name])persons[u.person_name]={given:0,received:0,entries:[]};if(u.direction==='given')persons[u.person_name].given+=u.amount;if(u.direction==='received')persons[u.person_name].received+=u.amount;persons[u.person_name].entries.push(u);});
  const personList=Object.entries(persons).map(([name,d])=>({name,outstanding:d.given-d.received,given:d.given,received:d.received,entries:d.entries})).sort((a,b)=>b.outstanding-a.outstanding);
  const totalOut=personList.reduce((s,p)=>s+Math.max(0,p.outstanding),0);
  const handleAdd=async()=>{if(!form.person_name.trim()||!form.amount||parseFloat(form.amount)<=0)return;setSaving(true);await onAdd({...form,amount:parseFloat(form.amount)});setForm({person_name:'',amount:'',direction:'given',mode:'Cash',txn_date:todayStr});setSaving(false);setView('list');};
  const iS={background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:13,outline:'none',width:'100%'};

  if(view==='person'&&sel){
    const p=persons[sel];const entries=(p?.entries||[]).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));const out=(p?.given||0)-(p?.received||0);
    return(<div className="fade-in" style={{paddingBottom:8}}>
