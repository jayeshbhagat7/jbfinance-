/* ── StatementScreen: 3-column view (Description | Deposits | Withdrawals) with print ── */
function StatementScreen({txns,allAccounts,allBanks,allCC,opening,balances,setTab,setTxnFilter}){
  const [acct,setAcct]=useState(allBanks[0]||'');const [period,setPeriod]=useState('this_month');
  const [customStart,setCustomStart]=useState('');const [customEnd,setCustomEnd]=useState('');
  const now=new Date();const month=now.getMonth();const year=now.getFullYear();
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const isCC=allCC.includes(acct);
  
  /* Listen for routing events from Dashboard */
  useEffect(()=>{
    const handleRoute=e=>{
      if(e.detail){
        if(e.detail.account)setAcct(e.detail.account);
        if(e.detail.period)setPeriod(e.detail.period);
      }
    };
    window.addEventListener('jbf-route-statement',handleRoute);
    return()=>window.removeEventListener('jbf-route-statement',handleRoute);
  },[]);
  
  /* Filter txns based on period */
  const acctTxns=txns.filter(t=>t.status!=='voided').filter(t=>t.from_account===acct||t.to_account===acct).filter(t=>{
    const d=new Date(t.created_at);
    if(period==='this_month')return d.getMonth()===month&&d.getFullYear()===year;
    if(period==='last_month'){const lm=month===0?11:month-1,ly=month===0?year-1:year;return d.getMonth()===lm&&d.getFullYear()===ly;}
    if(period==='this_year')return d.getFullYear()===year;
    if(period==='custom'&&customStart&&customEnd){const ds=t.created_at.slice(0,10);return ds>=customStart&&ds<=customEnd;}
    return true;
  }).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  
  const beforePeriod=txns.filter(t=>t.status!=='voided').filter(t=>t.from_account===acct||t.to_account===acct).filter(t=>{
    if(period==='all')return false;
    const d=new Date(t.created_at);
    if(period==='this_month')return d<new Date(year,month,1);
    if(period==='last_month'){const lm=month===0?11:month-1,ly=month===0?year-1:year;return d<new Date(ly,lm,1);}
    if(period==='this_year')return d<new Date(year,0,1);
    if(period==='custom'&&customStart)return t.created_at.slice(0,10)<customStart;
    return false;
  });
  
  const rawOpen=opening[acct];const openingAmt=typeof rawOpen==='object'&&rawOpen!==null?(rawOpen.amount||0):(rawOpen||0);
  const openBal=openingAmt+beforePeriod.reduce((s,t)=>{
    const a=parseFloat(t.amount)||0;
    if(t.type==='Expense'||t.type==='UA Expense')return t.from_account===acct?s-a:s;
    if(t.type==='Income'||t.type==='UA Received')return t.to_account===acct?s+a:s;
    let e=0;if(t.from_account===acct)e-=a;if(t.to_account===acct)e+=a;return s+e;
  },0);
  
  /* Build rows with deposit/withdrawal columns */
  const rows=acctTxns.map(t=>{
    const a=parseFloat(t.amount)||0;
    let deposit=0,withdrawal=0;
    if(t.type==='Income'||t.type==='UA Received'){if(t.to_account===acct)deposit=a;}
    else if(t.type==='Expense'||t.type==='UA Expense'){if(t.from_account===acct)withdrawal=a;}
    else{if(t.to_account===acct)deposit=a;if(t.from_account===acct)withdrawal=a;}
    return{...t,deposit,withdrawal};
  });
  
  const totDeposit=rows.reduce((s,r)=>s+r.deposit,0);
  const totWithdrawal=rows.reduce((s,r)=>s+r.withdrawal,0);
  const closeBal=openBal+totDeposit-totWithdrawal;
  
  const periodLabel=(()=>{
    if(period==='this_month')return`${MONTHS[month]} ${year}`;
    if(period==='last_month')return`${MONTHS[month===0?11:month-1]} ${month===0?year-1:year}`;
    if(period==='this_year')return`FY ${year}`;
    if(period==='custom'&&customStart&&customEnd)return`${customStart} to ${customEnd}`;
    return'All Time';
  })();
  
  const handlePrint=()=>{
    const html=`<!DOCTYPE html><html><head><title>${acct} Statement - ${periodLabel}</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:20px;}h1{font-size:14px;margin-bottom:4px;}h2{font-size:11px;font-weight:400;color:#666;margin-bottom:16px;}table{width:100%;border-collapse:collapse;margin-top:12px;}th,td{border:1px solid #ccc;padding:6px 8px;text-align:left;}th{background:#f5f5f5;font-weight:600;font-size:9px;text-transform:uppercase;}td{font-size:10px;}.amt{text-align:right;font-variant-numeric:tabular-nums;}.summary{margin-top:16px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}.summary div{border:1px solid #ccc;padding:8px;background:#fafafa;}.summary .label{font-size:8px;text-transform:uppercase;color:#666;margin-bottom:3px;}.summary .value{font-size:12px;font-weight:700;}.desc{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}</style></head><body><h1>${acct} — Bank Ledger</h1><h2>${periodLabel}</h2><div class="summary"><div><div class="label">Opening Balance</div><div class="value">₹${fmtAmt(Math.abs(openBal))}</div></div><div><div class="label">Total Deposits</div><div class="value">₹${fmtAmt(totDeposit)}</div></div><div><div class="label">Total Withdrawals</div><div class="value">₹${fmtAmt(totWithdrawal)}</div></div></div><table><thead><tr><th style="width:20%;">Date</th><th style="width:40%;">Description</th><th style="width:20%;">Deposit (₹)</th><th style="width:20%;">Withdrawal (₹)</th></tr></thead><tbody><tr style="background:#fff8e1;"><td colspan="2" style="font-weight:600;">OPENING BALANCE</td><td class="amt">${openBal>=0?fmtAmt(openBal):'—'}</td><td class="amt">${openBal<0?fmtAmt(Math.abs(openBal)):'—'}</td></tr>${rows.map(t=>`<tr><td>${fmtDate(t.created_at)}</td><td class="desc">${t.particulars||t.category||t.type}</td><td class="amt">${t.deposit>0?fmtAmt(t.deposit):'—'}</td><td class="amt">${t.withdrawal>0?fmtAmt(t.withdrawal):'—'}</td></tr>`).join('')}<tr style="background:#e8f5e9;font-weight:600;"><td colspan="2">CLOSING BALANCE</td><td class="amt">${closeBal>=0?fmtAmt(closeBal):'—'}</td><td class="amt">${closeBal<0?fmtAmt(Math.abs(closeBal)):'—'}</td></tr></tbody></table><div style="margin-top:16px;font-size:9px;color:#999;">Generated ${new Date().toLocaleString('en-IN')} · JB Finance v1.9.2</div></body></html>`;
    const w=window.open('','_blank');w.document.write(html);w.document.close();w.print();
  };
  
  const cS=a=>({display:'inline-block',border:a?'1px solid var(--green)':'1px solid var(--border2)',borderRadius:14,padding:'6px 12px',fontFamily:'var(--mono)',fontSize:11,color:a?'var(--green)':'var(--text2)',background:a?'var(--green-bg)':'var(--bg2)',cursor:'pointer',userSelect:'none',margin:'0 4px 4px 0'});
  
  return(<div className="fade-in">
    <p className="sec-label">Select Account</p><div style={{display:'flex',flexWrap:'wrap',padding:'0 16px 8px',gap:6}}>{[...allBanks,...allCC].map(a=><div key={a} style={cS(acct===a)} onClick={()=>setAcct(a)}>{a}</div>)}</div>
    <p className="sec-label">Period</p><div style={{display:'flex',flexWrap:'wrap',padding:'0 16px 8px',gap:6}}>{[['this_month','This Month'],['last_month','Last Month'],['this_year','This Year'],['custom','Custom'],['all','All Time']].map(([k,l])=><div key={k} style={cS(period===k)} onClick={()=>setPeriod(k)}>{l}</div>)}</div>
    {period==='custom'&&<div style={{padding:'0 16px 8px',display:'flex',gap:8,alignItems:'center'}}><input type="date" value={customStart} onChange={e=>setCustomStart(e.target.value)} style={{flex:1,background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'8px 10px',fontFamily:'var(--mono)',fontSize:11,color:'var(--text)'}}/><span style={{color:'var(--text3)',fontSize:11}}>to</span><input type="date" value={customEnd} onChange={e=>setCustomEnd(e.target.value)} style={{flex:1,background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'8px 10px',fontFamily:'var(--mono)',fontSize:11,color:'var(--text)'}}/></div>}
    
    <div style={{margin:'8px 16px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'12px 14px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',letterSpacing:'0.08em',textTransform:'uppercase'}}>{acct} — {periodLabel}</div>
        <button onClick={handlePrint} style={{background:'var(--blue)',color:'#fff',border:'none',borderRadius:6,padding:'5px 12px',fontFamily:'var(--mono)',fontSize:10,fontWeight:600,cursor:'pointer'}}>🖨 Print</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
        <div><div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',marginBottom:3}}>Opening</div><div style={{fontSize:13,fontWeight:600,fontFamily:'var(--mono)',color:openBal<0?'var(--red)':'var(--text)'}}>{openBal<0?'−':''}{fmtAmt(Math.abs(openBal))}</div></div>
        <div onClick={()=>{if(totDeposit>0&&setTab&&setTxnFilter){const dateRange=period==='this_month'||period==='last_month'||period==='this_year'?period:(period==='custom'&&customStart&&customEnd?{start:customStart,end:customEnd}:'this_month');setTxnFilter({account:acct,type:'Income',dateRange,category:null});setTab('txns');}}} style={{cursor:totDeposit>0?'pointer':'default'}}><div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',marginBottom:3}}>Deposits</div><div style={{fontSize:13,fontWeight:600,fontFamily:'var(--mono)',color:totDeposit>0?'var(--green)':'var(--text3)',textDecoration:totDeposit>0?'underline':'none',textDecorationColor:'transparent',transition:'text-decoration-color 0.2s'}} onMouseEnter={e=>totDeposit>0&&(e.target.style.textDecorationColor='var(--green)')} onMouseLeave={e=>e.target.style.textDecorationColor='transparent'}>{totDeposit>0?'+'+fmtAmt(totDeposit):'—'}</div></div>

/* ── SiteLedgerScreen — v1.7: Member Net Balance + Drill-down ── */
function SiteLedgerScreen({txns,customSites,customTeam,opening}){
  const SITE_MEMBERS_DEFAULT=['PH','Milton','PP','Sohail','Anjar','Sikhu'];
  const allMembers=[...new Set([...SITE_MEMBERS_DEFAULT,...(customTeam||[])])];
  const sites=customSites||[];
  const [selMember,setSelMember]=useState(null); /* null = overview */

  const siteTxns=txns.filter(t=>t.domain==='Site'&&t.status!=='voided');

  /* ── Member ledger logic ──
     party_name (new) OR site_user (legacy) both work
     "Given to X"  = Expense type,  from_account='Site Cash', party identifies recipient
     "Received from X" = Income type, to_account= depositTarget, party identifies source
  */
  const getMemberTxns=m=>siteTxns.filter(t=>(t.party_name===m||t.site_user===m));

  const getMemberBalance=m=>{
    const mtxns=getMemberTxns(m);
    /* Given to member = Expense (Site Cash OUT to member) */
    const given   =mtxns.filter(t=>t.type==='Expense'||t.type==='Bank→Bank').reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
    /* Received from member = Income (member gave money → Site Cash IN) */
    const received=mtxns.filter(t=>t.type==='Income').reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
    return{given,received,net:given-received,count:mtxns.length};
  };

  /* ── Active members: union of (a) parties in actual txns + (b) customTeam ──
     Shows only members who have real activity OR are explicitly set up in team.
     NEVER shows SEED_MEMBERS_DEFAULT with 0 activity (that caused the empty list bug). */
  const partiesInTxns=[...new Set(siteTxns.map(t=>t.party_name||t.site_user).filter(Boolean))];
  const activeMembers=[...new Set([...partiesInTxns,...(customTeam||[])])];

  /* Site-wise spend */
  const siteSpend=sites.map(s=>({
    site:s,
    total:siteTxns.filter(t=>t.site_name===s&&t.type==='Expense').reduce((s_,t)=>s_+(parseFloat(t.amount)||0),0),
    count:siteTxns.filter(t=>t.site_name===s).length
  }));

  /* Recent entries — show with clear Given/Received label */
  const labelTxn=t=>{
    const p=t.party_name||t.site_user;
    if(t.type==='Income')return p?`Received from ${p}`:'Site Received';
    if(t.type==='Expense')return p?`Given to ${p}`:(t.particulars||t.category);
    if(t.type==='Bank→Bank'){
      if(t.from_account==='Site Cash'&&t.to_account)return`Given to ${t.to_account}`;
      if(t.to_account==='Site Cash'&&t.from_account)return`Received from ${t.from_account}`;
    }
    return t.particulars||t.category||t.type;
  };

  /* ── DETAIL VIEW for a single member ── */
  if(selMember){
    const mtxns=[...getMemberTxns(selMember)].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));

        </div>

            <div style={{fontFamily:'var(--mono)',fontSize:14,fontWeight:700,color:c}}>{fmtAmt(v)}</div>

          {net>0?`⚠ Net: Given ${fmtAmt(net)} more than received. ${selMember} needs to account for this.`:`✓ Net: Received ${fmtAmt(Math.abs(net))} more than given. Surplus with ${selMember}.`}

          </div>
          <div style={{textAlign:'right',flexShrink:0,marginLeft:12}}>
            <div style={{fontFamily:'var(--mono)',fontSize:14,fontWeight:700,color:isIn?'var(--green)':'var(--red)'}}>{isIn?'+':'−'}{fmtAmt(parseFloat(t.amount)||0)}</div>
            <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',marginTop:1}}>{isIn?'↑ In':'↓ Out'}</div>
          </div>
        </div>);
      })}
    </div>);
  }

  /* ── OVERVIEW ── */
  const recent=[...siteTxns].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,40);
  const totalSiteExpense=siteTxns.filter(t=>t.type==='Expense').reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  const totalSiteReceived=siteTxns.filter(t=>t.type==='Income').reduce((s,t)=>s+(parseFloat(t.amount)||0),0);

  return(<div className="fade-in" style={{paddingBottom:32}}>

    {/* Site Cash summary */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,padding:'12px 16px',background:'var(--bg2)',borderBottom:'1px solid var(--border)'}}>
      <div style={{background:'var(--red-bg)',border:'1px solid var(--red)',borderRadius:8,padding:'10px 12px'}}>
        <div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--red)',textTransform:'uppercase',marginBottom:4}}>Total Site Expense</div>

            <div style={{fontFamily:'var(--mono)',fontSize:20,fontWeight:700,color:total>0?'var(--red)':'var(--text3)'}}>{fmtAmt(total)}</div>
            <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',marginTop:4}}>{count} entries</div>
          </div>
        ))}
      </div>
    </>)}

    {/* Member Ledger — Net Balance Cards */}
    <p className="sec-label">Member Ledger <span style={{fontWeight:400,color:'var(--text3)'}}>· tap to drill down</span></p>
    <div style={{padding:'0 16px 8px',display:'flex',flexDirection:'column',gap:8}}>

            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:hasActivity?10:0}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{width:32,height:32,borderRadius:8,background:net>0?'var(--amber-bg)':net<0?'var(--green-bg)':'var(--bg3)',border:'1px solid '+(net>0?'var(--amber)':net<0?'var(--green)':'var(--border)'),display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:net>0?'var(--amber)':net<0?'var(--green)':'var(--text3)'}}>

/* ── CCBillScreen v1.7 ─────────────────────────────────────────
   Logic:
   · User sets a Statement Date (day of month, e.g. 15).
   · "Current bill" = txns AFTER last statement date → shown as UNBILLED.
   · CC expense shows in Unbilled until statement date passes.
   · On/after statement date → current cycle becomes a reconcilable bill.
   · Tab: Unbilled | Bills
──────────────────────────────────────────────────────────────── */
function CCBillScreen({txns,customAccounts,setTab,setTxnFilter}){
  const ccAccounts=[...SEED_CC,...(customAccounts||[]).filter(a=>a.type==='cc').map(a=>a.name)];
  const today=new Date();const todayStr=today.toISOString().slice(0,10);

  /* ── Per-CC statement day stored in localStorage ── */
  const getStmtDay=cc=>{try{const v=JSON.parse(localStorage.getItem('jbf_cc_stmt_days')||'{}');return parseInt(v[cc]||'1');}catch{return 1;}};
  const saveStmtDay=(cc,day)=>{try{const v=JSON.parse(localStorage.getItem('jbf_cc_stmt_days')||'{}');v[cc]=day;localStorage.setItem('jbf_cc_stmt_days',JSON.stringify(v));}catch{}};

  /* ── Reconciliation history stored per CC ──
     Key: jbf_cc_reconciled  Value: { [ccName]: { billStart, billEnd, bankAmt, reconciledAt, diff } }
  */
  const getReconData=cc=>{try{const v=JSON.parse(localStorage.getItem('jbf_cc_reconciled')||'{}');return v[cc]||null;}catch{return null;}};
  const saveReconData=(cc,data)=>{try{const v=JSON.parse(localStorage.getItem('jbf_cc_reconciled')||'{}');v[cc]=data;localStorage.setItem('jbf_cc_reconciled',JSON.stringify(v));}catch{}};

  const [selCC,setSelCC]=useState(ccAccounts[0]||'');
  const [ccTab,setCCTab]=useState('unbilled');
  const [stmtDayStr,setStmtDayStr]=useState(()=>String(getStmtDay(ccAccounts[0]||'')));
  const [stmtAmt,setStmtAmt]=useState('');
  const [reconSaved,setReconSaved]=useState(false);
  const stmtDay=Math.max(1,Math.min(28,parseInt(stmtDayStr)||1));

  /* When CC changes, reload stmt day and clear form */
  const handleSelCC=cc=>{setSelCC(cc);setStmtDayStr(String(getStmtDay(cc)));setStmtAmt('');setReconSaved(false);};
  const handleStmtDaySave=()=>{saveStmtDay(selCC,stmtDay);};

  /* ── Compute billing periods from statement day ── */
  const getLastStmtDate=()=>{
    const d=new Date(today.getFullYear(),today.getMonth(),stmtDay);
    if(d>today) return new Date(today.getFullYear(),today.getMonth()-1,stmtDay);
    return d;
  };
  const lastStmt=getLastStmtDate();
  const lastStmtStr=lastStmt.toISOString().slice(0,10);
  const nextStmt=new Date(lastStmt.getFullYear(),lastStmt.getMonth()+1,stmtDay);
  const stmtGenerated=lastStmt.getMonth()===today.getMonth()&&lastStmt.getFullYear()===today.getFullYear();
  const prevBillStart=new Date(lastStmt.getFullYear(),lastStmt.getMonth()-1,stmtDay);
  const prevBillStartStr=prevBillStart.toISOString().slice(0,10);

  /* ── Determine bill period: use last saved reconciliation end date if available ──
     Next bill starts from the day AFTER the last reconciled bill end date */
  const lastRecon=getReconData(selCC);
  const defaultBillStart=lastRecon?lastRecon.billEnd:prevBillStartStr;
  const defaultBillEnd=lastRecon
    ? (()=>{
        /* Next bill end = one statement cycle after last reconciled end */
        const lastEnd=new Date(lastRecon.billEnd);
        const next=new Date(lastEnd.getFullYear(),lastEnd.getMonth()+1,stmtDay);
        return next.toISOString().slice(0,10);
      })()
    : lastStmtStr;

  const [billStart,setBillStart]=useState(defaultBillStart);
  const [billEnd,setBillEnd]=useState(defaultBillEnd);

  /* Re-init periods when CC changes */
  React.useEffect(()=>{
    const r=getReconData(selCC);
    if(r){
      setBillStart(r.billEnd);
      const lastEnd=new Date(r.billEnd);
      const next=new Date(lastEnd.getFullYear(),lastEnd.getMonth()+1,stmtDay);
      setBillEnd(next.toISOString().slice(0,10));
    } else {
      setBillStart(prevBillStartStr);
      setBillEnd(lastStmtStr);
    }
    setReconSaved(false);
  },[selCC]);

  /* ── Filter helpers ── */
  const ccSpends=txns.filter(t=>t.status!=='voided'&&t.from_account===selCC&&(t.type==='Expense'||t.type==='UA Expense'));

  /* UNBILLED: txns AFTER last reconciled bill end date (or last stmt date if never reconciled) */
  const unbilledFrom=lastRecon?lastRecon.billEnd:lastStmtStr;
  const unbilled=ccSpends.filter(t=>t.created_at.slice(0,10)>unbilledFrom);
  const unbilledTotal=unbilled.reduce((s,t)=>s+(parseFloat(t.amount)||0),0);

  /* BILLED: txns in selected bill period */
  const billed=ccSpends.filter(t=>{const d=t.created_at.slice(0,10);return d>billStart&&d<=billEnd;});
  const billedTotal=billed.reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  const sa=parseFloat(stmtAmt)||0;const diff=sa-billedTotal;const hasStmt=stmtAmt!==''&&sa>0;

  /* ── Save Reconciliation ── */
  const handleSaveRecon=()=>{
    if(!hasStmt) return;
    const data={billStart,billEnd,bankAmt:sa,appAmt:billedTotal,diff,reconciledAt:new Date().toISOString(),txnCount:billed.length};
    saveReconData(selCC,data);
    setReconSaved(true);

  };

  const ord=n=>n===1?'st':n===2?'nd':n===3?'rd':'th';

  return(<div className="fade-in">

    <p className="sec-label">Credit Card</p>
    <div style={{padding:'0 16px 4px'}}><select value={selCC} onChange={e=>handleSelCC(e.target.value)} style={iS}>{ccAccounts.map(a=><option key={a}>{a}</option>)}</select></div>

      <div style={{flex:1}}>
        <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',textTransform:'uppercase',marginBottom:4}}>Statement Generates on (day of month)</div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <input type="number" min="1" max="28" value={stmtDayStr} onChange={e=>setStmtDayStr(e.target.value)} onBlur={handleStmtDaySave} style={{...iS,width:70,textAlign:'center',fontSize:18,fontWeight:700}}/>
          <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',lineHeight:1.5}}>
            Last stmt: <span style={{color:'var(--text2)'}}>{fmtDate(lastStmt)}</span><br/>
            Next stmt: <span style={{color:'var(--amber)'}}>{fmtDate(nextStmt)}</span>

        </div>
      </div>

        {stmtGenerated?'✓ Stmt Generated':'⏳ Not Yet'}

        <div style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:700,color:'var(--text)'}}>{fmtAmt(lastRecon.bankAmt)}</div>

    </div>

    {/* ── UNBILLED TAB with 3-column ledger ── */}
    {ccTab==='unbilled'&&(<div>
      <div style={{margin:'12px 16px 0',background:'var(--bg2)',border:'1px solid var(--amber)',borderRadius:10,padding:'14px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
          <div onClick={()=>{if(unbilledTotal>0&&setTab&&setTxnFilter){const today=new Date().toISOString().slice(0,10);setTxnFilter({account:selCC,type:null,dateRange:{start:unbilledFrom,end:today},category:null});setTab('txns');}}} style={{cursor:unbilledTotal>0?'pointer':'default'}}>

.close();w.print();}} style={{background:'var(--amber)',color:'#000',border:'none',borderRadius:6,padding:'5px 12px',fontFamily:'var(--mono)',fontSize:10,fontWeight:600,cursor:'pointer',flexShrink:0}}>🖨 Print</button>}

            ✓ Reconciliation Saved · Next bill period auto-loaded

          :<button onClick={handleSaveRecon} style={{width:'100%',background:'var(--green)',color:'#000',fontFamily:'var(--mono)',fontSize:13,fontWeight:700,border:'none',borderRadius:10,padding:'13px',cursor:'pointer',letterSpacing:'0.05em'}}>
            ✓ Save Reconciliation &amp; Set Next Bill Period

      {billed.length>0

          {[...billed].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).map((t,i)=>(

function AiCommandScreen({investments,setInvestments,showToast}){
  /* ── API key storage ── */
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem('jbf_ai_key')||'');
  const [keyVisible,setKeyVisible]=useState(false);const [testStatus,setTestStatus]=useState('');const [testing,setTesting]=useState(false);
  /* ── Chat ── */
  const [messages,setMessages]=useState([]);const [input,setInput]=useState('');const [loading,setLoading]=useState(false);
  /* ── JSON picks (existing feature) ── */
  const [jsonStr,setJsonStr]=useState('');const [picks,setPicks]=useState([]);const [acc,setAcc]=useState(null);const [qty,setQty]=useState('');const [saving,setSaving]=useState(false);
  /* ── Tab ── */
  const [aiTab,setAiTab]=useState('chat'); /* 'chat' | 'quant' */

  const saveKey=k=>{localStorage.setItem('jbf_ai_key',k);setApiKey(k);};

  /* ── Core API call with all required headers ──
     Key fix: "anthropic-dangerous-direct-browser-access": "true"
     This header is required for ALL direct browser API calls to bypass CORS preflight.
     Without it: 403 Forbidden or CORS error.
  ── */
  const callAPI=async(msgs,sysPrompt)=>{
    const key=(apiKey||'').trim();
    if(!key)throw new Error('API key not set');
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:1024,
        ...(sysPrompt?{system:sysPrompt}:{}),
        messages:msgs
      })
    });
    if(!res.ok){const e=await res.json().catch(()=>({error:{message:res.statusText}}));throw new Error(e?.error?.message||'API Error '+res.status);}
    return res.json();
  };

  /* ── Test connection ── */
  const testConn=async()=>{
    setTesting(true);setTestStatus('⏳ Testing...');
    try{
      const d=await callAPI([{role:'user',content:'Reply with just: OK'}]);
      const txt=d.content?.find(b=>b.type==='text')?.text||'';
      setTestStatus('✓ Connected! Model replied: "'+txt.trim().slice(0,30)+'"');
    }catch(e){setTestStatus('❌ '+e.message);}
    setTesting(false);
  };

  /* ── Chat send ── */
  const sendMsg=async()=>{
    if(!input.trim()||loading)return;
    const userMsg={role:'user',content:input.trim()};
    const newMsgs=[...messages,userMsg];
    setMessages(newMsgs);setInput('');setLoading(true);
    try{
      const d=await callAPI(newMsgs,'You are JB Finance AI — a personal finance assistant for Jayesh Bhagat. Be concise, practical, use Indian financial context (₹, Indian tax laws 80C/80D, SIP, mutual funds). Reply in 2-4 sentences max unless user asks for detail.');
      const reply=d.content?.find(b=>b.type==='text')?.text||'(no response)';
      setMessages([...newMsgs,{role:'assistant',content:reply}]);
    }catch(e){setMessages([...newMsgs,{role:'assistant',content:'⚠ Error: '+e.message}]);}
    setLoading(false);
  };

  /* ── JSON Quant picks ── */
  const process=()=>{try{const p=JSON.parse(jsonStr);if(Array.isArray(p))setPicks(p);else showToast('⚠ Invalid JSON');}catch(e){showToast('⚠ Parse error');}};
  const confirm_=async pick=>{if(!qty||parseFloat(qty)<=0)return;setSaving(true);const p={asset_name:pick.asset_name,asset_type:'Equity',buy_date:new Date().toISOString().slice(0,10),qty:parseFloat(qty),buy_price:parseFloat(pick['entry_price_₹']),current_price:parseFloat(pick['entry_price_₹'])};const{data,error}=await db.from('investments').insert([p]).select();if(data&&!error){setInvestments([data[0],...investments]);setPicks(picks.filter(p=>p.asset_name!==pick.asset_name));showToast('✓ '+pick.asset_name+' added!');}else showToast('⚠ Error');setSaving(false);setAcc(null);setQty('');};

  const tabS=a=>({flex:1,padding:'9px 0',fontFamily:'var(--mono)',fontSize:11,fontWeight:a?700:400,letterSpacing:'0.06em',textTransform:'uppercase',border:'none',borderBottom:a?'2px solid var(--green)':'2px solid transparent',background:'none',color:a?'var(--green)':'var(--text3)',cursor:'pointer'});
  const iS={background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',width:'100%'};

  return(<div className="fade-in" style={{paddingBottom:'80px'}}>

    {/* API Key section */}
    <div style={{margin:'12px 16px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'12px 14px'}}>
      <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:8}}>Anthropic API Key</div>
      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:8}}>
        <input type={keyVisible?'text':'password'} placeholder="sk-ant-api03-..." value={apiKey} onChange={e=>saveKey(e.target.value)} style={{...iS,flex:1,fontFamily:'var(--mono)',fontSize:12}}/>
        <button onClick={()=>setKeyVisible(v=>!v)} style={{background:'none',border:'1px solid var(--border)',borderRadius:6,color:'var(--text3)',padding:'8px 10px',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer'}}>{keyVisible?'Hide':'Show'}</button>
      </div>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <button onClick={testConn} disabled={testing||!apiKey.trim()} style={{background:testing?'var(--bg3)':'var(--blue)',border:'none',borderRadius:6,color:testing?'var(--text3)':'#fff',fontFamily:'var(--mono)',fontSize:11,fontWeight:600,padding:'8px 14px',cursor:'pointer',flexShrink:0}}>{testing?'Testing...':'Test Connection'}</button>
        {testStatus&&<span style={{fontFamily:'var(--mono)',fontSize:11,color:testStatus.startsWith('✓')?'var(--green)':'var(--red)',flex:1,lineHeight:1.4}}>{testStatus}</span>}
      </div>
    </div>

    {/* Tabs */}
    <div style={{display:'flex',borderBottom:'1px solid var(--border)',padding:'0 16px'}}>
      <button style={tabS(aiTab==='chat')} onClick={()=>setAiTab('chat')}>💬 Finance Chat</button>
      <button style={tabS(aiTab==='quant')} onClick={()=>setAiTab('quant')}>📊 Quant Engine</button>
    </div>

    {/* ── CHAT TAB ── */}
    {aiTab==='chat'&&(<div style={{display:'flex',flexDirection:'column'}}>
      {!apiKey.trim()&&<div style={{margin:'12px 16px',background:'var(--amber-bg)',border:'1px solid var(--amber)',borderRadius:8,padding:'10px 12px',fontFamily:'var(--mono)',fontSize:11,color:'var(--amber)'}}>⚠ Enter your Anthropic API key above to use the AI chat.</div>}
      {/* Messages */}
      <div style={{padding:'8px 0',minHeight:200}}>
        {messages.length===0&&<div style={{padding:'24px 16px',textAlign:'center',fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',lineHeight:2}}>Ask anything about your finances.<br/>e.g. "How can I save more on 80C this year?" or<br/>"What is a liquid mutual fund?"</div>}
        {messages.map((m,i)=>(
          <div key={i} style={{margin:'8px 16px',display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
            <div style={{maxWidth:'80%',background:m.role==='user'?'var(--green)':'var(--bg2)',border:'1px solid '+(m.role==='user'?'var(--green)':'var(--border)'),borderRadius:m.role==='user'?'12px 12px 2px 12px':'12px 12px 12px 2px',padding:'10px 12px',color:m.role==='user'?'#000':'var(--text)',fontSize:13,lineHeight:1.5}}>
              {m.content}
            </div>
          </div>
        ))}
        {loading&&<div style={{margin:'8px 16px'}}><div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'12px 12px 12px 2px',padding:'10px 12px',display:'inline-block',fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>Thinking…</div></div>}
      </div>
      {/* Input */}
      <div style={{position:'fixed',bottom:'calc(var(--tab-h) + var(--safe-b))',left:'max(0px, 50% - 300px)',right:'max(0px, 50% - 300px)',background:'var(--bg)',borderTop:'1px solid var(--border)',padding:'10px 16px',display:'flex',gap:8,zIndex:90}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&sendMsg()} placeholder="Ask your finance AI..." style={{...iS,flex:1}} disabled={!apiKey.trim()||loading}/>
        <button onClick={sendMsg} disabled={!input.trim()||!apiKey.trim()||loading} style={{background:!input.trim()||!apiKey.trim()||loading?'var(--bg3)':'var(--green)',border:'none',borderRadius:8,color:!input.trim()||!apiKey.trim()||loading?'var(--text3)':'#000',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:'0 16px',cursor:'pointer',flexShrink:0}}>Send</button>
      </div>
      {messages.length>0&&<div style={{margin:'8px 16px'}}><button onClick={()=>setMessages([])} style={{background:'none',border:'1px solid var(--border)',borderRadius:6,color:'var(--text3)',fontFamily:'var(--mono)',fontSize:11,padding:'5px 12px',cursor:'pointer'}}>Clear chat</button></div>}
    </div>)}

    {/* ── QUANT TAB ── */}
    {aiTab==='quant'&&(<div>
      <div style={{padding:'16px'}}><p className="sec-label" style={{padding:'0 0 8px'}}>Quant Engine Input</p><textarea placeholder="Paste JSON output from Python script here..." value={jsonStr} onChange={e=>setJsonStr(e.target.value)} style={{width:'100%',height:'120px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',resize:'vertical'}}/><button onClick={process} style={{background:'var(--text)',color:'var(--bg)',border:'none',borderRadius:8,padding:'12px',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,width:'100%',marginTop:8,cursor:'pointer'}}>Process Picks</button></div>
      <div style={{padding:'0 16px'}}>
        {picks.length>0&&<p className="sec-label" style={{padding:'8px 0'}}>AI Recommendations</p>}
        {picks.map((pick,i)=>(
          <div key={i} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'14px',marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontFamily:'var(--mono)',fontSize:18,fontWeight:700,color:'var(--blue)'}}>{pick.asset_name}</span><span style={{fontFamily:'var(--mono)',fontSize:10,background:'var(--blue-bg)',color:'var(--blue)',padding:'4px 8px',borderRadius:20}}>2% TARGET</span></div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:12}}><div><div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)'}}>ENTRY PRICE</div><div style={{fontFamily:'var(--mono)',fontSize:15,fontWeight:600}}>₹{pick['entry_price_₹']}</div></div><div><div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)'}}>TARGET PRICE</div><div style={{fontFamily:'var(--mono)',fontSize:15,fontWeight:600,color:'var(--green)'}}>₹{pick['target_price_₹']}</div></div></div>
            <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,padding:'10px',marginTop:12,fontSize:11,lineHeight:1.5,color:'var(--text)'}}><strong>Thesis:</strong> {pick.thesis}<hr style={{border:'none',borderTop:'1px dashed var(--border2)',margin:'8px 0'}}/><strong style={{color:'var(--red)'}}>Exit:</strong> {pick.exit_condition}</div>
            {acc===pick.asset_name?<div style={{display:'flex',gap:8,marginTop:12}}><input type="number" step="any" autoFocus placeholder="Qty Bought" value={qty} onChange={e=>setQty(e.target.value)} style={{background:'var(--bg)',border:'1px solid var(--blue)',borderRadius:6,padding:'8px 12px',fontFamily:'var(--mono)',fontSize:12,outline:'none',flex:1,color:'var(--text)'}}/><button onClick={()=>confirm_(pick)} disabled={saving} style={{background:'var(--blue)',color:'#fff',border:'none',borderRadius:6,padding:'0 16px',fontFamily:'var(--mono)',fontSize:12,cursor:'pointer'}}>{saving?'...':'Confirm'}</button><button onClick={()=>setAcc(null)} style={{background:'none',border:'1px solid var(--border)',borderRadius:6,padding:'0 12px',fontFamily:'var(--mono)',fontSize:12,cursor:'pointer',color:'var(--text)'}}>✕</button></div>
            :<div style={{display:'flex',gap:8,marginTop:12}}><button onClick={()=>setAcc(pick.asset_name)} style={{flex:1,background:'var(--green)',color:'#000',border:'none',borderRadius:6,padding:'10px',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,cursor:'pointer'}}>Accept & Log</button><button onClick={()=>setPicks(picks.filter(p=>p.asset_name!==pick.asset_name))} style={{flex:1,background:'none',border:'1px solid var(--border2)',color:'var(--text2)',borderRadius:6,padding:'10px',fontFamily:'var(--mono)',fontSize:12,cursor:'pointer'}}>Reject</button></div>}
          </div>
        ))}
      </div>
    </div>)}
  </div>);
}

/* ── CashflowScreen v1.8 ─────────────────────────────────────────
   Income & Cashflow + YNAB Zero-Based Budgeting
   Sections:
     1. Month Selector
     2. Cashflow Summary (Income − Expense − CC Payments = Net)
     3. Income Sources breakdown
     4. 6-month Income vs Expense trend bar chart
     5. YNAB Budget Envelopes — zero-based, "To Assign" balance
     6. Budget category editor (add/remove, set limits)
───────────────────────────────────────────────────────────────── */
function CashflowScreen({txns,budgets,onSaveBudgets,liquid,allBanks,balances,recurring}){
  budgets=budgets||{};
  const now=new Date();
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const [selYear,setSelYear]=useState(now.getFullYear());
  const [selMonth,setSelMonth]=useState(now.getMonth());
  const [ynabView,setYnabView]=useState('envelopes'); /* 'envelopes' | 'editor' */
  const [draftBudgets,setDraftBudgets]=useState({...budgets});
  const [savingBudgets,setSavingBudgets]=useState(false);
  const [newCat,setNewCat]=useState('');
  const [activeSection,setActiveSection]=useState('cashflow'); /* 'cashflow' | 'ynab' */

  /* Sync draft when budgets prop changes */
  React.useEffect(()=>{setDraftBudgets({...budgets});},[JSON.stringify(budgets)]);

  const active=txns.filter(t=>t.status!=='voided');

  /* ── Month navigation ── */
  const prevMonth=()=>{if(selMonth===0){setSelMonth(11);setSelYear(y=>y-1);}else setSelMonth(m=>m-1);};
  const nextMonth=()=>{const isCurrentMonth=selYear===now.getFullYear()&&selMonth===now.getMonth();if(isCurrentMonth)return;if(selMonth===11){setSelMonth(0);setSelYear(y=>y+1);}else setSelMonth(m=>m+1);};
  const isCurrentMonth=selYear===now.getFullYear()&&selMonth===now.getMonth();

  /* ── Filter txns for selected month ── */
  const monthTxns=active.filter(t=>{const d=new Date(t.created_at);return d.getMonth()===selMonth&&d.getFullYear()===selYear;});

  /* ── Cashflow calculations ── */
  const income=monthTxns.filter(t=>t.type==='Income').reduce((s,t)=>s+(+t.amount),0);
  const expense=monthTxns.filter(t=>t.type==='Expense').reduce((s,t)=>s+(+t.amount),0);
  const ccPay=monthTxns.filter(t=>t.type==='CC-Bank'||t.type==='Bank→CC').reduce((s,t)=>s+(+t.amount),0);
  const uaExp=monthTxns.filter(t=>t.type==='UA Expense').reduce((s,t)=>s+(+t.amount),0);
  const uaRecv=monthTxns.filter(t=>t.type==='UA Received').reduce((s,t)=>s+(+t.amount),0);
  const netCashflow=income-expense-ccPay;

  /* ── Income sources ── */
  const incSources={};
  monthTxns.filter(t=>t.type==='Income').forEach(t=>{
    const src=t.category||t.particulars||'Other';
    incSources[src]=(incSources[src]||0)+(+t.amount);
  });
  const incSourceList=Object.entries(incSources).sort((a,b)=>b[1]-a[1]);

  /* ── 6-month trend ── */
  const trend=Array.from({length:6},(_,i)=>{
    let m=selMonth-5+i,y=selYear;
    while(m<0){m+=12;y--;}
    while(m>11){m-=12;y++;}
    const mt=active.filter(t=>{const d=new Date(t.created_at);return d.getMonth()===m&&d.getFullYear()===y;});
    const inc=mt.filter(t=>t.type==='Income').reduce((s,t)=>s+(+t.amount),0);
    const exp=mt.filter(t=>t.type==='Expense').reduce((s,t)=>s+(+t.amount),0);
    return{label:MONTHS[m],inc,exp,isSelected:m===selMonth&&y===selYear};
  });
  const trendMax=Math.max(...trend.map(t=>Math.max(t.inc,t.exp)),1);

  /* ── YNAB: category spend this month ── */
  const DEFAULT_CATS=['Household','Fuel','Food','Lifestyle','Maintenance','Travelling','Social','Donation','Child Education','Mobile Recharge'];
  const budgetCats=[...new Set([...DEFAULT_CATS,...Object.keys(budgets),...Object.keys(draftBudgets)])].filter(Boolean);
  const catSpend={};
  monthTxns.filter(t=>t.type==='Expense').forEach(t=>{const c=t.category||'Misc';catSpend[c]=(catSpend[c]||0)+(+t.amount);});
  const totalAssigned=budgetCats.reduce((s,c)=>(draftBudgets[c]||0)+s,0);
  const toAssign=income-totalAssigned;
  const totalSpent=monthTxns.filter(t=>t.type==='Expense').reduce((s,t)=>s+(+t.amount),0);

  const handleSaveBudgets=async()=>{setSavingBudgets(true);await onSaveBudgets(draftBudgets);setSavingBudgets(false);};

  const fmtAmt=v=>v>=1e7?'₹'+(v/1e7).toFixed(2)+'Cr':v>=1e5?'₹'+(v/1e5).toFixed(1)+'L':'₹'+Math.round(v).toLocaleString('en-IN');
  const netCol=netCashflow>0?'var(--green)':netCashflow<0?'var(--red)':'var(--text3)';

  return(
    <div className="fade-in" style={{paddingBottom:24}}>

      {/* ── Month Nav ── */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 16px',borderBottom:'1px solid var(--border)',background:'var(--bg2)'}}>
        <button onClick={prevMonth} style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text2)',padding:'5px 12px',fontFamily:'var(--mono)',fontSize:13,cursor:'pointer'}}>‹</button>
        <div style={{textAlign:'center'}}>
          <div style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:700,color:'var(--text)'}}>{MONTHS[selMonth]} {selYear}</div>
          {isCurrentMonth&&<div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--green)',textTransform:'uppercase',letterSpacing:'0.08em'}}>● current</div>}
        </div>
        <button onClick={nextMonth} disabled={isCurrentMonth} style={{background:isCurrentMonth?'var(--bg)':'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,color:isCurrentMonth?'var(--border)':'var(--text2)',padding:'5px 12px',fontFamily:'var(--mono)',fontSize:13,cursor:isCurrentMonth?'default':'pointer'}}>›</button>
      </div>

      {/* ── Section toggle ── */}
      <div style={{display:'flex',margin:'8px 10px 4px',background:'var(--bg2)',borderRadius:8,padding:3,gap:3}}>
        {[['cashflow','💹 Cashflow'],['ynab','📊 Budget']].map(([id,label])=>(
          <button key={id} onClick={()=>setActiveSection(id)} style={{flex:1,background:activeSection===id?'var(--bg3)':'transparent',border:activeSection===id?'1px solid var(--border2)':'1px solid transparent',borderRadius:6,color:activeSection===id?'var(--text)':'var(--text3)',fontFamily:'var(--mono)',fontSize:11,fontWeight:activeSection===id?700:400,padding:'7px 4px',cursor:'pointer'}}>{label}</button>
        ))}
      </div>

      {activeSection==='cashflow'&&(<>

        {/* ── Cashflow Summary Card ── */}
        <div style={{margin:'6px 10px',background:'var(--bg2)',border:'1.5px solid var(--border2)',borderRadius:10,overflow:'hidden'}}>
          {/* Net Cashflow hero */}
          <div style={{padding:'12px 14px',background:netCashflow>0?'var(--green-bg)':netCashflow<0?'var(--red-bg)':'var(--bg3)',borderBottom:'1px solid var(--border)'}}>
            <div style={{fontFamily:'var(--mono)',fontSize:8,color:netCol,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:3}}>Net Cashflow</div>
            <div style={{fontFamily:'var(--mono)',fontSize:26,fontWeight:800,color:netCol,letterSpacing:'-1px'}}>{netCashflow>=0?'+':''}{fmtAmt(netCashflow)}</div>
            <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',marginTop:3}}>{income>0?Math.round((1-(expense/income))*100)+'% saved this month':'No income logged'}</div>
          </div>
          {/* Waterfall rows */}
          {[
            {label:'Income',value:income,col:'var(--green)',sign:'+',show:true},
            {label:'Expenses',value:expense,col:'var(--red)',sign:'−',show:true},
            ...(ccPay>0?[{label:'CC Payments',value:ccPay,col:'var(--amber)',sign:'−',show:true}]:[]),
            ...(uaExp>uaRecv&&uaExp-uaRecv>0?[{label:'UA Net Out',value:uaExp-uaRecv,col:'var(--amber)',sign:'−',show:true}]:[]),
          ].map((row,i,arr)=>{
            const pct=income>0?Math.min(100,Math.round(row.value/income*100)):0;
            return(
            <div key={i} style={{padding:'8px 14px',borderBottom:i<arr.length-1?'1px solid var(--border)':'none'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)'}}>{row.sign} {row.label}</span>
                <span style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:700,color:row.col}}>{row.sign==='+'?'':row.sign}{fmtAmt(row.value)}</span>
              </div>
              <div style={{background:'var(--bg3)',borderRadius:3,height:4}}>
                <div style={{height:4,borderRadius:3,width:pct+'%',background:row.col,opacity:0.8,transition:'width 0.4s ease'}}/>
              </div>
              {row.sign!=='+'&&income>0&&<div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)',marginTop:2}}>{pct}% of income</div>}
            </div>
          );})}
        </div>

        {/* ── Income Sources ── */}
        {incSourceList.length>0&&(
          <div style={{margin:'6px 10px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,overflow:'hidden'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',borderBottom:'1px solid var(--border)',background:'var(--bg3)'}}>
              <span style={{fontFamily:'var(--mono)',fontSize:9,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em'}}>Income Sources</span>
              <span style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:'var(--green)'}}>{fmtAmt(income)}</span>
            </div>
            {incSourceList.map(([src,amt],i)=>{
              const pct=income>0?Math.round(amt/income*100):0;
              return(
              <div key={i} style={{padding:'8px 12px',borderBottom:i<incSourceList.length-1?'1px solid var(--border)':'none'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>

                    {hasLimit&&<div style={{fontFamily:'var(--mono)',fontSize:8,color:over?'var(--red)':remaining===0?'var(--text3)':'var(--green)',marginTop:1}}>{over?'Over by '+fmtAmt(Math.abs(remaining)):remaining===0?'Fully used':'Left: '+fmtAmt(remaining)}</div>}

                  <div style={{background:'var(--bg3)',borderRadius:3,height:3}}>
                    <div style={{height:3,borderRadius:3,width:'100%',background:'var(--amber)',opacity:0.4}}/>

            );})}
            {/* Unbudgeted categories */}
            {Object.entries(catSpend).filter(([c])=>!budgetCats.includes(c)).map(([cat,spent])=>(
              <div key={cat} style={{background:'var(--bg2)',border:'1px dashed var(--border)',borderRadius:8,padding:'8px 12px',marginBottom:5,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>{cat}</span>
                <div style={{textAlign:'right'}}>
                  <div style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:'var(--red)'}}>{fmtAmt(spent)}</div>
                  <div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)'}}>unbudgeted</div>
                </div>

            ))}
          </div>
        )}

        {ynabView==='editor'&&(
          <div style={{margin:'4px 10px 12px'}}>
            <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',padding:'4px 2px 8px',letterSpacing:'0.04em'}}>Set monthly limit for each category. Leave blank for no limit.</div>
            {budgetCats.map(cat=>(
              <div key={cat} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                <div style={{flex:1,fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)'}}>{cat}</div>
                <div style={{display:'flex',alignItems:'center',gap:4}}>
                  <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>₹</span>
                  <input
                    type="number"

                    style={{width:90,background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,padding:'5px 8px',textAlign:'right',outline:'none'}}

                <button onClick={()=>setDraftBudgets(p=>{const n={...p};delete n[cat];return n;})} style={{background:'none',border:'none',color:'var(--text3)',fontSize:14,cursor:'pointer',padding:'2px 4px'}}>✕</button>
              </div>
            ))}
            {/* Add new category */}
            <div style={{display:'flex',gap:6,marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)'}}>
              <input
                value={newCat}
                onChange={e=>setNewCat(e.target.value)}
                placeholder="New category..."
                onKeyDown={e=>{if(e.key==='Enter'&&newCat.trim()){setDraftBudgets(p=>({...p,[newCat.trim()]:0}));setNewCat('');} }}
                style={{flex:1,background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,color:'var(--text)',fontFamily:'var(--mono)',fontSize:11,padding:'7px 10px',outline:'none'}}
              />

            </div>

            <button onClick={handleSaveBudgets} disabled={savingBudgets} style={{width:'100%',marginTop:10,background:savingBudgets?'var(--bg3)':'var(--green)',border:'none',borderRadius:8,color:savingBudgets?'var(--text3)':'#000',fontFamily:'var(--mono)',fontSize:12,fontWeight:700,padding:'12px',cursor:'pointer'}}>
              {savingBudgets?'Saving...':'💾 Save Budget Limits'}
            </button>
          </div>
        )}

      </>)}
    </div>
  );
}

/* ── PdfImportScreen v1.9 ─────────────────────────────────────────────
   In-browser PDF bank statement parser.
   Uses pdf.js (CDN) to extract text, applies per-bank regex patterns,
   then shows a side-by-side match UI before importing to Supabase.
   Supported banks: KB (Karnataka Bank), UB (Union Bank), YB (Yes Bank),
                    HDFC CC, AXIS CC, SBI CC, RBL CC
   ─────────────────────────────────────────────────────────────────── */
function PdfImportScreen({allBanks,allCC,onSave,showToast,allCategories}){
  const [step,setStep]        = useState('upload');   // upload | review | done
  const [bank,setBank]        = useState('');
  const [domain,setDomain]    = useState('Personal');
  const [rows,setRows]        = useState([]);          // parsed rows
  const [selected,setSelected]= useState({});          // rowIdx → true/false
  const [editing,setEditing]  = useState({});          // rowIdx → overrides
  const [importing,setImporting]=useState(false);
  const [progress,setProgress]= useState('');
  const [pdfName,setPdfName]  = useState('');

  const allAccounts=[...allBanks,...allCC];

  // ── Per-bank regex patterns ──────────────────────────────────────
  // Each parser receives full text and returns [{date,particulars,debit,credit,balance}]
  const PARSERS = {
    'KB': text => {
      // Karnataka Bank: DD/MM/YYYY  Narration  Chq  Debit  Credit  Balance
      const re = /(\d{2}\/\d{2}\/\d{4})\s+(.+?)\s{2,}[\w\d-]*\s{1,}([\d,]*\.\d{2})?\s*([\d,]*\.\d{2})?\s+([\d,]+\.\d{2})/g;
      return parseMatches(re,text,[1,2,3,4,5]);
    },
    'UB': text => {
      // Union Bank: DD-MM-YYYY  Narration  Ref  Debit  Credit  Balance
      const re = /(\d{2}-\d{2}-\d{4})\s+(.+?)\s{2,}[\w\d/]*\s{0,}([\d,]*\.\d{2})?\s*([\d,]*\.\d{2})?\s+([\d,]+\.\d{2})/g;
      return parseMatches(re,text,[1,2,3,4,5]);
    },
    'YB': text => {
      // Yes Bank: DD MMM YYYY  Description  Debit  Credit  Balance
      const re = /(\d{2}\s+\w{3}\s+\d{4})\s+(.+?)\s{2,}([\d,]*\.\d{2})?\s*([\d,]*\.\d{2})?\s+([\d,]+\.\d{2})/g;
      return parseMatches(re,text,[1,2,3,4,5]);
    },
    'HDFC CC': text => {
      // HDFC CC: DD/MM/YYYY  Description  Amount (Dr/Cr)
      const re = /(\d{2}\/\d{2}\/\d{4})\s+(.+?)\s{2,}([\d,]+\.\d{2})\s*(Cr)?/g;
      const out=[];let m;
      while((m=re.exec(text))!==null){
        const isCr=!!(m[4]);
        out.push({date:normalDate(m[1]),particulars:m[2].trim(),debit:isCr?null:m[3],credit:isCr?m[3]:null,balance:null});
      }
      return out;
    },
    'AXIS CC': text => {
      // Axis CC: DD MMM YYYY  Description  Amount (CR suffix = credit)
      const re = /(\d{2}\s+\w{3}\s+\d{4})\s+(.+?)\s{2,}([\d,]+\.\d{2})(CR)?/g;
      const out=[];let m;
      while((m=re.exec(text))!==null){
        const isCr=!!(m[4]);
        out.push({date:normalDate(m[1]),particulars:m[2].trim(),debit:isCr?null:m[3],credit:isCr?m[3]:null,balance:null});
      }
      return out;
    },
    'SBI CC': text => {
      const re = /(\d{2}\/\d{2}\/\d{4})\s+(.+?)\s{2,}([\d,]+\.\d{2})\s*(Cr)?/g;
      const out=[];let m;
      while((m=re.exec(text))!==null){
        const isCr=!!(m[4]);
        out.push({date:normalDate(m[1]),particulars:m[2].trim(),debit:isCr?null:m[3],credit:isCr?m[3]:null,balance:null});
      }
      return out;
    },
    'RBL CC': text => {
      const re = /(\d{2}-\w{3}-\d{4})\s+(.+?)\s{2,}([\d,]+\.\d{2})\s*(CR)?/g;
      const out=[];let m;
      while((m=re.exec(text))!==null){
        const isCr=!!(m[4]);
        out.push({date:normalDate(m[1]),particulars:m[2].trim(),debit:isCr?null:m[3],credit:isCr?m[3]:null,balance:null});
      }
      return out;
    },
  };

  function parseMatches(re,text,idx){
    const out=[];let m;
    while((m=re.exec(text))!==null){
      out.push({
        date:normalDate(m[idx[0]]),
        particulars:m[idx[1]].trim(),
        debit:m[idx[2]]?m[idx[2]].replace(/,/g,''):null,
        credit:m[idx[3]]?m[idx[3]].replace(/,/g,''):null,
        balance:m[idx[4]]?m[idx[4]].replace(/,/g,''):null,
      });
    }
    return out;
  }

  function normalDate(s){
    // Convert DD/MM/YYYY, DD-MM-YYYY, DD MMM YYYY → YYYY-MM-DD
    const months={Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
    s=s.trim();
    if(/\d{2}\/\d{2}\/\d{4}/.test(s)){const[d,mo,y]=s.split('/');return`${y}-${mo.padStart(2,'0')}-${d.padStart(2,'0')}`;}
    if(/\d{2}-\d{2}-\d{4}/.test(s)){const[d,mo,y]=s.split('-');return`${y}-${mo.padStart(2,'0')}-${d.padStart(2,'0')}`;}
    if(/\d{2}\s+\w{3}\s+\d{4}/.test(s)){const[d,mon,y]=s.split(/\s+/);const mo=months[mon]||1;return`${y}-${String(mo).padStart(2,'0')}-${d.padStart(2,'0')}`;}
    if(/\d{2}-\w{3}-\d{4}/.test(s)){const[d,mon,y]=s.split('-');const mo=months[mon]||1;return`${y}-${String(mo).padStart(2,'0')}-${d.padStart(2,'0')}`;}
    return s;
  }

  function guessCategory(desc){
    const d=desc.toLowerCase();
    if(/swiggy|zomato|domino|pizza|cafe|restaurant|hotel|food|eat|bake|kitchen/.test(d)) return 'Food & Dining';
    if(/amazon|flipkart|myntra|shop|mart|store|mall|market/.test(d)) return 'Shopping';
    if(/fuel|petrol|diesel|hp|bpcl|iocl/.test(d)) return 'Fuel & Transport';
    if(/uber|ola|rapido|metro|bus|railway|irctc|flight|airline/.test(d)) return 'Travel';
    if(/medical|pharma|clinic|hospital|apollo|doctor|health/.test(d)) return 'Medical';
    if(/recharge|jio|airtel|vi |bsnl|broadband|internet/.test(d)) return 'Utilities';
    if(/electricity|water|gas|mseb|bescom|tata power/.test(d)) return 'Utilities';
    if(/salary|credited by|credit by employer/.test(d)) return 'Salary';
    if(/emi|loan/.test(d)) return 'Loan EMI';
    if(/insurance|lic|hdfc life|sbi life/.test(d)) return 'Insurance';
    if(/atm|cash withdrawal/.test(d)) return 'Cash Withdrawal';
    if(/transfer|neft|rtgs|imps|upi/.test(d)) return 'Transfer';
    return 'Uncategorized';
  }

  // ── PDF parsing via pdf.js ───────────────────────────────────────
  const handleFile = async e => {
    const file=e.target.files[0];
    if(!file||!bank){showToast('⚠ Select bank first');return;}
    setPdfName(file.name);
    setProgress('Reading PDF…');
    try{
      const pdfjsLib=window['pdfjs-dist/build/pdf'];
      if(pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc=
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const arrayBuf=await file.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:arrayBuf}).promise;
      let fullText='';
      for(let p=1;p<=pdf.numPages;p++){
        setProgress(`Reading page ${p}/${pdf.numPages}…`);
        const page=await pdf.getPage(p);
        const tc=await page.getTextContent();
        // Preserve column layout by sorting items left→right, top→bottom
        const items=tc.items.sort((a,b)=>{
          const dy=Math.round(b.transform[5])-Math.round(a.transform[5]);
          return dy!==0?dy:a.transform[4]-b.transform[4];
        });
        fullText+=items.map(i=>i.str).join(' ')+'\n';
      }
      setProgress('Parsing transactions…');
      const parser=PARSERS[bank];
      if(!parser){showToast('⚠ No parser for '+bank);setProgress('');return;}
      const parsed=parser(fullText).filter(r=>r.date&&(r.debit||r.credit));
      if(!parsed.length){
        showToast('⚠ No transactions found — PDF layout may differ');
        setProgress('Try manual regex tuning in console');
        return;
      }
      // Annotate with guessed category and txn type
      const enriched=parsed.map((r,i)=>({
        ...r,
        _idx:i,
        amount:parseFloat((r.debit||r.credit||'0').replace(/,/g,'')),
        type: r.debit ? (allCC.includes(bank)?'Credit Spend':'Expense') : (allCC.includes(bank)?'Credit Payment':'Income'),
        category:guessCategory(r.particulars),
        account:bank,
      }));
      setRows(enriched);
      const sel={};enriched.forEach((_,i)=>{sel[i]=true;});
      setSelected(sel);
      setEditing({});
      setStep('review');
      setProgress('');
    }catch(err){
      console.error('PDF parse error:',err);
      showToast('⚠ PDF parse failed — see console');
      setProgress('Error: '+err.message);
    }
  };

  const toggleAll=val=>{ const s={};rows.forEach((_,i)=>{s[i]=val;});setSelected(s); };
  const setEdit=(idx,field,val)=>setEditing(p=>({...p,[idx]:{...(p[idx]||{}), [field]:val}}));
  const getRow=idx=>({...rows[idx],...(editing[idx]||{})});

  const handleImport=async()=>{
    const toImport=rows.filter((_,i)=>selected[i]);
    if(!toImport.length){showToast('⚠ Nothing selected');return;}
    setImporting(true);
    let ok=0,fail=0;
    for(let i=0;i<toImport.length;i++){
      const r=getRow(toImport[i]._idx);
      setProgress(`Importing ${i+1}/${toImport.length}…`);
      const isCC=allCC.includes(bank);
      const txn={
        domain,
        type: r.type,
        amount: Math.abs(parseFloat(String(r.amount).replace(/,/g,''))||0),
        category: r.category||'Uncategorized',
        from_account: r.debit ? bank : null,
        to_account:   r.credit ? bank : null,
        particulars:  r.particulars,
        status:'complete',
        source:'pdf-import',
        created_at: r.date ? new Date(r.date+'T00:00:00').toISOString() : new Date().toISOString(),
      };
      try{ await onSave(txn); ok++; }
      catch(e){ fail++; console.error('Import row error:',e); }
    }
    setImporting(false);
    setProgress('');
    showToast(`✓ ${ok} imported${fail?', '+fail+' failed':''}`);
    setStep('done');
  };

  const m={padding:'0 16px 16px'};

  // ── STEP: upload ─────────────────────────────────────────────────
  if(step==='upload') return(
    <div style={m}>
      <div style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,letterSpacing:'0.1em',color:'var(--text3)',padding:'18px 0 12px',textTransform:'uppercase'}}>📄 PDF Bank Import</div>
      <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:16,marginBottom:12}}>
        <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',marginBottom:8,letterSpacing:'0.06em'}}>1. SELECT BANK / ACCOUNT</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
          {[...allBanks.filter(b=>b!=='Cash'),...allCC].map(b=>(
            <button key={b} onClick={()=>setBank(b)} style={{
              padding:'8px 14px',borderRadius:20,fontFamily:'var(--mono)',fontSize:12,fontWeight:600,cursor:'pointer',
              background: bank===b ? 'var(--green)' : 'var(--bg3)',
              border: bank===b ? 'none' : '1px solid var(--border)',
              color: bank===b ? '#000' : 'var(--text2)',
            }}>{b}</button>
          ))}
        </div>
      </div>
      <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:16,marginBottom:12}}>
        <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',marginBottom:8,letterSpacing:'0.06em'}}>2. DOMAIN</div>
        <div style={{display:'flex',gap:8}}>
          {['Personal','Site'].map(d=>(
            <button key={d} onClick={()=>setDomain(d)} style={{
              flex:1,padding:'9px',borderRadius:8,fontFamily:'var(--mono)',fontSize:12,fontWeight:600,cursor:'pointer',
              background:domain===d?'var(--blue)':'var(--bg3)',
              border:domain===d?'none':'1px solid var(--border)',
              color:domain===d?'#fff':'var(--text2)',
            }}>{d}</button>
          ))}
        </div>
      </div>
      <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:16,marginBottom:12}}>
        <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',marginBottom:8,letterSpacing:'0.06em'}}>3. UPLOAD PDF STATEMENT</div>
        <label style={{display:'block',background:'var(--bg3)',border:'2px dashed var(--border2)',borderRadius:8,padding:'24px',textAlign:'center',cursor:'pointer'}}>
          <input type="file" accept=".pdf,application/pdf" onChange={handleFile} style={{display:'none'}}/>
          <div style={{fontSize:28,marginBottom:8}}>📂</div>
          <div style={{fontFamily:'var(--mono)',fontSize:12,color:bank?'var(--text)':'var(--text3)'}}>
            {bank ? `Tap to upload ${bank} statement PDF` : 'Select bank first'}
          </div>
        </label>
        {progress&&<div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--amber)',marginTop:8,textAlign:'center'}}>{progress}</div>}
      </div>
      <div style={{background:'var(--amber-bg)',border:'1px solid var(--amber)',borderRadius:8,padding:'10px 12px'}}>
        <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--amber)',letterSpacing:'0.06em',marginBottom:4}}>ℹ PARSER NOTES</div>
        <div style={{fontSize:11,color:'var(--text2)',lineHeight:1.6}}>
          Works best with text-based PDFs (not scanned). If 0 rows found, the bank's PDF layout may differ — check console for raw text and adjust regex in code.
        </div>
      </div>
    </div>
  );

  // ── STEP: review ─────────────────────────────────────────────────
  if(step==='review'){
    const selCount=Object.values(selected).filter(Boolean).length;
    return(
      <div style={{paddingBottom:80}}>
        {/* Sticky header */}
        <div style={{position:'sticky',top:0,background:'var(--bg)',borderBottom:'1px solid var(--border)',padding:'12px 16px',zIndex:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:'var(--text)',letterSpacing:'0.06em'}}>📄 {pdfName.slice(0,28)}</div>
            <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginTop:2}}>{bank} · {rows.length} found · {selCount} selected</div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>toggleAll(false)} style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text2)',padding:'6px 10px',fontFamily:'var(--mono)',fontSize:10,cursor:'pointer'}}>None</button>
            <button onClick={()=>toggleAll(true)} style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text2)',padding:'6px 10px',fontFamily:'var(--mono)',fontSize:10,cursor:'pointer'}}>All</button>
            <button onClick={()=>setStep('upload')} style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text2)',padding:'6px 10px',fontFamily:'var(--mono)',fontSize:10,cursor:'pointer'}}>← Back</button>
          </div>
        </div>

        {/* Rows */}
        <div style={{padding:'0 12px'}}>
          {rows.map((row,i)=>{
            const r=getRow(i);
            const isDebit=!!row.debit;
            const sel=selected[i];
            return(
              <div key={i} style={{
                background:sel?'var(--bg2)':'var(--bg)',
                border:`1px solid ${sel?'var(--border2)':'var(--border)'}`,
                borderRadius:10,marginTop:10,padding:12,opacity:sel?1:0.45,
              }}>
                {/* Row header */}
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <input type="checkbox" checked={!!sel} onChange={e=>setSelected(p=>({...p,[i]:e.target.checked}))} style={{width:16,height:16,accentColor:'var(--green)',cursor:'pointer'}}/>
                    <div>
                      <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>{r.date}</div>
                      <div style={{fontSize:12,color:'var(--text)',marginTop:2,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.particulars}</div>
                    </div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontFamily:'var(--mono)',fontSize:14,fontWeight:700,color:isDebit?'var(--red)':'var(--green)'}}>
                      {isDebit?'−':'+'} ₹{parseFloat(String(r.amount||0).replace(/,/g,'')).toLocaleString('en-IN',{minimumFractionDigits:2})}
                    </div>
                    {row.balance&&<div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)'}}>Bal: ₹{row.balance}</div>}
                  </div>
                </div>

                {/* Editable fields */}
                {sel&&<div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                  <select value={r.type} onChange={e=>setEdit(i,'type',e.target.value)}
                    style={{flex:1,minWidth:110,background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,padding:'6px 8px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:11,outline:'none'}}>
                    {['Expense','Income','Credit Spend','Credit Payment','Transfer'].map(t=>(
                      <option key={t} value={t}>{t}</option>
                    ))}
                  </select>
                  <select value={r.category} onChange={e=>setEdit(i,'category',e.target.value)}
                    style={{flex:2,minWidth:130,background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,padding:'6px 8px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:11,outline:'none'}}>
                    {(allCategories||[]).map(c=>(<option key={c.id} value={c.id}>{c.emoji} {c.id}</option>))}
                    <option value="Uncategorized">• Uncategorized</option>
                  </select>
                </div>}
              </div>
            );
          })}
        </div>

        {/* Import bar */}
        <div style={{position:'fixed',bottom:'calc(var(--tab-h) + var(--safe-b))',left:0,right:0,background:'var(--bg)',borderTop:'1px solid var(--border)',padding:'12px 16px',zIndex:10}}>
          {progress&&<div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--amber)',textAlign:'center',marginBottom:6}}>{progress}</div>}
          <button onClick={handleImport} disabled={importing||!selCount} style={{
            width:'100%',padding:'14px',borderRadius:10,border:'none',
            background:importing||!selCount?'var(--bg3)':'var(--green)',
            color:importing||!selCount?'var(--text3)':'#000',
            fontFamily:'var(--mono)',fontSize:13,fontWeight:700,cursor:'pointer',letterSpacing:'0.06em',
          }}>
            {importing?progress||'Importing…':`⬇ Import ${selCount} Transaction${selCount!==1?'s':''}`}
          </button>
        </div>
      </div>
    );
  }

  // ── STEP: done ───────────────────────────────────────────────────
  return(
    <div style={{...m,textAlign:'center',paddingTop:48}}>
      <div style={{fontSize:48,marginBottom:16}}>✅</div>
      <div style={{fontFamily:'var(--mono)',fontSize:14,fontWeight:700,color:'var(--green)',marginBottom:8}}>Import Complete</div>
      <div style={{fontSize:12,color:'var(--text2)',marginBottom:32}}>Transactions added to your log.</div>
      <button onClick={()=>{setStep('upload');setRows([]);setSelected({});setEditing({});setPdfName('');}} style={{
        background:'var(--green)',border:'none',borderRadius:10,color:'#000',
        fontFamily:'var(--mono)',fontSize:12,fontWeight:700,padding:'12px 28px',cursor:'pointer',
      }}>Import Another PDF</button>
    </div>
  );
}


ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
