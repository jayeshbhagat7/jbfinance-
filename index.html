        <div onClick={()=>{setForm(f=>({...f,person_name:sel}));setView('add');}} style={{background:'var(--green)',color:'#000',fontFamily:'var(--mono)',fontSize:11,fontWeight:600,padding:'6px 12px',borderRadius:6,cursor:'pointer'}}>+ Entry</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,padding:'10px 16px',borderBottom:'1px solid var(--border)'}}>
        {[['Given',fmtAmt(p?.given||0),'var(--amber)'],['Received',fmtAmt(p?.received||0),'var(--green)'],['Balance',fmtAmt(Math.abs(out)),out>0?'var(--red)':'var(--green)']].map(([l,v,c])=>(<div key={l} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 10px',textAlign:'center'}}><div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:3}}>{l.toUpperCase()}</div><div style={{fontSize:14,fontWeight:600,fontFamily:'var(--mono)',color:c}}>{v}</div></div>))}
      </div>
      {entries.map(e=>(<div key={e.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 16px',borderBottom:'1px solid var(--border)'}}>
        <div><div style={{fontSize:12,color:e.direction==='given'?'var(--amber)':'var(--green)',fontFamily:'var(--mono)',fontWeight:600}}>{e.direction==='given'?'▲ Diya':'▼ Wapas'} — {fmtAmt(e.amount)}</div><div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{fmtDate(e.created_at)} · {e.mode}{e.notes?' · '+e.notes:''}</div><div style={{fontSize:9,color:e.direction==='given'?'var(--amber)':'var(--green)',fontFamily:'var(--mono)',marginTop:1}}>{e.direction==='given'?'↳ Expense logged to '+e.mode:'↳ Income logged to '+e.mode}</div></div>
        <button onClick={()=>onDelete(e.id)} style={{background:'none',border:'1px solid var(--border)',borderRadius:6,color:'var(--text3)',padding:'4px 8px',fontSize:10,fontFamily:'var(--mono)',cursor:'pointer'}}>✕</button>
      </div>))}
      {entries.length===0&&<div className="empty">No entries yet</div>}
    </div>);
  }

  if(view==='add'){
    return(<div className="fade-in" style={{padding:'12px 16px',display:'flex',flexDirection:'column',gap:12}}>
      <div style={{display:'flex',alignItems:'center',gap:12}}><div onClick={()=>setView('list')} style={{cursor:'pointer',color:'var(--blue)',fontFamily:'var(--mono)',fontSize:12}}>← Back</div><span style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>New Udhari Entry</span></div>
      <div><p className="sec-label" style={{marginBottom:6}}>Direction</p><div className="chip-row"><div className={'chip'+(form.direction==='given'?' sel-amber':'')} onClick={()=>setForm(f=>({...f,direction:'given'}))}>▲ Maine diya</div><div className={'chip'+(form.direction==='received'?' sel':'')} onClick={()=>setForm(f=>({...f,direction:'received'}))}>▼ Wapas mila</div></div></div>
      <div><p className="sec-label" style={{marginBottom:6}}>Person</p><input style={iS} placeholder="e.g. Rajesh Senghani" value={form.person_name} onChange={e=>setForm(f=>({...f,person_name:e.target.value}))}/></div>
      <div style={{display:'flex',gap:8}}><div style={{flex:1}}><p className="sec-label" style={{marginBottom:6}}>Amount (₹)</p><input style={iS} type="number" placeholder="0" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/></div><div style={{flex:1}}><p className="sec-label" style={{marginBottom:6}}>Date</p><input style={{...iS,color:form.txn_date!==todayStr?'var(--amber)':'var(--text)'}} type="date" value={form.txn_date} max={todayStr} onChange={e=>setForm(f=>({...f,txn_date:e.target.value}))}/></div></div>
      <div><p className="sec-label" style={{marginBottom:6}}>Mode (account)</p><div className="chip-row">{allBanks.map(a=><div key={a} className={'chip'+(form.mode===a?' sel':'')} onClick={()=>setForm(f=>({...f,mode:a}))}>{a}</div>)}</div></div>
      <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 12px',fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)'}}>Will log: {form.direction==='given'?<span style={{color:'var(--amber)'}}>Expense from <strong>{form.mode}</strong></span>:<span style={{color:'var(--green)'}}>Income to <strong>{form.mode}</strong></span>}</div>
      <button onClick={handleAdd} disabled={saving||!form.person_name.trim()||!form.amount} style={{background:saving||!form.person_name.trim()||!form.amount?'var(--bg3)':'var(--green)',border:'none',borderRadius:8,color:saving||!form.person_name.trim()||!form.amount?'var(--text3)':'#000',fontFamily:'var(--mono)',fontSize:13,fontWeight:600,padding:14,cursor:'pointer',transition:'all 0.2s'}}>{saving?'Saving...':'Save — '+(form.direction==='given'?'Diya':'Wapas')+' ₹'+(form.amount||0)}</button>
    </div>);
  }

  return(<div className="fade-in" style={{paddingBottom:8,width:'100%',boxSizing:'border-box'}}>
    <div style={{padding:'10px 16px',borderBottom:'1px solid var(--border)',background:'var(--bg2)',display:'flex',justifyContent:'space-between',alignItems:'center',width:'100%',boxSizing:'border-box'}}>
      <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',letterSpacing:'0.08em',textTransform:'uppercase'}}>Total Outstanding</span>
      <span style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:700,color:'var(--amber)'}}>{fmtAmt(totalOut)}</span>
    </div>
    {personList.length===0&&<div className="empty">Koi udhari nahi hai.<br/>"+ New" dabao pehli entry karne ke liye.</div>}
    {personList.map(p=>(<div key={p.name} onClick={()=>{setSel(p.name);setView('person');}} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',borderBottom:'1px solid var(--border)',cursor:'pointer'}}>
      <div><div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{p.name}</div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:3}}>Diya {fmtAmt(p.given)}{p.received>0&&<span style={{color:'var(--green)'}}> · Wapas {fmtAmt(p.received)}</span>}</div></div>
      <div style={{textAlign:'right'}}><div style={{fontSize:14,fontWeight:600,fontFamily:'var(--mono)',color:p.outstanding>0?'var(--amber)':p.outstanding<0?'var(--green)':'var(--text3)'}}>{p.outstanding>0?fmtAmt(p.outstanding):p.outstanding<0?'−'+fmtAmt(Math.abs(p.outstanding)):'✓ Settled'}</div><div style={{fontSize:9,color:'var(--text3)',marginTop:2}}>{p.outstanding>0?'owes you':p.outstanding<0?'you owe':'clear'}</div></div>
    </div>))}
  </div>);
}
/* ── RecItem (lean prefill) ── */
function RecItem({rec,cl,onPrefill}){
  const isPaid=cl?.status==='paid';const isVar=!rec.amount||parseFloat(rec.amount)===0;
  return(<div onClick={()=>{if(isPaid)return;if(typeof onPrefill==='function')onPrefill(rec);}} style={{borderBottom:'1px solid var(--border)',background:isPaid?'var(--green-bg)':'var(--bg2)',cursor:isPaid?'default':'pointer',display:'flex',alignItems:'center',gap:10,padding:'10px 14px'}}>
    <div style={{width:22,height:22,borderRadius:6,flexShrink:0,border:isPaid?'1.5px solid var(--green)':'1.5px solid var(--border2)',background:isPaid?'var(--green)':'none',display:'flex',alignItems:'center',justifyContent:'center'}}>{isPaid?<span style={{color:'#000',fontSize:11,fontWeight:700}}>✓</span>:<span style={{color:'var(--text3)',fontSize:12}}>›</span>}</div>
    <div style={{flex:1,minWidth:0}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontSize:13,color:isPaid?'var(--text3)':'var(--text)',textDecoration:isPaid?'line-through':'none',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{rec.name}</span><span style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:600,flexShrink:0,marginLeft:8,color:isPaid?'var(--green)':isVar?'var(--text3)':'var(--text)'}}>{isPaid?fmtAmt(cl.amount_paid||rec.amount||0):isVar?'variable':fmtAmt(rec.amount)}</span></div>
      <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:2,display:'flex',gap:8,flexWrap:'wrap'}}>
        {rec.due_day&&<span>due {rec.due_day}{['','st','nd','rd'][rec.due_day]||'th'}</span>}
        {rec.account&&<span>{rec.account}</span>}{rec.category&&<span>{rec.category}</span>}
        {isPaid&&cl.paid_at&&<span style={{color:'var(--green)'}}>paid {fmtDate(cl.paid_at)}</span>}
        {!isPaid&&<span style={{color:'var(--text3)',fontStyle:'italic'}}>tap to fill Add screen</span>}
      </div>
    </div>
  </div>);
}

/* ── ChecklistScreen (bills only — provisions are separate) ── */
function ChecklistScreen({recurring,checklist,onTick,onAdd,onDelete,allAccounts,allBanks,allCC,allCategories,balances,setTab,onPrefill,externalAddOpen,onExternalAddClose}){
  const now=new Date();const month=now.getMonth()+1;const year=now.getFullYear();
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const FREQS=[{k:'monthly',l:'Monthly'},{k:'bimonthly',l:'Every 2 months'},{k:'quarterly',l:'Quarterly'},{k:'half_yearly',l:'Half-yearly'},{k:'annual',l:'Annual'}];
  const [addOpen,setAddOpen]=useState(false);
  useEffect(()=>{if(externalAddOpen){setAddOpen(true);if(onExternalAddClose)onExternalAddClose();}},[externalAddOpen]);
  const [form,setForm]=useState({name:'',amount:'',frequency:'monthly',due_day:1,due_month:'',due_month2:'',account:'Cash',category:'',notes:'',active:true});
  const [saving,setSaving]=useState(false);
  const iS={background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',width:'100%'};
  const cS=a=>({display:'inline-block',border:a?'1px solid var(--green)':'1px solid var(--border2)',borderRadius:16,padding:'6px 12px',fontFamily:'var(--mono)',fontSize:11,color:a?'var(--green)':'var(--text2)',background:a?'var(--green-bg)':'var(--bg2)',cursor:'pointer',userSelect:'none',margin:'0 4px 4px 0'});
  const getCL=id=>checklist.find(c=>c.recurring_id===id);
  const isDue=r=>{
    if(!r.active&&r.active!==undefined)return false;
    if(r.is_provision)return false; /* provisions excluded from bills */
    if(r.frequency==='monthly')return true;
    if(r.frequency==='bimonthly'){const s=r.due_month||1;return(month-s)%2===0&&month>=s;}
    if(r.frequency==='quarterly'){const s=r.due_month||1;return(month-s)%3===0&&month>=s;}
    if(r.frequency==='half_yearly')return month===r.due_month||month===r.due_month2;
    if(r.frequency==='annual')return month===r.due_month;
    return false;
  };
  /* CC bills auto-appear — show only BILLED amount from reconciliation, not total balance */
  const ccItems=allCC.map(a=>{const balance=balances[a]||0;if(balance>=0)return null;const reconData=(()=>{try{const v=JSON.parse(localStorage.getItem('jbf_cc_reconciled')||'{}');return v[a]||null;}catch{return null;}})();const billedAmt=reconData?reconData.bankAmt:Math.abs(balance);if(billedAmt<=0)return null;return{id:'cc-'+a,name:a+' bill payment',amount:billedAmt,frequency:'monthly',account:allBanks.find(b=>b!=='Cash')||allBanks[0]||'',category:'Credit Card Bill',is_cc_payment:true,cc_name:a,due_day:null,active:true};}).filter(Boolean);
  const activeItems=[...ccItems,...recurring.filter(isDue)];
  const paid=activeItems.filter(r=>getCL(r.id)?.status==='paid');
  const pending=activeItems.filter(r=>getCL(r.id)?.status!=='paid');
  const pct=activeItems.length>0?Math.round(paid.length/activeItems.length*100):0;

  const handleAdd=async()=>{
    if(!form.name.trim())return;setSaving(true);
    await onAdd({name:form.name.trim(),amount:parseFloat(form.amount)||0,frequency:form.frequency,due_day:parseInt(form.due_day)||1,due_month:form.due_month?parseInt(form.due_month):null,due_month2:form.due_month2?parseInt(form.due_month2):null,account:form.account,provision_account:null,category:form.category,notes:form.notes,is_provision:false,active:true});
    setForm({name:'',amount:'',frequency:'monthly',due_day:1,due_month:'',due_month2:'',account:'Cash',category:'',notes:'',active:true});setSaving(false);setAddOpen(false);
  };

  return(<div className="fade-in" style={{paddingBottom:8,width:'100%',boxSizing:'border-box'}}>
    <div style={{padding:'8px 16px 6px',borderBottom:'1px solid var(--border)',background:'var(--bg2)',width:'100%',boxSizing:'border-box'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
        <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',letterSpacing:'0.08em'}}>{paid.length}/{activeItems.length} DONE</span>
        <span style={{fontFamily:'var(--mono)',fontSize:10,color:pct===100?'var(--green)':pct>=50?'var(--blue)':'var(--amber)',fontWeight:600}}>{pct}% complete</span>
      </div>
      {activeItems.length>0&&<div><div style={{background:'var(--bg3)',borderRadius:3,height:6}}><div style={{height:6,borderRadius:3,transition:'width 0.3s',background:pct===100?'var(--green)':pct>=70?'var(--blue)':'var(--amber)',width:pct+'%'}}/></div></div>}
    </div>

    {addOpen&&(<div style={{margin:'8px 12px',background:'var(--bg2)',border:'1px solid var(--blue)',borderRadius:10,padding:'14px'}}>
      <p style={{fontSize:11,color:'var(--blue)',fontFamily:'var(--mono)',margin:'0 0 10px',fontWeight:600,letterSpacing:'0.06em'}}>ADD RECURRING BILL</p>
      <div style={{display:'flex',gap:8,marginBottom:8}}><input style={{...iS,flex:2}} placeholder="e.g. Society maintenance" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/><input style={{...iS,flex:1}} type="number" placeholder="₹ (0=variable)" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/></div>
      <div style={{marginBottom:8}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:5}}>FREQUENCY</div><div style={{display:'flex',flexWrap:'wrap'}}>{FREQS.map(({k,l})=><span key={k} style={cS(form.frequency===k)} onClick={()=>setForm(f=>({...f,frequency:k}))}>{l}</span>)}</div></div>
      <div style={{display:'flex',gap:8,marginBottom:8}}><div style={{flex:1}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>DUE DAY</div><input style={iS} type="number" min="1" max="31" value={form.due_day} onChange={e=>setForm(f=>({...f,due_day:e.target.value}))}/></div>{['annual','half_yearly','quarterly','bimonthly'].includes(form.frequency)&&<div style={{flex:1}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>{form.frequency==='half_yearly'?'1ST MONTH':'DUE MONTH'}</div><input style={iS} type="number" min="1" max="12" placeholder="e.g. 10" value={form.due_month} onChange={e=>setForm(f=>({...f,due_month:e.target.value}))}/></div>}{form.frequency==='half_yearly'&&<div style={{flex:1}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>2ND MONTH</div><input style={iS} type="number" min="1" max="12" placeholder="e.g. 4" value={form.due_month2} onChange={e=>setForm(f=>({...f,due_month2:e.target.value}))}/></div>}</div>
      <div style={{marginBottom:8}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:5}}>DEFAULT ACCOUNT</div><div style={{display:'flex',flexWrap:'wrap'}}>{allAccounts.map(a=><span key={a} style={cS(form.account===a)} onClick={()=>setForm(f=>({...f,account:a}))}>{a}</span>)}</div></div>
      <input style={{...iS,marginBottom:8}} placeholder="Category (optional)" value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}/>
      <div style={{display:'flex',gap:8}}><button onClick={handleAdd} disabled={saving||!form.name.trim()} style={{flex:1,background:saving||!form.name.trim()?'var(--bg3)':'var(--green)',border:'none',borderRadius:8,color:saving||!form.name.trim()?'var(--text3)':'#000',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:12,cursor:'pointer'}}>{saving?'Saving...':'Save'}</button><button onClick={()=>setAddOpen(false)} style={{background:'none',border:'1px solid var(--border2)',borderRadius:8,color:'var(--text3)',padding:'12px 16px',fontFamily:'var(--mono)',fontSize:12,cursor:'pointer'}}>Cancel</button></div>
    </div>)}

    {pending.length>0&&<><p className="sec-label" style={{color:'var(--amber)'}}>Pending — {pending.length}</p>{pending.map(r=><RecItem key={r.id} rec={r} cl={getCL(r.id)} onPrefill={onPrefill}/>)}</>}
    {paid.length>0&&<><p className="sec-label">Done — {paid.length}</p>{paid.map(r=><RecItem key={r.id} rec={r} cl={getCL(r.id)} onPrefill={onPrefill}/>)}</>}
    {activeItems.length===0&&!addOpen&&<div className="empty">No bills this month.<br/>"+ Add" se setup karo.</div>}
    {recurring.filter(r=>!r.is_provision).length>0&&<><p className="sec-label" style={{marginTop:16}}>All recurring bills</p>{recurring.filter(r=>!r.is_provision).map(r=><div key={r.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 14px',borderBottom:'1px solid var(--border)',fontSize:12}}><div style={{flex:1,minWidth:0}}><div style={{color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.name}</div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:2}}>{FREQS.find(f=>f.k===r.frequency)?.l||r.frequency} · {r.account}</div></div><div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}><span style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--text2)'}}>{r.amount?fmtAmt(r.amount):'var'}</span><button onClick={()=>onDelete(r.id)} style={{background:'none',border:'1px solid var(--border)',borderRadius:5,color:'var(--text3)',padding:'3px 8px',fontSize:10,fontFamily:'var(--mono)',cursor:'pointer'}}>✕</button></div></div>)}</>}
  </div>);
}
/* ── ProvisionLedger — Decoupled Virtual Envelope (DVE) Architecture ──
   Provisions are VIRTUAL TAGS that block liquidity.
   Physical money NEVER moves until a Flush (actual expense) occurs.
   Types: Provision_Accrue (+B), Provision_Withdraw (+D), Provision_Repay (−D), Provision_Flush (−B + physical Expense)
── */
function ProvisionLedger({recurring,txns,allBanks,onAddTxn,onAddRecurring,onDeleteRecurring,onUpdateRecurring,showToast,provisionStates}){
  const [sel,setSel]=useState(null);
  /* qAction: {id, type: 'accrue'|'borrow'|'repay'|'flush'} */
  const [qAction,setQAction]=useState(null);
  const [qAmt,setQAmt]=useState('');const [qNote,setQNote]=useState('');
  const [flushBank,setFlushBank]=useState('');
  const [saving,setSaving]=useState(false);
  const [addOpen,setAddOpen]=useState(false);
  const [form,setForm]=useState({name:'',target_amount:'',already_saved:'',due_date:'',monthly_contribution:'',active:true});
  const [formSaving,setFormSaving]=useState(false);
  /* Edit state */
  const [editId,setEditId]=useState(null);
  const [editForm,setEditForm]=useState({name:'',target_amount:'',already_saved:'',due_date:'',monthly_contribution:''});
  const [editSaving,setEditSaving]=useState(false);

  /* Use pre-computed provisionStates from App (via computeProvisions) */
  const states=provisionStates||[];

  /* ── DVE Action Handler ──
     accrue  → Provision_Accrue  (virtual, increases Gross Saved B)
     borrow  → Provision_Withdraw (virtual, increases Debt D)
     repay   → Provision_Repay   (virtual, decreases Debt D)
     flush   → DUAL WRITE: Provision_Flush (virtual, empties envelope) + Expense (physical debit)
  ── */
  const handleAction=async(prov,type,amt,note,bankAcct)=>{
    const n=parseFloat(amt);if(!n||n<=0){showToast('⚠ Enter a valid amount');return;}
    setSaving(true);
    const now=new Date().toISOString();
    const tag='[ENV:'+prov.id+']';
    if(type==='flush'){
      /* 1. Virtual Provision_Flush — empties the envelope */
      await onAddTxn({type:'Provision_Flush',amount:n,category:prov.name,particulars:tag+(note?' — '+note:''),status:'complete',source:'provision_dve',created_at:now});
      /* 2. Physical Expense — actual money leaves the bank */
      const physBank=bankAcct||(allBanks.find(b=>b!=='Cash')||allBanks[0]||'KB');
      await onAddTxn({type:'Expense',amount:n,category:'Provision',from_account:physBank,particulars:'Flush: '+prov.name+(note?' — '+note:''),status:'complete',source:'provision_flush',created_at:now});
      showToast('✓ Flushed — ₹'+fmt(n)+' debited from '+physBank);
    } else {
      const txnType=type==='accrue'?'Provision_Accrue':type==='borrow'?'Provision_Withdraw':'Provision_Repay';
      await onAddTxn({type:txnType,amount:n,category:prov.name,particulars:tag+(note?' — '+note:''),status:'complete',source:'provision_dve',created_at:now});
      const labels={accrue:'✓ Accrued',borrow:'⚠ Borrowed',repay:'✓ Repaid'};
      showToast((labels[type]||'✓')+' ₹'+fmt(n));
    }
    setQAction(null);setQAmt('');setQNote('');setFlushBank('');setSaving(false);
  };

  const handleAddProv=async()=>{
    if(!form.name.trim())return;
    setFormSaving(true);
    await onAddRecurring({name:form.name.trim(),amount:parseFloat(form.monthly_contribution)||0,frequency:'monthly',due_day:1,account:null,provision_account:null,category:'Provision',target_amount:parseFloat(form.target_amount)||0,already_saved:parseFloat(form.already_saved)||0,due_date:form.due_date||null,is_provision:true,active:true});
    setForm({name:'',target_amount:'',already_saved:'',due_date:'',monthly_contribution:'',active:true});setFormSaving(false);setAddOpen(false);
  };

  const handleEditOpen=(prov)=>{
    setEditId(prov.id);
    setEditForm({name:prov.name||'',target_amount:prov.target_amount||'',already_saved:prov.already_saved||'',due_date:prov.due_date||'',monthly_contribution:prov.amount||''});
    setSel(null);setQAction(null);
  };
  const handleEditSave=async()=>{
    if(!editForm.name.trim())return;
    setEditSaving(true);
    await onUpdateRecurring(editId,{name:editForm.name.trim(),target_amount:parseFloat(editForm.target_amount)||0,already_saved:parseFloat(editForm.already_saved)||0,due_date:editForm.due_date||null,amount:parseFloat(editForm.monthly_contribution)||0});
    setEditId(null);setEditSaving(false);
  };
  const handleDelete=async(id)=>{
    if(!window.confirm('Delete this envelope? This only removes the envelope definition — virtual transactions remain in your ledger.'))return;
    await onDeleteRecurring(id);
  };

  const tgt=parseFloat(form.target_amount)||0;const saved_=parseFloat(form.already_saved)||0;const gap_=Math.max(0,tgt-saved_);
  const dueDate_=form.due_date?new Date(form.due_date):null;
  const monthsLeft_=dueDate_?Math.max(1,Math.round((dueDate_-new Date())/(1000*60*60*24*30))):0;
  const sugMonth_=monthsLeft_>0?Math.ceil(gap_/monthsLeft_):0;

  const iS={background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,padding:'8px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',width:'100%'};
  const cS=a=>({display:'inline-block',border:a?'1px solid var(--green)':'1px solid var(--border2)',borderRadius:16,padding:'6px 12px',fontFamily:'var(--mono)',fontSize:11,color:a?'var(--green)':'var(--text2)',background:a?'var(--green-bg)':'var(--bg2)',cursor:'pointer',userSelect:'none',margin:'0 4px 4px 0'});
  const btnS=(col,active)=>({flex:1,background:active?col:'none',border:'1px solid '+col,borderRadius:6,color:active?'#000':col,fontFamily:'var(--mono)',fontSize:10,fontWeight:600,padding:'7px 0',cursor:'pointer',transition:'all 0.15s'});

  /* Total Net Blocked across all envelopes — shown in header */
  const totalNetBlocked=states.reduce((s,p)=>s+p.C,0);

  return(<div className="fade-in" style={{paddingBottom:8}}>
    {/* Header */}
    <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',background:'var(--bg2)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div>
        <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>Virtual Envelopes</div>
        <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:2}}>
          {totalNetBlocked>0
            ?<span>Net Blocked: <strong style={{color:'var(--amber)'}}>{fmtAmt(totalNetBlocked)}</strong> across {states.length} envelope{states.length!==1?'s':''}</span>
            :'No liquidity blocked — all envelopes empty'}
        </div>
      </div>
      <button onClick={()=>setAddOpen(o=>!o)} style={{background:'var(--green)',border:'none',borderRadius:8,color:'#000',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:'7px 14px',cursor:'pointer'}}>+ New</button>
    </div>

    {/* DVE Info Banner */}
    <div style={{margin:'8px 10px 0',background:'var(--blue-bg)',border:'1px solid var(--blue)',borderRadius:8,padding:'8px 12px',fontFamily:'var(--mono)',fontSize:10,color:'var(--blue)',lineHeight:1.6}}>
      ◈ DVE Mode: Provisions are virtual tags. Bank balance is <strong>never touched</strong> until you Execute (Flush). Liquidity is blocked logically only.
    </div>

    {/* Add Envelope Form */}
    {addOpen&&(<div style={{margin:'8px 10px',background:'var(--bg2)',border:'1px solid var(--blue)',borderRadius:10,padding:'14px'}}>
      <p style={{fontSize:11,color:'var(--blue)',fontFamily:'var(--mono)',margin:'0 0 12px',fontWeight:600,letterSpacing:'0.06em'}}>NEW VIRTUAL ENVELOPE</p>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        <input style={iS} placeholder="Envelope name (e.g. LIC Premium Oct)" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
        <div style={{display:'flex',gap:8}}>
          <div style={{flex:1}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>TARGET (A)</div><input style={iS} type="number" step="0.01" placeholder="₹ Total needed" value={form.target_amount} onChange={e=>setForm(f=>({...f,target_amount:e.target.value}))}/></div>
          <div style={{flex:1}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>ALREADY SAVED (B₀)</div><input style={iS} type="number" step="0.01" placeholder="₹ already set aside" value={form.already_saved} onChange={e=>setForm(f=>({...f,already_saved:e.target.value}))}/></div>
        </div>
        <div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>TARGET DATE</div><input style={iS} type="date" value={form.due_date} onChange={e=>setForm(f=>({...f,due_date:e.target.value}))}/></div>
        {tgt>0&&(<div style={{background:'var(--amber-bg)',border:'1px solid var(--amber)',borderRadius:8,padding:'10px 12px',fontFamily:'var(--mono)',fontSize:11,display:'flex',gap:16,flexWrap:'wrap'}}>
          <span>Gap: <strong style={{color:'var(--red)'}}>{fmtAmt(gap_)}</strong></span>
          {dueDate_&&<span>Months left: <strong>{monthsLeft_}</strong></span>}
          {sugMonth_>0&&<span>Suggested: <strong style={{color:'var(--green)'}}>{fmtAmt(sugMonth_)}/mo</strong></span>}
        </div>)}
        <div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>MONTHLY ACCRUE (optional)</div><input style={iS} type="number" step="0.01" placeholder={sugMonth_>0?`Suggested: ₹${fmt(sugMonth_)}`:'₹ per month'} value={form.monthly_contribution} onChange={e=>setForm(f=>({...f,monthly_contribution:e.target.value}))}/></div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={handleAddProv} disabled={formSaving||!form.name.trim()} style={{flex:1,background:formSaving||!form.name.trim()?'var(--bg3)':'var(--green)',border:'none',borderRadius:8,color:formSaving||!form.name.trim()?'var(--text3)':'#000',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:12,cursor:'pointer'}}>{formSaving?'Saving...':'Create Envelope'}</button>
          <button onClick={()=>setAddOpen(false)} style={{background:'none',border:'1px solid var(--border2)',borderRadius:8,color:'var(--text3)',padding:'12px 16px',fontFamily:'var(--mono)',fontSize:12,cursor:'pointer'}}>Cancel</button>
        </div>
      </div>
    </div>)}

    {states.length===0&&!addOpen&&<div className="empty">No envelopes yet.<br/>Tap "+ New" to create your first virtual envelope.</div>}

    {states.map(({prov,A,B,C,D,provTxns,pct})=>{
      const isOpen=sel===prov.id;
      const activeType=qAction?.id===prov.id?qAction.type:null;
      const needFlushBank=activeType==='flush';
      const isEditing=editId===prov.id;
      return(<div key={prov.id} className="env-card" style={{margin:'0 10px 10px'}}>

        {/* Header — tap to expand ledger */}
        <div style={{padding:'12px 14px',cursor:'pointer'}} onClick={()=>{if(isEditing)return;setSel(isOpen?null:prov.id);setQAction(null);}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:600,color:'var(--text)',marginBottom:3}}>{prov.name}</div>
              {prov.due_date&&<div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)'}}>Due {new Date(prov.due_date).toLocaleDateString('en-IN',{month:'short',year:'numeric'})}</div>}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0,marginLeft:8}}>
              <div style={{textAlign:'right'}}>
                <div style={{fontFamily:'var(--mono)',fontSize:16,fontWeight:700,color:C>0?'var(--green)':'var(--text3)'}}>{fmtAmt(C)}</div>
                <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',marginTop:2}}>Net Blocked</div>
              </div>
              {/* Edit button */}
              <button onClick={e=>{e.stopPropagation();isEditing?setEditId(null):handleEditOpen(prov);}} style={{background:isEditing?'var(--blue)':'none',border:'1px solid var(--blue)',borderRadius:6,color:isEditing?'#fff':'var(--blue)',fontFamily:'var(--mono)',fontSize:10,fontWeight:600,padding:'5px 9px',cursor:'pointer',flexShrink:0}}>✏</button>
              {/* Delete button */}
              <button onClick={e=>{e.stopPropagation();handleDelete(prov.id);}} style={{background:'none',border:'1px solid var(--red)',borderRadius:6,color:'var(--red)',fontFamily:'var(--mono)',fontSize:10,fontWeight:600,padding:'5px 9px',cursor:'pointer',flexShrink:0}}>✕</button>
            </div>
          </div>

          {/* Inline Edit Form */}
          {isEditing&&(<div onClick={e=>e.stopPropagation()} style={{marginTop:12,background:'var(--bg3)',border:'1px solid var(--blue)',borderRadius:8,padding:'12px',display:'flex',flexDirection:'column',gap:8}}>
            <div style={{fontSize:10,color:'var(--blue)',fontFamily:'var(--mono)',fontWeight:600,letterSpacing:'0.06em',marginBottom:2}}>EDIT ENVELOPE</div>
            <input style={iS} placeholder="Envelope name" value={editForm.name} onChange={e=>setEditForm(f=>({...f,name:e.target.value}))}/>
            <div style={{display:'flex',gap:8}}>
              <div style={{flex:1}}>
                <div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:3}}>TARGET (A)</div>
                <input style={iS} type="number" step="0.01" placeholder="₹ Total needed" value={editForm.target_amount} onChange={e=>setEditForm(f=>({...f,target_amount:e.target.value}))}/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:3}}>ALREADY SAVED (B₀)</div>
                <input style={iS} type="number" step="0.01" placeholder="₹ opening saved" value={editForm.already_saved} onChange={e=>setEditForm(f=>({...f,already_saved:e.target.value}))}/>
              </div>
            </div>
            <div style={{display:'flex',gap:8}}>
              <div style={{flex:1}}>
                <div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:3}}>TARGET DATE</div>
                <input style={iS} type="date" value={editForm.due_date} onChange={e=>setEditForm(f=>({...f,due_date:e.target.value}))}/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:3}}>MONTHLY ACCRUE</div>
                <input style={iS} type="number" step="0.01" placeholder="₹/month" value={editForm.monthly_contribution} onChange={e=>setEditForm(f=>({...f,monthly_contribution:e.target.value}))}/>
              </div>
            </div>
            <div style={{display:'flex',gap:6}}>
              <button onClick={handleEditSave} disabled={editSaving||!editForm.name.trim()} style={{flex:1,background:editSaving?'var(--bg3)':'var(--blue)',border:'none',borderRadius:6,color:editSaving?'var(--text3)':'#fff',fontFamily:'var(--mono)',fontSize:11,fontWeight:700,padding:'10px',cursor:'pointer'}}>{editSaving?'Saving...':'Save Changes'}</button>
              <button onClick={()=>setEditId(null)} style={{background:'none',border:'1px solid var(--border2)',borderRadius:6,color:'var(--text3)',padding:'10px 14px',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer'}}>Cancel</button>
            </div>
          </div>)}

          {/* 4-metric grid: A / B / D / C */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:4,marginTop:10}}>
            {[
              ['A Target',fmtAmt(A),'var(--blue)'],
              ['B Saved',fmtAmt(B),'var(--green)'],
              ['D Debt',fmtAmt(D),D>0?'var(--red)':'var(--text3)'],
              ['C Net',fmtAmt(C),C>0?'var(--green)':'var(--text3)'],
            ].map(([label,val,col])=>(
              <div key={label} style={{background:'var(--bg3)',borderRadius:6,padding:'5px 6px',textAlign:'center',border:label==='D Debt'&&D>0?'1px solid var(--red)':'1px solid var(--border)'}}>
                <div style={{fontSize:8,color:'var(--text3)',fontFamily:'var(--mono)',letterSpacing:'0.06em',marginBottom:2}}>{label.toUpperCase()}</div>
                <div style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:col}}>{val}</div>
              </div>
            ))}
          </div>

          {A>0&&<div className="env-bar" style={{marginTop:8}}><div className="env-fill" style={{width:pct+'%',background:pct>=100?'var(--green)':pct>=60?'var(--blue)':'var(--amber)'}}/></div>}
          {D>0&&<div style={{marginTop:5,display:'inline-flex',alignItems:'center',gap:4,background:'var(--red-bg)',border:'1px solid var(--red)',borderRadius:20,padding:'2px 8px',fontFamily:'var(--mono)',fontSize:9,fontWeight:700,color:'var(--red)'}}>⚠ Debt {fmtAmt(D)} — Repay to clean</div>}
        </div>

        {/* 4-Action Button Row */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:5,padding:'0 12px 10px'}}>
          {[
            {type:'accrue', label:'Accrue', col:'var(--green)'},
            {type:'borrow', label:'Borrow', col:'var(--amber)'},
            {type:'repay',  label:'Repay',  col:'var(--blue)'},
            {type:'flush',  label:'⚡ Execute', col:'var(--red)'},
          ].map(({type,label,col})=>(
            <button key={type}
              onClick={e=>{e.stopPropagation();setQAction(activeType===type?null:{id:prov.id,type});setQAmt('');setQNote('');setFlushBank(allBanks.find(b=>b!=='Cash')||allBanks[0]||'');}}
              style={{background:activeType===type?col:'none',border:'1px solid '+col,borderRadius:6,color:activeType===type?'#000':col,fontFamily:'var(--mono)',fontSize:10,fontWeight:700,padding:'7px 0',cursor:'pointer',transition:'all 0.15s'}}>
              {label}
            </button>
          ))}
        </div>

        {/* Inline Action Form */}
        {activeType&&(<div style={{padding:'0 12px 12px',borderTop:'1px solid var(--border)'}}>
          {/* Context hint */}
          <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',padding:'6px 0 8px',lineHeight:1.6}}>
            {activeType==='accrue'&&'↑ Accrue: Marks more money as virtually saved in this envelope (B increases). No bank movement.'}
            {activeType==='borrow'&&'↩ Borrow: Temporarily uses envelope funds for something else (D increases). Envelope shrinks.'}
            {activeType==='repay' &&'↪ Repay: Returns borrowed funds back to envelope (D decreases). Envelope recovers.'}
            {activeType==='flush' &&'⚡ Execute: Empties the envelope (B→0) AND physically debits the bank. This is the final real-money step.'}
          </div>
          <div style={{display:'flex',gap:6,marginBottom:6}}>
            <input type="number" step="0.01" autoFocus placeholder="Amount (₹)" value={qAmt} onChange={e=>setQAmt(e.target.value)} style={{...iS,flex:'0 0 130px'}}/>
            <input placeholder="Note (optional)" value={qNote} onChange={e=>setQNote(e.target.value)} style={{...iS,flex:1}}/>
          </div>
          {/* Bank picker — only shown for Flush */}
          {needFlushBank&&(
            <div style={{marginBottom:8}}>
              <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>DEBIT FROM BANK (physical debit)</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                {allBanks.filter(b=>b!=='Cash').map(b=>(
                  <span key={b} style={cS(flushBank===b)} onClick={()=>setFlushBank(b)}>{b}</span>
                ))}
              </div>
            </div>
          )}
          <div style={{display:'flex',gap:6}}>
            <button
              onClick={()=>handleAction(prov,activeType,qAmt,qNote,flushBank)}
              disabled={saving||!qAmt||(activeType==='flush'&&!flushBank)}
              style={{flex:1,background:saving||!qAmt||(activeType==='flush'&&!flushBank)?'var(--bg3)':activeType==='flush'?'var(--red)':activeType==='accrue'?'var(--green)':activeType==='borrow'?'var(--amber)':'var(--blue)',border:'none',borderRadius:6,color:saving||!qAmt||(activeType==='flush'&&!flushBank)?'var(--text3)':'#000',fontFamily:'var(--mono)',fontSize:11,fontWeight:700,padding:'10px',cursor:'pointer'}}>
              {saving?'Processing...':`Confirm ${activeType==='accrue'?'Accrue':activeType==='borrow'?'Borrow':activeType==='repay'?'Repay':'Execute'} ${qAmt?'₹'+fmt(parseFloat(qAmt)):''}`}
            </button>
            <button onClick={()=>setQAction(null)} style={{background:'none',border:'1px solid var(--border2)',borderRadius:6,color:'var(--text3)',padding:'10px 14px',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer'}}>✕</button>
          </div>
        </div>)}

        {/* Expanded transaction ledger */}
        {isOpen&&(<div style={{borderTop:'1px solid var(--border)'}}>
          <div style={{padding:'8px 12px',background:'var(--bg3)',borderBottom:'1px solid var(--border)',fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',letterSpacing:'0.08em',textTransform:'uppercase'}}>Transaction Log</div>
          {provTxns.length===0&&<div style={{padding:'12px 14px',fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)'}}>No virtual entries yet. Use Accrue to start building this envelope.</div>}
          {[...provTxns].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).map((t,i)=>{
            const typeConf={
              Provision_Accrue:{label:'↑ Accrued',col:'var(--green)',sign:'+'},
              Provision_Withdraw:{label:'↩ Borrowed',col:'var(--amber)',sign:'−'},
              Provision_Repay:{label:'↪ Repaid',col:'var(--blue)',sign:'+'},
              Provision_Flush:{label:'⚡ Flushed',col:'var(--red)',sign:'−'},
            }[t.type]||{label:t.type,col:'var(--text3)',sign:''};
            return(<div key={t.id||i} style={{display:'flex',justifyContent:'space-between',padding:'8px 14px',borderBottom:'1px solid var(--border)',fontSize:11}}>
              <div>
                <div style={{color:typeConf.col,fontFamily:'var(--mono)',fontWeight:600}}>{typeConf.label}</div>
                <div style={{color:'var(--text3)',marginTop:2,fontSize:10}}>{fmtDate(t.created_at)}{t.particulars&&t.particulars.replace(/\[ENV:[^\]]+\]/,'').trim()?' · '+t.particulars.replace(/\[ENV:[^\]]+\]/,'').trim():''}</div>
              </div>
              <span style={{fontFamily:'var(--mono)',fontWeight:700,color:typeConf.col}}>{typeConf.sign}{fmtAmt(t.amount)}</span>
            </div>);
          })}
        </div>)}

      </div>);
    })}
  </div>);
}
/* ── StatementScreen: 3-column view (Description | Deposits | Withdrawals) with print ── */
function StatementScreen({txns,allAccounts,allBanks,allCC,opening,balances,setTab,setTxnFilter}){
  // Ensure Cash always appears first in the bank selector
  const allBanksWithCash=allBanks.includes('Cash')?allBanks:['Cash',...allBanks];
  const [acct,setAcct]=useState(allBanksWithCash[0]||'');const [period,setPeriod]=useState('this_month');
  const [customStart,setCustomStart]=useState('');const [customEnd,setCustomEnd]=useState('');
  const now=new Date();const month=now.getMonth();const year=now.getFullYear();
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const isCC=allCC.includes(acct);
  const isCash=(acct==='Cash');
  
  /* Listen for routing events from Dashboard */
  useEffect(()=>{
    const handleRoute=e=>{
      if(e.detail){
        if(e.detail.account)setAcct(e.detail.account);
        if(e.detail.period)setPeriod(e.detail.period);
      }
    };
    window.addEventListener('jbf-route-statement',handleRoute);
    return()=>window.removeEventListener('jbf-route-statement',handleRoute);
  },[]);
  
  /* Filter txns based on period */
  const acctTxns=txns.filter(t=>t.status!=='voided').filter(t=>t.from_account===acct||t.to_account===acct).filter(t=>{
    const d=new Date(t.created_at);
    if(period==='this_month')return d.getMonth()===month&&d.getFullYear()===year;
    if(period==='last_month'){const lm=month===0?11:month-1,ly=month===0?year-1:year;return d.getMonth()===lm&&d.getFullYear()===ly;}
    if(period==='this_year')return d.getFullYear()===year;
    if(period==='custom'&&customStart&&customEnd){const ds=t.created_at.slice(0,10);return ds>=customStart&&ds<=customEnd;}
    return true;
  }).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  
  const beforePeriod=txns.filter(t=>t.status!=='voided').filter(t=>t.from_account===acct||t.to_account===acct).filter(t=>{
    if(period==='all')return false;
    const d=new Date(t.created_at);
    if(period==='this_month')return d<new Date(year,month,1);
    if(period==='last_month'){const lm=month===0?11:month-1,ly=month===0?year-1:year;return d<new Date(ly,lm,1);}
    if(period==='this_year')return d<new Date(year,0,1);
    if(period==='custom'&&customStart)return t.created_at.slice(0,10)<customStart;
    return false;
  });
  
  const rawOpen=opening[acct];const openingAmt=typeof rawOpen==='object'&&rawOpen!==null?(rawOpen.amount||0):(rawOpen||0);
  const openBal=openingAmt+beforePeriod.reduce((s,t)=>{
    const a=parseFloat(t.amount)||0;
    if(t.type==='Expense'||t.type==='UA Expense')return t.from_account===acct?s-a:s;
    if(t.type==='Income'||t.type==='UA Received')return t.to_account===acct?s+a:s;
    let e=0;if(t.from_account===acct)e-=a;if(t.to_account===acct)e+=a;return s+e;
  },0);
  
  /* Build rows with deposit/withdrawal columns */
  const rows=acctTxns.map(t=>{
    const a=parseFloat(t.amount)||0;
    let deposit=0,withdrawal=0;
    if(t.type==='Income'||t.type==='UA Received'){if(t.to_account===acct)deposit=a;}
    else if(t.type==='Expense'||t.type==='UA Expense'){if(t.from_account===acct)withdrawal=a;}
    else{if(t.to_account===acct)deposit=a;if(t.from_account===acct)withdrawal=a;}
    return{...t,deposit,withdrawal};
  });
  
  const totDeposit=rows.reduce((s,r)=>s+r.deposit,0);
  const totWithdrawal=rows.reduce((s,r)=>s+r.withdrawal,0);
  const closeBal=openBal+totDeposit-totWithdrawal;
  
  const periodLabel=(()=>{
    if(period==='this_month')return`${MONTHS[month]} ${year}`;
    if(period==='last_month')return`${MONTHS[month===0?11:month-1]} ${month===0?year-1:year}`;
    if(period==='this_year')return`FY ${year}`;
    if(period==='custom'&&customStart&&customEnd)return`${customStart} to ${customEnd}`;
    return'All Time';
  })();
  
  const handlePrint=()=>{
    const html=`<!DOCTYPE html><html><head><title>${acct} Statement - ${periodLabel}</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:20px;}h1{font-size:14px;margin-bottom:4px;}h2{font-size:11px;font-weight:400;color:#666;margin-bottom:16px;}table{width:100%;border-collapse:collapse;margin-top:12px;}th,td{border:1px solid #ccc;padding:6px 8px;text-align:left;}th{background:#f5f5f5;font-weight:600;font-size:9px;text-transform:uppercase;}td{font-size:10px;}.amt{text-align:right;font-variant-numeric:tabular-nums;}.summary{margin-top:16px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}.summary div{border:1px solid #ccc;padding:8px;background:#fafafa;}.summary .label{font-size:8px;text-transform:uppercase;color:#666;margin-bottom:3px;}.summary .value{font-size:12px;font-weight:700;}.desc{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}</style></head><body><h1>${acct} — Bank Ledger</h1><h2>${periodLabel}</h2><div class="summary"><div><div class="label">Opening Balance</div><div class="value">₹${fmtAmt(Math.abs(openBal))}</div></div><div><div class="label">Total Deposits</div><div class="value">₹${fmtAmt(totDeposit)}</div></div><div><div class="label">Total Withdrawals</div><div class="value">₹${fmtAmt(totWithdrawal)}</div></div></div><table><thead><tr><th style="width:20%;">Date</th><th style="width:40%;">Description</th><th style="width:20%;">Deposit (₹)</th><th style="width:20%;">Withdrawal (₹)</th></tr></thead><tbody><tr style="background:#fff8e1;"><td colspan="2" style="font-weight:600;">OPENING BALANCE</td><td class="amt">${openBal>=0?fmtAmt(openBal):'—'}</td><td class="amt">${openBal<0?fmtAmt(Math.abs(openBal)):'—'}</td></tr>${rows.map(t=>`<tr><td>${fmtDate(t.created_at)}</td><td class="desc">${t.particulars||t.category||t.type}</td><td class="amt">${t.deposit>0?fmtAmt(t.deposit):'—'}</td><td class="amt">${t.withdrawal>0?fmtAmt(t.withdrawal):'—'}</td></tr>`).join('')}<tr style="background:#e8f5e9;font-weight:600;"><td colspan="2">CLOSING BALANCE</td><td class="amt">${closeBal>=0?fmtAmt(closeBal):'—'}</td><td class="amt">${closeBal<0?fmtAmt(Math.abs(closeBal)):'—'}</td></tr></tbody></table><div style="margin-top:16px;font-size:9px;color:#999;">Generated ${new Date().toLocaleString('en-IN')} · JB Finance v1.9.2</div></body></html>`;
    const w=window.open('','_blank');w.document.write(html);w.document.close();w.print();
  };
  
  const cS=a=>({display:'inline-block',border:a?'1px solid var(--green)':'1px solid var(--border2)',borderRadius:14,padding:'6px 12px',fontFamily:'var(--mono)',fontSize:11,color:a?'var(--green)':'var(--text2)',background:a?'var(--green-bg)':'var(--bg2)',cursor:'pointer',userSelect:'none',margin:'0 4px 4px 0'});

  // Build rows with running balance
  let runBal=openBal;
  const rowsWithBal=rows.map(r=>{runBal+=r.deposit-r.withdrawal;return{...r,runBal};});

  return(<div className="fade-in">
    <p className="sec-label">Select Account</p>
    <div style={{display:'flex',flexWrap:'wrap',padding:'0 16px 8px',gap:6}}>
      {[...allBanksWithCash,...allCC].map(a=><div key={a} style={cS(acct===a)} onClick={()=>setAcct(a)}>{a==='Cash'?'💵 Cash':a}</div>)}
    </div>
    <p className="sec-label">Period</p><div style={{display:'flex',flexWrap:'wrap',padding:'0 16px 8px',gap:6}}>{[['this_month','This Month'],['last_month','Last Month'],['this_year','This Year'],['custom','Custom'],['all','All Time']].map(([k,l])=><div key={k} style={cS(period===k)} onClick={()=>setPeriod(k)}>{l}</div>)}</div>
    {period==='custom'&&<div style={{padding:'0 16px 8px',display:'flex',gap:8,alignItems:'center'}}><input type="date" value={customStart} onChange={e=>setCustomStart(e.target.value)} style={{flex:1,background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'8px 10px',fontFamily:'var(--mono)',fontSize:11,color:'var(--text)'}}/><span style={{color:'var(--text3)',fontSize:11}}>to</span><input type="date" value={customEnd} onChange={e=>setCustomEnd(e.target.value)} style={{flex:1,background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'8px 10px',fontFamily:'var(--mono)',fontSize:11,color:'var(--text)'}}/></div>}

    {/* Summary card */}
    <div style={{margin:'8px 16px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'12px 14px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',letterSpacing:'0.08em',textTransform:'uppercase'}}>{acct} — {periodLabel}</div>
        <button onClick={handlePrint} style={{background:'var(--blue)',color:'#fff',border:'none',borderRadius:6,padding:'5px 12px',fontFamily:'var(--mono)',fontSize:10,fontWeight:600,cursor:'pointer'}}>🖨 Print</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
        <div><div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',marginBottom:3}}>Opening</div><div style={{fontSize:13,fontWeight:600,fontFamily:'var(--mono)',color:openBal<0?'var(--red)':'var(--text)'}}>{openBal<0?'−':''}{fmtAmt(Math.abs(openBal))}</div></div>
        <div onClick={()=>{if(totDeposit>0&&setTab&&setTxnFilter){const dateRange=period==='this_month'||period==='last_month'||period==='this_year'?period:(period==='custom'&&customStart&&customEnd?{start:customStart,end:customEnd}:'this_month');setTxnFilter({account:acct,type:'Income',dateRange,category:null});setTab('txns');}}} style={{cursor:totDeposit>0?'pointer':'default'}}><div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',marginBottom:3}}>{isCash?'Cash In':'Deposits'}</div><div style={{fontSize:13,fontWeight:600,fontFamily:'var(--mono)',color:totDeposit>0?'var(--green)':'var(--text3)'}}>{totDeposit>0?'+'+fmtAmt(totDeposit):'—'}</div></div>
        <div onClick={()=>{if(totWithdrawal>0&&setTab&&setTxnFilter){const dateRange=period==='this_month'||period==='last_month'||period==='this_year'?period:(period==='custom'&&customStart&&customEnd?{start:customStart,end:customEnd}:'this_month');setTxnFilter({account:acct,type:'Expense',dateRange,category:null});setTab('txns');}}} style={{cursor:totWithdrawal>0?'pointer':'default'}}><div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',marginBottom:3}}>{isCash?'Cash Out':'Withdrawals'}</div><div style={{fontSize:13,fontWeight:600,fontFamily:'var(--mono)',color:totWithdrawal>0?'var(--red)':'var(--text3)'}}>{totWithdrawal>0?'−'+fmtAmt(totWithdrawal):'—'}</div></div>
      </div>
      <div style={{borderTop:'1px solid var(--border)',marginTop:8,paddingTop:8}}><div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',marginBottom:3}}>Closing Balance</div><div style={{fontSize:16,fontWeight:700,fontFamily:'var(--mono)',color:closeBal<0?'var(--red)':'var(--green)'}}>{closeBal<0?'−':''}{fmtAmt(Math.abs(closeBal))}</div></div>
    </div>

    {rows.length===0&&<div className="empty">No transactions for this account in this period.</div>}
    {rows.length>0&&<div style={{margin:'0 16px 24px',border:'1px solid var(--border)',borderRadius:10,overflow:'hidden'}}>
      {/* Column headers — 4 cols for Cash (adds Balance), 3 for banks */}
      <div style={{display:'grid',gridTemplateColumns:isCash?'2fr 1fr 1fr 1fr':'2fr 1fr 1fr',gap:6,padding:'8px 12px',background:'var(--bg3)',borderBottom:'1px solid var(--border)'}}>
        <span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',letterSpacing:'0.06em'}}>Description</span>
        <span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',textAlign:'right'}}>{isCash?'In':'Deposit'}</span>
        <span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',textAlign:'right'}}>{isCash?'Out':'Withdrawal'}</span>
        {isCash&&<span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',textAlign:'right'}}>Balance</span>}
      </div>
      {/* Opening balance row */}
      <div style={{display:'grid',gridTemplateColumns:isCash?'2fr 1fr 1fr 1fr':'2fr 1fr 1fr',gap:6,padding:'10px 12px',borderBottom:'1px solid var(--border)',background:'var(--amber-bg)'}}>
        <div style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:'var(--text2)'}}>OPENING BALANCE</div>
        <div style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:12,fontWeight:700,color:openBal>=0?'var(--green)':'var(--text3)'}}>{openBal>=0?fmtAmt(openBal):'—'}</div>
        <div style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:12,fontWeight:700,color:openBal<0?'var(--red)':'var(--text3)'}}>{openBal<0?fmtAmt(Math.abs(openBal)):'—'}</div>
        {isCash&&<div style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:12,fontWeight:700,color:'var(--text2)'}}>{fmtAmt(openBal)}</div>}
      </div>
      {/* Transaction rows */}
      {rowsWithBal.map((t,i)=>(
        <div key={t.id} style={{display:'grid',gridTemplateColumns:isCash?'2fr 1fr 1fr 1fr':'2fr 1fr 1fr',gap:6,padding:'10px 12px',borderBottom:'1px solid var(--border)',background:i%2===0?'var(--bg2)':'var(--bg)'}}>
          <div style={{minWidth:0}}>
            <div style={{fontSize:12,color:'var(--text)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{t.particulars||t.category||t.type}</div>
            <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:2}}>{fmtDate(t.created_at)}{t.category&&<span style={{marginLeft:6}}>{t.category}</span>}</div>
          </div>
          <div style={{textAlign:'right',flexShrink:0}}><div style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:600,color:t.deposit>0?'var(--green)':'var(--text3)'}}>{t.deposit>0?fmtAmt(t.deposit):'—'}</div></div>
          <div style={{textAlign:'right',flexShrink:0}}><div style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:600,color:t.withdrawal>0?'var(--red)':'var(--text3)'}}>{t.withdrawal>0?fmtAmt(t.withdrawal):'—'}</div></div>
          {isCash&&<div style={{textAlign:'right',flexShrink:0}}><div style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:t.runBal<0?'var(--red)':t.runBal===0?'var(--text3)':'var(--text)'}}>{t.runBal<0?'−':''}{fmtAmt(Math.abs(t.runBal))}</div></div>}
        </div>
      ))}
      {/* Closing balance row */}
      <div style={{display:'grid',gridTemplateColumns:isCash?'2fr 1fr 1fr 1fr':'2fr 1fr 1fr',gap:6,padding:'10px 12px',background:'var(--green-bg)',fontWeight:700}}>
        <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)'}}>CLOSING BALANCE</div>
        <div style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:13,color:closeBal>=0?'var(--green)':'var(--text3)'}}>{closeBal>=0?fmtAmt(closeBal):'—'}</div>
        <div style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:13,color:closeBal<0?'var(--red)':'var(--text3)'}}>{closeBal<0?fmtAmt(Math.abs(closeBal)):'—'}</div>
        {isCash&&<div style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:13,color:closeBal<0?'var(--red)':'var(--green)'}}>{closeBal<0?'−':''}{fmtAmt(Math.abs(closeBal))}</div>}
      </div>
    </div>}
  </div>);
}

/* ── CCBillScreen v2.0 ─────────────────────────────────────────
   Storage: jbf_cc_bills  → { [cc]: [ { billStart, billEnd, bankAmt, appAmt, diff, dueDate, reconciledAt, txnCount } ] }
   A bill is "paid" when a CC→Bank payment exists AFTER billEnd.
   Unbilled = spends AFTER the most recent saved billEnd (or last stmt date).
──────────────────────────────────────────────────────────────── */
function CCBillScreen({txns,customAccounts,setTab,setTxnFilter}){
  const ccAccounts=[...SEED_CC,...(customAccounts||[]).filter(a=>a.type==='cc').map(a=>a.name)];
  const today=new Date();const todayStr=today.toISOString().slice(0,10);

  /* ── Storage helpers: bills history array ── */
  const getBills=cc=>{try{const v=JSON.parse(localStorage.getItem('jbf_cc_bills')||'{}');return v[cc]||[];}catch{return[];}};
  const saveBills=(cc,arr)=>{try{const v=JSON.parse(localStorage.getItem('jbf_cc_bills')||'{}');v[cc]=arr;localStorage.setItem('jbf_cc_bills',JSON.stringify(v));}catch{}};
  const getStmtDay=cc=>{try{const v=JSON.parse(localStorage.getItem('jbf_cc_stmt_days')||'{}');return parseInt(v[cc]||'1');}catch{return 1;}};
  const saveStmtDay=(cc,day)=>{try{const v=JSON.parse(localStorage.getItem('jbf_cc_stmt_days')||'{}');v[cc]=day;localStorage.setItem('jbf_cc_stmt_days',JSON.stringify(v));}catch{}};

  /* ── Legacy migration: if old jbf_cc_reconciled exists, import it ── */
  React.useEffect(()=>{
    try{
      const old=JSON.parse(localStorage.getItem('jbf_cc_reconciled')||'{}');
      const newStore=JSON.parse(localStorage.getItem('jbf_cc_bills')||'{}');
      Object.entries(old).forEach(([cc,r])=>{
        if(!newStore[cc]&&r&&r.billEnd){
          newStore[cc]=[{billStart:r.billStart||r.billEnd,billEnd:r.billEnd,bankAmt:r.bankAmt||0,appAmt:r.appAmt||0,diff:r.diff||0,dueDate:'',reconciledAt:r.reconciledAt||'',txnCount:r.txnCount||0}];
          localStorage.setItem('jbf_cc_bills',JSON.stringify(newStore));
        }
      });
    }catch{}
  },[]);

  const [selCC,setSelCC]=useState(ccAccounts[0]||'');
  const [ccTab,setCCTab]=useState('unbilled');
  const [stmtDayStr,setStmtDayStr]=useState(()=>String(getStmtDay(ccAccounts[0]||'')));
  const [stmtAmt,setStmtAmt]=useState('');
  const [dueDate,setDueDate]=useState('');
  const [reconSaved,setReconSaved]=useState(false);
  const stmtDay=Math.max(1,Math.min(28,parseInt(stmtDayStr)||1));

  /* ── Derive bill period defaults from stmt day ── */
  const getLastStmtDate=()=>{const d=new Date(today.getFullYear(),today.getMonth(),stmtDay);if(d>today)return new Date(today.getFullYear(),today.getMonth()-1,stmtDay);return d;};
  const lastStmt=getLastStmtDate();
  const lastStmtStr=lastStmt.toISOString().slice(0,10);
  const nextStmt=new Date(lastStmt.getFullYear(),lastStmt.getMonth()+1,stmtDay);
  const stmtGenerated=lastStmt.getMonth()===today.getMonth()&&lastStmt.getFullYear()===today.getFullYear();
  const prevBillStart=new Date(lastStmt.getFullYear(),lastStmt.getMonth()-1,stmtDay);
  const prevBillStartStr=prevBillStart.toISOString().slice(0,10);

  /* bills = saved history for selCC; latestBill = most recent saved bill */
  const [bills,setBillsState]=useState(()=>getBills(ccAccounts[0]||''));
  const latestBill=bills.length>0?bills[bills.length-1]:null;

  /* Bill period for the NEW bill being reconciled = starts from last saved billEnd */
  const defaultBillStart=latestBill?latestBill.billEnd:prevBillStartStr;
  const defaultBillEnd=latestBill
    ?(()=>{const le=new Date(latestBill.billEnd);return new Date(le.getFullYear(),le.getMonth()+1,stmtDay).toISOString().slice(0,10);})()
    :lastStmtStr;

  const [billStart,setBillStart]=useState(defaultBillStart);
  const [billEnd,setBillEnd]=useState(defaultBillEnd);

  /* Refresh state when CC changes */
  const handleSelCC=cc=>{
    setSelCC(cc);
    setStmtDayStr(String(getStmtDay(cc)));
    setStmtAmt('');setDueDate('');setReconSaved(false);
    const b=getBills(cc);
    setBillsState(b);
    const lb=b.length>0?b[b.length-1]:null;
    const sd=getStmtDay(cc);
    const gs=()=>{const d=new Date(today.getFullYear(),today.getMonth(),sd);if(d>today)return new Date(today.getFullYear(),today.getMonth()-1,sd);return d;};
    const ls=gs();
    if(lb){
      const le=new Date(lb.billEnd);
      setBillStart(lb.billEnd);
      setBillEnd(new Date(le.getFullYear(),le.getMonth()+1,sd).toISOString().slice(0,10));
    } else {
      const pb=new Date(ls.getFullYear(),ls.getMonth()-1,sd);
      setBillStart(pb.toISOString().slice(0,10));
      setBillEnd(ls.toISOString().slice(0,10));
    }
  };
  const handleStmtDaySave=()=>saveStmtDay(selCC,stmtDay);

  /* ── CC spends ── */
  const ccSpends=txns.filter(t=>t.status!=='voided'&&t.from_account===selCC&&(t.type==='Expense'||t.type==='UA Expense'));

  /* ── UNBILLED: spends AFTER latest saved bill's end (locked) ── */
  const unbilledFrom=latestBill?latestBill.billEnd:lastStmtStr;
  const unbilled=ccSpends.filter(t=>t.created_at.slice(0,10)>unbilledFrom);
  const unbilledTotal=unbilled.reduce((s,t)=>s+(parseFloat(t.amount)||0),0);

  /* ── BILLED (new period being reconciled) ── */
  const billedTxns=ccSpends.filter(t=>{const d=t.created_at.slice(0,10);return d>billStart&&d<=billEnd;});
  const billedTotal=billedTxns.reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  const sa=parseFloat(stmtAmt)||0;const diff=sa-billedTotal;const hasStmt=stmtAmt!==''&&sa>0;

  /* ── Is the latest saved bill already paid? ──
     Paid = a CC→Bank or Bank→CC payment exists dated AFTER the bill's billEnd */
  const latestBillPaid=latestBill?(()=>{
    const payAfter=txns.filter(t=>
      t.status!=='voided'&&
      (t.type==='CC→Bank'||t.type==='Bank→CC'||t.type==='Bank→Bank')&&
      (t.from_account===selCC||t.to_account===selCC)&&
      t.created_at.slice(0,10)>latestBill.billEnd
    );
    return payAfter.length>0;
  })():false;

  /* ── Save new reconciliation ── */
  const handleSaveRecon=()=>{
    if(!hasStmt)return;
    const entry={billStart,billEnd,bankAmt:sa,appAmt:billedTotal,diff,dueDate,reconciledAt:new Date().toISOString(),txnCount:billedTxns.length};
    const updated=[...bills,entry];
    saveBills(selCC,updated);
    setBillsState(updated);
    /* Also save to legacy key so dashboard still works */
    try{const v=JSON.parse(localStorage.getItem('jbf_cc_reconciled')||'{}');v[selCC]={billStart,billEnd,bankAmt:sa,appAmt:billedTotal,diff,reconciledAt:entry.reconciledAt,txnCount:billedTxns.length};localStorage.setItem('jbf_cc_reconciled',JSON.stringify(v));}catch{}
    setReconSaved(true);
    setStmtAmt('');setDueDate('');
    /* Advance period for next bill */
    const le=new Date(billEnd);
    setBillStart(billEnd);
    setBillEnd(new Date(le.getFullYear(),le.getMonth()+1,stmtDay).toISOString().slice(0,10));
  };

  const iS={background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',width:'100%'};
  const tabSel=active=>({flex:1,padding:'9px 0',fontFamily:'var(--mono)',fontSize:11,fontWeight:active?700:400,letterSpacing:'0.06em',textTransform:'uppercase',border:'none',borderBottom:active?'2px solid var(--green)':'2px solid transparent',background:'none',color:active?'var(--green)':'var(--text3)',cursor:'pointer'});
  const ord=n=>n===1?'st':n===2?'nd':n===3?'rd':'th';

  return(<div className="fade-in">
    {/* CC Selector */}
    <p className="sec-label">Credit Card</p>
    <div style={{padding:'0 16px 4px'}}><select value={selCC} onChange={e=>handleSelCC(e.target.value)} style={iS}>{ccAccounts.map(a=><option key={a}>{a}</option>)}</select></div>

    {/* Statement Day */}
    <div style={{margin:'10px 16px 0',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'12px 14px',display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
      <div style={{flex:1}}>
        <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',textTransform:'uppercase',marginBottom:4}}>Statement Generates on (day of month)</div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <input type="number" min="1" max="28" value={stmtDayStr} onChange={e=>setStmtDayStr(e.target.value)} onBlur={handleStmtDaySave} style={{...iS,width:70,textAlign:'center',fontSize:18,fontWeight:700}}/>
          <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',lineHeight:1.5}}>
            Last stmt: <span style={{color:'var(--text2)'}}>{fmtDate(lastStmt)}</span><br/>
            Next stmt: <span style={{color:'var(--amber)'}}>{fmtDate(nextStmt)}</span>
          </div>
        </div>
      </div>
      <div style={{background:stmtGenerated?'var(--green-bg)':'var(--amber-bg)',border:'1px solid '+(stmtGenerated?'var(--green)':'var(--amber)'),borderRadius:8,padding:'6px 12px',fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:stmtGenerated?'var(--green)':'var(--amber)',whiteSpace:'nowrap'}}>
        {stmtGenerated?'✓ Stmt Generated':'⏳ Not Yet'}
      </div>
    </div>

    {/* Latest saved bill banner */}
    {latestBill&&<div style={{margin:'8px 16px 0',background:latestBillPaid?'var(--green-bg)':'var(--red-bg)',border:'1px solid '+(latestBillPaid?'var(--green)':'var(--red)'),borderRadius:8,padding:'8px 12px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div>
        <div style={{fontFamily:'var(--mono)',fontSize:9,color:latestBillPaid?'var(--green)':'var(--red)',textTransform:'uppercase',letterSpacing:'0.08em'}}>{latestBillPaid?'✓ Bill Paid':'⚠ Bill Due'}</div>
        <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)',marginTop:2}}>{fmtDate(latestBill.billStart)} → {fmtDate(latestBill.billEnd)}</div>
        {latestBill.dueDate&&<div style={{fontFamily:'var(--mono)',fontSize:10,color:latestBillPaid?'var(--text3)':'var(--red)',marginTop:1}}>Due: {fmtDate(latestBill.dueDate)}</div>}
      </div>
      <div style={{textAlign:'right'}}>
        <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',textTransform:'uppercase'}}>Bill Amt</div>
        <div style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:700,color:latestBillPaid?'var(--green)':'var(--red)'}}>{fmtAmt(latestBill.bankAmt)}</div>
      </div>
    </div>}

    {/* Tab bar */}
    <div style={{display:'flex',borderBottom:'1px solid var(--border)',marginTop:12,padding:'0 16px'}}>
      <button style={tabSel(ccTab==='unbilled')} onClick={()=>setCCTab('unbilled')}>Unbilled{unbilledTotal>0?` · ${fmtAmt(unbilledTotal)}`:''}</button>
      <button style={tabSel(ccTab==='bills')} onClick={()=>setCCTab('bills')}>Bills{bills.length>0?` · ${bills.length}`:''}</button>
      <button style={tabSel(ccTab==='reconcile')} onClick={()=>setCCTab('reconcile')}>Reconcile{stmtGenerated?'':' (not yet)'}</button>
    </div>

    {/* ── UNBILLED TAB ── */}
    {ccTab==='unbilled'&&(<div>
      <div style={{margin:'12px 16px 0',background:'var(--bg2)',border:'1px solid var(--amber)',borderRadius:10,padding:'14px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
          <div onClick={()=>{if(unbilledTotal>0&&setTab&&setTxnFilter){setTxnFilter({account:selCC,type:null,dateRange:{start:unbilledFrom,end:todayStr},category:null});setTab('txns');}}} style={{cursor:unbilledTotal>0?'pointer':'default'}}>
            <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--amber)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4}}>Current Cycle · Unbilled Spends</div>
            <div style={{fontFamily:'var(--mono)',fontSize:24,fontWeight:800,color:'var(--amber)'}}>{fmtAmt(unbilledTotal)}</div>
          </div>
        </div>
        <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)'}}>
          Since {fmtDate(unbilledFrom)} · {unbilled.length} txns · Next stmt: {fmtDate(nextStmt)}
          {latestBill&&<span style={{color:'var(--green)',marginLeft:6}}>· From last reconciled date</span>}
        </div>
      </div>
      {unbilled.length>0
        ?<div style={{margin:'12px 16px 24px',border:'1px solid var(--border)',borderRadius:10,overflow:'hidden'}}>
          <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:8,padding:'8px 12px',background:'var(--bg3)',borderBottom:'1px solid var(--border)'}}><span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase'}}>Description</span><span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase'}}>Category</span><span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',textAlign:'right'}}>Spend</span></div>
          {[...unbilled].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).map((t,i)=>(
            <div key={t.id} style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:8,padding:'10px 12px',borderBottom:'1px solid var(--border)',background:i%2===0?'var(--bg2)':'var(--bg)'}}>
              <div style={{minWidth:0}}><div style={{fontSize:12,color:'var(--text)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{t.particulars||t.category}</div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:2}}>{fmtDate(t.created_at)}</div></div>
              <div><div style={{fontSize:11,color:'var(--text2)',fontFamily:'var(--mono)'}}>{t.category}</div></div>
              <div style={{textAlign:'right'}}><div style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:600,color:'var(--amber)'}}>−{fmtAmt(t.amount)}</div></div>
            </div>
          ))}
          <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:8,padding:'10px 12px',background:'var(--amber-bg)',fontWeight:700}}><div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)'}}>TOTAL UNBILLED</div><div/><div style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:13,color:'var(--amber)'}}>−{fmtAmt(unbilledTotal)}</div></div>
        </div>
        :<div className="empty">No unbilled charges since {fmtDate(unbilledFrom)}. 🎉</div>}
    </div>)}

    {/* ── BILLS TAB — history of reconciled bills ── */}
    {ccTab==='bills'&&(<div>
      {bills.length===0&&<div className="empty">No reconciled bills yet for {selCC}.<br/>Use the Reconcile tab to add your first bill.</div>}
      {[...bills].reverse().map((b,i)=>{
        const isPaid=txns.filter(t=>
          t.status!=='voided'&&
          (t.type==='CC→Bank'||t.type==='Bank→CC'||t.type==='Bank→Bank')&&
          (t.from_account===selCC||t.to_account===selCC)&&
          t.created_at.slice(0,10)>b.billEnd
        ).length>0;
        const billTxns=txns.filter(t=>t.status!=='voided'&&t.from_account===selCC&&(t.type==='Expense'||t.type==='UA Expense')&&t.created_at.slice(0,10)>b.billStart&&t.created_at.slice(0,10)<=b.billEnd);
        return(<div key={i} style={{margin:'12px 16px',border:'1px solid '+(isPaid?'var(--border)':'var(--red)'),borderRadius:10,overflow:'hidden'}}>
          {/* Bill header */}
          <div style={{padding:'10px 14px',background:isPaid?'var(--bg3)':'var(--red-bg)',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontFamily:'var(--mono)',fontSize:9,color:isPaid?'var(--green)':'var(--red)',textTransform:'uppercase',letterSpacing:'0.08em'}}>{isPaid?'✓ Paid':'⚠ Outstanding'}</div>
              <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)',marginTop:2}}>{fmtDate(b.billStart)} → {fmtDate(b.billEnd)}</div>
              {b.dueDate&&<div style={{fontFamily:'var(--mono)',fontSize:10,color:isPaid?'var(--text3)':'var(--red)',marginTop:1}}>Due: {fmtDate(b.dueDate)}</div>}
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',textTransform:'uppercase',marginBottom:2}}>Bill Amount</div>
              <div style={{fontFamily:'var(--mono)',fontSize:16,fontWeight:700,color:isPaid?'var(--text)':'var(--red)'}}>{fmtAmt(b.bankAmt)}</div>
              {b.diff!==0&&<div style={{fontFamily:'var(--mono)',fontSize:9,color:b.diff>0?'var(--red)':'var(--green)'}}>{b.diff>0?'▲':'▼'} {fmtAmt(Math.abs(b.diff))} diff</div>}
            </div>
          </div>
          {/* Transactions in this bill */}
          {billTxns.length>0&&<>
            <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:8,padding:'6px 12px',background:'var(--bg3)',borderBottom:'1px solid var(--border)'}}><span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase'}}>Description</span><span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase'}}>Category</span><span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',textAlign:'right'}}>Spend</span></div>
            {[...billTxns].sort((a,bT)=>new Date(bT.created_at)-new Date(a.created_at)).map((t,ti)=>(
              <div key={t.id} style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:8,padding:'9px 12px',borderBottom:'1px solid var(--border)',background:ti%2===0?'var(--bg2)':'var(--bg)'}}>
                <div style={{minWidth:0}}><div style={{fontSize:11,color:'var(--text)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{t.particulars||t.category}</div><div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:1}}>{fmtDate(t.created_at)}</div></div>
                <div><div style={{fontSize:10,color:'var(--text2)',fontFamily:'var(--mono)'}}>{t.category}</div></div>
                <div style={{textAlign:'right'}}><div style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:'var(--red)'}}>−{fmtAmt(t.amount)}</div></div>
              </div>
            ))}
            <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:8,padding:'9px 12px',background:'var(--red-bg)',fontWeight:700}}><div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text2)'}}>APP TRACKED</div><div/><div style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:12,color:'var(--red)'}}>−{fmtAmt(b.appAmt)}</div></div>
          </>}
        </div>);
      })}
    </div>)}

    {/* ── RECONCILE TAB ── */}
    {ccTab==='reconcile'&&(<div>
      {!stmtGenerated&&<div style={{margin:'12px 16px',background:'var(--amber-bg)',border:'1px solid var(--amber)',borderRadius:10,padding:'12px 14px',fontFamily:'var(--mono)',fontSize:12,color:'var(--amber)'}}>
        ⏳ Statement not yet generated for this cycle. Generates on the <strong>{stmtDay}{ord(stmtDay)}</strong> of each month.
      </div>}

      <p className="sec-label" style={{marginTop:8}}>Bill Period</p>
      <div style={{padding:'0 16px',display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
        <input type="date" value={billStart} onChange={e=>{setBillStart(e.target.value);setReconSaved(false);}} style={{...iS,flex:1,minWidth:130}}/>
        <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>to</span>
        <input type="date" value={billEnd} onChange={e=>{setBillEnd(e.target.value);setReconSaved(false);}} style={{...iS,flex:1,minWidth:130}}/>
      </div>

      <p className="sec-label" style={{marginTop:8}}>Payment Due Date</p>
      <div style={{padding:'0 16px'}}>
        <input type="date" value={dueDate} onChange={e=>setDueDate(e.target.value)} style={iS} placeholder="Optional — when bill is due"/>
      </div>

      <p className="sec-label" style={{marginTop:8}}>Bank Statement Amount (₹)</p>
      <div style={{padding:'0 16px'}}><input type="number" inputMode="decimal" placeholder="Enter total bill amount from bank" value={stmtAmt} onChange={e=>{setStmtAmt(e.target.value);setReconSaved(false);}} style={{...iS,fontSize:16,fontWeight:600}}/></div>

      {/* Reconciliation summary */}
      <div style={{margin:'16px 16px 0',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,overflow:'hidden'}}>
        <div style={{padding:'10px 14px',background:'var(--bg3)',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontFamily:'var(--mono)',fontSize:10,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em'}}>{selCC} · {billedTxns.length} txns in period</span>
          {billedTxns.length>0&&<button onClick={()=>{const html=`<!DOCTYPE html><html><head><title>${selCC} Bill Statement</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:20px;}h1{font-size:14px;margin-bottom:4px;}h2{font-size:11px;font-weight:400;color:#666;margin-bottom:16px;}table{width:100%;border-collapse:collapse;margin-top:12px;}th,td{border:1px solid #ccc;padding:6px 8px;text-align:left;}th{background:#f5f5f5;font-weight:600;font-size:9px;text-transform:uppercase;}td{font-size:10px;}.amt{text-align:right;}.desc{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}</style></head><body><h1>${selCC} — Bill Statement</h1><h2>${fmtDate(billStart)} to ${fmtDate(billEnd)}${dueDate?' · Due: '+fmtDate(dueDate):''}</h2><table><thead><tr><th>Date</th><th>Description</th><th>Category</th><th class="amt">Spend (₹)</th></tr></thead><tbody>${[...billedTxns].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at)).map(t=>`<tr><td>${fmtDate(t.created_at)}</td><td class="desc">${t.particulars||t.category}</td><td>${t.category}</td><td class="amt">${fmtAmt(t.amount)}</td></tr>`).join('')}<tr style="background:#ffebee;font-weight:600;"><td colspan="3">TOTAL BILL</td><td class="amt">₹${fmtAmt(billedTotal)}</td></tr></tbody></table></body></html>`;const w=window.open('','_blank');w.document.write(html);w.document.close();w.print();}} style={{background:'var(--blue)',color:'#fff',border:'none',borderRadius:6,padding:'4px 10px',fontFamily:'var(--mono)',fontSize:9,fontWeight:600,cursor:'pointer'}}>🖨 Print</button>}
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 14px',borderBottom:'1px solid var(--border)'}}><span style={{fontSize:13,color:'var(--text2)'}}>App Tracked Spends</span><span style={{fontFamily:'var(--mono)',fontSize:16,fontWeight:700,color:'var(--text)'}}>{fmtAmt(billedTotal)}</span></div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 14px',borderBottom:'1px solid var(--border)'}}><span style={{fontSize:13,color:'var(--text2)'}}>Bank Statement Amount</span><span style={{fontFamily:'var(--mono)',fontSize:16,fontWeight:700,color:hasStmt?'var(--text)':'var(--text3)'}}>{hasStmt?fmtAmt(sa):'—'}</span></div>
        {hasStmt&&<div style={{padding:'14px',background:diff===0?'var(--green-bg)':diff>0?'var(--red-bg)':'var(--green-bg)',borderTop:'2px solid '+(diff===0?'var(--green)':diff>0?'var(--red)':'var(--green)')}}><div style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:diff===0?'var(--green)':diff>0?'var(--red)':'var(--green)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:4}}>{diff===0?'✓ Perfectly Matched!':diff>0?'Unaccounted Bank Charges':'Cashbacks / Refunds'}</div><div style={{fontFamily:'var(--mono)',fontSize:22,fontWeight:800,color:diff===0?'var(--green)':diff>0?'var(--red)':'var(--green)'}}>{diff===0?fmtAmt(0):diff>0?'+'+fmtAmt(diff):'−'+fmtAmt(Math.abs(diff))}</div></div>}
        {!hasStmt&&<div style={{padding:'14px',fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',textAlign:'center'}}>Enter bank statement amount above to see reconciliation.</div>}
      </div>

      {/* Save button */}
      {hasStmt&&<div style={{padding:'12px 16px 0'}}>
        {reconSaved
          ?<div style={{background:'var(--green-bg)',border:'1px solid var(--green)',borderRadius:10,padding:'12px 14px',fontFamily:'var(--mono)',fontSize:12,color:'var(--green)',textAlign:'center',fontWeight:600}}>
            ✓ Bill Saved · Visible in Bills tab · Next period loaded
          </div>
          :<button onClick={handleSaveRecon} style={{width:'100%',background:'var(--green)',color:'#000',fontFamily:'var(--mono)',fontSize:13,fontWeight:700,border:'none',borderRadius:10,padding:'13px',cursor:'pointer',letterSpacing:'0.05em'}}>
            ✓ Save Bill &amp; Reconciliation
          </button>}
      </div>}

      {/* Bill period transactions preview */}
      {billedTxns.length>0&&<div style={{margin:'16px 16px 24px',border:'1px solid var(--border)',borderRadius:10,overflow:'hidden'}}>
