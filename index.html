/* ── STREAK ── */
function getStreak(){
  const today=new Date().toISOString().slice(0,10);
  const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
  const last=localStorage.getItem('jbf_streak_date')||'';
  const cnt=parseInt(localStorage.getItem('jbf_streak_count')||'0');
  const next=last===today?cnt:last===yesterday?cnt+1:1;
  if(last!==today){localStorage.setItem('jbf_streak_date',today);localStorage.setItem('jbf_streak_count',String(next));}
  return next;
}

/* ── PIN LOCK SCREEN ── */
function PinLockScreen({onUnlock}){
  const [digits,setDigits]   = useState([]);
  const [shake,setShake]     = useState(false);
  const [setupMode,setSetupMode] = useState(!localStorage.getItem('jbf_pin_hash'));
  const [setupStep,setSetupStep] = useState(1);
  const [firstPin,setFirstPin]   = useState([]);
  const [msg,setMsg]             = useState('');
  const MAX=4;

  const hashPin = async pin => {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  };

  const addDigit = async d => {
    const next=[...digits,d];
    setDigits(next);
    if(next.length<MAX) return;
    const pin=next.join('');

    if(setupMode){
      if(setupStep===1){
        setFirstPin(next); setDigits([]); setSetupStep(2); setMsg('Confirm your PIN');
      } else {
        if(pin===firstPin.join('')){
          const h=await hashPin(pin);
          localStorage.setItem('jbf_pin_hash',h);
          setMsg('✓ PIN set!');
          setTimeout(()=>onUnlock(),400);
        } else {
          setMsg('❌ PINs did not match — try again');
          setShake(true);setTimeout(()=>setShake(false),500);
          setDigits([]);setSetupStep(1);setFirstPin([]);
        }
      }
    } else {
      const h=await hashPin(pin);
      if(h===localStorage.getItem('jbf_pin_hash')){
        onUnlock();
      } else {
        setMsg('❌ Wrong PIN');
        setShake(true);setTimeout(()=>setShake(false),500);
        setDigits([]);
      }
    }
  };

  const del=()=>setDigits(p=>p.slice(0,-1));
  const KEYS=[1,2,3,4,5,6,7,8,9,null,0,'⌫'];
  const title = setupMode ? (setupStep===1 ? 'Set a 4-digit PIN' : 'Confirm PIN') : 'Enter PIN';

  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100dvh',background:'var(--bg)',padding:24,userSelect:'none'}}>
      <div style={{textAlign:'center',marginBottom:28}}>
        <div style={{fontFamily:'var(--mono)',fontSize:26,fontWeight:700,color:'var(--green)',letterSpacing:'-1px'}}>JB Finance</div>
        <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginTop:3,letterSpacing:'0.12em',textTransform:'uppercase'}}>{title}</div>
      </div>
      <div style={{display:'flex',gap:16,marginBottom:24,animation:shake?'pinShake 0.4s ease':'none'}}>
        {Array.from({length:MAX}).map((_,i)=>(
          <div key={i} style={{width:14,height:14,borderRadius:'50%',background:i<digits.length?'var(--green)':'transparent',border:'2px solid',borderColor:i<digits.length?'var(--green)':'var(--border2)',transition:'all 0.15s'}}/>
        ))}
      </div>
      {msg&&<div style={{fontFamily:'var(--mono)',fontSize:11,color:msg.startsWith('✓')?'var(--green)':'var(--amber)',marginBottom:14,letterSpacing:'0.04em'}}>{msg}</div>}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,72px)',gap:12}}>
        {KEYS.map((k,i)=>(
          k===null ? <div key={i}/> : <button key={i} onClick={()=>k==='⌫'?del():digits.length<MAX&&addDigit(k)} style={{width:72,height:72,borderRadius:'50%',background:k==='⌫'?'var(--bg2)':'var(--bg3)',border:'1px solid var(--border)',color:'var(--text)',fontFamily:'var(--mono)',fontSize:k==='⌫'?20:24,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',WebkitTapHighlightColor:'transparent',transition:'background 0.1s'}}>{k}</button>
        ))}
      </div>
      {!setupMode&&<button onClick={()=>{if(confirm('Forgot PIN? This will remove the PIN lock. You will still need your Supabase password.')){localStorage.removeItem('jbf_pin_hash');setSetupMode(true);setSetupStep(1);setDigits([]);setMsg('');}}} style={{marginTop:28,background:'none',border:'none',color:'var(--text3)',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer',textDecoration:'underline'}}>Forgot PIN</button>}

    </div>
  );
}

          <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',marginTop:4,letterSpacing:'0.12em',textTransform:'uppercase'}}>CFO Operating System · v1.9.1</div>
        </div>
        <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:14,padding:24}}>
          <p style={{fontFamily:'var(--mono)',fontSize:10,letterSpacing:'0.12em',color:'var(--text3)',textTransform:'uppercase',marginBottom:16}}>Secure Login</p>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <input type="email" placeholder="Email address" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handle()} style={iS} autoComplete="email"/>
            <div style={{position:'relative'}}>
              <input type={showPass?'text':'password'} placeholder="Password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handle()} style={{...iS,paddingRight:44}} autoComplete="current-password"/>
              <button onClick={()=>setShowPass(s=>!s)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:13,fontFamily:'var(--mono)',padding:0}}>{showPass?'hide':'show'}</button>
            </div>
            {err&&<div style={{background:'var(--red-bg)',border:'1px solid var(--red)',borderRadius:8,padding:'8px 12px',fontFamily:'var(--mono)',fontSize:12,color:'var(--red)'}}>{err}</div>}
            <button onClick={handle} disabled={loading||!email.trim()||!pass} style={{background:loading||!email.trim()||!pass?'var(--bg3)':'var(--green)',border:'none',borderRadius:10,color:loading||!email.trim()||!pass?'var(--text3)':'#000',fontFamily:'var(--mono)',fontSize:14,fontWeight:700,padding:15,cursor:'pointer',letterSpacing:'0.04em',transition:'all 0.15s'}}>{loading?'Signing in…':'Sign In'}</button>
          </div>
        </div>
        <p style={{textAlign:'center',fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginTop:20,lineHeight:1.8}}>Personal CFO · Umiya Associates · Mumbai<br/>Data secured via Supabase RLS</p>
      </div>
    </div>
  );
}

/* ── APP COMPONENT ── */
function App() {
  const [tab,setTab]                         = useState('dash');
  const [txns,setTxns]                       = useState([]);
  const [investments,setInvestments]         = useState([]);
  const [opening,setOpening]                 = useState({});
  const [customAccounts,setCustomAccounts]   = useState([]);
  const [customCategories,setCustomCategories] = useState([]);
  const [budgets,setBudgets]                 = useState({});
  const [udhari,setUdhari]                   = useState([]);
  const [recurring,setRecurring]             = useState([]);
  const [checklist,setChecklist]             = useState([]);
  const [customSites,setCustomSites]         = useState([]);
  const [customTeam,setCustomTeam]           = useState([]);
  const [customSiteCats,setCustomSiteCats]   = useState([]);
  const [toast,setToast]                     = useState(null);
  const [menuOpen,setMenuOpen]               = useState(false);
  const [quickAdd,setQuickAdd]               = useState(false);
  const [loading,setLoading]                 = useState(true);
  const [globalSearch,setGlobalSearch]       = useState('');
  const [addPrefill,setAddPrefill]           = useState(null);
  const [theme,setTheme]                     = useState(()=>localStorage.getItem('jbf_theme')||'autumn');
  const [streak]                             = useState(()=>getStreak());

  /* Global Filter States for Cross-Component Routing */
  const [txnFilters, setTxnFilters]          = useState(null);
  const [stmtFilters, setStmtFilters]        = useState(null);

  const [session,setSession]   = useState(null);
  const [authLoading,setAuthLoading] = useState(true);
  const [pinUnlocked,setPinUnlocked] = useState(false);

  useEffect(()=>{
    db.auth.getSession().then(({data:{session}})=>{setSession(session);setAuthLoading(false);});
    const{data:{subscription}}=db.auth.onAuthStateChange((_,session)=>{setSession(session);});
    const onSwUpdate=()=>showToast('🔄 Update ready — reopen app to apply');
    window.addEventListener('jbf-sw-update',onSwUpdate);
    return()=>{subscription.unsubscribe();window.removeEventListener('jbf-sw-update',onSwUpdate);};
  },[]);

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null),2500); };

  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',theme);
    localStorage.setItem('jbf_theme',theme);
  },[theme]);

  const loadData = useCallback(async ()=>{
    setLoading(true);
    try {
      let allTxns=[],from=0,PAGE=500,done=false;
      const COLS='id,created_at,type,amount,category,from_account,to_account,particulars,tower,status,source,domain,site_name,site_user,party_name,user_id,it_section,correction_of';
      while(!done){
        const{data:page,error:txnErr}=await db.from('transactions').select(COLS).order('created_at',{ascending:false}).range(from,from+PAGE-1);
        if(txnErr){console.error('transactions fetch error:',txnErr.message);showToast('⚠ DB: '+txnErr.message);break;}
        if(!page||page.length===0){done=true;}
        else{allTxns=[...allTxns,...page];from+=PAGE;if(page.length<PAGE)done=true;}
      }
      setTxns(allTxns);
      try{const{data:inv}=await db.from('investments').select('*').order('created_at',{ascending:false});setInvestments(inv||[]);}catch(e){setInvestments([]);}
      try{const{data:ud}=await db.from('udhari').select('*').order('created_at',{ascending:false});setUdhari(ud||[]);}catch(e){setUdhari([]);}
      try{const{data:rec}=await db.from('recurring').select('*').order('due_day',{ascending:true});setRecurring(rec||[]);}catch(e){setRecurring([]);}
      try{const now=new Date();const{data:cl}=await db.from('checklist').select('*').eq('month',now.getMonth()+1).eq('year',now.getFullYear());setChecklist(cl||[]);}catch(e){setChecklist([]);}
      const{data:s}=await db.from('settings').select('*');
      if(s){
        const g=(k)=>s.find(r=>r.key===k);
        if(g('opening_balances')) try{setOpening(JSON.parse(g('opening_balances').value));}catch(e){}
        if(g('custom_accounts'))  try{setCustomAccounts(JSON.parse(g('custom_accounts').value));}catch(e){}
        if(g('custom_categories'))try{setCustomCategories(JSON.parse(g('custom_categories').value));}catch(e){}
        if(g('budgets'))          try{setBudgets(JSON.parse(g('budgets').value));}catch(e){}
        if(g('custom_sites'))     try{setCustomSites(JSON.parse(g('custom_sites').value));}catch(e){}
        if(g('custom_team'))      try{setCustomTeam(JSON.parse(g('custom_team').value));}catch(e){}
        if(g('custom_site_cats')) try{setCustomSiteCats(JSON.parse(g('custom_site_cats').value));}catch(e){}
        if(g('theme'))            { setTheme(g('theme').value); document.documentElement.setAttribute('data-theme',g('theme').value); localStorage.setItem('jbf_theme',g('theme').value); }
      }
    } catch(e){console.error('loadData error:',e);showToast('⚠ Load failed: '+e.message);}
    setLoading(false);
  },[]);

  useEffect(()=>{loadData();},[loadData]);
  /* ── DYNAMIC ACCOUNT LISTS ── */
  const activeCustomBanks = customAccounts.filter(a=>a.type==='bank'&&!a.archived).map(a=>a.name);
  const activeCustomCC    = customAccounts.filter(a=>a.type==='cc'&&!a.archived).map(a=>a.name);
  const allBanks    = [...SEED_BANKS,...activeCustomBanks];
  const allCC       = [...SEED_CC,...activeCustomCC];
  const allAccounts = [...allBanks,...allCC];

  const allBanksH   = [...SEED_BANKS,...customAccounts.filter(a=>a.type==='bank').map(a=>a.name)];
  const allCCH      = [...SEED_CC,...customAccounts.filter(a=>a.type==='cc').map(a=>a.name)];
  const allAccountsH= [...allBanksH,...allCCH];

  const activeCats  = [...CATEGORIES,...customCategories.filter(c=>!c.archived).map(c=>({id:c.name,emoji:c.emoji||'•',color:'none',it:c.it||'',parent:c.parent||null}))];
  const allCatsH    = [...CATEGORIES,...customCategories.map(c=>({id:c.name,emoji:c.emoji||'•',color:'none',it:c.it||'',parent:c.parent||null}))];

  const balances = computeBalances(opening,txns,allBanksH,allCCH);
  const liquid   = allBanks.filter(a=>a!=='Site Cash').reduce((s,a)=>s+(balances[a]||0),0);
  const totalCC  = allCC.reduce((s,a)=>s+Math.max(0,-(balances[a]||0)),0);
  const monthlyProv = recurring.filter(r=>r.active!==false&&r.is_provision&&r.frequency==='monthly').reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
  const trueSpendable = Math.max(0,liquid-totalCC-monthlyProv);
  const udhariOut = udhari.filter(u=>u.direction==='given').reduce((s,u)=>s+u.amount,0)-udhari.filter(u=>u.direction==='received').reduce((s,u)=>s+u.amount,0);

  /* ── DB HELPERS ── */
  const addTxn = async txn => {
    const payload={...txn,user_id:session?.user?.id||null};
    if(!('party_name' in payload))payload.party_name=null;
    if(!('tower' in payload))payload.tower=null;
    const{error}=await db.from('transactions').insert([payload]);
    if(!error){showToast('✓ '+fmtAmt(txn.amount)+' logged');loadData();}
    else{showToast('⚠ '+(error.message||'DB Error — check console'));}
  };
  const deleteTxn = async id => {
    const{error}=await db.from('transactions').update({status:'voided'}).eq('id',id);
    if(!error){showToast('↩ Voided');loadData();}
  };
  const voidAndCorrect = async (orig,corr) => {
    await db.from('transactions').update({status:'voided'}).eq('id',orig.id);
    const c={type:orig.type,amount:corr.amount,category:corr.category,from_account:corr.from_account||orig.from_account,to_account:corr.to_account||orig.to_account,particulars:corr.particulars,tower:orig.tower,it_section:orig.it_section,status:'complete',source:'app-correction',correction_of:orig.id,created_at:corr.created_at||orig.created_at};
    const{error}=await db.from('transactions').insert([c]);
    if(!error){showToast('✓ Corrected');loadData();}
  };
  const saveOpening = async ob=>{await db.from('settings').upsert({key:'opening_balances',value:JSON.stringify(ob)});setOpening(ob);showToast('✓ Balances saved');};
  const saveCustomAccounts = async list=>{await db.from('settings').upsert({key:'custom_accounts',value:JSON.stringify(list)});setCustomAccounts(list);showToast('✓ Accounts updated');};
  const saveBudgets = async bg=>{await db.from('settings').upsert({key:'budgets',value:JSON.stringify(bg)});setBudgets(bg);showToast('✓ Budgets saved');};
  const saveCustomSites = async list=>{await db.from('settings').upsert({key:'custom_sites',value:JSON.stringify(list)});setCustomSites(list);showToast('✓ Sites updated');};
  const saveCustomTeam = async list=>{await db.from('settings').upsert({key:'custom_team',value:JSON.stringify(list)});setCustomTeam(list);showToast('✓ Team updated');};
  const saveCustomSiteCats = async list=>{await db.from('settings').upsert({key:'custom_site_cats',value:JSON.stringify(list)});setCustomSiteCats(list);showToast('✓ Site categories updated');};
  const saveCustomCategories = async list=>{await db.from('settings').upsert({key:'custom_categories',value:JSON.stringify(list)});setCustomCategories(list);showToast('✓ Categories updated');};
  const addCustomCategory = async catObj=>{
    const updated=[...customCategories.filter(c=>c.name!==catObj.name&&!c.archived),{name:catObj.name,emoji:catObj.emoji||'•',it:catObj.it||'',parent:catObj.parent||null}];
    await saveCustomCategories(updated);
  };
  const saveTheme = t=>{setTheme(t);document.documentElement.setAttribute('data-theme',t);localStorage.setItem('jbf_theme',t);db.from('settings').upsert({key:'theme',value:t}).catch(()=>{});};
  const addRecurring = async entry=>{const{error}=await db.from('recurring').insert([entry]);if(!error){showToast('✓ Saved');loadData();}else showToast('⚠ '+(error.message||'Error'));};
  const deleteRecurring = async id=>{await db.from('recurring').delete().eq('id',id);showToast('↩ Deleted');loadData();};

  const tickChecklist = async (rec,cl,amtPaid,fromAccount)=>{
    if(!amtPaid||amtPaid<=0)return;
    const now=new Date().toISOString();const nowD=new Date();
    const txnType=rec.is_cc_payment?'Bank→CC':rec.is_provision?'Bank→Bank':'Expense';
    const txn={type:txnType,amount:amtPaid,category:rec.category||'Household',from_account:fromAccount,to_account:txnType==='Bank→CC'?rec.cc_name||null:txnType==='Bank→Bank'?rec.provision_account||null:null,particulars:rec.name,status:'complete',source:'checklist',created_at:now};
    try{await db.from('transactions').insert([txn]);}catch(e){}
    if(cl?.id){await db.from('checklist').update({status:'paid',amount_paid:amtPaid,paid_at:now}).eq('id',cl.id);}
    else{await db.from('checklist').insert([{recurring_id:rec.id,month:nowD.getMonth()+1,year:nowD.getFullYear(),status:'paid',amount_paid:amtPaid,paid_at:now}]);}
    loadData();showToast('✓ '+rec.name+' logged');
  };

  const handleSettleUdhari = async entry=>{
    const{direction,person_name,amount,mode,txn_date}=entry;
    const ts=(txn_date||new Date().toISOString().slice(0,10))+'T06:30:00.000Z';
    const{error}=await db.from('udhari').insert([{...entry,created_at:ts}]);
    if(error){showToast('⚠ '+error.message);return;}
    if(direction==='given'){await db.from('transactions').insert([{type:'Expense',amount:parseFloat(amount),category:'UDHARI',from_account:mode,particulars:'Udhari — '+person_name,status:'complete',source:'udhari',created_at:ts}]);}
    else if(direction==='received'){
      await db.from('transactions').insert([{type:'Income',amount:parseFloat(amount),category:'UDHARI',to_account:mode,particulars:'Udhari wapas — '+person_name,status:'complete',source:'udhari',created_at:ts}]);
      if(mode==='Cash'){
        const bankGiven=udhari.find(u=>u.person_name===person_name&&u.direction==='given'&&u.mode!=='Cash'&&allBanksH.includes(u.mode));
        if(bankGiven){const origTxn=txns.find(t=>t.source==='udhari'&&t.type==='Expense'&&t.from_account===bankGiven.mode&&(t.particulars||'').toLowerCase().includes(person_name.toLowerCase())&&!(t.particulars||'').includes('[Settled in Cash]'));if(origTxn)await db.from('transactions').update({particulars:(origTxn.particulars||'')+' [Settled in Cash]'}).eq('id',origTxn.id);}
      }
    }
    showToast(direction==='given'?'✓ Udhari + balance logged':'✓ Settled — ledger updated');loadData();
  };
  const deleteUdhari = async id=>{await db.from('udhari').delete().eq('id',id);showToast('↩ Deleted');loadData();};

  const clPending=(()=>{
    const _n=new Date(),_m=_n.getMonth()+1,_y=_n.getFullYear();
    const due=r=>{
      if(!r.active&&r.active!==undefined)return false;
      if(r.is_provision)return false;
      if(r.frequency==='monthly')return true;
      if(r.frequency==='bimonthly')return((_m-(r.due_month||1))%2===0)&&_m>=(r.due_month||1);
      if(r.frequency==='quarterly')return((_m-(r.due_month||1))%3===0)&&_m>=(r.due_month||1);
      if(r.frequency==='half_yearly')return _m===r.due_month||_m===r.due_month2;
      if(r.frequency==='annual')return _m===r.due_month;return false;
    };
    const ccIds=allCC.filter(a=>(balances[a]||0)<0).map(a=>'cc-'+a);
    const recIds=recurring.filter(due).map(r=>r.id);
    return[...ccIds,...recIds].filter(id=>{const cl=checklist.find(c=>c.recurring_id===id&&c.month===_m&&c.year===_y);return!cl||cl.status!=='paid';}).length;
  })();

  return (
    <div id="root">
      {!pinUnlocked&&<PinLockScreen onUnlock={()=>setPinUnlocked(true)}/>}
      {pinUnlocked&&authLoading&&<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100dvh',fontFamily:'var(--mono)',fontSize:12,color:'var(--text3)'}}>Authenticating…</div>}
      {pinUnlocked&&!authLoading&&!session&&<LoginScreen/>}
      {pinUnlocked&&!authLoading&&session&&<>
      <Header liquid={liquid} tab={tab} onMenu={()=>setMenuOpen(true)} streak={streak}/>
      <div className="main">
        {loading&&<div className="empty">Loading...</div>}
        {!loading&&tab==='add'&&<AddScreen onSave={addTxn} showToast={showToast} allAccounts={allAccounts} allBanks={allBanks} allCC={allCC} allCategories={activeCats} onAddCategory={addCustomCategory} customSites={customSites} customTeam={customTeam} customSiteCats={customSiteCats} prefill={addPrefill} onClearPrefill={()=>setAddPrefill(null)}/>}
        {!loading&&tab==='txns'&&<TxnsScreen txns={txns} onDelete={deleteTxn} onVoidAndCorrect={voidAndCorrect} allAccounts={allAccountsH} allBanks={allBanksH} allCC={allCCH} allCategories={allCatsH} globalSearch={globalSearch} setGlobalSearch={setGlobalSearch} txnFilters={txnFilters} setTxnFilters={setTxnFilters}/>}
        {!loading&&tab==='dash'&&<DashScreen balances={balances} txns={txns} liquid={liquid} allBanks={allBanks} allCC={allCC} allCCAll={allCCH} budgets={budgets} trueSpendable={trueSpendable} recurring={recurring} checklist={checklist} setGlobalSearch={setGlobalSearch} setTab={setTab} investments={investments} setTxnFilters={setTxnFilters} setStmtFilters={setStmtFilters} onAuditSync={async(real)=>{
          const diff=real-liquid;if(Math.abs(diff)<1){showToast('✓ Balances match perfectly!');return;}
          const isIncome=diff>0;
          const txn={domain:'Personal',type:isIncome?'Income':'Expense',amount:Math.abs(diff),category:'Suspense (Uncategorized)',from_account:isIncome?null:(allBanks.find(b=>b!=='Cash')||'Cash'),to_account:isIncome?(allBanks.find(b=>b!=='Cash')||'Cash'):null,particulars:'Audit Sync '+(isIncome?'surplus':'deficit')+' ₹'+fmt(Math.abs(diff)),status:'complete',source:'audit',created_at:new Date().toISOString()};
          await addTxn(txn);showToast((isIncome?'↑ Income':'↓ Expense')+' ₹'+fmt(Math.abs(diff))+' — Suspense entry created');
        }}/>}
        {!loading&&tab==='investments'&&<InvestmentsScreen investments={investments} setInvestments={setInvestments} showToast={showToast}/>}
        {!loading&&tab==='provision'&&<ProvisionLedger recurring={recurring} txns={txns} allBanks={allBanks} onAddTxn={addTxn} onAddRecurring={addRecurring} showToast={showToast}/>}
        {!loading&&tab==='checklist'&&<ChecklistScreen recurring={recurring} checklist={checklist} onTick={tickChecklist} onAdd={addRecurring} onDelete={deleteRecurring} allAccounts={allAccounts} allBanks={allBanks} allCC={allCC} allCategories={activeCats} balances={balances} setTab={setTab} onPrefill={rec=>{setAddPrefill(rec);setTab('add');}}/>}
        {!loading&&tab==='udhari'&&<UdhariScreen udhari={udhari} onAdd={handleSettleUdhari} onDelete={deleteUdhari} allAccounts={allAccounts} allBanks={allBanks}/>}
        {!loading&&tab==='statement'&&<StatementScreen txns={txns} allAccounts={allAccountsH} allBanks={allBanksH} allCC={allCCH} opening={opening} balances={balances} stmtFilters={stmtFilters} setStmtFilters={setStmtFilters} setTxnFilters={setTxnFilters} setTab={setTab}/>}
        {!loading&&tab==='site_ledger'&&<SiteLedgerScreen txns={txns} customSites={customSites} customTeam={customTeam} opening={opening}/>}
        {!loading&&tab==='cc_bill'&&<CCBillScreen txns={txns} customAccounts={customAccounts} setTxnFilters={setTxnFilters} setTab={setTab}/>}
        {!loading&&tab==='settings'&&<SettingsScreen opening={opening} onSave={saveOpening} allAccountsH={allAccountsH} customAccounts={customAccounts} onSaveAccounts={saveCustomAccounts} customCategories={customCategories} onSaveCategories={saveCustomCategories} budgets={budgets} onSaveBudgets={saveBudgets} customSites={customSites} onSaveSites={saveCustomSites} customTeam={customTeam} onSaveTeam={saveCustomTeam} theme={theme} onSaveTheme={saveTheme} customSiteCats={customSiteCats} onSaveSiteCats={saveCustomSiteCats}/>}
        {!loading&&tab==='ai_command'&&<AiCommandScreen investments={investments} setInvestments={setInvestments} showToast={showToast}/>}
        {!loading&&tab==='cashflow'&&<CashflowScreen txns={txns} budgets={budgets} onSaveBudgets={saveBudgets} liquid={liquid} allBanks={allBanks} balances={balances} recurring={recurring}/>}
        {!loading&&tab==='pdf_import'&&<PdfImportScreen allBanks={allBanks} allCC={allCC} allCategories={activeCats} onSave={addTxn} showToast={showToast}/>}
      </div>

      {!quickAdd&&tab!=='add'&&<button onClick={()=>setQuickAdd(true)} style={{position:'fixed',bottom:'calc(var(--tab-h) + var(--safe-b) + 20px)',right:20,width:52,height:52,borderRadius:'50%',background:'var(--green)',border:'none',color:'#000',fontSize:28,fontWeight:300,cursor:'pointer',zIndex:150,boxShadow:'0 4px 16px rgba(0,0,0,0.3)',display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>}

      {quickAdd&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:100,display:'flex',flexDirection:'column',justifyContent:'flex-end'}} onClick={e=>e.target===e.currentTarget&&setQuickAdd(false)}><div style={{background:'var(--bg)',borderRadius:'16px 16px 0 0',border:'1px solid var(--border)',maxHeight:'90vh',overflowY:'auto'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 16px',borderBottom:'1px solid var(--border)'}}><span style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:600,letterSpacing:'0.08em',color:'var(--text2)'}}>ADD ENTRY</span><button onClick={()=>setQuickAdd(false)} style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text2)',padding:'4px 10px',fontSize:11,fontFamily:'var(--mono)',cursor:'pointer'}}>✕ Close</button></div><AddScreen onSave={async txn=>{await addTxn(txn);setQuickAdd(false);}} showToast={showToast} allAccounts={allAccounts} allBanks={allBanks} allCC={allCC} allCategories={activeCats} onAddCategory={addCustomCategory} customSites={customSites} customTeam={customTeam} prefill={addPrefill} onClearPrefill={()=>setAddPrefill(null)}/></div></div>}

      {menuOpen&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:200,display:'flex',flexDirection:'column',justifyContent:'flex-start'}} onClick={e=>e.target===e.currentTarget&&setMenuOpen(false)}><div style={{background:'var(--bg)',borderRadius:'0 0 16px 16px',border:'1px solid var(--border)',padding:'16px',maxHeight:'80vh',overflowY:'auto'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}><span style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:'var(--text2)',letterSpacing:'0.08em'}}>MENU</span><button onClick={()=>setMenuOpen(false)} style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text2)',padding:'4px 10px',fontSize:11,fontFamily:'var(--mono)',cursor:'pointer'}}>✕</button></div>

function computeBalances(opening,txns,allBanks,allCC){
  const bal={};
  Object.entries(opening||{}).forEach(([acc,val])=>{bal[acc]=(typeof val==='object'&&val!==null)?(val.amount||0):(val||0);});
  txns.filter(t=>t.status!=='voided').forEach(t=>{
    const txnDate=(t.created_at||'').slice(0,10);
    const amt=parseFloat(t.amount)||0,from=t.from_account,to=t.to_account,type=t.type;
    const after=acc=>{const val=opening[acc];if(!val||typeof val!=='object'||!val.opening_date)return true;return txnDate>=val.opening_date;};
    if(type==='Expense'||type==='UA Expense'){if(from&&after(from))bal[from]=(bal[from]||0)-amt;}
    if(type==='Income'||type==='UA Received'){if(to&&after(to))bal[to]=(bal[to]||0)+amt;}
    if(['Bank→Bank','Bank→CC','Bank→Cash','Cash→Bank','CC→Bank'].includes(type)){
      if(from&&after(from))bal[from]=(bal[from]||0)-amt;
      if(to&&after(to))bal[to]=(bal[to]||0)+amt;
    }
  });
  return bal;
}

    const selS={...iS,cursor:'pointer'};
    const allSiteAccounts=['Site Cash',...allBanks.filter(a=>a!=='Cash'),...allCC];
    const SITE_TYPES=[{key:'Expense',label:'💸 Expense'},{key:'Income',label:'💰 Income'},{key:'Bank-Bank',label:'Bank→Bank'},{key:'Bank-CC',label:'Bank→CC'},{key:'Bank-Cash',label:'Bank→Cash'},{key:'Cash-Bank',label:'Cash→Bank'},{key:'CC-Bank',label:'CC→Bank'},{key:'Site Transfer',label:'↔ Transfer'}];
    const selectSiteType=t=>{setSiteType(t);if(t==='Expense'){setSitePayFrom('Site Cash');}else if(t==='Income'){setDepositTo('Site Cash');}else if(t==='Bank-CC'){setSitePayFrom(allBanks.filter(a=>a!=='Cash')[0]||'');setSiteTo(allCC[0]||'');}else if(t==='Bank-Bank'){setSitePayFrom(allBanks.filter(a=>a!=='Cash')[0]||'');setSiteTo('');}else if(t==='Bank-Cash'){setSitePayFrom(allBanks.filter(a=>a!=='Cash')[0]||'');setSiteTo('Cash');}else if(t==='Cash-Bank'){setSitePayFrom('Cash');setSiteTo(allBanks.filter(a=>a!=='Cash')[0]||'');}else if(t==='CC-Bank'){setSitePayFrom(allCC[0]||'');setSiteTo(allBanks.filter(a=>a!=='Cash')[0]||'');}};
    const siteFromList=()=>{if(['Bank-CC','Bank-Bank','Bank-Cash'].includes(siteType))return allBanks.filter(a=>a!=='Cash');if(siteType==='Cash-Bank')return['Cash'];if(siteType==='CC-Bank')return allCC;return allSiteAccounts;};
    const siteToList=()=>{if(siteType==='Bank-CC')return allCC;if(['Bank-Bank','Cash-Bank','CC-Bank'].includes(siteType))return allBanks.filter(a=>a!=='Cash');if(siteType==='Bank-Cash')return['Cash'];return['Site Cash',...allBanks.filter(a=>a!=='Cash')];};
    return(<div className="fade-in" style={{padding:'12px 16px',paddingBottom:'calc(var(--tab-h) + var(--safe-b) + 24px)',display:'flex',flexDirection:'column',gap:12}}>
      <div style={{display:'flex',gap:6}}><span style={cs(false)} onClick={()=>setDomain('Personal')}>Personal</span><span style={cs(true)}>Site</span></div>
      <div><p className="sec-label" style={{padding:'0 0 6px'}}>Site</p>{(customSites&&customSites.length>0)?<div style={{display:'flex',flexWrap:'wrap',gap:6}}>{customSites.map(s=><span key={s} style={cs(siteName===s)} onClick={()=>setSiteName(s)}>{s}</span>)}</div>:<span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>No sites — add in Setup</span>}</div>
      <div><p className="sec-label" style={{padding:'0 0 6px'}}>Type</p><div style={{display:'flex',gap:6,flexWrap:'wrap'}}>{SITE_TYPES.map(t=><span key={t.key} style={cs(siteType===t.key)} onClick={()=>selectSiteType(t.key)}>{t.label}</span>)}</div></div>
      {(siteType==='Expense'||siteType==='Income')&&(<div><p className="sec-label" style={{padding:'0 0 6px'}}>Category</p><select value={siteCat} onChange={e=>setSiteCat(e.target.value)} style={selS}>{SITE_CATS.map(c=><option key={c}>{c}</option>)}</select></div>)}
      {siteType==='Expense'&&(<><div><p className="sec-label" style={{padding:'0 0 6px'}}>Paid From</p><div style={{display:'flex',flexWrap:'wrap',gap:6}}>{siteFromList().map(a=><span key={a} style={cs(sitePayFrom===a)} onClick={()=>setSitePayFrom(a)}>{a}</span>)}</div></div><div><p className="sec-label" style={{padding:'0 0 6px'}}>To Member</p><select value={siteMember} onChange={e=>setSiteMember(e.target.value)} style={{...selS,borderColor:'var(--amber)',color:'var(--amber)'}}>{allSiteMembers.map(m=><option key={m}>{m}</option>)}</select></div></>)}
      {siteType==='Income'&&(<><div><p className="sec-label" style={{padding:'0 0 6px'}}>From Member</p><select value={siteMember} onChange={e=>setSiteMember(e.target.value)} style={{...selS,borderColor:'var(--green)',color:'var(--green)'}}>{allSiteMembers.map(m=><option key={m}>{m}</option>)}</select></div><div><p className="sec-label" style={{padding:'0 0 6px'}}>Deposit To</p><div style={{display:'flex',flexWrap:'wrap',gap:6}}>{siteToList().map(a=><span key={a} style={cs(depositTo===a)} onClick={()=>setDepositTo(a)}>{a}</span>)}</div></div></>)}
      {!['Expense','Income','Site Transfer'].includes(siteType)&&(<><div><p className="sec-label" style={{padding:'0 0 6px'}}>From Account</p><div style={{display:'flex',flexWrap:'wrap',gap:6}}>{siteFromList().map(a=><span key={a} style={cs(sitePayFrom===a)} onClick={()=>setSitePayFrom(a)}>{a}</span>)}</div></div><div><p className="sec-label" style={{padding:'0 0 6px'}}>To Account</p><div style={{display:'flex',flexWrap:'wrap',gap:6}}>{siteToList().map(a=><span key={a} style={cs(siteTo===a)} onClick={()=>setSiteTo(a)}>{a}</span>)}</div></div></>)}
      {siteType==='Site Transfer'&&(<><div><p className="sec-label" style={{padding:'0 0 6px'}}>Direction</p><div style={{display:'flex',gap:6}}><span style={cs(transferDir==='Given')} onClick={()=>setTransferDir('Given')}>Given →</span><span style={cs(transferDir==='Received')} onClick={()=>setTransferDir('Received')}>← Received</span></div></div><div><p className="sec-label" style={{padding:'0 0 6px'}}>Person</p>{allSiteMembers.length>0?<select value={transferUser} onChange={e=>setTransferUser(e.target.value)} style={selS}>{allSiteMembers.map(m=><option key={m}>{m}</option>)}</select>:<span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>No team — add in Setup</span>}</div></>)}
      <input type="number" inputMode="decimal" placeholder="Amount (₹)" value={amt} onChange={e=>setAmt(e.target.value)} style={{...iS,fontSize:20,padding:'12px 14px',fontWeight:600}}/>
      <input type="text" placeholder="Description (optional)" value={desc} onChange={e=>setDesc(e.target.value)} style={iS}/>
      <input type="date" value={date} max={today} onChange={e=>setDate(e.target.value)} style={{...iS,color:date!==today?'var(--amber)':'var(--text)',borderColor:date!==today?'var(--amber)':'var(--border2)'}}/>
      {date!==today&&<span style={{fontSize:10,color:'var(--amber)',fontFamily:'var(--mono)'}}>⚠ Backdated entry</span>}
      <SaveBtn/>
    </div>);
  }

  return(<div className="fade-in" style={{padding:'12px 16px',paddingBottom:'calc(var(--tab-h) + var(--safe-b) + 24px)',display:'flex',flexDirection:'column',gap:12}}>
    <div style={{display:'flex',gap:6}}><span style={cs(true)}>Personal</span><span style={cs(false)} onClick={()=>setDomain('Site')}>Site</span></div>
    <div><p className="sec-label" style={{padding:'0 0 6px'}}>TYPE</p><div style={{display:'flex',flexWrap:'wrap',gap:6}}>{TYPES_P.map(t=><span key={t.key} style={cs(type===t.key)} onClick={()=>selectType(t.key)}>{t.label}</span>)}</div></div>
    <input type="number" step="0.01" inputMode="decimal" placeholder="Amount (₹)" value={amt} onChange={e=>setAmt(e.target.value)} style={{...iS,fontSize:20,padding:'12px 14px',fontWeight:600}}/>
    <input type="text" placeholder="Description (optional)" value={desc} onChange={e=>setDesc(e.target.value)} style={iS}/>
    <input type="date" value={date} max={today} onChange={e=>setDate(e.target.value)} style={{...iS,color:date!==today?'var(--amber)':'var(--text)',borderColor:date!==today?'var(--amber)':'var(--border2)'}}/>
    {date!==today&&<span style={{fontSize:10,color:'var(--amber)',fontFamily:'var(--mono)'}}>⚠ Backdated entry</span>}
    {needCat&&<CategoryPicker allCategories={allCategories} value={cat} onChange={setCat} onAddNew={onAddCategory}/>}
    {needFrom&&<div><p className="sec-label" style={{padding:'0 0 6px'}}>PAID FROM</p><div style={{display:'flex',flexWrap:'wrap',gap:6}}>{fromList().map(a=><span key={a} style={cs(from===a)} onClick={()=>setFrom(a)}>{a}</span>)}</div></div>}
    {needTo&&<div><p className="sec-label" style={{padding:'0 0 6px'}}>{type==='Income'||type==='UA Received'?'TO ACCOUNT':'TO'}</p><div style={{display:'flex',flexWrap:'wrap',gap:6}}>{toList().map(a=><span key={a} style={cs(to===a)} onClick={()=>setTo(a)}>{a}</span>)}</div></div>}
    {(type==='UA Expense'||type==='UA Received')&&<div><p className="sec-label" style={{padding:'0 0 6px'}}>TOWER / SITE</p><div style={{display:'flex',gap:6,flexWrap:'wrap'}}>{['D5','E2','C3','Common'].map(t=><span key={t} style={cs(tower===t)} onClick={()=>setTower(tower===t?'':t)}>{t}</span>)}</div></div>}
    {catInfo&&catInfo.it&&<span className="badge badge-in">IT: {catInfo.it} Eligible</span>}
    <SaveBtn/>
  </div>);
}

function TxnsScreen({txns,onDelete,onVoidAndCorrect,allAccounts,allBanks,allCC,allCategories,globalSearch,setGlobalSearch,txnFilters,setTxnFilters}){
  const [dateFilter,setDateFilter]=useState('This Month');const [customStart,setCustomStart]=useState('');const [customEnd,setCustomEnd]=useState('');
  const [acctFilter,setAcctFilter]=useState('');const [typeFilter,setTypeFilter]=useState('');
  const [selected,setSelected]=useState(null);const [editMode,setEditMode]=useState(null);const [saving,setSaving]=useState(false);
  const [corrAmt,setCorrAmt]=useState('');const [corrDesc,setCorrDesc]=useState('');const [corrCat,setCorrCat]=useState('');
  const [corrDate,setCorrDate]=useState('');const [corrFrom,setCorrFrom]=useState('');const [corrTo,setCorrTo]=useState('');
  const [search,setSearch]=useState(globalSearch||'');
  
  useEffect(()=>{setSearch(globalSearch||'');},[globalSearch]);
  useEffect(()=>{
    if(txnFilters){
      setDateFilter(txnFilters.periodMode||'Custom');
      if(txnFilters.startDate)setCustomStart(txnFilters.startDate);
      if(txnFilters.endDate)setCustomEnd(txnFilters.endDate);
      if(txnFilters.account)setAcctFilter(txnFilters.account);
      if(txnFilters.type)setTypeFilter(txnFilters.type);
      setTxnFilters(null);
    }
  },[txnFilters, setTxnFilters]);

  const now2=new Date();const curMonth=now2.getMonth();const curYear=now2.getFullYear();
  const inWin=t=>{const d=new Date(t.created_at);if(dateFilter==='This Month')return d.getMonth()===curMonth&&d.getFullYear()===curYear;if(dateFilter==='Last Month'){const lm=curMonth===0?11:curMonth-1,ly=curMonth===0?curYear-1:curYear;return d.getMonth()===lm&&d.getFullYear()===ly;}if(dateFilter==='Past 3 Months'){const c=new Date(now2);c.setMonth(c.getMonth()-3);c.setDate(1);return d>=c;}if(dateFilter==='This Year')return d.getFullYear()===curYear;if(dateFilter==='Custom'){if(customStart&&d<new Date(customStart))return false;if(customEnd&&d>new Date(customEnd+'T23:59:59'))return false;return true;}return true;};
  const filtered=txns.filter(t=>{
    if(!inWin(t))return false;
    if(t.status==='voided')return false;
    if(acctFilter&&t.from_account!==acctFilter&&t.to_account!==acctFilter)return false;
    if(typeFilter==='INCOME'&&t.type!=='Income'&&t.type!=='UA Received'&&!(t.to_account===acctFilter&&['Bank→Bank','Bank→CC','Cash→Bank','CC→Bank'].includes(t.type)))return false;
    if(typeFilter==='EXPENSE'&&t.type!=='Expense'&&t.type!=='UA Expense'&&!(t.from_account===acctFilter&&['Bank→Bank','Bank→CC','Bank→Cash'].includes(t.type)))return false;
    if(search.trim()){const q=search.toLowerCase();if(!(t.particulars||'').toLowerCase().includes(q)&&!(t.category||'').toLowerCase().includes(q)&&!String(t.amount).includes(q)&&!(t.from_account||t.to_account||'').toLowerCase().includes(q))return false;}
    return true;
  });
  const filteredTotal=filtered.reduce((s,t)=>s+(Number(t.amount)||0),0);
  const amtColor=t=>{if(t.status==='voided')return'';if(t.type==='Income'||t.type==='UA Received')return'in';if(t.type==='UA Expense')return'ua';if(t.type==='Bank→Bank'||t.type==='Bank→CC')return'';return'out';};
  const amtSign=t=>(t.type==='Income'||t.type==='UA Received')?'+':'−';
  const typeLabel=t=>{if(t.type==='Income')return'Income';if(t.type==='UA Received')return'UA Received ↑';if(t.type==='UA Expense')return'UA Expense';if(t.type==='Expense')return'Expense';return t.type;};
  const handleEdit=t=>{setEditMode(t);setCorrAmt(String(t.amount));setCorrDesc(t.particulars||'');setCorrCat(t.category||'');setCorrDate(new Date(t.created_at).toISOString().slice(0,10));setCorrFrom(t.from_account||'');setCorrTo(t.to_account||'');};
  const handleSaveCorr=async()=>{if(!editMode||!corrAmt||saving)return;setSaving(true);await onVoidAndCorrect(editMode,{amount:parseFloat(corrAmt),particulars:corrDesc||editMode.particulars,category:corrCat||editMode.category,from_account:corrFrom||editMode.from_account,to_account:corrTo||editMode.to_account,created_at:corrDate?corrDate+'T06:30:00.000Z':editMode.created_at});setEditMode(null);setSelected(null);setSaving(false);};

  const handlePrint = () => {
    const html = `<!DOCTYPE html><html><head><title>Transaction Log</title><style>*{font-family:monospace;font-size:12px;margin:0;padding:0;}body{padding:20px;}table{width:100%;border-collapse:collapse;margin-top:10px;}th,td{border:1px solid #ccc;padding:6px;text-align:left;}th{background:#f0f0f0;}.amt{text-align:right;}</style></head><body><h2>Transaction Log</h2><p>Period: ${dateFilter}${customStart?` (${customStart} to ${customEnd})`:''} | Account: ${acctFilter||'All'} | Type: ${typeFilter||'All'}</p><table><tr><th>Date</th><th>Description</th><th>Category</th><th>Account</th><th>Amount (₹)</th></tr>${filtered.map(t=>`<tr><td>${fmtDate(t.created_at)}</td><td>${t.particulars||t.category}</td><td>${t.category}</td><td>${t.from_account||t.to_account}</td><td class="amt">${fmtAmt(t.amount)}</td></tr>`).join('')}<tr><th colspan="4" style="text-align:right;">Filtered Total</th><th class="amt">${fmtAmt(filteredTotal)}</th></tr></table></body></html>`;
    const w = window.open('','_blank'); w.document.write(html); w.document.close(); w.print();
  };

  const iS={background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,padding:'7px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',width:'100%'};
  const cS=a=>({display:'inline-block',border:a?'1px solid var(--blue)':'1px solid var(--border2)',borderRadius:14,padding:'4px 10px',fontFamily:'var(--mono)',fontSize:10,color:a?'var(--blue)':'var(--text2)',background:a?'var(--blue-bg)':'var(--bg2)',cursor:'pointer',userSelect:'none',margin:'0 4px 4px 0'});
  const bS=col=>({background:'none',border:`1px solid ${col}`,borderRadius:6,color:col,padding:'5px 12px',fontSize:11,fontFamily:'var(--mono)',cursor:'pointer'});
  const editFromList=()=>{const t=editMode?.type||'';if(t==='Bank→CC'||t==='Bank→Bank'||t==='Bank→Cash')return allBanks.filter(a=>a!=='Cash');if(t==='CC→Bank')return allCC;if(t==='Cash→Bank')return['Cash'];return allAccounts;};
  const editToList=()=>{const t=editMode?.type||'';if(t==='Bank→CC')return allCC;if(t==='Bank→Bank'||t==='Cash→Bank'||t==='CC→Bank')return allBanks.filter(a=>a!=='Cash');if(t==='Bank→Cash')return['Cash'];return allBanks;};
  const nFrom=t=>['Expense','UA Expense','Bank→CC','Bank→Bank','Bank→Cash','CC→Bank'].includes(t);
  const nTo=t=>['Income','UA Received','Bank→CC','Bank→Bank','Cash→Bank','CC→Bank'].includes(t);
  
  return(
    <div className="fade-in">
      <div style={{padding:'10px 16px 0',display:'flex',flexDirection:'column',gap:8}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',letterSpacing:'0.06em',textTransform:'uppercase'}}>FILTERS</div>
          <button onClick={handlePrint} style={{background:'var(--blue)',color:'#fff',border:'none',borderRadius:6,padding:'4px 10px',fontSize:10,fontFamily:'var(--mono)',fontWeight:600,cursor:'pointer'}}>🖨 Print Log</button>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{flex:1,position:'relative'}}><input value={search} onChange={e=>{setSearch(e.target.value);setSelected(null);setEditMode(null);}} placeholder="Search description, category, amount, account..." style={{width:'100%',background:'var(--bg2)',border:'1px solid '+(search?'var(--blue)':'var(--border)'),borderRadius:8,padding:'8px 12px 8px 32px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none'}}/><span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:13,color:'var(--text3)',pointerEvents:'none'}}>⌕</span></div>
          {search&&<button onClick={()=>{setSearch('');setGlobalSearch&&setGlobalSearch('');}} style={{background:'none',border:'none',color:'var(--text3)',fontSize:16,cursor:'pointer',padding:'0 4px'}}>✕</button>}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
          <select value={dateFilter} onChange={e=>{setDateFilter(e.target.value);setSelected(null);setEditMode(null);}} style={{background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'7px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:11,outline:'none',cursor:'pointer'}}><option>This Month</option><option>Last Month</option><option>Past 3 Months</option><option>This Year</option><option>All Time</option><option>Custom</option></select>
          <select value={acctFilter} onChange={e=>{setAcctFilter(e.target.value);}} style={{background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'7px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:11,outline:'none',cursor:'pointer'}}><option value="">All Accounts</option>{allAccounts.map(a=><option key={a} value={a}>{a}</option>)}</select>
          <select value={typeFilter} onChange={e=>{setTypeFilter(e.target.value);}} style={{background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'7px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:11,outline:'none',cursor:'pointer'}}><option value="">All Types</option><option value="INCOME">Income / Deposits</option><option value="EXPENSE">Expense / Withdrawals</option></select>
          {dateFilter==='Custom'&&<><input type="date" value={customStart} onChange={e=>setCustomStart(e.target.value)} style={{background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'7px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:11,outline:'none'}}/><span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>to</span><input type="date" value={customEnd} onChange={e=>setCustomEnd(e.target.value)} style={{background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'7px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:11,outline:'none'}}/></>}
        </div>
      </div>
      <div style={{position:'sticky',top:0,zIndex:10,background:'var(--bg)',borderBottom:'1px solid var(--border)',borderTop:'1px solid var(--border)',marginTop:8}}>
        {filtered.length>0?<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 16px'}}><span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)'}}>{filtered.length} txn{filtered.length!==1?'s':''}{search&&<span style={{color:'var(--blue)',marginLeft:4}}>· "{search}"</span>}</span><div style={{display:'flex',alignItems:'baseline',gap:4}}><span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>Total</span><span style={{fontFamily:'var(--mono)',fontSize:17,fontWeight:700,color:'var(--text)',letterSpacing:'-0.3px'}}>₹{filteredTotal.toLocaleString('en-IN')}</span></div></div>:<div className="empty">{search?`No results for "${search}"`:'No transactions found.'}</div>}
      </div>
      <div style={{marginTop:8}}>
        {filtered.map(t=>(
          <div key={t.id}>
            <div className="txn-row" style={t.status==='voided'?{opacity:0.45}:{}} onClick={()=>{setSelected(selected===t.id?null:t.id);setEditMode(null);}}>
              <div className="txn-left">
                <div className="txn-cat">{typeLabel(t)}{t.tower?' · '+t.tower:''}{t.status==='voided'&&<span style={{marginLeft:6,fontSize:9,color:'var(--red)',fontFamily:'var(--mono)'}}>VOIDED</span>}{t.correction_of&&<span style={{marginLeft:6,fontSize:9,color:'var(--green)',fontFamily:'var(--mono)'}}>CORRECTION</span>}</div>
                <div className="txn-desc" style={t.status==='voided'?{textDecoration:'line-through'}:{}}>{t.particulars||t.category}</div>
                <div className="txn-meta">{fmtDate(t.created_at)} {fmtTime(t.created_at)}{t.category&&t.category!==t.type&&<span style={{color:'var(--text3)',marginLeft:6}}>{t.category}</span>}{t.it_section&&<span style={{color:'var(--green)',marginLeft:6}}>{t.it_section}</span>}</div>
                {selected===t.id&&t.status!=='voided'&&<div style={{marginTop:8,display:'flex',gap:8,flexWrap:'wrap'}}><button onClick={e=>{e.stopPropagation();handleEdit(t);}} style={bS('var(--blue)')}>Edit</button><button onClick={e=>{e.stopPropagation();onDelete(t.id);setSelected(null);}} style={bS('var(--red)')}>Void</button></div>}
              </div>
              <div className="txn-right"><div className={'txn-amt '+amtColor(t)} style={t.status==='voided'?{textDecoration:'line-through'}:{}}>{amtSign(t)}{fmtAmt(t.amount)}</div><div className="txn-acct">{t.from_account||t.to_account}</div>{t.status==='pending'&&<span className="badge badge-pending">pending</span>}</div>
            </div>
            {editMode?.id===t.id&&(
              <div style={{background:'var(--bg2)',border:'1px solid var(--blue)',borderRadius:8,margin:'0 12px 8px',padding:'12px'}}>
                <p style={{fontSize:10,color:'var(--blue)',fontFamily:'var(--mono)',margin:'0 0 10px',fontWeight:600,letterSpacing:'0.06em'}}>CORRECT ENTRY — original will be voided</p>
                <div style={{display:'flex',gap:8,marginBottom:8}}><input value={corrAmt} onChange={e=>setCorrAmt(e.target.value)} placeholder="Amount" type="number" style={{...iS,flex:1}}/><input value={corrDesc} onChange={e=>setCorrDesc(e.target.value)} placeholder="Description" style={{...iS,flex:2}}/></div>

function computeBalances(opening,txns,allBanks,allCC){
  const bal={};
  Object.entries(opening||{}).forEach(([acc,val])=>{bal[acc]=(typeof val==='object'&&val!==null)?(val.amount||0):(val||0);});
  txns.filter(t=>t.status!=='voided').forEach(t=>{
    const txnDate=(t.created_at||'').slice(0,10);
    const amt=parseFloat(t.amount)||0,from=t.from_account,to=t.to_account,type=t.type;
    const after=acc=>{const val=opening[acc];if(!val||typeof val!=='object'||!val.opening_date)return true;return txnDate>=val.opening_date;};
    if(type==='Expense'||type==='UA Expense'){if(from&&after(from))bal[from]=(bal[from]||0)-amt;}
    if(type==='Income'||type==='UA Received'){if(to&&after(to))bal[to]=(bal[to]||0)+amt;}
    if(['Bank→Bank','Bank→CC','Bank→Cash','Cash→Bank','CC→Bank'].includes(type)){
      if(from&&after(from))bal[from]=(bal[from]||0)-amt;
      if(to&&after(to))bal[to]=(bal[to]||0)+amt;
    }
  });
  return bal;
}

function CategoryPicker({allCategories,value,onChange,onAddNew}){
  const [search,setSearch]=useState('');const [open,setOpen]=useState(false);const [addOpen,setAddOpen]=useState(false);
  const [newName,setNewName]=useState('');const [newEmoji,setNewEmoji]=useState('');const [newParent,setNewParent]=useState('');const [saving,setSaving]=useState(false);
  const cats=allCategories.filter(c=>c.id!=='UA Expense');
  const filtered=search?cats.filter(c=>c.id.toLowerCase().includes(search.toLowerCase())):cats;
  const parents=filtered.filter(c=>!c.parent);const grouped=[];
  parents.forEach(p=>{grouped.push(p);filtered.filter(c=>c.parent===p.id).forEach(s=>grouped.push({...s,_sub:true}));});
  filtered.filter(c=>c.parent&&!parents.find(p=>p.id===c.parent)).forEach(c=>grouped.push(c));
  const selected=cats.find(c=>c.id===value);
  const handleAddNew=async()=>{if(!newName.trim())return;setSaving(true);await onAddNew({name:newName.trim(),emoji:newEmoji||'•',parent:newParent||null,it:''});onChange(newName.trim());setNewName('');setNewEmoji('');setNewParent('');setAddOpen(false);setOpen(false);setSaving(false);};
  return(
    <div style={{position:'relative'}}>
      <div onClick={()=>{setOpen(o=>!o);setSearch('');}} style={{background:'var(--bg2)',border:'1px solid '+(value?'var(--green)':'var(--border2)'),borderRadius:8,padding:'10px 12px',display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',userSelect:'none'}}>
        <span style={{fontFamily:'var(--mono)',fontSize:13,color:value?'var(--green)':'var(--text3)'}}>{selected?`${selected.emoji} ${selected.id}`:'Select category...'}</span>
        <span style={{color:'var(--text3)',fontSize:12}}>{open?'▲':'▼'}</span>
      </div>
      {open&&(
        <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,right:0,background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,zIndex:200,maxHeight:260,overflowY:'auto',boxShadow:'0 8px 24px rgba(0,0,0,0.3)'}}>
          <div style={{padding:'8px',borderBottom:'1px solid var(--border)'}}><input autoFocus placeholder="Search category..." value={search} onChange={e=>setSearch(e.target.value)} style={{width:'100%',background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,padding:'7px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',boxSizing:'border-box'}}/></div>
          {grouped.map(c=>(<div key={c.id} onClick={()=>{onChange(c.id);setOpen(false);setSearch('');}} style={{padding:'9px 12px',cursor:'pointer',display:'flex',alignItems:'center',gap:8,paddingLeft:c._sub?28:12,background:value===c.id?'var(--green-bg)':'none',borderBottom:'1px solid var(--border)'}}><span style={{fontSize:14}}>{c.emoji}</span><span style={{fontSize:12,color:value===c.id?'var(--green)':'var(--text)',fontFamily:'var(--mono)'}}>{c.id}</span>{c._sub&&<span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)'}}>sub</span>}{c.it&&<span style={{fontSize:9,color:'var(--green)',fontFamily:'var(--mono)'}}>{c.it}</span>}</div>))}
          {!addOpen&&<div onClick={()=>setAddOpen(true)} style={{padding:'10px 12px',cursor:'pointer',color:'var(--blue)',fontFamily:'var(--mono)',fontSize:12,borderTop:'1px solid var(--border)'}}>+ Add new category</div>}
          {addOpen&&(<div style={{padding:'10px 12px',borderTop:'1px solid var(--border)'}}><div style={{display:'flex',gap:6,marginBottom:6}}><input value={newEmoji} onChange={e=>setNewEmoji(e.target.value)} maxLength={2} placeholder="🏷" style={{width:42,background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,padding:'6px',color:'var(--text)',fontSize:14,textAlign:'center',outline:'none'}}/><input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Category name" style={{flex:1,background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,padding:'6px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none'}}/></div><select value={newParent} onChange={e=>setNewParent(e.target.value)} style={{width:'100%',background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,padding:'6px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',marginBottom:6}}><option value="">No parent (top-level)</option>{cats.filter(c=>!c.parent).map(c=>(<option key={c.id} value={c.id}>{c.emoji} {c.id}</option>))}</select><div style={{display:'flex',gap:6}}><button onClick={handleAddNew} disabled={saving||!newName.trim()} style={{flex:1,background:saving||!newName.trim()?'var(--bg3)':'var(--blue)',border:'none',borderRadius:6,color:saving||!newName.trim()?'var(--text3)':'#fff',fontFamily:'var(--mono)',fontSize:11,fontWeight:600,padding:'7px',cursor:'pointer'}}>{saving?'...':'Add'}</button><button onClick={()=>setAddOpen(false)} style={{background:'none',border:'1px solid var(--border)',borderRadius:6,color:'var(--text3)',padding:'7px 12px',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer'}}>Cancel</button></div></div>)}
        </div>
      )}
    </div>
  );

function AddScreen({onSave,showToast,allAccounts,allBanks,allCC,allCategories,onAddCategory,customSites,customTeam,customSiteCats,prefill,onClearPrefill}){

  useEffect(()=>{
    if(!prefill)return;

    if(prefill.name)setDesc(prefill.name);
    if(prefill.category)setCat(prefill.category);
    if(typeof onClearPrefill==='function')onClearPrefill();
  },[prefill]);

  const DEFAULT_SITE_CATS=['Misc','Transportation','Labour Salary','Kharchi','Medical','Hardware','Maintenance','Food','Udhari','Stationary','Fuel','Travelling'];
  const SITE_CATS=[...DEFAULT_SITE_CATS,...(customSiteCats||[]).filter(c=>!DEFAULT_SITE_CATS.includes(c))];
  const catInfo=allCategories.find(c=>c.id===cat);
  const needCat=type==='Expense';
  const needFrom=['Expense','UA Expense','Bank-CC','Bank-Bank','Bank-Cash','CC-Bank'].includes(type);
  const needTo=['Income','UA Received','Bank-CC','Bank-Bank','Cash-Bank','CC-Bank','Bank-Cash'].includes(type);
  const firstBank=allBanks.find(a=>a!=='Cash')||allBanks[1]||allBanks[0]||'';
  const fromList=()=>{if(type==='Bank-CC'||type==='Bank-Bank'||type==='Bank-Cash')return allBanks.filter(a=>a!=='Cash');if(type==='CC-Bank')return allCC;if(type==='Cash-Bank')return['Cash'];return allAccounts;};
  const toList=()=>{if(type==='Bank-CC')return allCC;if(type==='Bank-Bank'||type==='Cash-Bank'||type==='CC-Bank')return allBanks.filter(a=>a!=='Cash');if(type==='Bank-Cash')return['Cash'];return allBanks;};

  const handleSave=async()=>{
    if(!canSave||saving)return;setSaving(true);
    const baseDate=date||today;const created_at=baseDate===today?new Date().toISOString():baseDate+'T06:30:00.000Z';
    let txn;
    if(domain==='Personal'){
      txn={domain:'Personal',type:type.replace('Bank-CC','Bank→CC').replace('Bank-Bank','Bank→Bank').replace('Bank-Cash','Bank→Cash').replace('Cash-Bank','Cash→Bank').replace('CC-Bank','CC→Bank'),amount:parseFloat(amt),category:cat||type,from_account:needFrom?from:null,to_account:needTo?to:null,particulars:desc||null,tower:tower||null,it_section:catInfo?.it||null,status:'complete',source:'app',created_at};

  if(domain==='Site'){
    const selS={...iS,cursor:'pointer'};
    const allSiteAccounts=['Site Cash',...allBanks.filter(a=>a!=='Cash'),...allCC];
    const SITE_TYPES=[{key:'Expense',label:'💸 Expense'},{key:'Income',label:'💰 Income'},{key:'Bank-Bank',label:'Bank→Bank'},{key:'Bank-CC',label:'Bank→CC'},{key:'Bank-Cash',label:'Bank→Cash'},{key:'Cash-Bank',label:'Cash→Bank'},{key:'CC-Bank',label:'CC→Bank'},{key:'Site Transfer',label:'↔ Transfer'}];
    const selectSiteType=t=>{setSiteType(t);if(t==='Expense'){setSitePayFrom('Site Cash');}else if(t==='Income'){setDepositTo('Site Cash');}else if(t==='Bank-CC'){setSitePayFrom(allBanks.filter(a=>a!=='Cash')[0]||'');setSiteTo(allCC[0]||'');}else if(t==='Bank-Bank'){setSitePayFrom(allBanks.filter(a=>a!=='Cash')[0]||'');setSiteTo('');}else if(t==='Bank-Cash'){setSitePayFrom(allBanks.filter(a=>a!=='Cash')[0]||'');setSiteTo('Cash');}else if(t==='Cash-Bank'){setSitePayFrom('Cash');setSiteTo(allBanks.filter(a=>a!=='Cash')[0]||'');}else if(t==='CC-Bank'){setSitePayFrom(allCC[0]||'');setSiteTo(allBanks.filter(a=>a!=='Cash')[0]||'');}};

    const siteToList=()=>{if(siteType==='Bank-CC')return allCC;if(['Bank-Bank','Cash-Bank','CC-Bank'].includes(siteType))return allBanks.filter(a=>a!=='Cash');if(siteType==='Bank-Cash')return['Cash'];return['Site Cash',...allBanks.filter(a=>a!=='Cash')];};

  return(<div className="fade-in" style={{padding:'12px 16px',paddingBottom:'calc(var(--tab-h) + var(--safe-b) + 24px)',display:'flex',flexDirection:'column',gap:12}}>
    <div style={{display:'flex',gap:6}}><span style={cs(true)}>Personal</span><span style={cs(false)} onClick={()=>setDomain('Site')}>Site</span></div>

}

function TxnsScreen({txns,onDelete,onVoidAndCorrect,allAccounts,allBanks,allCC,allCategories,globalSearch,setGlobalSearch,txnFilters,setTxnFilters}){
  const [dateFilter,setDateFilter]=useState('This Month');const [customStart,setCustomStart]=useState('');const [customEnd,setCustomEnd]=useState('');
  const [acctFilter,setAcctFilter]=useState('');const [typeFilter,setTypeFilter]=useState('');
  const [selected,setSelected]=useState(null);const [editMode,setEditMode]=useState(null);const [saving,setSaving]=useState(false);
  const [corrAmt,setCorrAmt]=useState('');const [corrDesc,setCorrDesc]=useState('');const [corrCat,setCorrCat]=useState('');
  const [corrDate,setCorrDate]=useState('');const [corrFrom,setCorrFrom]=useState('');const [corrTo,setCorrTo]=useState('');
  const [search,setSearch]=useState(globalSearch||'');
  
  useEffect(()=>{setSearch(globalSearch||'');},[globalSearch]);
  useEffect(()=>{
    if(txnFilters){
      setDateFilter(txnFilters.periodMode||'Custom');
      if(txnFilters.startDate)setCustomStart(txnFilters.startDate);
      if(txnFilters.endDate)setCustomEnd(txnFilters.endDate);
      if(txnFilters.account)setAcctFilter(txnFilters.account);
      if(txnFilters.type)setTypeFilter(txnFilters.type);
      setTxnFilters(null);
    }
  },[txnFilters, setTxnFilters]);

  const now2=new Date();const curMonth=now2.getMonth();const curYear=now2.getFullYear();
  const inWin=t=>{const d=new Date(t.created_at);if(dateFilter==='This Month')return d.getMonth()===curMonth&&d.getFullYear()===curYear;if(dateFilter==='Last Month'){const lm=curMonth===0?11:curMonth-1,ly=curMonth===0?curYear-1:curYear;return d.getMonth()===lm&&d.getFullYear()===ly;}if(dateFilter==='Past 3 Months'){const c=new Date(now2);c.setMonth(c.getMonth()-3);c.setDate(1);return d>=c;}if(dateFilter==='This Year')return d.getFullYear()===curYear;if(dateFilter==='Custom'){if(customStart&&d<new Date(customStart))return false;if(customEnd&&d>new Date(customEnd+'T23:59:59'))return false;return true;}return true;};
  const filtered=txns.filter(t=>{
    if(!inWin(t))return false;
    if(t.status==='voided')return false;
    if(acctFilter&&t.from_account!==acctFilter&&t.to_account!==acctFilter)return false;
    if(typeFilter==='INCOME'&&t.type!=='Income'&&t.type!=='UA Received'&&!(t.to_account===acctFilter&&['Bank→Bank','Bank→CC','Cash→Bank','CC→Bank'].includes(t.type)))return false;
    if(typeFilter==='EXPENSE'&&t.type!=='Expense'&&t.type!=='UA Expense'&&!(t.from_account===acctFilter&&['Bank→Bank','Bank→CC','Bank→Cash'].includes(t.type)))return false;
    if(search.trim()){const q=search.toLowerCase();if(!(t.particulars||'').toLowerCase().includes(q)&&!(t.category||'').toLowerCase().includes(q)&&!String(t.amount).includes(q)&&!(t.from_account||t.to_account||'').toLowerCase().includes(q))return false;}
    return true;
  });
  const filteredTotal=filtered.reduce((s,t)=>s+(Number(t.amount)||0),0);
  const amtColor=t=>{if(t.status==='voided')return'';if(t.type==='Income'||t.type==='UA Received')return'in';if(t.type==='UA Expense')return'ua';if(t.type==='Bank→Bank'||t.type==='Bank→CC')return'';return'out';};
  const amtSign=t=>(t.type==='Income'||t.type==='UA Received')?'+':'−';
  const typeLabel=t=>{if(t.type==='Income')return'Income';if(t.type==='UA Received')return'UA Received ↑';if(t.type==='UA Expense')return'UA Expense';if(t.type==='Expense')return'Expense';return t.type;};
  const handleEdit=t=>{setEditMode(t);setCorrAmt(String(t.amount));setCorrDesc(t.particulars||'');setCorrCat(t.category||'');setCorrDate(new Date(t.created_at).toISOString().slice(0,10));setCorrFrom(t.from_account||'');setCorrTo(t.to_account||'');};
  const handleSaveCorr=async()=>{if(!editMode||!corrAmt||saving)return;setSaving(true);await onVoidAndCorrect(editMode,{amount:parseFloat(corrAmt),particulars:corrDesc||editMode.particulars,category:corrCat||editMode.category,from_account:corrFrom||editMode.from_account,to_account:corrTo||editMode.to_account,created_at:corrDate?corrDate+'T06:30:00.000Z':editMode.created_at});setEditMode(null);setSelected(null);setSaving(false);};

  const handlePrint = () => {
    const html = `<!DOCTYPE html><html><head><title>Transaction Log</title><style>*{font-family:monospace;font-size:12px;margin:0;padding:0;}body{padding:20px;}table{width:100%;border-collapse:collapse;margin-top:10px;}th,td{border:1px solid #ccc;padding:6px;text-align:left;}th{background:#f0f0f0;}.amt{text-align:right;}</style></head><body><h2>Transaction Log</h2><p>Period: ${dateFilter}${customStart?` (${customStart} to ${customEnd})`:''} | Account: ${acctFilter||'All'} | Type: ${typeFilter||'All'}</p><table><tr><th>Date</th><th>Description</th><th>Category</th><th>Account</th><th>Amount (₹)</th></tr>${filtered.map(t=>`<tr><td>${fmtDate(t.created_at)}</td><td>${t.particulars||t.category}</td><td>${t.category}</td><td>${t.from_account||t.to_account}</td><td class="amt">${fmtAmt(t.amount)}</td></tr>`).join('')}<tr><th colspan="4" style="text-align:right;">Filtered Total</th><th class="amt">${fmtAmt(filteredTotal)}</th></tr></table></body></html>`;
    const w = window.open('','_blank'); w.document.write(html); w.document.close(); w.print();
  };

  const iS={background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,padding:'7px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',width:'100%'};
  const cS=a=>({display:'inline-block',border:a?'1px solid var(--blue)':'1px solid var(--border2)',borderRadius:14,padding:'4px 10px',fontFamily:'var(--mono)',fontSize:10,color:a?'var(--blue)':'var(--text2)',background:a?'var(--blue-bg)':'var(--bg2)',cursor:'pointer',userSelect:'none',margin:'0 4px 4px 0'});
  const bS=col=>({background:'none',border:`1px solid ${col}`,borderRadius:6,color:col,padding:'5px 12px',fontSize:11,fontFamily:'var(--mono)',cursor:'pointer'});
  const editFromList=()=>{const t=editMode?.type||'';if(t==='Bank→CC'||t==='Bank→Bank'||t==='Bank→Cash')return allBanks.filter(a=>a!=='Cash');if(t==='CC→Bank')return allCC;if(t==='Cash→Bank')return['Cash'];return allAccounts;};
  const editToList=()=>{const t=editMode?.type||'';if(t==='Bank→CC')return allCC;if(t==='Bank→Bank'||t==='Cash→Bank'||t==='CC→Bank')return allBanks.filter(a=>a!=='Cash');if(t==='Bank→Cash')return['Cash'];return allBanks;};
  const nFrom=t=>['Expense','UA Expense','Bank→CC','Bank→Bank','Bank→Cash','CC→Bank'].includes(t);
  const nTo=t=>['Income','UA Received','Bank→CC','Bank→Bank','Cash→Bank','CC→Bank'].includes(t);
  
  return(
    <div className="fade-in">
      <div style={{padding:'10px 16px 0',display:'flex',flexDirection:'column',gap:8}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',letterSpacing:'0.06em',textTransform:'uppercase'}}>FILTERS</div>
          <button onClick={handlePrint} style={{background:'var(--blue)',color:'#fff',border:'none',borderRadius:6,padding:'4px 10px',fontSize:10,fontFamily:'var(--mono)',fontWeight:600,cursor:'pointer'}}>🖨 Print Log</button>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{flex:1,position:'relative'}}><input value={search} onChange={e=>{setSearch(e.target.value);setSelected(null);setEditMode(null);}} placeholder="Search description, category, amount, account..." style={{width:'100%',background:'var(--bg2)',border:'1px solid '+(search?'var(--blue)':'var(--border)'),borderRadius:8,padding:'8px 12px 8px 32px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none'}}/><span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:13,color:'var(--text3)',pointerEvents:'none'}}>⌕</span></div>
          {search&&<button onClick={()=>{setSearch('');setGlobalSearch&&setGlobalSearch('');}} style={{background:'none',border:'none',color:'var(--text3)',fontSize:16,cursor:'pointer',padding:'0 4px'}}>✕</button>}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
          <select value={dateFilter} onChange={e=>{setDateFilter(e.target.value);setSelected(null);setEditMode(null);}} style={{background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'7px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:11,outline:'none',cursor:'pointer'}}><option>This Month</option><option>Last Month</option><option>Past 3 Months</option><option>This Year</option><option>All Time</option><option>Custom</option></select>
          <select value={acctFilter} onChange={e=>{setAcctFilter(e.target.value);}} style={{background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'7px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:11,outline:'none',cursor:'pointer'}}><option value="">All Accounts</option>{allAccounts.map(a=><option key={a} value={a}>{a}</option>)}</select>
          <select value={typeFilter} onChange={e=>{setTypeFilter(e.target.value);}} style={{background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'7px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:11,outline:'none',cursor:'pointer'}}><option value="">All Types</option><option value="INCOME">Income / Deposits</option><option value="EXPENSE">Expense / Withdrawals</option></select>
          {dateFilter==='Custom'&&<><input type="date" value={customStart} onChange={e=>setCustomStart(e.target.value)} style={{background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'7px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:11,outline:'none'}}/><span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>to</span><input type="date" value={customEnd} onChange={e=>setCustomEnd(e.target.value)} style={{background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'7px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:11,outline:'none'}}/></>}
        </div>
      </div>
      <div style={{position:'sticky',top:0,zIndex:10,background:'var(--bg)',borderBottom:'1px solid var(--border)',borderTop:'1px solid var(--border)',marginTop:8}}>
        {filtered.length>0?<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 16px'}}><span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)'}}>{filtered.length} txn{filtered.length!==1?'s':''}{search&&<span style={{color:'var(--blue)',marginLeft:4}}>· "{search}"</span>}</span><div style={{display:'flex',alignItems:'baseline',gap:4}}><span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>Total</span><span style={{fontFamily:'var(--mono)',fontSize:17,fontWeight:700,color:'var(--text)',letterSpacing:'-0.3px'}}>₹{filteredTotal.toLocaleString('en-IN')}</span></div></div>:<div className="empty">{search?`No results for "${search}"`:'No transactions found.'}</div>}
      </div>
      <div style={{marginTop:8}}>
        {filtered.map(t=>(
          <div key={t.id}>
            <div className="txn-row" style={t.status==='voided'?{opacity:0.45}:{}} onClick={()=>{setSelected(selected===t.id?null:t.id);setEditMode(null);}}>
              <div className="txn-left">
                <div className="txn-cat">{typeLabel(t)}{t.tower?' · '+t.tower:''}{t.status==='voided'&&<span style={{marginLeft:6,fontSize:9,color:'var(--red)',fontFamily:'var(--mono)'}}>VOIDED</span>}{t.correction_of&&<span style={{marginLeft:6,fontSize:9,color:'var(--green)',fontFamily:'var(--mono)'}}>CORRECTION</span>}</div>
                <div className="txn-desc" style={t.status==='voided'?{textDecoration:'line-through'}:{}}>{t.particulars||t.category}</div>
                <div className="txn-meta">{fmtDate(t.created_at)} {fmtTime(t.created_at)}{t.category&&t.category!==t.type&&<span style={{color:'var(--text3)',marginLeft:6}}>{t.category}</span>}{t.it_section&&<span style={{color:'var(--green)',marginLeft:6}}>{t.it_section}</span>}</div>
                {selected===t.id&&t.status!=='voided'&&<div style={{marginTop:8,display:'flex',gap:8,flexWrap:'wrap'}}><button onClick={e=>{e.stopPropagation();handleEdit(t);}} style={bS('var(--blue)')}>Edit</button><button onClick={e=>{e.stopPropagation();onDelete(t.id);setSelected(null);}} style={bS('var(--red)')}>Void</button></div>}
              </div>
              <div className="txn-right"><div className={'txn-amt '+amtColor(t)} style={t.status==='voided'?{textDecoration:'line-through'}:{}}>{amtSign(t)}{fmtAmt(t.amount)}</div><div className="txn-acct">{t.from_account||t.to_account}</div>{t.status==='pending'&&<span className="badge badge-pending">pending</span>}</div>
            </div>
            {editMode?.id===t.id&&(
              <div style={{background:'var(--bg2)',border:'1px solid var(--blue)',borderRadius:8,margin:'0 12px 8px',padding:'12px'}}>
                <p style={{fontSize:10,color:'var(--blue)',fontFamily:'var(--mono)',margin:'0 0 10px',fontWeight:600,letterSpacing:'0.06em'}}>CORRECT ENTRY — original will be voided</p>
                <div style={{display:'flex',gap:8,marginBottom:8}}><input value={corrAmt} onChange={e=>setCorrAmt(e.target.value)} placeholder="Amount" type="number" style={{...iS,flex:1}}/><input value={corrDesc} onChange={e=>setCorrDesc(e.target.value)} placeholder="Description" style={{...iS,flex:2}}/></div>
                <input type="date" value={corrDate} max={new Date().toISOString().slice(0,10)} onChange={e=>setCorrDate(e.target.value)} style={{...iS,marginBottom:8,borderColor:corrDate!==new Date(editMode.created_at).toISOString().slice(0,10)?'var(--amber)':'var(--border2)'}}/>
                {editMode.type==='Expense'&&<div style={{marginBottom:8}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:5}}>CATEGORY</div><div style={{display:'flex',flexWrap:'wrap'}}>{allCategories.filter(c=>c.id!=='UA Expense').map(c=><span key={c.id} style={cS(corrCat===c.id)} onClick={()=>setCorrCat(c.id)}>{c.emoji} {c.id}</span>)}</div></div>}
                {nFrom(editMode.type)&&<div style={{marginBottom:8}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:5}}>{editMode.type.includes('→')?'FROM ACCOUNT':'PAID FROM'}</div><div style={{display:'flex',flexWrap:'wrap'}}>{editFromList().map(a=><span key={a} style={cS(corrFrom===a)} onClick={()=>setCorrFrom(a)}>{a}</span>)}</div></div>}
                {nTo(editMode.type)&&<div style={{marginBottom:8}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:5}}>{editMode.type==='Bank→CC'?'CC CARD':editMode.type.includes('→')?'TO ACCOUNT':(editMode.type==='Income'||editMode.type==='UA Received')?'RECEIVED INTO':'TO ACCOUNT'}</div><div style={{display:'flex',flexWrap:'wrap'}}>{editToList().map(a=><span key={a} style={cS(corrTo===a)} onClick={()=>setCorrTo(a)}>{a}</span>)}</div></div>}
                {(editMode.type==='Income'||editMode.type==='UA Received')&&!nTo(editMode.type)&&<div style={{marginBottom:8}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:5}}>RECEIVED INTO</div><div style={{display:'flex',flexWrap:'wrap'}}>{allBanks.map(a=><span key={a} style={cS(corrTo===a)} onClick={()=>setCorrTo(a)}>{a}</span>)}</div></div>}
                <div style={{display:'flex',gap:8}}><button onClick={handleSaveCorr} disabled={saving} style={{flex:1,background:'var(--blue)',border:'none',borderRadius:6,color:'#fff',padding:'9px',fontSize:11,fontFamily:'var(--mono)',fontWeight:600,cursor:'pointer'}}>{saving?'Saving...':'Save correction'}</button><button onClick={()=>setEditMode(null)} style={bS('var(--text3)')}>Cancel</button></div>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

    <div style={{display:'flex',borderBottom:'1px solid var(--border)',padding:'0 16px',marginTop:12}}><button style={tabSel(ccTab==='unbilled')} onClick={()=>setCCTab('unbilled')}>Unbilled ({unbilled.length})</button><button style={tabSel(ccTab==='billed')} onClick={()=>setCCTab('billed')}>Statement Reconcile</button></div>
