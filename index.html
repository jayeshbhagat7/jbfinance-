          Date:s.created_at,
          Site:s.site_name,
          Type:s.type,
          Amount:s.amount,
          Category:s.category||'',
          Party:s.party_name||'',
          SiteUser:s.site_user||'',
          From:s.from_account||'',
          To:s.to_account||'',
          Description:s.description||''
        }));
        const ws=XLSX.utils.json_to_sheet(siteData);
        XLSX.utils.book_append_sheet(wb,ws,'Site Transactions');
      }
      
      // Opening Balances sheet
      if(opening&&opening.length>0){
        const obData=opening.map(o=>({
          Account:o.account_name,
          Amount:o.amount,
          OpeningDate:o.opening_date||''
        }));
        const ws=XLSX.utils.json_to_sheet(obData);
        XLSX.utils.book_append_sheet(wb,ws,'Opening Balances');
      }
      
      // Accounts sheet
      if(accounts&&accounts.length>0){
        const accData=accounts.map(a=>({
          Name:a.name,
          Type:a.type,
          Archived:a.archived?'Yes':'No'
        }));
        const ws=XLSX.utils.json_to_sheet(accData);
        XLSX.utils.book_append_sheet(wb,ws,'Accounts');
      }
      
      // Categories sheet
      if(cats&&cats.length>0){
        const catData=cats.map(c=>({
          Name:c.name,
          Emoji:c.emoji,
          ITSection:c.it||'',
          Archived:c.archived?'Yes':'No'
        }));
        const ws=XLSX.utils.json_to_sheet(catData);
        XLSX.utils.book_append_sheet(wb,ws,'Categories');
      }
      
      // Budgets sheet
      if(budgets&&budgets.length>0){
        const bgData=budgets.map(b=>({
          Month:b.month,
          Year:b.year,
          Category:b.category,
          Limit:b.limit
        }));
        const ws=XLSX.utils.json_to_sheet(bgData);
        XLSX.utils.book_append_sheet(wb,ws,'Budgets');
      }
      
      // Generate file
      const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
      const blob=new Blob([wbout],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
      const timestamp=new Date().toISOString().split('T')[0];
      const filename=`JB_Finance_Backup_${timestamp}.xlsx`;
      
      // Download locally
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;
      a.download=filename;
      a.click();
      URL.revokeObjectURL(url);
      
      setStatus('✅ Backup downloaded successfully!');
      setLoading(false);
      
      // Show Google Drive option
      setTimeout(()=>setShowDriveAuth(true),500);
      
    } catch(err){
      console.error(err);
      setStatus('❌ Backup failed: '+err.message);
      setLoading(false);
    }
  };
  
  const uploadToDrive=()=>{
    setStatus('🔐 Opening Google Drive...');
    // Google Drive file picker
    window.open('https://drive.google.com/drive/my-drive','_blank');
    setStatus('💡 Upload the downloaded Excel file manually to Google Drive');
  };
  
  return(
    <div style={{padding:'12px 16px',display:'flex',flexDirection:'column',gap:12}}>
      <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',lineHeight:1.6}}>
        Export all your financial data to Excel format. Includes transactions, investments, provisions, site data, accounts, categories, and budgets.
      </div>
      
      <button 
        onClick={exportToExcel} 
        disabled={loading}
        style={{
          background:loading?'var(--bg3)':'var(--green)',
          border:'none',
          borderRadius:8,
          color:loading?'var(--text3)':'#000',
          fontFamily:'var(--mono)',
          fontSize:13,
          fontWeight:700,
          padding:'14px',
          cursor:loading?'not-allowed':'pointer',
          transition:'all 0.2s'
        }}>
        {loading?status:'💾 Export to Excel'}
      </button>
      
      {status&&!loading&&(
        <div style={{
          fontFamily:'var(--mono)',
          fontSize:11,
          color:status.startsWith('✅')?'var(--green)':status.startsWith('❌')?'var(--red)':'var(--amber)',
          textAlign:'center',
          padding:'8px',
          background:'var(--bg3)',
          borderRadius:6
        }}>
          {status}
        </div>
      )}
      
      {showDriveAuth&&(
        <div style={{padding:'12px',background:'var(--bg3)',borderRadius:8,border:'1px solid var(--border)'}}>
          <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)',marginBottom:8}}>
            📁 Want to save to Google Drive?
          </div>
          <button 
            onClick={uploadToDrive}
            style={{
              width:'100%',
              background:'var(--blue)',
              border:'none',
              borderRadius:6,
              color:'#fff',
              fontFamily:'var(--mono)',
              fontSize:12,
              fontWeight:600,
              padding:'10px',
              cursor:'pointer'
            }}>
            🔗 Open Google Drive
          </button>
          <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',marginTop:6,textAlign:'center'}}>
            Manually upload the downloaded Excel file
          </div>
        </div>
      )}
      
      <div style={{padding:'10px',background:'var(--bg2)',borderRadius:6,border:'1px dashed var(--border)'}}>
        <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',lineHeight:1.5}}>
          💡 <strong>Tip:</strong> Schedule regular backups (weekly/monthly) and store them in Google Drive or Dropbox for safekeeping.
        </div>
      </div>
    </div>
  );
}

/* ── SettingsScreen — Accordion + Archive soft-delete + Theme picker ── */
function SettingsScreen({opening,onSave,allAccountsH,customAccounts,onSaveAccounts,customCategories,onSaveCategories,budgets,onSaveBudgets,customSites,onSaveSites,customTeam,onSaveTeam,theme,onSaveTheme,customSiteCats,onSaveSiteCats}){
  /* Normalize opening — support both legacy number and new {amount, opening_date} */
  const normalizeOB=ob=>{const r={};Object.entries(ob||{}).forEach(([acc,val])=>{r[acc]=typeof val==='object'&&val!==null?{amount:val.amount||0,opening_date:val.opening_date||''}:{amount:val||0,opening_date:''};});return r;};
  const [ob,setOb]=useState(()=>normalizeOB(opening));const [savedBal,setSavedBal]=useState(false);const [bg,setBg]=useState({...budgets});
  const [newAccName,setNewAccName]=useState('');const [newAccType,setNewAccType]=useState('bank');
  const [newCatName,setNewCatName]=useState('');const [newCatEmoji,setNewCatEmoji]=useState('');const [newCatIT,setNewCatIT]=useState('');
  const [newSite,setNewSite]=useState('');const [newMember,setNewMember]=useState('');

  /* Accounts: add, archive (soft-delete), restore */
  const addAccount=async()=>{const name=newAccName.trim().toUpperCase();if(!name)return;const exists=[...SEED_BANKS,...SEED_CC,...customAccounts.map(a=>a.name)].includes(name);if(exists){alert('Account already exists');return;}await onSaveAccounts([...customAccounts,{name,type:newAccType,archived:false}]);setOb(p=>({...p,[name]:0}));setNewAccName('');};
  const archiveAccount=async name=>{const updated=customAccounts.map(a=>a.name===name?{...a,archived:true}:a);await onSaveAccounts(updated);};
  const restoreAccount=async name=>{const updated=customAccounts.map(a=>a.name===name?{...a,archived:false}:a);await onSaveAccounts(updated);};

  /* Categories: add, archive, restore */
  const addCategory=async()=>{if(!newCatName.trim())return;await onSaveCategories([...customCategories,{name:newCatName.trim(),emoji:newCatEmoji||'•',it:newCatIT,archived:false}]);setNewCatName('');setNewCatEmoji('');setNewCatIT('');};

  const restoreCategory=async name=>{await onSaveCategories(customCategories.map(c=>c.name===name?{...c,archived:false}:c));};

  const addSite=async()=>{const n=newSite.trim().toUpperCase();if(!n||(customSites||[]).includes(n))return;await onSaveSites([...(customSites||[]),n]);setNewSite('');};
  const removeSite=async n=>await onSaveSites((customSites||[]).filter(s=>s!==n));
  const addMember=async()=>{const n=newMember.trim();if(!n||(customTeam||[]).map(m=>m.toLowerCase()).includes(n.toLowerCase()))return;await onSaveTeam([...(customTeam||[]),n]);setNewMember('');};
  const removeMember=async n=>await onSaveTeam((customTeam||[]).filter(m=>m!==n));
  const handleSaveBudgets=async()=>await onSaveBudgets(bg);

  const DEFAULT_SITE_CATS=['Misc','Transportation','Labour Salary','Kharchi','Medical','Hardware','Maintenance','Food','Udhari','Stationary','Fuel','Travelling'];
  const addSiteCat=async()=>{const n=newSiteCat.trim();if(!n||DEFAULT_SITE_CATS.map(c=>c.toLowerCase()).includes(n.toLowerCase())||(customSiteCats||[]).map(c=>c.toLowerCase()).includes(n.toLowerCase()))return;await onSaveSiteCats([...(customSiteCats||[]),n]);setNewSiteCat('');};
  const removeSiteCat=async n=>await onSaveSiteCats((customSiteCats||[]).filter(c=>c!==n));

  const iS={background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',width:'100%'};
  const btnS=col=>({background:'none',border:`1px solid ${col}`,borderRadius:6,color:col,padding:'5px 10px',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer'});

  </div>);
  const budgetCats=[...new Set([...['Household','Fuel','Food','Lifestyle','Maintenance','Travelling','Social','Donation','Child Education','Mobile Recharge'],...Object.keys(budgets)])];
  const THEMES=[{id:'autumn',label:'Deep Autumn',bg:'#faf6f0',accent:'#5a8a1a'},{id:'midnight',label:'Exec Midnight',bg:'#0a0d12',accent:'#00d4aa'},{id:'nordic',label:'Nordic Light',bg:'#f7f9fc',accent:'#38a169'},{id:'terminal',label:'Terminal Quant',bg:'#070a07',accent:'#00ff77'}];

  return(<div className="fade-in" style={{paddingBottom:40}}>

    {/* PIN Lock */}
    <Acc id="pin" title="PIN Lock" emoji="🔒">
      <PinSettingsPanel/>
    </Acc>

    {/* Data Backup */}
    <Acc id="backup" title="Data Backup" emoji="💾">
      <DataBackupPanel/>
    </Acc>

    {/* Theme Picker */}
    <Acc id="theme" title="Theme" emoji="🎨">
      <div style={{padding:'14px 16px'}}>
        <p style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',marginBottom:12}}>Select your colour theme. Changes apply instantly.</p>
        <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
          {THEMES.map(t=>(
            <div key={t.id} onClick={()=>onSaveTheme(t.id)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6,cursor:'pointer'}}>
              <div style={{width:52,height:40,borderRadius:8,background:t.bg,border:theme===t.id?`2px solid ${t.accent}`:'2px solid transparent',display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.2s',boxShadow:theme===t.id?`0 0 0 2px ${t.accent}`:'none'}}>
                <div style={{width:16,height:16,borderRadius:4,background:t.accent}}/>
              </div>
              <span style={{fontFamily:'var(--mono)',fontSize:9,color:theme===t.id?'var(--green)':'var(--text3)',textAlign:'center',letterSpacing:'0.04em'}}>{t.label}</span>
            </div>
          ))}
        </div>
      </div>
    </Acc>

    {/* Manage Accounts */}
    <Acc id="accounts" title="Manage Accounts" emoji="🏦">
      <div style={{padding:'12px 16px',display:'flex',flexDirection:'column',gap:8}}>
        <input style={iS} placeholder="Account name e.g. ICICI CC" value={newAccName} onChange={e=>setNewAccName(e.target.value.toUpperCase())}/>
        <div style={{display:'flex',gap:8}}><div className={'chip'+(newAccType==='bank'?' sel':'')} style={{flex:1,textAlign:'center'}} onClick={()=>setNewAccType('bank')}>Bank / Cash</div><div className={'chip'+(newAccType==='cc'?' sel':'')} style={{flex:1,textAlign:'center'}} onClick={()=>setNewAccType('cc')}>Credit Card</div></div>
        <button onClick={addAccount} style={{background:'var(--green)',border:'none',borderRadius:8,color:'#000',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:'10px',cursor:'pointer'}}>+ Add Account</button>
      </div>
      <div style={{padding:'0 16px 4px'}}><p style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginBottom:4}}>ACTIVE</p>
        {customAccounts.filter(a=>!a.archived).map(a=><div key={a.name} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--border)'}}><div><span style={{fontFamily:'var(--mono)',fontSize:13,color:'var(--text)'}}>{a.name}</span><span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginLeft:8}}>{a.type==='cc'?'CC':'Bank'}</span></div><button onClick={()=>archiveAccount(a.name)} style={btnS('var(--amber)')}>Archive</button></div>)}
        {customAccounts.filter(a=>!a.archived).length===0&&<p style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',padding:'8px 0'}}>No custom accounts added yet.</p>}
      </div>
      {customAccounts.filter(a=>a.archived).length>0&&<div style={{padding:'0 16px 12px'}}><p style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginBottom:4,marginTop:8}}>ARCHIVED (excluded from dropdowns, preserved in history)</p>
        {customAccounts.filter(a=>a.archived).map(a=><div key={a.name} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--border)',opacity:0.6}}><span style={{fontFamily:'var(--mono)',fontSize:13,color:'var(--text3)'}}>{a.name}</span><button onClick={()=>restoreAccount(a.name)} style={btnS('var(--blue)')}>Restore</button></div>)}
      </div>}
    </Acc>

    {/* Manage Categories */}
    <Acc id="categories" title="Manage Categories" emoji="🏷">
      <div style={{padding:'12px 16px',display:'flex',flexDirection:'column',gap:8}}>
        <input style={iS} placeholder="Category name" value={newCatName} onChange={e=>setNewCatName(e.target.value)}/>
        <div style={{display:'flex',gap:8}}><input style={{...iS,width:80,flexShrink:0}} placeholder="Emoji" value={newCatEmoji} onChange={e=>setNewCatEmoji(e.target.value)} maxLength={2}/><select value={newCatIT} onChange={e=>setNewCatIT(e.target.value)} style={{...iS,flex:1}}><option value="">No IT section</option><option value="80C">80C</option><option value="80D">80D</option><option value="80G">80G</option><option value="80CCD">80CCD(1B)</option><option value="24b">24(b)</option></select></div>
        <button onClick={addCategory} style={{background:'var(--blue)',border:'none',borderRadius:8,color:'#fff',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:'10px',cursor:'pointer'}}>+ Add Category</button>
      </div>
      <div style={{padding:'0 16px 4px'}}>
        {customCategories.filter(c=>!c.archived).map(c=><div key={c.name} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--border)'}}><div><span style={{marginRight:6}}>{c.emoji}</span><span style={{fontFamily:'var(--mono)',fontSize:13,color:'var(--text)'}}>{c.name}</span>{c.it&&<span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--green)',marginLeft:8}}>{c.it}</span>}</div><button onClick={()=>archiveCategory(c.name)} style={btnS('var(--amber)')}>Archive</button></div>)}
        {customCategories.filter(c=>c.archived).length>0&&<><p style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginTop:8,marginBottom:4}}>ARCHIVED</p>{customCategories.filter(c=>c.archived).map(c=><div key={c.name} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--border)',opacity:0.6}}><span style={{fontFamily:'var(--mono)',fontSize:13,color:'var(--text3)'}}>{c.emoji} {c.name}</span><button onClick={()=>restoreCategory(c.name)} style={btnS('var(--blue)')}>Restore</button></div>)}</>}
      </div>
    </Acc>

    {/* Sites & Team */}
    <Acc id="sites" title="Sites & Team" emoji="🏗">
      <div style={{padding:'12px 16px',display:'flex',flexDirection:'column',gap:8}}>
        <p style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginBottom:2}}>SITES</p>
        <div style={{display:'flex',gap:8}}><input style={{...iS,flex:1}} placeholder="Site name e.g. D5" value={newSite} onChange={e=>setNewSite(e.target.value.toUpperCase())}/><button onClick={addSite} style={{background:'var(--green)',border:'none',borderRadius:8,color:'#000',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:'8px 14px',cursor:'pointer'}}>+ Add</button></div>
        {(customSites||[]).map(s=><div key={s} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid var(--border)'}}><span style={{fontFamily:'var(--mono)',fontSize:13,color:'var(--text)'}}>{s}</span><button onClick={()=>removeSite(s)} style={btnS('var(--red)')}>Remove</button></div>)}
        <p style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginTop:8,marginBottom:2}}>TEAM MEMBERS</p>
        <div style={{display:'flex',gap:8}}><input style={{...iS,flex:1}} placeholder="Member name" value={newMember} onChange={e=>setNewMember(e.target.value)}/><button onClick={addMember} style={{background:'var(--blue)',border:'none',borderRadius:8,color:'#fff',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:'8px 14px',cursor:'pointer'}}>+ Add</button></div>
        {(customTeam||[]).map(m=><div key={m} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid var(--border)'}}><span style={{fontFamily:'var(--mono)',fontSize:13,color:'var(--text)'}}>{m}</span><button onClick={()=>removeMember(m)} style={btnS('var(--red)')}>Remove</button></div>)}
      </div>
    </Acc>

    {/* Site Categories */}
    <Acc id="site_cats" title="Site Categories" emoji="🏗">
      <div style={{padding:'12px 16px',display:'flex',flexDirection:'column',gap:8}}>
        <p style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginBottom:2}}>DEFAULT (cannot remove)</p>
        <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:8}}>
          {DEFAULT_SITE_CATS.map(c=><span key={c} style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:20,padding:'4px 10px'}}>{c}</span>)}
        </div>
        <p style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginBottom:2}}>ADD CUSTOM</p>
        <div style={{display:'flex',gap:8}}>
          <input style={{...iS,flex:1}} placeholder="e.g. Safety Equipment" value={newSiteCat} onChange={e=>setNewSiteCat(e.target.value)}/>
          <button onClick={addSiteCat} style={{background:'var(--green)',border:'none',borderRadius:8,color:'#000',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:'8px 14px',cursor:'pointer'}}>+ Add</button>
        </div>
        {(customSiteCats||[]).length===0&&<p style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',padding:'4px 0'}}>No custom categories added yet.</p>}
        {(customSiteCats||[]).map(c=><div key={c} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid var(--border)'}}><span style={{fontFamily:'var(--mono)',fontSize:13,color:'var(--text)'}}>{c}</span><button onClick={()=>removeSiteCat(c)} style={btnS('var(--red)')}>Remove</button></div>)}
      </div>
    </Acc>

    {/* Monthly Budgets */}
    <Acc id="budgets" title="Monthly Budgets" emoji="📊">
      <p style={{padding:'8px 16px 4px',fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)'}}>Set limit per category. Dashboard shows red when exceeded.</p>
      {budgetCats.map(c=><div key={c} className="settings-row"><span style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--text)'}}>{c}</span><input type="number" style={{width:120,textAlign:'right'}} value={bg[c]||''} placeholder="no limit" onChange={e=>setBg(p=>({...p,[c]:parseFloat(e.target.value)||0}))}/></div>)}
      <div style={{padding:'10px 16px 14px'}}><button onClick={handleSaveBudgets} style={{background:'var(--blue)',border:'none',color:'#fff',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,borderRadius:8,padding:12,width:'100%',cursor:'pointer'}}>Save Budgets</button></div>
    </Acc>

    {/* Opening Balances */}
    <Acc id="balances" title="Opening Balances" emoji="₹">
      <p style={{padding:'8px 16px 4px',fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)'}}>Set the balance each account had on its opening date. Only transactions on/after that date are counted. CC: enter negative for dues (e.g. −9342).</p>
      {[...allAccountsH,'Site Cash',...(customTeam||[])].map(a=>{
        const val=ob[a]||{amount:0,opening_date:''};
        return(<div key={a} style={{borderBottom:'1px solid var(--border)',padding:'10px 16px'}}>
          <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)',marginBottom:6,fontWeight:600}}>{a}</div>
          <div style={{display:'flex',gap:8}}>
            <input type="text" inputMode="decimal" style={{flex:'0 0 130px',textAlign:'right'}} value={val.amount||''} placeholder="0"
              onChange={e=>setOb(p=>({...p,[a]:{...(p[a]||{}),amount:parseFloat(e.target.value)||0}}))}/>
            <input type="date" style={{flex:1}} value={val.opening_date||''}
              onChange={e=>setOb(p=>({...p,[a]:{...(p[a]||{}),opening_date:e.target.value}}))}/>
          </div>
          {val.opening_date&&<div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',marginTop:4}}>Only txns from {val.opening_date} count toward balance</div>}
        </div>);
      })}
      <div style={{padding:'14px 16px'}}><button onClick={handleSaveBal} style={{background:savedBal?'var(--green-bg)':'var(--green)',border:savedBal?'1px solid var(--green)':'none',color:savedBal?'var(--green)':'#000',fontFamily:'var(--mono)',fontSize:13,fontWeight:600,borderRadius:10,padding:14,width:'100%',cursor:'pointer',transition:'all 0.2s'}}>{savedBal?'✓ Saved':'Save Opening Balances'}</button></div>
    </Acc>

    <p className="sec-label">About</p>
    <div style={{padding:'0 16px 40px',fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',lineHeight:2}}>JB Finance v2.0-DVE (CFO OS)<br/>Built for Jayesh Bhagat<br/>Umiya Associates · Mumbai<br/>Auth: Supabase Email/Password<br/>v2.0-DVE: Decoupled Virtual Envelope architecture · computeProvisions engine · Provision_Accrue/Withdraw/Repay/Flush types · True Free Liquidity = Bank − CC − Net Blocked · No Bank→Bank transfers for provisions · Dual-write Flush (virtual + physical debit)<br/>v1.9.2: Minimal dashboard · Bank+CC in hero · Site form simplification · Input bug fix</div>
  </div>);
}
/* ── RENDER ── */
const rootEl = document.getElementById('root');
const bootScreen = document.getElementById('boot-screen');
if(bootScreen) bootScreen.remove();
const root = ReactDOM.createRoot(rootEl);
root.render(<App />);
</script>
