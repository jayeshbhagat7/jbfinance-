<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JB Finance</title>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: Arial; padding: 20px; }
    .metric { margin-bottom: 10px; }
    .txn-row { display:flex; justify-content:space-between; margin:5px 0; }
  </style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

// ---------- HELPERS ----------
function fmtAmt(n) {
  return "₹ " + Number(n || 0).toLocaleString();
}

// ---------- TYPES ----------
const TYPES = [
  'Expense','Income','Bank→CC','Bank→Bank','UA Expense','UA Received'
];

// ---------- SAMPLE DATA (TEMP) ----------
const sampleTxns = [
  { type:'Expense', amount:1000, from_account:'Cash', particulars:'Food' },
  { type:'UA Expense', amount:2000, from_account:'Bank', particulars:'Friend loan' },
  { type:'UA Received', amount:500, to_account:'Cash', particulars:'Returned' }
];

const opening = { Cash: 5000, Bank: 10000 };

// ---------- LOGIC ----------
function computeBalances(opening, txns) {
  const bal = { ...opening };

  txns.forEach(t => {
    const amt = Number(t.amount) || 0;

    if (t.type === 'Expense' || t.type === 'UA Expense') {
      if (t.from_account) bal[t.from_account] -= amt;
    }

    if (t.type === 'Income' || t.type === 'UA Received') {
      if (t.to_account) bal[t.to_account] += amt;
    }
  });

  return bal;
}

function calculateUA(txns) {
  const exp = txns.filter(t=>t.type==='UA Expense')
                 .reduce((s,t)=>s+Number(t.amount),0);

  const rec = txns.filter(t=>t.type==='UA Received')
                 .reduce((s,t)=>s+Number(t.amount),0);

  return exp - rec;
}

// ---------- UI ----------
function App() {

  const balances = computeBalances(opening, sampleTxns);
  const ua = calculateUA(sampleTxns);

  return (
    <div>
      <h2>JB Finance Dashboard</h2>

      <div className="metric">
        UA Outstanding: {fmtAmt(ua)}
      </div>

      <h3>Balances</h3>
      {Object.entries(balances).map(([k,v])=>(
        <div key={k} className="txn-row">
          <div>{k}</div>
          <div>{fmtAmt(v)}</div>
        </div>
      ))}
    </div>
  );
}

// ---------- RENDER ----------
ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
