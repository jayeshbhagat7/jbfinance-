        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:8,padding:'8px 12px',background:'var(--bg3)',borderBottom:'1px solid var(--border)'}}><span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase'}}>Description</span><span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase'}}>Category</span><span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',textAlign:'right'}}>Spend</span></div>
        {[...billedTxns].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).map((t,i)=>(
          <div key={t.id} style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:8,padding:'10px 12px',borderBottom:'1px solid var(--border)',background:i%2===0?'var(--bg2)':'var(--bg)'}}>
            <div style={{minWidth:0}}><div style={{fontSize:12,color:'var(--text)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{t.particulars||t.category}</div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:2}}>{fmtDate(t.created_at)}</div></div>
            <div><div style={{fontSize:11,color:'var(--text2)',fontFamily:'var(--mono)'}}>{t.category}</div></div>
            <div style={{textAlign:'right'}}><div style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:600,color:'var(--red)'}}>−{fmtAmt(t.amount)}</div></div>
          </div>
        ))}
        <div onClick={()=>{if(billedTotal>0&&setTab&&setTxnFilter){setTxnFilter({account:selCC,type:null,dateRange:{start:billStart,end:billEnd},category:null});setTab('txns');}}} style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:8,padding:'10px 12px',background:'var(--red-bg)',fontWeight:700,cursor:billedTotal>0?'pointer':'default'}}><div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)'}}>TOTAL IN PERIOD</div><div/><div style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:13,color:'var(--red)'}}>−{fmtAmt(billedTotal)}</div></div>
      </div>}
      {billedTxns.length===0&&billStart&&billEnd&&<div className="empty">No transactions for {selCC} between {fmtDate(billStart)} and {fmtDate(billEnd)}.</div>}
    </div>)}
  </div>);
}

/* ── SiteLedgerScreen v2.0 — Mobile Bank-Statement Ledger ── */
function SiteLedgerScreen({txns,customSites,customTeam,opening}){
  const sites=customSites||[];
  const [selSite,setSelSite]=useState('ALL');
  const [selMember,setSelMember]=useState(null);
  const [periodFilter,setPeriodFilter]=useState('this_month');
  const now=new Date();const curMonth=now.getMonth();const curYear=now.getFullYear();
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  const siteTxns=txns.filter(t=>t.domain==='Site'&&t.status!=='voided');

  const inPeriod=t=>{
    const d=new Date(t.created_at);
    if(periodFilter==='this_month')return d.getMonth()===curMonth&&d.getFullYear()===curYear;
    if(periodFilter==='last_month'){const lm=curMonth===0?11:curMonth-1,ly=curMonth===0?curYear-1:curYear;return d.getMonth()===lm&&d.getFullYear()===ly;}
    if(periodFilter==='this_year')return d.getFullYear()===curYear;
    return true;
  };

  const scOpening=(()=>{const v=opening['Site Cash'];if(!v)return 0;if(typeof v==='object')return v.amount||0;return v||0;})();
  const scOpeningDate=(()=>{const v=opening['Site Cash'];if(v&&typeof v==='object')return v.opening_date||null;return null;})();

  const getDebitCredit=t=>{
    const amt=parseFloat(t.amount)||0;
    if(t.type==='Expense')return{debit:amt,credit:0};
    if(t.type==='Income')return{debit:0,credit:amt};
    if(t.type==='Site Transfer'){
      if(t.from_account==='Site Cash'||(!t.to_account&&t.from_account))return{debit:amt,credit:0};
      if(t.to_account==='Site Cash')return{debit:0,credit:amt};
      return{debit:amt,credit:0};
    }
    if(t.type==='Bank\u2192Bank'){
      if(t.from_account==='Site Cash')return{debit:amt,credit:0};
      if(t.to_account==='Site Cash')return{debit:0,credit:amt};
    }
    return{debit:amt,credit:0};
  };

  const filteredTxns=[...siteTxns]
    .filter(t=>selSite==='ALL'?true:t.site_name===selSite)
    .filter(t=>inPeriod(t))
    .sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));

  const txnsBeforePeriod=[...siteTxns]
    .filter(t=>selSite==='ALL'?true:t.site_name===selSite)
    .filter(t=>!inPeriod(t)&&(filteredTxns.length===0||new Date(t.created_at)<new Date(filteredTxns[0].created_at)));
  const openingBal=txnsBeforePeriod.reduce((s,t)=>{const{debit,credit}=getDebitCredit(t);return s-debit+credit;},scOpening);

  let runBal=openingBal;
  const rows=filteredTxns.map(t=>{
    const{debit,credit}=getDebitCredit(t);
    runBal=runBal-debit+credit;
    const party=t.party_name||t.site_user;
    const desc=t.particulars||(party?(t.type==='Income'?'Received from '+party:'Given to '+party):null)||t.category||t.type;
    const acct=t.type==='Site Transfer'?(t.from_account||t.to_account||'—'):(t.from_account&&t.from_account!=='Site Cash'?t.from_account:(t.to_account&&t.to_account!=='Site Cash'?t.to_account:t.from_account||t.to_account||'—'));
    return{...t,debit,credit,runBal,desc,acct};
  });

  const totDebit=rows.reduce((s,r)=>s+r.debit,0);
  const totCredit=rows.reduce((s,r)=>s+r.credit,0);
  const closeBal=openingBal-totDebit+totCredit;

  /* getMemberBalance — counts Expense, Income, Bank→Bank, Site Transfer */
  const getMemberTxns=m=>siteTxns.filter(t=>(t.party_name===m||t.site_user===m));
  const getMemberBalance=m=>{
    const mt=getMemberTxns(m);
    const given=mt.filter(t=>t.type==='Expense'||(t.type==='Bank\u2192Bank'&&t.to_account===m)||(t.type==='Site Transfer'&&(t.to_account===m||(!t.to_account&&t.from_account)))).reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
    const received=mt.filter(t=>t.type==='Income'||(t.type==='Bank\u2192Bank'&&t.from_account===m)||(t.type==='Site Transfer'&&t.from_account===m)).reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
    return{given,received,net:given-received,count:mt.length};
  };

  const partiesInTxns=[...new Set(siteTxns.map(t=>t.party_name||t.site_user).filter(Boolean))];
  const activeMembers=[...new Set([...partiesInTxns,...(customTeam||[])])];

  const chipS=a=>({fontFamily:'var(--mono)',fontSize:10,padding:'5px 12px',borderRadius:20,border:a?'1px solid var(--green)':'1px solid var(--border2)',color:a?'var(--green)':'var(--text2)',background:a?'var(--green-bg)':'var(--bg2)',cursor:'pointer',userSelect:'none',whiteSpace:'nowrap'});

  const handlePrint=()=>{
    const periodLabel=periodFilter==='this_month'?`${MONTHS[curMonth]} ${curYear}`:periodFilter==='last_month'?`${MONTHS[curMonth===0?11:curMonth-1]} ${curMonth===0?curYear-1:curYear}`:periodFilter==='this_year'?`FY ${curYear}`:'All Time';
    const html=`<!DOCTYPE html><html><head><title>Site Ledger ${periodLabel}</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:16px;color:#111;}h1{font-size:13px;margin-bottom:2px;}h2{font-size:10px;color:#555;margin-bottom:12px;}table{width:100%;border-collapse:collapse;margin-top:8px;}th{background:#1a1a2e;color:#fff;padding:6px 8px;text-align:left;font-size:8px;text-transform:uppercase;letter-spacing:.06em;}td{padding:6px 8px;border-bottom:1px solid #e0e0e0;}.amt{text-align:right;white-space:nowrap;}.dr{color:#c0392b;}.cr{color:#27ae60;}.balp{color:#27ae60;font-weight:700;}.baln{color:#c0392b;font-weight:700;}.op{background:#f5f5f5;font-weight:600;}.cl{background:#e8f5e9;font-weight:700;}.sumg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}.sb{border:1px solid #ddd;padding:8px;border-radius:4px;}.sl{font-size:7px;text-transform:uppercase;color:#888;margin-bottom:3px;}.sv{font-size:12px;font-weight:700;}@media print{body{padding:8px;}}</style></head><body><h1>Site Ledger — ${selSite==='ALL'?'All Sites':selSite}</h1><h2>${periodLabel} · ${rows.length} txns · ${new Date().toLocaleString('en-IN')}</h2><div class="sumg"><div class="sb"><div class="sl">Opening</div><div class="sv ${openingBal<0?'baln':'balp'}">${openingBal<0?'−':''}&#8377;${Math.abs(openingBal).toLocaleString('en-IN',{minimumFractionDigits:2})}</div></div><div class="sb"><div class="sl">Expense</div><div class="sv dr">&#8377;${totDebit.toLocaleString('en-IN',{minimumFractionDigits:2})}</div></div><div class="sb"><div class="sl">Income</div><div class="sv cr">&#8377;${totCredit.toLocaleString('en-IN',{minimumFractionDigits:2})}</div></div></div><table><thead><tr><th width="9%">Date</th><th width="28%">Description</th><th width="13%">Category</th><th width="12%">Account</th><th width="12%" class="amt">Income</th><th width="12%" class="amt">Expense</th><th width="14%" class="amt">Balance</th></tr></thead><tbody><tr class="op"><td colspan="4">OPENING BALANCE</td><td class="amt">—</td><td class="amt">—</td><td class="amt ${openingBal<0?'baln':'balp'}">${openingBal<0?'−':''}&#8377;${Math.abs(openingBal).toLocaleString('en-IN',{minimumFractionDigits:2})}</td></tr>${rows.map(r=>`<tr><td>${fmtDate(r.created_at)}</td><td>${r.desc||'—'}</td><td>${r.type==='Site Transfer'?'Site Transfer':(r.category||'—')}</td><td>${r.acct}</td><td class="amt cr">${r.credit>0?'&#8377;'+r.credit.toLocaleString('en-IN',{minimumFractionDigits:2}):'—'}</td><td class="amt dr">${r.debit>0?'&#8377;'+r.debit.toLocaleString('en-IN',{minimumFractionDigits:2}):'—'}</td><td class="amt ${r.runBal<0?'baln':'balp'}">${r.runBal<0?'−':''}&#8377;${Math.abs(r.runBal).toLocaleString('en-IN',{minimumFractionDigits:2})}</td></tr>`).join('')}<tr class="cl"><td colspan="4">CLOSING BALANCE</td><td class="amt cr">&#8377;${totCredit.toLocaleString('en-IN',{minimumFractionDigits:2})}</td><td class="amt dr">&#8377;${totDebit.toLocaleString('en-IN',{minimumFractionDigits:2})}</td><td class="amt ${closeBal<0?'baln':'balp'}">${closeBal<0?'−':''}&#8377;${Math.abs(closeBal).toLocaleString('en-IN',{minimumFractionDigits:2})}</td></tr></tbody></table></body></html>`;
    const w=window.open('','_blank');w.document.write(html);w.document.close();w.print();
  };

  /* ── BACKUP: CSV export + Google Drive upload ── */
  const buildCSV=()=>{
    const periodLabel=periodFilter==='this_month'?`${MONTHS[curMonth]} ${curYear}`:periodFilter==='last_month'?`${MONTHS[curMonth===0?11:curMonth-1]} ${curMonth===0?curYear-1:curYear}`:periodFilter==='this_year'?`FY ${curYear}`:'All Time';
    const headers=['Date','Description','Type','Category','Mode / Account','Party','Site','Income (INR)','Expense (INR)','Balance (INR)'];
    let bal=openingBal;
    const dataRows=rows.map(r=>{
      const income=r.credit>0?r.credit.toFixed(2):'';
      const expense=r.debit>0?r.debit.toFixed(2):'';
      bal=bal-r.debit+r.credit;
      const cat=r.type==='Site Transfer'?'Site Transfer':(r.category||'');
      return [fmtDate(r.created_at),r.desc||'',r.type,cat,r.acct||'',r.party_name||r.site_user||'',r.site_name||'',income,expense,bal.toFixed(2)].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',');
    });
    return [
      `"Site Ledger — ${selSite==='ALL'?'All Sites':selSite} — ${periodLabel}"`,
      '',
      headers.map(h=>`"${h}"`).join(','),
      ...dataRows,
      '',
      `"Opening Balance","","","","","","","","","${openingBal.toFixed(2)}"`,
      `"Closing Balance","","","","","","","","","${closeBal.toFixed(2)}"`,
      `"Total Income","","","","","","","${totCredit.toFixed(2)}","",""`,
      `"Total Expense","","","","","","","","${totDebit.toFixed(2)}",""`,
    ].join('\n');
  };

  const handleDownloadCSV=()=>{
    const csv=buildCSV();
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const periodLabel=periodFilter==='this_month'?`${MONTHS[curMonth]}_${curYear}`:periodFilter==='last_month'?`${MONTHS[curMonth===0?11:curMonth-1]}_${curMonth===0?curYear-1:curYear}`:periodFilter==='this_year'?`FY${curYear}`:'All';
    a.href=url;a.download=`SiteLedger_${selSite==='ALL'?'All':selSite}_${periodLabel}.csv`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    showToastSL('CSV downloaded — open in Google Sheets or Excel');
  };

  const [driveStatus,setDriveStatus]=useState('');
  const [driveUploading,setDriveUploading]=useState(false);
  const DRIVE_CLIENT_ID=localStorage.getItem('jbf_drive_client_id')||'';

  const handleDriveBackup=async()=>{
    if(!DRIVE_CLIENT_ID){
      const id=window.prompt('Enter your Google OAuth Client ID (one-time setup):\n\nGet it from console.cloud.google.com → APIs → Credentials\nScope needed: drive.file');
      if(!id)return;
      localStorage.setItem('jbf_drive_client_id',id.trim());
      window.location.reload();return;
    }
    setDriveUploading(true);setDriveStatus('Connecting to Google...');
    try{
      if(!window.google?.accounts?.oauth2){
        await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://accounts.google.com/gsi/client';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
      }
      const accessToken=await new Promise((resolve,reject)=>{
        const client=window.google.accounts.oauth2.initTokenClient({
          client_id:DRIVE_CLIENT_ID,
          scope:'https://www.googleapis.com/auth/drive.file',
          callback:(resp)=>{if(resp.error){reject(new Error(resp.error));}else{resolve(resp.access_token);}}
        });
        client.requestAccessToken();
      });
      setDriveStatus('Uploading...');
      const csv=buildCSV();
      const periodLabel=periodFilter==='this_month'?`${MONTHS[curMonth]}_${curYear}`:periodFilter==='last_month'?`${MONTHS[curMonth===0?11:curMonth-1]}_${curMonth===0?curYear-1:curYear}`:periodFilter==='this_year'?`FY${curYear}`:'All';
      const filename=`SiteLedger_${selSite==='ALL'?'All':selSite}_${periodLabel}_${new Date().toISOString().slice(0,10)}.csv`;
      const boundary='jbf_bnd';
      const meta=JSON.stringify({name:filename,mimeType:'application/vnd.google-apps.spreadsheet'});
      const body=`--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${meta}\r\n--${boundary}\r\nContent-Type: text/csv\r\n\r\n${csv}\r\n--${boundary}--`;
      const resp=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
        method:'POST',
        headers:{'Authorization':'Bearer '+accessToken,'Content-Type':`multipart/related; boundary=${boundary}`},
        body
      });
      if(!resp.ok)throw new Error('Upload failed '+resp.status);
      const result=await resp.json();
      setDriveStatus(`Saved: ${filename}`);
      showToastSL('Backed up to Google Drive as Spreadsheet!');
    }catch(e){
      setDriveStatus('Error: '+e.message);
    }
    setDriveUploading(false);
  };

  const showToastSL=msg=>{
    const el=document.createElement('div');
    el.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg4,#1a1a2e);color:var(--text,#e8ecf4);padding:10px 18px;border-radius:10px;font-family:monospace;font-size:12px;z-index:999;white-space:nowrap;border:1px solid var(--border2,#243655);';
    el.textContent=msg;document.body.appendChild(el);
    setTimeout(()=>{if(document.body.contains(el))document.body.removeChild(el);},3500);
  };

  /* ── MEMBER DRILL-DOWN ── */
  if(selMember){
    const mt=[...getMemberTxns(selMember)].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    const{given,received,net}=getMemberBalance(selMember);
    let mBal=0;
    const mRows=mt.map(t=>{const{debit,credit}=getDebitCredit(t);mBal=mBal-debit+credit;return{...t,debit,credit,mBal,desc:t.particulars||t.category||t.type,acct:t.from_account||t.to_account||'—'};});
    return(<div className="fade-in" style={{paddingBottom:32}}>
      <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',borderBottom:'1px solid var(--border)',background:'var(--bg2)'}}>
        <div onClick={()=>setSelMember(null)} style={{cursor:'pointer',color:'var(--blue)',fontFamily:'var(--mono)',fontSize:12,padding:'4px 10px',border:'1px solid var(--blue)',borderRadius:6}}>← Back</div>
        <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>{selMember}</div><div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginTop:1}}>{mt.length} entries</div></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',borderBottom:'1px solid var(--border)'}}>
        {[['Given',given,'var(--red)'],['Received',received,'var(--green)'],['Net',Math.abs(net),net>0?'var(--amber)':'var(--green)']].map(([l,v,c])=>(
          <div key={l} style={{padding:'10px 12px',borderRight:'1px solid var(--border)'}}>
            <div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)',textTransform:'uppercase',marginBottom:3}}>{l}</div>
            <div style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:700,color:c}}>{l==='Net'&&net<0?'−':''}{fmtAmt(v)}</div>
          </div>
        ))}
      </div>
      {net!==0&&<div style={{padding:'7px 14px',background:net>0?'var(--amber-bg)':'var(--green-bg)',borderBottom:'1px solid var(--border)',fontFamily:'var(--mono)',fontSize:11,color:net>0?'var(--amber)':'var(--green)',fontWeight:600}}>{net>0?`\u26a0 We gave \u20b9${fmt(net)} more`:`\u2713 Received \u20b9${fmt(Math.abs(net))} more`}</div>}
      <div style={{display:'grid',gridTemplateColumns:'46px 1fr minmax(80px,auto) minmax(80px,auto)',padding:'6px 12px',background:'var(--bg3)',borderBottom:'1px solid var(--border)'}}>
        {['Date','Description','Exp/Inc','Balance'].map((h,i)=><span key={h} style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)',textTransform:'uppercase',textAlign:i>1?'right':'left'}}>{h}</span>)}
      </div>
      {mRows.length===0&&<div className="empty">No transactions yet.</div>}
      {mRows.map((r,i)=>(
        <div key={r.id} style={{padding:'9px 12px',borderBottom:'1px solid var(--border)',background:i%2===0?'var(--bg2)':'var(--bg)'}}>
          <div style={{display:'grid',gridTemplateColumns:'46px 1fr minmax(80px,auto) minmax(80px,auto)',marginBottom:3}}>
            <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)'}}>{fmtDate(r.created_at)}</span>
            <div style={{minWidth:0,paddingRight:4}}><div style={{fontSize:12,color:'var(--text)',fontWeight:500,wordBreak:'break-word',lineHeight:1.3}}>{r.desc}</div></div>
            <span style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:r.debit>0?'var(--red)':'var(--green)',textAlign:'right',whiteSpace:'nowrap'}}>{r.debit>0?'−'+fmtAmt(r.debit):'+'+fmtAmt(r.credit)}</span>
            <span style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:r.mBal<0?'var(--red)':'var(--green)',textAlign:'right',whiteSpace:'nowrap'}}>{r.mBal<0?'−':''}{fmtAmt(Math.abs(r.mBal))}</span>
          </div>
          <div style={{display:'flex',gap:4,flexWrap:'wrap',paddingLeft:52}}>{r.category&&<span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',background:'var(--bg3)',padding:'1px 5px',borderRadius:4}}>{r.category}</span>}{r.acct&&r.acct!=='—'&&<span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--blue)',background:'var(--blue-bg)',padding:'1px 5px',borderRadius:4}}>{r.acct}</span>}</div>
        </div>
      ))}
    </div>);
  }

  /* ── MAIN VIEW ── */
  const periodLabel=periodFilter==='this_month'?`${MONTHS[curMonth]} ${curYear}`:periodFilter==='last_month'?`${MONTHS[curMonth===0?11:curMonth-1]} ${curMonth===0?curYear-1:curYear}`:periodFilter==='this_year'?`FY ${curYear}`:'All Time';

  return(<div className="fade-in" style={{paddingBottom:40}}>

    {/* Summary strip */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',background:'var(--bg2)',borderBottom:'1px solid var(--border)'}}>
      {[['Opening',openingBal,'var(--text)'],['Expense',totDebit,'var(--red)'],['Income',totCredit,'var(--green)']].map(([l,v,c])=>(
        <div key={l} style={{padding:'10px 12px',borderRight:'1px solid var(--border)'}}>
          <div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:3}}>{l}</div>
          <div style={{fontFamily:'var(--mono)',fontSize:14,fontWeight:700,color:c}}>{v<0?'−':''}{fmtAmt(Math.abs(v))}</div>
        </div>
      ))}
    </div>
    <div style={{padding:'9px 14px',background:closeBal<0?'var(--amber-bg)':'var(--green-bg)',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <span style={{fontFamily:'var(--mono)',fontSize:10,color:closeBal<0?'var(--amber)':'var(--green)',textTransform:'uppercase',letterSpacing:'0.08em'}}>Site Cash Balance</span>
      <span style={{fontFamily:'var(--mono)',fontSize:18,fontWeight:800,color:closeBal<0?'var(--amber)':'var(--green)'}}>{closeBal<0?'−':''}{fmtAmt(Math.abs(closeBal))}</span>
    </div>

    {/* Period + print */}
    <div style={{padding:'8px 12px',display:'flex',gap:6,flexWrap:'wrap',borderBottom:'1px solid var(--border)',alignItems:'center'}}>
      {[['this_month','This Mo'],['last_month','Last Mo'],['this_year','This Yr'],['all','All']].map(([k,l])=>(
        <span key={k} style={chipS(periodFilter===k)} onClick={()=>setPeriodFilter(k)}>{l}</span>
      ))}
      <div style={{marginLeft:'auto',display:'flex',gap:5}}>
        <button onClick={handlePrint} style={{background:'var(--blue)',color:'#fff',border:'none',borderRadius:6,padding:'5px 10px',fontFamily:'var(--mono)',fontSize:10,fontWeight:600,cursor:'pointer'}}>🖨</button>
        <button onClick={handleDownloadCSV} title="Download CSV (opens in Excel/Sheets)" style={{background:'var(--green)',color:'#000',border:'none',borderRadius:6,padding:'5px 10px',fontFamily:'var(--mono)',fontSize:10,fontWeight:600,cursor:'pointer'}}>⬇ CSV</button>
        <button onClick={handleDriveBackup} disabled={driveUploading} title="Backup to Google Drive as Spreadsheet" style={{background:driveUploading?'var(--bg3)':'#ea4335',color:driveUploading?'var(--text3)':'#fff',border:'none',borderRadius:6,padding:'5px 10px',fontFamily:'var(--mono)',fontSize:10,fontWeight:600,cursor:'pointer',minWidth:50}}>{driveUploading?'..':'☁ Drive'}</button>
      </div>
      {driveStatus&&<div style={{width:'100%',fontFamily:'var(--mono)',fontSize:9,color:driveStatus.startsWith('Error')?'var(--red)':driveStatus.startsWith('Saved')||driveStatus.includes('Backed')?'var(--green)':'var(--text3)',padding:'4px 0',marginTop:2}}>{driveStatus}</div>}
    </div>

    {/* Site filter */}
    {sites.length>0&&<div style={{padding:'6px 12px',display:'flex',gap:6,flexWrap:'wrap',borderBottom:'1px solid var(--border)'}}>
      {['ALL',...sites].map(s=><span key={s} style={chipS(selSite===s)} onClick={()=>setSelSite(s)}>{s}</span>)}
    </div>}

    {/* Ledger table — mobile card layout */}
    <div>
      <div style={{display:'grid',gridTemplateColumns:'46px 1fr minmax(80px,auto) minmax(80px,auto)',padding:'6px 12px',background:'var(--bg3)',borderBottom:'1px solid var(--border)'}}>
        {['Date','Description','Exp/Inc','Balance'].map((h,i)=><span key={h} style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',textAlign:i>1?'right':'left'}}>{h}</span>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'46px 1fr minmax(80px,auto) minmax(80px,auto)',padding:'8px 12px',background:'var(--bg3)',borderBottom:'1px solid var(--border)'}}>
        <span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)'}}>{scOpeningDate||'Start'}</span>
        <span style={{fontFamily:'var(--mono)',fontSize:10,fontWeight:600,color:'var(--text2)'}}>Opening Balance</span>
        <span style={{fontFamily:'var(--mono)',fontSize:10,textAlign:'right',color:'var(--text3)'}}>—</span>
        <span style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:openingBal<0?'var(--amber)':'var(--green)',textAlign:'right'}}>{openingBal<0?'−':''}{fmtAmt(Math.abs(openingBal))}</span>
      </div>
      {rows.length===0&&<div className="empty">No transactions for this period.</div>}
      {rows.map((r,i)=>(
        <div key={r.id} style={{padding:'9px 12px',borderBottom:'1px solid var(--border)',background:i%2===0?'var(--bg2)':'var(--bg)'}}>
          <div style={{display:'grid',gridTemplateColumns:'46px 1fr minmax(80px,auto) minmax(80px,auto)',marginBottom:4}}>
            <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)'}}>{fmtDate(r.created_at)}</span>
            <div style={{minWidth:0,paddingRight:4}}><div style={{fontSize:12,color:'var(--text)',fontWeight:500,wordBreak:'break-word',lineHeight:1.3}}>{r.desc}</div></div>
            <span style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:r.debit>0?'var(--red)':'var(--green)',textAlign:'right',whiteSpace:'nowrap'}}>{r.debit>0?'−'+fmtAmt(r.debit):'+'+fmtAmt(r.credit)}</span>
            <span style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:r.runBal<0?'var(--amber)':'var(--green)',textAlign:'right',whiteSpace:'nowrap'}}>{r.runBal<0?'−':''}{fmtAmt(Math.abs(r.runBal))}</span>
          </div>
          <div style={{display:'flex',gap:4,flexWrap:'wrap',paddingLeft:52}}>
            {r.type==='Site Transfer'
              ?<span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--blue)',background:'var(--blue-bg)',padding:'1px 5px',borderRadius:4}}>↔ {r.acct}</span>
              :<>{r.category&&<span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',background:'var(--bg3)',padding:'1px 5px',borderRadius:4}}>{r.category}</span>}{r.acct&&r.acct!=='—'&&<span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--blue)',background:'var(--blue-bg)',padding:'1px 5px',borderRadius:4}}>{r.acct}</span>}</>}
            {r.site_name&&<span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--amber)',background:'var(--amber-bg)',padding:'1px 5px',borderRadius:4}}>{r.site_name}</span>}
          </div>
        </div>
      ))}
      {rows.length>0&&<div style={{display:'grid',gridTemplateColumns:'46px 1fr minmax(80px,auto) minmax(80px,auto)',padding:'9px 12px',background:'var(--green-bg)',borderBottom:'2px solid var(--green)'}}>
        <span/>
        <div><div style={{fontFamily:'var(--mono)',fontSize:10,fontWeight:700,color:'var(--text)'}}>Closing Balance</div><div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',marginTop:1}}>−{fmtAmt(totDebit)} / +{fmtAmt(totCredit)}</div></div>
        <span/>
        <span style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:800,color:closeBal<0?'var(--amber)':'var(--green)',textAlign:'right',alignSelf:'center'}}>{closeBal<0?'−':''}{fmtAmt(Math.abs(closeBal))}</span>
      </div>}
    </div>

    {/* Member cards */}
    <p className="sec-label" style={{marginTop:12}}>Member Ledger <span style={{fontWeight:400,color:'var(--text3)'}}>· tap to drill down</span></p>
    <div style={{padding:'0 12px 8px',display:'flex',flexDirection:'column',gap:8}}>
      {activeMembers.length===0&&<div className="empty" style={{textAlign:'left',padding:'12px 0',fontSize:11}}>No member transactions yet.</div>}
      {activeMembers.map(m=>{
        const{given,received,net,count}=getMemberBalance(m);
        if(count===0)return null;
        return(
          <div key={m} onClick={()=>setSelMember(m)} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'12px 14px',cursor:'pointer'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{width:34,height:34,borderRadius:8,background:net>0?'var(--amber-bg)':'var(--green-bg)',border:'1px solid '+(net>0?'var(--amber)':'var(--green)'),display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--mono)',fontSize:12,fontWeight:700,color:net>0?'var(--amber)':'var(--green)'}}>{m.slice(0,2).toUpperCase()}</div>
                <div><div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{m}</div><div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',marginTop:1}}>{count} txns</div></div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontFamily:'var(--mono)',fontSize:15,fontWeight:700,color:net>0?'var(--amber)':'var(--green)'}}>{net<0?'−':net>0?'+':''}{fmtAmt(Math.abs(net))}</div>
                <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',marginTop:1}}>{net>0?'we gave more':'they gave more'}</div>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,borderTop:'1px solid var(--border)',paddingTop:8}}>
              <div style={{display:'flex',justifyContent:'space-between'}}><span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',textTransform:'uppercase'}}>💸 Given</span><span style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:'var(--red)'}}>{fmtAmt(given)}</span></div>
              <div style={{display:'flex',justifyContent:'flex-end',gap:8}}><span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',textTransform:'uppercase'}}>💰 Rcvd</span><span style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:'var(--green)'}}>{fmtAmt(received)}</span></div>
            </div>
          </div>
        );
      })}
    </div>

  </div>);
}

/* ── CashflowScreen v1.8 ─────────────────────────────────────────
   Income & Cashflow + YNAB Zero-Based Budgeting
   Sections:
     1. Month Selector
     2. Cashflow Summary (Income − Expense − CC Payments = Net)
     3. Income Sources breakdown
     4. 6-month Income vs Expense trend bar chart
     5. YNAB Budget Envelopes — zero-based, "To Assign" balance
     6. Budget category editor (add/remove, set limits)
───────────────────────────────────────────────────────────────── */
function CashflowScreen({txns,budgets,onSaveBudgets,liquid,allBanks,balances,recurring}){
  budgets=budgets||{};
  const now=new Date();
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const [selYear,setSelYear]=useState(now.getFullYear());
  const [selMonth,setSelMonth]=useState(now.getMonth());
  const [ynabView,setYnabView]=useState('envelopes'); /* 'envelopes' | 'editor' */
  const [draftBudgets,setDraftBudgets]=useState({...budgets});
  const [savingBudgets,setSavingBudgets]=useState(false);
  const [newCat,setNewCat]=useState('');
  const [activeSection,setActiveSection]=useState('cashflow'); /* 'cashflow' | 'ynab' */

  /* Sync draft when budgets prop changes */
  React.useEffect(()=>{setDraftBudgets({...budgets});},[JSON.stringify(budgets)]);

  const active=txns.filter(t=>t.status!=='voided');

  /* ── Month navigation ── */
  const prevMonth=()=>{if(selMonth===0){setSelMonth(11);setSelYear(y=>y-1);}else setSelMonth(m=>m-1);};
  const nextMonth=()=>{const isCurrentMonth=selYear===now.getFullYear()&&selMonth===now.getMonth();if(isCurrentMonth)return;if(selMonth===11){setSelMonth(0);setSelYear(y=>y+1);}else setSelMonth(m=>m+1);};
  const isCurrentMonth=selYear===now.getFullYear()&&selMonth===now.getMonth();

  /* ── Filter txns for selected month ── */
  const monthTxns=active.filter(t=>{const d=new Date(t.created_at);return d.getMonth()===selMonth&&d.getFullYear()===selYear;});

  /* ── Cashflow calculations ── */
  const income=monthTxns.filter(t=>t.type==='Income').reduce((s,t)=>s+(+t.amount),0);
  const expense=monthTxns.filter(t=>t.type==='Expense').reduce((s,t)=>s+(+t.amount),0);
  const ccPay=monthTxns.filter(t=>t.type==='CC-Bank'||t.type==='Bank→CC').reduce((s,t)=>s+(+t.amount),0);
  const uaExp=monthTxns.filter(t=>t.type==='UA Expense').reduce((s,t)=>s+(+t.amount),0);
  const uaRecv=monthTxns.filter(t=>t.type==='UA Received').reduce((s,t)=>s+(+t.amount),0);
  const netCashflow=income-expense-ccPay;

  /* ── Income sources ── */
  const incSources={};
  monthTxns.filter(t=>t.type==='Income').forEach(t=>{
    const src=t.category||t.particulars||'Other';
    incSources[src]=(incSources[src]||0)+(+t.amount);
  });
  const incSourceList=Object.entries(incSources).sort((a,b)=>b[1]-a[1]);

  /* ── 6-month trend ── */
  const trend=Array.from({length:6},(_,i)=>{
    let m=selMonth-5+i,y=selYear;
    while(m<0){m+=12;y--;}
    while(m>11){m-=12;y++;}
    const mt=active.filter(t=>{const d=new Date(t.created_at);return d.getMonth()===m&&d.getFullYear()===y;});
    const inc=mt.filter(t=>t.type==='Income').reduce((s,t)=>s+(+t.amount),0);
    const exp=mt.filter(t=>t.type==='Expense').reduce((s,t)=>s+(+t.amount),0);
    return{label:MONTHS[m],inc,exp,isSelected:m===selMonth&&y===selYear};
  });
  const trendMax=Math.max(...trend.map(t=>Math.max(t.inc,t.exp)),1);

  /* ── YNAB: category spend this month ── */
  const DEFAULT_CATS=['Household','Fuel','Food','Lifestyle','Maintenance','Travelling','Social','Donation','Child Education','Mobile Recharge'];
  const budgetCats=[...new Set([...DEFAULT_CATS,...Object.keys(budgets),...Object.keys(draftBudgets)])].filter(Boolean);
  const catSpend={};
  monthTxns.filter(t=>t.type==='Expense').forEach(t=>{const c=t.category||'Misc';catSpend[c]=(catSpend[c]||0)+(+t.amount);});
  const totalAssigned=budgetCats.reduce((s,c)=>(draftBudgets[c]||0)+s,0);
  const toAssign=income-totalAssigned;
  const totalSpent=monthTxns.filter(t=>t.type==='Expense').reduce((s,t)=>s+(+t.amount),0);

  const handleSaveBudgets=async()=>{setSavingBudgets(true);await onSaveBudgets(draftBudgets);setSavingBudgets(false);};

  const fmtAmt=v=>v>=1e7?'₹'+(v/1e7).toFixed(2)+'Cr':v>=1e5?'₹'+(v/1e5).toFixed(1)+'L':'₹'+Math.round(v).toLocaleString('en-IN');
  const netCol=netCashflow>0?'var(--green)':netCashflow<0?'var(--red)':'var(--text3)';

  return(
    <div className="fade-in" style={{paddingBottom:24}}>

      {/* ── Month Nav ── */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 16px',borderBottom:'1px solid var(--border)',background:'var(--bg2)'}}>
        <button onClick={prevMonth} style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text2)',padding:'5px 12px',fontFamily:'var(--mono)',fontSize:13,cursor:'pointer'}}>‹</button>
        <div style={{textAlign:'center'}}>
          <div style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:700,color:'var(--text)'}}>{MONTHS[selMonth]} {selYear}</div>
          {isCurrentMonth&&<div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--green)',textTransform:'uppercase',letterSpacing:'0.08em'}}>● current</div>}
        </div>
        <button onClick={nextMonth} disabled={isCurrentMonth} style={{background:isCurrentMonth?'var(--bg)':'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,color:isCurrentMonth?'var(--border)':'var(--text2)',padding:'5px 12px',fontFamily:'var(--mono)',fontSize:13,cursor:isCurrentMonth?'default':'pointer'}}>›</button>
      </div>

      {/* ── Section toggle ── */}
      <div style={{display:'flex',margin:'8px 10px 4px',background:'var(--bg2)',borderRadius:8,padding:3,gap:3}}>
        {[['cashflow','💹 Cashflow'],['ynab','📊 Budget']].map(([id,label])=>(
          <button key={id} onClick={()=>setActiveSection(id)} style={{flex:1,background:activeSection===id?'var(--bg3)':'transparent',border:activeSection===id?'1px solid var(--border2)':'1px solid transparent',borderRadius:6,color:activeSection===id?'var(--text)':'var(--text3)',fontFamily:'var(--mono)',fontSize:11,fontWeight:activeSection===id?700:400,padding:'7px 4px',cursor:'pointer'}}>{label}</button>
        ))}
      </div>

      {activeSection==='cashflow'&&(<>

        {/* ── Cashflow Summary Card ── */}
        <div style={{margin:'6px 10px',background:'var(--bg2)',border:'1.5px solid var(--border2)',borderRadius:10,overflow:'hidden'}}>
          {/* Net Cashflow hero */}
          <div style={{padding:'12px 14px',background:netCashflow>0?'var(--green-bg)':netCashflow<0?'var(--red-bg)':'var(--bg3)',borderBottom:'1px solid var(--border)'}}>
            <div style={{fontFamily:'var(--mono)',fontSize:8,color:netCol,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:3}}>Net Cashflow</div>
            <div style={{fontFamily:'var(--mono)',fontSize:26,fontWeight:800,color:netCol,letterSpacing:'-1px'}}>{netCashflow>=0?'+':''}{fmtAmt(netCashflow)}</div>
            <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',marginTop:3}}>{income>0?Math.round((1-(expense/income))*100)+'% saved this month':'No income logged'}</div>
          </div>
          {/* Waterfall rows */}
          {[
            {label:'Income',value:income,col:'var(--green)',sign:'+',show:true},
            {label:'Expenses',value:expense,col:'var(--red)',sign:'−',show:true},
            ...(ccPay>0?[{label:'CC Payments',value:ccPay,col:'var(--amber)',sign:'−',show:true}]:[]),
            ...(uaExp>uaRecv&&uaExp-uaRecv>0?[{label:'UA Net Out',value:uaExp-uaRecv,col:'var(--amber)',sign:'−',show:true}]:[]),
          ].map((row,i,arr)=>{
            const pct=income>0?Math.min(100,Math.round(row.value/income*100)):0;
            return(
            <div key={i} style={{padding:'8px 14px',borderBottom:i<arr.length-1?'1px solid var(--border)':'none'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)'}}>{row.sign} {row.label}</span>
                <span style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:700,color:row.col}}>{row.sign==='+'?'':row.sign}{fmtAmt(row.value)}</span>
              </div>
              <div style={{background:'var(--bg3)',borderRadius:3,height:4}}>
                <div style={{height:4,borderRadius:3,width:pct+'%',background:row.col,opacity:0.8,transition:'width 0.4s ease'}}/>
              </div>
              {row.sign!=='+'&&income>0&&<div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)',marginTop:2}}>{pct}% of income</div>}
            </div>
          );})}
        </div>

        {/* ── Income Sources ── */}
        {incSourceList.length>0&&(
          <div style={{margin:'6px 10px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,overflow:'hidden'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',borderBottom:'1px solid var(--border)',background:'var(--bg3)'}}>
              <span style={{fontFamily:'var(--mono)',fontSize:9,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em'}}>Income Sources</span>
              <span style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:'var(--green)'}}>{fmtAmt(income)}</span>
            </div>
            {incSourceList.map(([src,amt],i)=>{
              const pct=income>0?Math.round(amt/income*100):0;
              return(
              <div key={i} style={{padding:'8px 12px',borderBottom:i<incSourceList.length-1?'1px solid var(--border)':'none'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                  <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)',maxWidth:'60%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{src}</span>
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    <span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)'}}>{pct}%</span>
                    <span style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:'var(--green)'}}>{fmtAmt(amt)}</span>
                  </div>
                </div>
                <div style={{background:'var(--bg3)',borderRadius:3,height:3}}>
                  <div style={{height:3,borderRadius:3,width:pct+'%',background:'var(--green)',opacity:0.7}}/>
                </div>
              </div>
            );})}
          </div>
        )}
        {incSourceList.length===0&&(
          <div style={{margin:'6px 10px',padding:'20px',textAlign:'center',fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',background:'var(--bg2)',border:'1px dashed var(--border)',borderRadius:8}}>
            No income logged for {MONTHS[selMonth]} {selYear}
          </div>
        )}

        {/* ── 6-Month Trend Chart ── */}
        <div style={{margin:'6px 10px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,overflow:'hidden'}}>
          <div style={{padding:'8px 12px',borderBottom:'1px solid var(--border)',background:'var(--bg3)'}}>
            <span style={{fontFamily:'var(--mono)',fontSize:9,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em'}}>6-Month Trend</span>
          </div>
          <div style={{padding:'12px 10px 8px'}}>
            {/* Legend */}
            <div style={{display:'flex',gap:12,marginBottom:10,paddingLeft:4}}>
              <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:10,height:4,borderRadius:2,background:'var(--green)'}}/><span style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)'}}>Income</span></div>
              <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:10,height:4,borderRadius:2,background:'var(--red)'}}/><span style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)'}}>Expense</span></div>
            </div>
            {/* Bars */}
            <div style={{display:'flex',gap:4,alignItems:'flex-end',height:80}}>
              {trend.map((m,i)=>(
                <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
                  <div style={{display:'flex',gap:1,alignItems:'flex-end',height:64,width:'100%'}}>
                    <div style={{flex:1,borderRadius:'2px 2px 0 0',background:'var(--green)',opacity:m.isSelected?1:0.5,height:(trendMax>0?m.inc/trendMax*64:0)+'px',minHeight:m.inc>0?2:0,transition:'height 0.3s ease'}}/>
                    <div style={{flex:1,borderRadius:'2px 2px 0 0',background:'var(--red)',opacity:m.isSelected?1:0.5,height:(trendMax>0?m.exp/trendMax*64:0)+'px',minHeight:m.exp>0?2:0,transition:'height 0.3s ease'}}/>
                  </div>
                  <span style={{fontFamily:'var(--mono)',fontSize:7,color:m.isSelected?'var(--text)':'var(--text3)',fontWeight:m.isSelected?700:400}}>{m.label}</span>
                  {/* Savings rate dot */}
                  {m.inc>0&&<div style={{width:4,height:4,borderRadius:'50%',background:m.inc>m.exp?'var(--green)':'var(--red)',opacity:0.8}}/>}
                </div>
              ))}
            </div>
            <div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)',marginTop:6,textAlign:'center'}}>● green = saved, ● red = deficit</div>
          </div>
        </div>

        {/* ── Running Balance this month ── */}
        <div style={{margin:'6px 10px 12px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px'}}>
          <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:8}}>Account Snapshot</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {[
              {label:'Liquid Balance',v:liquid,col:'var(--blue)'},
              {label:'Net this month',v:netCashflow,col:netCol},
            ].map(({label,v,col})=>(
              <div key={label} style={{background:'var(--bg3)',borderRadius:6,padding:'8px 10px'}}>
                <div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)',textTransform:'uppercase',marginBottom:3}}>{label}</div>
                <div style={{fontFamily:'var(--mono)',fontSize:14,fontWeight:700,color:col}}>{v>=0?'':'-'}{fmtAmt(Math.abs(v))}</div>
              </div>
            ))}
          </div>
        </div>

      </>)}

      {activeSection==='ynab'&&(<>

        {/* ── YNAB Header — To Assign ── */}
        <div style={{margin:'6px 10px',background:toAssign>=0?'var(--green-bg)':'var(--red-bg)',border:'1.5px solid '+(toAssign>=0?'var(--green)':'var(--red)'),borderRadius:10,padding:'12px 14px'}}>
          <div style={{fontFamily:'var(--mono)',fontSize:8,color:toAssign>=0?'var(--green)':'var(--red)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:3}}>
            {toAssign>=0?'💰 Ready to Assign':'⚠ Over-Assigned'}
          </div>
          <div style={{fontFamily:'var(--mono)',fontSize:26,fontWeight:800,color:toAssign>=0?'var(--green)':'var(--red)',letterSpacing:'-1px'}}>{toAssign>=0?'':'-'}{fmtAmt(Math.abs(toAssign))}</div>
          <div style={{display:'flex',gap:16,marginTop:8,paddingTop:8,borderTop:'1px solid '+(toAssign>=0?'var(--green)':'var(--red)'),opacity:0.8}}>
            <div><div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)',marginBottom:2}}>INCOME</div><div style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:'var(--green)'}}>{fmtAmt(income)}</div></div>
            <div><div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)',marginBottom:2}}>ASSIGNED</div><div style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:'var(--text)'}}>{fmtAmt(totalAssigned)}</div></div>
            <div><div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)',marginBottom:2}}>SPENT</div><div style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:'var(--red)'}}>{fmtAmt(totalSpent)}</div></div>
          </div>
          {income===0&&<div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--amber)',marginTop:6}}>⚠ No income for {MONTHS[selMonth]} — budgets set against ₹0</div>}
        </div>

        {/* ── Sub-toggle: Envelopes | Editor ── */}
        <div style={{display:'flex',margin:'4px 10px',background:'var(--bg2)',borderRadius:6,padding:2,gap:2}}>
          {[['envelopes','Envelopes'],['editor','Edit Limits']].map(([id,label])=>(
            <button key={id} onClick={()=>setYnabView(id)} style={{flex:1,background:ynabView===id?'var(--bg3)':'transparent',border:ynabView===id?'1px solid var(--border2)':'1px solid transparent',borderRadius:5,color:ynabView===id?'var(--text)':'var(--text3)',fontFamily:'var(--mono)',fontSize:10,fontWeight:ynabView===id?700:400,padding:'6px 4px',cursor:'pointer'}}>{label}</button>
          ))}
        </div>

        {ynabView==='envelopes'&&(
          <div style={{margin:'4px 10px 12px'}}>
            {budgetCats.map((cat,i)=>{
              const limit=draftBudgets[cat]||0;
              const spent=catSpend[cat]||0;
              const remaining=limit-spent;
              const over=limit>0&&spent>limit;
              const pct=limit>0?Math.min(100,Math.round(spent/limit*100)):0;
              const hasLimit=limit>0;
              return(
              <div key={cat} style={{background:'var(--bg2)',border:'1px solid '+(over?'var(--red)':'var(--border)'),borderRadius:8,padding:'10px 12px',marginBottom:6}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
                  <span style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--text)',fontWeight:600}}>{cat}</span>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:700,color:over?'var(--red)':hasLimit?'var(--text)':'var(--text3)'}}>{fmtAmt(spent)}{hasLimit?' / '+fmtAmt(limit):''}</div>
                    {hasLimit&&<div style={{fontFamily:'var(--mono)',fontSize:8,color:over?'var(--red)':remaining===0?'var(--text3)':'var(--green)',marginTop:1}}>{over?'Over by '+fmtAmt(Math.abs(remaining)):remaining===0?'Fully used':'Left: '+fmtAmt(remaining)}</div>}
                    {!hasLimit&&spent>0&&<div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--amber)',marginTop:1}}>No limit set</div>}
                  </div>
                </div>
                {hasLimit&&(
                  <div style={{background:'var(--bg3)',borderRadius:3,height:5}}>
                    <div style={{height:5,borderRadius:3,width:pct+'%',background:over?'var(--red)':pct>80?'var(--amber)':'var(--green)',transition:'width 0.4s ease'}}/>
                  </div>
                )}
                {!hasLimit&&spent>0&&(
                  <div style={{background:'var(--bg3)',borderRadius:3,height:3}}>
                    <div style={{height:3,borderRadius:3,width:'100%',background:'var(--amber)',opacity:0.4}}/>
                  </div>
                )}
              </div>
            );})}
            {/* Unbudgeted categories */}
            {Object.entries(catSpend).filter(([c])=>!budgetCats.includes(c)).map(([cat,spent])=>(
              <div key={cat} style={{background:'var(--bg2)',border:'1px dashed var(--border)',borderRadius:8,padding:'8px 12px',marginBottom:5,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>{cat}</span>
                <div style={{textAlign:'right'}}>
                  <div style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:'var(--red)'}}>{fmtAmt(spent)}</div>
                  <div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)'}}>unbudgeted</div>
                </div>
              </div>
            ))}
          </div>
        )}

        {ynabView==='editor'&&(
          <div style={{margin:'4px 10px 12px'}}>
            <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',padding:'4px 2px 8px',letterSpacing:'0.04em'}}>Set monthly limit for each category. Leave blank for no limit.</div>
            {budgetCats.map(cat=>(
              <div key={cat} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                <div style={{flex:1,fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)'}}>{cat}</div>
                <div style={{display:'flex',alignItems:'center',gap:4}}>
                  <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>₹</span>
                  <input
                    type="number"
                    value={draftBudgets[cat]||''}
                    placeholder="no limit"
                    onChange={e=>setDraftBudgets(p=>({...p,[cat]:parseFloat(e.target.value)||0}))}
                    style={{width:90,background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,padding:'5px 8px',textAlign:'right',outline:'none'}}
                  />
                </div>
                <button onClick={()=>setDraftBudgets(p=>{const n={...p};delete n[cat];return n;})} style={{background:'none',border:'none',color:'var(--text3)',fontSize:14,cursor:'pointer',padding:'2px 4px'}}>✕</button>
              </div>
            ))}
            {/* Add new category */}
            <div style={{display:'flex',gap:6,marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)'}}>
              <input
                value={newCat}
                onChange={e=>setNewCat(e.target.value)}
                placeholder="New category..."
                onKeyDown={e=>{if(e.key==='Enter'&&newCat.trim()){setDraftBudgets(p=>({...p,[newCat.trim()]:0}));setNewCat('');} }}
                style={{flex:1,background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,color:'var(--text)',fontFamily:'var(--mono)',fontSize:11,padding:'7px 10px',outline:'none'}}
              />
              <button onClick={()=>{if(newCat.trim()){setDraftBudgets(p=>({...p,[newCat.trim()]:0}));setNewCat('');}}} style={{background:'var(--blue)',border:'none',borderRadius:6,color:'#fff',fontFamily:'var(--mono)',fontSize:11,fontWeight:600,padding:'0 14px',cursor:'pointer'}}>+ Add</button>
            </div>
            {/* Save */}
            <button onClick={handleSaveBudgets} disabled={savingBudgets} style={{width:'100%',marginTop:10,background:savingBudgets?'var(--bg3)':'var(--green)',border:'none',borderRadius:8,color:savingBudgets?'var(--text3)':'#000',fontFamily:'var(--mono)',fontSize:12,fontWeight:700,padding:'12px',cursor:'pointer'}}>
              {savingBudgets?'Saving...':'💾 Save Budget Limits'}
            </button>
          </div>
        )}

      </>)}
    </div>
  );
}

/* ── PdfImportScreen v1.9 ─────────────────────────────────────────────
   In-browser PDF bank statement parser.
   Uses pdf.js (CDN) to extract text, applies per-bank regex patterns,
   then shows a side-by-side match UI before importing to Supabase.
   Supported banks: KB (Karnataka Bank), UB (Union Bank), YB (Yes Bank),
                    HDFC CC, AXIS CC, SBI CC, RBL CC
   ─────────────────────────────────────────────────────────────────── */
function PdfImportScreen({allBanks,allCC,onSave,showToast,allCategories}){
  const [step,setStep]        = useState('upload');   // upload | review | done
  const [bank,setBank]        = useState('');
  const [domain,setDomain]    = useState('Personal');
  const [rows,setRows]        = useState([]);          // parsed rows
  const [selected,setSelected]= useState({});          // rowIdx → true/false
  const [editing,setEditing]  = useState({});          // rowIdx → overrides
  const [importing,setImporting]=useState(false);
  const [progress,setProgress]= useState('');
  const [pdfName,setPdfName]  = useState('');

  const allAccounts=[...allBanks,...allCC];

  // ── Per-bank regex patterns ──────────────────────────────────────
  // Each parser receives full text and returns [{date,particulars,debit,credit,balance}]
  const PARSERS = {
    'KB': text => {
      // Karnataka Bank: DD/MM/YYYY  Narration  Chq  Debit  Credit  Balance
      const re = /(\d{2}\/\d{2}\/\d{4})\s+(.+?)\s{2,}[\w\d-]*\s{1,}([\d,]*\.\d{2})?\s*([\d,]*\.\d{2})?\s+([\d,]+\.\d{2})/g;
      return parseMatches(re,text,[1,2,3,4,5]);
    },
    'UB': text => {
      // Union Bank: DD-MM-YYYY  Narration  Ref  Debit  Credit  Balance
      const re = /(\d{2}-\d{2}-\d{4})\s+(.+?)\s{2,}[\w\d/]*\s{0,}([\d,]*\.\d{2})?\s*([\d,]*\.\d{2})?\s+([\d,]+\.\d{2})/g;
      return parseMatches(re,text,[1,2,3,4,5]);
    },
    'YB': text => {
      // Yes Bank: DD MMM YYYY  Description  Debit  Credit  Balance
      const re = /(\d{2}\s+\w{3}\s+\d{4})\s+(.+?)\s{2,}([\d,]*\.\d{2})?\s*([\d,]*\.\d{2})?\s+([\d,]+\.\d{2})/g;
      return parseMatches(re,text,[1,2,3,4,5]);
    },
    'HDFC CC': text => {
      // HDFC CC: DD/MM/YYYY  Description  Amount (Dr/Cr)
      const re = /(\d{2}\/\d{2}\/\d{4})\s+(.+?)\s{2,}([\d,]+\.\d{2})\s*(Cr)?/g;
      const out=[];let m;
      while((m=re.exec(text))!==null){
        const isCr=!!(m[4]);
        out.push({date:normalDate(m[1]),particulars:m[2].trim(),debit:isCr?null:m[3],credit:isCr?m[3]:null,balance:null});
      }
      return out;
    },
    'AXIS CC': text => {
      // Axis CC: DD MMM YYYY  Description  Amount (CR suffix = credit)
      const re = /(\d{2}\s+\w{3}\s+\d{4})\s+(.+?)\s{2,}([\d,]+\.\d{2})(CR)?/g;
      const out=[];let m;
      while((m=re.exec(text))!==null){
        const isCr=!!(m[4]);
        out.push({date:normalDate(m[1]),particulars:m[2].trim(),debit:isCr?null:m[3],credit:isCr?m[3]:null,balance:null});
      }
      return out;
    },
    'SBI CC': text => {
      const re = /(\d{2}\/\d{2}\/\d{4})\s+(.+?)\s{2,}([\d,]+\.\d{2})\s*(Cr)?/g;
      const out=[];let m;
      while((m=re.exec(text))!==null){
        const isCr=!!(m[4]);
        out.push({date:normalDate(m[1]),particulars:m[2].trim(),debit:isCr?null:m[3],credit:isCr?m[3]:null,balance:null});
      }
      return out;
    },
    'RBL CC': text => {
      const re = /(\d{2}-\w{3}-\d{4})\s+(.+?)\s{2,}([\d,]+\.\d{2})\s*(CR)?/g;
      const out=[];let m;
      while((m=re.exec(text))!==null){
        const isCr=!!(m[4]);
        out.push({date:normalDate(m[1]),particulars:m[2].trim(),debit:isCr?null:m[3],credit:isCr?m[3]:null,balance:null});
      }
      return out;
    },
  };

  function parseMatches(re,text,idx){
    const out=[];let m;
    while((m=re.exec(text))!==null){
      out.push({
        date:normalDate(m[idx[0]]),
        particulars:m[idx[1]].trim(),
        debit:m[idx[2]]?m[idx[2]].replace(/,/g,''):null,
        credit:m[idx[3]]?m[idx[3]].replace(/,/g,''):null,
        balance:m[idx[4]]?m[idx[4]].replace(/,/g,''):null,
      });
    }
    return out;
  }

  function normalDate(s){
    // Convert DD/MM/YYYY, DD-MM-YYYY, DD MMM YYYY → YYYY-MM-DD
    const months={Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
    s=s.trim();
    if(/\d{2}\/\d{2}\/\d{4}/.test(s)){const[d,mo,y]=s.split('/');return`${y}-${mo.padStart(2,'0')}-${d.padStart(2,'0')}`;}
    if(/\d{2}-\d{2}-\d{4}/.test(s)){const[d,mo,y]=s.split('-');return`${y}-${mo.padStart(2,'0')}-${d.padStart(2,'0')}`;}
    if(/\d{2}\s+\w{3}\s+\d{4}/.test(s)){const[d,mon,y]=s.split(/\s+/);const mo=months[mon]||1;return`${y}-${String(mo).padStart(2,'0')}-${d.padStart(2,'0')}`;}
    if(/\d{2}-\w{3}-\d{4}/.test(s)){const[d,mon,y]=s.split('-');const mo=months[mon]||1;return`${y}-${String(mo).padStart(2,'0')}-${d.padStart(2,'0')}`;}
    return s;
  }

  function guessCategory(desc){
    const d=desc.toLowerCase();
    if(/swiggy|zomato|domino|pizza|cafe|restaurant|hotel|food|eat|bake|kitchen/.test(d)) return 'Food & Dining';
    if(/amazon|flipkart|myntra|shop|mart|store|mall|market/.test(d)) return 'Shopping';
    if(/fuel|petrol|diesel|hp|bpcl|iocl/.test(d)) return 'Fuel & Transport';
    if(/uber|ola|rapido|metro|bus|railway|irctc|flight|airline/.test(d)) return 'Travel';
    if(/medical|pharma|clinic|hospital|apollo|doctor|health/.test(d)) return 'Medical';
    if(/recharge|jio|airtel|vi |bsnl|broadband|internet/.test(d)) return 'Utilities';
    if(/electricity|water|gas|mseb|bescom|tata power/.test(d)) return 'Utilities';
    if(/salary|credited by|credit by employer/.test(d)) return 'Salary';
    if(/emi|loan/.test(d)) return 'Loan EMI';
    if(/insurance|lic|hdfc life|sbi life/.test(d)) return 'Insurance';
    if(/atm|cash withdrawal/.test(d)) return 'Cash Withdrawal';
    if(/transfer|neft|rtgs|imps|upi/.test(d)) return 'Transfer';
    return 'Uncategorized';
  }

  // ── PDF parsing via pdf.js ───────────────────────────────────────
  const handleFile = async e => {
    const file=e.target.files[0];
    if(!file||!bank){showToast('⚠ Select bank first');return;}
    setPdfName(file.name);
    setProgress('Reading PDF…');
    try{
      await window.loadPdfJs();
      const pdfjsLib=window['pdfjs-dist/build/pdf'];
      const arrayBuf=await file.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:arrayBuf}).promise;
      let fullText='';
      for(let p=1;p<=pdf.numPages;p++){
        setProgress(`Reading page ${p}/${pdf.numPages}…`);
        const page=await pdf.getPage(p);
        const tc=await page.getTextContent();
        // Preserve column layout by sorting items left→right, top→bottom
        const items=tc.items.sort((a,b)=>{
          const dy=Math.round(b.transform[5])-Math.round(a.transform[5]);
          return dy!==0?dy:a.transform[4]-b.transform[4];
        });
        fullText+=items.map(i=>i.str).join(' ')+'\n';
      }
      setProgress('Parsing transactions…');
      const parser=PARSERS[bank];
      if(!parser){showToast('⚠ No parser for '+bank);setProgress('');return;}
      const parsed=parser(fullText).filter(r=>r.date&&(r.debit||r.credit));
      if(!parsed.length){
        showToast('⚠ No transactions found — PDF layout may differ');
        setProgress('Try manual regex tuning in console');
        return;
      }
      // Annotate with guessed category and txn type
      const enriched=parsed.map((r,i)=>({
        ...r,
        _idx:i,
        amount:parseFloat((r.debit||r.credit||'0').replace(/,/g,'')),
        type: r.debit ? (allCC.includes(bank)?'Credit Spend':'Expense') : (allCC.includes(bank)?'Credit Payment':'Income'),
        category:guessCategory(r.particulars),
        account:bank,
      }));
      setRows(enriched);
      const sel={};enriched.forEach((_,i)=>{sel[i]=true;});
      setSelected(sel);
      setEditing({});
      setStep('review');
      setProgress('');
    }catch(err){
      console.error('PDF parse error:',err);
      showToast('⚠ PDF parse failed — see console');
      setProgress('Error: '+err.message);
    }
  };

  const toggleAll=val=>{ const s={};rows.forEach((_,i)=>{s[i]=val;});setSelected(s); };
  const setEdit=(idx,field,val)=>setEditing(p=>({...p,[idx]:{...(p[idx]||{}), [field]:val}}));
  const getRow=idx=>({...rows[idx],...(editing[idx]||{})});

  const handleImport=async()=>{
    const toImport=rows.filter((_,i)=>selected[i]);
    if(!toImport.length){showToast('⚠ Nothing selected');return;}
    setImporting(true);
    let ok=0,fail=0;
    for(let i=0;i<toImport.length;i++){
      const r=getRow(toImport[i]._idx);
      setProgress(`Importing ${i+1}/${toImport.length}…`);
      const isCC=allCC.includes(bank);
      const txn={
        domain,
        type: r.type,
        amount: Math.abs(parseFloat(String(r.amount).replace(/,/g,''))||0),
        category: r.category||'Uncategorized',
        from_account: r.debit ? bank : null,
        to_account:   r.credit ? bank : null,
        particulars:  r.particulars,
        status:'complete',
        source:'pdf-import',
        created_at: r.date ? new Date(r.date+'T00:00:00').toISOString() : new Date().toISOString(),
      };
      try{ await onSave(txn); ok++; }
      catch(e){ fail++; console.error('Import row error:',e); }
    }
    setImporting(false);
    setProgress('');
    showToast(`✓ ${ok} imported${fail?', '+fail+' failed':''}`);
    setStep('done');
  };

  const m={padding:'0 16px 16px'};

  // ── STEP: upload ─────────────────────────────────────────────────
  if(step==='upload') return(
    <div style={m}>
      <div style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,letterSpacing:'0.1em',color:'var(--text3)',padding:'18px 0 12px',textTransform:'uppercase'}}>📄 PDF Bank Import</div>
      <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:16,marginBottom:12}}>
        <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',marginBottom:8,letterSpacing:'0.06em'}}>1. SELECT BANK / ACCOUNT</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
          {[...allBanks.filter(b=>b!=='Cash'),...allCC].map(b=>(
            <button key={b} onClick={()=>setBank(b)} style={{
              padding:'8px 14px',borderRadius:20,fontFamily:'var(--mono)',fontSize:12,fontWeight:600,cursor:'pointer',
              background: bank===b ? 'var(--green)' : 'var(--bg3)',
              border: bank===b ? 'none' : '1px solid var(--border)',
              color: bank===b ? '#000' : 'var(--text2)',
            }}>{b}</button>
          ))}
        </div>
      </div>
      <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:16,marginBottom:12}}>
        <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',marginBottom:8,letterSpacing:'0.06em'}}>2. DOMAIN</div>
        <div style={{display:'flex',gap:8}}>
          {['Personal','Site'].map(d=>(
            <button key={d} onClick={()=>setDomain(d)} style={{
              flex:1,padding:'9px',borderRadius:8,fontFamily:'var(--mono)',fontSize:12,fontWeight:600,cursor:'pointer',
              background:domain===d?'var(--blue)':'var(--bg3)',
              border:domain===d?'none':'1px solid var(--border)',
              color:domain===d?'#fff':'var(--text2)',
            }}>{d}</button>
          ))}
        </div>
      </div>
      <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:16,marginBottom:12}}>
        <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',marginBottom:8,letterSpacing:'0.06em'}}>3. UPLOAD PDF STATEMENT</div>
        <label style={{display:'block',background:'var(--bg3)',border:'2px dashed var(--border2)',borderRadius:8,padding:'24px',textAlign:'center',cursor:'pointer'}}>
          <input type="file" accept=".pdf,application/pdf" onChange={handleFile} style={{display:'none'}}/>
          <div style={{fontSize:28,marginBottom:8}}>📂</div>
          <div style={{fontFamily:'var(--mono)',fontSize:12,color:bank?'var(--text)':'var(--text3)'}}>
            {bank ? `Tap to upload ${bank} statement PDF` : 'Select bank first'}
          </div>
        </label>
        {progress&&<div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--amber)',marginTop:8,textAlign:'center'}}>{progress}</div>}
      </div>
      <div style={{background:'var(--amber-bg)',border:'1px solid var(--amber)',borderRadius:8,padding:'10px 12px'}}>
        <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--amber)',letterSpacing:'0.06em',marginBottom:4}}>ℹ PARSER NOTES</div>
        <div style={{fontSize:11,color:'var(--text2)',lineHeight:1.6}}>
          Works best with text-based PDFs (not scanned). If 0 rows found, the bank&apos;s PDF layout may differ — check console for raw text and adjust regex in code.
        </div>
      </div>
    </div>
  );

  // ── STEP: review ─────────────────────────────────────────────────
  if(step==='review'){
    const selCount=Object.values(selected).filter(Boolean).length;
    return(
      <div style={{paddingBottom:80}}>
        {/* Sticky header */}
        <div style={{position:'sticky',top:0,background:'var(--bg)',borderBottom:'1px solid var(--border)',padding:'12px 16px',zIndex:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:'var(--text)',letterSpacing:'0.06em'}}>📄 {pdfName.slice(0,28)}</div>
            <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginTop:2}}>{bank} · {rows.length} found · {selCount} selected</div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>toggleAll(false)} style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text2)',padding:'6px 10px',fontFamily:'var(--mono)',fontSize:10,cursor:'pointer'}}>None</button>
            <button onClick={()=>toggleAll(true)} style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text2)',padding:'6px 10px',fontFamily:'var(--mono)',fontSize:10,cursor:'pointer'}}>All</button>
            <button onClick={()=>setStep('upload')} style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text2)',padding:'6px 10px',fontFamily:'var(--mono)',fontSize:10,cursor:'pointer'}}>← Back</button>
          </div>
        </div>

        {/* Rows */}
        <div style={{padding:'0 12px'}}>
          {rows.map((row,i)=>{
            const r=getRow(i);
            const isDebit=!!row.debit;
            const sel=selected[i];
            return(
              <div key={i} style={{
                background:sel?'var(--bg2)':'var(--bg)',
                border:`1px solid ${sel?'var(--border2)':'var(--border)'}`,
                borderRadius:10,marginTop:10,padding:12,opacity:sel?1:0.45,
              }}>
                {/* Row header */}
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <input type="checkbox" checked={!!sel} onChange={e=>setSelected(p=>({...p,[i]:e.target.checked}))} style={{width:16,height:16,accentColor:'var(--green)',cursor:'pointer'}}/>
                    <div>
                      <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>{r.date}</div>
                      <div style={{fontSize:12,color:'var(--text)',marginTop:2,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.particulars}</div>
                    </div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontFamily:'var(--mono)',fontSize:14,fontWeight:700,color:isDebit?'var(--red)':'var(--green)'}}>
                      {isDebit?'−':'+'} ₹{parseFloat(String(r.amount||0).replace(/,/g,'')).toLocaleString('en-IN',{minimumFractionDigits:2})}
                    </div>
                    {row.balance&&<div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)'}}>Bal: ₹{row.balance}</div>}
                  </div>
                </div>

                {/* Editable fields */}
                {sel&&<div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                  <select value={r.type} onChange={e=>setEdit(i,'type',e.target.value)}
                    style={{flex:1,minWidth:110,background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,padding:'6px 8px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:11,outline:'none'}}>
                    {['Expense','Income','Credit Spend','Credit Payment','Transfer'].map(t=>(
                      <option key={t} value={t}>{t}</option>
                    ))}
                  </select>
                  <select value={r.category} onChange={e=>setEdit(i,'category',e.target.value)}
                    style={{flex:2,minWidth:130,background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,padding:'6px 8px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:11,outline:'none'}}>
                    {(allCategories||[]).map(c=>(<option key={c.id} value={c.id}>{c.emoji} {c.id}</option>))}
                    <option value="Uncategorized">• Uncategorized</option>
                  </select>
                </div>}
              </div>
            );
          })}
        </div>

        {/* Import bar */}
        <div style={{position:'fixed',bottom:'calc(var(--tab-h) + var(--safe-b))',left:0,right:0,background:'var(--bg)',borderTop:'1px solid var(--border)',padding:'12px 16px',zIndex:10}}>
          {progress&&<div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--amber)',textAlign:'center',marginBottom:6}}>{progress}</div>}
          <button onClick={handleImport} disabled={importing||!selCount} style={{
            width:'100%',padding:'14px',borderRadius:10,border:'none',
            background:importing||!selCount?'var(--bg3)':'var(--green)',
            color:importing||!selCount?'var(--text3)':'#000',
            fontFamily:'var(--mono)',fontSize:13,fontWeight:700,cursor:'pointer',letterSpacing:'0.06em',
          }}>
            {importing?progress||'Importing…':`⬇ Import ${selCount} Transaction${selCount!==1?'s':''}`}
          </button>
        </div>
      </div>
    );
  }

  // ── STEP: done ───────────────────────────────────────────────────
  return(
    <div style={{...m,textAlign:'center',paddingTop:48}}>
      <div style={{fontSize:48,marginBottom:16}}>✅</div>
      <div style={{fontFamily:'var(--mono)',fontSize:14,fontWeight:700,color:'var(--green)',marginBottom:8}}>Import Complete</div>
      <div style={{fontSize:12,color:'var(--text2)',marginBottom:32}}>Transactions added to your log.</div>
      <button onClick={()=>{setStep('upload');setRows([]);setSelected({});setEditing({});setPdfName('');}} style={{
        background:'var(--green)',border:'none',borderRadius:10,color:'#000',
        fontFamily:'var(--mono)',fontSize:12,fontWeight:700,padding:'12px 28px',cursor:'pointer',
      }}>Import Another PDF</button>
    </div>
  );
}

/* ── PinSettingsPanel — embedded in Settings accordion ── */
function PinSettingsPanel(){
  const hasPin=!!localStorage.getItem('jbf_pin_hash');
  const [mode,setMode]=useState('idle'); // idle | change | remove
  const [step,setStep]=useState(1);
  const [digits,setDigits]=useState([]);
  const [firstPin,setFirstPin]=useState([]);
  const [msg,setMsg]=useState('');
  const [shake,setShake]=useState(false);
  const MAX=4;

  const hashPin=async pin=>{
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pin));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  };

  const addDigit=async d=>{
    const next=[...digits,d];
    setDigits(next);
    if(next.length<MAX) return;
    const pin=next.join('');
    if(mode==='change'){
      if(step===1){
        // verify current
        const h=await hashPin(pin);
        if(h!==localStorage.getItem('jbf_pin_hash')){
          setMsg('❌ Wrong current PIN');setShake(true);setTimeout(()=>setShake(false),500);setDigits([]);
        } else { setStep(2);setDigits([]);setMsg('Enter new PIN'); }
      } else if(step===2){
        setFirstPin(next);setStep(3);setDigits([]);setMsg('Confirm new PIN');
      } else {
        if(pin===firstPin.join('')){
          const h=await hashPin(pin);localStorage.setItem('jbf_pin_hash',h);
          setMsg('✓ PIN updated');setMode('idle');setStep(1);setDigits([]);setFirstPin([]);
        } else {
          setMsg('❌ No match — retry');setShake(true);setTimeout(()=>setShake(false),500);
          setStep(2);setDigits([]);setFirstPin([]);
        }
      }
    } else if(mode==='remove'){
      const h=await hashPin(pin);
      if(h===localStorage.getItem('jbf_pin_hash')){
        localStorage.removeItem('jbf_pin_hash');
        setMsg('✓ PIN removed');setMode('idle');setDigits([]);
      } else {
        setMsg('❌ Wrong PIN');setShake(true);setTimeout(()=>setShake(false),500);setDigits([]);
      }
    }
  };
  const del=()=>setDigits(p=>p.slice(0,-1));
  const KEYS=[1,2,3,4,5,6,7,8,9,null,0,'⌫'];

  const stepLabel={
    change:{1:'Enter current PIN',2:'Enter new PIN',3:'Confirm new PIN'},
    remove:{1:'Enter current PIN to remove'},
  };

  if(mode==='idle') return(
    <div style={{padding:'12px 16px',display:'flex',flexDirection:'column',gap:10}}>
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'var(--bg3)',borderRadius:8,border:'1px solid var(--border)'}}>
        <span style={{fontSize:20}}>{hasPin?'🔒':'🔓'}</span>
        <div>
          <div style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:'var(--text)'}}>{hasPin?'PIN Lock is ON':'PIN Lock is OFF'}</div>
          <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginTop:2}}>{hasPin?'App requires PIN on every open':'No PIN required to open app'}</div>
        </div>
      </div>
      {hasPin&&<button onClick={()=>{setMode('change');setStep(1);setDigits([]);setMsg('Enter current PIN');}}
        style={{background:'var(--blue)',border:'none',borderRadius:8,color:'#fff',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:'10px',cursor:'pointer'}}>🔄 Change PIN</button>}
      {hasPin&&<button onClick={()=>{setMode('remove');setStep(1);setDigits([]);setMsg('Enter PIN to confirm removal');}}
        style={{background:'var(--bg3)',border:'1px solid var(--red)',borderRadius:8,color:'var(--red)',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:'10px',cursor:'pointer'}}>🗑 Remove PIN</button>}
      {!hasPin&&<div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',textAlign:'center',padding:'6px 0'}}>PIN will be set on next app open.</div>}
    </div>
  );

  return(
    <div style={{padding:'16px',display:'flex',flexDirection:'column',alignItems:'center',gap:16}}>
      <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',letterSpacing:'0.06em'}}>{stepLabel[mode]?.[step]||''}</div>
      <div style={{display:'flex',gap:14,animation:shake?'pinShake 0.4s':'none'}}>
        {Array.from({length:MAX}).map((_,i)=>(
          <div key={i} style={{width:12,height:12,borderRadius:'50%',background:i<digits.length?'var(--green)':'transparent',border:'2px solid',borderColor:i<digits.length?'var(--green)':'var(--border2)',transition:'all 0.15s'}}/>
        ))}
      </div>
      {msg&&<div style={{fontFamily:'var(--mono)',fontSize:11,color:msg.startsWith('✓')?'var(--green)':'var(--amber)'}}>{msg}</div>}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,60px)',gap:10}}>
        {KEYS.map((k,i)=>(
          k===null?<div key={i}/>:
          <button key={i} onClick={()=>k==='⌫'?del():digits.length<MAX&&addDigit(k)}
            style={{width:60,height:60,borderRadius:'50%',background:k==='⌫'?'var(--bg2)':'var(--bg3)',border:'1px solid var(--border)',color:'var(--text)',fontFamily:'var(--mono)',fontSize:k==='⌫'?18:20,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
            {k}
          </button>
        ))}
      </div>
      <button onClick={()=>{setMode('idle');setDigits([]);setMsg('');setStep(1);}}
        style={{background:'none',border:'none',color:'var(--text3)',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer',textDecoration:'underline'}}>Cancel</button>
      <style>{`@keyframes pinShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}`}</style>
    </div>
  );
}

/* ── DataBackupPanel — Export to Excel with Google Drive integration ── */
function DataBackupPanel(){
  const [loading,setLoading]=useState(false);
  const [status,setStatus]=useState('');
  const [showDriveAuth,setShowDriveAuth]=useState(false);
  
  const exportToExcel=async()=>{
    setLoading(true);
    setStatus('📦 Preparing data...');
    
    try {
      // Fetch all data from Supabase
      const {data:txns}=await supabase.from('transactions').select('*').order('created_at',{ascending:false});
      const {data:invs}=await supabase.from('investments').select('*').order('created_at',{ascending:false});
      const {data:provs}=await supabase.from('provisions').select('*').order('created_at',{ascending:false});
      const {data:sites}=await supabase.from('site_transactions').select('*').order('created_at',{ascending:false});
      const {data:opening}=await supabase.from('opening_balances').select('*');
      const {data:accounts}=await supabase.from('custom_accounts').select('*');
      const {data:cats}=await supabase.from('custom_categories').select('*');
      const {data:budgets}=await supabase.from('budgets').select('*');
      
      setStatus('📝 Creating Excel file...');
      
      // Create workbook with SheetJS
      const wb=XLSX.utils.book_new();
      
      // Transactions sheet
      if(txns&&txns.length>0){
        const txData=txns.map(t=>({
          Date:t.created_at,
          Type:t.type,
          From:t.from_account||'',
          To:t.to_account||'',
          Amount:t.amount,
          Category:t.category||'',
          Particulars:t.particulars||'',
          Bill:t.bill_no||'',
          Archived:t.archived?'Yes':'No'
        }));
        const ws=XLSX.utils.json_to_sheet(txData);
        XLSX.utils.book_append_sheet(wb,ws,'Transactions');
      }
      
      // Investments sheet
      if(invs&&invs.length>0){
        const invData=invs.map(i=>({
          Date:i.invested_at,
          Type:i.type,
          Account:i.account_name,
          Amount:i.amount,
          Units:i.units||'',
          NAV:i.nav||'',
          CurrentValue:i.current_value||'',
          Archived:i.archived?'Yes':'No'
        }));
        const ws=XLSX.utils.json_to_sheet(invData);
        XLSX.utils.book_append_sheet(wb,ws,'Investments');
      }
      
      // Provisions sheet
      if(provs&&provs.length>0){
        const provData=provs.map(p=>({
          Date:p.created_at,
          Type:p.type,
          Envelope:p.envelope_name,
          Amount:p.amount,
          Notes:p.notes||''
        }));
        const ws=XLSX.utils.json_to_sheet(provData);
        XLSX.utils.book_append_sheet(wb,ws,'Provisions');
      }
      
      // Site Transactions sheet
      if(sites&&sites.length>0){
        const siteData=sites.map(s=>({
