  const iS={background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',width:'100%'};
  const cS=a=>({display:'inline-block',border:a?'1px solid var(--green)':'1px solid var(--border2)',borderRadius:16,padding:'6px 12px',fontFamily:'var(--mono)',fontSize:11,color:a?'var(--green)':'var(--text2)',background:a?'var(--green-bg)':'var(--bg2)',cursor:'pointer',userSelect:'none',margin:'0 4px 4px 0'});
  const getCL=id=>checklist.find(c=>c.recurring_id===id);
  const isDue=r=>{
    if(!r.active&&r.active!==undefined)return false;
    if(r.is_provision)return false;
    if(r.frequency==='monthly')return true;
    if(r.frequency==='bimonthly'){const s=r.due_month||1;return(month-s)%2===0&&month>=s;}
    if(r.frequency==='quarterly'){const s=r.due_month||1;return(month-s)%3===0&&month>=s;}
    if(r.frequency==='half_yearly')return month===r.due_month||month===r.due_month2;
    if(r.frequency==='annual')return month===r.due_month;
    return false;
  };
  const ccItems=allCC.map(a=>({balance:balances[a]||0,name:a})).filter(x=>x.balance<0).map(x=>({id:'cc-'+x.name,name:x.name+' bill payment',amount:Math.abs(x.balance),frequency:'monthly',account:allBanks.find(b=>b!=='Cash')||allBanks[0]||'',category:'Credit Card Bill',is_cc_payment:true,cc_name:x.name,due_day:null,active:true}));
  const activeItems=[...ccItems,...recurring.filter(isDue)];
  const paid=activeItems.filter(r=>getCL(r.id)?.status==='paid');
  const pending=activeItems.filter(r=>getCL(r.id)?.status!=='paid');
  const pct=activeItems.length>0?Math.round(paid.length/activeItems.length*100):0;

  const handleAdd=async()=>{
    if(!form.name.trim())return;setSaving(true);
    await onAdd({name:form.name.trim(),amount:parseFloat(form.amount)||0,frequency:form.frequency,due_day:parseInt(form.due_day)||1,due_month:form.due_month?parseInt(form.due_month):null,due_month2:form.due_month2?parseInt(form.due_month2):null,account:form.account,provision_account:null,category:form.category,notes:form.notes,is_provision:false,active:true});
    setForm({name:'',amount:'',frequency:'monthly',due_day:1,due_month:'',due_month2:'',account:'Cash',category:'',notes:'',active:true});setSaving(false);setAddOpen(false);
  };

  return(<div className="fade-in" style={{paddingBottom:8}}>
    <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',background:'var(--bg2)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div><div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{MONTHS[month-1]} {year} — Bills</div><div style={{fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:2}}>{paid.length}/{activeItems.length} done</div></div>
        <button onClick={()=>setAddOpen(o=>!o)} style={{background:'var(--green)',border:'none',borderRadius:8,color:'#000',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:'7px 14px',cursor:'pointer'}}>+ Add</button>
      </div>
      {activeItems.length>0&&<div><div style={{background:'var(--bg3)',borderRadius:3,height:6}}><div style={{height:6,borderRadius:3,transition:'width 0.3s',background:pct===100?'var(--green)':pct>=70?'var(--blue)':'var(--amber)',width:pct+'%'}}/></div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:3,textAlign:'right'}}>{pct}% complete</div></div>}
    </div>

    {addOpen&&(<div style={{margin:'8px 12px',background:'var(--bg2)',border:'1px solid var(--blue)',borderRadius:10,padding:'14px'}}>
      <p style={{fontSize:11,color:'var(--blue)',fontFamily:'var(--mono)',margin:'0 0 10px',fontWeight:600,letterSpacing:'0.06em'}}>ADD RECURRING BILL</p>
      <div style={{display:'flex',gap:8,marginBottom:8}}><input style={{...iS,flex:2}} placeholder="e.g. Society maintenance" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/><input style={{...iS,flex:1}} type="number" placeholder="₹ (0=variable)" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/></div>
      <div style={{marginBottom:8}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:5}}>FREQUENCY</div><div style={{display:'flex',flexWrap:'wrap'}}>{FREQS.map(({k,l})=><span key={k} style={cS(form.frequency===k)} onClick={()=>setForm(f=>({...f,frequency:k}))}>{l}</span>)}</div></div>
      <div style={{display:'flex',gap:8,marginBottom:8}}><div style={{flex:1}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>DUE DAY</div><input style={iS} type="number" min="1" max="31" value={form.due_day} onChange={e=>setForm(f=>({...f,due_day:e.target.value}))}/></div>{['annual','half_yearly','quarterly','bimonthly'].includes(form.frequency)&&<div style={{flex:1}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>{form.frequency==='half_yearly'?'1ST MONTH':'DUE MONTH'}</div><input style={iS} type="number" min="1" max="12" placeholder="e.g. 10" value={form.due_month} onChange={e=>setForm(f=>({...f,due_month:e.target.value}))}/></div>}{form.frequency==='half_yearly'&&<div style={{flex:1}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>2ND MONTH</div><input style={iS} type="number" min="1" max="12" placeholder="e.g. 4" value={form.due_month2} onChange={e=>setForm(f=>({...f,due_month2:e.target.value}))}/></div>}</div>
      <div style={{marginBottom:8}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:5}}>DEFAULT ACCOUNT</div><div style={{display:'flex',flexWrap:'wrap'}}>{allAccounts.map(a=><span key={a} style={cS(form.account===a)} onClick={()=>setForm(f=>({...f,account:a}))}>{a}</span>)}</div></div>
      <input style={{...iS,marginBottom:8}} placeholder="Category (optional)" value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}/>
      <div style={{display:'flex',gap:8}}><button onClick={handleAdd} disabled={saving||!form.name.trim()} style={{flex:1,background:saving||!form.name.trim()?'var(--bg3)':'var(--green)',border:'none',borderRadius:8,color:saving||!form.name.trim()?'var(--text3)':'#000',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:12,cursor:'pointer'}}>{saving?'Saving...':'Save'}</button><button onClick={()=>setAddOpen(false)} style={{background:'none',border:'1px solid var(--border2)',borderRadius:8,color:'var(--text3)',padding:'12px 16px',fontFamily:'var(--mono)',fontSize:12,cursor:'pointer'}}>Cancel</button></div>
    </div>)}

    {pending.length>0&&<><p className="sec-label" style={{color:'var(--amber)'}}>Pending — {pending.length}</p>{pending.map(r=><RecItem key={r.id} rec={r} cl={getCL(r.id)} onPrefill={onPrefill}/>)}</>}
    {paid.length>0&&<><p className="sec-label">Done — {paid.length}</p>{paid.map(r=><RecItem key={r.id} rec={r} cl={getCL(r.id)} onPrefill={onPrefill}/>)}</>}
    {activeItems.length===0&&!addOpen&&<div className="empty">No bills this month.<br/>"+ Add" se setup karo.</div>}
    {recurring.filter(r=>!r.is_provision).length>0&&<><p className="sec-label" style={{marginTop:16}}>All recurring bills</p>{recurring.filter(r=>!r.is_provision).map(r=><div key={r.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 14px',borderBottom:'1px solid var(--border)',fontSize:12}}><div style={{flex:1,minWidth:0}}><div style={{color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.name}</div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:2}}>{FREQS.find(f=>f.k===r.frequency)?.l||r.frequency} · {r.account}</div></div><div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}><span style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--text2)'}}>{r.amount?fmtAmt(r.amount):'var'}</span><button onClick={()=>onDelete(r.id)} style={{background:'none',border:'1px solid var(--border)',borderRadius:5,color:'var(--text3)',padding:'3px 8px',fontSize:10,fontFamily:'var(--mono)',cursor:'pointer'}}>✕</button></div></div>)}</>}

/* ── ProvisionLedger ── */
function ProvisionLedger({recurring,txns,allBanks,onAddTxn,onAddRecurring,showToast}){
  const [sel,setSel]=useState(null);
  const [qAction,setQAction]=useState(null); 
  const [qAmt,setQAmt]=useState('');const [qNote,setQNote]=useState('');const [saving,setSaving]=useState(false);
  const [addOpen,setAddOpen]=useState(false);
  const [form,setForm]=useState({name:'',target_amount:'',already_saved:'',due_date:'',monthly_contribution:'',from_account:'',to_account:'',active:true});
  const [formSaving,setFormSaving]=useState(false);

  const provisions=recurring.filter(r=>r.is_provision&&r.active!==false&&!r.is_cc_payment&&!(r.name||'').match(/CC Payment|Credit Card/i));
  const activeTxns=txns.filter(t=>t.status!=='voided');

  const getLedger=prov=>{
    const deps=activeTxns.filter(t=>t.type==='Bank→Bank'&&t.particulars&&t.particulars.includes(prov.name)&&!t.particulars.includes('[WITHDRAW]')&&!t.particulars.includes('[RETURN]'));
    const wdrs=activeTxns.filter(t=>t.type==='Bank→Bank'&&t.particulars&&t.particulars.includes('[WITHDRAW] '+prov.name));
    const rets=activeTxns.filter(t=>t.type==='Bank→Bank'&&t.particulars&&t.particulars.includes('[RETURN] '+prov.name));
    const dep_=deps.reduce((s,t)=>s+(+t.amount),0);const wdr_=wdrs.reduce((s,t)=>s+(+t.amount),0);const ret_=rets.reduce((s,t)=>s+(+t.amount),0);
    const bal=dep_-wdr_+ret_;const tgt=parseFloat(prov.target_amount)||0;const pct=tgt>0?Math.min(Math.round(bal/tgt*100),100):0;
    return{deps,wdrs,rets,dep_,wdr_,ret_,bal,tgt,pct};
  };

  const handleQuick=async(prov,type,amt,note)=>{
    if(!amt||parseFloat(amt)<=0)return;setSaving(true);
    const isAdd=type==='add';
    const from_=isAdd?(prov.account||allBanks.find(b=>b!=='Cash')||'KB'):prov.provision_account;
    const to_=isAdd?prov.provision_account:(prov.account||allBanks.find(b=>b!=='Cash')||'KB');
    if(from_&&to_&&from_===to_){alert('⚠ Self-transfer not allowed. Source and destination accounts are the same.');setSaving(false);return;}
    const label=isAdd?prov.name:'[WITHDRAW] '+prov.name;
    await onAddTxn({type:'Bank→Bank',amount:parseFloat(amt),category:'Provision',from_account:from_,to_account:to_,particulars:label+(note?' — '+note:''),status:'complete',source:'provision',created_at:new Date().toISOString()});
    setQAction(null);setQAmt('');setQNote('');setSaving(false);
    showToast(isAdd?'✓ Funds added to envelope':'↩ Withdrawal logged');
  };

  const handleAddProv=async()=>{
    if(!form.name.trim()||!form.from_account||!form.to_account)return;
    if(form.from_account===form.to_account){alert('⚠ Self-transfer not allowed. Source account and envelope account must be different.');return;}
    if(!form.due_date){alert('⚠ Due date is mandatory. Please set a target date for this envelope.');return;}
    setFormSaving(true);
    await onAddRecurring({name:form.name.trim(),amount:parseFloat(form.monthly_contribution)||0,frequency:'monthly',due_day:1,account:form.from_account,provision_account:form.to_account,category:'Provision',target_amount:parseFloat(form.target_amount)||0,already_saved:parseFloat(form.already_saved)||0,due_date:form.due_date||null,is_provision:true,active:true});
    setForm({name:'',target_amount:'',already_saved:'',due_date:'',monthly_contribution:'',from_account:'',to_account:'',active:true});setFormSaving(false);setAddOpen(false);
  };

  const tgt=parseFloat(form.target_amount)||0;const saved=parseFloat(form.already_saved)||0;const gap=Math.max(0,tgt-saved);
  const dueDate=form.due_date?new Date(form.due_date):null;
  const monthsLeft=dueDate?Math.max(1,Math.round((dueDate-new Date())/(1000*60*60*24*30))):0;
  const sugMonth=monthsLeft>0?Math.ceil(gap/monthsLeft):0;

  const iS={background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,padding:'8px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',width:'100%'};
  const cS=a=>({display:'inline-block',border:a?'1px solid var(--green)':'1px solid var(--border2)',borderRadius:16,padding:'6px 12px',fontFamily:'var(--mono)',fontSize:11,color:a?'var(--green)':'var(--text2)',background:a?'var(--green-bg)':'var(--bg2)',cursor:'pointer',userSelect:'none',margin:'0 4px 4px 0'});

  return(<div className="fade-in" style={{paddingBottom:8}}>
    <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',background:'var(--bg2)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div><div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>Wealth Envelopes</div><div style={{fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:2}}>Locked savings goals</div></div>
      <button onClick={()=>setAddOpen(o=>!o)} style={{background:'var(--green)',border:'none',borderRadius:8,color:'#000',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:'7px 14px',cursor:'pointer'}}>+ New</button>
    </div>

    {addOpen&&(<div style={{margin:'8px 12px',background:'var(--bg2)',border:'1px solid var(--blue)',borderRadius:10,padding:'14px'}}>
      <p style={{fontSize:11,color:'var(--blue)',fontFamily:'var(--mono)',margin:'0 0 12px',fontWeight:600,letterSpacing:'0.06em'}}>NEW WEALTH ENVELOPE</p>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        <input style={iS} placeholder="Envelope name (e.g. LIC Premium Oct)" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
        <div style={{display:'flex',gap:8}}>
          <div style={{flex:1}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>TARGET AMOUNT</div><input style={iS} type="number" step="0.01" placeholder="₹ Total needed" value={form.target_amount} onChange={e=>setForm(f=>({...f,target_amount:e.target.value}))}/></div>
          <div style={{flex:1}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>ALREADY SAVED</div><input style={iS} type="number" step="0.01" placeholder="₹ In bank now" value={form.already_saved} onChange={e=>setForm(f=>({...f,already_saved:e.target.value}))}/></div>
        </div>
        <div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>PROVISIONED TILL DATE</div><input style={iS} type="date" value={form.due_date} onChange={e=>setForm(f=>({...f,due_date:e.target.value}))}/></div>
        {tgt>0&&(<div style={{background:'var(--amber-bg)',border:'1px solid var(--amber)',borderRadius:8,padding:'10px 12px',fontFamily:'var(--mono)',fontSize:11,display:'flex',gap:16,flexWrap:'wrap'}}>
          <span>Gap: <strong style={{color:'var(--red)'}}>{fmtAmt(gap)}</strong></span>
          {dueDate&&<span>Months left: <strong>{monthsLeft}</strong></span>}
          {sugMonth>0&&<span>Suggested: <strong style={{color:'var(--green)'}}>{fmtAmt(sugMonth)}/mo</strong></span>}
        </div>)}
        <div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>MONTHLY CONTRIBUTION</div><input style={iS} type="number" step="0.01" placeholder={sugMonth>0?`Suggested: ₹${fmt(sugMonth)}`:'₹ per month'} value={form.monthly_contribution} onChange={e=>setForm(f=>({...f,monthly_contribution:e.target.value}))}/></div>
        <div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:5}}>DEBIT FROM (source bank)</div><div style={{display:'flex',flexWrap:'wrap'}}>{allBanks.filter(b=>b!=='Cash').map(a=><span key={a} style={cS(form.from_account===a)} onClick={()=>setForm(f=>({...f,from_account:a}))}>{a}</span>)}</div></div>
        <div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:5}}>ENVELOPE ACCOUNT (save into)</div><div style={{display:'flex',flexWrap:'wrap'}}>{allBanks.filter(b=>b!=='Cash').map(a=><span key={a} style={cS(form.to_account===a)} onClick={()=>setForm(f=>({...f,to_account:a}))}>{a}</span>)}</div></div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={handleAddProv} disabled={formSaving||!form.name.trim()||!form.from_account||!form.to_account} style={{flex:1,background:formSaving||!form.name.trim()||!form.from_account||!form.to_account?'var(--bg3)':'var(--green)',border:'none',borderRadius:8,color:formSaving||!form.name.trim()?'var(--text3)':'#000',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:12,cursor:'pointer'}}>{formSaving?'Saving...':'Create Envelope'}</button>
          <button onClick={()=>setAddOpen(false)} style={{background:'none',border:'1px solid var(--border2)',borderRadius:8,color:'var(--text3)',padding:'12px 16px',fontFamily:'var(--mono)',fontSize:12,cursor:'pointer'}}>Cancel</button>
        </div>
      </div>
    </div>)}

    {provisions.length===0&&!addOpen&&<div className="empty">No envelopes yet.<br/>Tap "+ New" to create your first savings goal.</div>}

    {provisions.map(prov=>{
      const{deps,wdrs,rets,dep_,wdr_,ret_,bal,tgt,pct}=getLedger(prov);
      const isOpen=sel===prov.id;const monthly=parseFloat(prov.amount)||0;
      const isQAdd=qAction?.id===prov.id&&qAction?.type==='add';const isQWdr=qAction?.id===prov.id&&qAction?.type==='withdraw';
      return(<div key={prov.id} className="env-card" style={{margin:'0 10px 10px'}}>
        <div style={{padding:'12px 14px',cursor:'pointer'}} onClick={()=>setSel(isOpen?null:prov.id)}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{prov.name}</div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:2}}>{monthly>0?fmtAmt(monthly)+'/mo':''}{prov.account&&prov.provision_account?' · '+prov.account+'→'+prov.provision_account:''}{prov.due_date&&<span style={{marginLeft:6}}>· due {new Date(prov.due_date).toLocaleDateString('en-IN',{month:'short',year:'numeric'})}</span>}</div></div>
            <div style={{textAlign:'right'}}><div style={{fontFamily:'var(--mono)',fontSize:16,fontWeight:700,color:bal>0?'var(--green)':'var(--text3)'}}>{fmtAmt(bal)}</div>{tgt>0&&<div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)'}}>{pct}% of {fmtAmt(tgt)}</div>}</div>
          </div>
          {tgt>0&&<div className="env-bar" style={{marginTop:8}}><div className="env-fill" style={{width:pct+'%',background:pct>=100?'var(--green)':pct>=60?'var(--blue)':'var(--amber)'}}/></div>}
          {(!tgt||!prov.due_date)&&<div style={{marginTop:6,display:'inline-flex',alignItems:'center',gap:4,background:'var(--red-bg)',border:'1px solid var(--red)',borderRadius:20,padding:'2px 8px',fontFamily:'var(--mono)',fontSize:9,fontWeight:700,color:'var(--red)',letterSpacing:'0.04em'}}>⚠ Target/Schedule Missing</div>}
        </div>
        <div style={{display:'flex',gap:6,padding:'0 14px 10px'}}>
          <button onClick={e=>{e.stopPropagation();setQAction(isQAdd?null:{id:prov.id,type:'add'});setQAmt('');setQNote('');}} style={{flex:1,background:isQAdd?'var(--green)':'var(--green-bg)',border:'1px solid var(--green)',borderRadius:6,color:isQAdd?'#000':'var(--green)',fontFamily:'var(--mono)',fontSize:11,fontWeight:600,padding:'7px 0',cursor:'pointer'}}>{isQAdd?'▲ Cancel':'+ Add Funds'}</button>
          <button onClick={e=>{e.stopPropagation();setQAction(isQWdr?null:{id:prov.id,type:'withdraw'});setQAmt('');setQNote('');}} style={{flex:1,background:isQWdr?'var(--red)':'var(--red-bg)',border:'1px solid var(--red)',borderRadius:6,color:isQWdr?'#fff':'var(--red)',fontFamily:'var(--mono)',fontSize:11,fontWeight:600,padding:'7px 0',cursor:'pointer'}}>{isQWdr?'▼ Cancel':'− Withdraw'}</button>
        </div>
        {(isQAdd||isQWdr)&&(<div style={{padding:'0 14px 12px',borderTop:'1px solid var(--border)'}}>
          <div style={{display:'flex',gap:6,marginBottom:6}}><input type="number" step="0.01" autoFocus placeholder={isQAdd?"Amount to add":"Amount to withdraw"} value={qAmt} onChange={e=>setQAmt(e.target.value)} style={{...iS,flex:2}}/><input placeholder="Note (optional)" value={qNote} onChange={e=>setQNote(e.target.value)} style={{...iS,flex:3}}/></div>
          <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:6}}>{isQAdd?<>Debit: <strong>{prov.account}</strong> → <strong>{prov.provision_account}</strong></>:<>Debit: <strong>{prov.provision_account}</strong> → <strong>{prov.account}</strong></>}</div>
          <button onClick={()=>handleQuick(prov,isQAdd?'add':'withdraw',qAmt,qNote)} disabled={saving||!qAmt} style={{width:'100%',background:saving||!qAmt?'var(--bg2)':isQAdd?'var(--green)':'var(--red-bg)',border:'1px solid '+(saving||!qAmt?'var(--border)':isQAdd?'var(--green)':'var(--red)'),borderRadius:6,color:saving||!qAmt?'var(--text3)':isQAdd?'#000':'var(--red)',fontFamily:'var(--mono)',fontSize:11,fontWeight:600,padding:'9px',cursor:'pointer'}}>{saving?'Logging...':'Confirm — '+(isQAdd?'Add':'Withdraw')+' '+(qAmt?fmtAmt(parseFloat(qAmt)):'')}</button>
        </div>)}
        {isOpen&&(<div style={{borderTop:'1px solid var(--border)'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',borderBottom:'1px solid var(--border)'}}>{[['Added Funds',fmtAmt(dep_),'var(--green)'],['Funds Used',fmtAmt(wdr_),wdr_>0?'var(--red)':'var(--text3)'],['Returned',fmtAmt(ret_),ret_>0?'var(--blue)':'var(--text3)']].map(([l,v,c])=><div key={l} style={{padding:'7px',textAlign:'center',borderRight:'1px solid var(--border)'}}><div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)'}}>{l.toUpperCase()}</div><div style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:c}}>{v}</div></div>)}</div>
          {[...deps,...wdrs,...rets].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).map((t,i)=>{const isW=t.particulars?.includes('[WITHDRAW]');const isR=t.particulars?.includes('[RETURN]');return(<div key={t.id||i} style={{display:'flex',justifyContent:'space-between',padding:'8px 14px',borderBottom:'1px solid var(--border)',fontSize:11}}><div><div style={{color:isW?'var(--red)':isR?'var(--blue)':'var(--green)',fontFamily:'var(--mono)'}}>{isW?'↩ Funds Used':isR?'↪ Returned':'↑ Added Funds'}</div><div style={{color:'var(--text3)',marginTop:2,fontSize:10}}>{fmtDate(t.created_at)}</div></div><span style={{fontFamily:'var(--mono)',fontWeight:600,color:isW?'var(--red)':isR?'var(--blue)':'var(--green)'}}>{isW?'−':'+'}{fmtAmt(t.amount)}</span></div>);})}
          {deps.length===0&&<div style={{padding:'12px 14px',fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)'}}>No transactions yet. Use "+ Add Funds" to start.</div>}
        </div>)}
      </div>);
    })}
  </div>);
}

/* ── StatementScreen ── */
function StatementScreen({txns,allAccounts,allBanks,allCC,opening,balances,stmtFilters,setStmtFilters,setTxnFilters,setTab}){
  const [acct,setAcct]=useState(allBanks[0]||'');const [period,setPeriod]=useState('this_month');
  const [customStart,setCustomStart]=useState('');const [customEnd,setCustomEnd]=useState('');
  
  useEffect(()=>{if(stmtFilters){setAcct(stmtFilters.account);setPeriod(stmtFilters.period);setStmtFilters(null);}},[stmtFilters,setStmtFilters]);
  
  const now=new Date();const month=now.getMonth();const year=now.getFullYear();
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  
  const acctTxns=txns.filter(t=>t.status!=='voided').filter(t=>t.from_account===acct||t.to_account===acct).filter(t=>{const d=new Date(t.created_at);if(period==='this_month')return d.getMonth()===month&&d.getFullYear()===year;if(period==='last_month'){const lm=month===0?11:month-1,ly=month===0?year-1:year;return d.getMonth()===lm&&d.getFullYear()===ly;}if(period==='this_year')return d.getFullYear()===year;if(period==='custom'&&customStart&&customEnd){const ds=t.created_at.slice(0,10);return ds>=customStart&&ds<=customEnd;}return true;}).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  const beforePeriod=txns.filter(t=>t.status!=='voided').filter(t=>t.from_account===acct||t.to_account===acct).filter(t=>{if(period==='all')return false;const d=new Date(t.created_at);if(period==='this_month')return d<new Date(year,month,1);if(period==='last_month'){const lm=month===0?11:month-1,ly=month===0?year-1:year;return d<new Date(ly,lm,1);}if(period==='this_year')return d<new Date(year,0,1);if(period==='custom'&&customStart)return t.created_at.slice(0,10)<customStart;return false;});
  
  const rawOpen=opening[acct];const openingAmt=typeof rawOpen==='object'&&rawOpen!==null?(rawOpen.amount||0):(rawOpen||0);
  const openBal=openingAmt+beforePeriod.reduce((s,t)=>{const a=parseFloat(t.amount)||0;if(t.type==='Expense'||t.type==='UA Expense')return t.from_account===acct?s-a:s;if(t.type==='Income'||t.type==='UA Received')return t.to_account===acct?s+a:s;let e=0;if(t.from_account===acct)e-=a;if(t.to_account===acct)e+=a;return s+e;},0);
  
  const rows=acctTxns.map(t=>{const a=parseFloat(t.amount)||0;let deposit=0,withdrawal=0;if(t.type==='Income'||t.type==='UA Received'){if(t.to_account===acct)deposit=a;}else if(t.type==='Expense'||t.type==='UA Expense'){if(t.from_account===acct)withdrawal=a;}else{if(t.to_account===acct)deposit=a;if(t.from_account===acct)withdrawal=a;}return{...t,deposit,withdrawal};});
  
  const totDeposit=rows.reduce((s,r)=>s+r.deposit,0);const totWithdrawal=rows.reduce((s,r)=>s+r.withdrawal,0);const closeBal=openBal+totDeposit-totWithdrawal;
  const periodLabel=(()=>{if(period==='this_month')return`${MONTHS[month]} ${year}`;if(period==='last_month')return`${MONTHS[month===0?11:month-1]} ${month===0?year-1:year}`;if(period==='this_year')return`FY ${year}`;if(period==='custom'&&customStart&&customEnd)return`${customStart} to ${customEnd}`;return'All Time';})();
  const pMode=period==='custom'?'Custom':period==='this_month'?'This Month':period==='last_month'?'Last Month':period==='this_year'?'This Year':'All Time';
  
  const handlePrint=()=>{const html=`<!DOCTYPE html><html><head><title>${acct} Statement - ${periodLabel}</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:20px;}h1{font-size:14px;margin-bottom:4px;}h2{font-size:11px;font-weight:400;color:#666;margin-bottom:16px;}table{width:100%;border-collapse:collapse;margin-top:12px;}th,td{border:1px solid #ccc;padding:6px 8px;text-align:left;}th{background:#f5f5f5;font-weight:600;font-size:9px;text-transform:uppercase;}td{font-size:10px;}.amt{text-align:right;font-variant-numeric:tabular-nums;}.summary{margin-top:16px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}.summary div{border:1px solid #ccc;padding:8px;background:#fafafa;}.summary .label{font-size:8px;text-transform:uppercase;color:#666;margin-bottom:3px;}.summary .value{font-size:12px;font-weight:700;}.desc{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}</style></head><body><h1>${acct} — Bank Ledger</h1><h2>${periodLabel}</h2><div class="summary"><div><div class="label">Opening Balance</div><div class="value">₹${fmtAmt(Math.abs(openBal))}</div></div><div><div class="label">Total Deposits</div><div class="value">₹${fmtAmt(totDeposit)}</div></div><div><div class="label">Total Withdrawals</div><div class="value">₹${fmtAmt(totWithdrawal)}</div></div></div><table><thead><tr><th style="width:20%;">Date</th><th style="width:40%;">Description</th><th style="width:20%;">Deposit (₹)</th><th style="width:20%;">Withdrawal (₹)</th></tr></thead><tbody><tr style="background:#fff8e1;"><td colspan="2" style="font-weight:600;">OPENING BALANCE</td><td class="amt">${openBal>=0?fmtAmt(openBal):'—'}</td><td class="amt">${openBal<0?fmtAmt(Math.abs(openBal)):'—'}</td></tr>${rows.map(t=>`<tr><td>${fmtDate(t.created_at)}</td><td class="desc">${t.particulars||t.category||t.type}</td><td class="amt">${t.deposit>0?fmtAmt(t.deposit):'—'}</td><td class="amt">${t.withdrawal>0?fmtAmt(t.withdrawal):'—'}</td></tr>`).join('')}<tr style="background:#e8f5e9;font-weight:600;"><td colspan="2">CLOSING BALANCE</td><td class="amt">${closeBal>=0?fmtAmt(closeBal):'—'}</td><td class="amt">${closeBal<0?fmtAmt(Math.abs(closeBal)):'—'}</td></tr></tbody></table><div style="margin-top:16px;font-size:9px;color:#999;">Generated ${new Date().toLocaleString('en-IN')} · JB Finance v1.9.0</div></body></html>`;const w=window.open('','_blank');w.document.write(html);w.document.close();w.print();};
  const cS=a=>({display:'inline-block',border:a?'1px solid var(--green)':'1px solid var(--border2)',borderRadius:14,padding:'6px 12px',fontFamily:'var(--mono)',fontSize:11,color:a?'var(--green)':'var(--text2)',background:a?'var(--green-bg)':'var(--bg2)',cursor:'pointer',userSelect:'none',margin:'0 4px 4px 0'});
  
  return(<div className="fade-in">
    <p className="sec-label">Select Account</p><div style={{display:'flex',flexWrap:'wrap',padding:'0 16px 8px',gap:6}}>{[...allBanks,...allCC].map(a=><div key={a} style={cS(acct===a)} onClick={()=>setAcct(a)}>{a}</div>)}</div>
    <p className="sec-label">Period</p><div style={{display:'flex',flexWrap:'wrap',padding:'0 16px 8px',gap:6}}>{[['this_month','This Month'],['last_month','Last Month'],['this_year','This Year'],['custom','Custom'],['all','All Time']].map(([k,l])=><div key={k} style={cS(period===k)} onClick={()=>setPeriod(k)}>{l}</div>)}</div>
    {period==='custom'&&<div style={{padding:'0 16px 8px',display:'flex',gap:8,alignItems:'center'}}><input type="date" value={customStart} onChange={e=>setCustomStart(e.target.value)} style={{flex:1,background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'8px 10px',fontFamily:'var(--mono)',fontSize:11,color:'var(--text)'}}/><span style={{color:'var(--text3)',fontSize:11}}>to</span><input type="date" value={customEnd} onChange={e=>setCustomEnd(e.target.value)} style={{flex:1,background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'8px 10px',fontFamily:'var(--mono)',fontSize:11,color:'var(--text)'}}/></div>}
    
    <div style={{margin:'8px 16px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'12px 14px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',letterSpacing:'0.08em',textTransform:'uppercase'}}>{acct} — {periodLabel}</div>
        <button onClick={handlePrint} style={{background:'var(--blue)',color:'#fff',border:'none',borderRadius:6,padding:'5px 12px',fontFamily:'var(--mono)',fontSize:10,fontWeight:600,cursor:'pointer'}}>🖨 Print</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
        <div><div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',marginBottom:3}}>Opening</div><div style={{fontSize:13,fontWeight:600,fontFamily:'var(--mono)',color:openBal<0?'var(--red)':'var(--text)'}}>{openBal<0?'−':''}{fmtAmt(Math.abs(openBal))}</div></div>
        <div onClick={()=>{setTxnFilters({account:acct,type:'INCOME',periodMode:pMode,startDate:customStart,endDate:customEnd});setTab('txns');}} style={{cursor:'pointer'}}><div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',marginBottom:3}}>Deposits</div><div style={{fontSize:13,fontWeight:600,fontFamily:'var(--mono)',color:'var(--green)'}}>+{fmtAmt(totDeposit)}</div></div>
        <div onClick={()=>{setTxnFilters({account:acct,type:'EXPENSE',periodMode:pMode,startDate:customStart,endDate:customEnd});setTab('txns');}} style={{cursor:'pointer'}}><div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',marginBottom:3}}>Withdrawals</div><div style={{fontSize:13,fontWeight:600,fontFamily:'var(--mono)',color:'var(--red)'}}>−{fmtAmt(totWithdrawal)}</div></div>
      </div>
      <div style={{borderTop:'1px solid var(--border)',marginTop:8,paddingTop:8}}><div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',marginBottom:3}}>Closing Balance</div><div style={{fontSize:16,fontWeight:700,fontFamily:'var(--mono)',color:closeBal<0?'var(--red)':'var(--green)'}}>{closeBal<0?'−':''}{fmtAmt(Math.abs(closeBal))}</div></div>
    </div>
    
    {rows.length===0&&<div className="empty">No transactions for this account in this period.</div>}
    {rows.length>0&&<div style={{margin:'0 16px 24px',border:'1px solid var(--border)',borderRadius:10,overflow:'hidden'}}>
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:8,padding:'8px 12px',background:'var(--bg3)',borderBottom:'1px solid var(--border)'}}><span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',letterSpacing:'0.06em'}}>Description</span><span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',textAlign:'right'}}>Deposit</span><span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',textAlign:'right'}}>Withdrawal</span></div>
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:8,padding:'10px 12px',borderBottom:'1px solid var(--border)',background:'var(--amber-bg)'}}><div style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:'var(--text2)'}}>OPENING BALANCE</div><div style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:12,fontWeight:700,color:openBal>=0?'var(--green)':'var(--text3)'}}>{openBal>=0?fmtAmt(openBal):'—'}</div><div style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:12,fontWeight:700,color:openBal<0?'var(--red)':'var(--text3)'}}>{openBal<0?fmtAmt(Math.abs(openBal)):'—'}</div></div>
      {rows.map((t,i)=>(
        <div key={t.id} style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:8,padding:'10px 12px',borderBottom:'1px solid var(--border)',background:i%2===0?'var(--bg2)':'var(--bg)'}}>

  const lastStmt=getLastStmtDate();const lastStmtStr=lastStmt.toISOString().slice(0,10);const nextStmt=new Date(lastStmt.getFullYear(),lastStmt.getMonth()+1,stmtDay);const stmtGenerated=lastStmt.getMonth()===today.getMonth()&&lastStmt.getFullYear()===today.getFullYear();const prevBillStart=new Date(lastStmt.getFullYear(),lastStmt.getMonth()-1,stmtDay);const prevBillStartStr=prevBillStart.toISOString().slice(0,10);
  const lastRecon=getReconData(selCC);const defaultBillStart=lastRecon?lastRecon.billEnd:prevBillStartStr;const defaultBillEnd=lastRecon?(()=>{const lastEnd=new Date(lastRecon.billEnd);const next=new Date(lastEnd.getFullYear(),lastEnd.getMonth()+1,stmtDay);return next.toISOString().slice(0,10);})():lastStmtStr;
  const [billStart,setBillStart]=useState(defaultBillStart);const [billEnd,setBillEnd]=useState(defaultBillEnd);

  const billed=ccSpends.filter(t=>{const d=t.created_at.slice(0,10);return d>billStart&&d<=billEnd;});const billedTotal=billed.reduce((s,t)=>s+(parseFloat(t.amount)||0),0);

      <div style={{background:stmtGenerated?'var(--green-bg)':'var(--amber-bg)',border:'1px solid '+(stmtGenerated?'var(--green)':'var(--amber)'),borderRadius:8,padding:'6px 12px',fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:stmtGenerated?'var(--green)':'var(--amber)',whiteSpace:'nowrap'}}>{stmtGenerated?'✓ Stmt Generated':'⏳ Not Yet'}</div>

/* ── InvestmentsScreen ── */
function InvestmentsScreen({investments,setInvestments,showToast}){

  const handleDelete=async id=>{if(!window.confirm('Remove this asset?'))return;const{error}=await db.from('investments').delete().eq('id',id);if(!error){setInvestments(investments.filter(i=>i.id!==id));showToast('↩ Asset Removed');}};
  const handleUpdatePrice=async id=>{if(!editPrice)return setEditId(null);const{error}=await db.from('investments').update({current_price:parseFloat(editPrice)}).eq('id',id);if(!error){setInvestments(investments.map(i=>i.id===id?{...i,current_price:parseFloat(editPrice)}:i));showToast('✓ Price Updated');}setEditId(null);setEditPrice('');};

        </div>);
      })}
    </div>
  </div>);
}

  const [aiTab,setAiTab]=useState('chat');

  const callAPI=async(msgs,sysPrompt)=>{

      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:1024,
        ...(sysPrompt?{system:sysPrompt}:{}),
        messages:msgs
      })
    });
    if(!res.ok){const e=await res.json().catch(()=>({error:{message:res.statusText}}));throw new Error(e?.error?.message||'API Error '+res.status);}
    return res.json();
  };

  const testConn=async()=>{
    setTesting(true);setTestStatus('⏳ Testing...');
    try{
      const d=await callAPI([{role:'user',content:'Reply with just: OK'}]);

    }catch(e){setTestStatus('❌ '+e.message);}
    setTesting(false);
  };

  const sendMsg=async()=>{
    if(!input.trim()||loading)return;
    const userMsg={role:'user',content:input.trim()};
    const newMsgs=[...messages,userMsg];
    setMessages(newMsgs);setInput('');setLoading(true);
    try{
      const d=await callAPI(newMsgs,'You are JB Finance AI — a personal finance assistant for Jayesh Bhagat. Be concise, practical, use Indian financial context (₹, Indian tax laws 80C/80D, SIP, mutual funds). Reply in 2-4 sentences max unless user asks for detail.');
      const reply=d.content?.find(b=>b.type==='text')?.text||'(no response)';
      setMessages([...newMsgs,{role:'assistant',content:reply}]);
    }catch(e){setMessages([...newMsgs,{role:'assistant',content:'⚠ Error: '+e.message}]);}
    setLoading(false);
  };

  const process=()=>{try{const p=JSON.parse(jsonStr);if(Array.isArray(p))setPicks(p);else showToast('⚠ Invalid JSON');}catch(e){showToast('⚠ Parse error');}};
  const confirm_=async pick=>{if(!qty||parseFloat(qty)<=0)return;setSaving(true);const p={asset_name:pick.asset_name,asset_type:'Equity',buy_date:new Date().toISOString().slice(0,10),qty:parseFloat(qty),buy_price:parseFloat(pick['entry_price_₹']),current_price:parseFloat(pick['entry_price_₹'])};const{data,error}=await db.from('investments').insert([p]).select();if(data&&!error){setInvestments([data[0],...investments]);setPicks(picks.filter(p=>p.asset_name!==pick.asset_name));showToast('✓ '+pick.asset_name+' added!');}else showToast('⚠ Error');setSaving(false);setAcc(null);setQty('');};

  const tabS=a=>({flex:1,padding:'9px 0',fontFamily:'var(--mono)',fontSize:11,fontWeight:a?700:400,letterSpacing:'0.06em',textTransform:'uppercase',border:'none',borderBottom:a?'2px solid var(--green)':'2px solid transparent',background:'none',color:a?'var(--green)':'var(--text3)',cursor:'pointer'});
  const iS={background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',width:'100%'};

  return(<div className="fade-in" style={{paddingBottom:'80px'}}>
    <div style={{margin:'12px 16px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'12px 14px'}}>
      <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:8}}>Anthropic API Key</div>
      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:8}}>
        <input type={keyVisible?'text':'password'} placeholder="sk-ant-api03-..." value={apiKey} onChange={e=>saveKey(e.target.value)} style={{...iS,flex:1,fontFamily:'var(--mono)',fontSize:12}}/>
        <button onClick={()=>setKeyVisible(v=>!v)} style={{background:'none',border:'1px solid var(--border)',borderRadius:6,color:'var(--text3)',padding:'8px 10px',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer'}}>{keyVisible?'Hide':'Show'}</button>
      </div>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <button onClick={testConn} disabled={testing||!apiKey.trim()} style={{background:testing?'var(--bg3)':'var(--blue)',border:'none',borderRadius:6,color:testing?'var(--text3)':'#fff',fontFamily:'var(--mono)',fontSize:11,fontWeight:600,padding:'8px 14px',cursor:'pointer',flexShrink:0}}>{testing?'Testing...':'Test Connection'}</button>
        {testStatus&&<span style={{fontFamily:'var(--mono)',fontSize:11,color:testStatus.startsWith('✓')?'var(--green)':'var(--red)',flex:1,lineHeight:1.4}}>{testStatus}</span>}
      </div>
    </div>
    <div style={{display:'flex',borderBottom:'1px solid var(--border)',padding:'0 16px'}}>
      <button style={tabS(aiTab==='chat')} onClick={()=>setAiTab('chat')}>💬 Finance Chat</button>
      <button style={tabS(aiTab==='quant')} onClick={()=>setAiTab('quant')}>📊 Quant Engine</button>
    </div>

    {aiTab==='chat'&&(<div style={{display:'flex',flexDirection:'column'}}>
      {!apiKey.trim()&&<div style={{margin:'12px 16px',background:'var(--amber-bg)',border:'1px solid var(--amber)',borderRadius:8,padding:'10px 12px',fontFamily:'var(--mono)',fontSize:11,color:'var(--amber)'}}>⚠ Enter your Anthropic API key above to use the AI chat.</div>}
      <div style={{padding:'8px 0',minHeight:200}}>
        {messages.length===0&&<div style={{padding:'24px 16px',textAlign:'center',fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',lineHeight:2}}>Ask anything about your finances.<br/>e.g. "How can I save more on 80C this year?" or<br/>"What is a liquid mutual fund?"</div>}
        {messages.map((m,i)=>(
          <div key={i} style={{margin:'8px 16px',display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
            <div style={{maxWidth:'80%',background:m.role==='user'?'var(--green)':'var(--bg2)',border:'1px solid '+(m.role==='user'?'var(--green)':'var(--border)'),borderRadius:m.role==='user'?'12px 12px 2px 12px':'12px 12px 12px 2px',padding:'10px 12px',color:m.role==='user'?'#000':'var(--text)',fontSize:13,lineHeight:1.5}}>
              {m.content}
            </div>
          </div>
        ))}
        {loading&&<div style={{margin:'8px 16px'}}><div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'12px 12px 12px 2px',padding:'10px 12px',display:'inline-block',fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>Thinking…</div></div>}
      </div>
      <div style={{position:'fixed',bottom:'calc(var(--tab-h) + var(--safe-b))',left:'max(0px, 50% - 300px)',right:'max(0px, 50% - 300px)',background:'var(--bg)',borderTop:'1px solid var(--border)',padding:'10px 16px',display:'flex',gap:8,zIndex:90}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&sendMsg()} placeholder="Ask your finance AI..." style={{...iS,flex:1}} disabled={!apiKey.trim()||loading}/>
        <button onClick={sendMsg} disabled={!input.trim()||!apiKey.trim()||loading} style={{background:!input.trim()||!apiKey.trim()||loading?'var(--bg3)':'var(--green)',border:'none',borderRadius:8,color:!input.trim()||!apiKey.trim()||loading?'var(--text3)':'#000',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:'0 16px',cursor:'pointer',flexShrink:0}}>Send</button>
      </div>
      {messages.length>0&&<div style={{margin:'8px 16px'}}><button onClick={()=>setMessages([])} style={{background:'none',border:'1px solid var(--border)',borderRadius:6,color:'var(--text3)',fontFamily:'var(--mono)',fontSize:11,padding:'5px 12px',cursor:'pointer'}}>Clear chat</button></div>}
    </div>)}

    {aiTab==='quant'&&(<div>
      <div style={{padding:'16px'}}><p className="sec-label" style={{padding:'0 0 8px'}}>Quant Engine Input</p><textarea placeholder="Paste JSON output from Python script here..." value={jsonStr} onChange={e=>setJsonStr(e.target.value)} style={{width:'100%',height:'120px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',resize:'vertical'}}/><button onClick={process} style={{background:'var(--text)',color:'var(--bg)',border:'none',borderRadius:8,padding:'12px',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,width:'100%',marginTop:8,cursor:'pointer'}}>Process Picks</button></div>
      <div style={{padding:'0 16px'}}>
        {picks.length>0&&<p className="sec-label" style={{padding:'8px 0'}}>AI Recommendations</p>}
        {picks.map((pick,i)=>(
          <div key={i} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'14px',marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontFamily:'var(--mono)',fontSize:18,fontWeight:700,color:'var(--blue)'}}>{pick.asset_name}</span><span style={{fontFamily:'var(--mono)',fontSize:10,background:'var(--blue-bg)',color:'var(--blue)',padding:'4px 8px',borderRadius:20}}>2% TARGET</span></div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:12}}><div><div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)'}}>ENTRY PRICE</div><div style={{fontFamily:'var(--mono)',fontSize:15,fontWeight:600}}>₹{pick['entry_price_₹']}</div></div><div><div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)'}}>TARGET PRICE</div><div style={{fontFamily:'var(--mono)',fontSize:15,fontWeight:600,color:'var(--green)'}}>₹{pick['target_price_₹']}</div></div></div>
            <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,padding:'10px',marginTop:12,fontSize:11,lineHeight:1.5,color:'var(--text)'}}><strong>Thesis:</strong> {pick.thesis}<hr style={{border:'none',borderTop:'1px dashed var(--border2)',margin:'8px 0'}}/><strong style={{color:'var(--red)'}}>Exit:</strong> {pick.exit_condition}</div>
            {acc===pick.asset_name?<div style={{display:'flex',gap:8,marginTop:12}}><input type="number" step="any" autoFocus placeholder="Qty Bought" value={qty} onChange={e=>setQty(e.target.value)} style={{background:'var(--bg)',border:'1px solid var(--blue)',borderRadius:6,padding:'8px 12px',fontFamily:'var(--mono)',fontSize:12,outline:'none',flex:1,color:'var(--text)'}}/><button onClick={()=>confirm_(pick)} disabled={saving} style={{background:'var(--blue)',color:'#fff',border:'none',borderRadius:6,padding:'0 16px',fontFamily:'var(--mono)',fontSize:12,cursor:'pointer'}}>{saving?'...':'Confirm'}</button><button onClick={()=>setAcc(null)} style={{background:'none',border:'1px solid var(--border)',borderRadius:6,padding:'0 12px',fontFamily:'var(--mono)',fontSize:12,cursor:'pointer',color:'var(--text)'}}>✕</button></div>
            :<div style={{display:'flex',gap:8,marginTop:12}}><button onClick={()=>setAcc(pick.asset_name)} style={{flex:1,background:'var(--green)',color:'#000',border:'none',borderRadius:6,padding:'10px',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,cursor:'pointer'}}>Accept & Log</button><button onClick={()=>setPicks(picks.filter(p=>p.asset_name!==pick.asset_name))} style={{flex:1,background:'none',border:'1px solid var(--border2)',color:'var(--text2)',borderRadius:6,padding:'10px',fontFamily:'var(--mono)',fontSize:12,cursor:'pointer'}}>Reject</button></div>}
          </div>
        ))}
      </div>
    </div>)}
  </div>);
}

/* ── UdhariScreen ── */
function UdhariScreen({udhari,onAdd,onDelete,allAccounts,allBanks}){
  const [view,setView]=useState('list');const [sel,setSel]=useState(null);
  const [form,setForm]=useState({person_name:'',amount:'',direction:'given',mode:'Cash',notes:'',txn_date:new Date().toISOString().slice(0,10)});
  const [saving,setSaving]=useState(false);
  const todayStr=new Date().toISOString().slice(0,10);
  const persons={};
  udhari.forEach(u=>{if(!persons[u.person_name])persons[u.person_name]={given:0,received:0,entries:[]};if(u.direction==='given')persons[u.person_name].given+=u.amount;if(u.direction==='received')persons[u.person_name].received+=u.amount;persons[u.person_name].entries.push(u);});
  const personList=Object.entries(persons).map(([name,d])=>({name,outstanding:d.given-d.received,given:d.given,received:d.received,entries:d.entries})).sort((a,b)=>b.outstanding-a.outstanding);
  const totalOut=personList.reduce((s,p)=>s+Math.max(0,p.outstanding),0);
  const handleAdd=async()=>{if(!form.person_name.trim()||!form.amount||parseFloat(form.amount)<=0)return;setSaving(true);await onAdd({...form,amount:parseFloat(form.amount)});setForm({person_name:'',amount:'',direction:'given',mode:'Cash',notes:'',txn_date:todayStr});setSaving(false);setView('list');};
  const iS={background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:13,outline:'none',width:'100%'};

  if(view==='person'&&sel){
    const p=persons[sel];const entries=(p?.entries||[]).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));const out=(p?.given||0)-(p?.received||0);
    return(<div className="fade-in" style={{paddingBottom:8}}>
      <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',borderBottom:'1px solid var(--border)'}}>
        <div onClick={()=>setView('list')} style={{cursor:'pointer',color:'var(--blue)',fontFamily:'var(--mono)',fontSize:12}}>← Back</div>
        <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:'var(--text)'}}>{sel}</div><div style={{fontSize:11,color:out>0?'var(--amber)':out<0?'var(--green)':'var(--text3)',fontFamily:'var(--mono)'}}>{out>0?'owes you '+fmtAmt(out):out<0?'you owe '+fmtAmt(Math.abs(out)):'settled ✓'}</div></div>
        <div onClick={()=>{setForm(f=>({...f,person_name:sel}));setView('add');}} style={{background:'var(--green)',color:'#000',fontFamily:'var(--mono)',fontSize:11,fontWeight:600,padding:'6px 12px',borderRadius:6,cursor:'pointer'}}>+ Entry</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,padding:'10px 16px',borderBottom:'1px solid var(--border)'}}>
        {[['Given',fmtAmt(p?.given||0),'var(--amber)'],['Received',fmtAmt(p?.received||0),'var(--green)'],['Balance',fmtAmt(Math.abs(out)),out>0?'var(--red)':'var(--green)']].map(([l,v,c])=>(<div key={l} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 10px',textAlign:'center'}}><div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:3}}>{l.toUpperCase()}</div><div style={{fontSize:14,fontWeight:600,fontFamily:'var(--mono)',color:c}}>{v}</div></div>))}
      </div>
      {entries.map(e=>(<div key={e.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 16px',borderBottom:'1px solid var(--border)'}}>
        <div><div style={{fontSize:12,color:e.direction==='given'?'var(--amber)':'var(--green)',fontFamily:'var(--mono)',fontWeight:600}}>{e.direction==='given'?'▲ Diya':'▼ Wapas'} — {fmtAmt(e.amount)}</div><div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{fmtDate(e.created_at)} · {e.mode}{e.notes?' · '+e.notes:''}</div><div style={{fontSize:9,color:e.direction==='given'?'var(--amber)':'var(--green)',fontFamily:'var(--mono)',marginTop:1}}>{e.direction==='given'?'↳ Expense logged to '+e.mode:'↳ Income logged to '+e.mode}</div></div>
        <button onClick={()=>onDelete(e.id)} style={{background:'none',border:'1px solid var(--border)',borderRadius:6,color:'var(--text3)',padding:'4px 8px',fontSize:10,fontFamily:'var(--mono)',cursor:'pointer'}}>✕</button>
      </div>))}
      {entries.length===0&&<div className="empty">No entries yet</div>}
    </div>);
  }

  if(view==='add'){
    return(<div className="fade-in" style={{padding:'12px 16px',display:'flex',flexDirection:'column',gap:12}}>
      <div style={{display:'flex',alignItems:'center',gap:12}}><div onClick={()=>setView('list')} style={{cursor:'pointer',color:'var(--blue)',fontFamily:'var(--mono)',fontSize:12}}>← Back</div><span style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>New Udhari Entry</span></div>
      <div style={{background:'var(--blue-bg)',border:'1px solid var(--blue)',borderRadius:8,padding:'8px 12px',fontSize:11,color:'var(--blue)',fontFamily:'var(--mono)'}}>Every entry logs a real transaction to keep your balance accurate.</div>
      <div><p className="sec-label" style={{marginBottom:6}}>Direction</p><div className="chip-row"><div className={'chip'+(form.direction==='given'?' sel-amber':'')} onClick={()=>setForm(f=>({...f,direction:'given'}))}>▲ Maine diya</div><div className={'chip'+(form.direction==='received'?' sel':'')} onClick={()=>setForm(f=>({...f,direction:'received'}))}>▼ Wapas mila</div></div></div>
      <div><p className="sec-label" style={{marginBottom:6}}>Person</p><input style={iS} placeholder="e.g. Rajesh Senghani" value={form.person_name} onChange={e=>setForm(f=>({...f,person_name:e.target.value}))}/></div>
      <div style={{display:'flex',gap:8}}><div style={{flex:1}}><p className="sec-label" style={{marginBottom:6}}>Amount (₹)</p><input style={iS} type="number" placeholder="0" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/></div><div style={{flex:1}}><p className="sec-label" style={{marginBottom:6}}>Date</p><input style={{...iS,color:form.txn_date!==todayStr?'var(--amber)':'var(--text)'}} type="date" value={form.txn_date} max={todayStr} onChange={e=>setForm(f=>({...f,txn_date:e.target.value}))}/></div></div>
      <div><p className="sec-label" style={{marginBottom:6}}>Mode (account)</p><div className="chip-row">{['Cash',...allBanks].map(a=><div key={a} className={'chip'+(form.mode===a?' sel':'')} onClick={()=>setForm(f=>({...f,mode:a}))}>{a}</div>)}</div></div>
      <div><p className="sec-label" style={{marginBottom:6}}>Notes (optional)</p><input style={iS} placeholder="e.g. rickshaw ke liye" value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/></div>
      <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 12px',fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)'}}>Will log: {form.direction==='given'?<span style={{color:'var(--amber)'}}>Expense from <strong>{form.mode}</strong></span>:<span style={{color:'var(--green)'}}>Income to <strong>{form.mode}</strong></span>}</div>
      <button onClick={handleAdd} disabled={saving||!form.person_name.trim()||!form.amount} style={{background:saving||!form.person_name.trim()||!form.amount?'var(--bg3)':'var(--green)',border:'none',borderRadius:8,color:saving||!form.person_name.trim()||!form.amount?'var(--text3)':'#000',fontFamily:'var(--mono)',fontSize:13,fontWeight:600,padding:14,cursor:'pointer',transition:'all 0.2s'}}>{saving?'Saving...':'Save — '+(form.direction==='given'?'Diya':'Wapas')+' ₹'+(form.amount||0)}</button>
    </div>);
  }

  return(<div className="fade-in" style={{paddingBottom:8}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',borderBottom:'1px solid var(--border)'}}><div><div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>Udhari Ledger</div><div style={{fontSize:11,color:'var(--amber)',fontFamily:'var(--mono)',marginTop:2}}>Total outstanding — {fmtAmt(totalOut)}</div></div><div onClick={()=>{setForm(f=>({...f,person_name:''}));setView('add');}} style={{background:'var(--green)',color:'#000',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:'8px 14px',borderRadius:8,cursor:'pointer'}}>+ New</div></div>
    {personList.length===0&&<div className="empty">Koi udhari nahi hai.<br/>"+ New" dabao pehli entry karne ke liye.</div>}
    {personList.map(p=>(<div key={p.name} onClick={()=>{setSel(p.name);setView('person');}} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',borderBottom:'1px solid var(--border)',cursor:'pointer'}}>
      <div><div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{p.name}</div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:3}}>Diya {fmtAmt(p.given)}{p.received>0&&<span style={{color:'var(--green)'}}> · Wapas {fmtAmt(p.received)}</span>}</div></div>
      <div style={{textAlign:'right'}}><div style={{fontSize:14,fontWeight:600,fontFamily:'var(--mono)',color:p.outstanding>0?'var(--amber)':p.outstanding<0?'var(--green)':'var(--text3)'}}>{p.outstanding>0?fmtAmt(p.outstanding):p.outstanding<0?'−'+fmtAmt(Math.abs(p.outstanding)):'✓ Settled'}</div><div style={{fontSize:9,color:'var(--text3)',marginTop:2}}>{p.outstanding>0?'owes you':p.outstanding<0?'you owe':'clear'}</div></div>
    </div>))}
  </div>);
}

/* ── RecItem ── */
function RecItem({rec,cl,onPrefill}){
  const isPaid=cl?.status==='paid';const isVar=!rec.amount||parseFloat(rec.amount)===0;
  return(<div onClick={()=>{if(isPaid)return;if(typeof onPrefill==='function')onPrefill(rec);}} style={{borderBottom:'1px solid var(--border)',background:isPaid?'var(--green-bg)':'var(--bg2)',cursor:isPaid?'default':'pointer',display:'flex',alignItems:'center',gap:10,padding:'10px 14px'}}>

    <div style={{flex:1,minWidth:0}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontSize:13,color:isPaid?'var(--text3)':'var(--text)',textDecoration:isPaid?'line-through':'none',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{rec.name}</span><span style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:600,flexShrink:0,marginLeft:8,color:isPaid?'var(--green)':isVar?'var(--text3)':'var(--text)'}}>{isPaid?fmtAmt(cl.amount_paid||rec.amount||0):isVar?'variable':fmtAmt(rec.amount)}</span></div>
      <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:2,display:'flex',gap:8,flexWrap:'wrap'}}>
        {rec.due_day&&<span>due {rec.due_day}{['','st','nd','rd'][rec.due_day]||'th'}</span>}
        {rec.account&&<span>{rec.account}</span>}{rec.category&&<span>{rec.category}</span>}
        {isPaid&&cl.paid_at&&<span style={{color:'var(--green)'}}>paid {fmtDate(cl.paid_at)}</span>}
        {!isPaid&&<span style={{color:'var(--text3)',fontStyle:'italic'}}>tap to fill Add screen</span>}
      </div>
    </div>
  </div>);
}

/* ── ChecklistScreen ── */
function ChecklistScreen({recurring,checklist,onTick,onAdd,onDelete,allAccounts,allBanks,allCC,allCategories,balances,setTab,onPrefill}){
  const now=new Date();const month=now.getMonth()+1;const year=now.getFullYear();
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const FREQS=[{k:'monthly',l:'Monthly'},{k:'bimonthly',l:'Every 2 months'},{k:'quarterly',l:'Quarterly'},{k:'half_yearly',l:'Half-yearly'},{k:'annual',l:'Annual'}];
  const [addOpen,setAddOpen]=useState(false);
  const [form,setForm]=useState({name:'',amount:'',frequency:'monthly',due_day:1,due_month:'',due_month2:'',account:'Cash',category:'',notes:'',active:true});
  const [saving,setSaving]=useState(false);
  const iS={background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',width:'100%'};
  const cS=a=>({display:'inline-block',border:a?'1px solid var(--green)':'1px solid var(--border2)',borderRadius:16,padding:'6px 12px',fontFamily:'var(--mono)',fontSize:11,color:a?'var(--green)':'var(--text2)',background:a?'var(--green-bg)':'var(--bg2)',cursor:'pointer',userSelect:'none',margin:'0 4px 4px 0'});
  const getCL=id=>checklist.find(c=>c.recurring_id===id);
  const isDue=r=>{
    if(!r.active&&r.active!==undefined)return false;
    if(r.is_provision)return false;
    if(r.frequency==='monthly')return true;
    if(r.frequency==='bimonthly'){const s=r.due_month||1;return(month-s)%2===0&&month>=s;}
    if(r.frequency==='quarterly'){const s=r.due_month||1;return(month-s)%3===0&&month>=s;}
    if(r.frequency==='half_yearly')return month===r.due_month||month===r.due_month2;
    if(r.frequency==='annual')return month===r.due_month;
    return false;
  };
  const ccItems=allCC.map(a=>({balance:balances[a]||0,name:a})).filter(x=>x.balance<0).map(x=>({id:'cc-'+x.name,name:x.name+' bill payment',amount:Math.abs(x.balance),frequency:'monthly',account:allBanks.find(b=>b!=='Cash')||allBanks[0]||'',category:'Credit Card Bill',is_cc_payment:true,cc_name:x.name,due_day:null,active:true}));
  const activeItems=[...ccItems,...recurring.filter(isDue)];
  const paid=activeItems.filter(r=>getCL(r.id)?.status==='paid');
  const pending=activeItems.filter(r=>getCL(r.id)?.status!=='paid');
  const pct=activeItems.length>0?Math.round(paid.length/activeItems.length*100):0;

  const handleAdd=async()=>{
    if(!form.name.trim())return;setSaving(true);
    await onAdd({name:form.name.trim(),amount:parseFloat(form.amount)||0,frequency:form.frequency,due_day:parseInt(form.due_day)||1,due_month:form.due_month?parseInt(form.due_month):null,due_month2:form.due_month2?parseInt(form.due_month2):null,account:form.account,provision_account:null,category:form.category,notes:form.notes,is_provision:false,active:true});
    setForm({name:'',amount:'',frequency:'monthly',due_day:1,due_month:'',due_month2:'',account:'Cash',category:'',notes:'',active:true});setSaving(false);setAddOpen(false);
  };

  return(<div className="fade-in" style={{paddingBottom:8}}>
    <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',background:'var(--bg2)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div><div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{MONTHS[month-1]} {year} — Bills</div><div style={{fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:2}}>{paid.length}/{activeItems.length} done</div></div>
        <button onClick={()=>setAddOpen(o=>!o)} style={{background:'var(--green)',border:'none',borderRadius:8,color:'#000',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:'7px 14px',cursor:'pointer'}}>+ Add</button>
      </div>
      {activeItems.length>0&&<div><div style={{background:'var(--bg3)',borderRadius:3,height:6}}><div style={{height:6,borderRadius:3,transition:'width 0.3s',background:pct===100?'var(--green)':pct>=70?'var(--blue)':'var(--amber)',width:pct+'%'}}/></div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:3,textAlign:'right'}}>{pct}% complete</div></div>}
    </div>

    {addOpen&&(<div style={{margin:'8px 12px',background:'var(--bg2)',border:'1px solid var(--blue)',borderRadius:10,padding:'14px'}}>
      <p style={{fontSize:11,color:'var(--blue)',fontFamily:'var(--mono)',margin:'0 0 10px',fontWeight:600,letterSpacing:'0.06em'}}>ADD RECURRING BILL</p>
      <div style={{display:'flex',gap:8,marginBottom:8}}><input style={{...iS,flex:2}} placeholder="e.g. Society maintenance" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/><input style={{...iS,flex:1}} type="number" placeholder="₹ (0=variable)" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/></div>
      <div style={{marginBottom:8}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:5}}>FREQUENCY</div><div style={{display:'flex',flexWrap:'wrap'}}>{FREQS.map(({k,l})=><span key={k} style={cS(form.frequency===k)} onClick={()=>setForm(f=>({...f,frequency:k}))}>{l}</span>)}</div></div>
      <div style={{display:'flex',gap:8,marginBottom:8}}><div style={{flex:1}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>DUE DAY</div><input style={iS} type="number" min="1" max="31" value={form.due_day} onChange={e=>setForm(f=>({...f,due_day:e.target.value}))}/></div>{['annual','half_yearly','quarterly','bimonthly'].includes(form.frequency)&&<div style={{flex:1}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>{form.frequency==='half_yearly'?'1ST MONTH':'DUE MONTH'}</div><input style={iS} type="number" min="1" max="12" placeholder="e.g. 10" value={form.due_month} onChange={e=>setForm(f=>({...f,due_month:e.target.value}))}/></div>}{form.frequency==='half_yearly'&&<div style={{flex:1}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>2ND MONTH</div><input style={iS} type="number" min="1" max="12" placeholder="e.g. 4" value={form.due_month2} onChange={e=>setForm(f=>({...f,due_month2:e.target.value}))}/></div>}</div>
      <div style={{marginBottom:8}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:5}}>DEFAULT ACCOUNT</div><div style={{display:'flex',flexWrap:'wrap'}}>{allAccounts.map(a=><span key={a} style={cS(form.account===a)} onClick={()=>setForm(f=>({...f,account:a}))}>{a}</span>)}</div></div>
      <input style={{...iS,marginBottom:8}} placeholder="Category (optional)" value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}/>
      <div style={{display:'flex',gap:8}}><button onClick={handleAdd} disabled={saving||!form.name.trim()} style={{flex:1,background:saving||!form.name.trim()?'var(--bg3)':'var(--green)',border:'none',borderRadius:8,color:saving||!form.name.trim()?'var(--text3)':'#000',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:12,cursor:'pointer'}}>{saving?'Saving...':'Save'}</button><button onClick={()=>setAddOpen(false)} style={{background:'none',border:'1px solid var(--border2)',borderRadius:8,color:'var(--text3)',padding:'12px 16px',fontFamily:'var(--mono)',fontSize:12,cursor:'pointer'}}>Cancel</button></div>
    </div>)}

    {pending.length>0&&<><p className="sec-label" style={{color:'var(--amber)'}}>Pending — {pending.length}</p>{pending.map(r=><RecItem key={r.id} rec={r} cl={getCL(r.id)} onPrefill={onPrefill}/>)}</>}
    {paid.length>0&&<><p className="sec-label">Done — {paid.length}</p>{paid.map(r=><RecItem key={r.id} rec={r} cl={getCL(r.id)} onPrefill={onPrefill}/>)}</>}
    {activeItems.length===0&&!addOpen&&<div className="empty">No bills this month.<br/>"+ Add" se setup karo.</div>}
    {recurring.filter(r=>!r.is_provision).length>0&&<><p className="sec-label" style={{marginTop:16}}>All recurring bills</p>{recurring.filter(r=>!r.is_provision).map(r=><div key={r.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 14px',borderBottom:'1px solid var(--border)',fontSize:12}}><div style={{flex:1,minWidth:0}}><div style={{color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.name}</div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:2}}>{FREQS.find(f=>f.k===r.frequency)?.l||r.frequency} · {r.account}</div></div><div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}><span style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--text2)'}}>{r.amount?fmtAmt(r.amount):'var'}</span><button onClick={()=>onDelete(r.id)} style={{background:'none',border:'1px solid var(--border)',borderRadius:5,color:'var(--text3)',padding:'3px 8px',fontSize:10,fontFamily:'var(--mono)',cursor:'pointer'}}>✕</button></div></div>)}</>}
  </div>);
}

/* ── ProvisionLedger ── */
function ProvisionLedger({recurring,txns,allBanks,onAddTxn,onAddRecurring,showToast}){
  const [sel,setSel]=useState(null);
  const [qAction,setQAction]=useState(null); 
  const [qAmt,setQAmt]=useState('');const [qNote,setQNote]=useState('');const [saving,setSaving]=useState(false);
  const [addOpen,setAddOpen]=useState(false);
  const [form,setForm]=useState({name:'',target_amount:'',already_saved:'',due_date:'',monthly_contribution:'',from_account:'',to_account:'',active:true});
  const [formSaving,setFormSaving]=useState(false);

  const provisions=recurring.filter(r=>r.is_provision&&r.active!==false&&!r.is_cc_payment&&!(r.name||'').match(/CC Payment|Credit Card/i));
  const activeTxns=txns.filter(t=>t.status!=='voided');

  const getLedger=prov=>{
    const deps=activeTxns.filter(t=>t.type==='Bank→Bank'&&t.particulars&&t.particulars.includes(prov.name)&&!t.particulars.includes('[WITHDRAW]')&&!t.particulars.includes('[RETURN]'));
    const wdrs=activeTxns.filter(t=>t.type==='Bank→Bank'&&t.particulars&&t.particulars.includes('[WITHDRAW] '+prov.name));
    const rets=activeTxns.filter(t=>t.type==='Bank→Bank'&&t.particulars&&t.particulars.includes('[RETURN] '+prov.name));
    const dep_=deps.reduce((s,t)=>s+(+t.amount),0);const wdr_=wdrs.reduce((s,t)=>s+(+t.amount),0);const ret_=rets.reduce((s,t)=>s+(+t.amount),0);
    const bal=dep_-wdr_+ret_;const tgt=parseFloat(prov.target_amount)||0;const pct=tgt>0?Math.min(Math.round(bal/tgt*100),100):0;
    return{deps,wdrs,rets,dep_,wdr_,ret_,bal,tgt,pct};
  };

  const handleQuick=async(prov,type,amt,note)=>{
    if(!amt||parseFloat(amt)<=0)return;setSaving(true);
    const isAdd=type==='add';
    const from_=isAdd?(prov.account||allBanks.find(b=>b!=='Cash')||'KB'):prov.provision_account;
    const to_=isAdd?prov.provision_account:(prov.account||allBanks.find(b=>b!=='Cash')||'KB');
    if(from_&&to_&&from_===to_){alert('⚠ Self-transfer not allowed. Source and destination accounts are the same.');setSaving(false);return;}
    const label=isAdd?prov.name:'[WITHDRAW] '+prov.name;
    await onAddTxn({type:'Bank→Bank',amount:parseFloat(amt),category:'Provision',from_account:from_,to_account:to_,particulars:label+(note?' — '+note:''),status:'complete',source:'provision',created_at:new Date().toISOString()});
    setQAction(null);setQAmt('');setQNote('');setSaving(false);
    showToast(isAdd?'✓ Funds added to envelope':'↩ Withdrawal logged');
  };

  const handleAddProv=async()=>{
    if(!form.name.trim()||!form.from_account||!form.to_account)return;
    if(form.from_account===form.to_account){alert('⚠ Self-transfer not allowed. Source account and envelope account must be different.');return;}
    if(!form.due_date){alert('⚠ Due date is mandatory. Please set a target date for this envelope.');return;}
    setFormSaving(true);
    await onAddRecurring({name:form.name.trim(),amount:parseFloat(form.monthly_contribution)||0,frequency:'monthly',due_day:1,account:form.from_account,provision_account:form.to_account,category:'Provision',target_amount:parseFloat(form.target_amount)||0,already_saved:parseFloat(form.already_saved)||0,due_date:form.due_date||null,is_provision:true,active:true});
    setForm({name:'',target_amount:'',already_saved:'',due_date:'',monthly_contribution:'',from_account:'',to_account:'',active:true});setFormSaving(false);setAddOpen(false);
  };

  const tgt=parseFloat(form.target_amount)||0;const saved=parseFloat(form.already_saved)||0;const gap=Math.max(0,tgt-saved);
  const dueDate=form.due_date?new Date(form.due_date):null;
  const monthsLeft=dueDate?Math.max(1,Math.round((dueDate-new Date())/(1000*60*60*24*30))):0;
  const sugMonth=monthsLeft>0?Math.ceil(gap/monthsLeft):0;

  const iS={background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,padding:'8px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',width:'100%'};
  const cS=a=>({display:'inline-block',border:a?'1px solid var(--green)':'1px solid var(--border2)',borderRadius:16,padding:'6px 12px',fontFamily:'var(--mono)',fontSize:11,color:a?'var(--green)':'var(--text2)',background:a?'var(--green-bg)':'var(--bg2)',cursor:'pointer',userSelect:'none',margin:'0 4px 4px 0'});

  return(<div className="fade-in" style={{paddingBottom:8}}>
    <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',background:'var(--bg2)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div><div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>Wealth Envelopes</div><div style={{fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:2}}>Locked savings goals</div></div>
      <button onClick={()=>setAddOpen(o=>!o)} style={{background:'var(--green)',border:'none',borderRadius:8,color:'#000',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:'7px 14px',cursor:'pointer'}}>+ New</button>
    </div>

    {addOpen&&(<div style={{margin:'8px 12px',background:'var(--bg2)',border:'1px solid var(--blue)',borderRadius:10,padding:'14px'}}>
      <p style={{fontSize:11,color:'var(--blue)',fontFamily:'var(--mono)',margin:'0 0 12px',fontWeight:600,letterSpacing:'0.06em'}}>NEW WEALTH ENVELOPE</p>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        <input style={iS} placeholder="Envelope name (e.g. LIC Premium Oct)" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
        <div style={{display:'flex',gap:8}}>
          <div style={{flex:1}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>TARGET AMOUNT</div><input style={iS} type="number" step="0.01" placeholder="₹ Total needed" value={form.target_amount} onChange={e=>setForm(f=>({...f,target_amount:e.target.value}))}/></div>
          <div style={{flex:1}}><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>ALREADY SAVED</div><input style={iS} type="number" step="0.01" placeholder="₹ In bank now" value={form.already_saved} onChange={e=>setForm(f=>({...f,already_saved:e.target.value}))}/></div>
        </div>
        <div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>PROVISIONED TILL DATE</div><input style={iS} type="date" value={form.due_date} onChange={e=>setForm(f=>({...f,due_date:e.target.value}))}/></div>
        {tgt>0&&(<div style={{background:'var(--amber-bg)',border:'1px solid var(--amber)',borderRadius:8,padding:'10px 12px',fontFamily:'var(--mono)',fontSize:11,display:'flex',gap:16,flexWrap:'wrap'}}>
          <span>Gap: <strong style={{color:'var(--red)'}}>{fmtAmt(gap)}</strong></span>
          {dueDate&&<span>Months left: <strong>{monthsLeft}</strong></span>}
          {sugMonth>0&&<span>Suggested: <strong style={{color:'var(--green)'}}>{fmtAmt(sugMonth)}/mo</strong></span>}
        </div>)}
        <div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:4}}>MONTHLY CONTRIBUTION</div><input style={iS} type="number" step="0.01" placeholder={sugMonth>0?`Suggested: ₹${fmt(sugMonth)}`:'₹ per month'} value={form.monthly_contribution} onChange={e=>setForm(f=>({...f,monthly_contribution:e.target.value}))}/></div>
        <div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:5}}>DEBIT FROM (source bank)</div><div style={{display:'flex',flexWrap:'wrap'}}>{allBanks.filter(b=>b!=='Cash').map(a=><span key={a} style={cS(form.from_account===a)} onClick={()=>setForm(f=>({...f,from_account:a}))}>{a}</span>)}</div></div>
        <div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:5}}>ENVELOPE ACCOUNT (save into)</div><div style={{display:'flex',flexWrap:'wrap'}}>{allBanks.filter(b=>b!=='Cash').map(a=><span key={a} style={cS(form.to_account===a)} onClick={()=>setForm(f=>({...f,to_account:a}))}>{a}</span>)}</div></div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={handleAddProv} disabled={formSaving||!form.name.trim()||!form.from_account||!form.to_account} style={{flex:1,background:formSaving||!form.name.trim()||!form.from_account||!form.to_account?'var(--bg3)':'var(--green)',border:'none',borderRadius:8,color:formSaving||!form.name.trim()?'var(--text3)':'#000',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:12,cursor:'pointer'}}>{formSaving?'Saving...':'Create Envelope'}</button>
          <button onClick={()=>setAddOpen(false)} style={{background:'none',border:'1px solid var(--border2)',borderRadius:8,color:'var(--text3)',padding:'12px 16px',fontFamily:'var(--mono)',fontSize:12,cursor:'pointer'}}>Cancel</button>
        </div>
      </div>
    </div>)}

    {provisions.length===0&&!addOpen&&<div className="empty">No envelopes yet.<br/>Tap "+ New" to create your first savings goal.</div>}

    {provisions.map(prov=>{
      const{deps,wdrs,rets,dep_,wdr_,ret_,bal,tgt,pct}=getLedger(prov);
      const isOpen=sel===prov.id;const monthly=parseFloat(prov.amount)||0;
      const isQAdd=qAction?.id===prov.id&&qAction?.type==='add';const isQWdr=qAction?.id===prov.id&&qAction?.type==='withdraw';
      return(<div key={prov.id} className="env-card" style={{margin:'0 10px 10px'}}>
        <div style={{padding:'12px 14px',cursor:'pointer'}} onClick={()=>setSel(isOpen?null:prov.id)}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{prov.name}</div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:2}}>{monthly>0?fmtAmt(monthly)+'/mo':''}{prov.account&&prov.provision_account?' · '+prov.account+'→'+prov.provision_account:''}{prov.due_date&&<span style={{marginLeft:6}}>· due {new Date(prov.due_date).toLocaleDateString('en-IN',{month:'short',year:'numeric'})}</span>}</div></div>
            <div style={{textAlign:'right'}}><div style={{fontFamily:'var(--mono)',fontSize:16,fontWeight:700,color:bal>0?'var(--green)':'var(--text3)'}}>{fmtAmt(bal)}</div>{tgt>0&&<div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)'}}>{pct}% of {fmtAmt(tgt)}</div>}</div>
          </div>
          {tgt>0&&<div className="env-bar" style={{marginTop:8}}><div className="env-fill" style={{width:pct+'%',background:pct>=100?'var(--green)':pct>=60?'var(--blue)':'var(--amber)'}}/></div>}
          {(!tgt||!prov.due_date)&&<div style={{marginTop:6,display:'inline-flex',alignItems:'center',gap:4,background:'var(--red-bg)',border:'1px solid var(--red)',borderRadius:20,padding:'2px 8px',fontFamily:'var(--mono)',fontSize:9,fontWeight:700,color:'var(--red)',letterSpacing:'0.04em'}}>⚠ Target/Schedule Missing</div>}
        </div>
        <div style={{display:'flex',gap:6,padding:'0 14px 10px'}}>
          <button onClick={e=>{e.stopPropagation();setQAction(isQAdd?null:{id:prov.id,type:'add'});setQAmt('');setQNote('');}} style={{flex:1,background:isQAdd?'var(--green)':'var(--green-bg)',border:'1px solid var(--green)',borderRadius:6,color:isQAdd?'#000':'var(--green)',fontFamily:'var(--mono)',fontSize:11,fontWeight:600,padding:'7px 0',cursor:'pointer'}}>{isQAdd?'▲ Cancel':'+ Add Funds'}</button>
          <button onClick={e=>{e.stopPropagation();setQAction(isQWdr?null:{id:prov.id,type:'withdraw'});setQAmt('');setQNote('');}} style={{flex:1,background:isQWdr?'var(--red)':'var(--red-bg)',border:'1px solid var(--red)',borderRadius:6,color:isQWdr?'#fff':'var(--red)',fontFamily:'var(--mono)',fontSize:11,fontWeight:600,padding:'7px 0',cursor:'pointer'}}>{isQWdr?'▼ Cancel':'− Withdraw'}</button>
        </div>
        {(isQAdd||isQWdr)&&(<div style={{padding:'0 14px 12px',borderTop:'1px solid var(--border)'}}>
