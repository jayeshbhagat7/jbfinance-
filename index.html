<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    /* Works on both GitHub Pages and localhost */
    const swPath = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
      ? '/sw.js'
      : '/jbfinance-/sw.js';
    const swScope = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
      ? '/'
      : '/jbfinance-/';
    navigator.serviceWorker.register(swPath, { scope: swScope })
      .then(reg => {
        console.log('[JBF] SW registered, scope:', reg.scope);
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              window.dispatchEvent(new CustomEvent('jbf-sw-update'));
            }
          });
        });
      })
      .catch(() => {});
  });
}
</script>

    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';

};

/* ─────────────────────────────────────────────────────────
   PIN LOCK SCREEN  (v1.9 — pre-auth security gate)
   Flow: App open → PIN gate → Supabase Auth → App
   PIN stored as SHA-256 hash in localStorage (jbf_pin_hash).
   First-time: no hash stored → setup mode (set 4-digit PIN).
   Change/remove PIN from Settings.
───────────────────────────────────────────────────────── */
function PinLockScreen({onUnlock}){
  const [digits,setDigits]   = useState([]);
  const [shake,setShake]     = useState(false);
  const [setupMode,setSetupMode] = useState(!localStorage.getItem('jbf_pin_hash'));
  const [setupStep,setSetupStep] = useState(1); // 1=enter new, 2=confirm
  const [firstPin,setFirstPin]   = useState([]);
  const [msg,setMsg]             = useState('');

  const MAX=4;

  const hashPin = async pin => {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  };

  const addDigit = async d => {
    const next=[...digits,d];
    setDigits(next);
    if(next.length<MAX) return;
    const pin=next.join('');

    if(setupMode){
      if(setupStep===1){
        setFirstPin(next);
        setDigits([]);
        setSetupStep(2);
        setMsg('Confirm your PIN');
      } else {
        if(pin===firstPin.join('')){
          const h=await hashPin(pin);
          localStorage.setItem('jbf_pin_hash',h);
          setMsg('✓ PIN set!');
          setTimeout(()=>onUnlock(),400);
        } else {
          setMsg('❌ PINs did not match — try again');
          setShake(true);setTimeout(()=>setShake(false),500);
          setDigits([]);setSetupStep(1);setFirstPin([]);
        }
      }
    } else {
      const h=await hashPin(pin);
      if(h===localStorage.getItem('jbf_pin_hash')){
        onUnlock();
      } else {
        setMsg('❌ Wrong PIN');
        setShake(true);setTimeout(()=>setShake(false),500);
        setDigits([]);
      }
    }
  };

  const del=()=>setDigits(p=>p.slice(0,-1));

  const KEYS=[1,2,3,4,5,6,7,8,9,null,0,'⌫'];

  const title = setupMode
    ? (setupStep===1 ? 'Set a 4-digit PIN' : 'Confirm PIN')
    : 'Enter PIN';

  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100dvh',background:'var(--bg)',padding:24,userSelect:'none'}}>
      <div style={{textAlign:'center',marginBottom:28}}>
        <div style={{fontFamily:'var(--mono)',fontSize:26,fontWeight:700,color:'var(--green)',letterSpacing:'-1px'}}>JB Finance</div>

        {Array.from({length:MAX}).map((_,i)=>(
          <div key={i} style={{
            width:14,height:14,borderRadius:'50%',
            background:i<digits.length?'var(--green)':'transparent',
            border:'2px solid',
            borderColor:i<digits.length?'var(--green)':'var(--border2)',
            transition:'all 0.15s',
          }}/>
        ))}
      </div>

      {msg&&<div style={{fontFamily:'var(--mono)',fontSize:11,color:msg.startsWith('✓')?'var(--green)':'var(--amber)',marginBottom:14,letterSpacing:'0.04em'}}>{msg}</div>}

      {/* Numpad */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,72px)',gap:12}}>
        {KEYS.map((k,i)=>(
          k===null
            ? <div key={i}/>
            : <button key={i}
                onClick={()=>k==='⌫'?del():digits.length<MAX&&addDigit(k)}
                style={{
                  width:72,height:72,borderRadius:'50%',
                  background:k==='⌫'?'var(--bg2)':'var(--bg3)',
                  border:'1px solid var(--border)',
                  color:'var(--text)',
                  fontFamily:'var(--mono)',
                  fontSize:k==='⌫'?20:24,
                  fontWeight:600,
                  cursor:'pointer',
                  display:'flex',alignItems:'center',justifyContent:'center',
                  WebkitTapHighlightColor:'transparent',
                  transition:'background 0.1s',
                }}
              >{k}</button>
        ))}
      </div>

      {!setupMode&&<button onClick={()=>{
        // Escape hatch: clear PIN (will require Supabase login still)
        if(confirm('Forgot PIN? This will remove the PIN lock. You will still need your Supabase password.')){
          localStorage.removeItem('jbf_pin_hash');
          setSetupMode(true);setSetupStep(1);setDigits([]);setMsg('');
        }
      }} style={{marginTop:28,background:'none',border:'none',color:'var(--text3)',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer',textDecoration:'underline'}}>Forgot PIN</button>}

      <style>{`@keyframes pinShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}`}</style>
    </div>
  );
}

function LoginScreen(){
  const [email,setEmail]=useState('');const [pass,setPass]=useState('');

  const handle=async()=>{
    if(!email.trim()||!pass)return;setLoading(true);setErr('');
    const{error}=await db.auth.signInWithPassword({email:email.trim(),password:pass});
    if(error)setErr(error.message==='Invalid login credentials'?'❌ Wrong email or password':error.message);
    setLoading(false);
  };
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100dvh',background:'var(--bg)',padding:24}}>
      <div style={{width:'100%',maxWidth:380}}>
        {/* Logo area */}
        <div style={{textAlign:'center',marginBottom:32}}>

          <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',marginTop:4,letterSpacing:'0.12em',textTransform:'uppercase'}}>CFO Operating System · v1.8.0</div>
        </div>
        {/* Card */}
        <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:14,padding:24}}>
          <p style={{fontFamily:'var(--mono)',fontSize:10,letterSpacing:'0.12em',color:'var(--text3)',textTransform:'uppercase',marginBottom:16}}>Secure Login</p>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <input type="email" placeholder="Email address" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handle()} style={iS} autoComplete="email"/>
            <div style={{position:'relative'}}>
              <input type={showPass?'text':'password'} placeholder="Password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handle()} style={{...iS,paddingRight:44}} autoComplete="current-password"/>
              <button onClick={()=>setShowPass(s=>!s)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:13,fontFamily:'var(--mono)',padding:0}}>{showPass?'hide':'show'}</button>
            </div>
            {err&&<div style={{background:'var(--red-bg)',border:'1px solid var(--red)',borderRadius:8,padding:'8px 12px',fontFamily:'var(--mono)',fontSize:12,color:'var(--red)'}}>{err}</div>}
            <button onClick={handle} disabled={loading||!email.trim()||!pass} style={{background:loading||!email.trim()||!pass?'var(--bg3)':'var(--green)',border:'none',borderRadius:10,color:loading||!email.trim()||!pass?'var(--text3)':'#000',fontFamily:'var(--mono)',fontSize:14,fontWeight:700,padding:15,cursor:'pointer',letterSpacing:'0.04em',transition:'all 0.15s'}}>{loading?'Signing in…':'Sign In'}</button>
          </div>
        </div>
        <p style={{textAlign:'center',fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginTop:20,lineHeight:1.8}}>Personal CFO · Umiya Associates · Mumbai<br/>Data secured via Supabase RLS</p>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────────────────
   APP COMPONENT

function App() {
  const [tab,setTab]                         = useState('dash');
  const [txns,setTxns]                       = useState([]);
  const [investments,setInvestments]         = useState([]);
  const [opening,setOpening]                 = useState({});

  const [customCategories,setCustomCategories] = useState([]);
  const [budgets,setBudgets]                 = useState({});
  const [udhari,setUdhari]                   = useState([]);
  const [recurring,setRecurring]             = useState([]);
  const [checklist,setChecklist]             = useState([]);
  const [customSites,setCustomSites]         = useState([]);
  const [customTeam,setCustomTeam]           = useState([]);
  const [customSiteCats,setCustomSiteCats]   = useState([]);
  const [toast,setToast]                     = useState(null);
  const [menuOpen,setMenuOpen]               = useState(false);
  const [quickAdd,setQuickAdd]               = useState(false);
  const [billsAddOpen,setBillsAddOpen]       = useState(false);

  const [loading,setLoading]                 = useState(true);
  const [globalSearch,setGlobalSearch]       = useState('');
  const [addPrefill,setAddPrefill]           = useState(null);
  const [theme,setTheme]                     = useState(()=>localStorage.getItem('jbf_theme')||'autumn');
  const [streak]                             = useState(()=>getStreak());
  
  /* ── v1.9.1 Transaction Filter State for Routing ── */
  const [txnFilter,setTxnFilter] = useState({
    account: null,        // specific bank or CC name
    type: null,          // 'Income', 'Expense', etc.
    dateRange: null,     // {start, end} or period string
    category: null       // category filter
  });

  /* ── v1.6 Auth ── */
  const [session,setSession]   = useState(null);
  const [authLoading,setAuthLoading] = useState(true);
  const [pinUnlocked,setPinUnlocked] = useState(false); // v1.9 PIN gate

  useEffect(()=>{
    db.auth.getSession().then(({data:{session}})=>{setSession(session);setAuthLoading(false);});
    const{data:{subscription}}=db.auth.onAuthStateChange((_,session)=>{setSession(session);});
    /* v1.9: Listen for SW update event */
    const onSwUpdate=()=>showToast('🔄 Update ready — reopen app to apply');
    window.addEventListener('jbf-sw-update',onSwUpdate);
    return()=>{subscription.unsubscribe();window.removeEventListener('jbf-sw-update',onSwUpdate);};
  },[]);

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null),2500); };

  /* ── OFFLINE QUEUE ── */
  const [offlineQueue, setOfflineQueue] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('jbf_offline_queue') || '[]'); } catch { return []; }
  });
  const [isOnline, setIsOnline] = React.useState(() => navigator.onLine);

  useEffect(() => {
    const goOnline  = () => { setIsOnline(true); };
    const goOffline = () => { setIsOnline(false); };
    window.addEventListener('online',  goOnline);
    window.addEventListener('offline', goOffline);
    return () => { window.removeEventListener('online', goOnline); window.removeEventListener('offline', goOffline); };
  }, []);


  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',theme);
    localStorage.setItem('jbf_theme',theme);
  },[theme]);

  /* Flush offline queue when connection is restored */
  useEffect(() => {
    if (!isOnline) { showToast('📵 Offline — entries will be queued locally'); return; }
    const flush = async () => {
      let q;
      try { q = JSON.parse(localStorage.getItem('jbf_offline_queue') || '[]'); } catch { q = []; }
      if (!q.length) return;
      let failed = [];
      for (const item of q) {
        try {
          const payload = { ...item.txn, user_id: session?.user?.id || null };
          if (!('party_name' in payload)) payload.party_name = null;
          if (!('tower'      in payload)) payload.tower      = null;
          const { error } = await db.from('transactions').insert([payload]);
          if (error) failed.push(item);
        } catch { failed.push(item); }
      }
      if (failed.length === 0) {
        localStorage.removeItem('jbf_offline_queue');
        setOfflineQueue([]);
        showToast('✅ ' + q.length + ' queued entr' + (q.length === 1 ? 'y' : 'ies') + ' synced!');
        loadData();
      } else {
        localStorage.setItem('jbf_offline_queue', JSON.stringify(failed));
        setOfflineQueue(failed);
        showToast('⚠ ' + failed.length + ' entries still failed to sync');
      }
    };
    flush();
  }, [isOnline]);

  const loadData = useCallback(async ()=>{
    setLoading(true);
    try {
      /* v1.7: cursor-based pagination — fetches ALL transactions in 500-row pages
         so data is never silently truncated when txn count exceeds 500            */
      const COLS='id,created_at,type,amount,category,from_account,to_account,particulars,tower,status,source,domain,site_name,site_user,party_name,user_id,it_section,correction_of';
      let allTxns=[],from=0,PAGE=500,done=false;
      while(!done){
        const{data:page,error:txnErr}=await db.from('transactions')
          .select(COLS).order('created_at',{ascending:false}).range(from,from+PAGE-1);
        if(txnErr){console.error('transactions fetch error:',txnErr.message);showToast('⚠ DB: '+txnErr.message);break;}
        if(!page||page.length===0){done=true;}
        else{allTxns=[...allTxns,...page];from+=PAGE;if(page.length<PAGE)done=true;}
      }
      setTxns(allTxns);
      try{const{data:inv}=await db.from('investments').select('*').order('created_at',{ascending:false});setInvestments(inv||[]);}catch(e){setInvestments([]);}
      try{const{data:ud}=await db.from('udhari').select('*').order('created_at',{ascending:false});setUdhari(ud||[]);}catch(e){setUdhari([]);}
      try{const{data:rec}=await db.from('recurring').select('*').order('due_day',{ascending:true});setRecurring(rec||[]);}catch(e){setRecurring([]);}
      try{const now=new Date();const{data:cl}=await db.from('checklist').select('*').eq('month',now.getMonth()+1).eq('year',now.getFullYear());setChecklist(cl||[]);}catch(e){setChecklist([]);}
      const{data:s}=await db.from('settings').select('*');
      if(s){
        const g=(k)=>s.find(r=>r.key===k);
        if(g('opening_balances')) try{setOpening(JSON.parse(g('opening_balances').value));}catch(e){}
        if(g('custom_accounts'))  try{setCustomAccounts(JSON.parse(g('custom_accounts').value));}catch(e){}
        if(g('custom_categories'))try{setCustomCategories(JSON.parse(g('custom_categories').value));}catch(e){}
        if(g('budgets'))          try{setBudgets(JSON.parse(g('budgets').value));}catch(e){}
        if(g('custom_sites'))     try{setCustomSites(JSON.parse(g('custom_sites').value));}catch(e){}
        if(g('custom_team'))      try{setCustomTeam(JSON.parse(g('custom_team').value));}catch(e){}
        if(g('custom_site_cats')) try{setCustomSiteCats(JSON.parse(g('custom_site_cats').value));}catch(e){}
        if(g('theme'))            { setTheme(g('theme').value); document.documentElement.setAttribute('data-theme',g('theme').value); localStorage.setItem('jbf_theme',g('theme').value); }
      }
    } catch(e){console.error('loadData error:',e);showToast('⚠ Load failed: '+e.message);}
    setLoading(false);
  },[]);

  useEffect(()=>{loadData();},[loadData]);

  /* ── DYNAMIC ACCOUNT LISTS (zero hardcoding in UI) ── */
  /* Active = non-archived; used in ADD dropdowns */
  const activeCustomBanks = customAccounts.filter(a=>a.type==='bank'&&!a.archived).map(a=>a.name);
  const activeCustomCC    = customAccounts.filter(a=>a.type==='cc'&&!a.archived).map(a=>a.name);
  const allBanks    = [...SEED_BANKS,...activeCustomBanks];
  const allCC       = [...SEED_CC,...activeCustomCC];
  const allAccounts = [...allBanks,...allCC];

  /* History = includes archived; used for balance computation & statements */
  const allBanksH   = [...SEED_BANKS,...customAccounts.filter(a=>a.type==='bank').map(a=>a.name)];
  const allCCH      = [...SEED_CC,...customAccounts.filter(a=>a.type==='cc').map(a=>a.name)];
  const allAccountsH= [...allBanksH,...allCCH];

  /* Categories: active for add, full for history */
  const activeCats  = [...CATEGORIES,...customCategories.filter(c=>!c.archived).map(c=>({id:c.name,emoji:c.emoji||'•',color:'none',it:c.it||'',parent:c.parent||null}))];
  const allCatsH    = [...CATEGORIES,...customCategories.map(c=>({id:c.name,emoji:c.emoji||'•',color:'none',it:c.it||'',parent:c.parent||null}))];

  const balances = computeBalances(opening,txns,allBanksH,allCCH);
  const liquid   = allBanks.filter(a=>a!=='Site Cash').reduce((s,a)=>s+(balances[a]||0),0);
  const totalCC  = allCC.reduce((s,a)=>s+Math.max(0,-(balances[a]||0)),0);
  /* ── DVE Architecture: Net Blocked replaces old monthlyProv deduction ── */
  const provisionStates = computeProvisions(recurring,txns);
  const totalNetBlocked = provisionStates.reduce((s,p)=>s+p.C,0);
  const trueSpendable = Math.max(0,liquid-totalCC-totalNetBlocked);
  const udhariOut = udhari.filter(u=>u.direction==='given').reduce((s,u)=>s+u.amount,0)-udhari.filter(u=>u.direction==='received').reduce((s,u)=>s+u.amount,0);

  /* ── DB HELPERS ── */
  const addTxn = async txn => {
    /* v1.6.3: always include user_id + party_name + tower explicitly */
    const payload={...txn,user_id:session?.user?.id||null};
    /* Ensure party_name & tower are never undefined (causes Supabase column-not-found if col missing) */
    if(!('party_name' in payload))payload.party_name=null;
    if(!('tower' in payload))payload.tower=null;
    /* ── OFFLINE QUEUE: if no connection, queue locally ── */
    if (!navigator.onLine) {
      const item = { txn, queued_at: new Date().toISOString() };
      const q = [...offlineQueue, item];
      localStorage.setItem('jbf_offline_queue', JSON.stringify(q));
      setOfflineQueue(q);
      showToast('📵 Offline — queued (' + q.length + ' pending)');
      return;
    }
    const{error}=await db.from('transactions').insert([payload]);
    if(!error){showToast('✓ '+fmtAmt(txn.amount)+' logged');loadData();}
    else{
      console.error('addTxn error:',error);
      /* Show exact DB error so user/dev knows which column is missing */
      showToast('⚠ '+( error.message||'DB Error — check console'));
    }
  };
  const deleteTxn = async id => {
    const{error}=await db.from('transactions').update({status:'voided'}).eq('id',id);
    if(!error){showToast('↩ Voided');loadData();}
  };
  const voidAndCorrect = async (orig,corr) => {
    await db.from('transactions').update({status:'voided'}).eq('id',orig.id);
    const c={type:corr.type||orig.type,amount:corr.amount,category:corr.category,from_account:corr.from_account!==undefined?corr.from_account:orig.from_account,to_account:corr.to_account!==undefined?corr.to_account:orig.to_account,particulars:corr.particulars,tower:corr.tower!==undefined?corr.tower:orig.tower,domain:corr.domain!==undefined?corr.domain:orig.domain,site_name:corr.site_name!==undefined?corr.site_name:orig.site_name,party_name:corr.party_name!==undefined?corr.party_name:orig.party_name,site_user:corr.party_name!==undefined?corr.party_name:orig.site_user,it_section:orig.it_section,status:'complete',source:'app-correction',correction_of:orig.id,created_at:corr.created_at||orig.created_at};
    const{error}=await db.from('transactions').insert([c]);
    if(!error){showToast('✓ Corrected');loadData();}
  };
  const saveOpening = async ob=>{await db.from('settings').upsert({key:'opening_balances',value:JSON.stringify(ob)});setOpening(ob);showToast('✓ Balances saved');};
  const saveCustomAccounts = async list=>{await db.from('settings').upsert({key:'custom_accounts',value:JSON.stringify(list)});setCustomAccounts(list);showToast('✓ Accounts updated');};
  const saveBudgets = async bg=>{await db.from('settings').upsert({key:'budgets',value:JSON.stringify(bg)});setBudgets(bg);showToast('✓ Budgets saved');};
  const saveCustomSites = async list=>{await db.from('settings').upsert({key:'custom_sites',value:JSON.stringify(list)});setCustomSites(list);showToast('✓ Sites updated');};
  const saveCustomTeam = async list=>{await db.from('settings').upsert({key:'custom_team',value:JSON.stringify(list)});setCustomTeam(list);showToast('✓ Team updated');};
  const saveCustomSiteCats = async list=>{await db.from('settings').upsert({key:'custom_site_cats',value:JSON.stringify(list)});setCustomSiteCats(list);showToast('✓ Site categories updated');};
  const saveCustomCategories = async list=>{await db.from('settings').upsert({key:'custom_categories',value:JSON.stringify(list)});setCustomCategories(list);showToast('✓ Categories updated');};
  const addCustomCategory = async catObj=>{
    const updated=[...customCategories.filter(c=>c.name!==catObj.name&&!c.archived),{name:catObj.name,emoji:catObj.emoji||'•',it:catObj.it||'',parent:catObj.parent||null}];
    await saveCustomCategories(updated);
  };
  const saveTheme = t=>{
    setTheme(t);
    document.documentElement.setAttribute('data-theme',t);
    localStorage.setItem('jbf_theme',t);
    db.from('settings').upsert({key:'theme',value:t}).catch(()=>{});
  };
  const addRecurring = async entry=>{
    const uid=session?.user?.id||null;
    const payload={name:entry.name,amount:entry.amount||0,frequency:entry.frequency,due_day:entry.due_day||null,due_month:entry.due_month||null,due_month2:entry.due_month2||null,account:entry.account||null,provision_account:entry.provision_account||null,category:entry.category||null,notes:entry.notes||null,is_provision:entry.is_provision||false,active:entry.active!==false,target_amount:entry.target_amount||null,already_saved:entry.already_saved||null,due_date:entry.due_date||null,user_id:uid};
    const{error}=await db.from('recurring').insert([payload]);if(!error){showToast('✓ Saved');loadData();}else showToast('⚠ '+(error.message||'Error'));
  };
  const deleteRecurring = async id=>{await db.from('recurring').delete().eq('id',id);showToast('↩ Deleted');loadData();};
  const updateRecurring = async (id,fields)=>{const{error}=await db.from('recurring').update(fields).eq('id',id);if(!error){showToast('✓ Updated');loadData();}else showToast('⚠ '+(error.message||'Error'));};

  const tickChecklist = async (rec,cl,amtPaid,fromAccount)=>{
    if(!amtPaid||amtPaid<=0)return;
    const now=new Date().toISOString();const nowD=new Date();
    const txnType=rec.is_cc_payment?'Bank→CC':rec.is_provision?'Bank→Bank':'Expense';
    const txn={type:txnType,amount:amtPaid,category:rec.category||'Household',from_account:fromAccount,to_account:txnType==='Bank→CC'?rec.cc_name||null:txnType==='Bank→Bank'?rec.provision_account||null:null,particulars:rec.name,status:'complete',source:'checklist',created_at:now,user_id:session?.user?.id||null};
    try{await db.from('transactions').insert([txn]);}catch(e){}
    if(cl?.id){await db.from('checklist').update({status:'paid',amount_paid:amtPaid,paid_at:now}).eq('id',cl.id);}
    else{await db.from('checklist').insert([{recurring_id:rec.id,month:nowD.getMonth()+1,year:nowD.getFullYear(),status:'paid',amount_paid:amtPaid,paid_at:now,user_id:session?.user?.id||null}]);}
    loadData();showToast('✓ '+rec.name+' logged');
  };

  /* ── MODULE 4: UDHARI with real ledger update & CA audit ── */
  const handleSettleUdhari = async entry=>{
    const{direction,person_name,amount,mode,txn_date}=entry;
    const ts=(txn_date||new Date().toISOString().slice(0,10))+'T06:30:00.000Z';
    const{error}=await db.from('udhari').insert([{direction,person_name,amount:parseFloat(amount),mode,txn_date,created_at:ts,user_id:session?.user?.id||null}]);
    if(error){showToast('⚠ '+error.message);return;}
    if(direction==='given'){
      await db.from('transactions').insert([{type:'Expense',amount:parseFloat(amount),category:'UDHARI',from_account:mode,particulars:'Udhari — '+person_name,status:'complete',source:'udhari',created_at:ts,user_id:session?.user?.id||null}]);
    } else if(direction==='received'){
      await db.from('transactions').insert([{type:'Income',amount:parseFloat(amount),category:'UDHARI',to_account:mode,particulars:'Udhari wapas — '+person_name,status:'complete',source:'udhari',created_at:ts,user_id:session?.user?.id||null}]);
      /* CA audit: if return is Cash but original was a Bank account, tag original txn */
      if(mode==='Cash'){
        const bankGiven=udhari.find(u=>u.person_name===person_name&&u.direction==='given'&&u.mode!=='Cash'&&allBanksH.includes(u.mode));
        if(bankGiven){
          const origTxn=txns.find(t=>t.source==='udhari'&&t.type==='Expense'&&t.from_account===bankGiven.mode&&(t.particulars||'').toLowerCase().includes(person_name.toLowerCase())&&!(t.particulars||'').includes('[Settled in Cash]'));
          if(origTxn)await db.from('transactions').update({particulars:(origTxn.particulars||'')+' [Settled in Cash]'}).eq('id',origTxn.id);
        }
      }
    }
    showToast(direction==='given'?'✓ Udhari + balance logged':'✓ Settled — ledger updated');
    loadData();
  };
  const deleteUdhari = async id=>{await db.from('udhari').delete().eq('id',id);showToast('↩ Deleted');loadData();};

  /* checklist pending count (provisions excluded) */
  const clPending=(()=>{
    const _n=new Date(),_m=_n.getMonth()+1,_y=_n.getFullYear();
    const due=r=>{
      if(!r.active&&r.active!==undefined)return false;
      if(r.is_provision)return false;
      if(r.frequency==='monthly')return true;

/* ── VIRTUAL PROVISION TYPES — these NEVER touch physical balances ── */
const PROVISION_VIRTUAL_TYPES=['Provision_Accrue','Provision_Withdraw','Provision_Repay','Provision_Flush'];

/* ── computeBalances ── */
function computeBalances(opening, txns, allBanks, allCC) {
  const bal = {};
  Object.entries(opening || {}).forEach(([acc, val]) => {
    bal[acc] = (typeof val === 'object' && val !== null) ? (val.amount || 0) : (val || 0);
  });

  txns.filter(t => t.status !== 'voided').forEach(t => {
    const txnDate = (t.created_at || '').slice(0, 10);
    const amt = parseFloat(t.amount) || 0, from = t.from_account, to = t.to_account, type = t.type;
    const isSiteTag = (t.tower === 'SITE');
    const isSiteDomain = (t.domain === 'Site');

    if (PROVISION_VIRTUAL_TYPES.includes(type)) return;

    const after = acc => {
      const val = opening[acc];
      if (!val || typeof val !== 'object' || !val.opening_date) return true;
      return txnDate >= val.opening_date;
    };

    // Standard Transaction Logic
    if (type === 'Expense' || type === 'UA Expense') { 
      if (from && after(from)) bal[from] = (bal[from] || 0) - amt; 
    }
    if (type === 'Income' || type === 'UA Received') { 
      if (to && after(to)) bal[to] = (bal[to] || 0) + amt; 
    }
    if (['Bank→Bank', 'Bank→CC', 'Bank→Cash', 'Cash→Bank', 'CC→Bank', 'Site Transfer'].includes(type)) {
      if (from && after(from)) bal[from] = (bal[from] || 0) - amt;
      if (to && after(to)) bal[to] = (bal[to] || 0) + amt;
    }

    // --- SOLUTION FIX: Direct Personal-to-Site Impact ---
    // If a Site Transfer or Site-tagged Expense is paid from your Bank/CC,
    // we must debit Site Cash (increasing your RFS) and credit your Personal Account
    // to show that the money is "gone" from your pocket and "invested" in the site.
    if (isSiteTag || isSiteDomain) {
      const fromPersonal = from && (allBanks.includes(from) || allCC.includes(from)) && from !== 'Cash' && from !== 'Site Cash';
      const toPersonal = to && allBanks.includes(to) && to !== 'Cash' && to !== 'Site Cash';

      // Money leaving your bank for the site — bank already debited above, just track in Site Cash
      if ((type === 'Expense' || type === 'Site Transfer') && fromPersonal) {
        bal['Site Cash'] = (bal['Site Cash'] || 0) - amt; // Site now owes you this
      }
      
      // Money returning to your bank from the site — bank already credited above, just track in Site Cash
      if (type === 'Income' && toPersonal) {
        bal['Site Cash'] = (bal['Site Cash'] || 0) + amt; // Site owes you less
      }
    }
  });
  return bal;
}

/* ── computeProvisions — Decoupled Virtual Envelope Engine ──
   For each is_provision recurring entry:
     A = Target        (target_amount from recurring table)
     B = Gross Saved   (already_saved + SUM(Provision_Accrue) - SUM(Provision_Flush))
     D = Debt          (SUM(Provision_Withdraw) - SUM(Provision_Repay))
     C = Net Blocked   (B - D)  ← the liquidity that is virtually locked
── */
function computeProvisions(recurring,txns){
  const activeTxns=txns.filter(t=>t.status!=='voided');
  return recurring.filter(r=>r.is_provision&&r.active!==false).map(prov=>{
    const myTxns=activeTxns.filter(t=>t.provision_envelope===prov.id||t.particulars===('[ENV:'+prov.id+']'));
    const provTxns=activeTxns.filter(t=>PROVISION_VIRTUAL_TYPES.includes(t.type)&&(t.category===prov.name||t.particulars&&t.particulars.includes('[ENV:'+prov.id+']')));
    const accrues =provTxns.filter(t=>t.type==='Provision_Accrue').reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
    const flushes =provTxns.filter(t=>t.type==='Provision_Flush').reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
    const borrows =provTxns.filter(t=>t.type==='Provision_Withdraw').reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
    const repays  =provTxns.filter(t=>t.type==='Provision_Repay').reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
    const A=parseFloat(prov.target_amount)||0;
    const B=Math.max(0,(parseFloat(prov.already_saved)||0)+accrues-flushes);
    const D=Math.max(0,borrows-repays);
    const C=Math.max(0,B-D);
    const pct=A>0?Math.min(Math.round(C/A*100),100):0;
    return{prov,A,B,C,D,accrues,flushes,borrows,repays,provTxns,pct};
  });
}

  const [selected,setSelected]=useState(null);const [editMode,setEditMode]=useState(null);const [saving,setSaving]=useState(false);
  const [corrAmt,setCorrAmt]=useState('');const [corrDesc,setCorrDesc]=useState('');const [corrCat,setCorrCat]=useState('');

  const [search,setSearch]=useState(globalSearch||'');
  
  /* Apply txnFilter when received from routing */
  useEffect(()=>{

        else if(txnFilter.dateRange.start&&txnFilter.dateRange.end){setDateFilter('Custom');setCustomStart(txnFilter.dateRange.start);setCustomEnd(txnFilter.dateRange.end);}

  },[txnFilter,setTxnFilter]);
  
  useEffect(()=>{setSearch(globalSearch||'');},[globalSearch]);
  const now2=new Date();const curMonth=now2.getMonth();const curYear=now2.getFullYear();
  const inWin=t=>{const d=new Date(t.created_at);if(dateFilter==='This Month')return d.getMonth()===curMonth&&d.getFullYear()===curYear;if(dateFilter==='Last Month'){const lm=curMonth===0?11:curMonth-1,ly=curMonth===0?curYear-1:curYear;return d.getMonth()===lm&&d.getFullYear()===ly;}if(dateFilter==='Past 3 Months'){const c=new Date(now2);c.setMonth(c.getMonth()-3);c.setDate(1);return d>=c;}if(dateFilter==='This Year')return d.getFullYear()===curYear;if(dateFilter==='Custom'){if(customStart&&d<new Date(customStart))return false;if(customEnd&&d>new Date(customEnd+'T23:59:59'))return false;return true;}return true;};
  
  /* Enhanced filtering with account and type from txnFilter */
  const filtered=txns.filter(t=>{
    if(!inWin(t))return false;
    if(t.status==='voided')return false;
    if(search.trim()){const q=search.toLowerCase();if(!(t.particulars||'').toLowerCase().includes(q)&&!(t.category||'').toLowerCase().includes(q)&&!String(t.amount).includes(q)&&!(t.from_account||t.to_account||'').toLowerCase().includes(q))return false;}
    /* Apply type filter from routing */
    if(txnFilter&&txnFilter.type){
      if(txnFilter.type==='Income'&&t.type!=='Income')return false;

    }
    return true;
  });
  
  const filteredTotal=filtered.reduce((s,t)=>s+(Number(t.amount)||0),0);

    if(t.status==='voided')return'';

    if(t.type==='UA Expense')return'ua';
    if(t.type==='Site Transfer'||t.type==='Bank→Bank'||t.type==='Bank→CC'||t.type==='Bank→Cash'||t.type==='Cash→Bank'||t.type==='CC→Bank')return'ua';
    return'out';
  };
  const amtSign=t=>{
    if(t.type==='Income'||t.type==='UA Received')return'+';
    if(t.type==='Expense'||t.type==='UA Expense')return'−';
    if(t.type==='Site Transfer')return'↔';
    if(t.type&&t.type.includes('→'))return'→';
    return'−';
  };
  const typeLabel=t=>{if(t.type==='Income')return'Income';if(t.type==='UA Received')return'UA Received ↑';if(t.type==='UA Expense')return'UA Expense';if(t.type==='Expense')return'Expense';return t.type;};
  const handleEdit=t=>{setEditMode(t);setCorrAmt(String(t.amount));setCorrDesc(t.particulars||'');setCorrCat(t.category||'');setCorrDate(new Date(t.created_at).toISOString().slice(0,10));setCorrFrom(t.from_account||'');setCorrTo(t.to_account||'');setCorrType(t.type||'');};
  const handleSaveCorr=async()=>{if(!editMode||!corrAmt||saving)return;setSaving(true);await onVoidAndCorrect(editMode,{amount:parseFloat(corrAmt),particulars:corrDesc||editMode.particulars,category:corrCat||editMode.category,from_account:corrFrom||editMode.from_account,to_account:corrTo||editMode.to_account,created_at:corrDate?corrDate+'T06:30:00.000Z':editMode.created_at});setEditMode(null);setSelected(null);setSaving(false);};

    const periodLabel=(()=>{if(dateFilter==='This Month')return`${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][curMonth]} ${curYear}`;if(dateFilter==='Last Month'){const lm=curMonth===0?11:curMonth-1,ly=curMonth===0?curYear-1:curYear;return`${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][lm]} ${ly}`;}if(dateFilter==='This Year')return`FY ${curYear}`;if(dateFilter==='Custom'&&customStart&&customEnd)return`${customStart} to ${customEnd}`;return'All Time';})();

        ${buildRows(exp)}

        <tr class="tot"><td colspan="5" style="font-weight:700;">NET</td><td class="amt" colspan="2" style="font-weight:800;color:${net>=0?'#27ae60':'#c0392b'};text-align:right;">${net>=0?'+':'−'}\u20b9${Math.abs(net).toLocaleString('en-IN',{minimumFractionDigits:2})}</td></tr>
        </tbody></table></div>`;
    };
    const personal=filtered.filter(t=>!isSiteTxn(t));
    const site=filtered.filter(t=>isSiteTxn(t));
    const grandInc=filtered.filter(isIncome).reduce((s,t)=>s+(parseFloat(t.amount)||0),0);

    const html=`<!DOCTYPE html><html><head><title>Transaction Log ${periodLabel}</title><style>

                <input type="date" value={corrDate} max={new Date().toISOString().slice(0,10)} onChange={e=>setCorrDate(e.target.value)} style={{background:'var(--bg3)',border:'1px solid '+(corrDate!==new Date(editMode.created_at).toISOString().slice(0,10)?'var(--amber)':'var(--border2)'),borderRadius:6,padding:'8px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',width:'100%',marginBottom:10}}/>
                {/* Type */}

                  <div style={{display:'flex',flexWrap:'wrap'}}>{typeOpts.map(o=>chip(o,activeType===o,()=>setCorrType(o)))}</div>
                </div>
                {/* Category */}
                {showCat&&<div style={{marginBottom:10}}>
                  <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:6,fontWeight:600,letterSpacing:'0.08em'}}>CATEGORY</div>
                  <div style={{display:'flex',flexWrap:'wrap'}}>{(isSite?SITE_CATS:PERSONAL_CATS.map(c=>c.id)).map(c=>chip(c,corrCat===c,()=>setCorrCat(c)))}</div>
                </div>}
                {/* From */}
                {showFrom&&<div style={{marginBottom:10}}>
                  <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:6,fontWeight:600,letterSpacing:'0.08em'}}>FROM</div>
                  <div style={{display:'flex',flexWrap:'wrap'}}>{fromAccounts.map(a=>chip(a,corrFrom===a,()=>setCorrFrom(a)))}</div>
                </div>}
                {/* To */}
                {showTo&&<div style={{marginBottom:10}}>
                  <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:6,fontWeight:600,letterSpacing:'0.08em'}}>TO</div>
                  <div style={{display:'flex',flexWrap:'wrap'}}>{toAccounts.map(a=>chip(a,corrTo===a,()=>setCorrTo(a)))}</div>
                </div>}
                {/* Save/Cancel */}
                <div style={{display:'flex',gap:8,marginTop:4}}>
                  <button onClick={async()=>{
                    if(saving)return;setSaving(true);
                    await onVoidAndCorrect(editMode,{
                      type:activeType,
                      amount:parseFloat(corrAmt)||editMode.amount,
                      category:corrCat||editMode.category,
                      from_account:showFrom?(corrFrom||editMode.from_account):null,
                      to_account:showTo?(corrTo||editMode.to_account):null,
                      particulars:corrDesc||editMode.particulars,
                      created_at:corrDate?corrDate+'T06:30:00.000Z':editMode.created_at,
                      domain:editMode.domain,tower:editMode.tower,
                      site_name:editMode.site_name,party_name:editMode.party_name
                    });
                    setEditMode(null);setSelected(null);setSaving(false);
                  }} style={{flex:1,background:'var(--blue)',border:'none',borderRadius:8,color:'#fff',padding:'11px',fontSize:12,fontFamily:'var(--mono)',fontWeight:700,cursor:'pointer'}}>{saving?'Saving...':'Save correction'}</button>
                  <button onClick={()=>{setEditMode(null);}} style={{background:'none',border:'1px solid var(--border2)',borderRadius:8,color:'var(--text3)',padding:'11px 16px',fontSize:12,fontFamily:'var(--mono)',cursor:'pointer'}}>Cancel</button>
                </div>
              </div>
              );
            })()}
          </div>
          ));
          const pInc=personal.filter(t=>t.type==='Income'||t.type==='UA Received');
          const pExp=personal.filter(t=>t.type!=='Income'&&t.type!=='UA Received');
          const sInc=site.filter(t=>t.type==='Income'||t.type==='UA Received');
          const sExp=site.filter(t=>t.type!=='Income'&&t.type!=='UA Received');
          const pIncTotal=pInc.reduce((s,t)=>s+(+t.amount||0),0);
          const pExpTotal=pExp.reduce((s,t)=>s+(+t.amount||0),0);
          const sIncTotal=sInc.reduce((s,t)=>s+(+t.amount||0),0);
          const sExpTotal=sExp.reduce((s,t)=>s+(+t.amount||0),0);
          return(<>
            {personal.length>0&&<>
              <SectionHdr label="🏠 Personal" color="var(--blue)" count={personal.length} total={pIncTotal+pExpTotal}/>
              {pInc.length>0&&<SubHdr label="▲ Income / Receipts" color="var(--green-bg)"/>}
              {renderGroup([...pInc].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)))}
              {pExp.length>0&&<SubHdr label="▼ Expense / Payments" color="var(--red-bg)"/>}
              {renderGroup([...pExp].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)))}
              <div style={{display:'flex',justifyContent:'space-between',padding:'7px 16px',background:'var(--bg3)',borderBottom:'1px solid var(--border)',fontSize:11,fontFamily:'var(--mono)'}}>
                <span style={{color:'var(--text3)',fontSize:10,textTransform:'uppercase',letterSpacing:'0.06em'}}>Personal Net</span>
                <span style={{fontWeight:700,color:pIncTotal-pExpTotal>=0?'var(--green)':'var(--red)'}}>{pIncTotal-pExpTotal>=0?'+':'−'}{fmtAmt(Math.abs(pIncTotal-pExpTotal))}</span>
              </div>
            </>}
            {site.length>0&&<>
              <SectionHdr label="🏗 Site" color="var(--amber)" count={site.length} total={sIncTotal+sExpTotal}/>
              {sInc.length>0&&<SubHdr label="▲ Income / Receipts" color="var(--green-bg)"/>}
              {renderGroup([...sInc].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)))}
              {sExp.length>0&&<SubHdr label="▼ Expense / Payments" color="var(--red-bg)"/>}
              {renderGroup([...sExp].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)))}
              <div style={{display:'flex',justifyContent:'space-between',padding:'7px 16px',background:'var(--bg3)',borderBottom:'1px solid var(--border)',fontSize:11,fontFamily:'var(--mono)'}}>
                <span style={{color:'var(--text3)',fontSize:10,textTransform:'uppercase',letterSpacing:'0.06em'}}>Site Net</span>
                <span style={{fontWeight:700,color:sIncTotal-sExpTotal>=0?'var(--green)':'var(--red)'}}>{sIncTotal-sExpTotal>=0?'+':'−'}{fmtAmt(Math.abs(sIncTotal-sExpTotal))}</span>
              </div>
            </>}
            {filtered.length===0&&<div className="empty">{search?`No results for "${search}"`:'No transactions found.'}</div>}
          </>);
        })()}
      </div>
    </div>
  );
}
/* ── DashScreen — Waterfall Hero + Audit Sync + Collapsed Cards + Clickable Chart ── */
function DashScreen({balances,txns,liquid,allBanks,allCC,allCCAll,budgets,trueSpendable,totalNetBlocked,recurring,checklist,setGlobalSearch,setTab,setTxnFilter,onAuditSync}){
  budgets=budgets||{};

  const [auditLoading,setAuditLoading]=useState(false);
  const chartRef=useRef(null);const chartInst=useRef(null);
  const drillTo=term=>{setGlobalSearch(term);setTab('txns');};
  const now=new Date();const month=now.getMonth();const year=now.getFullYear();
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const active=txns.filter(t=>t.status!=='voided');
  const thisMonth=active.filter(t=>{const d=new Date(t.created_at);return d.getMonth()===month&&d.getFullYear()===year;});
  const income=thisMonth.filter(t=>t.type==='Income'&&t.tower!=='SITE'&&t.domain!=='Site').reduce((s,t)=>s+(+t.amount),0);
  const expense=thisMonth.filter(t=>t.type==='Expense'&&t.tower!=='SITE'&&t.domain!=='Site').reduce((s,t)=>s+(+t.amount),0);
  const siteExpense=thisMonth.filter(t=>t.type==='Expense'&&(t.tower==='SITE'||t.domain==='Site')).reduce((s,t)=>s+(+t.amount),0);
  const uaExp=thisMonth.filter(t=>t.type==='UA Expense').reduce((s,t)=>s+(+t.amount),0);
  const uaRecv=thisMonth.filter(t=>t.type==='UA Received').reduce((s,t)=>s+(+t.amount),0);
  const uaOut=uaExp-uaRecv;
  const ccDues=(allCCAll||allCC).map(a=>({name:a,due:Math.max(0,-(balances[a]||0))})).filter(x=>x.due>0);
  const totalCC=ccDues.reduce((s,x)=>s+x.due,0);
  /* DVE: use totalNetBlocked (virtual envelope locks) instead of legacy monthlyProv */
  const netBlocked=totalNetBlocked||0;
  const reservedCapital=totalCC+netBlocked;
  const safeToSpend=liquid-reservedCapital;
  const spendable=trueSpendable!==undefined?trueSpendable:Math.max(0,liquid-totalCC);

  const safeCol=safeToSpend<0?'var(--red)':safeToSpend<10000?'var(--amber)':'var(--green)';
  const cats={};thisMonth.filter(t=>t.type==='Expense'&&t.tower!=='SITE'&&t.domain!=='Site').forEach(t=>{const c=t.category||'Misc';cats[c]=(cats[c]||0)+(+t.amount);});
  const topCats=Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const COLORS=['#059669','#2563eb','#d97706','#dc2626','#7c3aed','#0891b2'];

  const handleAuditSync=async()=>{
    const inputStr=window.prompt(`🔍 AUDIT SYNC\n\nApp Calculated Bank Balance: ₹${fmt(liquid)}\n\nEnter your REAL total bank balance (excluding CCs):`, fmt(liquid).replace(/,/g,''));
    if(inputStr===null)return;
    const real=parseFloat(inputStr.replace(/,/g,''));
    if(isNaN(real)){alert('Invalid amount. Please enter a number.');return;}
    setAuditLoading(true);
    await onAuditSync(real);
    setAuditLoading(false);
  };

  /* v1.6: Recalculate Ledger — recomputes balance from opening date forward */
  const handleRecalculate=()=>{
    const lines=[];
    const allAcc=[...allBanks,...(allCCAll||[]),'Site Cash'];
    allAcc.forEach(acc=>{
      const computed=balances[acc]||0;
      lines.push(`${acc}: ${computed>=0?'+':''}${fmt(computed)}`);
    });
    const msg=`RECALCULATED BALANCES (opening balance + all transactions):\n\n${lines.join('\n')}\n\nTotal Liquid: ${fmt(liquid)}\nCC Dues: ${fmt(totalCC)}\nSafe to Spend: ${fmt(safeToSpend)}\n\nIf any figure looks wrong, use Audit Sync to correct via a Suspense entry.`;
    alert(msg);
  };

  useEffect(()=>{
    if(!chartRef.current||topCats.length===0)return;
    if(chartInst.current){chartInst.current.destroy();chartInst.current=null;}
    chartInst.current=new Chart(chartRef.current,{
      type:'doughnut',
      data:{labels:topCats.map(([c])=>c),datasets:[{data:topCats.map(([,v])=>v),backgroundColor:COLORS.slice(0,topCats.length),borderColor:'rgba(0,0,0,0.1)',borderWidth:2}]},
      options:{responsive:true,maintainAspectRatio:true,cutout:'65%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' ₹'+Math.round(ctx.parsed).toLocaleString('en-IN')}}},
        onClick:(evt,els)=>{if(els.length>0)drillTo(topCats[els[0].index][0]);},
        onHover:(evt,els)=>{evt.native.target.style.cursor=els.length>0?'pointer':'default';}
      }
    });
    return()=>{if(chartInst.current){chartInst.current.destroy();chartInst.current=null;}};
  },[topCats]);

  const fy=active.filter(t=>{const d=new Date(t.created_at),yr=d.getFullYear(),mo=d.getMonth();return(yr===year&&mo>=3)||(yr===year+1&&mo<3);});
  const it80C=fy.filter(t=>t.it_section==='80C').reduce((s,t)=>s+(+t.amount),0);
  const it80D=fy.filter(t=>t.it_section==='80D').reduce((s,t)=>s+(+t.amount),0);
  const gap80C=Math.max(0,150000-it80C);const taxSave=Math.round(gap80C*0.3);
  const alerts=[];
  /* CC dues removed from alerts — visible in dedicated CC Dues card below */
  if(uaOut>0)alerts.push({r:'amber',t:'UA outstanding — '+fmtAmt(uaOut)});
  topCats.forEach(([c,v])=>{if(budgets[c]&&v>budgets[c])alerts.push({r:'amber',t:c+' over budget'});});
  if(gap80C>0&&month>=1&&month<=2)alerts.push({r:'blue',t:'80C gap ₹'+Math.round(gap80C/1000)+'k — before 31 Mar'});



  const Card=({children,style})=><div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,overflow:'hidden',marginBottom:8,...(style||{})}}>{children}</div>;
  const Hdr=({t,v,col})=><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',borderBottom:'1px solid var(--border)',background:'var(--bg3)'}}><span style={{fontSize:10,fontWeight:600,fontFamily:'var(--mono)',letterSpacing:'0.08em',color:'var(--text3)',textTransform:'uppercase'}}>{t}</span>{v&&<span style={{fontSize:11,fontFamily:'var(--mono)',fontWeight:600,color:col||'var(--text)'}}>{v}</span>}</div>;
  const Row=({a,b,red,grn,amb,dim,onClick})=><div onClick={onClick} style={{display:'flex',justifyContent:'space-between',padding:'7px 12px',borderBottom:'1px solid var(--border)',fontSize:12,alignItems:'center',cursor:onClick?'pointer':'default'}}><span style={{color:dim?'var(--text3)':'var(--text2)'}}>{a}</span><div style={{display:'flex',gap:8,alignItems:'center'}}><span style={{fontFamily:'var(--mono)',fontWeight:600,color:red?'var(--red)':grn?'var(--green)':amb?'var(--amber)':'var(--text)'}}>{b}</span>{onClick&&<span style={{fontSize:10,color:'var(--text3)'}}>›</span>}</div></div>;

  return(
    <div className="fade-in" style={{padding:'8px 10px'}}>

      {/* ── WATERFALL HERO: Safe to Spend breakdown ── */}
      {(()=>{
        const [wfOpen,setWfOpen]=useState(false);
        return(
        <div style={{background:'var(--bg2)',border:'1.5px solid '+(safeToSpend<0?'var(--red)':safeToSpend<10000?'var(--amber)':'var(--green)'),borderRadius:12,marginBottom:6,overflow:'hidden'}}>
          {/* Safe to Spend — full width */}
          <div style={{padding:'14px 16px',background:safeToSpend<0?'var(--red-bg)':safeToSpend<10000?'var(--amber-bg)':'var(--green-bg)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontFamily:'var(--mono)',fontSize:8,color:safeCol,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:3}}>Safe to Spend</div>
              <div style={{fontFamily:'var(--mono)',fontSize:28,fontWeight:800,color:safeCol,letterSpacing:'-1px',lineHeight:1}}>{safeToSpend<0?'−':''}{fmtAmt(Math.abs(safeToSpend))}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontFamily:'var(--mono)',fontSize:9,color:safeCol,opacity:0.7}}>Bank {fmtAmt(liquid)}</div>
              {totalCC>0&&<div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--red)',opacity:0.8}}>−CC {fmtAmt(totalCC)}</div>}
              {netBlocked>0&&<div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--amber)',opacity:0.8}}>−Env {fmtAmt(netBlocked)}</div>}
            </div>
          </div>
          {/* Expand toggle */}
          <div onClick={()=>setWfOpen(o=>!o)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 14px',borderTop:'1px solid var(--border)',cursor:'pointer',background:'var(--bg3)'}}>
            <span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',letterSpacing:'0.08em',textTransform:'uppercase'}}>🏦 Bank &amp; CC Details</span>
            <span style={{fontSize:9,color:'var(--text3)',transform:wfOpen?'rotate(180deg)':'none',display:'inline-block',transition:'transform 0.2s'}}>▼</span>
          </div>
          {/* Expanded: Bank balances table + CC dues table */}
          {wfOpen&&(
            <div>
              {/* Bank rows header */}
              <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:0,padding:'6px 12px',background:'var(--bg3)',borderBottom:'1px solid var(--border)'}}>
                <span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase'}}>Bank</span>
                <span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',textAlign:'right'}}>Balance</span>
                <span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',textAlign:'right'}}>This Mo</span>
              </div>
              {allBanks.filter(a=>a!=='Site Cash').map(a=>{
                const bal=balances[a]||0;
                const monthTxns=thisMonth.filter(t=>t.from_account===a||t.to_account===a);
                const moSpend=monthTxns.filter(t=>(t.type==='Expense'||t.type==='UA Expense')&&t.from_account===a).reduce((s,t)=>s+(+t.amount),0);
                return(
                  <div key={a} onClick={()=>{setTab('statement');setTimeout(()=>{window.dispatchEvent(new CustomEvent('jbf-route-statement',{detail:{account:a,period:'this_month'}}));},50);}} style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:0,padding:'9px 12px',borderBottom:'1px solid var(--border)',background:'var(--bg2)',cursor:'pointer'}}>
                    <span style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:'var(--text)'}}>{a}</span>
                    <span style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:bal<0?'var(--red)':bal===0?'var(--text3)':'var(--green)'}}>{bal===0?'—':(bal<0?'−':'')+fmtAmt(Math.abs(bal))}</span>
                    <span style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:11,color:moSpend>0?'var(--red)':'var(--text3)'}}>{moSpend>0?'−'+fmtAmt(moSpend):'—'}</span>
                  </div>
                );
              })}
              {/* CC dues rows — only those with outstanding */}
              {(allCCAll||allCC).some(a=>Math.max(0,-(balances[a]||0))>0)&&(<>
                <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:0,padding:'6px 12px',background:'var(--bg3)',borderBottom:'1px solid var(--border)',borderTop:'1px solid var(--border2)'}}>
                  <span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase'}}>Credit Card</span>
                  <span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',textAlign:'right'}}>Billed</span>
                  <span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',textAlign:'right'}}>Unbilled</span>
                </div>
                {(allCCAll||allCC).map(a=>{
                  const due=Math.max(0,-(balances[a]||0));
                  if(due===0)return null;
                  // Use bill history for billed; only show billed if latest bill not yet paid
                  const bills=(()=>{try{const v=JSON.parse(localStorage.getItem('jbf_cc_bills')||'{}');return v[a]||[];}catch{return[];}})();
                  const latestBill=bills.length>0?bills[bills.length-1]:null;
                  // Detect paid: CC→Bank payment after bill end
                  const isPaid=latestBill?active.filter(t=>
                    (t.type==='CC→Bank'||t.type==='Bank→CC'||t.type==='Bank→Bank')&&
                    (t.from_account===a||t.to_account===a)&&
                    t.created_at.slice(0,10)>latestBill.billEnd
                  ).length>0:false;
                  // Unbilled = spends after latest bill's end (locked date)
                  const sd=(()=>{try{return parseInt(JSON.parse(localStorage.getItem('jbf_cc_stmt_days')||'{}')[a]||'1');}catch{return 1;}})();
                  const d=new Date();const ls=new Date(d.getFullYear(),d.getMonth(),sd);if(ls>d)ls.setMonth(ls.getMonth()-1);
                  const unbilledFrom=latestBill?latestBill.billEnd:ls.toISOString().slice(0,10);
                  const allCCTxns=active.filter(t=>t.from_account===a&&(t.type==='Expense'||t.type==='UA Expense'));
                  const unbilled=allCCTxns.filter(t=>t.created_at.slice(0,10)>unbilledFrom).reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
                  // Billed = from saved bill amount (stable), zero if paid
                  const billed=(!isPaid&&latestBill)?latestBill.bankAmt:0;
                  return(
                    <div key={a} style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:0,padding:'9px 12px',borderBottom:'1px solid var(--border)',background:'var(--bg2)'}}>
                      <span style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:'var(--text)'}}>{a}</span>
                      <span onClick={()=>{if(billed>0){setTab('cc_bill');}}} style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:billed>0?'var(--red)':'var(--text3)',cursor:billed>0?'pointer':'default'}}>{billed>0?fmtAmt(billed):'—'}</span>
                      <span onClick={()=>{if(unbilled>0){const tod=new Date().toISOString().slice(0,10);setTxnFilter({account:a,type:null,dateRange:{start:unbilledFrom,end:tod},category:null});setTab('txns');}}} style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:unbilled>0?'var(--amber)':'var(--text3)',cursor:unbilled>0?'pointer':'default'}}>{unbilled>0?fmtAmt(unbilled):'—'}</span>
                    </div>
                  );
                }).filter(Boolean)}
              </>)}
            </div>
          )}
        </div>
        );
      })()}

      {/* Alerts */}
      {alerts.length>0&&<div style={{display:'flex',flexDirection:'column',gap:4,marginBottom:6}}>{alerts.map((a,i)=><div key={i} style={{background:a.r==='red'?'var(--red-bg)':a.r==='blue'?'var(--blue-bg)':'var(--amber-bg)',border:'1px solid '+(a.r==='red'?'var(--red)':a.r==='blue'?'var(--blue)':'var(--amber)'),borderRadius:6,padding:'6px 10px',fontSize:11,color:a.r==='red'?'var(--red)':a.r==='blue'?'var(--blue)':'var(--amber)',fontFamily:'var(--mono)'}}>{a.r==='red'?'⚠ ':a.r==='blue'?'◈ ':'● '}{a.t}</div>)}</div>}

      {/* ── v1.6 AUDIT + RECALCULATE row ── */}
      <div style={{display:'flex',gap:6,marginBottom:8}}>
        <button onClick={handleAuditSync} disabled={auditLoading} style={{flex:1,background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,color:'var(--text2)',fontFamily:'var(--mono)',fontSize:10,fontWeight:600,padding:'9px 10px',cursor:'pointer',letterSpacing:'0.04em'}}>
          {auditLoading?'⏳ Syncing...':'🔍 Audit Sync'}
        </button>
        <button onClick={handleRecalculate} style={{flex:1,background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,color:'var(--blue)',fontFamily:'var(--mono)',fontSize:10,fontWeight:600,padding:'9px 10px',cursor:'pointer',letterSpacing:'0.04em'}}>
          ⟳ Recalculate Ledger
        </button>
      </div>

      {/* Interactive Pie Chart */}
      {topCats.length>0&&(
        <Card>
          <Hdr t={MONTHS[month]+' spend'} v={fmtAmt(expense)} col="var(--red)"/>
          <div style={{padding:'12px 16px 8px',display:'flex',gap:12,alignItems:'center'}}>
            <div style={{flex:'0 0 150px',position:'relative'}}>
              <canvas ref={chartRef} style={{maxHeight:'150px'}}></canvas>
              <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>

            </div>
            <div style={{display:'flex',flexDirection:'column',gap:5}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>

                <span style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:700,color:pcCol}}>{personalCash<0?'−':''}{fmtAmt(Math.abs(personalCash))}</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)'}}>{scLabel}</span>
                <span style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:700,color:scCol}}>{siteCash<0?'−':''}{fmtAmt(Math.abs(siteCash))}</span>
              </div>
              {totalBankUsedForSite>0&&<div style={{borderTop:'1px solid var(--border)',paddingTop:5,display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:2}}>
                <span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em'}}>🏗 Bank used for site</span>
                <span style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:'var(--blue)'}}>+{fmtAmt(totalBankUsedForSite)}</span>
              </div>}
            </div>

        );
      })()}

      {uaOut>0&&<Card><Hdr t="UA Outstanding" v={fmtAmt(uaOut)} col="var(--amber)"/><Row a="Personal at site" b={fmtAmt(uaExp)} amb/><Row a="Recovered" b={'−'+fmtAmt(uaRecv)} grn/></Card>}
    </div>
  );
}
/* ── InvestmentsScreen ── */
function InvestmentsScreen({investments,setInvestments,showToast}){
  const [form,setForm]=useState({name:'',type:'Equity',date:new Date().toISOString().slice(0,10),qty:'',buy:'',current:''});
  const [saving,setSaving]=useState(false);const [editId,setEditId]=useState(null);const [editPrice,setEditPrice]=useState('');
  const handleAdd=async e=>{e.preventDefault();setSaving(true);const p={asset_name:form.name,asset_type:form.type,buy_date:form.date,qty:parseFloat(form.qty),buy_price:parseFloat(form.buy),current_price:parseFloat(form.current)};const{data,error}=await db.from('investments').insert([p]).select();if(data&&!error){setInvestments([data[0],...investments]);setForm({name:'',type:'Equity',date:new Date().toISOString().slice(0,10),qty:'',buy:'',current:''});showToast('✓ Investment Logged');}else showToast('⚠ Error Saving');setSaving(false);};
  const handleDelete=async id=>{if(!window.confirm('Remove this asset?'))return;const{error}=await db.from('investments').delete().eq('id',id);if(!error){setInvestments(investments.filter(i=>i.id!==id));showToast('↩ Asset Removed');}};
  const handleUpdatePrice=async id=>{if(!editPrice)return setEditId(null);const{error}=await db.from('investments').update({current_price:parseFloat(editPrice)}).eq('id',id);if(!error){setInvestments(investments.map(i=>i.id===id?{...i,current_price:parseFloat(editPrice)}:i));showToast('✓ Price Updated');}setEditId(null);setEditPrice('');};
  const totalInv=investments.reduce((s,i)=>s+(i.qty*i.buy_price),0);const totalCur=investments.reduce((s,i)=>s+(i.qty*i.current_price),0);const tp=totalCur-totalInv;const pp=totalInv>0?(tp/totalInv*100):0;
  const iS={background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',width:'100%'};
  return(<div className="fade-in" style={{paddingBottom:'24px'}}>
    <div style={{margin:'12px 16px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'16px'}}>
      <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',letterSpacing:'0.06em'}}>Total Portfolio Value</div>
      <div style={{fontSize:28,fontWeight:700,fontFamily:'var(--mono)',marginTop:4}}>₹{totalCur.toLocaleString('en-IN')}</div>
      <div style={{display:'flex',gap:16,marginTop:12}}>
        <div><div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase'}}>Invested</div><div style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:600}}>₹{totalInv.toLocaleString('en-IN')}</div></div>
        <div><div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase'}}>P&L</div><div style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:600,color:tp>=0?'var(--green)':'var(--red)'}}>{tp>=0?'+':'−'}₹{Math.abs(tp).toLocaleString('en-IN')} ({pp.toFixed(2)}%)</div></div>
      </div>
    </div>
    <p className="sec-label" style={{marginTop:8}}>Add Investment</p>
    <form onSubmit={handleAdd} style={{padding:'0 16px',display:'flex',flexDirection:'column',gap:8}}>
      <input placeholder="Asset Name (e.g. RELIANCE, SGB 2026)" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} style={iS} required/>
      <div style={{display:'flex',gap:8}}><select value={form.type} onChange={e=>setForm({...form,type:e.target.value})} style={{...iS,flex:1}}><option>Equity</option><option>SGB</option><option>Mutual Fund</option></select><input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} style={{...iS,flex:1}} required/></div>
      <div style={{display:'flex',gap:8}}><input type="number" step="any" placeholder="Qty" value={form.qty} onChange={e=>setForm({...form,qty:e.target.value})} style={{...iS,flex:1}} required/><input type="number" step="any" placeholder="Buy Price" value={form.buy} onChange={e=>setForm({...form,buy:e.target.value})} style={{...iS,flex:1}} required/><input type="number" step="any" placeholder="Current" value={form.current} onChange={e=>setForm({...form,current:e.target.value})} style={{...iS,flex:1}} required/></div>
      <button type="submit" disabled={saving} style={{background:saving?'var(--bg3)':'var(--blue)',color:saving?'var(--text3)':'#fff',border:'none',borderRadius:8,padding:'12px',fontFamily:'var(--mono)',fontSize:13,fontWeight:600,cursor:'pointer',marginTop:4}}>{saving?'Saving...':'Log Investment'}</button>
    </form>
    <p className="sec-label" style={{marginTop:16}}>Holdings</p>
    {investments.length===0&&<div className="empty" style={{paddingTop:20}}>No investments logged yet.</div>}
    <div style={{padding:'0 16px'}}>
      {investments.map(inv=>{
        const days=Math.floor((new Date()-new Date(inv.buy_date))/(1000*60*60*24));const isLTCG=days>=365;
        const inv_=inv.qty*inv.buy_price;const cur=inv.qty*inv.current_price;const prof=cur-inv_;const pct=inv_>0?(prof/inv_*100):0;
        return(<div key={inv.id} style={{padding:'12px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,marginBottom:8}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div><div style={{fontSize:14,fontWeight:600,color:'var(--text)',display:'flex',alignItems:'center',gap:6}}>{inv.asset_name}<span style={{fontSize:8,padding:'2px 6px',borderRadius:4,fontFamily:'var(--mono)',background:isLTCG?'var(--green-bg)':'var(--amber-bg)',color:isLTCG?'var(--green)':'var(--amber)'}}>{isLTCG?'LTCG':'STCG'}</span></div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:4}}>{inv.qty} units @ ₹{inv.buy_price} · {new Date(inv.buy_date).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</div></div>
            <div style={{textAlign:'right',display:'flex',flexDirection:'column',alignItems:'flex-end'}}><div style={{fontFamily:'var(--mono)',fontSize:14,fontWeight:600}}>₹{cur.toLocaleString('en-IN')}</div><div style={{fontSize:10,fontFamily:'var(--mono)',color:prof>=0?'var(--green)':'var(--red)',marginTop:2}}>{prof>=0?'+':'−'}₹{Math.abs(prof).toLocaleString('en-IN')} ({pct.toFixed(1)}%)</div>{editId!==inv.id&&<button onClick={()=>{setEditId(inv.id);setEditPrice(inv.current_price);}} style={{background:'none',border:'none',color:'var(--text3)',fontFamily:'var(--mono)',fontSize:10,cursor:'pointer',marginTop:6,padding:'2px'}}>⚙ Edit</button>}</div>
          </div>
          {editId===inv.id&&(<div style={{display:'flex',gap:8,marginTop:12,paddingTop:12,borderTop:'1px solid var(--border)'}}><div style={{display:'flex',gap:6,flex:1}}><input type="number" step="any" autoFocus placeholder="New Price" value={editPrice} onChange={e=>setEditPrice(e.target.value)} style={{...iS,padding:'6px 8px'}}/><button onClick={()=>handleUpdatePrice(inv.id)} style={{background:'var(--blue)',border:'none',borderRadius:6,color:'#fff',padding:'0 12px',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer'}}>Save</button><button onClick={()=>setEditId(null)} style={{background:'none',border:'1px solid var(--border2)',borderRadius:6,color:'var(--text3)',padding:'0 10px',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer'}}>✕</button></div><button onClick={()=>handleDelete(inv.id)} style={{background:'var(--red-bg)',border:'1px solid var(--red)',borderRadius:6,color:'var(--red)',fontFamily:'var(--mono)',fontSize:11,padding:'0 12px',cursor:'pointer'}}>Sell</button></div>)}
        </div>);
      })}
    </div>
  </div>);
}

/* ── AiCommandScreen v1.7 ──────────────────────────────────────
   Fix: Added "anthropic-dangerous-direct-browser-access: true" header
   which is REQUIRED for direct browser API calls (resolves CORS 403).
   Also added claude-haiku model, working test button, chat interface.
──────────────────────────────────────────────────────────────── */
function AiCommandScreen({investments,setInvestments,showToast}){
  /* ── API key storage ── */
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem('jbf_ai_key')||'');
  const [keyVisible,setKeyVisible]=useState(false);const [testStatus,setTestStatus]=useState('');const [testing,setTesting]=useState(false);
  /* ── Chat ── */
  const [messages,setMessages]=useState([]);const [input,setInput]=useState('');const [loading,setLoading]=useState(false);
  /* ── JSON picks (existing feature) ── */
  const [jsonStr,setJsonStr]=useState('');const [picks,setPicks]=useState([]);const [acc,setAcc]=useState(null);const [qty,setQty]=useState('');const [saving,setSaving]=useState(false);
  /* ── Tab ── */
  const [aiTab,setAiTab]=useState('chat'); /* 'chat' | 'quant' */

  const saveKey=k=>{localStorage.setItem('jbf_ai_key',k);setApiKey(k);};

  /* ── Core API call with all required headers ──
     Key fix: "anthropic-dangerous-direct-browser-access": "true"
     This header is required for ALL direct browser API calls to bypass CORS preflight.
     Without it: 403 Forbidden or CORS error.
  ── */
  const callAPI=async(msgs,sysPrompt)=>{
    const key=(apiKey||'').trim();
    if(!key)throw new Error('API key not set');
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:1024,
        ...(sysPrompt?{system:sysPrompt}:{}),
        messages:msgs
      })
    });
    if(!res.ok){const e=await res.json().catch(()=>({error:{message:res.statusText}}));throw new Error(e?.error?.message||'API Error '+res.status);}
    return res.json();
  };

  /* ── Test connection ── */
  const testConn=async()=>{
    setTesting(true);setTestStatus('⏳ Testing...');
    try{
      const d=await callAPI([{role:'user',content:'Reply with just: OK'}]);
      const txt=d.content?.find(b=>b.type==='text')?.text||'';
      setTestStatus('✓ Connected! Model replied: "'+txt.trim().slice(0,30)+'"');
    }catch(e){setTestStatus('❌ '+e.message);}
    setTesting(false);
  };

  /* ── Chat send ── */
  const sendMsg=async()=>{
    if(!input.trim()||loading)return;
    const userMsg={role:'user',content:input.trim()};
    const newMsgs=[...messages,userMsg];
    setMessages(newMsgs);setInput('');setLoading(true);
    try{
      const d=await callAPI(newMsgs,'You are JB Finance AI — a personal finance assistant for Jayesh Bhagat. Be concise, practical, use Indian financial context (₹, Indian tax laws 80C/80D, SIP, mutual funds). Reply in 2-4 sentences max unless user asks for detail.');
      const reply=d.content?.find(b=>b.type==='text')?.text||'(no response)';
      setMessages([...newMsgs,{role:'assistant',content:reply}]);
    }catch(e){setMessages([...newMsgs,{role:'assistant',content:'⚠ Error: '+e.message}]);}
    setLoading(false);
  };

  /* ── JSON Quant picks ── */
  const process=()=>{try{const p=JSON.parse(jsonStr);if(Array.isArray(p))setPicks(p);else showToast('⚠ Invalid JSON');}catch(e){showToast('⚠ Parse error');}};
  const confirm_=async pick=>{if(!qty||parseFloat(qty)<=0)return;setSaving(true);const p={asset_name:pick.asset_name,asset_type:'Equity',buy_date:new Date().toISOString().slice(0,10),qty:parseFloat(qty),buy_price:parseFloat(pick['entry_price_₹']),current_price:parseFloat(pick['entry_price_₹'])};const{data,error}=await db.from('investments').insert([p]).select();if(data&&!error){setInvestments([data[0],...investments]);setPicks(picks.filter(p=>p.asset_name!==pick.asset_name));showToast('✓ '+pick.asset_name+' added!');}else showToast('⚠ Error');setSaving(false);setAcc(null);setQty('');};

  const tabS=a=>({flex:1,padding:'9px 0',fontFamily:'var(--mono)',fontSize:11,fontWeight:a?700:400,letterSpacing:'0.06em',textTransform:'uppercase',border:'none',borderBottom:a?'2px solid var(--green)':'2px solid transparent',background:'none',color:a?'var(--green)':'var(--text3)',cursor:'pointer'});
  const iS={background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',width:'100%'};

  return(<div className="fade-in" style={{paddingBottom:'80px'}}>

    {/* API Key section */}
    <div style={{margin:'12px 16px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'12px 14px'}}>
      <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:8}}>Anthropic API Key</div>
      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:8}}>
        <input type={keyVisible?'text':'password'} placeholder="sk-ant-api03-..." value={apiKey} onChange={e=>saveKey(e.target.value)} style={{...iS,flex:1,fontFamily:'var(--mono)',fontSize:12}}/>
        <button onClick={()=>setKeyVisible(v=>!v)} style={{background:'none',border:'1px solid var(--border)',borderRadius:6,color:'var(--text3)',padding:'8px 10px',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer'}}>{keyVisible?'Hide':'Show'}</button>
      </div>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <button onClick={testConn} disabled={testing||!apiKey.trim()} style={{background:testing?'var(--bg3)':'var(--blue)',border:'none',borderRadius:6,color:testing?'var(--text3)':'#fff',fontFamily:'var(--mono)',fontSize:11,fontWeight:600,padding:'8px 14px',cursor:'pointer',flexShrink:0}}>{testing?'Testing...':'Test Connection'}</button>
        {testStatus&&<span style={{fontFamily:'var(--mono)',fontSize:11,color:testStatus.startsWith('✓')?'var(--green)':'var(--red)',flex:1,lineHeight:1.4}}>{testStatus}</span>}
      </div>
    </div>

    {/* Tabs */}
    <div style={{display:'flex',borderBottom:'1px solid var(--border)',padding:'0 16px'}}>
      <button style={tabS(aiTab==='chat')} onClick={()=>setAiTab('chat')}>💬 Finance Chat</button>
      <button style={tabS(aiTab==='quant')} onClick={()=>setAiTab('quant')}>📊 Quant Engine</button>
    </div>

    {/* ── CHAT TAB ── */}
    {aiTab==='chat'&&(<div style={{display:'flex',flexDirection:'column'}}>
      {!apiKey.trim()&&<div style={{margin:'12px 16px',background:'var(--amber-bg)',border:'1px solid var(--amber)',borderRadius:8,padding:'10px 12px',fontFamily:'var(--mono)',fontSize:11,color:'var(--amber)'}}>⚠ Enter your Anthropic API key above to use the AI chat.</div>}
      {/* Messages */}
      <div style={{padding:'8px 0',minHeight:200}}>
        {messages.length===0&&<div style={{padding:'24px 16px',textAlign:'center',fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',lineHeight:2}}>Ask anything about your finances.<br/>e.g. "How can I save more on 80C this year?" or<br/>"What is a liquid mutual fund?"</div>}
        {messages.map((m,i)=>(
          <div key={i} style={{margin:'8px 16px',display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
            <div style={{maxWidth:'80%',background:m.role==='user'?'var(--green)':'var(--bg2)',border:'1px solid '+(m.role==='user'?'var(--green)':'var(--border)'),borderRadius:m.role==='user'?'12px 12px 2px 12px':'12px 12px 12px 2px',padding:'10px 12px',color:m.role==='user'?'#000':'var(--text)',fontSize:13,lineHeight:1.5}}>
              {m.content}
            </div>
          </div>
        ))}
        {loading&&<div style={{margin:'8px 16px'}}><div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'12px 12px 12px 2px',padding:'10px 12px',display:'inline-block',fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>Thinking…</div></div>}
      </div>
      {/* Input */}
      <div style={{position:'fixed',bottom:'calc(var(--tab-h) + var(--safe-b))',left:'max(0px, 50% - 300px)',right:'max(0px, 50% - 300px)',background:'var(--bg)',borderTop:'1px solid var(--border)',padding:'10px 16px',display:'flex',gap:8,zIndex:90}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&sendMsg()} placeholder="Ask your finance AI..." style={{...iS,flex:1}} disabled={!apiKey.trim()||loading}/>
        <button onClick={sendMsg} disabled={!input.trim()||!apiKey.trim()||loading} style={{background:!input.trim()||!apiKey.trim()||loading?'var(--bg3)':'var(--green)',border:'none',borderRadius:8,color:!input.trim()||!apiKey.trim()||loading?'var(--text3)':'#000',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,padding:'0 16px',cursor:'pointer',flexShrink:0}}>Send</button>
      </div>
      {messages.length>0&&<div style={{margin:'8px 16px'}}><button onClick={()=>setMessages([])} style={{background:'none',border:'1px solid var(--border)',borderRadius:6,color:'var(--text3)',fontFamily:'var(--mono)',fontSize:11,padding:'5px 12px',cursor:'pointer'}}>Clear chat</button></div>}
    </div>)}

    {/* ── QUANT TAB ── */}

            {acc===pick.asset_name?<div style={{display:'flex',gap:8,marginTop:12}}><input type="number" step="any" autoFocus placeholder="Qty Bought" value={qty} onChange={e=>setQty(e.target.value)} style={{background:'var(--bg)',border:'1px solid var(--blue)',borderRadius:6,padding:'8px 12px',fontFamily:'var(--mono)',fontSize:12,outline:'none',flex:1,color:'var(--text)'}}/><button onClick={()=>confirm_(pick)} disabled={saving} style={{background:'var(--blue)',color:'#fff',border:'none',borderRadius:6,padding:'0 16px',fontFamily:'var(--mono)',fontSize:12,cursor:'pointer'}}>{saving?'...':'Confirm'}</button><button onClick={()=>setAcc(null)} style={{background:'none',border:'1px solid var(--border)',borderRadius:6,padding:'0 12px',fontFamily:'var(--mono)',fontSize:12,cursor:'pointer',color:'var(--text)'}}>✕</button></div>
            :<div style={{display:'flex',gap:8,marginTop:12}}><button onClick={()=>setAcc(pick.asset_name)} style={{flex:1,background:'var(--green)',color:'#000',border:'none',borderRadius:6,padding:'10px',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,cursor:'pointer'}}>Accept & Log</button><button onClick={()=>setPicks(picks.filter(p=>p.asset_name!==pick.asset_name))} style={{flex:1,background:'none',border:'1px solid var(--border2)',color:'var(--text2)',borderRadius:6,padding:'10px',fontFamily:'var(--mono)',fontSize:12,cursor:'pointer'}}>Reject</button></div>}
          </div>
        ))}

}
/* ── UdhariScreen — real ledger update + CA audit ── */
function UdhariScreen({udhari,onAdd,onDelete,allAccounts,allBanks,externalView,onViewChange}){
  const [view,setView]=useState('list');const [sel,setSel]=useState(null);
  const setViewBoth=v=>{setView(v);if(onViewChange)onViewChange(v);};
  useEffect(()=>{if(externalView&&externalView!==view){setView(externalView);if(onViewChange)onViewChange('list');}},[externalView]);
  const [form,setForm]=useState({person_name:'',amount:'',direction:'given',mode:'Cash',txn_date:new Date().toISOString().slice(0,10)});
  const [saving,setSaving]=useState(false);
  const todayStr=new Date().toISOString().slice(0,10);
  const persons={};
  udhari.forEach(u=>{if(!persons[u.person_name])persons[u.person_name]={given:0,received:0,entries:[]};if(u.direction==='given')persons[u.person_name].given+=u.amount;if(u.direction==='received')persons[u.person_name].received+=u.amount;persons[u.person_name].entries.push(u);});
  const personList=Object.entries(persons).map(([name,d])=>({name,outstanding:d.given-d.received,given:d.given,received:d.received,entries:d.entries})).sort((a,b)=>b.outstanding-a.outstanding);
  const totalOut=personList.reduce((s,p)=>s+Math.max(0,p.outstanding),0);
  const handleAdd=async()=>{if(!form.person_name.trim()||!form.amount||parseFloat(form.amount)<=0)return;setSaving(true);await onAdd({...form,amount:parseFloat(form.amount)});setForm({person_name:'',amount:'',direction:'given',mode:'Cash',txn_date:todayStr});setSaving(false);setView('list');};
  const iS={background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:13,outline:'none',width:'100%'};

  if(view==='person'&&sel){
    const p=persons[sel];const entries=(p?.entries||[]).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));const out=(p?.given||0)-(p?.received||0);
    return(<div className="fade-in" style={{paddingBottom:8}}>
      <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',borderBottom:'1px solid var(--border)'}}>
        <div onClick={()=>setView('list')} style={{cursor:'pointer',color:'var(--blue)',fontFamily:'var(--mono)',fontSize:12}}>← Back</div>
        <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:'var(--text)'}}>{sel}</div><div style={{fontSize:11,color:out>0?'var(--amber)':out<0?'var(--green)':'var(--text3)',fontFamily:'var(--mono)'}}>{out>0?'owes you '+fmtAmt(out):out<0?'you owe '+fmtAmt(Math.abs(out)):'settled ✓'}</div></div>
