/* ── INDEXEDDB WRAPPER (persistent outbox) ── */
const IDB_NAME = 'jbf_offline';
const IDB_VERSION = 1;
const STORE_OUTBOX = 'outbox';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => resolve(req.result);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_OUTBOX)) {
        db.createObjectStore(STORE_OUTBOX, { keyPath: 'id', autoIncrement: true });
      }
    };
  });
}

async function saveToOutbox(txn) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_OUTBOX, 'readwrite');
    const store = tx.objectStore(STORE_OUTBOX);
    const req = store.add({ ...txn, _queued_at: Date.now() });
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function getOutbox() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_OUTBOX, 'readonly');
    const store = tx.objectStore(STORE_OUTBOX);
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

async function clearOutboxItem(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_OUTBOX, 'readwrite');
    const store = tx.objectStore(STORE_OUTBOX);
    const req = store.delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

async function pushOutboxToSupabase(showToastFn) {
  const items = await getOutbox();
  if (items.length === 0) return { success: true, count: 0 };
  
  let pushed = 0;
  for (const item of items) {
    try {
      const payload = { ...item };
      delete payload.id;
      delete payload._queued_at;
      const { error } = await db.from('transactions').insert([payload]);
      if (!error) {
        await clearOutboxItem(item.id);
        pushed++;
      } else {
        console.error('[Outbox] Failed to push item:', item.id, error);
      }
    } catch (e) {
      console.error('[Outbox] Push error:', e);
    }
  }
  
  if (pushed > 0 && showToastFn) {
    showToastFn(`✓ Synced ${pushed} pending transaction${pushed > 1 ? 's' : ''}`);
  }
  
  return { success: true, count: pushed };
}

/* ── STREAK ── */
function getStreak(){
  const today=new Date().toISOString().slice(0,10);
  const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
  const last=localStorage.getItem('jbf_streak_date')||'';
  const cnt=parseInt(localStorage.getItem('jbf_streak_count')||'0');
  const next=last===today?cnt:last===yesterday?cnt+1:1;
  if(last!==today){localStorage.setItem('jbf_streak_date',today);localStorage.setItem('jbf_streak_count',String(next));}
  return next;
}

/* ── PIN LOCK SCREEN ── */
function PinLockScreen({onUnlock}){
  const [digits,setDigits]   = useState([]);
  const [shake,setShake]     = useState(false);
  const [setupMode,setSetupMode] = useState(!localStorage.getItem('jbf_pin_hash'));
  const [setupStep,setSetupStep] = useState(1);
  const [firstPin,setFirstPin]   = useState([]);
  const [msg,setMsg]             = useState('');

  const MAX=4;

  const hashPin = async pin => {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  };

  const addDigit = async d => {
    const next=[...digits,d];
    setDigits(next);
    if(next.length<MAX) return;
    const pin=next.join('');

    if(setupMode){
      if(setupStep===1){
        setFirstPin(next);
        setDigits([]);
        setSetupStep(2);
        setMsg('Confirm your PIN');
      } else {
        if(pin===firstPin.join('')){
          const h=await hashPin(pin);
          localStorage.setItem('jbf_pin_hash',h);
          setMsg('✓ PIN set!');
          setTimeout(()=>onUnlock(),400);
        } else {
          setMsg('❌ PINs did not match — try again');
          setShake(true);setTimeout(()=>setShake(false),500);
          setDigits([]);setSetupStep(1);setFirstPin([]);
        }
      }
    } else {
      const h=await hashPin(pin);
      if(h===localStorage.getItem('jbf_pin_hash')){
        onUnlock();
      } else {
        setMsg('❌ Wrong PIN');
        setShake(true);setTimeout(()=>setShake(false),500);
        setDigits([]);
      }
    }
  };

  const del=()=>setDigits(p=>p.slice(0,-1));

  const KEYS=[1,2,3,4,5,6,7,8,9,null,0,'⌫'];

  const title = setupMode
    ? (setupStep===1 ? 'Set a 4-digit PIN' : 'Confirm PIN')
    : 'Enter PIN';

  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100dvh',background:'var(--bg)',padding:24,userSelect:'none'}}>
      <div style={{textAlign:'center',marginBottom:28}}>
        <div style={{fontFamily:'var(--mono)',fontSize:26,fontWeight:700,color:'var(--green)',letterSpacing:'-1px'}}>JB Finance</div>
        <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginTop:3,letterSpacing:'0.12em',textTransform:'uppercase'}}>{title}</div>
      </div>

      <div style={{
        display:'flex',gap:16,marginBottom:24,
        animation:shake?'pinShake 0.4s ease':'none',
      }}>
        {Array.from({length:MAX}).map((_,i)=>(
          <div key={i} style={{
            width:14,height:14,borderRadius:'50%',
            background:i<digits.length?'var(--green)':'transparent',
            border:'2px solid',
            borderColor:i<digits.length?'var(--green)':'var(--border2)',
            transition:'all 0.15s',
          }}/>
        ))}
      </div>

      {msg&&<div style={{fontFamily:'var(--mono)',fontSize:11,color:msg.startsWith('✓')?'var(--green)':'var(--amber)',marginBottom:14,letterSpacing:'0.04em'}}>{msg}</div>}

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,72px)',gap:12}}>
        {KEYS.map((k,i)=>(
          k===null
            ? <div key={i}/>
            : <button key={i}
                onClick={()=>k==='⌫'?del():digits.length<MAX&&addDigit(k)}
                style={{
                  width:72,height:72,borderRadius:'50%',
                  background:k==='⌫'?'var(--bg2)':'var(--bg3)',
                  border:'1px solid var(--border)',
                  color:'var(--text)',
                  fontFamily:'var(--mono)',
                  fontSize:k==='⌫'?20:24,
                  fontWeight:600,
                  cursor:'pointer',
                  display:'flex',alignItems:'center',justifyContent:'center',
                  WebkitTapHighlightColor:'transparent',
                  transition:'background 0.1s',
                }}
              >{k}</button>
        ))}
      </div>

      {!setupMode&&<button onClick={()=>{
        if(confirm('Forgot PIN? This will remove the PIN lock. You will still need your Supabase password.')){
          localStorage.removeItem('jbf_pin_hash');
          setSetupMode(true);setSetupStep(1);setDigits([]);setMsg('');
        }
      }} style={{marginTop:28,background:'none',border:'none',color:'var(--text3)',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer',textDecoration:'underline'}}>Forgot PIN</button>}

      <style>{`@keyframes pinShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}`}</style>
    </div>
  );
}

/* ── LOGIN SCREEN ── */
function LoginScreen(){
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [loading,setLoading]=useState(false);
  const [msg,setMsg]=useState('');

  const handleLogin=async()=>{
    if(!email||!pass){setMsg('⚠ Email and password required');return;}
    setLoading(true);setMsg('');
    const{error}=await db.auth.signInWithPassword({email,password:pass});
    setLoading(false);
    if(error){setMsg('❌ '+error.message);}
  };

  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100dvh',background:'var(--bg)',padding:24}}>
      <div style={{textAlign:'center',marginBottom:32}}>
        <div style={{fontFamily:'var(--mono)',fontSize:26,fontWeight:700,color:'var(--green)',letterSpacing:'-1px'}}>JB Finance</div>
        <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginTop:3,letterSpacing:'0.12em',textTransform:'uppercase'}}>v2.1-PRO-SITE</div>
      </div>
      <div style={{width:'100%',maxWidth:360,display:'flex',flexDirection:'column',gap:12}}>
        <input type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} style={{padding:12,fontSize:14}}/>
        <input type="password" placeholder="Password" value={pass} onChange={e=>setPass(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleLogin()} style={{padding:12,fontSize:14}}/>
        <button onClick={handleLogin} disabled={loading} style={{background:'var(--green)',color:'#000',fontFamily:'var(--mono)',fontSize:14,fontWeight:600,border:'none',borderRadius:8,padding:14,cursor:'pointer'}}>{loading?'Logging in...':'Log In'}</button>
        {msg&&<div style={{fontFamily:'var(--mono)',fontSize:11,color:msg.startsWith('✓')?'var(--green)':'var(--red)',textAlign:'center',marginTop:8}}>{msg}</div>}

}

/* ── MAIN APP ── */
function App(){
  const [session,setSession]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [pinUnlocked,setPinUnlocked]=useState(false);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState('dash');
  const [txns,setTxns]=useState([]);
  const [opening,setOpening]=useState({});
  const [customAccounts,setCustomAccounts]=useState([]);
  const [customCategories,setCustomCategories]=useState([]);
  const [budgets,setBudgets]=useState([]);
  const [recurring,setRecurring]=useState([]);
  const [checklist,setChecklist]=useState([]);
  const [udhari,setUdhari]=useState([]);
  const [investments,setInvestments]=useState([]);
  const [customSites,setCustomSites]=useState([]);
  const [customTeam,setCustomTeam]=useState([]);
  const [customSiteCats,setCustomSiteCats]=useState([]);
  const [theme,setTheme]=useState(localStorage.getItem('jbf_theme')||'autumn');
  const [toast,setToast]=useState(null);
  const [menuOpen,setMenuOpen]=useState(false);
  const [quickAdd,setQuickAdd]=useState(false);
  const [addPrefill,setAddPrefill]=useState(null);
  const [globalSearch,setGlobalSearch]=useState('');
  const [txnFilter,setTxnFilter]=useState(null);
  const [streak,setStreak]=useState(0);
  const [syncStatus,setSyncStatus]=useState('synced');
  const [syncing,setSyncing]=useState(false);

  useEffect(()=>{
    const{data:listener}=db.auth.onAuthStateChange((event,sess)=>{
      setSession(sess);
      setAuthLoading(false);
      if(sess)setStreak(getStreak());
    });
    return()=>listener?.subscription?.unsubscribe();
  },[]);

  useEffect(()=>{
    const handler=()=>{
      loadData();
    };
    window.addEventListener('jbf-sync-complete',handler);
    return()=>window.removeEventListener('jbf-sync-complete',handler);
  },[]);

  useEffect(()=>{
    const handler=()=>{
      pushOutboxToSupabase(showToast);
    };
    window.addEventListener('online',handler);
    return()=>window.removeEventListener('online',handler);
  },[]);

  useEffect(()=>{
    const checkOutbox=async()=>{
      const items=await getOutbox();
      setSyncStatus(items.length>0?'pending':'synced');
    };
    checkOutbox();
    const interval=setInterval(checkOutbox,5000);
    return()=>clearInterval(interval);
  },[]);

  useEffect(()=>{
    const handler=()=>{
      const formData={};
      document.querySelectorAll('input,select,textarea').forEach(el=>{
        if(el.name)formData[el.name]=el.value;
      });
      if(Object.keys(formData).length>0){
        localStorage.setItem('jbf_form_backup',JSON.stringify(formData));
      }
    };
    window.addEventListener('pagehide',handler);
    return()=>window.removeEventListener('pagehide',handler);
  },[]);

  const showToast=msg=>{
    setToast(msg);
    setTimeout(()=>setToast(null),3000);
  };

  const loadData=useCallback(async()=>{
    if(!session)return;
    setSyncing(true);
    
    const cached=localStorage.getItem('jbf_cache');
    if(cached){
      try{
        const data=JSON.parse(cached);
        setTxns(data.txns||[]);
        setUdhari(data.udhari||[]);
        setInvestments(data.investments||[]);
        setRecurring(data.recurring||[]);
        setChecklist(data.checklist||[]);
        if(data.settings){
          const g=k=>data.settings.find(r=>r.key===k);
          if(g('opening_balances'))try{setOpening(JSON.parse(g('opening_balances').value));}catch(e){}
          if(g('custom_accounts'))try{setCustomAccounts(JSON.parse(g('custom_accounts').value));}catch(e){}
          if(g('custom_categories'))try{setCustomCategories(JSON.parse(g('custom_categories').value));}catch(e){}
          if(g('budgets'))try{setBudgets(JSON.parse(g('budgets').value));}catch(e){}
          if(g('custom_sites'))try{setCustomSites(JSON.parse(g('custom_sites').value));}catch(e){}
          if(g('custom_team'))try{setCustomTeam(JSON.parse(g('custom_team').value));}catch(e){}
          if(g('custom_site_cats'))try{setCustomSiteCats(JSON.parse(g('custom_site_cats').value));}catch(e){}
        }
      }catch(e){console.error('Cache parse error:',e);}
    }

    try{
      await pushOutboxToSupabase(showToast);
      
      const{data:t}=await db.from('transactions').select('*').order('created_at',{ascending:false});
      setTxns(t||[]);
      const{data:u}=await db.from('udhari').select('*').order('created_at',{ascending:false});
      setUdhari(u||[]);
      const{data:inv}=await db.from('investments').select('*').order('buy_date',{ascending:false});
      setInvestments(inv||[]);
      const{data:rec}=await db.from('recurring').select('*').order('due_day',{ascending:true});
      setRecurring(rec||[]);
      const now=new Date();
      const{data:cl}=await db.from('checklist').select('*').eq('month',now.getMonth()+1).eq('year',now.getFullYear());
      setChecklist(cl||[]);
      const{data:s}=await db.from('settings').select('*');
      
      const cacheData={txns:t,udhari:u,investments:inv,recurring:rec,checklist:cl,settings:s};
      localStorage.setItem('jbf_cache',JSON.stringify(cacheData));

      if(s){
        const g=k=>s.find(r=>r.key===k);
        if(g('opening_balances'))try{setOpening(JSON.parse(g('opening_balances').value));}catch(e){}
        if(g('custom_accounts'))try{setCustomAccounts(JSON.parse(g('custom_accounts').value));}catch(e){}
        if(g('custom_categories'))try{setCustomCategories(JSON.parse(g('custom_categories').value));}catch(e){}
        if(g('budgets'))try{setBudgets(JSON.parse(g('budgets').value));}catch(e){}
        if(g('custom_sites'))try{setCustomSites(JSON.parse(g('custom_sites').value));}catch(e){}
        if(g('custom_team'))try{setCustomTeam(JSON.parse(g('custom_team').value));}catch(e){}
        if(g('custom_site_cats'))try{setCustomSiteCats(JSON.parse(g('custom_site_cats').value));}catch(e){}
        if(g('theme')){setTheme(g('theme').value);document.documentElement.setAttribute('data-theme',g('theme').value);localStorage.setItem('jbf_theme',g('theme').value);}
      }
    }catch(e){
      console.error('loadData error:',e);
      showToast('⚠ Load failed: '+e.message);
    }
    
    setLoading(false);
    setSyncing(false);
  },[session]);

  useEffect(()=>{loadData();},[loadData]);

  const activeCustomBanks = customAccounts.filter(a=>a.type==='bank'&&!a.archived).map(a=>a.name);
  const activeCustomCC    = customAccounts.filter(a=>a.type==='cc'&&!a.archived).map(a=>a.name);
  const allBanks    = [...SEED_BANKS,...activeCustomBanks];
  const allCC       = [...SEED_CC,...activeCustomCC];
  const allAccounts = [...allBanks,...allCC];

  const allBanksH   = [...SEED_BANKS,...customAccounts.filter(a=>a.type==='bank').map(a=>a.name)];
  const allCCH      = [...SEED_CC,...customAccounts.filter(a=>a.type==='cc').map(a=>a.name)];
  const allAccountsH= [...allBanksH,...allCCH];

  const activeCats  = [...CATEGORIES,...customCategories.filter(c=>!c.archived).map(c=>({id:c.name,emoji:c.emoji||'•',color:'none',it:c.it||'',parent:c.parent||null}))];
  const allCatsH    = [...CATEGORIES,...customCategories.map(c=>({id:c.name,emoji:c.emoji||'•',color:'none',it:c.it||'',parent:c.parent||null}))];

  const balances = computeBalances(opening,txns,allBanksH,allCCH);
  const liquid   = allBanks.filter(a=>a!=='Site Cash').reduce((s,a)=>s+(balances[a]||0),0);
  const totalCC  = allCC.reduce((s,a)=>s+Math.max(0,-(balances[a]||0)),0);
  const provisionStates = computeProvisions(recurring,txns);
  const totalNetBlocked = provisionStates.reduce((s,p)=>s+p.C,0);
  const trueSpendable = Math.max(0,liquid-totalCC-totalNetBlocked);
  const udhariOut = udhari.filter(u=>u.direction==='given').reduce((s,u)=>s+u.amount,0)-udhari.filter(u=>u.direction==='received').reduce((s,u)=>s+u.amount,0);

  const addTxn = async txn => {
    setSyncStatus('saving');
    const payload={...txn,user_id:session?.user?.id||null};
    if(!('party_name' in payload))payload.party_name=null;
    if(!('tower' in payload))payload.tower=null;
    
    try{
      const{error}=await db.from('transactions').insert([payload]);
      if(!error){
        showToast('✓ '+fmtAmt(txn.amount)+' logged');
        loadData();
        setSyncStatus('synced');
      }else{
        console.error('addTxn error:',error);
        showToast('⚠ Network issue - saved offline');
        await saveToOutbox(payload);
        setSyncStatus('pending');
        if('serviceWorker' in navigator && 'sync' in ServiceWorkerRegistration.prototype){
          const reg=await navigator.serviceWorker.ready;
          await reg.sync.register('sync-txns');
        }
      }
    }catch(e){
      console.error('addTxn network error:',e);
      showToast('⚠ Offline - saved locally');
      await saveToOutbox(payload);
      setSyncStatus('pending');
      if('serviceWorker' in navigator && 'sync' in ServiceWorkerRegistration.prototype){
        const reg=await navigator.serviceWorker.ready;
        await reg.sync.register('sync-txns');
      }
    }
  };

  const deleteTxn = async id => {
    const{error}=await db.from('transactions').update({status:'voided'}).eq('id',id);
    if(!error){showToast('↩ Voided');loadData();}
  };

  const voidAndCorrect = async (orig,corr) => {
    await db.from('transactions').update({status:'voided'}).eq('id',orig.id);
    const c={type:orig.type,amount:corr.amount,category:corr.category,from_account:corr.from_account||orig.from_account,to_account:corr.to_account||orig.to_account,particulars:corr.particulars,tower:orig.tower,it_section:orig.it_section,status:'complete',source:'app-correction',correction_of:orig.id,created_at:corr.created_at||orig.created_at};
    const{error}=await db.from('transactions').insert([c]);
    if(!error){showToast('✓ Corrected');loadData();}
  };

  const saveOpening = async ob=>{await db.from('settings').upsert({key:'opening_balances',value:JSON.stringify(ob)});setOpening(ob);showToast('✓ Balances saved');};
  const saveCustomAccounts = async list=>{await db.from('settings').upsert({key:'custom_accounts',value:JSON.stringify(list)});setCustomAccounts(list);showToast('✓ Accounts updated');};
  const saveBudgets = async bg=>{await db.from('settings').upsert({key:'budgets',value:JSON.stringify(bg)});setBudgets(bg);showToast('✓ Budgets saved');};
  const saveCustomSites = async list=>{await db.from('settings').upsert({key:'custom_sites',value:JSON.stringify(list)});setCustomSites(list);showToast('✓ Sites updated');};
  const saveCustomTeam = async list=>{await db.from('settings').upsert({key:'custom_team',value:JSON.stringify(list)});setCustomTeam(list);showToast('✓ Team updated');};
  const saveCustomSiteCats = async list=>{await db.from('settings').upsert({key:'custom_site_cats',value:JSON.stringify(list)});setCustomSiteCats(list);showToast('✓ Site categories updated');};
  const saveCustomCategories = async list=>{await db.from('settings').upsert({key:'custom_categories',value:JSON.stringify(list)});setCustomCategories(list);showToast('✓ Categories updated');};
  const addCustomCategory = async catObj=>{
    const updated=[...customCategories.filter(c=>c.name!==catObj.name&&!c.archived),{name:catObj.name,emoji:catObj.emoji||'•',it:catObj.it||'',parent:catObj.parent||null}];
    await saveCustomCategories(updated);
  };
  const saveTheme = t=>{
    setTheme(t);
    document.documentElement.setAttribute('data-theme',t);
    localStorage.setItem('jbf_theme',t);
    db.from('settings').upsert({key:'theme',value:t}).catch(()=>{});
  };
  const addRecurring = async entry=>{const{error}=await db.from('recurring').insert([entry]);if(!error){showToast('✓ Saved');loadData();}else showToast('⚠ '+(error.message||'Error'));};
  const deleteRecurring = async id=>{await db.from('recurring').delete().eq('id',id);showToast('↩ Deleted');loadData();};
  const updateRecurring = async (id,fields)=>{const{error}=await db.from('recurring').update(fields).eq('id',id);if(!error){showToast('✓ Updated');loadData();}else showToast('⚠ '+(error.message||'Error'));};

  const tickChecklist = async (rec,cl,amtPaid,fromAccount)=>{
    if(!amtPaid||amtPaid<=0)return;
    const now=new Date().toISOString();const nowD=new Date();
    const txnType=rec.is_cc_payment?'Bank→CC':rec.is_provision?'Bank→Bank':'Expense';
    const txn={type:txnType,amount:amtPaid,category:rec.category||'Household',from_account:fromAccount,to_account:txnType==='Bank→CC'?rec.cc_name||null:txnType==='Bank→Bank'?rec.provision_account||null:null,particulars:rec.name,status:'complete',source:'checklist',created_at:now};
    try{await db.from('transactions').insert([txn]);}catch(e){}
    if(cl?.id){await db.from('checklist').update({status:'paid',amount_paid:amtPaid,paid_at:now}).eq('id',cl.id);}
    else{await db.from('checklist').insert([{recurring_id:rec.id,month:nowD.getMonth()+1,year:nowD.getFullYear(),status:'paid',amount_paid:amtPaid,paid_at:now}]);}
    loadData();showToast('✓ '+rec.name+' logged');
  };

  const handleSettleUdhari = async entry=>{
    const{direction,person_name,amount,mode,txn_date}=entry;
    const ts=(txn_date||new Date().toISOString().slice(0,10))+'T06:30:00.000Z';
    const{error}=await db.from('udhari').insert([{...entry,created_at:ts}]);
    if(error){showToast('⚠ '+error.message);return;}

/* ── VIRTUAL PROVISION TYPES ── */
const PROVISION_VIRTUAL_TYPES=['Provision_Accrue','Provision_Withdraw','Provision_Repay','Provision_Flush'];

/* ── computeBalances ── */
function computeBalances(opening,txns,allBanks,allCC){
  const bal={};
  Object.entries(opening||{}).forEach(([acc,val])=>{
    bal[acc]=(typeof val==='object'&&val!==null)?(val.amount||0):(val||0);
  });
  txns.filter(t=>t.status!=='voided').forEach(t=>{
    const txnDate=(t.created_at||'').slice(0,10);
    const amt=parseFloat(t.amount)||0,from=t.from_account,to=t.to_account,type=t.type;
    if(PROVISION_VIRTUAL_TYPES.includes(type))return;
    const after=acc=>{
      const val=opening[acc];
      if(!val||typeof val!=='object'||!val.opening_date)return true;
      return txnDate>=val.opening_date;
    };
    if(type==='Expense'&&from){if(after(from))bal[from]=(bal[from]||0)-amt;}
    if(type==='Income'&&to){if(after(to))bal[to]=(bal[to]||0)+amt;}
    if(['Bank→CC','Bank→Bank','Cash→Bank','CC→Bank','Bank→Cash'].includes(type)){
      if(from&&after(from))bal[from]=(bal[from]||0)-amt;
      if(to&&after(to))bal[to]=(bal[to]||0)+amt;
    }
  });
  return bal;
}

/* ── computeProvisions ── */
function computeProvisions(recurring,txns){
  const provs=recurring.filter(r=>r.is_provision&&r.active!==false);
  return provs.map(p=>{
    const virtualTxns=txns.filter(t=>t.category===p.name&&t.status==='complete'&&PROVISION_VIRTUAL_TYPES.includes(t.type));
    const accrued=virtualTxns.filter(t=>t.type==='Provision_Accrue').reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
    const withdrawn=virtualTxns.filter(t=>t.type==='Provision_Withdraw').reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
    const C=Math.max(0,accrued-withdrawn);
    const G=parseFloat(p.target_amount)||0;
    const pct=G>0?Math.min(100,(C/G)*100):0;
    return{name:p.name,C,G,pct,id:p.id,account:p.account,provision_account:p.provision_account,due_day:p.due_day};
  });
}

          </div>
          <div><p className="sec-label" style={{padding:'0 0 6px'}}>To Account</p>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {allBanks.map(a=><span key={a} style={cs(to===a)} onClick={()=>setTo(a)}>{a}</span>)}
            </div>
          </div>
        </>)}

        <input type="number" inputMode="decimal" placeholder="Amount (₹)" value={amt} onChange={e=>setAmt(e.target.value)} style={{fontSize:20,padding:'12px 14px',fontWeight:600}}/>
        <input type="text" placeholder="Description (optional)" value={desc} onChange={e=>setDesc(e.target.value)}/>
        <input type="date" value={date} max={today} onChange={e=>setDate(e.target.value)} style={{color:date!==today?'var(--amber)':'var(--text)',borderColor:date!==today?'var(--amber)':'var(--border2)'}}/>
        {date!==today&&<span style={{fontSize:10,color:'var(--amber)',fontFamily:'var(--mono)'}}>⚠ Backdated entry</span>}
        <SaveBtn/>

        {showCatForm&&(
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
            <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:12,padding:16,maxWidth:400,width:'100%'}}>
              <h3 style={{fontFamily:'var(--mono)',fontSize:12,marginBottom:12,color:'var(--text2)'}}>ADD CATEGORY</h3>
              <input type="text" placeholder="Name" value={newCatName} onChange={e=>setNewCatName(e.target.value)} style={{marginBottom:8}}/>
              <input type="text" placeholder="Emoji (optional)" value={newCatEmoji} onChange={e=>setNewCatEmoji(e.target.value)} style={{marginBottom:12}}/>
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>{
                  if(!newCatName){showToast('⚠ Name required');return;}
                  onAddCategory({name:newCatName,emoji:newCatEmoji||'•'});
                  setCat(newCatName);
                  setShowCatForm(false);
                  setNewCatName('');
                  setNewCatEmoji('');
                }} style={{flex:1,background:'var(--green)',color:'#000',border:'none',borderRadius:8,padding:'10px',fontFamily:'var(--mono)',fontSize:12,fontWeight:600,cursor:'pointer'}}>Save</button>
                <button onClick={()=>{setShowCatForm(false);setNewCatName('');setNewCatEmoji('');}} style={{flex:1,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:8,padding:'10px',fontFamily:'var(--mono)',fontSize:12,cursor:'pointer'}}>Cancel</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  const SITE_TYPES=[
    {key:'Expense',label:'Expense'},{key:'Income',label:'Income'},{key:'Site Transfer',label:'Transfer'},
    {key:'Bank-Bank',label:'Bank→Bank'},{key:'Cash-Bank',label:'Cash→Bank'},{key:'Bank-Cash',label:'Bank→Cash'},
    {key:'CC-Bank',label:'CC→Bank'}
  ];

  const SITE_CATS=customSiteCats&&customSiteCats.length>0?customSiteCats:['Material','Labour','Transport','Misc'];
  const allSiteMembers=(customTeam&&customTeam.length>0)?customTeam:['Me'];

  const selectSiteType=key=>{
    setSiteType(key);
    if(key==='Expense'){setSitePayFrom('Cash');}
    else if(key==='Income'){setDepositTo('Site Cash');}
    else if(key==='Site Transfer'){setTransferUser(allSiteMembers[0]||'');}
    else if(key==='Bank-Bank'){setSitePayFrom(allBanks.find(a=>a!=='Cash')||allBanks[0]);setSiteTo(allBanks.find(a=>a!=='Cash')||allBanks[0]);}
    else if(key==='Cash-Bank'){setSitePayFrom('Cash');setSiteTo(allBanks.find(a=>a!=='Cash')||allBanks[0]);}
    else if(key==='Bank-Cash'){setSitePayFrom(allBanks.find(a=>a!=='Cash')||allBanks[0]);setSiteTo('Cash');}
    else if(key==='CC-Bank'){setSitePayFrom(allCC[0]||'');setSiteTo(allBanks.find(a=>a!=='Cash')||allBanks[0]);}
  };

  const siteFromList=()=>{
    if(['Bank-Bank','Bank-Cash'].includes(siteType))return allBanks.filter(a=>a!=='Cash');
    if(siteType==='Cash-Bank')return['Cash'];
    if(siteType==='CC-Bank')return allCC;
    return['Cash',...allBanks.filter(a=>a!=='Cash'),...allCC];
  };

  const siteToList=()=>{
    if(['Bank-Bank','Cash-Bank','CC-Bank'].includes(siteType))return allBanks.filter(a=>a!=='Cash');
    if(siteType==='Bank-Cash')return['Cash'];
    return['Site Cash',...allBanks.filter(a=>a!=='Cash')];
  };

  const SaveBtn=()=>(
    <>
      {balanceError&&<div className="balance-warning">{balanceError}</div>}
      <button className="save-btn" onClick={handleSave} disabled={!amt||parseFloat(amt)<=0||!!balanceError}>💾 Save</button>
    </>
  );

  return(
    <div className="fade-in" style={{padding:'12px 16px',paddingBottom:'calc(var(--tab-h) + var(--safe-b) + 24px)',display:'flex',flexDirection:'column',gap:12,maxWidth:'600px',margin:'0 auto'}}>
      <div style={{display:'flex',gap:6}}>
        <span style={cs(false)} onClick={()=>setDomain('Personal')}>Personal</span>
        <span style={cs(true)}>Site</span>
      </div>

      <div><p className="sec-label" style={{padding:'0 0 6px'}}>Site</p>
        {(customSites&&customSites.length>0)
          ?<div style={{display:'flex',flexWrap:'wrap',gap:6}}>{customSites.map(s=><span key={s} style={cs(siteName===s)} onClick={()=>setSiteName(s)}>{s}</span>)}</div>
          :<span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>No sites — add in Setup</span>}
      </div>

      <div><p className="sec-label" style={{padding:'0 0 6px'}}>Type</p>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {SITE_TYPES.map(t=><span key={t.key} style={cs(siteType===t.key)} onClick={()=>selectSiteType(t.key)}>{t.label}</span>)}
        </div>
      </div>

      {siteType==='Expense'&&(<>
        <div><p className="sec-label" style={{padding:'0 0 6px'}}>Category</p>
          <select value={siteCat} onChange={e=>setSiteCat(e.target.value)}>
            {SITE_CATS.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        <div><p className="sec-label" style={{padding:'0 0 6px'}}>To Member</p>
          <select value={siteMember} onChange={e=>setSiteMember(e.target.value)} style={{borderColor:'var(--amber)',color:'var(--amber)'}}>
            {allSiteMembers.map(m=><option key={m}>{m}</option>)}
          </select>
        </div>
      </>)}

      {siteType==='Income'&&(<>
        <div><p className="sec-label" style={{padding:'0 0 6px'}}>From Member</p>
          <select value={siteMember} onChange={e=>setSiteMember(e.target.value)} style={{borderColor:'var(--green)',color:'var(--green)'}}>
            {allSiteMembers.map(m=><option key={m}>{m}</option>)}
          </select>
        </div>
        <div><p className="sec-label" style={{padding:'0 0 6px'}}>Deposit To</p>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {siteToList().map(a=><span key={a} style={cs(depositTo===a)} onClick={()=>setDepositTo(a)}>{a}</span>)}
          </div>
        </div>
      </>)}

      {!['Expense','Income','Site Transfer'].includes(siteType)&&(<>
        <div><p className="sec-label" style={{padding:'0 0 6px'}}>From Account</p>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {siteFromList().map(a=><span key={a} style={cs(sitePayFrom===a)} onClick={()=>setSitePayFrom(a)}>{a}</span>)}
          </div>
        </div>
        <div><p className="sec-label" style={{padding:'0 0 6px'}}>To Account</p>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {siteToList().map(a=><span key={a} style={cs(siteTo===a)} onClick={()=>setSiteTo(a)}>{a}</span>)}
          </div>
        </div>
      </>)}

      {siteType==='Site Transfer'&&(<>
        <div><p className="sec-label" style={{padding:'0 0 6px'}}>Given To</p>
          {allSiteMembers.length>0
            ?<select value={transferUser} onChange={e=>setTransferUser(e.target.value)}>{allSiteMembers.map(m=><option key={m}>{m}</option>)}</select>
            :<span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>No team — add in Setup</span>}
        </div>
      </>)}

      <input type="number" inputMode="decimal" placeholder="Amount (₹)" value={amt} onChange={e=>setAmt(e.target.value)} style={{fontSize:20,padding:'12px 14px',fontWeight:600}}/>
      <input type="text" placeholder="Description (optional)" value={desc} onChange={e=>setDesc(e.target.value)}/>
      <input type="date" value={date} max={today} onChange={e=>setDate(e.target.value)} style={{color:date!==today?'var(--amber)':'var(--text)',borderColor:date!==today?'var(--amber)':'var(--border2)'}}/>
      {date!==today&&<span style={{fontSize:10,color:'var(--amber)',fontFamily:'var(--mono)'}}>⚠ Backdated entry</span>}
      <SaveBtn/>
    </div>
  );
}

/* ── PLACEHOLDER COMPONENTS (remaining screens will be in Session 2 & 3) ── */
function TxnsScreen({txns}){return <div className="empty">Transaction Log — Full implementation in Session 2</div>;}
function DashScreen({balances,onRefresh}){
  const pullRef=useRef(null);
  const [pulling,setPulling]=useState(false);
  const [startY,setStartY]=useState(0);

  const handleTouchStart=e=>{
    if(pullRef.current&&pullRef.current.scrollTop===0){
      setStartY(e.touches[0].clientY);
    }
  };

  const handleTouchMove=e=>{
    if(startY>0){
      const currentY=e.touches[0].clientY;
      const diff=currentY-startY;
      if(diff>60){
        setPulling(true);
      }
    }
  };

  const handleTouchEnd=()=>{
    if(pulling){
      onRefresh();
      setPulling(false);
    }
    setStartY(0);
  };

  return(
    <div ref={pullRef} onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd} style={{height:'100%',overflow:'auto',position:'relative'}}>
      <div className={`pull-refresh-indicator ${pulling?'pulling':''}`}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        <span style={{marginLeft:8}}>Release to refresh</span>
      </div>
      <div style={{padding:16}}>
        <div className="hero-box">
          <div className="hero-label">Dashboard</div>
          <div className="hero-amount">{Object.keys(balances).length} Accounts</div>
          <div className="hero-sub">Full dashboard in Session 2</div>
        </div>
      </div>
    </div>
  );
}
function InvestmentsScreen(){return <div className="empty">Investments — Session 3</div>;}
function ProvisionLedger(){return <div className="empty">Provision Ledger — Session 2</div>;}
function ChecklistScreen(){return <div className="empty">Checklist — Session 2</div>;}
function UdhariScreen(){return <div className="empty">Udhari — Session 2</div>;}
function StatementScreen(){return <div className="empty">Statement — Session 3</div>;}
function SiteLedgerScreen(){return <div className="empty">Site Ledger — Session 3</div>;}
function CCBillScreen(){return <div className="empty">CC Bill — Session 3</div>;}
function SettingsScreen({theme,onSaveTheme}){
  const themes=[
    {id:'autumn',name:'Deep Autumn',bg:'#faf6f0'},
    {id:'midnight',name:'Exec Midnight',bg:'#0a0d12'},
    {id:'nordic',name:'Nordic Light',bg:'#ffffff'},
    {id:'terminal',name:'Terminal',bg:'#070a07'}
  ];
  
  return(
    <div style={{padding:16,maxWidth:600,margin:'0 auto'}}>
      <div className="card" style={{marginBottom:12}}>
        <div className="sec-label">THEME</div>
        <div style={{display:'flex',gap:12,padding:'0 16px 16px',flexWrap:'wrap'}}>
          {themes.map(t=>(
            <div key={t.id} onClick={()=>onSaveTheme(t.id)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6,cursor:'pointer'}}>
              <div className={`swatch ${theme===t.id?'active':''}`} style={{background:t.bg,border:theme===t.id?'2px solid var(--green)':'2px solid var(--border)'}}/>
              <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)'}}>{t.name}</span>
            </div>
          ))}
        </div>
      </div>
      <div style={{padding:16,textAlign:'center',fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)'}}>
        JB Finance v2.1-PRO-SITE<br/>Session 1 Complete
      </div>
    </div>
  );
}
function AiCommandScreen(){return <div className="empty">AI Command — Session 3</div>;}
function CashflowScreen(){return <div className="empty">Cashflow — Session 3</div>;}
function PdfImportScreen(){return <div className="empty">PDF Import — Session 3</div>;}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
