<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    /* Works on both GitHub Pages and localhost */
    const swPath = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
      ? '/sw.js'
      : '/jbfinance-/sw.js';
    const swScope = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
      ? '/'
      : '/jbfinance-/';
    navigator.serviceWorker.register(swPath, { scope: swScope })
      .then(reg => {
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              window.dispatchEvent(new CustomEvent('jbf-sw-update'));
            }
          });
        });
      })
      .catch(() => {});
  });
}
</script>

/* ═══════════════════════════════════════════════════════════════════
   TALLY DOUBLE-ENTRY ENGINE  —  JB Finance
   ───────────────────────────────────────────────────────────────────

  if (LEDGER_MASTER[name]) return LEDGER_MASTER[name];
  /* Per-site sub-ledger pattern: "Site Cash:D5", "Site Cash:D6" */
  if (name && name.startsWith('Site Cash:')) return { group:'Loans & Advances (Asset)', nature:'asset' };

                           : { group:'Bank Accounts', nature:'asset' };
  }
  if (allCC && allCC.includes(name)) return { group:'Credit Card', nature:'liability' };
  return { group:'Indirect Expenses', nature:'expense' }; // safe fallback
}

/* ── tallyMiddleware: resolve dr_ledger + cr_ledger from UI payload ──────────
   Tally Double-Entry Rules:
     Expense  : Dr Expense Ledger    Cr Bank/CC (source of payment)
     Income   : Dr Bank/Account      Cr Income Ledger
     Bank→Bank: Dr To-Account        Cr From-Account
     Bank→CC  : Dr CC Ledger         Cr Bank (reduces CC liability = debit CC)
     Bank→Cash: Dr Cash              Cr Bank
     Cash→Bank: Dr Bank              Cr Cash
     CC→Bank  : Dr Bank              Cr CC (CC pays back → credit bank, debit CC)
     Site Transfer : Dr Site Cash (asset — site owes you) Cr Personal Bank/CC
     Udhari (given)   : Dr Udhari Debtor A/c   Cr Bank/Cash
     Udhari (received): Dr Bank/Cash            Cr Udhari Debtor A/c
     Provision_Accrue : Dr Provision Fund A/c   Cr Bank (virtual envelope funded)
     Provision_Flush  : Dr Expense Ledger       Cr Provision Fund A/c (actual spend)
     Provision_Withdraw:Dr Expense Ledger       Cr Provision Fund A/c (temp withdrawal)
     Provision_Repay  : Dr Provision Fund A/c   Cr Bank (replenishing envelope)
──────────────────────────────────────────────────────────────────────────────── */
function tallyMiddleware(payload, allBanks, allCC) {
  const { type, category, from_account, to_account, domain, site_name, tower } = payload;

  /* site sub-ledger name e.g. "Site Cash:D5" ──
     When site_name is known, use per-site ledger for granular tracking.
     Falls back to "Site Cash" for backward compatibility. */
  const siteLedger = (site_name && site_name.trim())
    ? ('Site Cash:' + site_name.trim())
    : 'Site Cash';

  switch (type) {

    case 'Expense':
    case 'UA Expense':
      return {
        dr_ledger: category || 'Indirect Expenses',  // Expense A/c Dr
        cr_ledger: from_account || 'Cash',            // Bank/CC Cr
      };

    case 'Income':
    case 'UA Received':
      return {
        dr_ledger: to_account || 'Cash',              // Bank/Cash A/c Dr
        cr_ledger: category || 'Other Income',        // Income A/c Cr
      };

    case 'Bank→Bank':
    case 'Bank→Cash':
    case 'Cash→Bank':
      return {
        dr_ledger: to_account,    // Receiving account Dr
        cr_ledger: from_account,  // Sending account Cr
      };

    case 'Bank→CC':
      /* Paying CC bill: CC liability reduces (Dr CC), Bank reduces (Cr Bank) */
      return {
        dr_ledger: to_account,    // CC A/c Dr (liability ↓)
        cr_ledger: from_account,  // Bank A/c Cr
      };

    case 'CC→Bank':
      /* CC refund / cashback to bank */
      return {
        dr_ledger: to_account,    // Bank A/c Dr
        cr_ledger: from_account,  // CC A/c Cr
      };

    case 'Site Transfer': {
      const from = from_account || '';
      const to   = to_account   || '';

      /* Use canonical direction field if present (new entries always have it) */
      if (payload.direction === 'given') {
        return {
          dr_ledger: siteLedger,   // site owes you more
          cr_ledger: from || 'Cash',
        };
      }
      if (payload.direction === 'received') {
        return {
          dr_ledger: to || 'Cash',  // your account got money
          cr_ledger: siteLedger,    // site owes you less
        };
      }

      /* Legacy rows without direction field — infer from accounts */
      const fromIsPersonalBank = from && from !== 'Site Cash' && allBanks && allBanks.includes(from);
      const fromIsCC            = from && allCC && allCC.includes(from);
      const fromIsCash          = from === 'Cash';
      const toIsPersonalBank    = to   && to !== 'Site Cash' && allBanks && allBanks.includes(to);

      if (fromIsPersonalBank || fromIsCC || fromIsCash) {
        return { dr_ledger: siteLedger, cr_ledger: from };
      } else if (toIsPersonalBank || to === 'Cash' || to === 'Site Cash') {
        return { dr_ledger: to || 'Cash', cr_ledger: siteLedger };
      } else {
        return { dr_ledger: siteLedger, cr_ledger: from || 'Cash' };
      }
    }

    case 'Udhari': {
      /* direction encoded in category field:
         category='given'    → Dr Udhari Debtor A/c, Cr Bank (you lent money)
         category='received' → Dr Bank, Cr Udhari Debtor A/c (money returned) */
      const isGiven = (category || '').toLowerCase() === 'given' ||
                      from_account;  // if from_account set, it's an outflow
      return isGiven
        ? { dr_ledger: 'UDHARI', cr_ledger: from_account || 'Cash' }
        : { dr_ledger: to_account || 'Cash', cr_ledger: 'UDHARI' };
    }

    case 'Provision_Accrue':
      /* Virtual: funding the envelope — Dr Provision Fund, Cr Bank */
      return {
        dr_ledger: 'Provision Fund — ' + (category || 'General'),
        cr_ledger: from_account || 'Cash',
      };

    case 'Provision_Flush':
      /* Actual spend: Dr Expense Ledger, Cr Provision Fund (envelope consumed) */
      return {
        dr_ledger: category || 'Indirect Expenses',
        cr_ledger: 'Provision Fund — ' + (category || 'General'),
      };

    case 'Provision_Withdraw':
      /* Temporary borrow from envelope: Dr Expense, Cr Provision Fund */
      return {
        dr_ledger: category || 'Indirect Expenses',
        cr_ledger: 'Provision Fund — ' + (category || 'General'),
      };

    case 'Provision_Repay':
      /* Replenish envelope: Dr Provision Fund, Cr Bank */
      return {
        dr_ledger: 'Provision Fund — ' + (category || 'General'),
        cr_ledger: from_account || 'Cash',
      };

    default:
      /* Generic fallback: treat as expense */
      return {
        dr_ledger: category || from_account || 'Suspense Account',
        cr_ledger: from_account || to_account || 'Cash',
      };
  }
}

/* ── PIN LOCK SCREEN ── */
function PinLockScreen({onUnlock}){
  const [digits,setDigits]   = useState([]);
  const [shake,setShake]     = useState(false);
  const [setupMode,setSetupMode] = useState(!localStorage.getItem('jbf_pin_hash'));
  const [setupStep,setSetupStep] = useState(1); // 1=enter new, 2=confirm
  const [firstPin,setFirstPin]   = useState([]);
  const [msg,setMsg]             = useState('');

  const MAX=4;

  const hashPin = async pin => {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  };

  const addDigit = async d => {
    const next=[...digits,d];
    setDigits(next);
    if(next.length<MAX) return;
    const pin=next.join('');

    if(setupMode){
      if(setupStep===1){
        setFirstPin(next);
        setDigits([]);
        setSetupStep(2);
        setMsg('Confirm your PIN');
      } else {
        if(pin===firstPin.join('')){
          const h=await hashPin(pin);
          localStorage.setItem('jbf_pin_hash',h);
          setMsg('✓ PIN set!');
          setTimeout(()=>onUnlock(),400);
        } else {
          setMsg('❌ PINs did not match — try again');
          setShake(true);setTimeout(()=>setShake(false),500);
          setDigits([]);setSetupStep(1);setFirstPin([]);
        }
      }
    } else {
      const h=await hashPin(pin);
      if(h===localStorage.getItem('jbf_pin_hash')){
        onUnlock();
      } else {
        setMsg('❌ Wrong PIN');
        setShake(true);setTimeout(()=>setShake(false),500);
        setDigits([]);
      }
    }
  };

  const del=()=>setDigits(p=>p.slice(0,-1));

  const KEYS=[1,2,3,4,5,6,7,8,9,null,0,'⌫'];

  const title = setupMode
    ? (setupStep===1 ? 'Set a 4-digit PIN' : 'Confirm PIN')
    : 'Enter PIN';

  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100dvh',background:'var(--bg)',padding:24,userSelect:'none'}}>
      <div style={{textAlign:'center',marginBottom:28}}>
        <div style={{fontFamily:'var(--mono)',fontSize:26,fontWeight:700,color:'var(--green)',letterSpacing:'-1px'}}>JB Finance</div>
        <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',marginTop:3,letterSpacing:'0.12em',textTransform:'uppercase'}}>{title}</div>
      </div>

            <div style={{
        display:'flex',gap:16,marginBottom:24,
        animation:shake?'pinShake 0.4s ease':'none',
      }}>
        {Array.from({length:MAX}).map((_,i)=>(
          <div key={i} style={{
            width:14,height:14,borderRadius:'50%',
            background:i<digits.length?'var(--green)':'transparent',
            border:'2px solid',
            borderColor:i<digits.length?'var(--green)':'var(--border2)',
            transition:'all 0.15s',
          }}/>
        ))}
      </div>

      {msg&&<div style={{fontFamily:'var(--mono)',fontSize:11,color:msg.startsWith('✓')?'var(--green)':'var(--amber)',marginBottom:14,letterSpacing:'0.04em'}}>{msg}</div>}

            <div style={{display:'grid',gridTemplateColumns:'repeat(3,72px)',gap:12}}>
        {KEYS.map((k,i)=>(
          k===null
            ? <div key={i}/>
            : <button key={i}
                onClick={()=>k==='⌫'?del():digits.length<MAX&&addDigit(k)}
                style={{
                  width:72,height:72,borderRadius:'50%',
                  background:k==='⌫'?'var(--bg2)':'var(--bg3)',
                  border:'1px solid var(--border)',
                  color:'var(--text)',
                  fontFamily:'var(--mono)',
                  fontSize:k==='⌫'?20:24,
                  fontWeight:600,
                  cursor:'pointer',
                  display:'flex',alignItems:'center',justifyContent:'center',
                  WebkitTapHighlightColor:'transparent',
                  transition:'background 0.1s',
                }}
              >{k}</button>
        ))}
      </div>

      {!setupMode&&<button onClick={()=>{
        // Escape hatch: clear PIN (will require Supabase login still)
        if(confirm('Forgot PIN? This will remove the PIN lock. You will still need your Supabase password.')){
          localStorage.removeItem('jbf_pin_hash');
          setSetupMode(true);setSetupStep(1);setDigits([]);setMsg('');
        }
      }} style={{marginTop:28,background:'none',border:'none',color:'var(--text3)',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer',textDecoration:'underline'}}>Forgot PIN</button>}

      <style>{`@keyframes pinShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}`}</style>
    </div>
  );
}

function App() {
  const [tab,setTab]                         = useState('dash');
  const [txns,setTxns]                       = useState([]);
  const [investments,setInvestments]         = useState([]);
  const [opening,setOpening]                 = useState({});

  const [budgets,setBudgets]                 = useState({});
  const [udhari,setUdhari]                   = useState([]);
  const [recurring,setRecurring]             = useState([]);
  const [ccBillsData,setCCBillsData]         = useState({});  // {ccName:[bills...]}
  const [customSites,setCustomSites]         = useState([]);
  const [customTeam,setCustomTeam]           = useState([]);
  const [customSiteCats,setCustomSiteCats]   = useState([]);
  const [toast,setToast]                     = useState(null);
  const [menuOpen,setMenuOpen]               = useState(false);
  const [quickAdd,setQuickAdd]               = useState(false);
  const [udhariView,setUdhariView]           = useState('list');
  const [loading,setLoading]                 = useState(true);
  const [globalSearch,setGlobalSearch]       = useState('');
  const [addPrefill,setAddPrefill]           = useState(null);
  const [theme,setTheme]                     = useState(()=>localStorage.getItem('jbf_theme')||'terminal');
  
  
  const [txnFilter,setTxnFilter] = useState({
    account: null,        // specific bank or CC name
    type: null,          // 'Income', 'Expense', etc.
    dateRange: null,     // {start, end} or period string
    category: null       // category filter
  });

  
  const [session,setSession]   = useState(null);
  const [authLoading,setAuthLoading] = useState(true);
  const [pinUnlocked,setPinUnlocked] = useState(false); // PIN gate

  useEffect(()=>{
    db.auth.getSession().then(({data:{session}})=>{setSession(session);setAuthLoading(false);});
    const{data:{subscription}}=db.auth.onAuthStateChange((_,session)=>{setSession(session);});
    /* Listen for service worker update */
    const onSwUpdate=()=>showToast('🔄 Update ready — reopen app to apply');
    window.addEventListener('jbf-sw-update',onSwUpdate);
    return()=>{subscription.unsubscribe();window.removeEventListener('jbf-sw-update',onSwUpdate);};
  },[]);

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null),2500); };

  /* ── OFFLINE QUEUE ── */
  const [offlineQueue, setOfflineQueue] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('jbf_offline_queue') || '[]'); } catch { return []; }
  });
  const [isOnline, setIsOnline] = React.useState(() => navigator.onLine);

  useEffect(() => {
    const goOnline  = () => { setIsOnline(true); };
    const goOffline = () => { setIsOnline(false); };
    window.addEventListener('online',  goOnline);
    window.addEventListener('offline', goOffline);
    return () => { window.removeEventListener('online', goOnline); window.removeEventListener('offline', goOffline); };
  }, []);

  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',theme);
    localStorage.setItem('jbf_theme',theme);
  },[theme]);

  /* Flush offline queue on reconnect */
  useEffect(() => {
    if (!isOnline) { showToast('📵 Offline — entries will be queued locally'); return; }
    const flush = async () => {
      let q;
      try { q = JSON.parse(localStorage.getItem('jbf_offline_queue') || '[]'); } catch { q = []; }
      if (!q.length) return;
      let failed = [];
      for (const item of q) {
        try {
          /* Re-run tallyMiddleware on flush in case item was queued before DE fields existed */
          const deEntry = tallyMiddleware(item.txn, allBanks, allCC);
          const payload = {
            ...item.txn,
            user_id   : session?.user?.id || null,
            dr_ledger : item.txn.dr_ledger || deEntry.dr_ledger || null,
            cr_ledger : item.txn.cr_ledger || deEntry.cr_ledger || null,
          };
          if (!('party_name' in payload)) payload.party_name = null;
          if (!('tower'      in payload)) payload.tower      = null;
          const { error } = await db.from('transactions').insert([payload]);
          if (error) failed.push(item);
        } catch { failed.push(item); }
      }
      if (failed.length === 0) {
        localStorage.removeItem('jbf_offline_queue');
        setOfflineQueue([]);
        showToast('✅ ' + q.length + ' queued entr' + (q.length === 1 ? 'y' : 'ies') + ' synced!');
        loadData();
      } else {
        localStorage.setItem('jbf_offline_queue', JSON.stringify(failed));
        setOfflineQueue(failed);
        showToast('⚠ ' + failed.length + ' entries still failed to sync');
      }
    };
    flush();
  }, [isOnline]);

  const loadData = useCallback(async ()=>{
    /* Guard: don't fetch until authenticated. With RLS enabled an anonymous
       fetch returns empty, so fetching before login would leave the UI blank
       until a manual reload. Re-running when `session` changes (see deps below)
       ensures data loads right after sign-in. */
    if(!session){ return; }
    setLoading(true);
    try {
      /* cursor-based pagination — fetches ALL transactions in 500-row pages
         so data is never silently truncated when txn count exceeds 500            */
      const COLS='id,created_at,type,amount,category,from_account,to_account,particulars,tower,status,source,domain,site_name,site_user,party_name,user_id,it_section,correction_of';
      let allTxns=[],from=0,PAGE=500,done=false;
      while(!done){
        const{data:page,error:txnErr}=await db.from('transactions')
          .select(COLS).order('created_at',{ascending:false}).range(from,from+PAGE-1);
        if(txnErr){console.error('transactions fetch error:',txnErr.message);showToast('⚠ DB: '+txnErr.message);break;}
        if(!page||page.length===0){done=true;}
        else{allTxns=[...allTxns,...page];from+=PAGE;if(page.length<PAGE)done=true;}
      }
      setTxns(allTxns);
      try{const{data:inv}=await db.from('investments').select('*').order('created_at',{ascending:false});setInvestments(inv||[]);}catch(e){setInvestments([]);}
      try{const{data:ud}=await db.from('udhari').select('*').order('created_at',{ascending:false});setUdhari(ud||[]);}catch(e){setUdhari([]);}
      try{const{data:rec}=await db.from('recurring').select('*').order('due_day',{ascending:true});setRecurring(rec||[]);}catch(e){setRecurring([]);}
      try{
        const uid2=session?.user?.id||null;
        if(uid2){
          const{data:cbRows}=await db.from('cc_bills').select('*').order('bill_end',{ascending:true});
          if(cbRows){
            const grouped={};
            cbRows.forEach(r=>{
              if(!grouped[r.cc_name])grouped[r.cc_name]=[];
              grouped[r.cc_name].push({billStart:r.bill_start,billEnd:r.bill_end,bankAmt:r.bank_amt,appAmt:r.app_amt,diff:r.diff,dueDate:r.due_date||'',reconciledAt:r.reconciled_at,txnCount:r.txn_count});
            });
            setCCBillsData(grouped);
          }
        }
      }catch(e){setCCBillsData({});}
      const{data:s}=await db.from('settings').select('*');
      if(s){
        const g=(k)=>s.find(r=>r.key===k);
        if(g('opening_balances')) try{setOpening(JSON.parse(g('opening_balances').value));}catch(e){}
        if(g('custom_accounts'))  try{setCustomAccounts(JSON.parse(g('custom_accounts').value));}catch(e){}
        if(g('custom_categories'))try{setCustomCategories(JSON.parse(g('custom_categories').value));}catch(e){}
        if(g('budgets'))          try{setBudgets(JSON.parse(g('budgets').value));}catch(e){}
        if(g('custom_sites'))     try{setCustomSites(JSON.parse(g('custom_sites').value));}catch(e){}
        if(g('custom_team'))      try{setCustomTeam(JSON.parse(g('custom_team').value));}catch(e){}
        if(g('custom_site_cats')) try{setCustomSiteCats(JSON.parse(g('custom_site_cats').value));}catch(e){}
        if(g('theme'))            { setTheme(g('theme').value); document.documentElement.setAttribute('data-theme',g('theme').value); localStorage.setItem('jbf_theme',g('theme').value); }
      }
    } catch(e){console.error('loadData error:',e);showToast('⚠ Load failed: '+e.message);}
    setLoading(false);

    /* ── AUTO BACKFILL: fills NULL dr_ledger/cr_ledger for pre-DE rows ──
       Checks settings flag 'backfill_done'. Once all rows filled, never runs again. */
    try {
      const {data:bfFlag} = await db.from('settings').select('value').eq('key','backfill_done').single();
      if(!bfFlag || bfFlag.value !== 'true') {
        const {data:nullRows} = await db.from('transactions')
          .select('id,type,amount,category,from_account,to_account,tower,domain,site_name,direction')
          .is('dr_ledger', null).neq('status','voided').limit(500);
        if(nullRows && nullRows.length > 0){
          const updates = nullRows.map(row=>{
            const de = tallyMiddleware(row, SEED_BANKS, SEED_CC);
            if(!de.dr_ledger||!de.cr_ledger) return null;
            return {id:row.id, dr_ledger:de.dr_ledger, cr_ledger:de.cr_ledger};
          }).filter(Boolean);
          if(updates.length>0) await db.from('transactions').upsert(updates,{onConflict:'id'});
        }
        /* If no NULL rows remain, mark done permanently */
        const {data:remaining} = await db.from('transactions').select('id').is('dr_ledger',null).neq('status','voided').limit(1);
        if(!remaining || remaining.length===0){
          await db.from('settings').upsert({key:'backfill_done',value:'true'},{onConflict:'key'});
        }
      }
    } catch(e){ console.warn('auto-backfill:',e.message); }
  },[session]);

/* ── VIRTUAL PROVISION TYPES — these NEVER touch physical balances ── */
const PROVISION_VIRTUAL_TYPES=['Provision_Accrue','Provision_Withdraw','Provision_Repay','Provision_Flush'];

/* ── computeBalances — Strict Tally Trial Balance Engine ─────────────────────
   Fundamental axiom: for every transaction, Sum(Dr) == Sum(Cr) == amount.
   We iterate dr_ledger / cr_ledger when present (new DE rows), and fall back
   to the legacy single-entry heuristic for older rows that predate the DE migration.
   This guarantees backward compatibility without a data migration.

   Balance derivation by account nature:
     Asset   account  → balance = Opening + Sum(Dr credits) − Sum(Cr debits)
                         i.e. Dr increases an asset, Cr decreases it.
     Liability account→ balance = Opening + Sum(Cr credits) − Sum(Dr debits)
                         i.e. Cr increases a liability, Dr decreases it.

   For the UI, we store signed balances:
     Bank / Cash  (asset)    → positive = money you have
     CC           (liability) → negative = money you owe
     Site Cash    (asset)    → negative = you invested in site (site owes you)
─────────────────────────────────────────────────────────────────────────────── */
function computeBalances(opening, txns, allBanks, allCC) {
  /* Seed opening balances */
  const bal = {};
  Object.entries(opening || {}).forEach(([acc, val]) => {
    bal[acc] = (typeof val === 'object' && val !== null) ? (val.amount || 0) : (val || 0);
  });

  /* Helper: is a given ledger name a known physical account we track?
     Also handles per-site sub-ledger pattern "Site Cash:D5" */
  const isTrackedAccount = name => {
    if (!name) return false;
    if (allBanks.includes(name) || allCC.includes(name) || name === 'Site Cash') return true;
    if (name.startsWith('Site Cash:')) return true; // per-site sub-ledger
    return false;
  };

  /* Helper: opening_date guard — only include txn if it's on/after opening date */
  const afterOpening = (acc, txnDate) => {
    /* For per-site sub-ledgers, check the parent "Site Cash" opening date */
    const lookupKey = (acc && acc.startsWith('Site Cash:')) ? 'Site Cash' : acc;
    const val = opening[lookupKey];
    if (!val || typeof val !== 'object' || !val.opening_date) return true;
    return txnDate >= val.opening_date;
  };

  /* Helper: apply a DEBIT to a physical account
     Asset / Site Cash: Dr → balance increases
     Liability (CC): Dr → balance toward 0 (liability reduces) */
  const applyDr = (acc, amt, txnDate, skipRollup) => {
    if (!isTrackedAccount(acc)) return;
    if (!afterOpening(acc, txnDate)) return;
    bal[acc] = (bal[acc] || 0) + amt;
    if (!skipRollup && acc && acc.startsWith('Site Cash:')) {
      bal['Site Cash'] = (bal['Site Cash'] || 0) + amt;
    }
  };

  const applyCr = (acc, amt, txnDate, skipRollup) => {
    if (!isTrackedAccount(acc)) return;
    if (!afterOpening(acc, txnDate)) return;
    bal[acc] = (bal[acc] || 0) - amt;
    if (!skipRollup && acc && acc.startsWith('Site Cash:')) {
      bal['Site Cash'] = (bal['Site Cash'] || 0) - amt;
    }
  };

  txns.filter(t => t.status !== 'voided').forEach(t => {
    const txnDate = (t.created_at || '').slice(0, 10);
    const amt     = parseFloat(t.amount) || 0;
    const type    = t.type;

    /* ── VIRTUAL PROVISION types: no physical cash movement ── */
    if (PROVISION_VIRTUAL_TYPES.includes(type)) return;

    /* ══ PATH A: New double-entry rows (have dr_ledger + cr_ledger) ══ */
    if (t.dr_ledger && t.cr_ledger) {
      const drIsSub    = t.dr_ledger.startsWith('Site Cash:');
      const crIsSub    = t.cr_ledger.startsWith('Site Cash:');
      const drIsParent = t.dr_ledger === 'Site Cash';
      const crIsParent = t.cr_ledger === 'Site Cash';
      /* Skip sub-ledger rollup when the other side is already the parent — avoids double-count */
      applyDr(t.dr_ledger, amt, txnDate, drIsSub && crIsParent);
      applyCr(t.cr_ledger, amt, txnDate, crIsSub && drIsParent);
      return;
    }

    /* ══ PATH B: All other rows — handled by type ══ */
    const from = t.from_account, to = t.to_account;
    const after = acc => afterOpening(acc, txnDate);

    /* ── Site Transfer: FULLY custom logic, no generic fallthrough ──
       
       CANONICAL convention (enforced in AddScreen):
         GIVEN:    from_account = Bank/CC/Cash (personal), to_account = null
         RECEIVED: from_account = PersonName,  to_account = Bank/CC/Cash/SiteCash

       Site Cash balance convention:
         More NEGATIVE = site owes you more (you invested more)
         Less negative / positive = site returned money

       CRITICAL RULES:
         1. GIVEN from personal Bank/CC/Cash:
              personal_account -= amt  (your bank reduces)
              Site Cash        -= amt  (site owes you more)

         2. GIVEN from 'Site Cash' (Site Cash pool paying person):
              Site Cash        -= amt  (site cash pool reduces — internal)
              NO personal account change (it's site's own money)
              NO double Site Cash adjustment

         3. RECEIVED into personal Bank/Cash:
              personal_account += amt  (your bank increases)
              Site Cash        += amt  (site owes you less)

         4. RECEIVED into 'Site Cash' (PH gives cash to site pool):
              Site Cash balance: += amt via site-tracking block only
              DO NOT also add to bal['Site Cash'] via generic transfer logic
    ── */
    /* ── Site Receivable: Bank/CC site spend → Cash receivable increases ── */
    if (type === 'Site Receivable') {
      /* Bank/CC paid for site → site owes you → Cash increases.
         UB/CC reduced in main entry. Site Cash updated in main entry.
         ONLY Cash increases here. */
      if (after('Cash')) bal['Cash'] = (bal['Cash'] || 0) + amt;
      return;
    }

    /* ── Site Settlement: display-only entry — affects NO balance calculations ──
       This entry exists only to show "Settled from Site ₹X" in Cash/Bank ledger display.
       Cash balance is already correct from actual Cash transactions.
       Site Cash balance is already correct from Site Transfer entries.
       DO NOT touch any bal[] here. */
    if (type === 'Site Settlement') return;

    if (type === 'Site Transfer') {
      const dir = t.direction;
      const personalAccounts = [...(allBanks||[]).filter(b=>b!=='Site Cash'), ...(allCC||[])];
      const siteName = t.site_name && t.site_name.trim();
      const subKey   = siteName ? ('Site Cash:' + siteName) : null;

      const isGiven    = dir === 'given'    || (!dir && !to && from && from !== 'Site Cash');
      const isReceived = dir === 'received' || (!dir && to);

      if (isGiven) {
        const fromIsPersonal = from && personalAccounts.includes(from);
        const fromIsSiteCash = from === 'Site Cash';

        if (fromIsPersonal && after(from)) {
          /* Personal Bank/CC/Cash → Site: your bank reduces, outstanding increases */
          bal[from] = (bal[from] || 0) - amt;
          bal['Site Cash'] = (bal['Site Cash'] || 0) - amt;
          if (subKey) bal[subKey] = (bal[subKey] || 0) - amt;
        } else if (fromIsSiteCash) {
          /* Site Cash Pool → Person (Milton ko pool se diya)
             That pool money was funded by PH — so outstanding increases
             (site used the pool = site owes you more from that pool) */
          bal['Site Cash'] = (bal['Site Cash'] || 0) - amt;
          if (subKey) bal[subKey] = (bal[subKey] || 0) - amt;
        }

      } else if (isReceived) {
        const toIsPersonal  = to && personalAccounts.includes(to);
        const toIsSiteCash  = to === 'Site Cash';

        if (toIsPersonal && after(to)) {
          /* Explicit account received (e.g. Najrul → UB directly)
             UB increases + Site Cash outstanding reduces */
          bal[to] = (bal[to] || 0) + amt;
          bal['Site Cash'] = (bal['Site Cash'] || 0) + amt;
          if (subKey) bal[subKey] = (bal[subKey] || 0) + amt;

        } else if (toIsSiteCash) {
          /* PH gives to Site Cash pool — only Site Cash balance changes.
             Cash/Bank is handled by the auto-created 'Site Settlement' entry. */
          bal['Site Cash'] = (bal['Site Cash'] || 0) + amt;
          if (subKey) bal[subKey] = (bal[subKey] || 0) + amt;
        }
      }
      return; /* Site Transfer fully handled — no fallthrough */
    }

    /* ── Regular Expense / Income ── */
    if (type === 'Expense' || type === 'UA Expense') {
      if (from && after(from)) bal[from] = (bal[from] || 0) - amt;
      const isSiteTagged = (t.tower === 'SITE' || t.domain === 'Site');
      /* Update Site Cash UNLESS PATH A already handled it (cr_ledger='Site Cash' or 'Site Cash:X') */
      const pathAHandledSite = t.cr_ledger && (t.cr_ledger === 'Site Cash' || t.cr_ledger.startsWith('Site Cash:'));
      if (isSiteTagged && from && !pathAHandledSite) {
        const siteName = t.site_name && t.site_name.trim();
        const personalAccounts = [...(allBanks||[]).filter(b=>b!=='Site Cash'), ...(allCC||[])];
        if (from === 'Site Cash' || personalAccounts.includes(from)) {
          bal['Site Cash'] = (bal['Site Cash'] || 0) - amt;
          if (siteName) bal['Site Cash:'+siteName] = (bal['Site Cash:'+siteName] || 0) - amt;
        }
      }
      return;
    }

    if (type === 'Income' || type === 'UA Received') {
      if (to && after(to)) bal[to] = (bal[to] || 0) + amt;
      /* Site-tagged income: site returned money to your personal account */
      if ((t.tower === 'SITE' || t.domain === 'Site') && to && to !== 'Site Cash') {
        const personalAccounts = [...(allBanks||[]).filter(b=>b!=='Site Cash'), ...(allCC||[])];
        if (personalAccounts.includes(to)) {
          const siteName = t.site_name && t.site_name.trim();
          bal['Site Cash'] = (bal['Site Cash'] || 0) + amt;
          if (siteName) bal['Site Cash:'+siteName] = (bal['Site Cash:'+siteName] || 0) + amt;
        }
      }
      return;
    }

    /* ── Bank / CC transfers ── */
    if (['Bank→Bank','Bank→CC','Bank→Cash','Cash→Bank','CC→Bank'].includes(type)) {
      if (from && after(from)) bal[from] = (bal[from] || 0) - amt;
      if (to   && after(to))   bal[to]   = (bal[to]   || 0) + amt;
      /* Site-tagged bank transfer: you funded site from personal bank */
      if ((t.tower === 'SITE' || t.domain === 'Site') && from && from !== 'Site Cash') {
        const personalAccounts = [...(allBanks||[]).filter(b=>b!=='Site Cash'), ...(allCC||[])];
        if (personalAccounts.includes(from)) {
          const siteName = t.site_name && t.site_name.trim();
          bal['Site Cash'] = (bal['Site Cash'] || 0) - amt;
          if (siteName) bal['Site Cash:'+siteName] = (bal['Site Cash:'+siteName] || 0) - amt;
        }
      }
      return;
    }
  });

  return bal;
}
/* ── computeProvisions — Decoupled Virtual Envelope Engine ──
   For each is_provision recurring entry:
     A = Target        (target_amount from recurring table)
     B = Gross Saved   (already_saved + SUM(Provision_Accrue) - SUM(Provision_Flush))
     D = Debt          (SUM(Provision_Withdraw) - SUM(Provision_Repay))
     C = Net Blocked   (B - D)  ← the liquidity that is virtually locked
── */
function computeProvisions(recurring,txns){
  const activeTxns=txns.filter(t=>t.status!=='voided');
  return recurring.filter(r=>r.is_provision&&r.active!==false).map(prov=>{
    const myTxns=activeTxns.filter(t=>t.provision_envelope===prov.id||t.particulars===('[ENV:'+prov.id+']'));
    const provTxns=activeTxns.filter(t=>PROVISION_VIRTUAL_TYPES.includes(t.type)&&(t.category===prov.name||t.particulars&&t.particulars.includes('[ENV:'+prov.id+']')));
    const accrues =provTxns.filter(t=>t.type==='Provision_Accrue').reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
    const flushes =provTxns.filter(t=>t.type==='Provision_Flush').reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
    const borrows =provTxns.filter(t=>t.type==='Provision_Withdraw').reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
    const repays  =provTxns.filter(t=>t.type==='Provision_Repay').reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
    const A=parseFloat(prov.target_amount)||0;
    const B=Math.max(0,(parseFloat(prov.already_saved)||0)+accrues-flushes);
    const D=Math.max(0,borrows-repays);
    const C=Math.max(0,B-D);
    const pct=A>0?Math.min(Math.round(C/A*100),100):0;
    return{prov,A,B,C,D,accrues,flushes,borrows,repays,provTxns,pct};
  });
}

function ProvisionLedger({recurring,txns,allBanks,onAddTxn,onAddRecurring,onDeleteRecurring,onUpdateRecurring,showToast,provisionStates}){

  const handleAdd=async()=>{
    if(!form.name||!form.target_amount){showToast('⚠ Name & Target required');return;}

    await onAddTxn({domain:'Personal',type:'Provision_Accrue',amount:amt,from_account:accrueForm.from_account||allBanks[0]||'Cash',category:ps.prov.name,particulars:'[ENV:'+ps.prov.id+'] Accrue → '+ps.prov.name,status:'complete',source:'provision',created_at:new Date().toISOString()});
    setShowAccrue(null);setAccrueForm({amount:'',from_account:'',notes:''});
  };

  const handleFlush=async(ps)=>{
    if(ps.C<=0){showToast('⚠ No balance to flush');return;}
    await onAddTxn({domain:'Personal',type:'Provision_Flush',amount:ps.C,from_account:ps.prov.account||allBanks[0]||'Cash',category:ps.prov.name,particulars:'[ENV:'+ps.prov.id+'] Flush → '+ps.prov.name,status:'complete',source:'provision',created_at:new Date().toISOString()});

  return(

      </div>

      {provisionStates.length===0&&(
        <div className="empty">No provision envelopes yet<br/>Create one to start tracking funds</div>
      )}

      {provisionStates.map(ps=>(
        <div key={ps.prov.id} className="card" style={{margin:'0 16px 10px'}}>
          <div style={{padding:'12px 14px 8px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div>
                <div style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:700,color:'var(--text)',letterSpacing:'0.04em'}}>{ps.prov.name}</div>
                {ps.prov.notes&&<div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',marginTop:2}}>{ps.prov.notes}</div>}
              </div>
              <span style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:ps.pct>=100?'var(--green)':ps.pct>50?'var(--amber)':'var(--red)'}}>{ps.pct}%</span>
            </div>
            <div className="progress-bg" style={{marginTop:8}}>
              <div className="progress-fill" style={{width:ps.pct+'%',background:ps.pct>=100?'var(--green)':ps.pct>50?'var(--amber)':'var(--red)'}}/>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:4,marginTop:10}}>
              {[['Target',ps.A,'var(--text2)'],['Saved',ps.B,'var(--green)'],['Net Blocked',ps.C,'var(--blue)']].map(([l,v,c])=>(
                <div key={l} style={{background:'var(--bg3)',borderRadius:6,padding:'6px 8px'}}>
                  <div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em'}}>{l}</div>
                  <div style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:700,color:c,marginTop:2}}>{fmtL(v)}</div>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:6,marginTop:8}}>
              <button onClick={()=>{setShowAccrue(ps.prov.id);setAccrueForm({amount:'',from_account:ps.prov.account||allBanks[0]||'Cash',notes:''});}} style={{flex:1,background:'var(--green-bg)',border:'1px solid var(--green)',color:'var(--green)',fontFamily:'var(--mono)',fontSize:10,fontWeight:600,padding:'6px',borderRadius:6,cursor:'pointer'}}>+ ACCRUE</button>
              <button onClick={()=>handleFlush(ps)} style={{flex:1,background:'var(--amber-bg)',border:'1px solid var(--amber)',color:'var(--amber)',fontFamily:'var(--mono)',fontSize:10,fontWeight:600,padding:'6px',borderRadius:6,cursor:'pointer'}}>FLUSH</button>
              <button onClick={async()=>{if(confirm('Delete "'+ps.prov.name+'"?'))await onDeleteRecurring(ps.prov.id);}} style={{background:'var(--red-bg)',border:'1px solid var(--red)',color:'var(--red)',fontFamily:'var(--mono)',fontSize:10,fontWeight:600,padding:'6px 10px',borderRadius:6,cursor:'pointer'}}>✕</button>
            </div>
          </div>
          {showAccrue===ps.prov.id&&(
            <div style={{padding:'10px 14px',borderTop:'1px solid var(--border)',background:'var(--bg3)'}}>
              <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text2)',marginBottom:6}}>Accrue to "{ps.prov.name}"</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:6}}>
                <input type="number" placeholder="Amount ₹" value={accrueForm.amount} onChange={e=>setAccrueForm(f=>({...f,amount:e.target.value}))}/>
                <select value={accrueForm.from_account} onChange={e=>setAccrueForm(f=>({...f,from_account:e.target.value}))}>
                  {allBanks.map(b=><option key={b} value={b}>{b}</option>)}
                </select>
              </div>
              <div style={{display:'flex',gap:6}}>
                <button onClick={()=>handleAccrue(ps)} style={{flex:1,background:'var(--green)',color:'#000',fontFamily:'var(--mono)',fontSize:11,fontWeight:700,padding:'8px',borderRadius:6,border:'none',cursor:'pointer'}}>✓ SAVE</button>
                <button onClick={()=>setShowAccrue(null)} style={{background:'var(--bg2)',color:'var(--text3)',fontFamily:'var(--mono)',fontSize:11,padding:'8px 12px',borderRadius:6,border:'1px solid var(--border)',cursor:'pointer'}}>✕</button>
              </div>
            </div>
          )}
        </div>
      ))}

      {/* Add New Envelope Modal */}
      {showAdd&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:200,display:'flex',flexDirection:'column',justifyContent:'flex-end'}} onClick={e=>e.target===e.currentTarget&&setShowAdd(false)}>
          <div style={{background:'var(--bg)',borderRadius:'16px 16px 0 0',border:'1px solid var(--border)',padding:'16px',maxHeight:'80vh',overflowY:'auto'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <span style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:'var(--text2)',letterSpacing:'0.08em'}}>NEW ENVELOPE</span>
              <button onClick={()=>setShowAdd(false)} style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text2)',padding:'4px 10px',fontSize:11,fontFamily:'var(--mono)',cursor:'pointer'}}>✕</button>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <input type="text" placeholder="Name (e.g. Emergency Fund)" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
              <input type="number" placeholder="Target Amount ₹" value={form.target_amount} onChange={e=>setForm(f=>({...f,target_amount:e.target.value}))}/>
              <input type="number" placeholder="Already Saved ₹ (optional)" value={form.already_saved} onChange={e=>setForm(f=>({...f,already_saved:e.target.value}))}/>
              <select value={form.account} onChange={e=>setForm(f=>({...f,account:e.target.value}))}>
                <option value="">Select Account (optional)</option>
                {allBanks.map(b=><option key={b} value={b}>{b}</option>)}
              </select>
              <input type="text" placeholder="Notes (optional)" value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/>
              <button onClick={handleAdd} className="save-btn" style={{width:'100%',margin:0,marginTop:4}}>✓ CREATE ENVELOPE</button>
            </div>
          </div>
        </div>
      )}
      <div style={{height:40}}/>
    </div>
  );
}


/* ── CCBillScreen v3.0 — Supabase-backed ──────────────────────
   Tables: cc_bills, cc_stmt_days
   All data synced via Supabase — works across devices
────────────────────────────────────────────────────────────── */
function CCBillScreen({txns,customAccounts,setTab,setTxnFilter,session}){
  const ccAccounts=[...SEED_CC,...(customAccounts||[]).filter(a=>a.type==='cc').map(a=>a.name)];
  const today=new Date();const todayStr=today.toISOString().slice(0,10);
  const uid=session?.user?.id||null;

  /* ── Supabase helpers ── */
  const fetchBills=async cc=>{
    if(!uid)return[];
    try{
      const{data,error}=await db.from('cc_bills').select('*').eq('cc_name',cc).order('bill_end',{ascending:true});
      if(error||!data)return[];
      return data.map(r=>({billStart:r.bill_start,billEnd:r.bill_end,bankAmt:r.bank_amt,appAmt:r.app_amt,diff:r.diff,dueDate:r.due_date||'',reconciledAt:r.reconciled_at,txnCount:r.txn_count,_id:r.id}));
    }catch{return[];}
  };
  const insertBill=async(cc,entry)=>{
    if(!uid)return;
    // Check duplicate: same cc_name + bill_end already saved?
    const{data:existing}=await db.from('cc_bills').select('id').eq('cc_name',cc).eq('bill_end',entry.billEnd).limit(1);
    if(existing&&existing.length>0){console.warn('cc_bills: duplicate bill_end, skipping insert');return;}
    await db.from('cc_bills').insert([{user_id:uid,cc_name:cc,bill_start:entry.billStart,bill_end:entry.billEnd,bank_amt:entry.bankAmt,app_amt:entry.appAmt,diff:entry.diff,due_date:entry.dueDate||null,reconciled_at:entry.reconciledAt,txn_count:entry.txnCount}]);
  };
  const fetchStmtDay=async cc=>{
    if(!uid)return 1;
    try{
      const{data}=await db.from('cc_stmt_days').select('stmt_day').eq('cc_name',cc).limit(1);
      return (data&&data[0]?.stmt_day)||1;
    }catch{return 1;}
  };
  const saveStmtDayDB=async(cc,day)=>{
    if(!uid)return;
    await db.from('cc_stmt_days').upsert({user_id:uid,cc_name:cc,stmt_day:day},{onConflict:'user_id,cc_name'});
  };

  const [selCC,setSelCC]=useState(ccAccounts[0]||'');
  const [ccTab,setCCTab]=useState('unbilled');
  const [stmtDayStr,setStmtDayStr]=useState('1');
  const [stmtAmt,setStmtAmt]=useState('');
  const [dueDate,setDueDate]=useState('');
  const [reconSaved,setReconSaved]=useState(false);
  const [bills,setBillsState]=useState([]);
  const [loadingBills,setLoadingBills]=useState(true);
  const [billStart,setBillStart]=useState('');
  const [billEnd,setBillEnd]=useState('');

  const stmtDay=Math.max(1,Math.min(28,parseInt(stmtDayStr)||1));

  const getLastStmtDate=sd=>{const d=new Date(today.getFullYear(),today.getMonth(),sd);if(d>today)return new Date(today.getFullYear(),today.getMonth()-1,sd);return d;};

  const loadCC=async cc=>{
    setLoadingBills(true);
    const [b,sd]=await Promise.all([fetchBills(cc),fetchStmtDay(cc)]);
    setBillsState(b);
    setStmtDayStr(String(sd));
    const ls=getLastStmtDate(sd);
    const lb=b.length>0?b[b.length-1]:null;
    if(lb){
      const le=new Date(lb.billEnd);
      setBillStart(lb.billEnd);
      setBillEnd(new Date(le.getFullYear(),le.getMonth()+1,sd).toISOString().slice(0,10));
    }else{
      const pb=new Date(ls.getFullYear(),ls.getMonth()-1,sd);
      setBillStart(pb.toISOString().slice(0,10));
      setBillEnd(ls.toISOString().slice(0,10));
    }
    setLoadingBills(false);
  };

  React.useEffect(()=>{if(ccAccounts.length>0)loadCC(ccAccounts[0]);},[uid]);

  const handleSelCC=async cc=>{
    setSelCC(cc);setStmtAmt('');setDueDate('');setReconSaved(false);setBillsState([]);
    await loadCC(cc);
  };
  const handleStmtDaySave=async()=>{
    await saveStmtDayDB(selCC,stmtDay);
    await loadCC(selCC);
  };

  const latestBill=bills.length>0?bills[bills.length-1]:null;
  const lastStmt=getLastStmtDate(stmtDay);
  const nextStmt=new Date(lastStmt.getFullYear(),lastStmt.getMonth()+1,stmtDay);
  const stmtGenerated=lastStmt.getMonth()===today.getMonth()&&lastStmt.getFullYear()===today.getFullYear();

  /* ── CC spends ── */
  const ccSpends=txns.filter(t=>t.status!=='voided'&&t.from_account===selCC&&(t.type==='Expense'||t.type==='UA Expense'));
  const unbilledFrom=latestBill?latestBill.billEnd:lastStmt.toISOString().slice(0,10);
  const unbilled=ccSpends.filter(t=>t.created_at.slice(0,10)>unbilledFrom);
  const unbilledTotal=unbilled.reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  const billedTxns=billStart&&billEnd?ccSpends.filter(t=>{const d=t.created_at.slice(0,10);return d>billStart&&d<=billEnd;}):[];
  const billedTotal=billedTxns.reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  const sa=parseFloat(stmtAmt)||0;const diff=sa-billedTotal;const hasStmt=stmtAmt!==''&&sa>0;

  const latestBillPaid=latestBill?(()=>{
    return txns.filter(t=>t.status!=='voided'&&(t.type==='CC→Bank'||t.type==='Bank→CC'||t.type==='Bank→Bank')&&(t.from_account===selCC||t.to_account===selCC)&&t.created_at.slice(0,10)>latestBill.billEnd).length>0;
  })():false;

  /* ── Save new reconciliation ── */
  const handleSaveRecon=async()=>{
    if(!hasStmt)return;
    const entry={billStart,billEnd,bankAmt:sa,appAmt:billedTotal,diff,dueDate,reconciledAt:new Date().toISOString(),txnCount:billedTxns.length};
    await insertBill(selCC,entry);
    const updated=[...bills,entry];
    setBillsState(updated);
    setReconSaved(true);
    setStmtAmt('');setDueDate('');
    const le=new Date(billEnd);
    setBillStart(billEnd);
    setBillEnd(new Date(le.getFullYear(),le.getMonth()+1,stmtDay).toISOString().slice(0,10));
  };

  const iS={background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:12,outline:'none',width:'100%'};
  const tabSel=active=>({flex:1,padding:'9px 0',fontFamily:'var(--mono)',fontSize:11,fontWeight:active?700:400,letterSpacing:'0.06em',textTransform:'uppercase',border:'none',borderBottom:active?'2px solid var(--green)':'2px solid transparent',background:'none',color:active?'var(--green)':'var(--text3)',cursor:'pointer'});
  const ord=n=>n===1?'st':n===2?'nd':n===3?'rd':'th';

  if(loadingBills)return(<div className="empty">Loading bills...</div>);

  return(<div className="fade-in">
    {/* CC Selector */}
    <p className="sec-label">Credit Card</p>
    <div style={{padding:'0 16px 4px'}}><select value={selCC} onChange={e=>handleSelCC(e.target.value)} style={iS}>{ccAccounts.map(a=><option key={a}>{a}</option>)}</select></div>

    {/* Statement Day */}
    <div style={{margin:'10px 16px 0',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'12px 14px',display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
      <div style={{flex:1}}>
        <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',textTransform:'uppercase',marginBottom:4}}>Statement Generates on (day of month)</div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <input type="number" min="1" max="28" value={stmtDayStr} onChange={e=>setStmtDayStr(e.target.value)} onBlur={handleStmtDaySave} style={{...iS,width:70,textAlign:'center',fontSize:18,fontWeight:700}}/>
          <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',lineHeight:1.5}}>
            Last stmt: <span style={{color:'var(--text2)'}}>{fmtDate(lastStmt)}</span><br/>
            Next stmt: <span style={{color:'var(--amber)'}}>{fmtDate(nextStmt)}</span>
          </div>
        </div>
      </div>
      <div style={{background:stmtGenerated?'var(--green-bg)':'var(--amber-bg)',border:'1px solid '+(stmtGenerated?'var(--green)':'var(--amber)'),borderRadius:8,padding:'6px 12px',fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:stmtGenerated?'var(--green)':'var(--amber)',whiteSpace:'nowrap'}}>
        {stmtGenerated?'✓ Stmt Generated':'⏳ Not Yet'}
      </div>
    </div>

    {/* Latest saved bill banner */}
    {latestBill&&<div style={{margin:'8px 16px 0',background:latestBillPaid?'var(--green-bg)':'var(--red-bg)',border:'1px solid '+(latestBillPaid?'var(--green)':'var(--red)'),borderRadius:8,padding:'8px 12px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div>
        <div style={{fontFamily:'var(--mono)',fontSize:9,color:latestBillPaid?'var(--green)':'var(--red)',textTransform:'uppercase',letterSpacing:'0.08em'}}>{latestBillPaid?'✓ Bill Paid':'⚠ Bill Due'}</div>
        <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)',marginTop:2}}>{fmtDate(latestBill.billStart)} → {fmtDate(latestBill.billEnd)}</div>
        {latestBill.dueDate&&<div style={{fontFamily:'var(--mono)',fontSize:10,color:latestBillPaid?'var(--text3)':'var(--red)',marginTop:1}}>Due: {fmtDate(latestBill.dueDate)}</div>}
      </div>
      <div style={{textAlign:'right'}}>
        <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',textTransform:'uppercase'}}>Bill Amt</div>
        <div style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:700,color:latestBillPaid?'var(--green)':'var(--red)'}}>{fmtAmt(latestBill.bankAmt)}</div>
      </div>
    </div>}

    {/* Tab bar */}
    <div style={{display:'flex',borderBottom:'1px solid var(--border)',marginTop:12,padding:'0 16px'}}>
      <button style={tabSel(ccTab==='unbilled')} onClick={()=>setCCTab('unbilled')}>Unbilled{unbilledTotal>0?` · ${fmtAmt(unbilledTotal)}`:''}</button>
      <button style={tabSel(ccTab==='bills')} onClick={()=>setCCTab('bills')}>Bills{bills.length>0?` · ${bills.length}`:''}</button>
      <button style={tabSel(ccTab==='reconcile')} onClick={()=>setCCTab('reconcile')}>Reconcile{stmtGenerated?'':' (not yet)'}</button>
    </div>

    {/* ── UNBILLED TAB ── */}
    {ccTab==='unbilled'&&(<div>
      <div style={{margin:'12px 16px 0',background:'var(--bg2)',border:'1px solid var(--amber)',borderRadius:10,padding:'14px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
          <div onClick={()=>{if(unbilledTotal>0&&setTab&&setTxnFilter){setTxnFilter({account:selCC,type:null,dateRange:{start:unbilledFrom,end:todayStr},category:null});setTab('txns');}}} style={{cursor:unbilledTotal>0?'pointer':'default'}}>
            <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--amber)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4}}>Current Cycle · Unbilled Spends</div>
            <div style={{fontFamily:'var(--mono)',fontSize:24,fontWeight:800,color:'var(--amber)'}}>{fmtAmt(unbilledTotal)}</div>
          </div>
        </div>
        <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)'}}>
          Since {fmtDate(unbilledFrom)} · {unbilled.length} txns · Next stmt: {fmtDate(nextStmt)}
          {latestBill&&<span style={{color:'var(--green)',marginLeft:6}}>· From last reconciled date</span>}
        </div>
      </div>
      {unbilled.length>0
        ?<div style={{margin:'12px 16px 24px',border:'1px solid var(--border)',borderRadius:10,overflow:'hidden'}}>
          <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:8,padding:'8px 12px',background:'var(--bg3)',borderBottom:'1px solid var(--border)'}}><span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase'}}>Description</span><span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase'}}>Category</span><span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',textAlign:'right'}}>Spend</span></div>
          {[...unbilled].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).map((t,i)=>(
            <div key={t.id} style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:8,padding:'10px 12px',borderBottom:'1px solid var(--border)',background:i%2===0?'var(--bg2)':'var(--bg)'}}>
              <div style={{minWidth:0}}><div style={{fontSize:12,color:'var(--text)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{t.particulars||t.category}</div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:2}}>{fmtDate(t.created_at)}</div></div>
              <div><div style={{fontSize:11,color:'var(--text2)',fontFamily:'var(--mono)'}}>{t.category}</div></div>
              <div style={{textAlign:'right'}}><div style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:600,color:'var(--amber)'}}>−{fmtAmt(t.amount)}</div></div>
            </div>
          ))}
          <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:8,padding:'10px 12px',background:'var(--amber-bg)',fontWeight:700}}><div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)'}}>TOTAL UNBILLED</div><div/><div style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:13,color:'var(--amber)'}}>−{fmtAmt(unbilledTotal)}</div></div>
        </div>
        :<div className="empty">No unbilled charges since {fmtDate(unbilledFrom)}. 🎉</div>}
    </div>)}

    {/* ── BILLS TAB ── */}
    {ccTab==='bills'&&(<div>
      {bills.length===0&&<div className="empty">No reconciled bills yet for {selCC}.<br/>Use the Reconcile tab to add your first bill.</div>}
      {[...bills].reverse().map((b,i)=>{
        const isPaid=txns.filter(t=>t.status!=='voided'&&(t.type==='CC→Bank'||t.type==='Bank→CC'||t.type==='Bank→Bank')&&(t.from_account===selCC||t.to_account===selCC)&&t.created_at.slice(0,10)>b.billEnd).length>0;
        const billTxns=txns.filter(t=>t.status!=='voided'&&t.from_account===selCC&&(t.type==='Expense'||t.type==='UA Expense')&&t.created_at.slice(0,10)>b.billStart&&t.created_at.slice(0,10)<=b.billEnd);
        return(<div key={i} style={{margin:'12px 16px',border:'1px solid '+(isPaid?'var(--border)':'var(--red)'),borderRadius:10,overflow:'hidden'}}>
          <div style={{padding:'10px 14px',background:isPaid?'var(--bg3)':'var(--red-bg)',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontFamily:'var(--mono)',fontSize:9,color:isPaid?'var(--green)':'var(--red)',textTransform:'uppercase',letterSpacing:'0.08em'}}>{isPaid?'✓ Paid':'⚠ Outstanding'}</div>
              <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)',marginTop:2}}>{fmtDate(b.billStart)} → {fmtDate(b.billEnd)}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',textTransform:'uppercase',marginBottom:2}}>Bill Amount</div>
              <div style={{fontFamily:'var(--mono)',fontSize:16,fontWeight:700,color:isPaid?'var(--text)':'var(--red)'}}>{fmtAmt(b.bankAmt)}</div>
              {b.diff!==0&&<div style={{fontFamily:'var(--mono)',fontSize:9,color:b.diff>0?'var(--red)':'var(--green)'}}>{b.diff>0?'▲':'▼'} {fmtAmt(Math.abs(b.diff))} diff</div>}
            </div>
          </div>
          {billTxns.length>0&&<>
            <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:8,padding:'6px 12px',background:'var(--bg3)',borderBottom:'1px solid var(--border)'}}><span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase'}}>Description</span><span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase'}}>Category</span><span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',textAlign:'right'}}>Spend</span></div>
            {[...billTxns].sort((a,bT)=>new Date(bT.created_at)-new Date(a.created_at)).map((t,ti)=>(
              <div key={t.id} style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:8,padding:'9px 12px',borderBottom:'1px solid var(--border)',background:ti%2===0?'var(--bg2)':'var(--bg)'}}>
                <div style={{minWidth:0}}><div style={{fontSize:11,color:'var(--text)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{t.particulars||t.category}</div><div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:1}}>{fmtDate(t.created_at)}</div></div>
                <div><div style={{fontSize:10,color:'var(--text2)',fontFamily:'var(--mono)'}}>{t.category}</div></div>
                <div style={{textAlign:'right'}}><div style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:'var(--red)'}}>−{fmtAmt(t.amount)}</div></div>
              </div>
            ))}
            <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:8,padding:'9px 12px',background:'var(--red-bg)',fontWeight:700}}><div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text2)'}}>APP TRACKED</div><div/><div style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:12,color:'var(--red)'}}>−{fmtAmt(b.appAmt)}</div></div>
          </>}
        </div>);
      })}
    </div>)}

    {/* ── RECONCILE TAB ── */}
    {ccTab==='reconcile'&&(<div>
      {!stmtGenerated&&<div style={{margin:'12px 16px',background:'var(--amber-bg)',border:'1px solid var(--amber)',borderRadius:10,padding:'12px 14px',fontFamily:'var(--mono)',fontSize:12,color:'var(--amber)'}}>
        ⏳ Statement not yet generated for this cycle. Generates on the <strong>{stmtDay}{ord(stmtDay)}</strong> of each month.
      </div>}

      <p className="sec-label" style={{marginTop:8}}>Bill Period</p>
      <div style={{padding:'0 16px',display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
        <input type="date" value={billStart} onChange={e=>{setBillStart(e.target.value);setReconSaved(false);}} style={{...iS,flex:1,minWidth:130}}/>
        <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>to</span>
        <input type="date" value={billEnd} onChange={e=>{setBillEnd(e.target.value);setReconSaved(false);}} style={{...iS,flex:1,minWidth:130}}/>
      </div>

      <p className="sec-label" style={{marginTop:8}}>Payment Due Date</p>
      <div style={{padding:'0 16px'}}>
        <input type="date" value={dueDate} onChange={e=>setDueDate(e.target.value)} style={iS}/>
      </div>

      <p className="sec-label" style={{marginTop:8}}>Bank Statement Amount (₹)</p>
      <div style={{padding:'0 16px'}}><input type="number" inputMode="decimal" placeholder="Enter total bill amount from bank" value={stmtAmt} onChange={e=>{setStmtAmt(e.target.value);setReconSaved(false);}} style={{...iS,fontSize:16,fontWeight:600}}/></div>

      <div style={{margin:'16px 16px 0',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,overflow:'hidden'}}>
        <div style={{padding:'10px 14px',background:'var(--bg3)',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontFamily:'var(--mono)',fontSize:10,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em'}}>{selCC} · {billedTxns.length} txns in period</span>
          {billedTxns.length>0&&<button onClick={()=>{const html=`<!DOCTYPE html><html><head><title>${selCC} Bill Statement</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:20px;}h1{font-size:14px;margin-bottom:4px;}h2{font-size:11px;font-weight:400;color:#666;margin-bottom:16px;}table{width:100%;border-collapse:collapse;margin-top:12px;}th,td{border:1px solid #ccc;padding:6px 8px;text-align:left;}th{background:#f5f5f5;font-weight:600;font-size:9px;text-transform:uppercase;}td{font-size:10px;}.amt{text-align:right;}.desc{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}</style></head><body><h1>${selCC} — Bill Statement</h1><h2>${fmtDate(billStart)} to ${fmtDate(billEnd)}${dueDate?' · Due: '+fmtDate(dueDate):''}</h2><table><thead><tr><th>Date</th><th>Description</th><th>Category</th><th class="amt">Spend (₹)</th></tr></thead><tbody>${[...billedTxns].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at)).map(t=>`<tr><td>${fmtDate(t.created_at)}</td><td class="desc">${t.particulars||t.category}</td><td>${t.category}</td><td class="amt">${fmtAmt(t.amount)}</td></tr>`).join('')}<tr style="background:#ffebee;font-weight:600;"><td colspan="3">TOTAL BILL</td><td class="amt">₹${fmtAmt(billedTotal)}</td></tr></tbody></table></body></html>`;const w=window.open('','_blank');w.document.write(html);w.document.close();w.print();}} style={{background:'var(--blue)',color:'#fff',border:'none',borderRadius:6,padding:'4px 10px',fontFamily:'var(--mono)',fontSize:9,fontWeight:600,cursor:'pointer'}}>🖨 Print</button>}
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 14px',borderBottom:'1px solid var(--border)'}}><span style={{fontSize:13,color:'var(--text2)'}}>App Tracked Spends</span><span style={{fontFamily:'var(--mono)',fontSize:16,fontWeight:700,color:'var(--text)'}}>{fmtAmt(billedTotal)}</span></div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 14px',borderBottom:'1px solid var(--border)'}}><span style={{fontSize:13,color:'var(--text2)'}}>Bank Statement Amount</span><span style={{fontFamily:'var(--mono)',fontSize:16,fontWeight:700,color:hasStmt?'var(--text)':'var(--text3)'}}>{hasStmt?fmtAmt(sa):'—'}</span></div>
        {hasStmt&&<div style={{padding:'14px',background:diff===0?'var(--green-bg)':diff>0?'var(--red-bg)':'var(--green-bg)',borderTop:'2px solid '+(diff===0?'var(--green)':diff>0?'var(--red)':'var(--green)')}}><div style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:diff===0?'var(--green)':diff>0?'var(--red)':'var(--green)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:4}}>{diff===0?'✓ Perfectly Matched!':diff>0?'Unaccounted Bank Charges':'Cashbacks / Refunds'}</div><div style={{fontFamily:'var(--mono)',fontSize:22,fontWeight:800,color:diff===0?'var(--green)':diff>0?'var(--red)':'var(--green)'}}>{diff===0?fmtAmt(0):diff>0?'+'+fmtAmt(diff):'−'+fmtAmt(Math.abs(diff))}</div></div>}
        {!hasStmt&&<div style={{padding:'14px',fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',textAlign:'center'}}>Enter bank statement amount above to see reconciliation.</div>}
      </div>

      {hasStmt&&<div style={{padding:'12px 16px 0'}}>
        {reconSaved
          ?<div style={{background:'var(--green-bg)',border:'1px solid var(--green)',borderRadius:10,padding:'12px 14px',fontFamily:'var(--mono)',fontSize:12,color:'var(--green)',textAlign:'center',fontWeight:600}}>
            ✓ Bill Saved · Visible in Bills tab · Next period loaded
          </div>
          :<button onClick={handleSaveRecon} style={{width:'100%',background:'var(--green)',color:'#000',fontFamily:'var(--mono)',fontSize:13,fontWeight:700,border:'none',borderRadius:10,padding:'13px',cursor:'pointer',letterSpacing:'0.05em'}}>
            ✓ Save Bill &amp; Reconciliation
          </button>}
      </div>}

      {billedTxns.length>0&&<div style={{margin:'16px 16px 24px',border:'1px solid var(--border)',borderRadius:10,overflow:'hidden'}}>
        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:8,padding:'8px 12px',background:'var(--bg3)',borderBottom:'1px solid var(--border)'}}><span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase'}}>Description</span><span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase'}}>Category</span><span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',textAlign:'right'}}>Spend</span></div>
        {[...billedTxns].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).map((t,i)=>(
          <div key={t.id} style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:8,padding:'10px 12px',borderBottom:'1px solid var(--border)',background:i%2===0?'var(--bg2)':'var(--bg)'}}>
            <div style={{minWidth:0}}><div style={{fontSize:12,color:'var(--text)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{t.particulars||t.category}</div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:2}}>{fmtDate(t.created_at)}</div></div>
            <div><div style={{fontSize:11,color:'var(--text2)',fontFamily:'var(--mono)'}}>{t.category}</div></div>
            <div style={{textAlign:'right'}}><div style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:600,color:'var(--red)'}}>−{fmtAmt(t.amount)}</div></div>
          </div>
        ))}
        <div onClick={()=>{if(billedTotal>0&&setTab&&setTxnFilter){setTxnFilter({account:selCC,type:null,dateRange:{start:billStart,end:billEnd},category:null});setTab('txns');}}} style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:8,padding:'10px 12px',background:'var(--red-bg)',fontWeight:700,cursor:billedTotal>0?'pointer':'default'}}><div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)'}}>TOTAL IN PERIOD</div><div/><div style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:13,color:'var(--red)'}}>−{fmtAmt(billedTotal)}</div></div>
      </div>}
      {billedTxns.length===0&&billStart&&billEnd&&<div className="empty">No transactions for {selCC} between {fmtDate(billStart)} and {fmtDate(billEnd)}.</div>}
    </div>)}
  </div>);
}

/* ── Header ── */
function Header({liquid,tab,onMenu,isOnline,offlineCount,onHeaderAction,headerActionLabel}){
  const titles={add:'Add Entry',txns:'Transactions',dash:'Dashboard',settings:'Settings',udhari:'Udhari Ledger',provision:'Envelopes',statement:'Ledger Statement',site_ledger:'Ledger Statement',investments:'Investments',cc_bill:'CC Bill Reconcile',ledger_statement:'Ledger Statement'};
  return(
    <div className="header">
      <button onClick={onMenu} style={{background:'none',border:'none',color:'var(--text2)',cursor:'pointer',padding:'4px 6px',borderRadius:6,display:'flex',flexDirection:'column',gap:4}}>
        <span style={{display:'block',width:18,height:1.5,background:'var(--text2)',borderRadius:1}}/><span style={{display:'block',width:14,height:1.5,background:'var(--text2)',borderRadius:1}}/><span style={{display:'block',width:18,height:1.5,background:'var(--text2)',borderRadius:1}}/>
      </button>
      <span className="header-title" style={{flex:1,textAlign:'center'}}>{titles[tab]||'JB Finance'}</span>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        {!isOnline&&<span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--red)',padding:'2px 7px',background:'var(--red-bg)',borderRadius:20,border:'1px solid var(--red)'}} title="Offline — entries being queued">📵{offlineCount>0?` ${offlineCount}`:''}</span>}
        {isOnline&&offlineCount>0&&<span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--amber)',padding:'2px 7px',background:'var(--amber-bg)',borderRadius:20,border:'1px solid var(--amber)'}} title="Syncing queued entries">🔄{offlineCount}</span>}
        {onHeaderAction&&<button onClick={onHeaderAction} style={{background:'var(--green)',color:'#000',fontFamily:'var(--mono)',fontSize:11,fontWeight:600,padding:'5px 12px',borderRadius:7,border:'none',cursor:'pointer'}}>{headerActionLabel}</button>}
      </div>
    </div>
  );
}

/* ── TabBar ── */
function TabBar({tab,setTab,udahriCount}){
  const tabs=[
    {id:'dash',label:'Dash',icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="13" width="6" height="8" rx="1"/><rect x="10" y="8" width="5" height="13" rx="1"/><rect x="16" y="4" width="5" height="17" rx="1"/></svg>},
    {id:'txns',label:'Log',icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="7" y1="8" x2="17" y2="8"/><line x1="7" y1="12" x2="14" y2="12"/><line x1="7" y1="16" x2="11" y2="16"/></svg>},
    {id:'udhari',label:'Udhari',icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="23" y1="11" x2="17" y2="11"/></svg>},
    {id:'provision',label:'Funds',icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>},
    {id:'settings',label:'Setup',icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>},

  return(
