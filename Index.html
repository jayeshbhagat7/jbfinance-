// ─── INDEXEDDB — ACTUAL FILE STORAGE ────────────────────
const IDB={
  _db:null,
  open(){
    if(this._db) return Promise.resolve(this._db);
    return new Promise((res,rej)=>{
      const req=indexedDB.open("jos_files_v1",1);
      req.onupgradeneeded=e=>e.target.result.createObjectStore("files",{keyPath:"id"});
      req.onsuccess=e=>{this._db=e.target.result;res(this._db);};
      req.onerror=()=>rej("IDB open failed");
    });
  },
  async save(file){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction("files","readwrite");tx.objectStore("files").put(file);tx.oncomplete=()=>res(file);tx.onerror=()=>rej();});},
  async get(id){const db=await this.open();return new Promise(res=>{const req=db.transaction("files","readonly").objectStore("files").get(id);req.onsuccess=()=>res(req.result);req.onerror=()=>res(null);});},
  async del(id){const db=await this.open();return new Promise(res=>{const tx=db.transaction("files","readwrite");tx.objectStore("files").delete(id);tx.oncomplete=()=>res();});},
  async size(){const db=await this.open();return new Promise(res=>{let s=0;const req=db.transaction("files","readonly").objectStore("files").openCursor();req.onsuccess=e=>{const c=e.target.result;if(c){s+=(c.value.data?.length||0);c.continue();}else res(s);};});}
};

async function callClaude(prompt, maxTokens=600, skipMemory=false){
  const key=getApiKey();
  if(!key) return null;
  const sys = JAYESH_SYSTEM + (skipMemory?"":MEM.context());
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:maxTokens,system:sys,messages:[{role:"user",content:prompt}]})
    });
    const d=await res.json();
    if(d.error){console.warn("Claude API error:",d.error.message);return null;}
    return d.content?.[0]?.text||"";
  }catch(e){console.warn("callClaude failed:",e);return null;}
}

function localClassify(text){
  const low=text.toLowerCase();
  const labels=[];
  if(/karvu|karvanu|call|meet|pay|fix|send|book|contact|javu|levo|remind|schedule|follow.?up/i.test(low)) labels.push("task");
  if(/saru|khush|great|happy|grateful|anand|maja|proud|winning|excited|awesome/i.test(low)) labels.push("positive");
  if(/dar|chinta|worry|sad|tensed|problem|nathi|mushkil|pareshan|stuck|fear|frustrated/i.test(low)) labels.push("negative");
  if(/idea|plan|concept|what if|maybe|shu jo|navu|imagine|vichar|new|build|create/i.test(low)) labels.push("idea");
  if(/decide|decision|choice|karvu ke nahi|dilemma|option|choose/i.test(low)) labels.push("decision");
  if(/issue|obstacle|block|error|solve|challenge|kevi rite|how to|fix/i.test(low)) labels.push("problem");
  if(labels.length===0) labels.push("note");
  const type=labels[0];
  const INS={task:"Aa kaam schedule karo ane next step nakkhi karo.",positive:"Aa feeling note karvo — positive moments track karvathi confidence vade che.",negative:"Aa feeling acknowledge karo — shu specific action laine aa resolve thai shake?",idea:"Aa idea capture thai gayo — baad ma expand karjo.",decision:"Pros-cons list banavo ane deadline set karo.",problem:"Problem clearly define karo — pachhi solution visible thashe."};
  return{type,labels,insight:INS[type]||null};
}

async function classifyThought(text){
  const raw=await callClaude(
    `Classify this thought. Reply with ONLY a raw JSON object — no markdown, no backticks, no explanation.\n\nThought: ${JSON.stringify(text)}\n\nRespond exactly like this example:\n{"type":"task","labels":["task","idea"],"insight":"One sharp sentence in same language as input."}\n\nRules:\n- type: single most dominant label\n- labels: ALL that apply (task / positive / negative / idea / decision / problem / note)\n- insight: 1 sentence personalized to Jayesh's context, in same language as the thought`,
    400, true
  );
  if(raw){
    try{
      // Strip any accidental markdown fences
      const clean=raw.trim().replace(/^```json\s*/i,"").replace(/^```\s*/i,"").replace(/```\s*$/,"").trim();
      const p=JSON.parse(clean);
      if(p&&p.type){
        if(!p.labels||!Array.isArray(p.labels)||p.labels.length===0) p.labels=[p.type];
        return p;
      }
    }catch(e){console.warn("classify parse fail:",e,"\nraw:",raw);}
  }
  return localClassify(text);
}

}

function localWeeklyInsight(thoughts, tasks, journal, kaizen) {
  const now = Date.now();
  const days30 = 30 * 86400000;
  const recent = thoughts.filter(t => now - t.ts < days30);
  const typeCounts = recent.reduce((a, t) => { a[t.type] = (a[t.type] || 0) + 1; return a; }, {});
  const total = recent.length || 1;
  const topType = Object.entries(typeCounts).sort((a,b)=>b[1]-a[1])[0];
  const recentTasks = tasks.filter(t => now - t.ts < days30);
  const streamCounts = recentTasks.reduce((a,t)=>{a[t.stream]=(a[t.stream]||0)+1;return a;},{});
  const topStream = Object.entries(streamCounts).sort((a,b)=>b[1]-a[1])[0];
  const positiveRatio = Math.round(((typeCounts.positive||0)/total)*100);
  const negativeRatio = Math.round(((typeCounts.negative||0)/total)*100);
  const doneKaizen = kaizen.filter(k=>k.done&&now-k.ts<days30).length;
  return {
    themes: [
      { emoji: "🧠", title: `${topType?topType[0].charAt(0).toUpperCase()+topType[0].slice(1):"Vichar"} Mode Active`, desc: `Tara thoughts ma sabathi vahu ${topType?topType[0]:"notes"} che (${typeCounts[topType?topType[0]:"note"]||0} entries). Aa area focus deserve kare che.` },
      { emoji: topStream?"📋":"✅", title: topStream ? `${topStream[0]} Stream Heavy` : "Tasks Scattered", desc: topStream ? `${topStream[0]} stream ma sabathi vahu tasks (${topStream[1]}) — energy concentrate che.` : "Tasks stream-wise balanced che — saru sign." },
      { emoji: positiveRatio > negativeRatio ? "🌱" : "⚠️", title: positiveRatio > negativeRatio ? "Positive Momentum" : "Stress Under Surface", desc: positiveRatio > negativeRatio ? `${positiveRatio}% positive thoughts — momentum saru che. Continue karo.` : `${negativeRatio}% negative thoughts — koi unresolved tension check karo.` },
    ],
    emotion: { positive: typeCounts.positive||0, negative: typeCounts.negative||0, neutral: (typeCounts.note||0)+(typeCounts.idea||0)+(typeCounts.task||0), total: total },
    streams: streamCounts,
    action: tasks.filter(t=>!t.done).length > 5 ? `${tasks.filter(t=>!t.done).length} pending tasks che — aaj sabathi important 1 task complete karo.` : doneKaizen < 3 ? "Kaizen streak weak che — aaj ek small improvement commit karo." : "Momentum saru che — ek new important task Backlog ma umero.",
    period: `Last 30 days (${recent.length} thoughts, ${recentTasks.length} tasks)`,
    generated: Date.now(),
  };
}

async function getWeeklyInsight(thoughts, tasks, journal, kaizen) {
  const now = Date.now();
  const days30 = 30 * 86400000;
  const recent = thoughts.filter(t => now - t.ts < days30);
  const recentTasks = tasks.filter(t => now - t.ts < days30);
  const recentJournal = journal.filter(j => now - j.ts < days30);
  const recentKaizen = kaizen.filter(k => now - k.ts < days30);

  const dataStr = JSON.stringify({
    thoughts: recent.map(t=>({text:t.text,type:t.type})).slice(0,60),
    tasks: recentTasks.map(t=>({text:t.text,stream:t.stream,done:t.done})).slice(0,30),
    journal: recentJournal.map(j=>j.answers.filter(Boolean)).slice(0,10),
    kaizen: recentKaizen.map(k=>({text:k.text,done:k.done})).slice(0,20),
  });

  const prompt = `You are Jayesh Bhagat's personal Second Brain AI. Analyze his last 30 days of data and give a Weekly Insight.

DATA:
${dataStr}

Reply ONLY with this exact JSON (no markdown, no extra text):
{
  "themes": [
    {"emoji":"🔥","title":"Theme title (max 5 words)","desc":"2-3 sentence insight in Gujarati/English mix — direct, useful"},
    {"emoji":"💡","title":"Theme title","desc":"..."},
    {"emoji":"⚡","title":"Theme title","desc":"..."}
  ],
  "emotion": {"positive":N,"negative":N,"neutral":N,"total":N},
  "streams": {"Site":N,"Samaj":N,"Personal":N,"Finance":N},
  "action": "Ek specific, actionable step aaj mate — 1-2 sentences",
  "period": "Summary of data range",
  "generated": ${Date.now()}
}`;

  const raw = await callClaude(prompt, 900);
  if (raw) {
    try { return JSON.parse(raw.trim()); } catch {}
  }
  return localWeeklyInsight(thoughts, tasks, journal, kaizen);
}

function fmtTime(ts){
  const diff=Date.now()-ts;
  if(diff<60000)return"just now";
  if(diff<3600000)return`${Math.floor(diff/60000)}m ago`;
  if(diff<86400000)return`${Math.floor(diff/3600000)}h ago`;
  return new Date(ts).toLocaleDateString("en-IN",{day:"numeric",month:"short"});
}

// ─── BRAIN DUMP ──────────────────────────────────────────
function BrainDump(){
  const [thoughts,setThoughts]=useState(()=>LS.get("thoughts",[]));
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [filter,setFilter]=useState("all");
  const [focused,setFocused]=useState(false);
  const [editing,setEditing]=useState(null); // {id, text}
  const ref=useRef();

  const dump=useCallback(async()=>{
    if(!input.trim()||loading)return;
    const text=input.trim();
    setInput("");setLoading(true);
    const{type,insight}=await classifyThought(text);
    const item={id:Date.now(),text,type:type||"note",insight:insight||null,ts:Date.now(),done:false};
    setThoughts(prev=>{const u=[item,...prev];LS.set("thoughts",u);return u;});
    MEM.add("dump",`[${type||"note"}] ${text.slice(0,120)}`,"braindump");
    setLoading(false);
    ref.current?.focus();
  },[input,loading]);

  const del=id=>setThoughts(prev=>{const u=prev.filter(t=>t.id!==id);LS.set("thoughts",u);return u;});

  const toggleDone=id=>{
    setThoughts(prev=>{
      const u=prev.map(t=>{
        if(t.id!==id)return t;
        const next={...t,done:!t.done};
        if(next.done) MEM.add("completed",`Task completed: ${t.text.slice(0,100)}`,"braindump");
        return next;
      });
      LS.set("thoughts",u);return u;
    });
  };

  const saveEdit=()=>{
    if(!editing||!editing.text.trim())return;
    setThoughts(prev=>{const u=prev.map(t=>t.id===editing.id?{...t,text:editing.text.trim()}:t);LS.set("thoughts",u);return u;});
    setEditing(null);
  };

  const counts=thoughts.reduce((a,t)=>{
    (t.labels||[t.type]).forEach(l=>{a[l]=(a[l]||0)+1;});
    return a;
  },{});
  const filtered=filter==="all"?thoughts:filter==="done"?thoughts.filter(t=>t.done):thoughts.filter(t=>(t.labels||[t.type]).includes(filter)&&!t.done);
  const FILTERS=[{k:"all",l:"બધું"},...Object.keys(TC).map(k=>({k,l:TC[k].label})),{k:"done",l:"DONE ✓"}];

  return(
    <div className="screen">
      <div style={{padding:"14px 16px",borderBottom:"1px solid #2C2C3A",position:"sticky",top:0,zIndex:5,background:"#09090F"}}>
        <div style={{background:"#111118",border:`1.5px solid ${focused?"#7C6FFF":loading?"#FF9A56":"#2C2C3A"}`,borderRadius:14,padding:14,transition:"border-color .2s"}}>
          <textarea ref={ref} value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"&&(e.metaKey||e.ctrlKey))dump();}}
            onFocus={()=>setFocused(true)} onBlur={()=>setFocused(false)}
            placeholder="ગમે તે લખો — task, vichar, dar, idea... System classify karshe."
            style={{width:"100%",background:"none",border:"none",outline:"none",color:"#EEEEF5",fontFamily:"'Sora',sans-serif",fontSize:15,lineHeight:1.6,resize:"none",minHeight:72}}

          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:10}}>

                  <div className="dots"><span style={{background:"#FF9A56"}}/><span style={{background:"#FF9A56"}}/><span style={{background:"#FF9A56"}}/></div>

      {thoughts.length>0&&(
        <>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:7,padding:"12px 16px 4px"}}>
            {[{n:thoughts.length,l:"Total",c:"#EEEEF5"},{n:counts.positive||0,l:"Positive",c:"#3ECFA4"},{n:counts.task||0,l:"Tasks",c:"#FFD166"},{n:thoughts.filter(t=>t.done).length,l:"Done",c:"#7C6FFF"}].map(s=>(
              <div key={s.l} style={{background:"#111118",border:"1px solid #2C2C3A",borderRadius:10,padding:"9px 8px",textAlign:"center"}}>
                <div style={{fontFamily:"Space Mono,monospace",fontSize:18,fontWeight:700,color:s.c}}>{s.n}</div>
                <div style={{fontSize:9,color:"#5A5A78",textTransform:"uppercase",letterSpacing:.4,marginTop:2}}>{s.l}</div>
              </div>
            ))}

          <div className="chips">
            {FILTERS.map(f=>(
              <button key={f.k} className={`chip${filter===f.k?" on":""}`} onClick={()=>setFilter(f.k)}>
                {f.l}{f.k!=="all"&&f.k!=="done"&&counts[f.k]?` (${counts[f.k]})`:""}</button>
            ))}
          </div>
        </>
      )}

      <div style={{padding:"4px 16px 80px"}}>
        {filtered.length===0&&(
          <div style={{textAlign:"center",padding:"50px 20px",color:"#5A5A78"}}>
            <div style={{fontSize:36,marginBottom:14}}>🧠</div>
            <div style={{fontSize:16,fontWeight:600,color:"#EEEEF5",marginBottom:6}}>{thoughts.length===0?"Brain dump ready":"Koi nathi"}</div>
            <div style={{fontSize:13,lineHeight:1.6}}>{thoughts.length===0?"Jo pan matha ma chale che — lakhte jao.":"Baaki filter try karo."}</div>
          </div>
        )}
        {filtered.map(t=>{
          const cfg=TC[t.type]||TC.note;
          const isTask=t.type==="task";
          return(
            <div key={t.id} className="card" style={{opacity:t.done?.65:1}}>
              <div style={{position:"absolute",left:0,top:0,bottom:0,width:3,background:t.done?"#3ECFA4":cfg.col,borderRadius:"13px 0 0 13px"}}/>
              <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                {isTask&&(
                  <div onClick={()=>toggleDone(t.id)}
                    style={{width:20,height:20,borderRadius:"50%",border:`2px solid ${t.done?"#3ECFA4":"#FFD166"}`,background:t.done?"#3ECFA4":"none",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",marginTop:2,transition:"all .2s"}}>
                    {t.done&&<span style={{fontSize:10,color:"#000",fontWeight:700}}>✓</span>}
                  </div>
                )}
                <div style={{flex:1,fontSize:14,lineHeight:1.55,textDecoration:t.done?"line-through":"none",color:t.done?"#5A5A78":"#EEEEF5"}}>{t.text}</div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5,flexShrink:0}}>

                    {t.done
                      ? <span className="badge" style={{background:"rgba(62,207,164,.15)",color:"#3ECFA4"}}>DONE</span>
                      : (t.labels||[t.type]).map(l=>{const c=TC[l]||TC.note;return<span key={l} className="badge" style={{background:c.bg,color:c.col}}>{c.label}</span>;})}
                  </div>
                  <div style={{display:"flex",gap:4,marginTop:2}}>

                    <button onClick={()=>del(t.id)}

              <div style={{fontSize:10,color:"#5A5A78",fontFamily:"Space Mono,monospace",marginTop:7,textAlign:"right"}}>{fmtTime(t.ts)}</div>

            <div style={{fontSize:14,fontWeight:600,marginBottom:12,color:"#EEEEF5"}}>✎ Edit Thought</div>
            <textarea className="input" value={editing.text} onChange={e=>setEditing({...editing,text:e.target.value})}
              rows={4} style={{resize:"vertical",minHeight:80,marginBottom:12}}/>
            <div className="modal-btns">
              <button className="modal-cancel" onClick={()=>setEditing(null)}>Cancel</button>
              <button className="modal-save" onClick={saveEdit}>Save Edit</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── TASKS ───────────────────────────────────────────────
function Tasks(){
  const [tasks,setTasks]=useState(()=>LS.get("tasks",[]));
  const [mits,setMits]=useState(()=>LS.get("mits",["","",""]));
  const [show,setShow]=useState(false);
  const [form,setForm]=useState({text:"",stream:"Personal",due:""});
  const [filter,setFilter]=useState("All");

  const saveMit=(i,v)=>{const m=[...mits];m[i]=v;setMits(m);LS.set("mits",m);};
  const addTask=()=>{
    if(!form.text.trim())return;
    const t={id:Date.now(),...form,done:false,ts:Date.now()};
    const u=[t,...tasks];setTasks(u);LS.set("tasks",u);
    MEM.add("task_added",`[${form.stream}] ${form.text.trim()}`,"tasks");
    setForm({text:"",stream:"Personal",due:""});setShow(false);
  };
  const toggle=id=>{
    const u=tasks.map(t=>{
      if(t.id!==id)return t;
      const next={...t,done:!t.done};
      if(next.done) MEM.add("task_done",`[${t.stream}] Completed: ${t.text}`,"tasks");
      return next;
    });
    setTasks(u);LS.set("tasks",u);
  };
  const del=id=>{const u=tasks.filter(t=>t.id!==id);setTasks(u);LS.set("tasks",u);};
  const filtered=filter==="All"?tasks:tasks.filter(t=>t.stream===filter);
  const pending=tasks.filter(t=>!t.done).length;

  return(
    <div className="screen">
      <div style={{padding:"14px 16px 80px"}}>
        <div style={{background:"linear-gradient(135deg,rgba(124,111,255,.12),rgba(62,207,164,.08))",border:"1px solid rgba(124,111,255,.3)",borderRadius:13,padding:"13px 14px",marginBottom:14}}>
          <div style={{fontSize:10,fontFamily:"Space Mono,monospace",color:"#7C6FFF",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>⚡ Today's MIT</div>
          {mits.map((m,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:i<2?"1px dashed #2C2C3A":"none"}}>
              <span style={{fontFamily:"Space Mono,monospace",fontSize:11,color:"#5A5A78",width:16}}>{i+1}.</span>
              <input value={m} onChange={e=>saveMit(i,e.target.value)} placeholder={`Priority ${i+1}...`}
                style={{flex:1,background:"none",border:"none",outline:"none",color:"#EEEEF5",fontFamily:"'Sora',sans-serif",fontSize:14}}/>
            </div>
          ))}
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <span className="sec-title">Tasks ({pending} pending)</span>
          <button className="btn-sm" onClick={()=>setShow(true)}>+ Add</button>
        </div>
        <div className="chips" style={{padding:"0 0 10px"}}>
          {["All",...STREAMS].map(s=>(<button key={s} className={`chip${filter===s?" on":""}`} onClick={()=>setFilter(s)}>{s}</button>))}
        </div>
        {filtered.map(t=>(
          <div key={t.id} style={{background:"#111118",border:"1px solid #2C2C3A",borderRadius:11,padding:"11px 13px",display:"flex",alignItems:"flex-start",gap:10,marginBottom:7,opacity:t.done?.5:1}}>
            <div onClick={()=>toggle(t.id)} style={{width:18,height:18,borderRadius:"50%",border:`2px solid ${t.done?"#3ECFA4":"#2C2C3A"}`,background:t.done?"#3ECFA4":"none",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",marginTop:1,transition:"all .2s"}}>
              {t.done&&<span style={{fontSize:10,color:"#000",fontWeight:700}}>✓</span>}
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:14,textDecoration:t.done?"line-through":"none",color:t.done?"#5A5A78":"#EEEEF5"}}>{t.text}</div>
              <div style={{display:"flex",gap:8,marginTop:3}}>
                <span style={{fontSize:10,fontWeight:600,padding:"2px 7px",borderRadius:5,background:`${SCOL[t.stream]}22`,color:SCOL[t.stream]}}>{t.stream}</span>
                {t.due&&<span style={{fontSize:11,color:"#5A5A78"}}>{t.due}</span>}
              </div>
            </div>
            <button onClick={()=>del(t.id)} style={{background:"none",border:"none",color:"#5A5A78",cursor:"pointer",fontSize:13}}>×</button>
          </div>
        ))}
        {filtered.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:"#5A5A78"}}><div style={{fontSize:32,marginBottom:10}}>✅</div><div style={{fontSize:15,color:"#EEEEF5"}}>Koi task nathi — + Add thi umerao</div></div>}
      </div>

      {show&&(
        <div className="modal-bg" onClick={e=>{if(e.target.className==="modal-bg")setShow(false);}}>
          <div className="modal">
            <div style={{fontSize:15,fontWeight:600,marginBottom:14}}>New Task</div>
            <div className="field"><label className="lbl">Task</label><input className="input" value={form.text} onChange={e=>setForm({...form,text:e.target.value})} placeholder="Shu karvu che..."/></div>
            <div className="field"><label className="lbl">Stream</label><select className="select" value={form.stream} onChange={e=>setForm({...form,stream:e.target.value})}>{STREAMS.map(s=><option key={s}>{s}</option>)}</select></div>
            <div className="field"><label className="lbl">Due Date</label><input type="date" className="input" value={form.due} onChange={e=>setForm({...form,due:e.target.value})}/></div>
            <div className="modal-btns">
              <button className="modal-cancel" onClick={()=>setShow(false)}>Cancel</button>
              <button className="modal-save" onClick={addTask}>Save Task</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── KANBAN ──────────────────────────────────────────────
function Kanban(){
  const [cards,setCards]=useState(()=>LS.get("kanban",[]));
  const [show,setShow]=useState(false);
  const [form,setForm]=useState({text:"",stream:"Personal",status:"Backlog"});

  const add=()=>{
    if(!form.text.trim())return;
    const c={id:Date.now(),...form};
    const u=[...cards,c];setCards(u);LS.set("kanban",u);
    setForm({text:"",stream:"Personal",status:"Backlog"});setShow(false);
  };
  const move=(id,dir)=>{
    const u=cards.map(c=>{if(c.id!==id)return c;const i=KOLS.indexOf(c.status);return{...c,status:KOLS[Math.max(0,Math.min(KOLS.length-1,i+dir))]}});
    setCards(u);LS.set("kanban",u);
  };
  const del=id=>{const u=cards.filter(c=>c.id!==id);setCards(u);LS.set("kanban",u);};

  return(
    <div className="screen">
      <div style={{padding:"14px 16px 8px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span className="sec-title">Kanban Board</span>
        <button className="btn-sm" onClick={()=>setShow(true)}>+ Add Card</button>
      </div>
      <div style={{display:"flex",gap:10,padding:"4px 16px 80px",overflowX:"auto",alignItems:"flex-start"}}>
        {KOLS.map(s=>{
          const col=cards.filter(c=>c.status===s);
          return(
            <div key={s} style={{background:"#111118",border:"1px solid #2C2C3A",borderRadius:13,minWidth:195,width:195,flexShrink:0}}>
              <div style={{padding:"11px 13px",borderBottom:"1px solid #2C2C3A",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span style={{fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:6}}>
                  <span style={{width:8,height:8,borderRadius:"50%",background:KCOL[s],display:"inline-block"}}/>{s}
                </span>
                <span style={{fontFamily:"Space Mono,monospace",fontSize:10,color:"#5A5A78"}}>{col.length}</span>
              </div>
              <div style={{padding:8,display:"flex",flexDirection:"column",gap:6,minHeight:60}}>
                {col.map(c=>(
                  <div key={c.id} style={{background:"#18181F",border:"1px solid #2C2C3A",borderRadius:9,padding:"9px 10px"}}>
                    <div style={{fontSize:12,lineHeight:1.4}}>{c.text}</div>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:6}}>
                      <span style={{fontSize:9,fontWeight:600,padding:"2px 6px",borderRadius:4,background:`${SCOL[c.stream]}22`,color:SCOL[c.stream]}}>{c.stream}</span>
                      <div style={{display:"flex",gap:2}}>
                        {KOLS.indexOf(c.status)>0&&<button onClick={()=>move(c.id,-1)} style={{background:"none",border:"none",color:"#5A5A78",cursor:"pointer",fontSize:12}}>←</button>}
                        {KOLS.indexOf(c.status)<KOLS.length-1&&<button onClick={()=>move(c.id,1)} style={{background:"none",border:"none",color:"#5A5A78",cursor:"pointer",fontSize:12}}>→</button>}
                        <button onClick={()=>del(c.id)} style={{background:"none",border:"none",color:"#FF5F7A",cursor:"pointer",fontSize:12}}>×</button>
                      </div>
                    </div>
                  </div>
                ))}
                {col.length===0&&<div style={{fontSize:11,color:"#5A5A78",padding:"4px 2px",fontStyle:"italic"}}>Empty</div>}
              </div>
            </div>
          );
        })}
      </div>

      {show&&(
        <div className="modal-bg" onClick={e=>{if(e.target.className==="modal-bg")setShow(false);}}>
          <div className="modal">
            <div style={{fontSize:15,fontWeight:600,marginBottom:14}}>New Card</div>
            <div className="field"><label className="lbl">Task / Project</label><input className="input" value={form.text} onChange={e=>setForm({...form,text:e.target.value})} placeholder="Shu che..."/></div>
            <div className="field"><label className="lbl">Stream</label><select className="select" value={form.stream} onChange={e=>setForm({...form,stream:e.target.value})}>{STREAMS.map(s=><option key={s}>{s}</option>)}</select></div>
            <div className="field"><label className="lbl">Column</label><select className="select" value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>{KOLS.map(s=><option key={s}>{s}</option>)}</select></div>
            <div className="modal-btns">
              <button className="modal-cancel" onClick={()=>setShow(false)}>Cancel</button>
              <button className="modal-save" onClick={add}>Add Card</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── DOCS (PARA) ─────────────────────────────────────────

    if(!form.title.trim())return;

    const u=[d,...docs];setDocs(u);LS.set("docs",u);
    setForm({title:"",category:"Projects",content:"",tags:""});setShow(false);

  const del=id=>{const u=docs.filter(d=>d.id!==id);setDocs(u);LS.set("docs",u);setView(null);};

    <div className="screen">

// ─── FILE ALLOCATION TABLE ───────────────────────────────
const FILE_TYPES=["PDF","Excel","Word","Image","Drawing","Report","Other","Link"];
const FILE_TYPE_COL={PDF:"#FF5F7A",Excel:"#3ECFA4",Word:"#5EAEFF",Image:"#C49BFF",Link:"#FFD166",Drawing:"#FF9A56",Report:"#7C6FFF",Other:"#5A5A78"};
const FILE_TYPE_ICON={PDF:"📄",Excel:"📊",Word:"📝",Image:"🖼️",Link:"🔗",Drawing:"📐",Report:"📋",Other:"📁"};

function fmtBytes(b){if(!b||b===0)return"0 B";const k=1024;const s=["B","KB","MB","GB"];const i=Math.floor(Math.log(b)/Math.log(k));return`${(b/Math.pow(k,i)).toFixed(1)} ${s[i]}`;}

function FileTable(){
  const [files,setFiles]=useState(()=>LS.get("fat_files",[]));
  const [show,setShow]=useState(false);
  const [view,setView]=useState(null);
  const [filter,setFilter]=useState("All");
  const [search,setSearch]=useState("");
  const [form,setForm]=useState({name:"",type:"PDF",stream:"Site",url:"",desc:"",tags:"",version:""});
  const [uploading,setUploading]=useState(false);
  const [selectedFile,setSelectedFile]=useState(null); // raw File object
  const [viewData,setViewData]=useState(null); // IDB data for detail view
  const fileRef=useRef();

  // Handle file picker selection
  const onFilePick=e=>{
    const f=e.target.files?.[0];
    if(!f)return;
    setSelectedFile(f);
    if(!form.name)setForm(prev=>({...prev,name:f.name,type:guessType(f.name)}));
  };
  const guessType=name=>{
    const ext=name.split(".").pop().toLowerCase();
    if(["pdf"].includes(ext))return"PDF";
    if(["xls","xlsx","csv"].includes(ext))return"Excel";
    if(["doc","docx"].includes(ext))return"Word";
    if(["jpg","jpeg","png","gif","webp","heic"].includes(ext))return"Image";
    if(["dwg","dxf","rvt"].includes(ext))return"Drawing";
    return"Other";
  };

  const add=async()=>{
    if(!form.name.trim())return;
    setUploading(true);
    const id=Date.now();
    let stored=false;
    let fileSize=0;
    // If actual file selected — store in IDB
    if(selectedFile){
      try{
        fileSize=selectedFile.size;
        const data=await new Promise((res,rej)=>{
          const r=new FileReader();
          r.onload=()=>res(r.result);
          r.onerror=()=>rej();
          r.readAsDataURL(selectedFile);
        });
        await IDB.save({id,data,mime:selectedFile.type,originalName:selectedFile.name,size:fileSize});
        stored=true;
      }catch(e){console.warn("IDB save failed",e);}
    }
    const f={id,...form,tags:form.tags.split(",").map(t=>t.trim()).filter(Boolean),ts:id,stored,fileSize,originalName:selectedFile?.name||""};
    const u=[f,...files];setFiles(u);LS.set("fat_files",u);
    MEM.add("file_added",`[${form.type}|${form.stream}] ${form.name}${stored?" (stored locally)":""}`,"files");
    setForm({name:"",type:"PDF",stream:"Site",url:"",desc:"",tags:"",version:""});
    setSelectedFile(null);setShow(false);setUploading(false);
    if(fileRef.current)fileRef.current.value="";
  };

  const del=async id=>{
    await IDB.del(id).catch(()=>{});
    const u=files.filter(f=>f.id!==id);setFiles(u);LS.set("fat_files",u);
    setView(null);setViewData(null);
  };

  const streams=["All",...STREAMS];
  let filtered=filter==="All"?files:files.filter(f=>f.stream===filter);
  if(search.trim()) filtered=filtered.filter(f=>f.name.toLowerCase().includes(search.toLowerCase())||f.tags.join(" ").toLowerCase().includes(search.toLowerCase()));
  const typeCounts=files.reduce((a,f)=>{a[f.type]=(a[f.type]||0)+1;return a;},{});

  // Detail View
  useEffect(()=>{
    if(view){
      const f=files.find(f=>f.id===view);
      if(f?.stored) IDB.get(f.id).then(d=>setViewData(d)).catch(()=>setViewData(null));
      else setViewData(null);
    }
  },[view]);

  const downloadFile=()=>{
    if(!viewData?.data)return;
    const a=document.createElement("a");
    a.href=viewData.data;
    a.download=viewData.originalName||"file";
    a.click();
  };

  if(view){
    const file=files.find(f=>f.id===view);
    if(!file){setView(null);return null;}
    const col=FILE_TYPE_COL[file.type]||"#5A5A78";
    const isImage=file.type==="Image"&&viewData?.data;
    return(
      <div className="screen">

// ─── API TEST BUTTON ─────────────────────────────────────
function ApiTestButton({apiKeyInput}){
  const [status,setStatus]=useState(null); // null | "testing" | {ok,msg}

  const test=async()=>{
    const key=(apiKeyInput||"").trim();
    if(!key){setStatus({ok:false,msg:"Key blank che — pehla type karo."});return;}
    setStatus("testing");
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key":key,
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true"
        },
        body:JSON.stringify({
          model:"claude-sonnet-4-6",
          max_tokens:30,
          messages:[{role:"user",content:"Reply with only: WORKING"}]
        })
      });
      const d=await res.json();
      if(d.error){
        setStatus({ok:false,msg:`API Error: ${d.error.type} — ${d.error.message}`});
      } else if(d.content?.[0]?.text){
        setStatus({ok:true,msg:`✓ API Working! Response: "${d.content[0].text.trim()}"`});
      } else {
        setStatus({ok:false,msg:`Unexpected response: ${JSON.stringify(d).slice(0,120)}`});
      }
    }catch(e){
      setStatus({ok:false,msg:`Network/CORS Error: ${e.message}. Try opening app via Chrome browser, not file manager.`});
    }
  };

  return(
    <div style={{marginBottom:12}}>
      <button onClick={test} disabled={status==="testing"}
        style={{width:"100%",background:"rgba(94,174,255,.1)",border:"1px solid rgba(94,174,255,.3)",borderRadius:9,padding:"9px",color:"#5EAEFF",fontSize:13,cursor:"pointer",marginBottom:8}}>
        {status==="testing"?"⏳ Testing...":"🔌 Test API Connection"}
      </button>
      {status&&status!=="testing"&&(
        <div style={{background:status.ok?"rgba(62,207,164,.1)":"rgba(255,95,122,.1)",border:`1px solid ${status.ok?"rgba(62,207,164,.3)":"rgba(255,95,122,.3)"}`,borderRadius:8,padding:"10px 12px",fontSize:12,color:status.ok?"#3ECFA4":"#FF5F7A",lineHeight:1.6,wordBreak:"break-word"}}>
          {status.msg}
        </div>
      )}
    </div>
  );
}
